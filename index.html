                style={{fontSize:9,color:C.red,border:`1px solid ${C.red}`,borderRadius:6,padding:"3px 8px",background:C.redLight,cursor:"pointer"}}>
                🗑 Löschen
              </button>
            </div>
          </div>
        )}
      </div>
    );
  }

  return(
    <div style={{background:C.bg,minHeight:"100vh",paddingBottom:80}}>
      <div style={S.hdr}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:11,opacity:.45,marginBottom:3,letterSpacing:".06em",textTransform:"uppercase"}}>teeamo · Manager</div>
            <div style={{fontSize:20,fontWeight:800}}>{manager?.emoji&&<span style={{marginRight:4}}>{manager.emoji}</span>}{manager?.vorname||"Manager"}</div>
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:7}}>
            <div style={{width:38,height:38,borderRadius:"50%",background:C.yellow,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,color:C.navy}}>{manager?.kuerzel||"M"}</div>
            <button onClick={onLogout} style={{fontSize:10,background:"rgba(255,255,255,.1)",border:"0.5px solid rgba(255,255,255,.2)",color:"rgba(255,255,255,.6)",borderRadius:7,padding:"3px 8px",cursor:"pointer"}}>Abmelden</button>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginTop:14}}>
          {[{l:"Aktiv",n:empList.filter(u=>getStatus(u.vorname)==="Aktiv").length,c:C.mint},
            {l:"Feierabend",n:empList.filter(u=>getStatus(u.vorname)==="Feierabend").length,c:"rgba(255,255,255,.4)"},
            {l:"Nicht da",n:empList.filter(u=>getStatus(u.vorname)==="Nicht erschienen").length,c:C.red}].map(({l,n,c})=>(
            <div key={l} style={{background:"rgba(255,255,255,.07)",borderRadius:11,padding:"9px 10px",textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:800,color:c}}>{n}</div>
              <div style={{fontSize:9,opacity:.45,marginTop:1}}>{l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* ── ÜBERSICHT ── */}
      {tab==="uebersicht"&&!detailKey&&(
        <div style={{padding:"14px"}}>
          <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:9,textTransform:"uppercase",letterSpacing:".05em"}}>Heutige Mitarbeiterinnen</div>
          <div style={{display:"flex",flexDirection:"column",gap:9}}>
            {empList.map(emp=>{
              const st=getStatus(emp.vorname),br=getBranch(emp.vorname);
              return(
                <div key={emp.key} style={{...S.card,display:"flex",alignItems:"center",gap:11,padding:"12px 14px"}}>
                  <button onClick={()=>setDetailKey(emp.key)} style={{flex:1,border:"none",background:"none",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:11,padding:0}}>
                    <div style={{width:40,height:40,borderRadius:"50%",background:C.navy,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:emp.emoji?20:13,color:"#fff",flexShrink:0}}>{emp.emoji||emp.kuerzel}</div>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:7}}>
                        <span style={{fontSize:13,fontWeight:700,color:C.text}}>{emp.emoji&&<span style={{marginRight:3}}>{emp.emoji}</span>}{emp.vorname}</span>
                        <span style={{fontSize:9,color:C.muted,background:C.border,padding:"2px 6px",borderRadius:99}}>{emp.role}</span>
                      </div>
                      <div style={{fontSize:10,color:C.muted,marginTop:2}}>{br?br+" · ":""}Heute</div>
                    </div>
                    <span style={{fontSize:9,fontWeight:700,padding:"3px 9px",borderRadius:99,color:sColor(st),background:sBg(st)}}>{st}</span>
                  </button>
                  <button onClick={()=>setDeleteConfirm(emp.key)} style={{flexShrink:0,width:30,height:30,borderRadius:8,border:`1px solid ${C.border}`,background:C.redLight,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",marginLeft:4}}>
                    <span style={{fontSize:13,color:C.red}}>🗑</span>
                  </button>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {tab==="uebersicht"&&detailKey&&(()=>{
        const emp=safeUsers.find(u=>u.key===detailKey);
        const empRecs=records.filter(r=>r.user===emp.vorname);
        const total=empRecs.filter(r=>r.aus).reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0);
        return(
          <div style={{padding:"14px"}}>
            <button onClick={()=>setDetailKey(null)} style={{background:"none",border:"none",cursor:"pointer",color:C.mintDark,fontSize:12,fontWeight:700,marginBottom:12}}>← Zurück</button>
            <div style={{...S.card,display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
              <div style={{width:48,height:48,borderRadius:"50%",background:C.navy,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:emp.emoji?24:16,color:"#fff"}}>{emp.emoji||emp.kuerzel}</div>
              <div>
                <div style={{fontSize:16,fontWeight:800,color:C.text}}>{emp.emoji&&<span style={{marginRight:4}}>{emp.emoji}</span>}{emp.vorname}{emp.nachname&&<span style={{fontSize:13,fontWeight:400,color:C.muted}}> {emp.nachname}</span>}</div>
                <div style={{fontSize:11,color:C.muted}}>{emp.role}</div>
                <span style={{fontSize:9,fontWeight:700,padding:"3px 9px",borderRadius:99,marginTop:5,display:"inline-block",color:sColor(getStatus(emp.vorname)),background:sBg(getStatus(emp.vorname))}}>{getStatus(emp.vorname)}</span>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              {[{l:"Std. gesamt",v:total.toFixed(1)+"h"},{l:"Arbeitstage",v:empRecs.length+"d"}].map(({l,v})=>(
                <div key={l} style={S.card}>
                  <div style={{fontSize:10,color:C.muted,marginBottom:4}}>{l}</div>
                  <div style={{fontSize:20,fontWeight:800,color:C.mintDark}}>{v}</div>
                </div>
              ))}
            </div>
            <div style={{...S.card,marginBottom:12}}>
              <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:8}}>📋 VERTRAGSSTUNDEN / MONAT</div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <input type="number" min="0" max="300" step="0.5"
                  defaultValue={emp.contractHours||0}
                  onBlur={e=>{
                    const h=parseFloat(e.target.value)||0;
                    setUsers(prev=>(Array.isArray(prev)?prev:[]).map(u=>u.key===emp.key?{...u,contractHours:h}:u));
                  }}
                  style={{...S.input,width:90,textAlign:"center",fontSize:16,fontWeight:700}}/>
                <div style={{fontSize:11,color:C.muted}}>Std/Monat</div>
                {(emp.contractHours||0)>0&&(()=>{
                  const diff=total-(emp.contractHours||0);
                  return(
                    <div style={{marginLeft:"auto",textAlign:"right"}}>
                      <div style={{fontSize:12,fontWeight:800,color:diff>=0?C.mintDark:C.red}}>
                        {diff>=0?`+${diff.toFixed(1)}h`:diff.toFixed(1)+"h"}
                      </div>
                      <div style={{fontSize:9,color:C.muted}}>{diff>=0?"Überstunden":"Fehlstunden"}</div>
                    </div>
                  );
                })()}
              </div>
            </div>
            <div style={{...S.card,padding:0,overflow:"hidden"}}>
              <div style={{padding:"11px 13px",borderBottom:`1px solid ${C.border}`,fontSize:11,fontWeight:700,color:C.text}}>Arbeitsnachweise</div>
              {empRecs.length===0?<div style={{padding:"12px",fontSize:11,color:C.muted}}>Keine Einträge.</div>:empRecs.map((r,i)=>(
                <div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 13px",borderBottom:i<empRecs.length-1?`1px solid ${C.border}`:"none"}}>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <div style={{width:30,height:30,borderRadius:7,background:r.aus?C.mintLight:C.yellowLight,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                      <span style={{fontSize:7,color:C.muted}}>{r.date.slice(5)}</span>
                      <span style={{fontSize:9,fontWeight:700,color:r.aus?C.mintDark:C.yellow}}>{r.filiale.slice(-1)}</span>
                    </div>
                    <div>
                      <div style={{fontSize:11,color:C.muted}}>{r.ein} → {r.aus||"läuft"}</div>
                      <div style={{fontSize:9,color:C.muted}}>{r.filiale}</div>
                    </div>
                  </div>
                  <span style={{fontSize:11,fontWeight:700,color:r.aus?C.text:C.yellow}}>{stdLabel(r.ein,r.aus)}</span>
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {/* ── DIENSTPLAN ── */}
      {tab==="dienstplan"&&(
        <div>
          {/* Admin Staff 계정: 본인 일정도 함께 표시 */}
          {/* Admin Staff 계정(MANAGERS 배열 밖)은 본인 일정도 표시 */}
          {!MANAGERS.includes(userKey)&&manager?.vorname&&(
            <div style={{padding:"14px 14px 0"}}>
              <KalenderView csvCtx={csvCtx} userName={manager.vorname} records={records} users={users}/>
            </div>
          )}
          {/* manager.vorname이 아직 없으면(로딩 중) 임시 표시 */}
          {!MANAGERS.includes(userKey)&&!manager?.vorname&&(
            <div style={{padding:"14px",textAlign:"center",color:C.muted,fontSize:12}}>
              Lade Benutzerdaten…
            </div>
          )}
          <DienstplanUploadView records={records} users={users}/>
        </div>
      )}

      {/* ── ARCHIV (처리 완료 = 기존 Anträge) ── */}
      {tab==="antraege"&&(
        <div style={{padding:"14px"}}>
          <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:4,textTransform:"uppercase",letterSpacing:".05em"}}>📂 Bearbeitete Vorgänge</div>
          <div style={{fontSize:10,color:C.muted,marginBottom:14}}>Alle abgeschlossenen Anträge & Meldungen</div>

          {/* Nachtrag 처리 완료 */}
          {(()=>{
            const done = antraege.filter(a=>a.status!=="offen");
            if(done.length===0) return null;
            return(
              <div style={{marginBottom:14}}>
                <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:".05em"}}>🕐 Nachträge</div>
                {done.map(a=>(
                  <div key={a.id} style={{...S.card,marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div>
                      <div style={{fontSize:11,fontWeight:700,color:C.text}}>{a.user} · {a.date}</div>
                      <div style={{fontSize:10,color:C.muted}}>{a.filiale} · {a.ein}–{a.aus}</div>
                    </div>
                    <span style={S.pill(a.status)}>{a.status==="genehmigt"?"Genehmigt":"Abgelehnt"}</span>
                  </div>
                ))}
              </div>
            );
          })()}

          {/* Archiv (tausch/absage/einspringen 처리 완료) */}
          {myArchiv.length>0&&(
            <div>
              <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:".05em"}}>🗂 Archiv</div>
              {myArchiv.map(([key,a])=>renderErledigtCard(key,a))}
            </div>
          )}

          {antraege.filter(a=>a.status!=="offen").length===0&&myArchiv.length===0&&(
            <div style={{textAlign:"center",color:C.muted,fontSize:12,padding:"30px 0"}}>Noch keine bearbeiteten Vorgänge.</div>
          )}
        </div>
      )}

      {/* ── STATISTIK ── */}
      {tab==="statistik"&&<StatistikTab records={records} users={users}/>}

      {/* ── ALARM ── */}
      {tab==="benachrichtigungen"&&(
        <div style={{padding:"14px"}}>

          {/* ① Freie Schicht eintragen – 항상 맨 위 */}
          <div style={{...S.card,marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:800,color:C.text,marginBottom:10}}>➕ Freie Schicht eintragen</div>
            <div style={{display:"flex",gap:8,marginBottom:8,alignItems:"flex-end"}}>
              <div>
                <div style={{fontSize:9,color:C.muted,marginBottom:3}}>Datum</div>
                <input type="date" value={fsDate} onChange={e=>setFsDate(e.target.value)}
                  style={{...S.input,width:"auto",minWidth:0,fontSize:12}}/>
              </div>
              <div>
                <div style={{fontSize:9,color:C.muted,marginBottom:3}}>Uhrzeit</div>
                <input type="time" value={fsTime} onChange={e=>setFsTime(e.target.value)}
                  style={{...S.input,width:"auto",minWidth:0,fontSize:12}}/>
              </div>
            </div>
            <div style={{marginBottom:8}}>
              <div style={{fontSize:9,color:C.muted,marginBottom:3}}>Filiale</div>
              <div style={{display:"flex",gap:6}}>
                {FILIALEN.map(f=>(
                  <button key={f} onClick={()=>setFsFiliale(f)}
                    style={{flex:1,padding:"7px 2px",borderRadius:8,fontSize:9,fontWeight:700,cursor:"pointer",
                      border:`2px solid ${fsFiliale===f?C.mint:C.border}`,
                      background:fsFiliale===f?C.mintLight:"#fff",
                      color:fsFiliale===f?C.mintDark:C.muted}}>
                    {f.replace("TEEAMO ","")}
                  </button>
                ))}
              </div>
            </div>
            <input value={fsNote} onChange={e=>setFsNote(e.target.value)} placeholder="Hinweis (optional)"
              style={{...S.input,width:"100%",marginBottom:8}}/>
            <button onClick={addFreieSchicht}
              style={{width:"100%",padding:"10px",borderRadius:9,border:"none",
                background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,
                color:"#fff",fontWeight:800,fontSize:12,cursor:"pointer"}}>
              Schicht veröffentlichen
            </button>
          </div>

          {/* 등록된 빈 근무 목록 */}
          {(Array.isArray(freieSchichten)?freieSchichten:[]).length>0&&(
            <div style={{marginBottom:14}}>
              <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:".05em"}}>Veröffentlichte Schichten</div>
              {(Array.isArray(freieSchichten)?freieSchichten:[]).map(s=>(
                <div key={s.id} style={{...S.card,marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontSize:11,fontWeight:700,color:C.text}}>{new Date(s.date).toLocaleDateString("de-DE",{weekday:"short",day:"numeric",month:"numeric"})}</div>
                    <div style={{fontSize:10,color:C.muted}}>{s.filiale}{s.time?` · ${s.time}`:""}</div>
                    {s.note&&<div style={{fontSize:9,color:C.muted}}>{s.note}</div>}
                  </div>
                  <button onClick={()=>setFreieSchichten(prev=>(Array.isArray(prev)?prev:[]).filter(x=>x.id!==s.id))}
                    style={{fontSize:10,color:C.red,border:`1px solid ${C.red}`,borderRadius:6,padding:"3px 8px",background:C.redLight,cursor:"pointer"}}>
                    Löschen
                  </button>
                </div>
              ))}
            </div>
          )}

          {/* ② 미처리 알림 (Offene Vorgänge) */}
          {(pendingNotifs.length>0||offeneNachtraege.length>0) ? (
            <div style={{marginBottom:14}}>
              <div style={{fontSize:10,fontWeight:700,color:C.red,marginBottom:10,textTransform:"uppercase",letterSpacing:".05em"}}>
                🔔 Offene Vorgänge ({pendingNotifs.length+offeneNachtraege.length})
              </div>

              {/* Nachtrag (antraege에서 직접) */}
              {offeneNachtraege.map(a=>(
                <div key={a.id} style={{...S.card,marginBottom:10,border:`1.5px solid ${C.yellow}`}}>
                  <div style={{fontSize:11,fontWeight:800,color:C.yellow,marginBottom:4}}>🕐 Nachtrag · {a.user}</div>
                  <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:2}}>
                    {new Date(a.date).toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"})}
                  </div>
                  <div style={{fontSize:10,color:C.muted,marginBottom:2}}>{a.filiale} · {a.ein} – {a.aus}</div>
                  <div style={{fontSize:11,color:C.text,background:C.bg,borderRadius:8,padding:"7px 9px",marginBottom:10}}>📌 "{a.grund}"</div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>approveNachtrag(a.id,false)}
                      style={{flex:1,padding:"9px",borderRadius:9,border:`1px solid ${C.border}`,background:"#fff",color:C.muted,fontWeight:700,fontSize:11,cursor:"pointer"}}>Ablehnen</button>
                    <button onClick={()=>approveNachtrag(a.id,true)}
                      style={{flex:2,padding:"9px",borderRadius:9,border:"none",background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,color:"#fff",fontWeight:800,fontSize:11,cursor:"pointer"}}>✅ Genehmigen</button>
                  </div>
                </div>
              ))}

              {/* 알림 (tausch/absage/einspringen/prufen) */}
              {pendingNotifs.map(([key,n])=>renderAlarmCard(key,n))}
            </div>
          ) : (
            <div style={{...S.card,textAlign:"center",padding:"24px 16px",marginBottom:14}}>
              <div style={{fontSize:24,marginBottom:6}}>✅</div>
              <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:4}}>Alles erledigt!</div>
              <div style={{fontSize:11,color:C.muted}}>Keine offenen Vorgänge.</div>
            </div>
          )}

          {/* ③ Erledigt (처리 완료, 맨 아래) */}
          {myArchiv.length>0&&(
            <div style={{marginBottom:14}}>
              <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:".05em"}}>
                ✅ Erledigt ({myArchiv.length})
              </div>
              {myArchiv.map(([key,a])=>renderErledigtCard(key,a))}
            </div>
          )}
        </div>
      )}

      {/* ── NAVIGATION ── */}
      <div style={S.nav}>
        {[{id:"uebersicht",icon:"👥",lbl:"Übersicht"},
          {id:"dienstplan",icon:"📋",lbl:"Dienstplan"},
          {id:"antraege",icon:"📂",lbl:"Vorgänge"},
          {id:"benachrichtigungen",icon:"🔔",lbl:`Alarm${alarmCount>0?" ("+alarmCount+")":""}` },
          {id:"statistik",icon:"📊",lbl:"Statistik"}].map(t=>(
          <button key={t.id} onClick={()=>{setTab(t.id);setDetailKey(null);}} style={{flex:1,border:"none",background:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"3px 0",position:"relative"}}>
            <div style={{position:"relative",display:"inline-block"}}>
              <span style={{fontSize:19}}>{t.icon}</span>
              {t.id==="benachrichtigungen"&&alarmCount>0&&(
                <span style={{position:"absolute",top:-4,right:-6,minWidth:16,height:16,borderRadius:99,
                  background:C.red,color:"#fff",fontSize:9,fontWeight:800,
                  display:"flex",alignItems:"center",justifyContent:"center",padding:"0 3px",lineHeight:1}}>
                  {alarmCount}
                </span>
              )}
            </div>
            <span style={{fontSize:9,fontWeight:600,color:tab===t.id?C.mintDark:C.muted}}>{t.lbl}</span>
            {tab===t.id&&<div style={{width:16,height:2,background:C.mint,borderRadius:99}}/>}
          </button>
        ))}
      </div>

      {deleteConfirm&&(()=>{
        const empToDel=safeUsers.find(u=>u.key===deleteConfirm);
        return(
          <div style={{position:"fixed",inset:0,background:"rgba(20,20,20,.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:"24px"}}>
            <div style={{background:C.card,borderRadius:18,padding:"24px 22px",width:"100%",maxWidth:340,boxShadow:"0 8px 32px rgba(0,0,0,.18)"}}>
              <div style={{width:48,height:48,borderRadius:"50%",background:C.redLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,margin:"0 auto 14px"}}>🗑</div>
              <div style={{fontSize:16,fontWeight:800,color:C.text,textAlign:"center",marginBottom:6}}>Konto löschen?</div>
              <div style={{fontSize:12,color:C.muted,textAlign:"center",marginBottom:20}}>
                Das Konto von <strong style={{color:C.text}}>{empToDel?.vorname}</strong> wird dauerhaft gelöscht. Diese Aktion kann nicht rückgängig gemacht werden.
              </div>
              <div style={{display:"flex",gap:9}}>
                <button onClick={()=>setDeleteConfirm(null)} style={{flex:1,padding:"12px",borderRadius:11,border:`1.5px solid ${C.border}`,background:C.card,color:C.muted,fontWeight:700,fontSize:13,cursor:"pointer"}}>Abbrechen</button>
                <button onClick={()=>{setUsers(prev=>(Array.isArray(prev)?prev:[]).filter(u=>u.key!==deleteConfirm));setDeleteConfirm(null);setDetailKey(null);}}
                  style={{flex:1,padding:"12px",borderRadius:11,border:"none",background:`linear-gradient(135deg,${C.red},#A8432E)`,color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}}>Löschen</button>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState("login");
  const [userKey,setUserKey]=useState(null);
  const { getPin, setPin, initPins } = usePinStore();

  // 모든 데이터를 Firebase 실시간 동기화
  const [users,    setUsers,    usersReady]    = useFirebase("users",    INIT_USERS);
  const [records,  setRecords,  recordsReady]  = useFirebase("records",  INIT_RECORDS);
  const [antraege, setAntraege, antraegeReady] = useFirebase("antraege", INIT_ANTRAEGE);
  const csvCtx = useDienstplanCSV();

  // INIT_USERS의 PIN을 LS에 최초 1회 저장
  useEffect(() => { if (usersReady) initPins(INIT_USERS); }, [usersReady]);

  const allReady = usersReady && recordsReady;

  function handleLogin(key){
    const u=(Array.isArray(users)?users:[]).find(x=>x.key===key);
    const isAdmin=MANAGERS.includes(key)||(u&&u.isAdmin);
    setUserKey(key);setScreen(isAdmin?"manager":"mitarbeiter");
  }
  function handleLogout(){setUserKey(null);setScreen("login");}

  // users에 setUsers 대신 Firebase 직접 쓰기 wrapper
  function setUsersFirebase(updater) {
    setUsers(updater);
  }

  if(!allReady) return(
    <div style={{maxWidth:500,margin:"0 auto",minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14}}>
      <div style={{width:36,height:36,border:`3px solid ${C.mint}`,borderTop:"3px solid transparent",borderRadius:"50%",animation:"spin .8s linear infinite"}}/>
      <div style={{fontSize:13,color:C.muted,fontWeight:600}}>Verbindung zu Firebase…</div>
    </div>
  );

  return(
    <div style={{maxWidth:500,margin:"0 auto",minHeight:"100vh",background:C.bg}}>
      {screen==="login"&&<LoginView onLogin={handleLogin} users={users} setUsers={setUsersFirebase} getPin={getPin} setPin={setPin} csvCtx={csvCtx}/>}
      {screen==="mitarbeiter"&&<MitarbeiterView userKey={userKey} users={users} records={records} setRecords={setRecords} antraege={antraege} setAntraege={setAntraege} onLogout={handleLogout} csvCtx={csvCtx}/>}
      {screen==="manager"&&<ManagerView records={records} antraege={antraege} setAntraege={setAntraege} onLogout={handleLogout} userKey={userKey} users={users} setUsers={setUsersFirebase} csvCtx={csvCtx}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
