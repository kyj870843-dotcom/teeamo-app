              <div style={{border:"1.5px dashed "+C.mint,borderRadius:12,padding:"12px",marginBottom:6,background:C.mintLight}}>
                <div style={{fontSize:9,fontWeight:700,color:C.mintDark,marginBottom:8}}>{"4 · NEUE SCHICHT FÜR DIESEN TAG"}</div>
                <div style={{marginBottom:8}}>
                  <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:3}}>FILIALE</div>
                  <select value={aFil} onChange={e=>setAFil(e.target.value)} style={inp}>
                    {FILIALEN.map(f=><option key={f} value={f}>{filShort[f]||f}</option>)}
                  </select>
                </div>
                <div style={{marginBottom:8}}>
                  <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:3}}>MITARBEITER/IN</div>
                  <select value={aEmp} onChange={e=>setAEmp(e.target.value)} style={inp}>
                    <option value="">{"— auswählen —"}</option>
                    {adminName&&<option value={adminName}>{adminName+" (Admin)"}</option>}
                    {empOptions.map(u=><option key={u.key} value={u.vorname}>{u.vorname}{u.nachname?" "+u.nachname:""}</option>)}
                    <option disabled>{"──────────"}</option>
                    <option value="__temp__">{"➕ Temp-Name direkt eingeben…"}</option>
                  </select>
                  {aEmp==="__temp__"&&(
                    <input value={aTemp} onChange={e=>setATemp(e.target.value)} placeholder="z. B. Tingting" style={{...inp,marginTop:6}}/>
                  )}
                </div>
                {/* 🧋 ARBEITSTYP — Onigiri 선택 시 시간 입력 숨김 */}
                <div style={{marginBottom:8}}>
                  <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:3}}>ARBEITSTYP</div>
                  <div style={{display:"flex",gap:6}}>
                    {ARBEITSTYPEN.map(({typ,icon,lbl})=>(
                      <button key={typ} onClick={()=>setATyp(typ)}
                        style={{flex:1,padding:"8px 4px",borderRadius:9,fontSize:10,fontWeight:800,cursor:"pointer",
                          border:`2px solid ${aTyp===typ?C.mintDark:C.border}`,
                          background:aTyp===typ?"#fff":"rgba(255,255,255,.6)",
                          color:aTyp===typ?C.mintDark:C.muted}}>
                        <div style={{fontSize:14}}>{icon}</div>
                        <div style={{fontSize:9,marginTop:2}}>{lbl}</div>
                      </button>
                    ))}
                  </div>
                </div>
                {isOnigiriFiliale(aFil) ? (
                  <div style={{fontSize:10,color:C.mintDark,fontWeight:700,background:"#fff",
                    border:"1px solid "+C.mint,borderRadius:9,padding:"9px 11px",marginBottom:10}}>
                    {"🍙 Onigiri: Keine Uhrzeit nötig – nur Name eintragen."}
                  </div>
                ) : (
                  <div style={{display:"flex",gap:12,marginBottom:10}}>
                    {timeField(aVon,setAVon,"VON")}
                    {timeField(aBis,setABis,"BIS")}
                  </div>
                )}
                <button onClick={addToCart}
                  style={{width:"100%",padding:"11px",borderRadius:10,border:"none",background:C.navy,color:"#fff",fontWeight:800,fontSize:12,cursor:"pointer"}}>
                  {"+ Zu diesem Tag hinzufügen"}
                </button>
              </div>

              {msg && (
                <div style={{fontSize:11,fontWeight:700,padding:"9px 12px",borderRadius:9,marginTop:6,
                  background:msg.t==="ok"?"#dcfce7":"#fee2e2",color:msg.t==="ok"?"#15803d":C.red}}>{msg.m}</div>
              )}
            </div>

            {/* 고정 하단: 저장 / 완료 */}
            <div style={{padding:"12px 16px calc(12px + env(safe-area-inset-bottom,0px))",borderTop:"1px solid "+C.border,display:"flex",gap:8,flexShrink:0}}>
              <button onClick={()=>setShowAdd(false)}
                style={{flex:1,padding:"12px",borderRadius:11,border:"1px solid "+C.border,background:"#fff",color:C.muted,fontWeight:700,fontSize:12,cursor:"pointer"}}>
                Fertig
              </button>
              <button onClick={saveCart} disabled={saving||cart.length===0}
                style={{flex:2,padding:"12px",borderRadius:11,border:"none",
                  background:(saving||cart.length===0)?"#aaa":"linear-gradient(135deg,"+C.mint+","+C.mintDark+")",
                  color:"#fff",fontWeight:800,fontSize:13,cursor:(saving||cart.length===0)?"not-allowed":"pointer"}}>
                {saving?"⏳ Speichern…":"✓ Speichern"+(cart.length?" ("+cart.length+")":"")}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function ManagerView({records,setRecords,antraege,setAntraege,onLogout,userKey,users,setUsers,csvCtx,onSwitchToStaff,hybrid}){
  const [tab,setTab]=useState("uebersicht");
  const [antragTab,setAntragTab]=useState("schichtboerse"); // Anträge 서브탭
  const [detailKey,setDetailKey]=useState(null);
  const [deleteConfirm,setDeleteConfirm]=useState(null);
  const [erledigtExpanded,setErledigtExpanded]=useState({});
  const [monthAccordion,setMonthAccordion]=useState({});
  const [delRecordConfirm,setDelRecordConfirm]=useState(null);
  const [showMgrSettings, setShowMgrSettings] = useState(false);
  const [aTab, setATab] = useState("nachtrag");
  const [openAId, setOpenAId] = useState(null);
  const [uTab, setUTab] = useState("all");
  const safeUsers=Array.isArray(users)&&users.length>0?users:INIT_USERS;

  // 🚨 미출근 경보 시스템: 5분마다 근무 시작 시간 체크
  React.useEffect(()=>{
    function checkNoShow(){
      if(!window._fbDb||!window._fbRef||!window._fbGet||!window._fbSet) return;
      const now = new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Berlin"}));
      const todayStr = now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0");
      const nowMin = now.getHours()*60+now.getMinutes();
      // 오늘 schedule에서 아직 출근 안 한 직원 체크
      window._fbGet(window._fbRef(window._fbDb,"schedule")).then(snap=>{
        const sched=snap.val()||{};
        for(const [name, shifts] of Object.entries(sched)){
          if(MANAGERS.includes(name.toLowerCase())) continue;
          const todayShifts=(Array.isArray(shifts)?shifts:Object.values(shifts)).filter(s=>(s.d||s.date)===todayStr);
          for(const sh of todayShifts){
            const t=sh.t||sh.time;
            if(!t||!t.includes("-")) continue;
            const startTime=t.split("-")[0];
            const [sh2,sm2]=startTime.split(":").map(Number);
            if(isNaN(sh2)) continue;
            const startMin=sh2*60+sm2;
            // 15분 초과 && 아직 알림 안 보냄
            if(nowMin-startMin<15) continue;
            // [동일 날짜 + 동일 직원] 단일 키 → 매니저별 중복(3개) 생성 방지, 단 1개만
            const alertKey="noshow_"+name+"_"+todayStr;
            window._fbGet(window._fbRef(window._fbDb,"notifications/"+alertKey)).then(ex=>{
              if(ex.val()) return; // 이미 존재 → 중복 인서트 차단
              // 실제 출근 기록 체크
              window._fbGet(window._fbRef(window._fbDb,"records")).then(recSnap=>{
                const recs=Object.values(recSnap.val()||{});
                const clocked=recs.some(r=>sameName(r.user,name)&&r.date===todayStr&&r.ein);
                if(clocked) return; // 이미 출근함
                // 미출근 경보 발송 (단 1개)
                const alertMsg="🚨 [No-Show] "+name+" — "+(sh.f||sh.filiale)+" · "+startTime+" — kein Einstempeln.";
                window._fbSet(window._fbRef(window._fbDb,"notifications/"+alertKey),{
                  type:"noshow_alert", kategorie:"🚨 NoShow",
                  user:name, date:todayStr, filiale:sh.f||sh.filiale, time:startTime,
                  text:alertMsg, gelesen:false, urgent:true, ts:Date.now()
                }).catch(()=>{});
              }).catch(()=>{});
            }).catch(()=>{});
          }
        }
      }).catch(()=>{});
    }
    // 앱 시작 즉시 + 5분마다 체크
    checkNoShow();
    const iv=setInterval(checkNoShow,5*60*1000);
    return()=>clearInterval(iv);
  },[]);
  // userKey ,  key prefix fallback (  )
  const manager=safeUsers.find(u=>u.key===userKey)
    || {key:userKey, vorname:userKey?.split("_")[0]||"Manager", emoji:"", kuerzel:"M", role:"Admin"};
  const empList=safeUsers.filter(u=>!MANAGERS.includes(u.key)).sort(byName);
  const todayRecs=records.filter(r=>r.date===today());
  // 🔒 filiale를 주면 해당 지점 근무만 보고 상태를 판정한다.
  //    (오전 ONIGIRI 퇴근이 오후 TEEnJOY 카드까지 Feierabend로 만들던 버그 방지)
  const getStatus=(name, filiale)=>{
    const recs=todayRecs.filter(x=>sameName(x.user,name)&&x.ein&&
      (filiale===undefined||filiale===null||sameFiliale(x.filiale, filiale)));
    if(recs.length===0) return "Nicht erschienen";
    // 진행 중(퇴근 전)인 record가 있으면 Aktiv — 단 '유령 기록'은 제외
    // (이름 변경 등으로 지워지지 않고 남은 옛 진행중 기록 때문에 퇴근 후에도
    //  계속 Aktiv로 보이던 버그 방지)
    if(recs.some(r=>(!r.aus||r.aus==="") && !isStaleOpenRecord(r, recs))) return "Aktiv";
    // 조기 퇴근으로 확인 대기(prüfen)인 record가 있고 아직 확인 전이면 Prüfen
    if(recs.some(r=>r.aus&&r.prüfen&&!r.geprüft)) return "Prüfen";
    return "Feierabend";
  };
  // 조기 퇴근 확인(OK): record를 geprüft 처리 → 직원 화면도 Feierabend로 즉시 전환
  function confirmPruefen(rec){
    if(!rec||!rec.id) return;
    setRecords(prev=>(Array.isArray(prev)?prev:[]).map(r=>r.id===rec.id?{...r,prüfen:false,geprüft:true}:r));
  }
  const getBranch=name=>{const r=todayRecs.find(x=>sameName(x.user,name));return r?.filiale||null;};
  const sColor=s=>s==="Aktiv"?C.mintDark:s==="Feierabend"?C.muted:s==="Prüfen"?C.yellow:C.red;
  const sBg=s=>s==="Aktiv"?C.mintLight:s==="Feierabend"?"#F0F0F0":s==="Prüfen"?C.yellowLight:C.redLight;

  const [notifications, setNotifications] = useFirebase("notifications", {});
  const [tauschAntraege, setTauschAntraege] = useFirebase("schichttausch", []);
  const [freieSchichten, setFreieSchichten] = useFirebase("freieSchichten", []);
  const [schedule, setSchedule] = useFirebase("schedule", {});
  const [archiv, setArchiv] = useFirebase("archiv", {});
  const [fsDate, setFsDate] = useState(today());
  const [fsFiliale, setFsFiliale] = useState(FILIALEN[0]);
  const [fsTimeFrom, setFsTimeFrom] = useState("");
  const [fsTimeTo, setFsTimeTo] = useState("");
  const [fsNote, setFsNote] = useState("");

  //     (Alarm  )
  // Schichtbörse 자동 승인 알림은 확인용으로만 표시 (별도 처리 불필요)
  const boerseMatchNotifs = Object.entries(notifications||{})
    .filter(([,n])=>n.type==="schichtboerse_match"&&!n.gelesen&&MANAGERS.includes(n.zustaendig))
    .sort(([,a],[,b])=>b.ts-a.ts);
  // Schichtbörse 탭 진입 시 매칭 알림을 읽음 처리 → 하단 탭바 배지 즉시 0
  useEffect(()=>{
    if(tab!=="schichtboerse_mgr") return;
    const keys=boerseMatchNotifs.map(([k])=>k);
    if(keys.length===0) return;
    setNotifications(prev=>{
      const next={...(prev||{})};
      keys.forEach(k=>{ next[k]={...(next[k]||{}),gelesen:true}; });
      return next;
    });
    if(window._fbSet&&window._fbRef&&window._fbDb)
      keys.forEach(k=>window._fbSet(window._fbRef(window._fbDb,"notifications/"+k+"/gelesen"),true).catch(()=>{}));
  },[tab]);
  const pendingNotifs = Object.entries(notifications||{})
    .filter(([,n]) => n.zustaendig === userKey && !n.gelesen && !n.bearbeitetVon)
    .sort((a,b) => b[1].ts - a[1].ts);

  //         ( )
  const handledByOther = Object.entries(notifications||{})
    .filter(([,n]) => n.zustaendig === userKey && !n.gelesen && n.bearbeitetVon && n.bearbeitetVon !== userKey);

  // Nachtrag(antraege) :   ,   
  const offeneNachtraege = antraege.filter(a => a.status==="offen");

  // Anträge 배지 = 미읽은 Nachtragen 로그 + Schichtbörse 매칭 로그
  const antraegeUnread = Object.entries(notifications||{}).filter(([,n])=>
    (n.type==="nachtrag_log"||n.type==="schichtboerse_match") && !n.gelesen && MANAGERS.includes(n.zustaendig));
  const alarmCount = antraegeUnread.length;
  // Anträge 탭 진입 즉시 관련 로그를 읽음 처리 → 배지 0 (로그 자체는 계속 표시됨)
  useEffect(()=>{
    if(tab!=="antraege") return;
    const keys=antraegeUnread.map(([k])=>k);
    if(keys.length===0) return;
    setNotifications(prev=>{ const next={...(prev||{})}; keys.forEach(k=>{ next[k]={...(next[k]||{}),gelesen:true}; }); return next; });
    if(window._fbSet&&window._fbRef&&window._fbDb) keys.forEach(k=>window._fbSet(window._fbRef(window._fbDb,"notifications/"+k+"/gelesen"),true).catch(()=>{}));
  },[tab]);

  // Archiv ()
  const myArchiv = Object.entries(archiv||{})
    .filter(([,a]) => a.bearbeitetVon === userKey || a.zustaendig === userKey)
    .sort((a,b) => b[1].ts - a[1].ts);

  function markRead(key) {
    setNotifications(prev => ({ ...(prev||{}), [key]: { ...(prev[key]||{}), gelesen: true } }));
  }
  function deleteArchiv(key) {
    if (window._fbDb && window._fbRef && window._fbSet) {
      const { [key]: _, ...rest } = (archiv||{});
      window._fbSet(window._fbRef(window._fbDb, "archiv"), rest || {}).catch(e=>console.error(e));
    }
  }
  function addFreieSchicht() {
    if (!fsDate) return;
    setFreieSchichten(prev => [...(Array.isArray(prev)?prev:[]), {
      id: Date.now(), date: fsDate, filiale: fsFiliale, time: (fsTimeFrom&&fsTimeTo)?`${fsTimeFrom}-${fsTimeTo}`:fsTimeFrom||null, note: fsNote, besetzt: false
    }]);
    setFsTime(""); setFsNote("");
  }

  //    
  function handleTausch(notifKey, n, ok) {
    //      
    const antrag = (Array.isArray(tauschAntraege)?tauschAntraege:[]).find(a=>a.id===n.antragId);

    if (ok && antrag) {
      // schedule swap
      if (window._fbDb && window._fbRef && window._fbSet && window._fbOnValue) {
        window._fbOnValue(window._fbRef(window._fbDb, "schedule"), snap => {
          const raw = snap.val() ? JSON.parse(JSON.stringify(snap.val())) : {};
          // Firebase     
          const norm = (v) => !v ? [] : Array.isArray(v) ? v : Object.values(v);
          const sched = {};
          for (const [k,v] of Object.entries(raw)) sched[k] = norm(v);
          sched[antrag.initiator] = (sched[antrag.initiator]||[])
            .filter(s => (s.d||s.date) !== antrag.initiatorDate);
          sched[antrag.initiator] = [...(sched[antrag.initiator]||[]),
            {d: antrag.partnerDate, f: antrag.partnerFiliale, t: antrag.partnerTime||null, tauschMit: antrag.partner}];
          sched[antrag.partner] = (sched[antrag.partner]||[])
            .filter(s => (s.d||s.date) !== antrag.partnerDate);
          sched[antrag.partner] = [...(sched[antrag.partner]||[]),
            {d: antrag.initiatorDate, f: antrag.initiatorFiliale, t: antrag.initiatorTime||null, tauschMit: antrag.initiator}];
          window._fbSet(window._fbRef(window._fbDb, "schedule"), sched).catch(e=>console.error(e));
        }, {onlyOnce:true});
      }
      setTauschAntraege(prev=>(Array.isArray(prev)?prev:[]).map(a=>
        a.id===n.antragId?{...a,status:"getauscht",partnerBestaetigt:true}:a));
    }

    const entscheidung = ok ? "genehmigt" : "abgelehnt";
    //     bearbeitetVon 
    ["teddy","yeaji"].forEach(mgr => {
      const k = `${notifKey.replace(/_teddy$|_yeaji$/,"")}_${mgr}`;
      if (window._fbDb && window._fbRef && window._fbSet) {
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/bearbeitetVon`), userKey).catch(()=>{});
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/gelesen`), true).catch(()=>{});
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/entscheidung`), entscheidung).catch(()=>{});
      }
    });
    markRead(notifKey);

    // Archiv 
    if (window._fbDb && window._fbRef && window._fbSet) {
      window._fbSet(window._fbRef(window._fbDb, `archiv/${notifKey}`), {
        ...n, entscheidung, bearbeitetVon: userKey, archiviertTs: Date.now(), gelesen: true
      }).catch(e=>console.error(e));
    }
    // Antraege  
    setTab("antraege"); setATab("tausch");
  }

  function handleNachtragNotif(notifKey, n, ok) {
    setAntraege(prev=>prev.map(a=>a.id===n.antragId?{...a,status:ok?"genehmigt":"abgelehnt"}:a));
    // ✅ 승인 시 근무표/통계 소스(records)를 승인된 Nachtragen 시간으로 즉시 덮어쓴다.
    //    (이 경로에서 records를 갱신하지 않아 근무표에 강제퇴근 시간이 남던 버그 수정)
    if (ok) {
      overrideWithNachtrag({ a:{user:n.user, date:n.date, filiale:n.filiale, ein:n.ein, aus:n.aus, grund:n.grund||""}, setRecords });
    }
    const entscheidung = ok ? "genehmigt" : "abgelehnt";
    ["teddy","yeaji"].forEach(mgr => {
      const k = `nachtrag_${n.antragId}_${mgr}`;
      if (window._fbDb && window._fbRef && window._fbSet) {
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/bearbeitetVon`), userKey).catch(()=>{});
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/gelesen`), true).catch(()=>{});
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/entscheidung`), entscheidung).catch(()=>{});
      }
    });
    markRead(notifKey);
    // antraege   (  antraege  )
    if (n.antragId) {
      setAntraege(prev => {
        const list = Array.isArray(prev)?prev:[];
        if (!list.find(a=>a.id===n.antragId)) {
          return [...list, {id:n.antragId, user:n.user, date:n.date, filiale:n.filiale, ein:n.ein, aus:n.aus, grund:n.grund||"", status:ok?"genehmigt":"abgelehnt", typ:"nachtrag"}];
        }
        return list;
      });
    }
    if (window._fbDb && window._fbRef && window._fbSet) {
      window._fbSet(window._fbRef(window._fbDb, `archiv/${notifKey}`), {
        ...n, entscheidung, bearbeitetVon: userKey, archiviertTs: Date.now(), gelesen: true
      }).catch(e=>console.error(e));
    }
    // Antraege  
    setTab("antraege"); setATab("nachtrag");
  }

  function handleEinspringen(notifKey, n) {
    markRead(notifKey);
    ["teddy","yeaji"].forEach(mgr => {
      const k = `einspringen_${n.id||notifKey.split("_")[1]}_${mgr}`;
      if (window._fbDb && window._fbRef && window._fbSet) {
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/bearbeitetVon`), userKey).catch(()=>{});
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/gelesen`), true).catch(()=>{});
      }
    });
    if (window._fbDb && window._fbRef && window._fbSet) {
      window._fbSet(window._fbRef(window._fbDb, `archiv/${notifKey}`), {
        ...n, entscheidung: "zur_kenntnis", bearbeitetVon: userKey, archiviertTs: Date.now(), gelesen: true
      }).catch(e=>console.error(e));
    }
  }

  // Nachtrag   (notifications   antraege )
  function approveNachtrag(id, ok) {
    const target=(Array.isArray(antraege)?antraege:[]).find(a=>a.id===id);
    setAntraege(prev=>prev.map(a=>a.id===id?{...a,status:ok?"genehmigt":"abgelehnt"}:a));
    // ✅ 승인 시 records를 승인된 Nachtragen 시간으로 덮어써 근무표를 즉시 동기화
    if (ok && target) overrideWithNachtrag({ a:target, setRecords });
    // notifications  nachtrag  bearbeitetVon 
    ["teddy","yeaji"].forEach(mgr => {
      const k = `nachtrag_${id}_${mgr}`;
      if (window._fbDb && window._fbRef && window._fbSet) {
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/bearbeitetVon`), userKey).catch(()=>{});
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/gelesen`), true).catch(()=>{});
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/entscheidung`), ok?"genehmigt":"abgelehnt").catch(()=>{});
      }
    });
  }

  //  Alarm    
  function renderAlarmCard(key, n) {
    const isTausch    = n.type==="tausch_manager"||n.kategorie==="Schichttausch";
    const isEinspring = n.type==="einspringen"||n.kategorie==="Einspringen";
    const isNachtrag  = n.type==="nachtrag"||n.kategorie==="Nachtrag";
    const isPrufen    = n.type==="prüfen";

    const borderColor = isTausch?C.mint:isEinspring?C.mint:isNachtrag?C.yellow:C.yellow;

    return (
      <div key={key} style={{...S.card,marginBottom:10,border:`1.5px solid ${borderColor}`}}>
        {/* Schichttausch */}
        {isTausch && <>
          <div style={{fontSize:11,fontWeight:800,color:C.mintDark,marginBottom:6}}>{"🔄 Schichttausch · Partner bestätigt"}</div>
          <div style={{display:"flex",gap:6,marginBottom:8}}>
            <div style={{flex:1,padding:"7px 9px",borderRadius:8,background:C.bg,border:`1px solid ${C.border}`}}>
              <div style={{fontSize:9,color:C.muted}}>{n.initiator}</div>
              <div style={{fontSize:11,fontWeight:700,color:C.text}}>
                {new Date(n.initiatorDate).toLocaleDateString("de-DE",{day:"numeric",month:"numeric"})}
              </div>
              <div style={{fontSize:9,color:C.muted}}>{n.initiatorFiliale?.replace("TEEAMO ","")}</div>
            </div>
            <div style={{display:"flex",alignItems:"center",fontSize:16}}>{"⇄"}</div>
            <div style={{flex:1,padding:"7px 9px",borderRadius:8,background:C.bg,border:`1px solid ${C.border}`}}>
              <div style={{fontSize:9,color:C.muted}}>{n.partner}</div>
              <div style={{fontSize:11,fontWeight:700,color:C.text}}>
                {new Date(n.partnerDate).toLocaleDateString("de-DE",{day:"numeric",month:"numeric"})}
              </div>
              <div style={{fontSize:9,color:C.muted}}>{n.partnerFiliale?.replace("TEEAMO ","")}</div>
            </div>
          </div>
          <div style={{fontSize:9,color:C.mintDark,marginBottom:8}}>{"✅ Beide Mitarbeiter haben bestätigt."}</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>handleTausch(key,n,false)}
              style={{flex:1,padding:"9px",borderRadius:9,border:`1px solid ${C.border}`,background:"#fff",color:C.muted,fontWeight:700,fontSize:11,cursor:"pointer"}}>Ablehnen</button>
            <button onClick={()=>handleTausch(key,n,true)}
              style={{flex:2,padding:"9px",borderRadius:9,border:"none",background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,color:"#fff",fontWeight:800,fontSize:11,cursor:"pointer"}}>{"✅ Genehmigen"}</button>
          </div>
        </>}

        {/* Einspringen */}
        {isEinspring && <>
          <div style={{fontSize:11,fontWeight:800,color:C.mintDark,marginBottom:4}}>{"🙋 Einspringen · "}{n.user}</div>
          <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:2}}>
            {new Date(n.date).toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"})}
          </div>
          <div style={{fontSize:10,color:C.muted,marginBottom:10}}>{n.filiale}{n.time?` · ${n.time}`:""}</div>
          <button onClick={()=>handleEinspringen(key,n)}
            style={{width:"100%",padding:"9px",borderRadius:9,border:"none",background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,color:"#fff",fontWeight:800,fontSize:11,cursor:"pointer"}}>{"✓ Zur Kenntnis genommen"}</button>
        </>}

        {/* Nachtrag (via notification) */}
        {isNachtrag && <>
          <div style={{fontSize:11,fontWeight:800,color:C.yellow,marginBottom:4}}>{"🕐 Nachtrag · "}{n.user}</div>
          <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:2}}>
            {new Date(n.date).toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"})}
          </div>
          <div style={{fontSize:10,color:C.muted,marginBottom:2}}>{n.filiale} · {n.ein} – {n.aus}</div>
          <div style={{fontSize:11,color:C.text,background:C.bg,borderRadius:8,padding:"7px 9px",marginBottom:10}}>{"📌"}{n.grund}</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>handleNachtragNotif(key,n,false)}
              style={{flex:1,padding:"9px",borderRadius:9,border:`1px solid ${C.border}`,background:"#fff",color:C.muted,fontWeight:700,fontSize:11,cursor:"pointer"}}>Ablehnen</button>
            <button onClick={()=>handleNachtragNotif(key,n,true)}
              style={{flex:2,padding:"9px",borderRadius:9,border:"none",background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,color:"#fff",fontWeight:800,fontSize:11,cursor:"pointer"}}>{"✅ Genehmigen"}</button>
          </div>
        </>}

        {/* Prfen */}
        {isPrufen && <>
          <div style={{fontSize:11,fontWeight:800,color:C.yellow,marginBottom:4}}>{"⚠️ Stempelzeit prüfen · "}{n.user}</div>
          <div style={{fontSize:10,color:C.muted,marginBottom:2}}>{new Date(n.date).toLocaleDateString("de-DE")} · {n.filiale}</div>
          <div style={{fontSize:10,color:C.yellow,marginBottom:10}}>Geplant: {n.plannedTime} · Gearbeitet: {n.actualEin}–{n.actualAus}</div>
          <button onClick={()=>markRead(key)}
            style={{width:"100%",padding:"9px",borderRadius:9,border:`1px solid ${C.border}`,background:"#fff",color:C.muted,fontWeight:700,fontSize:11,cursor:"pointer"}}>{"✓ Zur Kenntnis"}</button>
        </>}
      </div>
    );
  }

  //  Erledigt  
  function renderErledigtCard(key, a) {
    const isOpen = erledigtExpanded[key];
    const label = a.kategorie || a.type || "Sonstige";
    const emojiMap = {Schichtabsage:"🚫",Schichttausch:"🔄",Einspringen:"⚡","Schichtbörse":"🔔",Nachtrag:"🕐"};
    const emoji = emojiMap[label] || "📌";
    const eColor = a.entscheidung==="genehmigt"?C.mintDark:a.entscheidung==="abgelehnt"?C.red:C.muted;
    const eLabel = a.entscheidung==="genehmigt"?"✅ Genehmigt":a.entscheidung==="abgelehnt"?"❌ Abgelehnt":"✓ Bestätigt";
    return (
      <div key={key} style={{...S.card,marginBottom:6,border:`1px solid ${C.border}`}}>
        <button onClick={()=>setErledigtExpanded(p=>({...p,[key]:!p[key]}))}
          style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",background:"none",border:"none",cursor:"pointer",padding:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:14}}>{emoji}</span>
            <div style={{textAlign:"left"}}>
              <div style={{fontSize:11,fontWeight:700,color:C.text}}>{label} · {a.user||a.initiator}</div>
              <div style={{fontSize:9,color:C.muted}}>{a.date?new Date(a.date).toLocaleDateString("de-DE"):(a.initiatorDate?new Date(a.initiatorDate).toLocaleDateString("de-DE"):"")}</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:7}}>
            <span style={{fontSize:9,fontWeight:700,color:eColor}}>{eLabel}</span>
            <span style={{fontSize:10,color:C.muted}}>{isOpen ? "A" : "V"}</span>
          </div>
        </button>
        {isOpen && (
          <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.border}`}}>
            {a.kategorie==="Schichtabsage"&&<>
              <div style={{fontSize:10,color:C.muted,marginBottom:2}}>{a.filiale}{a.time?` · ${a.time}`:""}</div>
              <div style={{fontSize:10,color:C.text,marginBottom:2}}>Grund: {a.grund}</div>
            </>}
            {a.kategorie==="Schichttausch"&&<>
              <div style={{fontSize:10,color:C.muted,marginBottom:2}}>
                {a.initiator} ({new Date(a.initiatorDate).toLocaleDateString("de-DE",{day:"numeric",month:"numeric"})}) ⇄ {a.partner} ({new Date(a.partnerDate).toLocaleDateString("de-DE",{day:"numeric",month:"numeric"})})
              </div>
            </>}
            {a.kategorie==="Nachtrag"&&<>
              <div style={{fontSize:10,color:C.muted,marginBottom:2}}>{a.filiale} · {a.ein} – {a.aus}</div>
              <div style={{fontSize:10,color:C.text,marginBottom:2}}>Grund: {a.grund}</div>
            </>}
            {a.kategorie==="Einspringen"&&<>
              <div style={{fontSize:10,color:C.muted,marginBottom:2}}>{a.filiale}{a.time?` · ${a.time}`:""}</div>
            </>}
            <div style={{fontSize:9,color:C.muted,marginTop:4}}>Bearbeitet: {safeUsers.find(u=>u.key===a.bearbeitetVon)?.vorname||a.bearbeitetVon}</div>
            <div style={{display:"flex",justifyContent:"flex-end",marginTop:8}}>
              <button onClick={()=>deleteArchiv(key)}
                style={{fontSize:9,color:C.red,border:`1px solid ${C.red}`,borderRadius:6,padding:"3px 8px",background:C.redLight,cursor:"pointer"}}>
                {"🗑 Löschen"}
              </button>
            </div>
          </div>
        )}
      </div>
    );
  }

  return(
    <div style={{background:C.bg,minHeight:"100vh",paddingBottom:80}}>
      {showMgrSettings&&(
        <SettingsView
          user={manager}
          users={users}
          setUsers={setUsers}
          userKey={userKey}
          onLogout={onLogout}
          onClose={()=>setShowMgrSettings(false)}
          isAdmin={true}
        />
      )}
      <div style={{...S.hdr,...(hybrid?{paddingTop:16,paddingBottom:18}:{})}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            {/* 🏬 현재 활성 지점 로고 + 지점명 */}
            <BranchBrandHeader branchId={branchIdOf(manager)} sub="Admin"/>
            <div style={{fontSize:20,fontWeight:800}}>Hallo, {manager?.vorname||"Manager"}!</div>
            <div style={{fontSize:11,opacity:.5,marginTop:1}}>Admin</div>
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
            <div style={{display:"flex",gap:6}}>
              {onSwitchToStaff&&(
                <button onClick={onSwitchToStaff}
                  style={{display:"flex",alignItems:"center",gap:5,background:"rgba(255,255,255,.18)",
                    border:"0.5px solid rgba(255,255,255,.3)",borderRadius:10,padding:"8px 12px",cursor:"pointer",
                    fontSize:12,fontWeight:800,color:"#fff",lineHeight:1,whiteSpace:"nowrap"}}>
                  {"🔁 Mitarbeiter-Modus"}
                </button>
              )}
              <button onClick={()=>setShowMgrSettings(true)}
                style={{background:"rgba(255,255,255,.12)",border:"0.5px solid rgba(255,255,255,.2)",borderRadius:10,padding:"8px",cursor:"pointer",fontSize:20,lineHeight:1}}>
                {"⚙️"}
              </button>
            </div>
            <button onClick={onLogout}
              style={{fontSize:10,background:"rgba(255,255,255,.08)",border:"0.5px solid rgba(255,255,255,.2)",color:"rgba(255,255,255,.65)",borderRadius:7,padding:"4px 10px",cursor:"pointer"}}>
              Abmelden
            </button>
          </div>
        </div>
        {/* Admin   */}
        {!manager?.infektionsschutz&&(
          <div style={{fontSize:10,color:"#ffb347",fontWeight:700,marginTop:8}}>
            {"⚠️ Bitte Bescheinigung von Infektionsschutzgesetz hochladen"}
          </div>

//  APP ROOT 
function App(){
  const [screen,setScreen]=useState("login");
  const [staffView,setStaffView]=useState(false); // 하이브리드 관리자: 직원 뷰로 전환 여부
  React.useEffect(()=>{ loadPinsFromFirebase(); },[]);
  const [userKey,setUserKey]=useState(null);
  const { getPin, setPin, initPins } = usePinStore();

  //   Firebase  
  const [users,    setUsers,    usersReady]    = useFirebase("users",    INIT_USERS);
  // 🆔 전역 헬퍼(addScheduleShift 등)가 uid를 조회할 수 있도록 최신 users를 노출
  useEffect(()=>{ try{ window._teeamoUsers = Array.isArray(users)?users:[]; }catch(e){} },[users]);
  const [records,  setRecords,  recordsReady]  = useFirebase("records",  INIT_RECORDS);
  const [antraege, setAntraege, antraegeReady] = useFirebase("antraege", INIT_ANTRAEGE);
  const [schedule, , scheduleReady] = useFirebase("schedule", {});
  const csvCtx = useDienstplanCSV();

  // 최신 값 참조용 ref (interval 클로저에서 stale 방지)
  const recordsRef  = useRef(records);  recordsRef.current  = records;
  const scheduleRef = useRef(schedule); scheduleRef.current = schedule;

  // 🧹 (1회성) 데이터베이스에 남은 6월 더미 records 정리
  useEffect(()=>{ cleanupJuneDummyRecords(); },[]);

  // 🌙 자정 자동 강제 퇴근 (Auto-Ausstempeln)
  //    · '근무 중(ein 있고 aus 없음)'이면서 날짜가 과거인 세션을 강제 종료.
  //    · 퇴근시각 = 근무표의 예정 종료시간(예: 20:00) — autoCheckoutAus() 참고.
  //      찾지 못할 때만 Fallback(출근+8h)이며, 절대 출근시각과 같아지지 않는다.
  //    ⚠️ schedule 로딩 완료(scheduleReady) 전에는 실행하지 않는다.
  //       (예정 종료시간을 못 읽어 퇴근시간이 '출근시간'으로 저장되던 버그 방지)
  // 🧟 유령 진행중 기록 자동 정리
  //   출근~퇴근 사이에 이름이 바뀌면 세션 ID가 어긋나 옛 진행중 기록이 남는다.
  //   → 같은 사람·날짜·지점에 '완료된 기록'이 있으면 그 유령 기록을 DB에서 제거한다.
  //     (표시 로직에서도 무시하지만, 데이터 자체를 정리해 두면 통계·CSV도 깨끗해진다)
  useEffect(()=>{
    if(!recordsReady) return;
    const arr = Array.isArray(records)?records:[];
    const ghosts = arr.filter(r=>{
      if(!r || !r.ein || (r.aus && r.aus!=="")) return false;
      if(r.typ==="nachtrag") return false;
      const siblings = arr.filter(x=>x && x!==r &&
        sameName(x.user, r.user) && x.date===r.date && sameFiliale(x.filiale, r.filiale));
      return siblings.some(x=>x.aus && x.aus!=="" && String(x.ein||"") >= String(r.ein||""));
    });
    if(ghosts.length===0) return;
    console.log("🧟 [유령 기록 정리] 이미 퇴근 처리된 진행중 기록 제거:", ghosts);
    setRecords(prev=>(Array.isArray(prev)?prev:[]).filter(r=>!ghosts.some(g=>g.id===r.id)));
    if(window._fbDb&&window._fbRef&&window._fbRemove){
      ghosts.forEach(g=>{ if(g.id!=null)
        window._fbRemove(window._fbRef(window._fbDb,"records/"+g.id)).catch(()=>{}); });
    }
  },[records, recordsReady]);

  useEffect(()=>{
    if(!recordsReady || !scheduleReady) return;
    const isStale = (r,td)=> r && r.ein && (r.aus===null||r.aus===undefined||r.aus==="") && r.typ!=="nachtrag" && r.date && r.date < td;
    function runAutoCheckout(){
      const td = today();
      const arr = Array.isArray(recordsRef.current)?recordsRef.current:[];
      if(!arr.some(r=>isStale(r,td))) return;   // 처리할 게 없으면 쓰기 생략
      setRecords(prev=>{
        const p=Array.isArray(prev)?prev:[];
        return p.map(r=>{
          if(isStale(r,td)){
            const { aus, viaPlan } = autoCheckoutAus(scheduleRef.current, r);
            return {...r, aus, isAutoCheckedOut:true,
              note:(r.note?r.note+" · ":"")+(viaPlan?"Auto-Ausstempeln (Planende)":"Auto-Ausstempeln (geschätzt)"),
              prüfen:false, frühGrund:""};
          }
          return r;
        });
      });
    }
    runAutoCheckout();
    const iv=setInterval(runAutoCheckout, 60*1000);
    return ()=>clearInterval(iv);
  },[recordsReady, scheduleReady]);

  // INIT_USERS PIN LS  1 
  useEffect(() => { if (usersReady) initPins(INIT_USERS); }, [usersReady]);

  //    :     
  useEffect(() => {
    if (!usersReady) return;
    const arr = Array.isArray(users) ? users : [];
    if (arr.length === 0) return;

    //   
    const roleMap = {
      "Mitarbeiterin":"Staff","Mitarbeiter":"Staff",
      "Chefin":"Admin","Chef":"Admin",
      "Manager":"Admin","Managerin":"Admin",
    };

    let changed = false;
    const migrated = arr.map(u => {
      const patch = {};
      // role 
      if (roleMap[u.role]) { patch.role = roleMap[u.role]; }
      //   
      if (u.infektionsschutz === undefined) patch.infektionsschutz = null;
      if (u.contractHours   === undefined) patch.contractHours   = 0;
      if (u.nachname        === undefined) patch.nachname        = "";
      if (u.emoji           === undefined) patch.emoji           = "";
      if (Object.keys(patch).length > 0) { changed = true; return {...u, ...patch}; }
      return u;
    });

    if (changed) {
      setUsers(migrated);
    }
  }, [usersReady]);

  const [splashDone, setSplashDone] = useState(false);
  useEffect(() => {
    const t = setTimeout(() => setSplashDone(true), 2000);
    return () => clearTimeout(t);
  }, []);
  const allReady = usersReady && recordsReady && splashDone;

  function handleLogin(key){
    const u=(Array.isArray(users)?users:[]).find(x=>x.key===key);
    const isAdmin=MANAGERS.includes(key)||(u&&u.isAdmin);
    // 🏬 진입할 지점 결정: 소속 지점이 접근 가능하면 그대로, 아니면 허용된 첫 지점
    const allowed = accessibleBranchIds(u);
    const branchId = allowed.indexOf(branchIdOf(u))>=0 ? branchIdOf(u) : allowed[0];
    setActiveBranchId(branchId);
    saveSession(key, branchId, isAdmin);          // 🔐 세션 저장 → 다음 실행 시 자동 로그인
    setUserKey(key);setStaffView(false);setScreen(isAdmin?"manager":"mitarbeiter");
  }
  function handleLogout(){
    clearSession();                                // 🔐 자동 로그인 해제
    setActiveBranchId(DEFAULT_BRANCH_ID);
    setUserKey(null);setStaffView(false);setScreen("login");
  }

  // 🔐 자동 로그인(Auto-Login)
  //   스플래시가 끝나고 users 데이터가 준비되면 저장된 세션을 검증한다.
  //   유저가 실제로 존재하고 해당 지점 접근 권한이 살아있을 때만 통과시키며,
  //   그렇지 않으면 세션을 폐기하고 평소처럼 로그인 화면을 띄운다.
  const autoLoginDone = React.useRef(false);
  useEffect(()=>{
    if(autoLoginDone.current || !usersReady) return;
    const sess = loadSession();
    if(!sess){ autoLoginDone.current = true; return; }
    const u = (Array.isArray(users)?users:[]).find(x=>x.key===sess.userKey);
    if(!u){ clearSession(); autoLoginDone.current = true; return; }   // 삭제된 계정
    const branchId = canAccessBranch(u, sess.branchId) ? sess.branchId : branchIdOf(u);
    if(!canAccessBranch(u, branchId)){ clearSession(); autoLoginDone.current = true; return; }
    autoLoginDone.current = true;
    setActiveBranchId(branchId);
    const isAdmin = MANAGERS.includes(u.key) || u.isAdmin;
    setUserKey(u.key); setStaffView(false); setScreen(isAdmin?"manager":"mitarbeiter");
  },[usersReady, users]);

  // users setUsers  Firebase   wrapper
  function setUsersFirebase(updater) {
    setUsers(updater);
  }

  if(!allReady) return(
    <div style={{maxWidth:500,margin:"0 auto",minHeight:"100vh",background:"#fff",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>

      {/* 🖼️ 브랜드 로고 — 원형 일러스트 PNG 한 장으로 교체
             (기존의 Münster 텍스트 / teeamo 워드마크 / 색상 문양 3개 /
              Love Tea and More / 장식용 원 테두리는 모두 이미지에 포함되어 제거됨) */}
      <div style={{
        display:"flex",alignItems:"center",justifyContent:"center",
        width:"min(88vw,420px)",height:"min(88vw,420px)",
        animation:"fadeIn .7s ease both",zIndex:1
      }}>
        <img
          src={BRAND_LOGO_SRC}
          alt="teeamo Münster — Love Tea and More"
          onError={e=>{ e.currentTarget.style.display="none";
                        const fb=e.currentTarget.nextSibling; if(fb) fb.style.display="block"; }}
          style={{
            width:"100%",height:"100%",
            objectFit:"contain",          // 비율 유지 (object-contain)
            display:"block",
            userSelect:"none",
            WebkitUserDrag:"none"
          }}
        />
        {/* 이미지 로드 실패 시에만 노출되는 최소 대체 표기 */}
        <div style={{display:"none",fontSize:"min(15vw,64px)",fontWeight:900,
          color:"#1a1a1a",letterSpacing:"-.02em"}}>teeamo</div>
      </div>

      {/*    */}
      <div style={{position:"absolute",bottom:48,display:"flex",gap:8}}>
        {[0,1,2].map(i=>(
          <div key={i} style={{
            width:6,height:6,borderRadius:"50%",
            background:"#ccc",
            animation:"pulse 1.2s ease-in-out "+i*0.22+"s infinite"
          }}/>
        ))}
      </div>
    </div>
  );

  return(
    <div style={{maxWidth:500,margin:"0 auto",minHeight:"100vh",background:C.bg}}>
      {screen==="login"&&<LoginView onLogin={handleLogin} users={users} setUsers={setUsersFirebase} getPin={getPin} setPin={setPin} csvCtx={csvCtx}/>}
      {screen==="mitarbeiter"&&<MitarbeiterView userKey={userKey} users={users} setUsers={setUsersFirebase} records={records} setRecords={setRecords} antraege={antraege} setAntraege={setAntraege} onLogout={handleLogout} csvCtx={csvCtx}/>}
      {screen==="manager"&&(
        <div>
          {/* 🔁 상단 고정 모드 전환 탭 (하이브리드 관리자) */}
          <div style={{position:"sticky",top:0,zIndex:300,background:"#0f1f2a",
            padding:"8px 10px calc(8px + env(safe-area-inset-top,0px))",paddingTop:"max(8px,env(safe-area-inset-top))"}}>
            <div style={{display:"flex",background:"rgba(255,255,255,.10)",borderRadius:10,padding:3,maxWidth:420,margin:"0 auto"}}>
              {[{id:false,l:"👑 Admin-Modus"},{id:true,l:"👤 Mitarbeiter-Modus"}].map(o=>(
                <button key={String(o.id)} onClick={()=>setStaffView(o.id)}
                  style={{flex:1,padding:"9px 6px",border:"none",borderRadius:8,cursor:"pointer",
                    fontSize:12,fontWeight:800,transition:"all .15s",
                    background:staffView===o.id?"#fff":"transparent",
                    color:staffView===o.id?"#0f1f2a":"rgba(255,255,255,.75)"}}>
                  {o.l}
                </button>
              ))}
            </div>
          </div>
          {!staffView
            ? <ManagerView records={records} setRecords={setRecords} antraege={antraege} setAntraege={setAntraege} onLogout={handleLogout} userKey={userKey} users={users} setUsers={setUsersFirebase} csvCtx={csvCtx} hybrid={true}/>
            : <MitarbeiterView userKey={userKey} users={users} setUsers={setUsersFirebase} records={records} setRecords={setRecords} antraege={antraege} setAntraege={setAntraege} onLogout={handleLogout} csvCtx={csvCtx} hybridStaff={true}/>}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
