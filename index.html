//  CLOCK MODAL 
function ClockModal({modal,now,selFiliale,clockFiliale,clockInTime,CLOCK_KEY,onClose,onEin,onAus}){
  const isEin = modal==="ein";
  const nowStr = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const [manualMode, setManualMode] = useState(false);
  const [manualTime, setManualTime] = useState(nowStr);

  const ausInvalid = !isEin && manualMode && clockInTime && (()=>{
    const [ah,am] = manualTime.split(":").map(Number);
    return (ah*60+am) - (clockInTime.getHours()*60+clockInTime.getMinutes()) <= 0;
  })();

  function doEin(){
    const t = manualMode ? manualTime : nowStr;
    const [h,m] = t.split(":").map(Number);
    const d = new Date(); d.setHours(h,m,0,0);
    onEin(d);
  }
  function doAus(){
    if(ausInvalid) return;
    const t = manualMode ? manualTime : nowStr;
    const inStr = `${pad(clockInTime.getHours())}:${pad(clockInTime.getMinutes())}`;
    onAus(inStr, t);
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(20,20,20,.55)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200}}>
      <div style={{background:C.card,borderRadius:"22px 22px 0 0",width:"100%",maxWidth:500,padding:"24px 22px 32px",paddingBottom:"max(32px,env(safe-area-inset-bottom))"}}>
        <div style={{width:36,height:4,background:C.border,borderRadius:99,margin:"0 auto 20px"}}/>
        <div style={{fontSize:16,fontWeight:800,color:C.text,marginBottom:4}}>
          {isEin?"Einstempeln bestätigen":"Ausstempeln bestätigen"}
        </div>
        <div style={{fontSize:12,color:C.muted,marginBottom:14}}>
          Filiale: <strong style={{color:C.text}}>{isEin?selFiliale:clockFiliale}</strong>
        </div>

        <div style={{marginBottom:16}}>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <button onClick={()=>setManualMode(false)}
              style={{flex:1,padding:"9px",borderRadius:9,fontSize:12,fontWeight:700,cursor:"pointer",
                border:`2px solid ${!manualMode?C.mint:C.border}`,
                background:!manualMode?C.mintLight:"#fff",
                color:!manualMode?C.mintDark:C.muted}}>
              {"🕐 Jetzt"}
            </button>
            <button onClick={()=>setManualMode(true)}
              style={{flex:1,padding:"9px",borderRadius:9,fontSize:12,fontWeight:700,cursor:"pointer",
                border:`2px solid ${manualMode?C.yellow:C.border}`,
                background:manualMode?C.yellowLight:"#fff",
                color:manualMode?C.yellow:C.muted}}>
              {"✏️ Zeit eingeben"}
            </button>
          </div>
          {manualMode&&(
            <div style={{background:C.yellowLight,borderRadius:10,padding:"12px 14px",border:`1.5px solid ${ausInvalid?C.red:C.yellow}`}}>
              <div style={{fontSize:10,fontWeight:700,color:C.yellow,marginBottom:6}}>
                {isEin?"Tatsächliche Einstempelzeit":"Tatsächliche Ausstempelzeit"}
              </div>
              <TimeInput value={manualTime} onChange={setManualTime}
                style={{...S.input,width:"80%",display:"block",margin:"0 auto",fontSize:20,fontWeight:700,textAlign:"center",borderColor:ausInvalid?C.red:C.yellow}}/>
              {!isEin&&clockInTime&&(()=>{
                const [ah,am]=manualTime.split(":").map(Number);
                const diff=(ah*60+am)-(clockInTime.getHours()*60+clockInTime.getMinutes());
                if(diff<=0) return(
                  <div style={{fontSize:11,color:C.red,fontWeight:700,marginTop:7,textAlign:"center"}}>
                    <>{"⚠ Die Zeit liegt vor der Einstempelzeit ("}{pad(clockInTime.getHours())}:{pad(clockInTime.getMinutes())}{"  Uhr)"}</>
                  </div>
                );
                return(
                  <div style={{fontSize:11,color:"#3a7a55",fontWeight:700,marginTop:7,textAlign:"center"}}>
                    <>{"⏱ "}{Math.floor(diff/60)}{"h "}{diff%60}{"min Arbeitszeit"}</>
                  </div>
                );
              })()}
              {isEin&&(()=>{
                const [ah,am]=manualTime.split(":").map(Number);
                const diff=(now.getHours()*60+now.getMinutes())-(ah*60+am);
                if(diff<=0) return null;
                return(
                  <div style={{fontSize:11,color:C.yellow,fontWeight:700,marginTop:7,textAlign:"center"}}>
                    <>{"⏱ "}{Math.floor(diff/60)}{"h "}{diff%60}{"min bereits vergangen"}</>
                  </div>
                );
              })()}
            </div>
          )}
        </div>

        <div style={{display:"flex",gap:9}}>
          <button onClick={onClose} style={{flex:1,padding:"12px",borderRadius:11,border:`1.5px solid ${C.border}`,background:C.card,color:C.muted,fontWeight:700,fontSize:13,cursor:"pointer"}}>Abbrechen</button>
          <button onClick={isEin?doEin:doAus} disabled={!!ausInvalid}
            style={{flex:2,padding:"12px",borderRadius:11,border:"none",
              background:ausInvalid?"#ccc":isEin?`linear-gradient(135deg,${C.mint},${C.mintDark})`:`linear-gradient(135deg,${C.red},#A8432E)`,
              color:"#fff",fontWeight:800,fontSize:14,cursor:ausInvalid?"not-allowed":"pointer",opacity:ausInvalid?0.6:1}}>
            {isEin?"Einstempeln":"Ausstempeln"}
          </button>
        </div>
      </div>
    </div>
  );
}


//  SETTINGS VIEW () 
function SettingsView({ user, users, setUsers, userKey, onLogout, onClose, isAdmin }) {
  if (!user) return null;
  const [vorname, setVorname] = useState(user.vorname || "");
  const [saveMsg, setSaveMsg] = useState("");
  const [deleteConfirm, setDeleteConfirm] = useState(false);
  const [impfDoc, setImpfDoc] = useState(user.infektionsschutz || null);
  const [impfViewer, setImpfViewer] = useState(false);
  const fileRef = useRef(null);
  const { getPin, setPin: savePinFn } = usePinStore();
  const [showPinChange, setShowPinChange] = useState(false);
  const [oldPin, setOldPin] = useState("");
  const [newPin1, setNewPin1] = useState("");
  const [newPin2, setNewPin2] = useState("");
  const [pinMsg, setPinMsg] = useState("");
  // 🧹 Dienstplan(스케줄) 전체 초기화 (관리자 전용)
  const [resetting, setResetting] = useState(false);
  const [resetMsg, setResetMsg] = useState("");
  // 🧹 선택형 리셋: 계정은 기본 '체크 해제'(보존)
  const [resetSel, setResetSel] = useState({ accounts:false, records:false, schedule:false });
  // 임시 계정 매칭 (Zuweisen)
  const [schedForMatch] = useFirebase("schedule", {});
  const [zuweisenSel, setZuweisenSel] = useState({});
  const [zuweisenMsg, setZuweisenMsg] = useState("");

  // 모든 운영 데이터를 삭제해 완전한 백지 상태로 초기화 (계정/PIN은 유지)
  // ═══════════════════════════════════════════════════════════
  //  🧹 체크박스 선택형 정밀 데이터 리셋
  //   · accounts : users(계정) + PIN(비밀번호)  ← 기본 체크 해제
  //   · records  : 실제 출퇴근 기록 + Nachtragen/신청/알림
  //   · schedule : 근무표 / 스케줄 / Schichtbörse / 계획표 이미지
  //   ⚠️ accounts를 체크하지 않으면 users·PIN은 절대 건드리지 않는다.
  // ═══════════════════════════════════════════════════════════
  function monthSuffixes(){
    const yr=new Date().getFullYear(); const out=[];
    for(let y=yr-1;y<=yr+2;y++) for(let m=1;m<=12;m++) out.push(y+"_"+String(m).padStart(2,"0"));
    return out;
  }
  const RESET_GROUPS = {
    accounts: {
      lbl:"직원 계정 및 비밀번호",
      sub:"users · PIN (Anmeldedaten)",
      paths:()=>["users"],
    },
    records: {
      lbl:"실제 출퇴근 기록",
      sub:"Stempelzeiten · Nachtragen · Anträge · Benachrichtigungen",
      paths:()=>["records","antraege","notifications","absagen","archiv"],
    },
    schedule: {
      lbl:"스케줄표",
      sub:"Dienstpläne · Schichtbörse · Planbilder",
      paths:()=>["schedule","planImage","freieSchichten","schichttausch",
        ...monthSuffixes().map(m=>"schedule_"+m),
        ...monthSuffixes().map(m=>"planImage_"+m)],
    },
  };

  async function runSelectiveReset(){
    const chosen = Object.keys(RESET_GROUPS).filter(k=>resetSel[k]);
    if(chosen.length===0){ setResetMsg("❌ Bitte mindestens eine Kategorie auswählen."); return; }
    if(!(window._fbDb&&window._fbRef&&window._fbRemove)){ setResetMsg("❌ Keine Verbindung zur Datenbank."); return; }
    // 🔐 최종 확인
    if(!window.confirm("선택한 데이터 범주가 영구히 삭제됩니다. 정말 진행하시겠습니까?\n\n· "
      + chosen.map(k=>RESET_GROUPS[k].lbl).join("\n· ")
      + (resetSel.accounts ? "" : "\n\n✅ 직원 계정 및 비밀번호는 보존됩니다."))) return;

    setResetting(true); setResetMsg("");
    try{
      // 선택된 그룹의 경로만 수집 (중복 제거)
      const paths=[...new Set(chosen.flatMap(k=>RESET_GROUPS[k].paths()))];
      // 🛡️ 방어: accounts 미선택 시 users 경로가 섞여 들어가는 것을 원천 차단
      const safePaths = resetSel.accounts ? paths : paths.filter(pth=>pth!=="users");
      await Promise.all(safePaths.map(pth=>
        window._fbRemove(window._fbRef(window._fbDb,pth)).catch(()=>{})));

      // localStorage 정리 (선택 범주에 해당하는 것만)
      try{
        if(resetSel.schedule){
          localStorage.removeItem("teeamo_schicht_draft_v2");
          localStorage.removeItem("teeamo_schicht_draft");
        }
        if(resetSel.records){
          Object.keys(localStorage).forEach(k=>{
            if(k.indexOf("teeamo_clock_")===0 || k.indexOf("teeamo_autoout_ack_")===0)
              localStorage.removeItem(k);
          });
        }
        if(resetSel.accounts){
          // PIN(비밀번호)은 계정 삭제를 선택했을 때만 함께 제거
          Object.keys(localStorage).forEach(k=>{
            if(k.indexOf("teeamo_pin")===0) localStorage.removeItem(k);
          });
        }
      }catch{}

      setResetMsg("✅ "+chosen.length+" Kategorie(n) gelöscht"
        +(resetSel.accounts?"":" · Konten & PINs bleiben erhalten")+". App wird neu geladen…");
      setTimeout(()=>{ try{ window.location.reload(); }catch{} }, 1500);
    }catch(e){
      setResetting(false);
      setResetMsg("❌ Fehler: "+(e.message||e));
    }
  }

  function changePIN() {
    const current = getPin(userKey);
    if (oldPin !== current) { setPinMsg("Aktuelle PIN falsch."); return; }
    if (!/^[0-9]{4}$/.test(newPin1)) { setPinMsg("PIN muss 4 Ziffern sein."); return; }
    if (newPin1 !== newPin2) { setPinMsg("PINs stimmen nicht überein."); return; }
    savePinFn(userKey, newPin1);
    setPinMsg("PIN geändert!");
    setOldPin(""); setNewPin1(""); setNewPin2("");
    setTimeout(() => { setPinMsg(""); setShowPinChange(false); }, 2000);
  }

  function saveName() {
    if (!vorname.trim()) return;
    setUsers(prev => (Array.isArray(prev)?prev:[]).map(u =>
      u.key === userKey ? { ...u, vorname: vorname.trim() } : u
    ));
    setSaveMsg("✅ Gespeichert!");
    setTimeout(() => setSaveMsg(""), 2000);
  }

  async function handleImpfUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) {
      setSaveMsg("❌ Datei zu groß (max. 10MB)");
      return;
    }
    const b64 = await new Promise(res => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.readAsDataURL(file);
    });
    setImpfDoc(b64);
    setUsers(prev => (Array.isArray(prev)?prev:[]).map(u =>
      u.key === userKey ? { ...u, infektionsschutz: b64 } : u
    ));
    setSaveMsg("✅ Bescheinigung hochgeladen!");
    setTimeout(() => setSaveMsg(""), 2500);
  }

  function deleteAccount() {
    const me = (Array.isArray(users)?users:[]).find(u=>u.key===userKey);
    deleteUserData(userKey, me?.vorname);
    setUsers(prev => (Array.isArray(prev)?prev:[]).filter(u => u.key !== userKey));
    onLogout();
  }

  const isPdf = impfDoc && impfDoc.startsWith("data:application/pdf");

  return (
    <div style={{position:"fixed",inset:0,background:C.bg,zIndex:500,overflowY:"auto"}}>
      {/*    */}
      {impfViewer && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.92)",zIndex:600,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <button onClick={()=>setImpfViewer(false)}
            style={{position:"absolute",top:20,right:20,background:"rgba(255,255,255,.15)",border:"none",borderRadius:10,padding:"8px 14px",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>
            {"✕ Schließen"}
          </button>
          {isPdf ? (
            <iframe src={impfDoc} style={{width:"92vw",height:"82vh",borderRadius:12,border:"none"}}/>
          ) : (
            <img src={impfDoc} alt="Bescheinigung" style={{maxWidth:"92vw",maxHeight:"82vh",borderRadius:12,objectFit:"contain"}}/>
          )}
        </div>
      )}

      {/*  */}
      <div style={{...S.hdr,paddingBottom:20}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button onClick={onClose}
            style={{background:"rgba(255,255,255,.12)",border:"none",borderRadius:10,padding:"7px 12px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>
            {"← Zurück"}
          </button>
          <div>
            <div style={{fontSize:18,fontWeight:800}}>Einstellungen</div>
            <div style={{fontSize:11,opacity:.45}}>{user.vorname}</div>
          </div>
        </div>
      </div>

      <div style={{padding:"16px"}}>

        {/*    */}
        <div style={{...S.card,marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:800,color:C.text,marginBottom:10}}>{"✏️ Name ändern"}</div>
          <div style={{fontSize:9,color:C.muted,marginBottom:6}}>
            Tipp: Emoji erlaubt! z.B. <strong>{"Lena 🍓"}</strong> oder <strong>{"Alex 🐻"}</strong>
          </div>
          <input value={vorname} onChange={e=>setVorname(e.target.value)}
            placeholder="Vorname (mit Emoji)"
            style={{...S.input,fontSize:15,marginBottom:10}}/>
          {vorname&&<div style={{fontSize:11,color:C.mintDark,marginBottom:10}}>Vorschau: Hallo, {vorname}!</div>}
          <div style={{fontSize:9,color:C.muted,marginBottom:10}}>
            {"ℹ️ Der Name kann jederzeit hier geändert werden."}
          </div>
          <button onClick={saveName}
            style={{width:"100%",padding:"10px",borderRadius:9,border:"none",
              background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,
              color:"#fff",fontWeight:800,fontSize:12,cursor:"pointer"}}>
            Speichern
          </button>
          {saveMsg&&<div style={{fontSize:11,color:C.mintDark,marginTop:8,fontWeight:600,textAlign:"center"}}>{saveMsg}</div>}
        </div>

        {/* PIN */}
        <div style={{...S.card,marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:800,color:C.text,marginBottom:8}}>{"🔑 PIN ändern"}</div>
          {!showPinChange ? (
            <button onClick={()=>setShowPinChange(true)}
              style={{width:"100%",padding:"9px",borderRadius:9,border:`1px solid ${C.border}`,background:"#fff",color:C.text,fontWeight:700,fontSize:12,cursor:"pointer"}}>
              PIN ändern
            </button>
          ) : (
            <div>
              {[
                {label:"Aktuelle PIN",val:oldPin,set:setOldPin},
                {label:"Neue PIN",val:newPin1,set:setNewPin1},
                {label:"Neue PIN bestätigen",val:newPin2,set:setNewPin2},
              ].map(({label,val,set})=>(
                <div key={label} style={{marginBottom:8}}>
                  <div style={{fontSize:10,color:C.muted,marginBottom:3}}>{label}</div>
                  <input type="password" maxLength={4} value={val} onChange={e=>set(e.target.value)}
                    placeholder="••••"
                    style={{...S.input,textAlign:"center",fontSize:18,letterSpacing:6,width:"100%"}}/>
                </div>
              ))}
              <div style={{display:"flex",gap:8,marginTop:4}}>
                <button onClick={()=>{setShowPinChange(false);setOldPin("");setNewPin1("");setNewPin2("");setPinMsg("");}}
                  style={{flex:1,padding:"9px",borderRadius:9,border:`1px solid ${C.border}`,background:"#fff",color:C.muted,fontWeight:700,fontSize:11,cursor:"pointer"}}>
                  Abbrechen
                </button>
                <button onClick={changePIN}
                  style={{flex:2,padding:"9px",borderRadius:9,border:"none",background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,color:"#fff",fontWeight:800,fontSize:11,cursor:"pointer"}}>
                  PIN speichern
                </button>
              </div>
              {pinMsg&&<div style={{fontSize:11,color:pinMsg.includes("geändert")?C.mintDark:C.red,marginTop:8,textAlign:"center",fontWeight:600}}>{pinMsg}</div>}
            </div>
          )}
        </div>

        {/*     */}
        <div style={{...S.card,marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:800,color:C.text,marginBottom:4}}>{"🛡️ Bescheinigung von Infektionsschutzgesetz"}</div>
          <div style={{fontSize:10,color:C.muted,marginBottom:12}}>
            Wird bei Hygienekontrollen direkt auf dem Handy vorgezeigt.
          </div>

          {impfDoc ? (
            <div>
              {/*      */}
              <button onClick={()=>setImpfViewer(true)}
                style={{width:"100%",padding:"18px",borderRadius:12,border:`2px solid ${C.mint}`,
                  background:C.mintLight,cursor:"pointer",display:"flex",flexDirection:"column",
                  alignItems:"center",gap:6,marginBottom:10}}>
                <span style={{fontSize:32}}>{"🛡️"}</span>
                <span style={{fontSize:13,fontWeight:800,color:C.mintDark}}>Bescheinigung anzeigen</span>
                <span style={{fontSize:10,color:C.muted}}>{"Tippen zum Vergrößern · "}{isPdf?"PDF":"Bild"}</span>
              </button>
              <input type="file" accept="image/*,application/pdf" ref={fileRef}
                style={{display:"none"}} onChange={handleImpfUpload}/>
              <button onClick={()=>fileRef.current.click()}
                style={{width:"100%",padding:"9px",borderRadius:9,border:`1px solid ${C.border}`,
                  background:"#fff",color:C.muted,fontWeight:700,fontSize:11,cursor:"pointer"}}>
                 Ersetzen / Aktualisieren
              </button>
            </div>
          ) : (
            <div>
              {/*     */}
              <div style={{padding:"16px",borderRadius:10,border:`2px dashed ${C.red}`,background:C.redLight,
                textAlign:"center",marginBottom:10}}>
                <div style={{fontSize:24,marginBottom:4}}>{"⚠️"}</div>
                <div style={{fontSize:11,fontWeight:700,color:C.red,marginBottom:2}}>
                  Noch nicht hochgeladen
                </div>
                <div style={{fontSize:9,color:C.muted}}>
                  Bitte Bescheinigung hochladen
                </div>
              </div>
              <input type="file" accept="image/*,application/pdf" ref={fileRef}
                style={{display:"none"}} onChange={handleImpfUpload}/>
              <button onClick={()=>fileRef.current.click()}
                style={{width:"100%",padding:"12px",borderRadius:9,border:"none",
                  background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,
                  color:"#fff",fontWeight:800,fontSize:12,cursor:"pointer"}}>
                 Bescheinigung hochladen
              </button>
            </div>
          )}
        </div>

        {/* 🔗 임시 계정 매칭 (Zuweisen) — 관리자 전용 */}
        {isAdmin && (()=>{
          const registered = new Set((Array.isArray(users)?users:[]).map(u=>(u.vorname||"").toLowerCase()));
          const tempNames = Object.keys(schedForMatch||{})
            .filter(n=>n && !registered.has(n.toLowerCase()) && !MANAGERS.includes(n.toLowerCase()));
          const realEmps = (Array.isArray(users)?users:[]).filter(u=>!MANAGERS.includes(u.key)).sort(byName);
          return(
            <div style={{...S.card,marginBottom:12,border:`1px solid ${C.mint}`}}>
              <div style={{fontSize:12,fontWeight:800,color:C.mintDark,marginBottom:4}}>{"🔗 Temp-Konto zuweisen"}</div>
              <div style={{fontSize:10,color:C.muted,marginBottom:10,lineHeight:1.5}}>
                {"Im Dienstplan angelegte Temp-Namen (ohne echtes Konto) einem registrierten Konto zuordnen. Alle Schichten & Stempelzeiten werden übertragen."}
              </div>
              {zuweisenMsg&&<div style={{fontSize:11,fontWeight:700,color:C.mintDark,marginBottom:8}}>{zuweisenMsg}</div>}
              {tempNames.length===0 ? (
                <div style={{fontSize:11,color:C.muted,textAlign:"center",padding:"10px 0"}}>Keine offenen Temp-Namen.</div>
              ) : tempNames.map(tn=>(
                <div key={tn} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <div style={{flex:"0 0 auto",fontSize:12,fontWeight:800,color:C.text,minWidth:70,
                    background:C.yellowLight,color:"#92400e",padding:"6px 8px",borderRadius:8}}>{tn}</div>
                  <span style={{color:C.muted,flexShrink:0}}>{"→"}</span>
                  <select value={zuweisenSel[tn]||""} onChange={e=>setZuweisenSel(prev=>({...prev,[tn]:e.target.value}))}
                    style={{...S.input,flex:1,minWidth:0,fontSize:12,padding:"7px 8px",boxSizing:"border-box"}}>
                    <option value="">{"— Konto —"}</option>
                    {realEmps.map(u=><option key={u.key} value={u.vorname}>{u.vorname}{u.nachname?" "+u.nachname:""}</option>)}
                  </select>
                  <button onClick={async()=>{
                    const real=zuweisenSel[tn];
                    if(!real) return;
                    await reassignTempName(tn, real);
                    setZuweisenMsg("✅ „"+tn+"“ → „"+real+"“ zugewiesen.");
                    setZuweisenSel(prev=>{ const n={...prev}; delete n[tn]; return n; });
                    setTimeout(()=>setZuweisenMsg(""),3000);
                  }} disabled={!zuweisenSel[tn]}
                    style={{flexShrink:0,padding:"7px 10px",borderRadius:8,border:"none",fontSize:11,fontWeight:800,cursor:zuweisenSel[tn]?"pointer":"not-allowed",
                      background:zuweisenSel[tn]?C.mintDark:C.border,color:"#fff"}}>{"Zuweisen"}</button>
                </div>
              ))}
            </div>
          );
        })()}

        {/* 🧹 Dienstplan 초기화 (관리자 전용) */}
        {isAdmin && (
          <div style={{...S.card,marginBottom:12,border:`1px solid ${C.red}`}}>
            <div style={{fontSize:12,fontWeight:800,color:C.red,marginBottom:6}}>{"🧹 Daten zurücksetzen"}</div>
            <div style={{fontSize:10,color:C.muted,marginBottom:10,lineHeight:1.55}}>
              {"Nur die ausgewählten Kategorien werden gelöscht. Ohne Häkchen bei „직원 계정 및 비밀번호“ bleiben alle Konten und PINs vollständig erhalten. Diese Aktion kann NICHT rückgängig gemacht werden."}
            </div>
            {resetMsg && (
              <div style={{fontSize:11,fontWeight:700,marginBottom:10,
                color:resetMsg.startsWith("✅")?C.mintDark:C.red}}>{resetMsg}</div>
            )}
            {/* ☑️ 삭제할 범주 선택 (중복 선택 가능) */}
            <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:12}}>
              {Object.entries(RESET_GROUPS).map(([key,g])=>{
                const on=!!resetSel[key];
                const danger = key==="accounts";
                return (
                  <label key={key}
                    style={{display:"flex",alignItems:"flex-start",gap:9,cursor:"pointer",
                      padding:"10px 11px",borderRadius:10,
                      border:`1.5px solid ${on?(danger?C.red:C.mintDark):C.border}`,
                      background:on?(danger?C.redLight:C.mintLight):"#fff"}}>
                    <input type="checkbox" checked={on}
                      onChange={e=>setResetSel(prev=>({...prev,[key]:e.target.checked}))}
                      style={{marginTop:2,width:16,height:16,accentColor:danger?C.red:C.mintDark,cursor:"pointer"}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:11,fontWeight:800,color:danger&&on?C.red:C.text}}>
                        {g.lbl}{danger&&<span style={{marginLeft:5,fontSize:9,fontWeight:700,color:C.red}}>{"⚠️ Vorsicht"}</span>}
                      </div>
                      <div style={{fontSize:9,color:C.muted,marginTop:2}}>{g.sub}</div>
                    </div>
                  </label>
                );
              })}
            </div>
            {/* 🛡️ 계정 보존 안내 */}
            {!resetSel.accounts&&(
              <div style={{fontSize:10,color:C.mintDark,fontWeight:700,background:C.mintLight,
                borderRadius:9,padding:"8px 10px",marginBottom:10}}>
                {"🛡️ 직원 계정 및 비밀번호는 삭제되지 않고 100% 보존됩니다."}
              </div>
            )}
            <button onClick={runSelectiveReset}
              disabled={resetting||!Object.values(resetSel).some(Boolean)}
              style={{width:"100%",padding:"11px",borderRadius:9,border:"none",
                background:Object.values(resetSel).some(Boolean)
                  ? `linear-gradient(135deg,${C.red},#A8432E)` : "#e5e5e5",
                color:Object.values(resetSel).some(Boolean)?"#fff":C.muted,
                fontWeight:800,fontSize:12,
                cursor:(resetting||!Object.values(resetSel).some(Boolean))?"not-allowed":"pointer",
                opacity:resetting?0.7:1}}>
              {resetting?"⏳ Löschen…":"선택 항목 삭제"}
            </button>
          </div>
        )}

        {/*    */}
        <div style={{...S.card,marginBottom:12,border:`1px solid ${C.redLight}`}}>
          <div style={{fontSize:12,fontWeight:800,color:C.red,marginBottom:6}}>{"🗑 Konto löschen"}</div>
          <div style={{fontSize:10,color:C.muted,marginBottom:10}}>
            Diese Aktion kann nicht rückgängig gemacht werden.
          </div>
          {!deleteConfirm ? (
            <button onClick={()=>setDeleteConfirm(true)}
              style={{width:"100%",padding:"10px",borderRadius:9,border:`1.5px solid ${C.red}`,
                background:C.redLight,color:C.red,fontWeight:800,fontSize:12,cursor:"pointer"}}>
              Konto löschen
            </button>
          ) : (
            <div>
              <div style={{fontSize:11,color:C.red,fontWeight:700,marginBottom:10,textAlign:"center"}}>
                Wirklich löschen? Diese Aktion ist endgültig.
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setDeleteConfirm(false)}
                  style={{flex:1,padding:"10px",borderRadius:9,border:`1px solid ${C.border}`,
                    background:"#fff",color:C.muted,fontWeight:700,fontSize:11,cursor:"pointer"}}>
                  Abbrechen
                </button>
                <button onClick={deleteAccount}
                  style={{flex:1,padding:"10px",borderRadius:9,border:"none",
                    background:`linear-gradient(135deg,${C.red},#A8432E)`,
                    color:"#fff",fontWeight:800,fontSize:11,cursor:"pointer"}}>
                  Ja, löschen
                </button>
              </div>
            </div>
          )}
        </div>

        {/*  */}
        <div style={{marginBottom:30}}>
          <button onClick={onLogout}
            style={{width:"100%",padding:"12px",borderRadius:11,border:`1.5px solid ${C.border}`,
              background:"#fff",color:C.muted,fontWeight:700,fontSize:13,cursor:"pointer",marginBottom:6}}>
            Abmelden
          </button>
          <div style={{fontSize:9,color:C.muted,textAlign:"center",lineHeight:1.5}}>
            {"ℹ️ Aktive Schichten bleiben bis zum Ausstempeln gespeichert."}
          </div>
        </div>

      </div>
    </div>
  );
}

//  MITARBEITER 
function MitarbeiterView({userKey,users,setUsers,records,setRecords,antraege,setAntraege,onLogout,csvCtx,onSwitchToAdmin,hybridStaff}){
  const user=(Array.isArray(users)?users:[]).find(u=>u.key===userKey);
  const now=useNow();
  const [tab,setTab]=useState("home");

  //    localStorage  
  const CLOCK_KEY = `teeamo_clock_${userKey}`;
  const [clockedIn,setClockedIn]=useState(()=>{
    try { const s=localStorage.getItem(CLOCK_KEY); return s?JSON.parse(s).clockedIn:false; } catch{return false;}
  });
  const [clockInTime,setClockInTime]=useState(()=>{
    try { const s=localStorage.getItem(CLOCK_KEY); const v=s?JSON.parse(s).clockInTime:null; return v?new Date(v):null; } catch{return null;}
  });
  const [clockFiliale,setClockFiliale]=useState(()=>{
    try { const s=localStorage.getItem(CLOCK_KEY); return s?JSON.parse(s).clockFiliale:""; } catch{return "";}
  });

  const [selFiliale,setSelFiliale]=useState(FILIALEN[0]);
  // 🧋 Arbeitstyp: 새로고침 후에도 유지되도록 localStorage에서 복원
  const [clockTyp,setClockTyp]=useState(()=>{
    try{ const s=localStorage.getItem(CLOCK_KEY); return s?typNorm(JSON.parse(s).clockTyp):"normal"; }
    catch{ return "normal"; }
  });
  // interval/effect 클로저에서 낡은 값이 잡히지 않도록 최신값 ref 유지
  const clockTypRef=useRef(clockTyp); clockTypRef.current=clockTyp;
  const [grund,setGrund]=useState("");
  // ── Pause 상태 ──────────────────────────────────────────────
  const [isPaused,setIsPaused]=useState(()=>{
    try{const s=localStorage.getItem(CLOCK_KEY);return s?JSON.parse(s).isPaused||false:false;}catch{return false;}
  });
  const [pauseStart,setPauseStart]=useState(()=>{
    try{const s=localStorage.getItem(CLOCK_KEY);const v=s?JSON.parse(s).pauseStart:null;return v?new Date(v):null;}catch{return null;}
  });
  const [totalPauseSec,setTotalPauseSec]=useState(()=>{
    try{const s=localStorage.getItem(CLOCK_KEY);return s?JSON.parse(s).totalPauseSec||0:0;}catch{return 0;}
  });
  const [elapsed,setElapsed]=useState(()=>{
    // 복원: 저장된 출근 시간 기준으로 경과 초 계산
    try {
      const s=localStorage.getItem(CLOCK_KEY); const v=s?JSON.parse(s):null;
      if(v&&v.clockedIn&&v.clockInTime) return Math.floor((Date.now()-new Date(v.clockInTime).getTime())/1000);
    } catch{}
    return 0;
  });
  const [modal,setModal]=useState(null);
  const [nDatum,setNDatum]=useState(today());
  const [nFiliale,setNFiliale]=useState(FILIALEN[0]);
  const [nEin,setNEin]=useState("09:00");
  const [nAus,setNAus]=useState("17:00");
  const [nGrund,setNGrund]=useState("");
  const [nMsg,setNMsg]=useState("");
  // 조기 퇴근(Vorzeitiges Ausstempeln) 관련
  const [scheduleData]=useFirebase("schedule",{});
  const [fruehData,setFruehData]=useState(null);  // {inStr,outStr} — 사유 입력 대기중인 퇴근 데이터
  const [fruehGrund,setFruehGrund]=useState("");

  // 근무 상태를 localStorage에 저장 (새로고침 후 복원용)
  useEffect(()=>{
    try { localStorage.setItem(CLOCK_KEY, JSON.stringify({
      clockedIn, clockInTime:clockInTime?clockInTime.toISOString():null, clockFiliale,
      clockTyp,   // 🧋 선택한 Arbeitstyp도 함께 보존
      isPaused, pauseStart:pauseStart?pauseStart.toISOString():null, totalPauseSec
    })); } catch{}
  },[clockedIn, clockInTime, clockFiliale, clockTyp, isPaused, pauseStart, totalPauseSec]);

  // 🌙 자정 넘긴(어제 시작) 세션 감지 → 로컬 근무 상태를 초기화하고 배너용 정보 저장.
  //    (시스템은 App 레벨에서 예정 종료시간으로 자동 강제 퇴근 처리한다.)
  const [autoOutDismissed,setAutoOutDismissed]=useState(()=>{
    const s=new Set();
    try{
      const prefix="teeamo_autoout_ack_"+userKey+"_";
      Object.keys(localStorage).forEach(k=>{ if(k.indexOf(prefix)===0 && localStorage.getItem(k)==="1") s.add(k.slice(prefix.length)); });
    }catch{}
    return s;
  });
  useEffect(()=>{
    try{
      const s=localStorage.getItem(CLOCK_KEY);
      if(!s) return;
      const v=JSON.parse(s);
      if(v&&v.clockedIn&&v.clockInTime){
        const inDay=new Date(v.clockInTime).toLocaleDateString("sv-SE",{timeZone:"Europe/Berlin"});
        if(inDay!==today()){
          // 어제 출근 → 오늘 접속: 자동 강제 퇴근 대상. 로컬 상태 리셋.
          setClockedIn(false); setClockInTime(null); setElapsed(0);
          setIsPaused(false); setPauseStart(null); setTotalPauseSec(0);
          try{ localStorage.removeItem(CLOCK_KEY); }catch{}
        }
      }
    }catch{}
  },[]);

  // 출근 시 임시 record 생성(aus:null) / 퇴근 시 경과시간 리셋
  useEffect(()=>{
    if(!clockedIn){
      setElapsed(0);
      return;
    }
    // 🌙 자정 넘긴 세션이면 오늘자 임시 record를 만들지 않는다 (자동 퇴근 대상).
    if(clockInTime){
      const inDay=new Date(clockInTime).toLocaleDateString("sv-SE",{timeZone:"Europe/Berlin"});
      if(inDay!==today()) return;
    }
    // 🔒 세션 키에 지점을 포함 → 같은 날 다른 지점 근무와 절대 섞이지 않는다.
    const fil = clockFiliale||selFiliale;
    const tempId = sessionIdFor(user.vorname, today(), fil);
    const inStr=clockInTime?`${pad(clockInTime.getHours())}:${pad(clockInTime.getMinutes())}`:"??:??";
    // 🧋 선택한 Arbeitstyp을 반드시 반영
    const typ = typNorm(clockTypRef.current);
    setRecords(prev=>{
      const arr=Array.isArray(prev)?prev:[];
      const already=arr.find(r=>r.id===tempId);
      // 이미 record가 있으면 유지하되, typ이 다르면 보정한다.
      if(already){
        if(typNorm(already.typ)===typ) return prev;
        return arr.map(r=>r.id===tempId?{...r,typ}:r);
      }
      const filtered=arr.filter(r=>r.id!==tempId);
      return [...filtered,{id:tempId,user:user.vorname,date:today(),
        filiale:fil,ein:inStr,aus:null,note:"",typ}];
    });
  },[clockedIn, clockTyp, clockFiliale]);

  // 🕒 근무 타이머: 출근 중(clockedIn)이고 Pause가 아닐 때만 1초씩 증가.
  //    isPaused를 의존성에 포함해야 Pause 시작 즉시 interval이 정지되고,
  //    Pause 종료 시 다시 시작된다. (기존엔 [clockedIn]만 있어 낡은 isPaused가
  //    클로저에 갇혀 타이머가 멈추지 않던 버그가 있었음)
  useEffect(()=>{
    if(!clockedIn || isPaused) return;
    const t=setInterval(()=>{ setElapsed(e=>e+1); },1000);
    return()=>clearInterval(t);
  },[clockedIn, isPaused]);

  const displayName=user.vorname;
  const myRecs=records.filter(r=>r.user===user.vorname);

  // 🌙 자동 강제 퇴근 배너: 내 이름으로 isAutoCheckedOut 기록이 있고, 아직
  //    [확인]으로 닫지 않았으며, 해당 날짜에 대한 Nachtragen 신청이 없을 때 노출.
  const autoOutRec = (Array.isArray(records)?records:[]).find(r =>
    r && r.user===user.vorname && r.isAutoCheckedOut &&
    !autoOutDismissed.has(r.date) &&
    // 🔒 이미 신청(대기) 또는 승인된 Nachtragen이 있으면 배너를 더 이상 띄우지 않음
    !nachtragStatusFor(antraege, user.vorname, r.date)
  );
  function dismissAutoOut(dateStr){
    try{ localStorage.setItem("teeamo_autoout_ack_"+userKey+"_"+dateStr,"1"); }catch{}
    setAutoOutDismissed(prev=>{ const n=new Set(prev); n.add(dateStr); return n; });
  }
  function openAutoOutNachtrag(rec){
    setNDatum(rec.date);
    setNFiliale(rec.filiale||FILIALEN[0]);
    setNEin(rec.ein||"09:00");
    setNAus(rec.aus||"17:00");
    setNGrund("");
    setNMsg("");
    setModal("nachtragAuto");
  }
  const myAntraege=antraege.filter(a=>a.user===user.vorname);
  // 이번 달 records만
  const curMo2=(()=>{const d=new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Berlin"}));return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");})();
  // 📅 기본은 '이번 달'만 노출 → 새 달이 시작되면 자동으로 깔끔하게 비워진 상태로 시작.
  //    직원이 드롭다운에서 과거 달을 직접 고를 때만 지난 기록을 불러온다.
  const [viewMonth, setViewMonth] = useState(curMo2);
  const isCurrentMonth = viewMonth === curMo2;
  // 선택 가능한 달: 이번 달 + 내 기록/근무표가 존재하는 과거 달 (최신순)
  const myAvailMonths = React.useMemo(()=>{
    const set=new Set([curMo2]);
    myRecs.forEach(r=>{ if(r.date) set.add(r.date.slice(0,7)); });
    return [...set].sort((a,b)=>b.localeCompare(a));
  },[myRecs, curMo2]);
  const myMonthRecs=myRecs.filter(r=>r.date&&r.date.startsWith(viewMonth)&&r.aus);
  // 유형별 분류 (Nachtragen(사후 등록)도 정규 근무로 합산에 포함)
  // 📊 관리자 Statistik과 100% 동일한 소스/계산식 사용 (buildBreakdown)
  //    → 직원 화면과 관리자 화면의 정산 시간이 1초도 어긋나지 않는다.
  const myBreakdown = buildBreakdown(myMonthRecs);
  const normalH=myMonthRecs.filter(r=>statTyp(r)==="normal").reduce((a,r)=>a+recHours(r),0);
  const einsprH=myMonthRecs.filter(r=>statTyp(r)==="einspringen").reduce((a,r)=>a+recHours(r),0);
  // Pause 누적: record.pauseSec 필드에서 집계 (참고 표시용)
  const pauseH=myMonthRecs.reduce((a,r)=>a+((r.pauseSec||0)/3600),0);
  // 총 근무 = 지점별 합계의 총합 (관리자 통계와 동일 정의)
  const totalH=myBreakdown.total;
  function fmtH(h){const hh=Math.floor(h);const mm=Math.round((h-hh)*60);return hh+"h"+String(mm).padStart(2,"0")+"m";}
  const monthSummary=FILIALEN.map(f=>({f,h:myRecs.filter(r=>r.filiale===f&&r.aus).reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0)})).filter(x=>x.h>0);

  // 알림 카운트 (Schichtbörse 새 근무 + Tausch 요청)
  const [_notifications] = useFirebase("notifications", {});
  const pendingTauschCount = Object.values(_notifications||{})
    .filter(n => n.type==="tausch_anfrage" && n.targetUser===user.vorname && !n.gelesen).length;
  // Schichtbörse 새 알림 (전체 직원 대상)
  const pendingBoerseCount = Object.values(_notifications||{})
    .filter(n => n.type==="schichtboerse_new" && n.zielUser===user.vorname && !n.gelesen).length;
  // 매칭 완료 알림 (내가 내놓은 근무가 이어받아짐)
  const pendingBoerseTakenCount = Object.values(_notifications||{})
    .filter(n => n.type==="schichtboerse_taken" && n.zielUser===user.vorname && !n.gelesen).length;
  const boerseBadge = pendingBoerseCount + pendingBoerseTakenCount;

  function handleEin(){
    // ⏱ 버튼을 누른 '그 순간'을 단 한 번만 캡처해서 record·스케줄에 동일하게 사용.
    //    (여러 곳에서 new Date()/now를 각각 다시 읽어 시간이 어긋나던 문제 방지)
    const stampAt = new Date();
    const inStr=`${pad(stampAt.getHours())}:${pad(stampAt.getMinutes())}`;
    // 🔒 [직원·날짜·지점] 단위 고유 세션 → 같은 날 다른 지점 근무와 분리
    const tempId=sessionIdFor(user.vorname, today(), selFiliale);
    // 🧋 선택한 Arbeitstyp을 정규화해서 저장 (normal | einspringen)
    const typ = typNorm(clockTyp);
    // 출근 도장: 선택한 지점의 세션만 새로 만든다(다른 지점 기록은 건드리지 않음)
    setRecords(prev=>{
      const filtered=(Array.isArray(prev)?prev:[]).filter(r=>r.id!==tempId);
      return [...filtered,{id:tempId,user:user.vorname,date:today(),filiale:selFiliale,ein:inStr,aus:null,note:"",typ}];
    });
    setClockedIn(true);setClockInTime(stampAt);setClockFiliale(selFiliale);setModal(null);
    // 🆘 대타 자동 스케줄: 오늘 이 지점에 예정 근무가 없으면 근무표를 즉시 자동 생성
    //    ⏱ von 값은 위에서 캡처한 실제 도장 시각(inStr) 그대로 사용
    ensureEinspringenShift(user.vorname, today(), selFiliale, inStr);
    // 🚨 미출근 알림 자동 제거: 지각이라도 출근 도장을 찍으면 해당 날짜·직원 알림 삭제
    if(window._fbDb&&window._fbRef&&window._fbRemove)
      window._fbRemove(window._fbRef(window._fbDb,"notifications/noshow_"+user.vorname+"_"+today())).catch(()=>{});
  }
  // ⚡ 현재 진행 중인 근무가 Einspringen(대타)인지 판별
  //    ① 저장된 record의 typ  ② 근무표가 자동 생성(autoCreated)된 대타인지
  //    ③ 출근 시 선택한 Arbeitstyp — 순서로 확인
  function isEinspringenSession(){
    const fil = clockFiliale || selFiliale, date = today();
    const rec = recordForShift(records, user.vorname, date, fil);
    if(rec && rec.typ) return typNorm(rec.typ)==="einspringen";
    const arr = !scheduleData[user.vorname] ? []
      : (Array.isArray(scheduleData[user.vorname]) ? scheduleData[user.vorname]
                                                   : Object.values(scheduleData[user.vorname]));
    const sh = arr.find(x=>(x.d||x.date)===date && sameFiliale(x.f||x.filiale, fil));
    if(sh && (sh.autoCreated || typNorm(sh.typ)==="einspringen")) return true;
    return typNorm(clockTyp)==="einspringen";
  }

  // 오늘 예정 근무의 종료 시각(분) — 조기 퇴근 판정용
  function getPlannedEndMin(){
    const name=user.vorname, date=today(), fil=clockFiliale||selFiliale;
    const arr=!scheduleData[name]?[]:Array.isArray(scheduleData[name])?scheduleData[name]:Object.values(scheduleData[name]);
    // 🔒 지금 근무 중인 '그 지점'의 계획만 본다 (같은 날 다른 지점 계획과 혼동 방지)
    const sh=arr.find(s=>(s.d||s.date)===date && sameFiliale(s.f||s.filiale, fil))
          || arr.find(s=>(s.d||s.date)===date && !(s.f||s.filiale));
    // ⚡ 대타 자동 생성분(autoCreated)의 bis는 임시값(20:00)이므로 조기퇴근 기준이 될 수 없다
    if(!sh || sh.autoCreated || typNorm(sh.typ)==="einspringen") return null;
    const tm=sh&&(sh.t||sh.time);
    if(!tm||!tm.includes("-")) return null;
    return parseMinutes(tm.split("-")[1]);
  }
  // 실제 퇴근 처리: 임시 record 제거 + 완료 record 저장 (Pause 정산 + 조기퇴근 prüfen/사유 반영)
  function finishAus(inStr, outStr, isFrueh, gr){
    // 🔒 퇴근도 '출근했던 그 지점의 세션'만 종료한다.
    //    (기존엔 user+date만 봐서 오전 ONIGIRI 퇴근이 오후 TEEnJOY 근무까지
    //     Feierabend로 만들고 시간이 중복 계상되던 치명적 버그)
    const fil = clockFiliale || selFiliale;
    const tempId=sessionIdFor(user.vorname, today(), fil);
    const existRec=(Array.isArray(records)?records:[]).find(r=>r.id===tempId)
      || recordForShift(records, user.vorname, today(), fil);
    // 🧋 퇴근 시에도 출근 때 저장된 Arbeitstyp을 그대로 승계 (없으면 현재 선택값)
    const typ=typNorm(existRec?.typ||clockTypRef.current||clockTyp);
    let finalPauseSec=totalPauseSec;
    if(isPaused&&pauseStart){ finalPauseSec+=Math.floor((Date.now()-pauseStart.getTime())/1000); }
    const finalId=Date.now();
    const completed={id:finalId,user:user.vorname,date:today(),filiale:fil,ein:inStr,aus:outStr,
      note:(isFrueh?gr:grund)||"", typ, pauseSec:finalPauseSec,
      prüfen:isFrueh?true:false, frühGrund:isFrueh?(gr||""):""};
    setRecords(prev=>{
      // 이 지점 세션(임시/기존)만 제거 — 다른 지점 근무 기록은 그대로 유지
      const filtered=(Array.isArray(prev)?prev:[]).filter(r=>
        r.id!==tempId && !(existRec && r.id===existRec.id));
      return [...filtered,completed];
    });
    // 🔄 대타 자동 생성 스케줄이라면 예정 퇴근시간(임시 20:00)을 실제 퇴근시간으로 보정

  }
  function submitNachtrag(){

      return;
    }
    if(!nGrund.trim()){setNMsg("Bitte einen Grund angeben.");return;}
    const id = Date.now();
    const ts = id;
    // Firebase   (antraege +   notifications)
    setAntraege(prev=>[...prev,{id,user:user.vorname,date:nDatum,filiale:nFiliale,ein:nEin,aus:nAus,grund:nGrund,status:"offen",zustaendig:"all"}]);

      ["teddy","yeaji"].forEach(mgr => {
        window._fbSet(window._fbRef(window._fbDb, `notifications/nachtrag_${id}_${mgr}`), {
          type: "nachtrag", kategorie: "Nachtrag",
          user: user.vorname, date: nDatum, filiale: nFiliale, ein: nEin, aus: nAus,
          grund: nGrund, antragId: id,
          zustaendig: mgr, bearbeitetVon: null, status: "offen", gelesen: false, ts
        }).catch(e => console.error(e));
      });
    }
    setNMsg("Antrag eingereicht! Wird von Yeaji oder Teddy geprüft.");setNGrund("");

            </div>
            <span style={{fontSize:9,fontWeight:600,color:tab===t.id?C.mintDark:C.muted}}>{t.lbl}</span>
            {tab===t.id&&<div style={{width:16,height:2,background:C.mint,borderRadius:99}}/>}
          </button>
        ))}
      </div>

      {(modal==="ein"||modal==="aus")&&(
        <ClockModal
          modal={modal}
          now={now}
          selFiliale={selFiliale}
          clockFiliale={clockFiliale}
          clockInTime={clockInTime}
          grund={grund}
          CLOCK_KEY={CLOCK_KEY}
          onClose={()=>setModal(null)}
          onEin={(d)=>{
            // ⏱ 모달이 확정한 시각(d) 하나만을 진실의 원천으로 사용한다.
            const inStr = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
            const tempId = sessionIdFor(user.vorname, today(), selFiliale);
            // record를 여기서 확정 생성 → effect가 낡은 state로 다시 만들 여지를 없앤다
            setRecords(prev=>{
              const filtered=(Array.isArray(prev)?prev:[]).filter(r=>r.id!==tempId);
              return [...filtered,{id:tempId,user:user.vorname,date:today(),
                filiale:selFiliale,ein:inStr,aus:null,note:"",typ:typNorm(clockTyp)}];
            });
            setClockedIn(true);setClockInTime(d);setClockFiliale(selFiliale);setModal(null);
            // 🆘 대타 자동 스케줄 (ClockModal 경유 출근에도 동일 적용)
            ensureEinspringenShift(user.vorname, today(), selFiliale, inStr);
            if(window._fbDb&&window._fbRef&&window._fbRemove)
              window._fbRemove(window._fbRef(window._fbDb,"notifications/noshow_"+user.vorname+"_"+today())).catch(()=>{});
          }}
          onAus={(inStr,outStr)=>{
            // ⚡ Einspringen(대타)은 예정 스케줄이 없다. bis(20:00)는 임시값일 뿐이므로
            //    '조기 퇴근' 개념이 성립하지 않는다 → 사유 입력 팝업을 띄우지 않고 즉시 처리.
            //    (사유 확인은 Regulär 등 정규 스케줄 근무에만 적용)
            if(isEinspringenSession()){ finishAus(inStr,outStr,false,""); return; }
            const plannedEnd=getPlannedEndMin();
            const [oh,om]=outStr.split(":").map(Number);
            const outMin=oh*60+om;
            if(plannedEnd!=null && outMin < plannedEnd-1){
              // ⏱ 조기 퇴근 → 사유 입력 모달 먼저 표시 (퇴근 처리는 사유 입력 후)
              setFruehData({inStr,outStr});
              setFruehGrund("");
              setModal("fruehGrund");
            } else {
              finishAus(inStr,outStr,false,"");
            }
          }}
        />
      )}

      {/* ⏱ 조기 퇴근 사유 입력 모달 */}
      {modal==="fruehGrund"&&fruehData&&(
        <div style={{position:"fixed",inset:0,background:"rgba(20,20,20,.55)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:210}}
          onClick={e=>{if(e.target===e.currentTarget){setModal(null);setFruehData(null);setFruehGrund("");}}}>
          <div style={{background:C.card,borderRadius:"22px 22px 0 0",width:"100%",maxWidth:500,
            padding:"24px 22px 32px",paddingBottom:"max(32px,env(safe-area-inset-bottom))"}}>
            <div style={{width:36,height:4,background:C.border,borderRadius:99,margin:"0 auto 18px"}}/>
            <div style={{fontSize:16,fontWeight:800,color:C.text,marginBottom:4}}>{"⏱ Vorzeitiges Ausstempeln"}</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:14}}>
              {"Du stempelst früher aus als geplant. Bitte kurz den Grund angeben."}
            </div>
            <div style={{...S.card,background:C.yellowLight,border:`1px solid ${C.yellow}`,marginBottom:14,padding:"9px 12px"}}>
              <div style={{fontSize:11,fontWeight:700,color:C.yellow}}>
                {clockFiliale}{" · "}{fruehData.inStr}{" – "}{fruehData.outStr}
              </div>
            </div>
            <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:6}}>{"Grund für vorzeitiges Ausstempeln"}</div>
            <textarea value={fruehGrund} onChange={e=>setFruehGrund(e.target.value)}
              placeholder="z. B. mit Yeaji gesprochen"
              style={{...S.input,width:"100%",minHeight:70,resize:"none",fontFamily:"inherit",marginBottom:14,boxSizing:"border-box"}}/>
            <div style={{display:"flex",gap:9}}>
              <button onClick={()=>{setModal(null);setFruehData(null);setFruehGrund("");}}
                style={{flex:1,padding:"12px",borderRadius:11,border:`1.5px solid ${C.border}`,background:C.card,color:C.muted,fontWeight:700,fontSize:13,cursor:"pointer"}}>Abbrechen</button>
              <button onClick={()=>finishAus(fruehData.inStr,fruehData.outStr,true,fruehGrund.trim())}
                style={{flex:2,padding:"12px",borderRadius:11,border:"none",background:`linear-gradient(135deg,${C.yellow},#C99A2E)`,color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}}>
                {"Ausstempeln & senden"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* 🌙 자동 강제 퇴근 → Nachtragen 수정 모달 (배너에서 진입) */}
      {modal==="nachtragAuto"&&(
        <div style={{position:"fixed",inset:0,background:"rgba(20,20,20,.55)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:210}}
          onClick={e=>{if(e.target===e.currentTarget){setModal(null);setNMsg("");}}}>
          <div style={{background:C.card,borderRadius:"22px 22px 0 0",width:"100%",maxWidth:500,
            padding:"24px 22px 32px",paddingBottom:"max(32px,env(safe-area-inset-bottom))"}}>
            <div style={{width:36,height:4,background:C.border,borderRadius:99,margin:"0 auto 18px"}}/>
            <div style={{fontSize:16,fontWeight:800,color:C.text,marginBottom:4}}>{"📝 Nachtragen (Korrektur)"}</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:14}}>
              {new Date(nDatum).toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"})}{" · "}{nFiliale}
            </div>
            <div style={{display:"flex",gap:10,marginBottom:12}}>
              {[["Einstempeln",nEin,setNEin],["Ausstempeln",nAus,setNAus]].map(([lbl,val,set])=>(
                <div key={lbl} style={{flex:1}}>
                  <div style={{fontSize:10,color:C.muted,marginBottom:4,fontWeight:700}}>{lbl}</div>
                  <TimeInput value={val} onChange={set} style={{...S.input,width:"100%",textAlign:"center",fontSize:14,boxSizing:"border-box"}}/>
                </div>
              ))}
            </div>
            <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:6}}>{"Grund "}<span style={{color:C.red}}>*</span></div>
            <textarea value={nGrund} onChange={e=>setNGrund(e.target.value)}
              placeholder="z. B. tatsächliche Endzeit war 20:30…"
              style={{...S.input,width:"100%",minHeight:64,resize:"none",fontFamily:"inherit",marginBottom:8,boxSizing:"border-box"}}/>
            {nMsg&&<div style={{fontSize:11,color:nMsg.includes("eingereicht")?C.mintDark:C.red,marginBottom:8,fontWeight:600}}>{nMsg}</div>}
            <div style={{display:"flex",gap:9}}>
              <button onClick={()=>{setModal(null);setNMsg("");}}
                style={{flex:1,padding:"12px",borderRadius:11,border:`1.5px solid ${C.border}`,background:C.card,color:C.muted,fontWeight:700,fontSize:13,cursor:"pointer"}}>Abbrechen</button>
              <button onClick={()=>{
                if(!nGrund.trim()){setNMsg("Bitte einen Grund angeben.");return;}
                submitNachtrag();
                // 신청 완료 → 해당 날짜 배너 자동 숨김 처리 + 모달 닫기
                dismissAutoOut(nDatum);
                setTimeout(()=>{setModal(null);setNMsg("");},1200);
              }} style={{flex:2,padding:"12px",borderRadius:11,border:"none",background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}}>
                {"Nachtrag senden"}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

//  STATISTIK 
// 📊 통계에서 완전히 제외할 더미/과거 월 (예: Juni 2026)
const STAT_EXCLUDED_MONTHS = new Set(["2026-06"]);
function StatistikTab({records,users,schedule}){
  // records + Dienstplan(schedule)에서 달 추출 + 현재 달 포함, 최신순 정렬
  const availMonths = React.useMemo(()=>{
    const d=new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Berlin"}));
    const cur=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    const set=new Set([cur]);
    // 실제 근무 기록(records)의 달
    (Array.isArray(records)?records:[]).forEach(r=>{ if(r.aus&&r.date) set.add(r.date.slice(0,7)); });
    // Dienstplan(schedule)에 존재하는 근무 일자의 달
    Object.values(schedule||{}).forEach(sh=>{
      const arr=!sh?[]:Array.isArray(sh)?sh:Object.values(sh);
      arr.forEach(s=>{ const dd=s&&(s.date||s.d); if(dd) set.add(dd.slice(0,7)); });
    });
    // 🚫 더미/제외 월(Juni 2026) 필터 옵션 완전 제거
    STAT_EXCLUDED_MONTHS.forEach(m=>set.delete(m));
    return [...set].sort((a,b)=>b.localeCompare(a));
  },[records,schedule]);
  const [selMonth,setSelMonth]=useState(()=>{
    const d=new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Berlin"}));
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
  });
  const [exported,setExported]=useState(null);
  // 근무 기록이 있는 계정은 관리자(하이브리드 포함)여도 정산 목록에 포함
  const _workerNames = new Set((Array.isArray(records)?records:[]).map(r=>r.user));
  const empList=(Array.isArray(users)?users:[])
    .filter(u=>!MANAGERS.includes(u.key) || _workerNames.has(u.vorname))
    .sort(byName);
  const monthRecs=records.filter(r=>r.date&&r.date.startsWith(selMonth)&&r.aus&&!STAT_EXCLUDED_MONTHS.has(r.date.slice(0,7)));

  function downloadCSV(rows,filename){
    const bom="﻿";
    const csv=bom+rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(";")).join("\r\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=filename;a.click();
    URL.revokeObjectURL(url);
    setExported(filename);setTimeout(()=>setExported(null),3000);
  }
  function downloadXLSX(rows, filename, sheetName="Daten") {
    try {
      const ws = window.XLSX.utils.aoa_to_sheet(rows);
      //    ( )
      const wb = window.XLSX.utils.book_new();
      window.XLSX.utils.book_append_sheet(wb, ws, sheetName);
      window.XLSX.writeFile(wb, filename);
      setExported(filename);setTimeout(()=>setExported(null),3000);
    } catch(e) {
      // fallback to CSV if XLSX unavailable
      downloadCSV(rows, filename.replace(".xlsx",".csv"));
    }
  }
  function exportDetail(fmt="xlsx"){
    const hdr=["Name","Datum","Wochentag","Filiale","Einstempeln","Ausstempeln","Arbeitsstunden","Typ","Anmerkung"];
    const rows=[hdr,...[...monthRecs].sort((a,b)=>a.date.localeCompare(b.date)).map(r=>{
      const h=stunden(r.ein,r.aus);
      return[r.user,r.date,TAGE_DE[new Date(r.date).getDay()],r.filiale,r.ein,r.aus,h!=null?h.toFixed(2):"",r.typ==="nachtrag"?"Nachtrag":"Regulär",r.note||""];
    })];
    if(fmt==="xlsx") downloadXLSX(rows,`Stundennachweis_Detail_${selMonth}.xlsx`,"Stundennachweis");
    else downloadCSV(rows,`Stundennachweis_Detail_${selMonth}.csv`);
  }
  function exportSummary(fmt="xlsx"){
    const hdr=["Name","Rolle","Arbeitstage","Gesamtstunden","TEEAMO Arkaden (Std)","TEEAMO Aegidiimarkt (Std)","TEEnJOY (Std)","Ø Std/Tag"];
    const rows=[hdr,...empList.map(emp=>{
      const er=monthRecs.filter(r=>r.user===emp.vorname);
      const total=er.reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0);
      const byFil={};FILIALEN.forEach(f=>{byFil[f]=er.filter(r=>r.filiale===f).reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0);});
      return[emp.vorname,emp.role,er.length,Number(total.toFixed(2)),Number(byFil["TEEAMO Arkaden"].toFixed(2)),Number(byFil["TEEAMO Aegidiimarkt"].toFixed(2)),Number(byFil["TEEnJOY"].toFixed(2)),er.length?Number((total/er.length).toFixed(2)):0];
    })];
    if(fmt==="xlsx") downloadXLSX(rows,`Monatsübersicht_${selMonth}.xlsx`,"Monatsübersicht");
    else downloadCSV(rows,`Monatsübersicht_${selMonth}.csv`);
  }

  // 📥 A. 통합본 CSV — 선택한 달의 모든 직원 근태 원장 (브라우저 내장 API만 사용)
  function exportAbrechnungGesamt(){
    const rows=[ABRECHNUNG_HEADER, ...abrechnungRows(monthRecs, schedule)];
    const fn=`Monatsabrechnung_Gesamt_${selMonth}.csv`;
    downloadCsvRows(rows, fn);
    setExported(fn); setTimeout(()=>setExported(null),3000);
  }
  // 📥 B. 직원별 개별 CSV — 일자별 상세 + 지점별/타입별 집계 요약 포함
  function exportAbrechnungMitarbeiter(emp){
    const er=monthRecs.filter(r=>r.user===emp.vorname);
    const bd=buildBreakdown(er);
    const num=h=>h.toFixed(2).replace(".",",");
    const rows=[
      ["Abrechnung", emp.vorname+(emp.nachname?" "+emp.nachname:"")],
      ["Monat", monthLabel(selMonth)],
      ["Arbeitstage", String(er.length)],
      ["Gesamtstunden", num(bd.total)],
      [],
      ["— Aufschlüsselung: Filiale → Arbeitstyp —"],
      ["Filiale","Arbeitstyp","Stunden"],
      ...bd.byFiliale.flatMap(f=>[
        [f.filiale,"GESAMT",num(f.total)],
        ...f.byTyp.map(t=>[f.filiale, t.icon+" "+t.lbl, num(t.std)]),
      ]),
      [],
      ["— Tagesdetails —"],
      ABRECHNUNG_HEADER,
      ...abrechnungRows(er, schedule),
    ];
    const fn=`Abrechnung_${(emp.vorname||"Mitarbeiter").replace(/[^\p{L}\p{N}_-]/gu,"")}_${selMonth}.csv`;
    downloadCsvRows(rows, fn);
    setExported(fn); setTimeout(()=>setExported(null),3000);
  }

  return(
    <div style={{padding:"14px"}}>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:7,letterSpacing:".06em",textTransform:"uppercase"}}>{"Monat auswählen"}</div>
        <div style={{display:"flex",gap:7}}>
          {availMonths.map(m=>(
            <button key={m} onClick={()=>setSelMonth(m)} style={{flex:1,padding:"8px 2px",borderRadius:9,fontSize:10,fontWeight:700,cursor:"pointer",border:`2px solid ${selMonth===m?C.mint:C.border}`,background:selMonth===m?C.mintLight:"#fff",color:selMonth===m?C.mintDark:C.muted}}>
              {monthLabel(m)}
            </button>
          ))}
        </div>
      </div>
      <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:8,letterSpacing:".06em",textTransform:"uppercase"}}>{"Übersicht – "}{selMonth?new Date(selMonth+"-01").toLocaleDateString("de-DE",{month:"long",year:"numeric"}):""}</div>
      <div style={{display:"flex",flexDirection:"column",gap:9,marginBottom:14}}>
        {empList.map(emp=>{
          const er=monthRecs.filter(r=>r.user===emp.vorname);
          const total=er.reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0);
          const byFil={};FILIALEN.forEach(f=>{byFil[f]=er.filter(r=>r.filiale===f).reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0);});
          const fColors=[C.mintLight,C.yellowLight,C.redLight];
          const fTColors=[C.mintDark,"#b37400",C.red];
          const contract = emp.contractHours || 0;
          const diff = contract > 0 ? total - contract : null;
          return(
            <div key={emp.key} style={S.card}>
              <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:9}}>
                <div style={{width:34,height:34,borderRadius:"50%",background:C.navy,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:emp.emoji?18:12,color:"#fff",flexShrink:0}}>{emp.emoji||emp.kuerzel}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:800,color:C.text}}>{emp.emoji&&<span style={{marginRight:3}}>{emp.emoji}</span>}{emp.vorname}</div>
                  <div style={{fontSize:9,color:C.muted}}>{emp.role==="Admin"?"Admin":"Staff"}{contract>0?` · Vertrag: ${contract}h`:""}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:18,fontWeight:800,color:C.mintDark}}>{total.toFixed(1)}<span style={{fontSize:10,color:C.muted}}> Std</span></div>
                  <div style={{fontSize:9,color:C.muted}}>{er.length} Tage</div>
                  {diff !== null && (
                    <div style={{fontSize:10,fontWeight:700,color:diff>=0?C.mintDark:C.red}}>
                      {diff>=0?`+${diff.toFixed(1)}h Mehr`:`${diff.toFixed(1)}h Weniger`}
                    </div>
                  )}
                </div>
                {/* 📥 직원별 개별 정산 CSV */}
                <button onClick={()=>exportAbrechnungMitarbeiter(emp)} title={"Abrechnung CSV – "+emp.vorname}
                  style={{flexShrink:0,width:32,height:32,borderRadius:9,border:"1px solid "+C.border,
                    background:C.mintLight,color:C.mintDark,fontSize:14,fontWeight:800,cursor:"pointer",
                    display:"flex",alignItems:"center",justifyContent:"center"}}>{"⬇"}</button>
              </div>
              {/* 📊 지점 → 근무타입 계층 breakdown */}
              <BreakdownView recs={er} compact={true}/>
            </div>
          );
        })}
      </div>
      <div style={{background:C.navy,borderRadius:14,padding:"16px",marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:800,color:"#fff",marginBottom:3}}>{"📥 Daten exportieren"}</div>
        <div style={{fontSize:10,color:"rgba(255,255,255,.4)",marginBottom:14}}>{"Excel oder CSV – öffnet direkt in Excel"}</div>
        {/* 📥 A. 월간 통합 정산본 (모든 직원 · CSV) */}
        <div style={{background:"rgba(255,255,255,.07)",borderRadius:10,padding:"12px",marginBottom:8,
          border:"1px solid rgba(255,255,255,.18)"}}>
          <div style={{fontSize:12,fontWeight:700,color:"#fff",marginBottom:2}}>{"Monatsabrechnung – Gesamt"}</div>
          <div style={{fontSize:9,color:"rgba(255,255,255,.4)",marginBottom:10}}>
            {"Alle Mitarbeiter/innen · Datum · Filiale · Arbeitstyp · Plan/Ist-Zeiten · Std · Nachtragen"}
          </div>
          <button onClick={exportAbrechnungGesamt}
            style={{width:"100%",padding:"11px",borderRadius:8,border:"none",
              background:`linear-gradient(135deg,${C.yellow},#C99A2E)`,color:"#fff",fontWeight:800,fontSize:12,cursor:"pointer"}}>
            {"⬇ Gesamt-CSV ("+monthLabel(selMonth)+")"}
          </button>
          <div style={{fontSize:9,color:"rgba(255,255,255,.35)",marginTop:7,lineHeight:1.5}}>
            {"Einzelne Abrechnungen: ⬇-Symbol neben dem Namen in der Übersicht oben."}
          </div>
        </div>
        {[
          {title:"Stundennachweis (Details)",sub:"Jeder Tag · Name · Datum · Filiale · Ein/Aus · Std",fnXlsx:()=>exportDetail("xlsx"),fnCsv:()=>exportDetail("csv"),file:`Detail_${selMonth}`},
          {title:"Monatsübersicht (Zusammenfassung)",sub:"Pro Mitarbeiterin · Gesamtstunden · je Filiale",fnXlsx:()=>exportSummary("xlsx"),fnCsv:()=>exportSummary("csv"),file:`Übersicht_${selMonth}`},
        ].map(({title,sub,fnXlsx,fnCsv,file})=>(
          <div key={file} style={{background:"rgba(255,255,255,.07)",borderRadius:10,padding:"12px",marginBottom:8}}>
            <div style={{fontSize:12,fontWeight:700,color:"#fff",marginBottom:2}}>{title}</div>
            <div style={{fontSize:9,color:"rgba(255,255,255,.4)",marginBottom:10}}>{sub}</div>
            <div style={{display:"flex",gap:7}}>
              <button onClick={fnXlsx} style={{flex:2,padding:"10px",borderRadius:8,border:"none",background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,color:"#fff",fontWeight:800,fontSize:11,cursor:"pointer"}}>{"⬇ Excel (.xlsx)"}</button>
              <button onClick={fnCsv} style={{flex:1,padding:"10px",borderRadius:8,border:`1px solid rgba(255,255,255,.2)`,background:"transparent",color:"rgba(255,255,255,.6)",fontWeight:700,fontSize:10,cursor:"pointer"}}>CSV</button>
            </div>
          </div>
        ))}
      </div>
      {exported&&(
        <div style={{...S.card,display:"flex",alignItems:"center",gap:9,border:`1.5px solid ${C.mint}`,background:C.mintLight}}>
          <span style={{fontSize:18}}>{"✅"}</span>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:C.mintDark}}>Datei gespeichert!</div>
            <div style={{fontSize:10,color:C.mintDark,opacity:.8}}>{exported}</div>
          </div>
        </div>
      )}
    </div>
  );
}
