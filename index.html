// ── PIN은 LocalStorage에만 저장 (보안) ─────────────────────────────────────
function lsGet(key, fallback) {
  try { const v=localStorage.getItem(key); if(v!==null) return JSON.parse(v); return fallback; } catch { return fallback; }
}
function lsSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

// API 키 등 개인 설정용 localStorage 훅
function usePersist(lsKey, init) {
  const [state, setState] = React.useState(() => lsGet(lsKey, init));
  const setAndSave = React.useCallback((updater) => {
    setState(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      lsSet(lsKey, next);
      return next;
    });
  }, [lsKey]);
  return [state, setAndSave];
}

// PIN 전용 로컬 훅
function usePinStore() {
  // PIN은 항상 localStorage에서만 읽고 씀
  function getPin(userKey) { return lsGet(`pin_${userKey}`, null); }
  function setPin(userKey, pin) { lsSet(`pin_${userKey}`, pin); }
  function initPins(users) {
    // INIT_USERS의 PIN을 LS에 저장 (최초 1회)
    users.forEach(u => {
      if (!lsGet(`pin_${u.key}`, null)) lsSet(`pin_${u.key}`, u.pin);
    });
  }
  return { getPin, setPin, initPins };
}

// ── Firebase 실시간 동기화 훅 (완전판) ────────────────────────────────────────
function useFirebase(path, fallback) {
  const [data, setData] = useState(fallback);
  const [ready, setReady] = useState(false);
  const unsubRef = useRef(null);

  useEffect(() => {
    let cancelled = false;

    function attach() {
      const db = window._fbDb;
      const fbRef = window._fbRef;
      const fbOnValue = window._fbOnValue;
      if (!db || !fbRef || !fbOnValue) return false;
      const r = fbRef(db, path);
      // onValue returns unsubscribe fn
      unsubRef.current = fbOnValue(r, snap => {
        if (cancelled) return;
        const val = snap.val();
        if (val === null) {
          setData(fallback);
        } else if (Array.isArray(fallback)) {
          // Firebase stores arrays as objects with numeric/string keys
          setData(Object.values(val));
        } else {
          setData(val);
        }
        setReady(true);
      });
      return true;
    }

    if (attach()) return () => { cancelled=true; if(unsubRef.current) unsubRef.current(); };

    let tries = 0;
    const iv = setInterval(() => {
      tries++;
      if (attach()) { clearInterval(iv); return; }
      if (tries > 30) {
        clearInterval(iv);
        console.error("Firebase 연결 실패:", path);
        setData(fallback);
        setReady(true);
      }
    }, 500);

    return () => { cancelled=true; clearInterval(iv); if(unsubRef.current) unsubRef.current(); };
  }, [path]);

  // setter: Firebase에 씀 → onValue가 자동으로 UI 갱신
  function fbWrite(next) {
    if (!window._fbDb || !window._fbRef || !window._fbSet) return;
    let toSave;
    if (Array.isArray(next)) {
      if (next.length === 0) { toSave = null; }
      else {
        // users path: PIN은 Firebase에 저장하지 않음
        const sanitize = path === "users"
          ? v => { const {pin:_, ...rest} = v; return rest; }
          : v => v;
        toSave = Object.fromEntries(next.map((v,i) => [String(v.id||v.key||i), sanitize(v)]));
      }
    } else if (next && typeof next === "object" && Object.keys(next).length === 0) {
      toSave = null;
    } else {
      toSave = next;
    }
    window._fbSet(window._fbRef(window._fbDb, path), toSave)
      .catch(e => console.error("FB write error ["+path+"]:", e));
  }

  function setter(updater) {
    // 낙관적 업데이트: 로컬 즉시 반영 + Firebase 쓰기
    setData(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      fbWrite(next);
      return next;
    });
  }

  // 단일 필드 업데이트 (path/field 만 변경, 전체 재쓰기 방지)
  function fbUpdateField(subPath, value) {
    if (!window._fbDb || !window._fbRef || !window._fbSet) return;
    window._fbSet(window._fbRef(window._fbDb, path + "/" + subPath), value)
      .catch(e => console.error("FB field write error:", e));
  }

  return [data, setter, ready, fbUpdateField];
}

function pad(n) { return String(n).padStart(2, "0"); }
function useNow() {
  const [t, setT] = useState(new Date());

function stunden(ein, aus) {
  if (!ein || !aus) return null;
  const [eh, em] = ein.split(":").map(Number);
  const [ah, am] = aus.split(":").map(Number);
  return (ah * 60 + am - eh * 60 - em) / 60;
}
function stdLabel(ein, aus) { const h = stunden(ein, aus); return h === null ? "–" : h.toFixed(1) + "h"; }
function today() { return new Date().toISOString().slice(0, 10); }

// ── KALENDER VIEW (plan.png 이미지 뷰어 + 내 일정) ──────────────────────────
function KalenderView({ csvCtx, userName, records, users }) {
  const [imgErr, setImgErr] = useState(false);
  const [scale, setScale] = useState(1);
  const [offset, setOffset] = useState({ x: 0, y: 0 });
  const containerRef = useRef(null);
  const lastTouchRef = useRef(null);
  const lastDistRef = useRef(null);
  const lastScaleRef = useRef(1);
  const lastOffsetRef = useRef({ x: 0, y: 0 });

  const [schedule] = useFirebase("schedule", {});
  const [planImg] = useFirebase("planImage", null);

  // Firebase에서 온 schedule 값을 배열로 정규화
  function normalizeShifts(val) {
    if (!val) return [];
    if (Array.isArray(val)) return val;
    // Firebase가 {0:{...}, 1:{...}} 형태로 저장한 경우
    return Object.values(val);
  }

  // schedule 키 매칭: 여러 방식으로 시도
  const myShifts = React.useMemo(() => {
    if (!userName || !schedule) return [];
    const keys = Object.keys(schedule);
    // 1. 완전 일치
    if (schedule[userName]) return normalizeShifts(schedule[userName]);
    // 2. 대소문자 무시
    const lower = userName.toLowerCase();
    const k2 = keys.find(k => k.toLowerCase() === lower);
    if (k2) return normalizeShifts(schedule[k2]);
    // 3. 공백 포함 이름이면 첫 단어(firstName)로 시도
    const firstName = userName.split(" ")[0];
    if (firstName !== userName) {
      if (schedule[firstName]) return normalizeShifts(schedule[firstName]);
      const k3 = keys.find(k => k.toLowerCase() === firstName.toLowerCase());
      if (k3) return normalizeShifts(schedule[k3]);
    }
    return [];
  }, [schedule, userName]);

  // viewport는 그대로 유지 (페이지 줌 비활성화 상태 유지)

  function clampOffset(ox, oy, sc, el) {
    if (!el) return { x: ox, y: oy };
    const cw = el.clientWidth;
    const ch = el.clientHeight;
    const imgW = cw * sc;
    const imgH = ch * sc; // height auto이므로 근사
    const maxX = Math.max(0, (imgW - cw) / 2);
    const maxY = Math.max(0, (imgH - ch) / 2);
    return { x: Math.min(maxX, Math.max(-maxX, ox)), y: Math.min(maxY, Math.max(-maxY, oy)) };
  }

  function getDist(t1, t2) {
    const dx = t1.clientX - t2.clientX;
    const dy = t1.clientY - t2.clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }
  function getMid(t1, t2) {
    return { x: (t1.clientX + t2.clientX) / 2, y: (t1.clientY + t2.clientY) / 2 };
  }

  function onTouchStart(e) {
    e.stopPropagation();
    if (e.touches.length === 2) {
      lastDistRef.current = getDist(e.touches[0], e.touches[1]);
      lastScaleRef.current = scale;
      lastOffsetRef.current = offset;
    } else if (e.touches.length === 1) {
      lastTouchRef.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      lastOffsetRef.current = offset;
    }
  }

  function onTouchMove(e) {
    e.preventDefault();
    e.stopPropagation();
    const el = containerRef.current;
    if (e.touches.length === 2) {
      const dist = getDist(e.touches[0], e.touches[1]);
      const ratio = dist / lastDistRef.current;
      const newScale = Math.min(5, Math.max(1, lastScaleRef.current * ratio));
      setScale(newScale);
      if (newScale === 1) setOffset({ x: 0, y: 0 });
    } else if (e.touches.length === 1 && scale > 1) {
      const dx = e.touches[0].clientX - lastTouchRef.current.x;
      const dy = e.touches[0].clientY - lastTouchRef.current.y;
      const raw = { x: lastOffsetRef.current.x + dx, y: lastOffsetRef.current.y + dy };
      setOffset(clampOffset(raw.x, raw.y, scale, el));
    }
  }

  function onTouchEnd(e) {
    e.stopPropagation();
    lastDistRef.current = null;
    if (e.touches.length === 1) {
      lastTouchRef.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      lastOffsetRef.current = offset;
    }
  }

  function onDoubleClick() {
    setScale(1);
    setOffset({ x: 0, y: 0 });
  }

  return (
    <div style={{ width: "100%", background: C.card, borderRadius: 14, overflow: "hidden" }}>
      {(imgErr && !planImg) ? (
        <div style={{
          display: "flex", flexDirection: "column", alignItems: "center",
          justifyContent: "center", padding: "48px 24px", gap: 12, textAlign: "center",
        }}>
          <span style={{fontSize: 36}}>📋</span>
          <div style={{fontSize: 13, fontWeight: 700, color: C.text}}>Kein Dienstplan vorhanden</div>
          <div style={{fontSize: 11, color: C.muted, lineHeight: 1.5}}>
            Der Manager hat noch keinen Dienstplan hochgeladen.
          </div>
        </div>
      ) : (
        <div>
          <div
            ref={containerRef}
            onTouchStart={onTouchStart}
            onTouchMove={onTouchMove}
            onTouchEnd={onTouchEnd}
            onDoubleClick={onDoubleClick}
            style={{ overflow: "hidden", touchAction: "none", cursor: scale > 1 ? "grab" : "default" }}
          >
            <img
              src={planImg || "plan.png"}
              alt="Dienstplan"
              onError={() => setImgErr(true)}
              style={{
                display: "block", width: "100%", height: "auto",
                transform: `scale(${scale}) translate(${offset.x / scale}px, ${offset.y / scale}px)`,
                transformOrigin: "center center", transition: "none",
                userSelect: "none", pointerEvents: "none",
              }}
            />
          </div>
        </div>
      )}

      {/* 내 일정 */}
      {userName && myShifts.length > 0 && (
        <MeineSchichtenSection userName={userName} myShifts={myShifts} records={records} users={users}/>
      )}
      {userName && myShifts.length === 0 && (
        <div style={{padding:"14px",textAlign:"center"}}>
          <div style={{fontSize:11,color:C.muted,background:C.bg,borderRadius:10,padding:"12px"}}>
            📋 Für <strong>{userName}</strong> sind noch keine Schichten im Dienstplan eingetragen.
            <div style={{fontSize:9,marginTop:4,opacity:.6}}>Der Manager muss den Plan hochladen und analysieren.</div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── 근무 시간 비교 헬퍼 ───────────────────────────────────────────────────────
function parseMinutes(timeStr) {
  if (!timeStr) return null;
  const [h, m] = timeStr.split(":").map(Number);
  return h * 60 + m;
}
function calcShiftMinutes(timeRange) {
  if (!timeRange) return null;
  const [start, end] = timeRange.split("-");
  const s = parseMinutes(start), e = parseMinutes(end);
  if (s == null || e == null) return null;
  return e > s ? e - s : null;
}
function getShiftStatus(shift, actualRec) {
  if (!actualRec) return "ausstehend";
  if (!actualRec.aus) return "aktiv";
  const planned = calcShiftMinutes(shift.time || shift.t);
  const actual = calcShiftMinutes(`${actualRec.ein}-${actualRec.aus}`);
  if (planned == null || actual == null) return "gearbeitet";
  return actual >= planned ? "gearbeitet" : "prüfen";
}

// ── SCHICHTTAUSCH MODAL ────────────────────────────────────────────────────────
function SchichttauschModal({ userName, myShifts, users, onClose }) {
  const [step, setStep] = useState(1);
  const [myShift, setMyShift] = useState(null);
  const [targetUser, setTargetUser] = useState(null);
  const [targetShift, setTargetShift] = useState(null);
  const [grund, setGrund] = useState("");
  const [err, setErr] = useState("");
  const [sheetHeight, setSheetHeight] = useState(60);
  const dragStartY = useRef(null);
  const dragStartH = useRef(null);
  const [schedule] = useFirebase("schedule", {});
  const [tauschAntraege, setTauschAntraege] = useFirebase("schichttausch", []);
  const [, setNotifications] = useFirebase("notifications", {});

  // 배경 스크롤 잠금
  useEffect(() => {
    document.body.style.overflow = "hidden";
    document.body.style.position = "fixed";
    document.body.style.width = "100%";
    return () => {
      document.body.style.overflow = "";
      document.body.style.position = "";
      document.body.style.width = "";
    };
  }, []);

  const empList = (Array.isArray(users)?users:[]).filter(u => !MANAGERS.includes(u.key) && u.vorname !== userName);
  const targetShifts = targetUser ? (schedule[targetUser.vorname] || []) : [];

  function onDragStart(e) {
    e.stopPropagation();
    dragStartY.current = e.touches ? e.touches[0].clientY : e.clientY;
    dragStartH.current = sheetHeight;
  }
  function onDragMove(e) {
    e.stopPropagation();
    if (dragStartY.current == null) return;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    const dy = dragStartY.current - y;
    const newH = Math.min(92, Math.max(25, dragStartH.current + (dy / window.innerHeight * 100)));
    setSheetHeight(newH);
  }
  function onDragEnd(e) {
    e.stopPropagation();
    if (sheetHeight < 30) onClose();
    dragStartY.current = null;
  }

  function doSubmit() {
    if (!grund.trim()) { setErr("Bitte einen Grund angeben."); return; }
    const id = Date.now();
    const antrag = {
      id, status: "ausstehend_bestaetigung",
      initiator: userName,
      initiatorDate: myShift.d||myShift.date,
      initiatorFiliale: myShift.f||myShift.filiale,
      initiatorTime: myShift.t||myShift.time,
      partner: targetUser.vorname,
      partnerDate: targetShift.d||targetShift.date,
      partnerFiliale: targetShift.f||targetShift.filiale,
      partnerTime: targetShift.t||targetShift.time,
      grund, partnerBestaetigt: false, ts: Date.now(),
    };
    setTauschAntraege(prev => [...(Array.isArray(prev)?prev:[]), antrag]);
    // 파트너에게만 알림 전송 – 관리자 알림은 파트너 수락 후 전송
    if (window._fbDb && window._fbRef && window._fbSet) {
      window._fbSet(window._fbRef(window._fbDb, `notifications/tausch_anfrage_${id}`), {
        type: "tausch_anfrage", targetUser: targetUser.vorname,
        initiator: userName, antragId: id,
        myDate: antrag.partnerDate, myFiliale: antrag.partnerFiliale, myTime: antrag.partnerTime,
        theirDate: antrag.initiatorDate, theirFiliale: antrag.initiatorFiliale,

    onClose();
  }

  return (
    <div style={{position:"fixed",inset:0,zIndex:300}}
      onTouchMove={e=>e.stopPropagation()}>
      <div style={{position:"absolute",inset:0,background:"rgba(20,20,20,.4)"}}
        onClick={onClose}/>
      <div style={{
        position:"absolute", bottom:0, left:0, right:0,
        height:`${sheetHeight}vh`,
        background:C.card,
        borderRadius:"22px 22px 0 0",
        display:"flex", flexDirection:"column",
        boxShadow:"0 -4px 24px rgba(0,0,0,.15)",
      }}>
        {/* 드래그 핸들 */}
        <div
          onTouchStart={onDragStart} onTouchMove={onDragMove} onTouchEnd={onDragEnd}
          style={{padding:"14px 22px 8px",cursor:"ns-resize",flexShrink:0,touchAction:"none"}}>
          <div style={{width:36,height:4,background:C.border,borderRadius:99,margin:"0 auto"}}/>
        </div>

        {/* 헤더 */}
        <div style={{padding:"0 22px 10px",flexShrink:0}}>
          <div style={{display:"flex",gap:4,marginBottom:10}}>
            {steps.map((s,i)=>(
              <div key={i} style={{flex:1,height:3,borderRadius:99,
                background:i+1<=step?C.mint:C.border,transition:"background .2s"}}/>
            ))}
          </div>
          <div style={{fontSize:14,fontWeight:800,color:C.text}}>🔄 Schichttausch</div>
          <div style={{fontSize:11,color:C.muted,marginTop:2}}>
            {step===1&&"Welche Schicht möchtest du tauschen?"}
            {step===2&&"Mit wem möchtest du tauschen?"}
            {step===3&&`Welche Schicht von ${targetUser?.vorname}?`}
            {step===4&&"Zusammenfassung & Grund"}
          </div>
        </div>

        {/* 스크롤 콘텐츠 */}
        <div style={{flex:1,overflowY:"auto",padding:"0 22px",WebkitOverflowScrolling:"touch"}}>
          {step===1&&myShifts.map((s,i)=>{

            return(

          {step===2&&empList.map(u=>(

            : targetShifts.map((s,i)=>{

                      border:`2px solid ${targetShift===s?C.mint:C.border}`,
                      background:targetShift===s?C.mintLight:"#fff"}}>
                    <div style={{fontSize:12,fontWeight:700,color:targetShift===s?C.mintDark:C.text}}>

                );
              })
          )}

          {step===4&&(
            <div>
              <div style={{...S.card,background:C.mintLight,border:`1px solid ${C.mint}`,marginBottom:12}}>
                <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:8}}>TAUSCH ÜBERSICHT</div>
                <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
                  <div style={{flex:1,padding:"8px 10px",borderRadius:8,background:"#fff",border:`1px solid ${C.border}`}}>

                    <div style={{fontSize:11,fontWeight:700,color:C.text}}>

// ── MEINE SCHICHTEN SECTION ───────────────────────────────────────────────────
function MeineSchichtenSection({ userName, myShifts, records, users }) {
  const [showTausch, setShowTausch] = useState(false);
  const [tauschAntraege, setTauschAntraege] = useFirebase("schichttausch", []);
  const [antraege] = useFirebase("antraege", []);
  const [notifications, setNotifications] = useFirebase("notifications", {});
  const [schedule, setSchedule] = useFirebase("schedule", {});

  // 나에게 온 Tausch 수락 요청
  const pendingTausch = Object.entries(notifications||{})
    .filter(([,n]) => n.type==="tausch_anfrage" && n.targetUser===userName && !n.gelesen);

  function bestaetigenTausch(notifKey, antragId, ok) {
    // 알림 읽음 처리
    if (window._fbDb && window._fbRef && window._fbSet) {
      window._fbSet(window._fbRef(window._fbDb, `notifications/${notifKey}/gelesen`), true)
        .catch(e => console.error(e));
    }

    const list = Array.isArray(tauschAntraege) ? tauschAntraege : [];
    const antrag = list.find(a => a.id === antragId);
    if (!antrag) return;

    if (!ok) {
      setTauschAntraege(prev => (Array.isArray(prev)?prev:[]).map(a =>
        a.id===antragId ? {...a, status:"abgelehnt_partner"} : a
      ));
      return;
    }

    // 수락 → 즉시 schedule 교체 (관리자 승인 불필요)
    if (window._fbDb && window._fbRef && window._fbSet && window._fbOnValue) {
      // once는 unsubscribe 불필요 (onlyOnce: true)
      window._fbOnValue(window._fbRef(window._fbDb, "schedule"), snap => {
        const sched = snap.val() ? JSON.parse(JSON.stringify(snap.val())) : {};
        // initiator: 원래 날짜 제거 → 파트너 날짜 추가
        sched[antrag.initiator] = (sched[antrag.initiator]||[])
          .filter(s => (s.d||s.date) !== antrag.initiatorDate);
        sched[antrag.initiator] = [...sched[antrag.initiator],
          {d: antrag.partnerDate, f: antrag.partnerFiliale, t: antrag.partnerTime||null}];
        // partner: 원래 날짜 제거 → initiator 날짜 추가
        sched[antrag.partner] = (sched[antrag.partner]||[])
          .filter(s => (s.d||s.date) !== antrag.partnerDate);
        sched[antrag.partner] = [...sched[antrag.partner],
          {d: antrag.initiatorDate, f: antrag.initiatorFiliale, t: antrag.initiatorTime||null}];
        window._fbSet(window._fbRef(window._fbDb, "schedule"), sched)
          .then(() => console.log("✅ Schedule getauscht:", antrag.initiator, "↔", antrag.partner))
          .catch(e => console.error("Schedule swap error:", e));
      }, {onlyOnce: true});
    }

    // 상태 → getauscht
    setTauschAntraege(prev => (Array.isArray(prev)?prev:[]).map(a =>
      a.id===antragId ? {...a, status:"getauscht", partnerBestaetigt:true} : a
    ));

    // 관리자 2명 모두에게 알림 전송 (teddy + yeaji)
    if (window._fbDb && window._fbRef && window._fbSet) {
      const ts = Date.now();
      ["teddy","yeaji"].forEach(mgr => {
        window._fbSet(window._fbRef(window._fbDb, `notifications/tausch_manager_${antragId}_${mgr}`), {
          type: "tausch_manager", status: "partner_ok",
          kategorie: "Schichttausch",
          initiator: antrag.initiator, partner: antrag.partner,
          initiatorDate: antrag.initiatorDate, initiatorFiliale: antrag.initiatorFiliale,
          partnerDate: antrag.partnerDate, partnerFiliale: antrag.partnerFiliale,
          antragId, zustaendig: mgr, bearbeitetVon: null, gelesen: false, ts
        }).catch(e => console.error(e));
      });
    }
  }

  // 모든 항목(schichten + anträge)을 날짜 기준으로 묶기
  const myAntraege = (Array.isArray(antraege)?antraege:[]).filter(a => a.user === userName);
  const allDates = [...new Set([
    ...myShifts.map(s => s.d || s.date),
    ...myAntraege.map(a => a.date),
    ...(Array.isArray(records)?records:[]).filter(r => r.user === userName).map(r => r.date),
  ])].sort();

  return (
    <div style={{padding:"14px", borderTop:`1px solid ${C.border}`}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:".05em"}}>
          Meine Schichten & Anträge
        </div>
        <button onClick={()=>setShowTausch(true)}
          style={{fontSize:10,fontWeight:700,padding:"5px 10px",borderRadius:8,
            border:`1.5px solid ${C.mint}`,background:C.mintLight,color:C.mintDark,cursor:"pointer"}}>
          🔄 Schichttausch
        </button>
      </div>

      {/* 나에게 온 Tausch 수락 요청 */}
      {pendingTausch.map(([key, n]) => (
        <div key={key} style={{...S.card,marginBottom:10,border:`1.5px solid ${C.mint}`,background:C.mintLight}}>
          <div style={{fontSize:12,fontWeight:800,color:C.mintDark,marginBottom:4}}>
            🔄 Tausch-Anfrage von {n.initiator}
          </div>
          <div style={{fontSize:10,color:C.text,marginBottom:2}}>
            Du gibst ab: <strong>{new Date(n.myDate).toLocaleDateString("de-DE",{weekday:"short",day:"numeric",month:"numeric"})} · {n.myFiliale}</strong>
          </div>
          <div style={{fontSize:10,color:C.text,marginBottom:10}}>
            Du bekommst: <strong>{new Date(n.theirDate).toLocaleDateString("de-DE",{weekday:"short",day:"numeric",month:"numeric"})} · {n.theirFiliale}</strong>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>bestaetigenTausch(key, n.antragId, false)}
              style={{flex:1,padding:"8px",borderRadius:8,border:`1px solid ${C.border}`,
                background:"#fff",color:C.muted,fontWeight:700,fontSize:11,cursor:"pointer"}}>
              Ablehnen
            </button>
            <button onClick={()=>bestaetigenTausch(key, n.antragId, true)}
              style={{flex:2,padding:"8px",borderRadius:8,border:"none",
                background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,
                color:"#fff",fontWeight:800,fontSize:11,cursor:"pointer"}}>
              ✅ Bestätigen
            </button>
          </div>
        </div>
      ))}

      {allDates.map(d => {
        const shift = myShifts.find(s => (s.d||s.date) === d);
        const rec = (Array.isArray(records)?records:[]).find(r => r.user === userName && r.date === d);
        const antr = myAntraege.filter(a => a.date === d);
        const status = shift ? getShiftStatus({ time: shift.t||shift.time }, rec) : null;

        return (
          <div key={d} style={{marginBottom:14}}>
            {/* 날짜 헤더 */}
            <div style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:6}}>
              {new Date(d).toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"2-digit"})}
            </div>

            {/* 근무 카드 */}
            {shift && (
              <ShiftRow s={shift} userName={userName} records={records} setNotifications={setNotifications}/>
            )}

            {/* shift 없이 출근한 경우 */}
            {!shift && rec && (
              <div style={{padding:"9px 12px",borderRadius:10,marginBottom:5,
                background:C.mintLight,border:`1px solid ${C.mint}`,
                display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontSize:11,fontWeight:600,color:C.text}}>{rec.filiale} · {rec.ein} – {rec.aus||"läuft"}</div>
                <span style={{fontSize:11,fontWeight:700,color:C.mintDark}}>{stdLabel(rec.ein,rec.aus)}</span>
              </div>
            )}

            {/* 관련 Anträge 타임라인 */}
            {antr.map((a,i) => (
              <div key={i} style={{marginLeft:12,paddingLeft:10,borderLeft:`2px solid ${C.border}`,marginBottom:4}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                  padding:"7px 10px",borderRadius:8,background:"#fff",border:`1px solid ${C.border}`}}>
                  <div>
                    <div style={{fontSize:10,fontWeight:700,color:C.text}}>📌 Nachtrag · {a.filiale}</div>
                    <div style={{fontSize:9,color:C.muted}}>{a.ein} – {a.aus}</div>
                  </div>
                  <span style={S.pill(a.status)}>{a.status==="offen"?"Offen":a.status==="genehmigt"?"✅":"❌"}</span>
                </div>
              </div>
            ))}
          </div>
        );
      })}

      {allDates.length === 0 && (
        <div style={{textAlign:"center",color:C.muted,fontSize:12,padding:"20px 0"}}>Noch keine Schichten geplant.</div>
      )}

      {showTausch && (
        <SchichttauschModal userName={userName} myShifts={myShifts} users={users}
          onClose={()=>setShowTausch(false)}/>
      )}
    </div>
  );
}

            style={{...S.input,width:"100%",minHeight:80,resize:"none",fontFamily:"inherit"}}/>
        </div>
        {err&&<div style={{fontSize:11,color:C.red,marginBottom:10,fontWeight:600}}>⚠ {err}</div>}
        <div style={{fontSize:10,color:C.muted,marginBottom:14}}>
          ℹ️ Der Manager wird benachrichtigt. Nach Genehmigung wird deine Schicht als freie Schicht veröffentlicht.
        </div>
        <div style={{display:"flex",gap:9}}>
          <button onClick={onClose} style={{flex:1,padding:"12px",borderRadius:11,border:`1.5px solid ${C.border}`,background:C.card,color:C.muted,fontWeight:700,fontSize:13,cursor:"pointer"}}>Abbrechen</button>
          <button onClick={doSubmit} style={{flex:2,padding:"12px",borderRadius:11,border:"none",background:`linear-gradient(135deg,${C.red},#A8432E)`,color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}}>Absagen & senden</button>
        </div>
      </div>
    </div>
  );
}

function ShiftRow({ s, userName, records, setNotifications }) {
  const d = s.d || s.date;
  const f = s.f || s.filiale;
  const t = s.t || s.time;
  const actualRec = (Array.isArray(records)?records:[]).find(r => r.user === userName && r.date === d);
  const status = getShiftStatus({ time: t }, actualRec);
  const [showAbsagen, setShowAbsagen] = useState(false);
  const [absagenList, setAbsagenList] = useFirebase("absagen", []);
  const [tauschAntraege] = useFirebase("schichttausch", []);
  const [, setNotif] = useFirebase("notifications", {});

  useEffect(() => {
    if (status === "prüfen" && actualRec) {
      const zustaendig = f === "Teenjoy" ? "teddy" : "yeaji";
      const notifKey = `prüfen_${userName}_${d}`;
      setNotifications(prev => {
        if (prev && prev[notifKey]) return prev;
        return { ...(prev||{}), [notifKey]: {
          type: "prüfen", user: userName, date: d, filiale: f,
          plannedTime: t, actualEin: actualRec.ein, actualAus: actualRec.aus,
          zustaendig, gelesen: false, ts: Date.now()
        }};
      });
    }
  }, [status]);

  const alreadyAbgesagt = (Array.isArray(absagenList)?absagenList:[])
    .find(a => a.userName === userName && a.date === d);

  // Tausch 신청 상태 확인 (initiator 입장 A)
  const myTausch = (Array.isArray(tauschAntraege)?tauschAntraege:[])
    .find(t => t.initiator === userName && t.initiatorDate === d);
  // 파트너(B) 입장: 이 날짜에 tausch 요청 받은 경우
  const partnerTausch = !myTausch ? (Array.isArray(tauschAntraege)?tauschAntraege:[])
    .find(t => t.partner === userName && t.partnerDate === d) : null;

  const tauschLabel = myTausch ? ({
    ausstehend_bestaetigung: `🔄 Tausch-Anfrage an ${myTausch.partner} · Warte auf Bestätigung`,
    ausstehend_manager:      `🔄 Tausch wartet auf Manager-Genehmigung`,
    getauscht:               `✅ Getauscht mit ${myTausch.partner}`,
    abgelehnt_partner:       `❌ Tausch von ${myTausch.partner} abgelehnt`,
  }[myTausch.status] || null) : partnerTausch ? ({
    ausstehend_bestaetigung: `🔄 Tausch angefragt von ${partnerTausch.initiator} · Deine Antwort ausstehend`,
    getauscht:               `✅ Getauscht mit ${partnerTausch.initiator}`,
    abgelehnt_partner:       `❌ Tausch abgelehnt`,
  }[partnerTausch.status] || null) : null;

  function handleAbsagen(antrag) {
    setAbsagenList(prev => [...(Array.isArray(prev)?prev:[]), antrag]);
    // 관리자 2명 모두에게 알림 전송
    const ts = Date.now();
    if (window._fbDb && window._fbRef && window._fbSet) {
      ["teddy","yeaji"].forEach(mgr => {
        window._fbSet(window._fbRef(window._fbDb, `notifications/absagen_${antrag.id}_${mgr}`), {
          type: "absagen", kategorie: "Schichtabsage",
          user: userName, date: d, filiale: f, time: t,
          userName, grund: antrag.grund, absageId: antrag.id,
          zustaendig: mgr, bearbeitetVon: null, status: "offen", gelesen: false, ts
        }).catch(e => console.error(e));
      });
    }
  }

  // 상태별 배지 색상
  const badge = {
    gearbeitet: { color: C.mintDark, bg: C.mintLight, label: "Gearbeitet" },
    prüfen:     { color: C.yellow,   bg: C.yellowLight,label: "Prüfen"    },
    aktiv:      { color: C.yellow,   bg: "#FFF9E6",    label: "Im Dienst" },
    ausstehend: { color: C.muted,    bg: C.bg,         label: "Ausstehend"},
  }[alreadyAbgesagt ? "ausstehend" : status] || { color: C.muted, bg: C.bg, label: "Ausstehend" };

  return (
    <>
      <div style={{borderRadius:10,overflow:"hidden",marginBottom:6,
        border:`1px solid ${alreadyAbgesagt?C.red:status==="aktiv"||status==="gearbeitet"?C.mint:C.border}`}}>

        {/* 계획된 근무 행 */}
        <div onClick={()=>{ if(status==="ausstehend"&&!alreadyAbgesagt) setShowAbsagen(true); }}
          style={{display:"flex",alignItems:"center",justifyContent:"space-between",
            padding:"10px 12px",
            background:alreadyAbgesagt?C.redLight:C.card,
            cursor:status==="ausstehend"&&!alreadyAbgesagt?"pointer":"default"}}>
          <div style={{fontSize:12,fontWeight:600,color:alreadyAbgesagt?C.red:C.text}}>
            {f}{t ? ` · ${t}` : ""}
            {alreadyAbgesagt && <span style={{fontSize:10,color:C.red,marginLeft:6}}>🚫 Absage {alreadyAbgesagt.status==="offen"?"beantragt":alreadyAbgesagt.status==="genehmigt"?"genehmigt":"abgelehnt"}</span>}
          {tauschLabel && <div style={{fontSize:9,color:C.mintDark,marginTop:3,fontWeight:600}}>{tauschLabel}</div>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            {status==="ausstehend"&&!alreadyAbgesagt&&(
              <span style={{fontSize:8,color:C.muted}}>tippen</span>
            )}
            <span style={{fontSize:9,fontWeight:700,padding:"3px 8px",borderRadius:99,
              color:alreadyAbgesagt?C.red:badge.color,
              background:alreadyAbgesagt?"#fff":badge.bg,
              border:`1px solid ${alreadyAbgesagt?C.red:badge.color}`}}>
              {alreadyAbgesagt?"🚫 Abgesagt":badge.label}
            </span>
          </div>
        </div>

        {/* 실제 기록 행 (출근했을 때만) */}
        {actualRec && (
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
            padding:"8px 12px",
            background:status==="gearbeitet"?C.mintLight:status==="prüfen"?C.yellowLight:"#FFF9E6",
            borderTop:`1px dashed ${status==="gearbeitet"?C.mint:C.yellow}`}}>
            <div style={{fontSize:11,color:status==="gearbeitet"?C.mintDark:C.yellow,fontWeight:600}}>
              {f} · {actualRec.ein}–{actualRec.aus||"läuft"}
            </div>
            <span style={{fontSize:11,fontWeight:700,color:status==="gearbeitet"?C.mintDark:C.yellow}}>
              {actualRec.aus ? stdLabel(actualRec.ein, actualRec.aus) : "🟡"}
            </span>
          </div>
        )}
      </div>

      {showAbsagen&&(
        <AbsagenModal shift={s} userName={userName}
          onClose={()=>setShowAbsagen(false)} onSubmit={handleAbsagen}/>
      )}
    </>
  );
}

// ── EINSPRINGEN VIEW ──────────────────────────────────────────────────────────
function EinspringenView({ userName }) {
  const [freieSchichten, setFreieSchichten] = useFirebase("freieSchichten", []);
  const [, setNotifications] = useFirebase("notifications", {});
  const [schedule, setSchedule] = useFirebase("schedule", {});
  const [msg, setMsg] = useState(null);

  function einspringen(schicht) {
    // 내 일정에 추가
    setSchedule(prev => {
      const updated = { ...(prev||{}) };
      if (!updated[userName]) updated[userName] = [];
      updated[userName] = [...updated[userName], { d: schicht.date, f: schicht.filiale, t: schicht.time }];
      return updated;
    });
    // 빈 근무에서 제거
    setFreieSchichten(prev => (Array.isArray(prev)?prev:[]).filter(s => s.id !== schicht.id));
    // 관리자 2명 모두에게 알림
    const ts = Date.now();
    if (window._fbDb && window._fbRef && window._fbSet) {
      ["teddy","yeaji"].forEach(mgr => {
        window._fbSet(window._fbRef(window._fbDb, `notifications/einspringen_${schicht.id}_${mgr}`), {
          type: "einspringen", kategorie: "Einspringen",
          user: userName, date: schicht.date, filiale: schicht.filiale, time: schicht.time,
          zustaendig: mgr, bearbeitetVon: null, gelesen: false, ts
        }).catch(e => console.error(e));
      });
    }
    setMsg(`✅ Du bist jetzt für ${new Date(schicht.date).toLocaleDateString("de-DE")} in ${schicht.filiale} eingeplant!`);
    setTimeout(() => setMsg(null), 4000);
  }

  const offene = (Array.isArray(freieSchichten)?freieSchichten:[]).filter(s => !s.besetzt);

  return (
    <div style={{padding:"14px"}}>
      <div style={{...S.card,marginBottom:12,background:`linear-gradient(135deg,${C.mintLight},#f0f7fa)`,border:`1.5px solid ${C.mint}`}}>
        <div style={{fontSize:14,fontWeight:800,color:C.mintDark,marginBottom:4}}>🙋 Freie Schichten</div>
        <div style={{fontSize:11,color:C.muted}}>Hier kannst du offene Schichten übernehmen.</div>
      </div>

      {msg && (
        <div style={{padding:"11px 14px",borderRadius:10,background:C.mintLight,border:`1px solid ${C.mint}`,
          fontSize:12,fontWeight:600,color:C.mintDark,marginBottom:12}}>
          {msg}
        </div>
      )}

      {offene.length === 0 ? (
        <div style={{...S.card,textAlign:"center",padding:"32px 16px"}}>
          <div style={{fontSize:28,marginBottom:8}}>🎉</div>
          <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:4}}>Keine offenen Schichten</div>
          <div style={{fontSize:11,color:C.muted}}>Aktuell sind alle Schichten besetzt.</div>
        </div>
      ) : (
        offene.map(s => (
          <div key={s.id} style={{...S.card,marginBottom:10,border:`1.5px solid ${C.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div>
                <div style={{fontSize:13,fontWeight:800,color:C.text}}>
                  {new Date(s.date).toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"})}
                </div>
                <div style={{fontSize:11,color:C.muted,marginTop:2}}>{s.filiale}</div>
                {s.time&&<div style={{fontSize:11,fontWeight:600,color:C.mintDark,marginTop:2}}>🕐 {s.time}</div>}
                {s.note&&<div style={{fontSize:10,color:C.muted,marginTop:4}}>📌 {s.note}</div>}
              </div>
              <div style={{width:40,height:40,borderRadius:10,background:C.mintLight,
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>
                {s.filiale==="Teenjoy"?"🧋":"☕"}
              </div>
            </div>
            <button onClick={()=>einspringen(s)}
              style={{width:"100%",padding:"11px",borderRadius:10,border:"none",
                background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,
                color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}}>
              🙋 Ich springe ein!
            </button>
          </div>
        ))
      )}
    </div>
  );
}

function LoginView({onLogin,users,setUsers,getPin,setPin:savePinFn,csvCtx}){
  const now=useNow();
  const [page,setPage]=useState("list");
  const [selUser,setSelUser]=useState(null);
  const [pin,setPin]=useState("");
  const [err,setErr]=useState("");
  const [regV,setRegV]=useState("");
  const [regN,setRegN]=useState("");
  const [regP,setRegP]=useState("");
  const [regP2,setRegP2]=useState("");
  const [regErr,setRegErr]=useState("");
  const [regRole,setRegRole]=useState("Staff");
  const [regEmoji,setRegEmoji]=useState("");
  const ADMIN_NAMES=["yeaji","tingting","teddy","huy"];
  const safeUsers=Array.isArray(users)?users:[];
  const isAdminName=regV.trim().toLowerCase()!==""&&ADMIN_NAMES.includes(regV.trim().toLowerCase());
  const empList=[...safeUsers.filter(u=>!MANAGERS.includes(u.key))].sort((a,b)=>a.vorname.localeCompare(b.vorname));
  const mgrList=[...safeUsers.filter(u=>MANAGERS.includes(u.key))].sort((a,b)=>a.vorname.localeCompare(b.vorname));

  function selectUser(u){setSelUser(u);setPin("");setErr("");setPage("pin");}
  function back(){setPage("list");setSelUser(null);setPin("");setErr("");}
  function pinKey(k){
    if(pin.length>=4)return;
    const next=pin+k; setPin(next);
    if(next.length===4){
      // PIN은 localStorage에서 확인 (Firebase에 PIN 저장 안 함)
      const stored = getPin(selUser.key);
      const correct = stored || selUser.pin; // fallback to INIT pin
      if(next===correct) onLogin(selUser.key);
      else{setErr("Falsche PIN. Erneut versuchen.");setTimeout(()=>{setPin("");setErr("");},1400);}
    }
  }
  function doRegister(){
    if(!regV.trim()){setRegErr("Vorname ist Pflichtfeld.");return;}
    if(!/^\d{4}$/.test(regP)){setRegErr("PIN muss 4 Ziffern sein.");return;}
    if(regP!==regP2){setRegErr("PINs stimmen nicht überein.");return;}
    const vn=regV.trim(),nn=regN.trim(),em=regEmoji.trim(),key=vn.toLowerCase().replace(/\s+/g,"_")+"_"+Date.now();
    const isAdmin=isAdminName&&regRole==="Admin";
    const newUser={key,vorname:vn,nachname:nn,emoji:em,kuerzel:vn.slice(0,2),role:isAdmin?"Admin":"Staff",isAdmin,contractHours:0};
    savePinFn(key, regP);
    setUsers(prev=>[...(Array.isArray(prev)?prev:[]),newUser]);
    setRegV("");setRegN("");setRegEmoji("");setRegP("");setRegP2("");setRegErr("");setRegRole("Staff");setPage("list");
  }

  if(page==="kalender")return(
    <div style={{background:C.bg,minHeight:"100vh"}}>
      <div style={S.hdr}>
        <button onClick={()=>setPage("list")} style={S.backBtn}>← Zurück</button>
        <div style={{fontSize:18,fontWeight:800}}>Dienstplan</div>

      </div>
      <div style={{padding:"14px"}}><KalenderView csvCtx={csvCtx} records={[]}/></div>
    </div>
  );

  if(page==="pin"&&selUser){
    const isMgr=MANAGERS.includes(selUser.key);
    const dots=Array.from({length:4}).map((_,i)=>i<pin.length);
    return(
      <div style={{background:C.bg,minHeight:"100vh"}}>

          <button onClick={back} style={S.backBtn}>← Zurück</button>
          <div style={{display:"flex",alignItems:"center",gap:12}}>

            <div><div style={{fontSize:18,fontWeight:800}}>{selUser.emoji&&<span style={{marginRight:4}}>{selUser.emoji}</span>}{selUser.vorname}</div><div style={{fontSize:11,opacity:.45}}>{selUser.role}{selUser.nachname&&<span style={{opacity:.6}}> · {selUser.nachname}</span>}</div></div>
          </div>
        </div>
        <div style={{padding:"32px 24px",textAlign:"center"}}>
          <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:28}}>PIN eingeben</div>
          <div style={{display:"flex",justifyContent:"center",gap:18,marginBottom:8}}>
            {dots.map((f,i)=><div key={i} style={{width:16,height:16,borderRadius:"50%",background:f?(err?C.red:C.navy):C.border,transition:"background .15s"}}/>)}

// ── CLOCK MODAL ───────────────────────────────────────────────────────────────
function ClockModal({modal,now,selFiliale,clockFiliale,clockInTime,CLOCK_KEY,onClose,onEin,onAus}){
  const isEin = modal==="ein";
  const nowStr = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const [manualMode, setManualMode] = useState(false);
  const [manualTime, setManualTime] = useState(nowStr);

  const ausInvalid = !isEin && manualMode && clockInTime && (()=>{
    const [ah,am] = manualTime.split(":").map(Number);
    return (ah*60+am) - (clockInTime.getHours()*60+clockInTime.getMinutes()) <= 0;
  })();

  function doEin(){
    const t = manualMode ? manualTime : nowStr;
    const [h,m] = t.split(":").map(Number);
    const d = new Date(); d.setHours(h,m,0,0);
    onEin(d);
  }
  function doAus(){
    if(ausInvalid) return;
    const t = manualMode ? manualTime : nowStr;
    const inStr = `${pad(clockInTime.getHours())}:${pad(clockInTime.getMinutes())}`;
    onAus(inStr, t);
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(20,20,20,.55)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200}}>
      <div style={{background:C.card,borderRadius:"22px 22px 0 0",width:"100%",maxWidth:500,padding:"24px 22px 32px",paddingBottom:"max(32px,env(safe-area-inset-bottom))"}}>
        <div style={{width:36,height:4,background:C.border,borderRadius:99,margin:"0 auto 20px"}}/>
        <div style={{fontSize:16,fontWeight:800,color:C.text,marginBottom:4}}>
          {isEin?"Einstempeln bestätigen":"Ausstempeln bestätigen"}
        </div>
        <div style={{fontSize:12,color:C.muted,marginBottom:14}}>
          Filiale: <strong style={{color:C.text}}>{isEin?selFiliale:clockFiliale}</strong>
        </div>

        <div style={{marginBottom:16}}>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <button onClick={()=>setManualMode(false)}
              style={{flex:1,padding:"9px",borderRadius:9,fontSize:12,fontWeight:700,cursor:"pointer",
                border:`2px solid ${!manualMode?C.mint:C.border}`,
                background:!manualMode?C.mintLight:"#fff",
                color:!manualMode?C.mintDark:C.muted}}>
              🕐 Jetzt ({nowStr})
            </button>
            <button onClick={()=>setManualMode(true)}
              style={{flex:1,padding:"9px",borderRadius:9,fontSize:12,fontWeight:700,cursor:"pointer",
                border:`2px solid ${manualMode?C.yellow:C.border}`,
                background:manualMode?C.yellowLight:"#fff",
                color:manualMode?C.yellow:C.muted}}>
              ✏️ Zeit eingeben
            </button>
          </div>
          {manualMode&&(
            <div style={{background:C.yellowLight,borderRadius:10,padding:"12px 14px",border:`1.5px solid ${ausInvalid?C.red:C.yellow}`}}>
              <div style={{fontSize:10,fontWeight:700,color:C.yellow,marginBottom:6}}>
                {isEin?"Tatsächliche Einstempelzeit":"Tatsächliche Ausstempelzeit"}
              </div>
              <input type="time" value={manualTime} onChange={e=>setManualTime(e.target.value)}
                style={{...S.input,width:"80%",display:"block",margin:"0 auto",fontSize:20,fontWeight:700,textAlign:"center",borderColor:ausInvalid?C.red:C.yellow}}/>
              {!isEin&&clockInTime&&(()=>{
                const [ah,am]=manualTime.split(":").map(Number);
                const diff=(ah*60+am)-(clockInTime.getHours()*60+clockInTime.getMinutes());
                if(diff<=0) return(
                  <div style={{fontSize:11,color:C.red,fontWeight:700,marginTop:7,textAlign:"center"}}>
                    ⚠ Die Zeit liegt vor der Einstempelzeit ({pad(clockInTime.getHours())}:{pad(clockInTime.getMinutes())} Uhr)
                  </div>
                );
                return(
                  <div style={{fontSize:11,color:"#3a7a55",fontWeight:700,marginTop:7,textAlign:"center"}}>
                    ⏱ {Math.floor(diff/60)}h {diff%60}min Arbeitszeit
                  </div>
                );
              })()}
              {isEin&&(()=>{
                const [ah,am]=manualTime.split(":").map(Number);
                const diff=(now.getHours()*60+now.getMinutes())-(ah*60+am);
                if(diff<=0) return null;
                return(
                  <div style={{fontSize:11,color:C.yellow,fontWeight:700,marginTop:7,textAlign:"center"}}>
                    ⏱ {Math.floor(diff/60)}h {diff%60}min bereits vergangen
                  </div>
                );
              })()}
            </div>
          )}
        </div>

        <div style={{display:"flex",gap:9}}>
          <button onClick={onClose} style={{flex:1,padding:"12px",borderRadius:11,border:`1.5px solid ${C.border}`,background:C.card,color:C.muted,fontWeight:700,fontSize:13,cursor:"pointer"}}>Abbrechen</button>
          <button onClick={isEin?doEin:doAus} disabled={!!ausInvalid}
            style={{flex:2,padding:"12px",borderRadius:11,border:"none",
              background:ausInvalid?"#ccc":isEin?`linear-gradient(135deg,${C.mint},${C.mintDark})`:`linear-gradient(135deg,${C.red},#A8432E)`,
              color:"#fff",fontWeight:800,fontSize:14,cursor:ausInvalid?"not-allowed":"pointer",opacity:ausInvalid?0.6:1}}>
            {isEin?"Einstempeln":"Ausstempeln"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── MITARBEITER ───────────────────────────────────────────────────────────────
function MitarbeiterView({userKey,users,records,setRecords,antraege,setAntraege,onLogout,csvCtx}){
  const user=(Array.isArray(users)?users:[]).find(u=>u.key===userKey);
  const now=useNow();
  const [tab,setTab]=useState("home");

  // ── 근무 상태 localStorage 유지 ──────────────────────────────────────────────
  const CLOCK_KEY = `teeamo_clock_${userKey}`;
  const [clockedIn,setClockedIn]=useState(()=>{
    try { const s=localStorage.getItem(CLOCK_KEY); return s?JSON.parse(s).clockedIn:false; } catch{return false;}
  });
  const [clockInTime,setClockInTime]=useState(()=>{
    try { const s=localStorage.getItem(CLOCK_KEY); const v=s?JSON.parse(s).clockInTime:null; return v?new Date(v):null; } catch{return null;}
  });
  const [clockFiliale,setClockFiliale]=useState(()=>{
    try { const s=localStorage.getItem(CLOCK_KEY); return s?JSON.parse(s).clockFiliale:""; } catch{return "";}
  });

  // 상태 바뀔 때마다 즉시 저장
  useEffect(()=>{
    try { localStorage.setItem(CLOCK_KEY, JSON.stringify({clockedIn, clockInTime:clockInTime?clockInTime.toISOString():null, clockFiliale})); } catch{}
  },[clockedIn, clockInTime, clockFiliale]);

  const [selFiliale,setSelFiliale]=useState(FILIALEN[0]);
  const [grund,setGrund]=useState("");
  const [elapsed,setElapsed]=useState(()=>{
    // 앱 재시작 시 이미 근무 중이면 경과시간 복원
    try {
      const s=localStorage.getItem(CLOCK_KEY); const v=s?JSON.parse(s):null;
      if(v&&v.clockedIn&&v.clockInTime) return Math.floor((Date.now()-new Date(v.clockInTime).getTime())/1000);
    } catch{}
    return 0;
  });
  const [modal,setModal]=useState(null);
  const [nDatum,setNDatum]=useState(today());
  const [nFiliale,setNFiliale]=useState(FILIALEN[0]);
  const [nEin,setNEin]=useState("09:00");
  const [nAus,setNAus]=useState("17:00");
  const [nGrund,setNGrund]=useState("");
  const [nMsg,setNMsg]=useState("");

  useEffect(()=>{
    if(!clockedIn){setElapsed(0);return;}
    const t=setInterval(()=>setElapsed(e=>e+1),1000); return()=>clearInterval(t);
  },[clockedIn]);

  const displayName=(user.emoji?user.emoji+" ":"")+user.vorname;
  const myRecs=records.filter(r=>r.user===user.vorname);
  const myAntraege=antraege.filter(a=>a.user===user.vorname);
  const monthSummary=FILIALEN.map(f=>({f,h:myRecs.filter(r=>r.filiale===f&&r.aus).reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0)})).filter(x=>x.h>0);

  // Dienstplan 탭 뱃지: 나에게 온 Tausch 요청 수
  const [_notifications] = useFirebase("notifications", {});
  const pendingTauschCount = Object.values(_notifications||{})
    .filter(n => n.type==="tausch_anfrage" && n.targetUser===user.vorname && !n.gelesen).length;

  function handleEin(){setClockedIn(true);setClockInTime(new Date());setClockFiliale(selFiliale);setModal(null);}
  function handleAus(){
    const outStr=`${pad(now.getHours())}:${pad(now.getMinutes())}`;
    const inStr=`${pad(clockInTime.getHours())}:${pad(clockInTime.getMinutes())}`;
    setRecords(prev=>[...prev,{id:Date.now(),user:user.vorname,date:today(),filiale:clockFiliale,ein:inStr,aus:outStr,note:grund,typ:"normal"}]);
    setClockedIn(false);setClockInTime(null);setElapsed(0);setGrund("");setModal(null);
    try{localStorage.removeItem(CLOCK_KEY);}catch{}
  }
  function submitNachtrag(){
    if(!nGrund.trim()){setNMsg("Bitte einen Grund angeben.");return;}
    const id = Date.now();
    const ts = id;
    // Firebase에 직접 저장 (antraege배열 + 양쪽 관리자 notifications)
    setAntraege(prev=>[...prev,{id,user:user.vorname,date:nDatum,filiale:nFiliale,ein:nEin,aus:nAus,grund:nGrund,status:"offen",zustaendig:"all"}]);
    if (window._fbDb && window._fbRef && window._fbSet) {
      ["teddy","yeaji"].forEach(mgr => {
        window._fbSet(window._fbRef(window._fbDb, `notifications/nachtrag_${id}_${mgr}`), {
          type: "nachtrag", kategorie: "Nachtrag",
          user: user.vorname, date: nDatum, filiale: nFiliale, ein: nEin, aus: nAus,
          grund: nGrund, antragId: id,
          zustaendig: mgr, bearbeitetVon: null, status: "offen", gelesen: false, ts
        }).catch(e => console.error(e));
      });
    }
    setNMsg("Antrag eingereicht! Wird von Yeaji oder Teddy geprüft.");setNGrund("");
  }

  const elStr=`${pad(Math.floor(elapsed/3600))}:${pad(Math.floor((elapsed%3600)/60))}:${pad(elapsed%60)}`;
  const timeStr=`${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

  return(
    <div style={{background:C.bg,minHeight:"100vh",paddingBottom:80}}>
      <div style={S.hdr}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:11,opacity:.45,marginBottom:3,letterSpacing:".06em",textTransform:"uppercase"}}>teeamo Münster</div>
            <div style={{fontSize:20,fontWeight:800}}>{displayName}</div>
            <div style={{fontSize:11,opacity:.5,marginTop:1}}>{user.role}</div>
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:7}}>
            <div style={{width:38,height:38,borderRadius:"50%",background:C.mint,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,color:C.navy}}>{user.kuerzel}</div>
            <button onClick={onLogout} style={{fontSize:10,background:"rgba(255,255,255,.1)",border:"0.5px solid rgba(255,255,255,.2)",color:"rgba(255,255,255,.6)",borderRadius:7,padding:"3px 8px",cursor:"pointer"}}>Abmelden</button>
          </div>
        </div>
        <div style={{marginTop:14,background:"rgba(255,255,255,.07)",borderRadius:12,padding:"11px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:9,opacity:.4,marginBottom:2}}>Aktuelle Uhrzeit</div>
            <div style={{fontSize:24,fontWeight:700,fontVariantNumeric:"tabular-nums"}}>{timeStr}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:9,opacity:.4,marginBottom:2}}>Heute</div>
            <div style={{fontSize:12,fontWeight:600}}>{new Date().toLocaleDateString("de-DE")}</div>
          </div>
        </div>
      </div>

      {clockedIn&&(
        <div style={{background:"#d4f0e0",borderBottom:`2px solid #a8dfc0`,padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:90}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:9,height:9,borderRadius:"50%",background:"#3a9e68",boxShadow:"0 0 0 3px rgba(58,158,104,.25)",animation:"pulse 1.4s infinite"}}/>
            <div>
              <div style={{fontSize:12,fontWeight:800,color:"#1a5c38"}}>Im Dienst · {clockFiliale}</div>
              <div style={{fontSize:10,color:"#3a7a55"}}>
                {clockInTime?`seit ${pad(clockInTime.getHours())}:${pad(clockInTime.getMinutes())} Uhr`:""} · {elStr}
              </div>
            </div>
          </div>
          <button onClick={()=>{setModal("aus");setTab("home");}}
            style={{fontSize:11,fontWeight:800,color:"#fff",background:"#3a9e68",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer"}}>
            Ausstempeln
          </button>
        </div>
      )}

      {tab==="home"&&(
        <div style={{padding:"18px 16px"}}>
          <div style={{textAlign:"center",marginBottom:18}}>
            <button onClick={()=>setModal(clockedIn?"aus":"ein")}
              style={{width:144,height:144,borderRadius:"50%",border:"none",cursor:"pointer",
                background:clockedIn?C.red:`linear-gradient(145deg,${C.mint},${C.mintDark})`,
                color:"#fff",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                gap:4,margin:"0 auto",boxShadow:clockedIn?`0 8px 28px rgba(196,96,74,.4)`:`0 8px 28px rgba(92,127,148,.4)`,transition:"all .2s"}}
              onTouchStart={e=>e.currentTarget.style.transform="scale(.96)"} onTouchEnd={e=>e.currentTarget.style.transform="scale(1)"}>
              <span style={{fontSize:15,fontWeight:800}}>{clockedIn?"Ausstempeln":"Einstempeln"}</span>
              {clockedIn&&<span style={{fontSize:11,opacity:.85,fontVariantNumeric:"tabular-nums"}}>{elStr}</span>}
            </button>
            <div style={{marginTop:9,fontSize:12,color:C.muted}}>
              {clockedIn?<span>Eingecheckt: <span style={{color:C.mintDark,fontWeight:700}}>{clockFiliale}</span></span>:"Filiale wählen & einstempeln"}
            </div>
          </div>
          {!clockedIn&&(
            <div style={{...S.card,marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:700,color:C.text,marginBottom:7}}>Filiale auswählen</div>
              <div style={{display:"flex",gap:7}}>
                {FILIALEN.map(f=>(
                  <button key={f} onClick={()=>setSelFiliale(f)} style={{flex:1,padding:"8px 2px",borderRadius:9,fontSize:10,fontWeight:700,cursor:"pointer",border:`2px solid ${selFiliale===f?C.mint:C.border}`,background:selFiliale===f?C.mintLight:"#fff",color:selFiliale===f?C.mintDark:C.muted}}>{f}</button>
                ))}
              </div>
            </div>
          )}
          <div style={{...S.card,marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:700,color:C.text,marginBottom:5}}>Grund <span style={{fontWeight:400,color:C.muted}}>(optional)</span></div>
            <textarea value={grund} onChange={e=>setGrund(e.target.value)} placeholder="z. B. früher erschienen wegen Lieferung…" style={{width:"100%",height:58,borderRadius:9,border:`1.5px solid ${C.border}`,padding:"8px 10px",fontSize:11,color:C.text,outline:"none",background:C.bg}}/>
          </div>
          <div style={S.card}>
            <div style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:9,letterSpacing:".05em",textTransform:"uppercase"}}>Monatsübersicht</div>

              <div key={f} style={{display:"flex",justifyContent:"space-between",paddingBottom:7,marginBottom:7,borderBottom:`1px solid ${C.border}`}}>
                <span style={{fontSize:12,color:C.text}}>{f}</span>
                <span style={{fontSize:12,fontWeight:700,color:C.mintDark}}>{h.toFixed(1)} Std.</span>
              </div>
            ))}
            {monthSummary.length>0&&<div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:12,fontWeight:700,color:C.text}}>Gesamt</span><span style={{fontSize:12,fontWeight:800,color:C.navy}}>{monthSummary.reduce((a,x)=>a+x.h,0).toFixed(1)} Std.</span></div>}
          </div>
        </div>
      )}

      {tab==="dienstplan"&&(
        <div style={{padding:"14px"}}>

            <div style={{marginBottom:12}}>
              <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:4}}>Grund <span style={{color:C.red}}>*</span></div>

          </div>

// ── STATISTIK ─────────────────────────────────────────────────────────────────
function StatistikTab({records,users}){
  const [selMonth,setSelMonth]=useState("2026-06");
  const [exported,setExported]=useState(null);
  const empList=(Array.isArray(users)?users:[]).filter(u=>!MANAGERS.includes(u.key)).sort((a,b)=>a.vorname.localeCompare(b.vorname));
  const monthRecs=records.filter(r=>r.date.startsWith(selMonth)&&r.aus);

  function downloadCSV(rows,filename){
    const bom="\uFEFF";
    const csv=bom+rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(";")).join("\r\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=filename;a.click();
    URL.revokeObjectURL(url);
    setExported(filename);setTimeout(()=>setExported(null),3000);
  }
  function downloadXLSX(rows, filename, sheetName="Daten") {
    try {
      const ws = window.XLSX.utils.aoa_to_sheet(rows);
      // 헤더 행 굵게 (기본 스타일)
      const wb = window.XLSX.utils.book_new();
      window.XLSX.utils.book_append_sheet(wb, ws, sheetName);
      window.XLSX.writeFile(wb, filename);
      setExported(filename);setTimeout(()=>setExported(null),3000);
    } catch(e) {
      // fallback to CSV if XLSX unavailable
      downloadCSV(rows, filename.replace(".xlsx",".csv"));
    }
  }
  function exportDetail(fmt="xlsx"){
    const hdr=["Name","Datum","Wochentag","Filiale","Einstempeln","Ausstempeln","Arbeitsstunden","Typ","Anmerkung"];
    const rows=[hdr,...[...monthRecs].sort((a,b)=>a.date.localeCompare(b.date)).map(r=>{
      const h=stunden(r.ein,r.aus);
      return[r.user,r.date,TAGE_DE[new Date(r.date).getDay()],r.filiale,r.ein,r.aus,h!=null?h.toFixed(2):"",r.typ==="nachtrag"?"Nachtrag":"Normal",r.note||""];
    })];
    if(fmt==="xlsx") downloadXLSX(rows,`Stundennachweis_Detail_${selMonth}.xlsx`,"Stundennachweis");
    else downloadCSV(rows,`Stundennachweis_Detail_${selMonth}.csv`);
  }
  function exportSummary(fmt="xlsx"){
    const hdr=["Name","Rolle","Arbeitstage","Gesamtstunden","TEEAMO Arkaden (Std)","TEEAMO Aegidiimarkt (Std)","Teenjoy (Std)","Ø Std/Tag"];
    const rows=[hdr,...empList.map(emp=>{
      const er=monthRecs.filter(r=>r.user===emp.vorname);
      const total=er.reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0);
      const byFil={};FILIALEN.forEach(f=>{byFil[f]=er.filter(r=>r.filiale===f).reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0);});
      return[emp.vorname,emp.role,er.length,Number(total.toFixed(2)),Number(byFil["TEEAMO Arkaden"].toFixed(2)),Number(byFil["TEEAMO Aegidiimarkt"].toFixed(2)),Number(byFil["Teenjoy"].toFixed(2)),er.length?Number((total/er.length).toFixed(2)):0];
    })];
    if(fmt==="xlsx") downloadXLSX(rows,`Monatsübersicht_${selMonth}.xlsx`,"Monatsübersicht");
    else downloadCSV(rows,`Monatsübersicht_${selMonth}.csv`);
  }

  return(
    <div style={{padding:"14px"}}>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:7,letterSpacing:".06em",textTransform:"uppercase"}}>Monat auswählen</div>
        <div style={{display:"flex",gap:7}}>
          {MONTHS.map(m=>(
            <button key={m} onClick={()=>setSelMonth(m)} style={{flex:1,padding:"8px 2px",borderRadius:9,fontSize:10,fontWeight:700,cursor:"pointer",border:`2px solid ${selMonth===m?C.mint:C.border}`,background:selMonth===m?C.mintLight:"#fff",color:selMonth===m?C.mintDark:C.muted}}>
              {MONTH_LABELS[m]}
            </button>
          ))}
        </div>
      </div>
      <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:8,letterSpacing:".06em",textTransform:"uppercase"}}>Übersicht – {MONTH_LABELS[selMonth]}</div>
      <div style={{display:"flex",flexDirection:"column",gap:9,marginBottom:14}}>
        {empList.map(emp=>{
          const er=monthRecs.filter(r=>r.user===emp.vorname);
          const total=er.reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0);
          const byFil={};FILIALEN.forEach(f=>{byFil[f]=er.filter(r=>r.filiale===f).reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0);});
          const fColors=[C.mintLight,C.yellowLight,C.redLight];
          const fTColors=[C.mintDark,"#b37400",C.red];
          const contract = emp.contractHours || 0;
          const diff = contract > 0 ? total - contract : null;
          return(
            <div key={emp.key} style={S.card}>
              <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:9}}>
                <div style={{width:34,height:34,borderRadius:"50%",background:C.navy,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:emp.emoji?18:12,color:"#fff",flexShrink:0}}>{emp.emoji||emp.kuerzel}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:800,color:C.text}}>{emp.emoji&&<span style={{marginRight:3}}>{emp.emoji}</span>}{emp.vorname}</div>
                  <div style={{fontSize:9,color:C.muted}}>{emp.role}{contract>0?` · Vertrag: ${contract}h`:""}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:18,fontWeight:800,color:C.mintDark}}>{total.toFixed(1)}<span style={{fontSize:10,color:C.muted}}> Std</span></div>
                  <div style={{fontSize:9,color:C.muted}}>{er.length} Tage</div>
                  {diff !== null && (
                    <div style={{fontSize:10,fontWeight:700,color:diff>=0?C.mintDark:C.red}}>
                      {diff>=0?`+${diff.toFixed(1)}h Mehr`:`${diff.toFixed(1)}h Weniger`}
                    </div>
                  )}
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:5}}>
                {FILIALEN.map((f,fi)=>(
                  <div key={f} style={{background:fColors[fi],borderRadius:7,padding:"6px 7px"}}>
                    <div style={{fontSize:8,fontWeight:700,color:fTColors[fi],marginBottom:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{f}</div>
                    <div style={{fontSize:12,fontWeight:800,color:fTColors[fi]}}>{byFil[f].toFixed(1)}h</div>
                    <div style={{fontSize:8,color:fTColors[fi],opacity:.7}}>{er.filter(r=>r.filiale===f).length}d</div>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{background:C.navy,borderRadius:14,padding:"16px",marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:800,color:"#fff",marginBottom:3}}>📥 Daten exportieren</div>
        <div style={{fontSize:10,color:"rgba(255,255,255,.4)",marginBottom:14}}>Excel oder CSV – öffnet direkt in Excel</div>
        {[
          {title:"Stundennachweis (Details)",sub:"Jeder Tag · Name · Datum · Filiale · Ein/Aus · Std",fnXlsx:()=>exportDetail("xlsx"),fnCsv:()=>exportDetail("csv"),file:`Detail_${selMonth}`},
          {title:"Monatsübersicht (Zusammenfassung)",sub:"Pro Mitarbeiterin · Gesamtstunden · je Filiale",fnXlsx:()=>exportSummary("xlsx"),fnCsv:()=>exportSummary("csv"),file:`Übersicht_${selMonth}`},
        ].map(({title,sub,fnXlsx,fnCsv,file})=>(
          <div key={file} style={{background:"rgba(255,255,255,.07)",borderRadius:10,padding:"12px",marginBottom:8}}>
            <div style={{fontSize:12,fontWeight:700,color:"#fff",marginBottom:2}}>{title}</div>
            <div style={{fontSize:9,color:"rgba(255,255,255,.4)",marginBottom:10}}>{sub}</div>
            <div style={{display:"flex",gap:7}}>
              <button onClick={fnXlsx} style={{flex:2,padding:"10px",borderRadius:8,border:"none",background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,color:"#fff",fontWeight:800,fontSize:11,cursor:"pointer"}}>⬇ Excel (.xlsx)</button>
              <button onClick={fnCsv} style={{flex:1,padding:"10px",borderRadius:8,border:`1px solid rgba(255,255,255,.2)`,background:"transparent",color:"rgba(255,255,255,.6)",fontWeight:700,fontSize:10,cursor:"pointer"}}>CSV</button>
            </div>
          </div>
        ))}
      </div>
      {exported&&(
        <div style={{...S.card,display:"flex",alignItems:"center",gap:9,border:`1.5px solid ${C.mint}`,background:C.mintLight}}>
          <span style={{fontSize:18}}>✅</span>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:C.mintDark}}>Datei gespeichert!</div>
            <div style={{fontSize:10,color:C.mintDark,opacity:.8}}>{exported}</div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── DIENSTPLAN UPLOAD + AI ANALYSE ───────────────────────────────────────────
function DienstplanUploadView({ records, users }) {
  const [apiKey, setApiKey] = usePersist("teeamo_apikey", "");
  const [schedule, setSchedule, scheduleReady] = useFirebase("schedule", {});
  const [imgSrc, setImgSrc] = useState(null);
  const [analyzing, setAnalyzing] = useState(false);
  const [msg, setMsg] = useState(null);
  const [showKeyInput, setShowKeyInput] = useState(false);
  const fileRef = useRef(null);

  // plan.png도 Firebase Storage 대신 base64로 Firebase에 저장
  const [planImg, setPlanImg, planReady] = useFirebase("planImage", null);

  // 이미지 선택 → 분석
  async function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (!apiKey) { setShowKeyInput(true); return; }

    // HEIC/HEIF 체크
    if (file.type === "image/heic" || file.type === "image/heif" || file.name.toLowerCase().endsWith(".heic")) {
      setMsg({ type: "err", text: "❌ HEIC 형식은 지원되지 않아요. JPEG로 변환 후 업로드해주세요." });
      return;
    }

    const isPdf = file.type === "application/pdf";

    // 파일 크기 체크 (PDF 20MB, 이미지 5MB)
    const maxSize = isPdf ? 20 * 1024 * 1024 : 5 * 1024 * 1024;
    if (file.size > maxSize) {
      setMsg({ type: "err", text: `❌ Datei zu groß (${(file.size/1024/1024).toFixed(1)}MB). Max: ${isPdf?"20MB":"5MB"}` });
      return;
    }

    setAnalyzing(true);
    setMsg({ type: "info", text: "⏳ Analysiere… (kann 20–40 Sek. dauern)" });

    const b64 = await new Promise(res => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(",")[1]);
      r.readAsDataURL(file);
    });
    const dataUrl = isPdf ? null : `data:${file.type};base64,${b64}`;
    if (!isPdf) setImgSrc(dataUrl);

    const empNames = (Array.isArray(users)?users:[]).filter(u => !MANAGERS.includes(u.key)).map(u => u.vorname).join(", ");
    const promptText = `Du bist ein Assistent, der Dienstpläne analysiert. Analysiere diesen Dienstplan sehr sorgfältig.

WICHTIG: Erkenne nur Namen aus dieser exakten Liste (Groß-/Kleinschreibung ignorieren):
${empNames}

Regeln:
- Jeder Name in der Liste entspricht GENAU einem Mitarbeiter. Ordne gefundene Namen der Liste zu (auch bei leichten Schreibfehlern im Bild).
- Filialen: "Arkaden" oder "TEEAMO Arkaden" → "TEEAMO Arkaden"; "Aegidiimarkt" oder "Aegidiimarkt" oder ähnlich → "TEEAMO Aegidiimarkt"; "Teenjoy" oder "TEEnJOY" → "Teenjoy"
- Datum: Jahr ${new Date().getFullYear()}, Format YYYY-MM-DD
- Zeit: Format HH:MM-HH:MM (z.B. "09:00-17:00"), null wenn nicht angegeben
- Ignoriere Namen die NICHT in der obigen Liste sind

Antworte NUR mit validem JSON, ohne jeglichen anderen Text, keine Markdown-Backticks:
{"VornameGenauWieInListe":[{"d":"YYYY-MM-DD","f":"TEEAMO Arkaden","t":"09:00-17:00"}]}

Verwende die Vornamen EXAKT so wie sie in der Liste stehen.`;

    const contentBlock = isPdf
      ? { type: "document", source: { type: "base64", media_type: "application/pdf", data: b64 } }
      : { type: "image", source: { type: "base64", media_type: file.type, data: b64 } };

    try {
      let res;
      try {
        res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": apiKey,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true",
          },
          body: JSON.stringify({
            model: "claude-sonnet-4-6",
            max_tokens: 8000,
            messages: [{
              role: "user",
              content: [ contentBlock, { type: "text", text: promptText } ]
            }]
          })
        });
      } catch(fetchErr) {
        throw new Error(`Netzwerkfehler: ${fetchErr.message}. Bitte API-Schlüssel prüfen und erneut versuchen.`);
      }

      if (!res.ok) {
        let errBody = "";
        try { const j = await res.json(); errBody = j.error?.message || JSON.stringify(j); } catch{}
        throw new Error(`API ${res.status}: ${errBody}`);
      }
      const data = await res.json();
      const text = data.content.map(c => c.text || "").join("");
      const clean = text.replace(/```json|```/g, "").trim();
      let parsed;
      try {
        const raw = JSON.parse(clean);
        // 짧은 키(d/f/t) → 긴 키(date/filiale/time) 변환
        parsed = {};
        for (const [name, shifts] of Object.entries(raw)) {
          parsed[name] = (shifts || []).map(s => ({
            date: s.date || s.d,
            filiale: s.filiale || s.f,
            time: s.time || s.t || null,
          }));
        }
      } catch(pe) {
        console.error("Raw response:", text);
        throw new Error(`Raw: ${text.slice(0, 200)}`);
      }

      // Firebase에 저장: 배열값을 인덱스 객체로 변환 (Firebase 배열 호환)
      const parsedForFb = {};
      for (const [name, shifts] of Object.entries(parsed)) {
        parsedForFb[name] = Object.fromEntries((shifts||[]).map((s,i)=>[String(i),s]));
      }
      if (window._fbDb && window._fbRef && window._fbSet) {
        window._fbSet(window._fbRef(window._fbDb, "schedule"), parsedForFb)
          .then(()=>console.log("✅ schedule saved:", Object.keys(parsedForFb)))
          .catch(e=>console.error("schedule save error:", e));
      }
      setSchedule(parsed);
      // 이미지만 Firebase에 저장 (PDF는 저장 안 함)
      if (!isPdf && b64.length < 4000000) {
        setPlanImg(dataUrl);
      }
      setMsg({ type: "ok", text: `✅ 분석 완료! ${Object.keys(parsed).length}명의 일정을 추출했어요.` });
    } catch (err) {
      setMsg({ type: "err", text: `❌ 오류: ${err.message}` });
    }
    setAnalyzing(false);
  }

  const displayImg = imgSrc || planImg;

  return (
    <div style={{padding:"14px"}}>

      {/* API 키 입력 */}
      {showKeyInput && (
        <div style={{...S.card, marginBottom:12, border:`1.5px solid ${C.yellow}`}}>
          <div style={{fontSize:12,fontWeight:800,color:C.text,marginBottom:6}}>🔑 Anthropic API-Schlüssel</div>
          <input value={apiKey} onChange={e=>setApiKey(e.target.value)}
            placeholder="sk-ant-..."
            style={{...S.input, width:"100%", fontSize:11, marginBottom:8}}/>
          <button onClick={()=>setShowKeyInput(false)}
            style={{width:"100%",padding:"9px",borderRadius:9,border:"none",background:C.mint,color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}}>
            Speichern
          </button>
        </div>
      )}

      {/* 업로드 버튼 */}
      <div style={{...S.card, marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:800,color:C.text,marginBottom:4}}>📋 Dienstplan hochladen</div>
        <div style={{fontSize:10,color:C.muted,marginBottom:12}}>Bild hochladen → KI analysiert automatisch die Schichten</div>
        <input ref={fileRef} type="file" accept="image/jpeg,image/png,image/webp,image/gif,application/pdf" onChange={handleFile} style={{display:"none"}}/>
        <button onClick={()=>fileRef.current.click()} disabled={analyzing}
          style={{width:"100%",padding:"12px",borderRadius:11,border:`2px dashed ${C.mint}`,
            background:C.mintLight,color:C.mintDark,fontWeight:800,fontSize:13,cursor:"pointer",
            opacity:analyzing?0.6:1}}>
          {analyzing ? "⏳ KI analysiert…" : "📷 Bild oder PDF auswählen & analysieren"}
        </button>
        {!apiKey&&(
          <button onClick={()=>setShowKeyInput(true)}
            style={{marginTop:8,width:"100%",padding:"7px",borderRadius:8,border:`1px solid ${C.border}`,background:"#fff",color:C.muted,fontSize:10,cursor:"pointer"}}>
            🔑 API-Schlüssel eingeben
          </button>
        )}
        {apiKey&&(
          <button onClick={()=>setShowKeyInput(v=>!v)}
            style={{marginTop:8,width:"100%",padding:"7px",borderRadius:8,border:`1px solid ${C.border}`,background:"#fff",color:C.muted,fontSize:10,cursor:"pointer"}}>
            🔑 API-Schlüssel ändern
          </button>
        )}
        {msg&&(
          <div style={{marginTop:10,padding:"9px 12px",borderRadius:9,
            background:msg.type==="ok"?C.mintLight:C.redLight,
            color:msg.type==="ok"?C.mintDark:C.red,fontSize:11,fontWeight:600}}>
            {msg.text}
          </div>
        )}
      </div>

      {/* 근무표 이미지 */}
      {displayImg && (
        <div style={{marginBottom:12}}>
          <img src={displayImg} alt="Dienstplan"
            style={{width:"100%",height:"auto",borderRadius:14,display:"block"}}/>
        </div>
      )}

      {/* 추출된 일정 */}
      {schedule && Object.keys(schedule).length > 0 && (
        <div>
          <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:9,textTransform:"uppercase",letterSpacing:".05em"}}>
            Extrahierte Schichten
          </div>
          {Object.entries(schedule).map(([name, shifts]) => {
            if (!Array.isArray(shifts) || shifts.length === 0) return null;
            return (
              <div key={name} style={{...S.card, marginBottom:10}}>
                <div style={{fontSize:13,fontWeight:800,color:C.text,marginBottom:8}}>{name}</div>
                {shifts.map((s, i) => {
                  const actualRec = records.find(r => r.user === name && r.date === s.date);
                  const status = !actualRec ? "ausstehend" : !actualRec.aus ? "aktiv" : "erledigt";
                  return (
                    <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",
                      padding:"8px 10px",borderRadius:9,marginBottom:5,
                      background:status==="erledigt"?C.mintLight:status==="aktiv"?"#FFF9E6":C.bg}}>
                      <div>
                        <div style={{fontSize:11,fontWeight:700,color:C.text}}>

          const raw = snap.val() ? JSON.parse(JSON.stringify(snap.val())) : {};
          // Firebase 배열 → 실제 배열 정규화
          const norm = (v) => !v ? [] : Array.isArray(v) ? v : Object.values(v);
          const sched = {};
          for (const [k,v] of Object.entries(raw)) sched[k] = norm(v);
          sched[antrag.initiator] = (sched[antrag.initiator]||[])
            .filter(s => (s.d||s.date) !== antrag.initiatorDate);
