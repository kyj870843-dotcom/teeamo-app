//  PIN LocalStorage  () 
function lsGet(key, fallback) {
  try { const v=localStorage.getItem(key); if(v!==null) return JSON.parse(v); return fallback; } catch { return fallback; }
}
function lsSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

// API     localStorage 
function usePersist(lsKey, init) {
  const [state, setState] = React.useState(() => lsGet(lsKey, init));
  const setAndSave = React.useCallback((updater) => {
    setState(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      lsSet(lsKey, next);
      return next;
    });
  }, [lsKey]);
  return [state, setAndSave];
}

// 계정 삭제 시 관련 Firebase 데이터 모두 삭제
function deleteUserData(userKey, vorname) {
  if (!window._fbDb || !window._fbRef || !window._fbRemove) return;
  const fb = window._fbRef;
  const db = window._fbDb;
  const rm = window._fbRemove;
  // PIN 삭제
  rm(fb(db, `pins/${userKey}`)).catch(()=>{});
  // records 삭제 (해당 유저)
  if (window._fbGet) {
    window._fbGet(fb(db, "records")).then(snap=>{
      const data = snap.val();
      if (!data) return;
      Object.entries(data).forEach(([k,v])=>{
        if (v && v.user === vorname) rm(fb(db, `records/${k}`)).catch(()=>{});
      });
    }).catch(()=>{});
  }
  // notifications 삭제 (해당 유저)
  if (window._fbGet) {
    window._fbGet(fb(db, "notifications")).then(snap=>{
      const data = snap.val();
      if (!data) return;
      Object.entries(data).forEach(([k,v])=>{
        if (v && (v.user === vorname || k.includes(userKey) || k.toLowerCase().includes((vorname||"").toLowerCase()))) {
          rm(fb(db, `notifications/${k}`)).catch(()=>{});
        }
      });
    }).catch(()=>{});
  }
  // localStorage PIN 삭제
  localStorage.removeItem(`pin_${userKey}`);
}

// PIN cache (Firebase에서 로드)
const _pinCache = {};

// Firebase에서 PIN 로드 (앱 시작 시 한 번)
function loadPinsFromFirebase() {
  if (!window._fbDb || !window._fbRef || !window._fbOnValue) return;
  window._fbOnValue(window._fbRef(window._fbDb, "pins"), snap => {
    const data = snap.val() || {};
    Object.assign(_pinCache, data);
    // localStorage에도 동기화
    Object.entries(data).forEach(([k,v]) => { if(v) lsSet(`pin_${k}`, v); });
  });
}

function usePinStore() {
  function getPin(userKey) {
    // 캐시 우선
    if (_pinCache[userKey]) return _pinCache[userKey];
    // localStorage에서 읽고 Firebase에도 동기화
    const local = lsGet(`pin_${userKey}`, null);
    if (local && window._fbDb && window._fbRef && window._fbSet) {
      _pinCache[userKey] = local;
      window._fbSet(window._fbRef(window._fbDb, `pins/${userKey}`), local)
        .catch(e => {});
    }
    return local;
  }

  function setPin(userKey, pin) {
    // localStorage 저장
    lsSet(`pin_${userKey}`, pin);
    // 캐시 업데이트
    _pinCache[userKey] = pin;
    // Firebase 저장
    if (window._fbDb && window._fbRef && window._fbSet) {
      window._fbSet(window._fbRef(window._fbDb, `pins/${userKey}`), pin)
        .catch(e => console.error("PIN save error:", e));
    }
  }

  function initPins(users) {
    (Array.isArray(users)?users:[]).forEach(u => {
      if (!lsGet(`pin_${u.key}`, null) && u.pin) {
        lsSet(`pin_${u.key}`, u.pin);
      }
    });
  }

  return { getPin, setPin, initPins };
}

//  Firebase    () 
function useFirebase(path, fallback) {
  const [data, setData] = useState(fallback);
  const [ready, setReady] = useState(false);
  const unsubRef = useRef(null);

  useEffect(() => {
    let cancelled = false;

    function attach() {
      const db = window._fbDb;
      const fbRef = window._fbRef;
      const fbOnValue = window._fbOnValue;
      if (!db || !fbRef || !fbOnValue) return false;
      const r = fbRef(db, path);
      // onValue returns unsubscribe fn
      unsubRef.current = fbOnValue(r, snap => {
        if (cancelled) return;
        const val = snap.val();
        if (val === null) {
          setData(fallback);
        } else if (Array.isArray(fallback)) {
          // Firebase stores arrays as objects with numeric/string keys
          setData(Object.values(val));
        } else {
          setData(val);
        }
        setReady(true);
      });
      return true;
    }

    if (attach()) return () => { cancelled=true; if(unsubRef.current) unsubRef.current(); };

    let tries = 0;
    const iv = setInterval(() => {
      tries++;
      if (attach()) { clearInterval(iv); return; }
      if (tries > 30) {
        clearInterval(iv);
        console.error("Firebase 연결 실패:", path);
        setData(fallback);
        setReady(true);
      }
    }, 500);

    return () => { cancelled=true; clearInterval(iv); if(unsubRef.current) unsubRef.current(); };
  }, [path]);

  // setter: Firebase   onValue  UI 
  function fbWrite(next) {
    if (!window._fbDb || !window._fbRef || !window._fbSet) return;
    let toSave;
    if (Array.isArray(next)) {
      if (next.length === 0) { toSave = null; }
      else {
        // users path: PIN Firebase  
        const sanitize = path === "users"
          ? v => { const {pin:_, ...rest} = v; return rest; }
          : v => v;
        toSave = Object.fromEntries(next.map((v,i) => [String(v.id||v.key||i), sanitize(v)]));
      }
    } else if (next && typeof next === "object" && Object.keys(next).length === 0) {
      toSave = null;
    } else {
      toSave = next;
    }
    window._fbSet(window._fbRef(window._fbDb, path), toSave)
      .catch(e => console.error("FB write error ["+path+"]:", e));
  }

  function setter(updater) {
    //  :    + Firebase 
    setData(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      fbWrite(next);
      return next;
    });
  }

  //    (path/field  ,   )
  function fbUpdateField(subPath, value) {
    if (!window._fbDb || !window._fbRef || !window._fbSet) return;
    window._fbSet(window._fbRef(window._fbDb, path + "/" + subPath), value)
      .catch(e => console.error("FB field write error:", e));
  }

  return [data, setter, ready, fbUpdateField];
}

  if (!ein || !aus) return null;
  const [eh, em] = ein.split(":").map(Number);

// ═══════════════════════════════════════════════════════════════
//  PlanImage  — v5 (Dynamic Aspect-Ratio Container)
//
//  · 컨테이너 높이가 이미지 비율에 맞춰 자동 결정 → 빈 공간 없음
//  · width: 100%,  height = cw × (natH / natW)  (여백 0)
//  · sc=1 상태에서 이미지가 컨테이너를 정확히 채움 (letterbox 없음)
//  · 더블탭 = sc=1 리셋 (여백 없는 전체 이미지 상태)
//  · 핀치줌/휠 줌 (1×~5×), 확대 시에만 드래그 팬, 경계 clamp
//  · overflow:hidden → 레이아웃 절대 밀림 없음
// ═══════════════════════════════════════════════════════════════
function PlanImage({ src }) {
  const boxRef = useRef(null);

  const Z = useRef({
    sc:1, tx:0, ty:0,
    sc0:1, tx0:0, ty0:0,
    d0:0, ptx:0, pty:0,
    dragging:false, lastTap:0
  });
  const [xf, setXf] = useState({ sc:1, tx:0, ty:0 });

  // 이미지 원본 크기 (onLoad 후 확정)
  const [nat, setNat] = useState(null); // { w, h }

  // 컨테이너 너비 (마운트 + nat 확정 후 재측정)
  const [cw, setCw] = useState(375);

  React.useEffect(() => {
    const el = boxRef.current;
    if (el) setCw(el.clientWidth || 375);
  }, [nat]); // nat 바뀌면 컨테이너 크기 재측정

  // 동적 컨테이너 높이: 이미지 비율에 꼭 맞음
  const containerH = nat ? Math.round(cw * nat.h / nat.w) : 200;

  // fitSc: sc=1 일 때 이미지가 컨테이너를 정확히 채우는 배율
  // (width 기준이면 nat.w → cw, height는 자동으로 맞음)
  const fitSc = nat ? cw / nat.w : 1;

  // ── 이벤트 핸들러 ─────────────────────────────────────────
  React.useEffect(() => {
    const el = boxRef.current;
    if (!el) return;
    const z = Z.current;

    const commit = (sc, tx, ty) => {
      const totSc  = fitSc * sc;
      const visW   = (nat ? nat.w : cw)         * totSc;
      const visH   = (nat ? nat.h : containerH) * totSc;
      const maxTx  = Math.max(0, (visW - cw)         / 2);
      const maxTy  = Math.max(0, (visH - containerH) / 2);
      const cl     = (v, m) => Math.max(-m, Math.min(m, v));
      z.sc = sc;
      z.tx = cl(tx, maxTx);
      z.ty = cl(ty, maxTy);
      setXf({ sc: z.sc, tx: z.tx, ty: z.ty });
    };
    const reset = () => commit(1, 0, 0);
    const dist  = ts => Math.hypot(
      ts[0].clientX - ts[1].clientX,
      ts[0].clientY - ts[1].clientY
    );

    function onTouchStart(e) {
      if (e.touches.length === 2) {
        z.d0=dist(e.touches); z.sc0=z.sc; z.tx0=z.tx; z.ty0=z.ty;
      } else if (e.touches.length === 1) {
        z.ptx=e.touches[0].clientX; z.pty=e.touches[0].clientY;
        z.tx0=z.tx; z.ty0=z.ty;
        const now = Date.now();
        if (now - z.lastTap < 300) reset();
        z.lastTap = now;
      }
    }
    function onTouchMove(e) {
      e.preventDefault();
      if (e.touches.length === 2) {
        commit(
          Math.min(5, Math.max(1, z.sc0 * (dist(e.touches) / z.d0))),
          z.tx0, z.ty0
        );
      } else if (e.touches.length === 1 && z.sc > 1) {
        commit(
          z.sc,
          z.tx0 + (e.touches[0].clientX - z.ptx),
          z.ty0 + (e.touches[0].clientY - z.pty)
        );
      }
    }
    function onTouchEnd(e) {
      z.tx0=z.tx; z.ty0=z.ty;
      if (e.touches.length === 1) {
        z.ptx=e.touches[0].clientX;
        z.pty=e.touches[0].clientY;
      }
    }
    function onMouseDown(e) {
      if (z.sc <= 1) return;
      z.dragging=true;
      z.ptx=e.clientX; z.pty=e.clientY; z.tx0=z.tx; z.ty0=z.ty;
      e.preventDefault();
    }
    function onMouseMove(e) {
      if (!z.dragging) return;
      commit(z.sc, z.tx0+(e.clientX-z.ptx), z.ty0+(e.clientY-z.pty));
    }
    const stopDrag = () => { z.dragging=false; };
    function onWheel(e) {
      e.preventDefault();
      commit(
        Math.min(5, Math.max(1, z.sc * (e.deltaY > 0 ? 0.88 : 1.14))),
        z.tx, z.ty
      );
    }

    el.addEventListener("touchstart",  onTouchStart,  { passive: true  });
    el.addEventListener("touchmove",   onTouchMove,   { passive: false });
    el.addEventListener("touchend",    onTouchEnd,    { passive: true  });
    el.addEventListener("mousedown",   onMouseDown);
    el.addEventListener("mousemove",   onMouseMove);
    el.addEventListener("mouseup",     stopDrag);
    el.addEventListener("mouseleave",  stopDrag);
    el.addEventListener("wheel",       onWheel,       { passive: false });
    el.addEventListener("dblclick",    reset);
    return () => {
      el.removeEventListener("touchstart",  onTouchStart);
      el.removeEventListener("touchmove",   onTouchMove);
      el.removeEventListener("touchend",    onTouchEnd);
      el.removeEventListener("mousedown",   onMouseDown);
      el.removeEventListener("mousemove",   onMouseMove);
      el.removeEventListener("mouseup",     stopDrag);
      el.removeEventListener("mouseleave",  stopDrag);
      el.removeEventListener("wheel",       onWheel);
      el.removeEventListener("dblclick",    reset);
    };
  }, [fitSc, nat, cw, containerH]);

  if (!src) return null;

  const { sc, tx, ty } = xf;
  const totSc    = fitSc * sc;
  const transform = `translate(-50%,-50%) scale(${totSc}) translate(${tx/totSc}px,${ty/totSc}px)`;

  // 컨테이너: 이미지 비율에 딱 맞는 높이, 빈 공간 없음
  const box = {
    position:    "relative",
    width:       "100%",
    height:      containerH + "px",   // ← 동적! 이미지 비율에 맞춤
    overflow:    "hidden",
    background:  "#f0f0f0",
    touchAction: "none",
    userSelect:  "none",
    cursor:      sc > 1 ? "grab" : "default"
  };

  const inner = {
    position:        "absolute",
    top:             "50%",
    left:            "50%",
    transformOrigin: "center center",
    transition:      "none",
    pointerEvents:   "none",
    display:         "block",
    transform
  };

  return (
    <div ref={boxRef} style={box}>
      <img
        src={src}
        alt="Dienstplan"
        onLoad={e => {
          const nw=e.target.naturalWidth, nh=e.target.naturalHeight;
          if (nw && nh) setNat({ w:nw, h:nh });
        }}
        style={nat
          ? { ...inner, width: nat.w+"px", height: nat.h+"px" }
          : { ...inner, maxWidth:"100%", maxHeight:"100%",
              width:"auto", height:"auto" }
        }
      />
    </div>
  );
}

function parseMinutes(timeStr) {
  if (!timeStr) return null;
  const [h, m] = timeStr.split(":").map(Number);
  return h * 60 + m;
}
function calcShiftMinutes(timeRange) {
  if (!timeRange) return null;
  const [start, end] = timeRange.split("-");
  const s = parseMinutes(start), e = parseMinutes(end);
  if (s == null || e == null) return null;
  return e > s ? e - s : null;
}
function getShiftStatus(shift, actualRec, date) {
  const todayStr = today();
  const shiftDate = date || todayStr;
  if (!actualRec) {
    // 날짜 기준: 과거면 nicht erschienen, 오늘 이후면 ausstehend
    if (shiftDate < todayStr) return "nicht erschienen";
    return "ausstehend";
  }
  if (!actualRec.aus || actualRec.aus === "") return "aktiv";
  const planned = calcShiftMinutes(shift.time || shift.t);
  const actual = calcShiftMinutes(`${actualRec.ein}-${actualRec.aus}`);
  if (planned == null || actual == null) return "gearbeitet";
  return actual >= planned ? "gearbeitet" : "prüfen";
}

//  MEINE SCHICHTEN SECTION 
function MeineSchichtenSection({ userName, myShifts, records, users }) {
  const todayStr = today();
  const [tauschAntraege, setTauschAntraege] = useFirebase("schichttausch", []);
  const [antraege] = useFirebase("antraege", []);
  const [notifications, setNotifications] = useFirebase("notifications", {});
  const [schedule, setSchedule] = useFirebase("schedule", {});

  //   Tausch  
  const pendingTausch = Object.entries(notifications||{})
    .filter(([,n]) => n.type==="tausch_anfrage" && n.targetUser===userName && !n.gelesen);

  function bestaetigenTausch(notifKey, antragId, ok) {
    //   
    if (window._fbDb && window._fbRef && window._fbSet) {
      window._fbSet(window._fbRef(window._fbDb, `notifications/${notifKey}/gelesen`), true)
        .catch(e => console.error(e));
    }

    const list = Array.isArray(tauschAntraege) ? tauschAntraege : [];
    const antrag = list.find(a => a.id === antragId);
    if (!antrag) return;

    if (!ok) {
      setTauschAntraege(prev => (Array.isArray(prev)?prev:[]).map(a =>
        a.id===antragId ? {...a, status:"abgelehnt_partner"} : a
      ));
      return;
    }

    //    schedule  (  )
    if (window._fbDb && window._fbRef && window._fbSet && window._fbOnValue) {
      // once unsubscribe  (onlyOnce: true)
      window._fbOnValue(window._fbRef(window._fbDb, "schedule"), snap => {
        const sched = snap.val() ? JSON.parse(JSON.stringify(snap.val())) : {};
        // initiator:       
        sched[antrag.initiator] = (sched[antrag.initiator]||[])
          .filter(s => (s.d||s.date) !== antrag.initiatorDate);
        sched[antrag.initiator] = [...sched[antrag.initiator],
          {d: antrag.partnerDate, f: antrag.partnerFiliale, t: antrag.partnerTime||null}];
        // partner:     initiator  
        sched[antrag.partner] = (sched[antrag.partner]||[])
          .filter(s => (s.d||s.date) !== antrag.partnerDate);
        sched[antrag.partner] = [...sched[antrag.partner],
          {d: antrag.initiatorDate, f: antrag.initiatorFiliale, t: antrag.initiatorTime||null}];
        window._fbSet(window._fbRef(window._fbDb, "schedule"), sched)
        // root schedule update
        window._fbSet(window._fbRef(window._fbDb, "schedule"), sched)
          .then(() => console.log("root schedule swapped"))
          .catch(e => console.error("root error:", e));
        // monthly schedule_YYYY_MM update (admin + partner real-time)
        const affectedMonths = [...new Set([
          antrag.initiatorDate ? antrag.initiatorDate.slice(0,7).replace("-","_") : null,
          antrag.partnerDate ? antrag.partnerDate.slice(0,7).replace("-","_") : null,
        ])].filter(Boolean);
        affectedMonths.forEach(mk => {
          const fk = "schedule_"+mk;
          window._fbOnValue(window._fbRef(window._fbDb, fk), mSnap => {
            const ms = mSnap.val() ? JSON.parse(JSON.stringify(mSnap.val())) : {};
            const iArr = Object.values(ms[antrag.initiator]||{});
            const iNew = iArr.filter(s=>(s.d||s.date)!==antrag.initiatorDate);
            if((antrag.partnerDate||"").slice(0,7).replace("-","_")===mk)
              iNew.push({d:antrag.partnerDate,f:antrag.partnerFiliale,t:antrag.partnerTime||null});
            ms[antrag.initiator]=Object.fromEntries(iNew.map((s,ii)=>[String(ii),s]));
            const pArr = Object.values(ms[antrag.partner]||{});
            const pNew = pArr.filter(s=>(s.d||s.date)!==antrag.partnerDate);
            if((antrag.initiatorDate||"").slice(0,7).replace("-","_")===mk)
              pNew.push({d:antrag.initiatorDate,f:antrag.initiatorFiliale,t:antrag.initiatorTime||null});
            ms[antrag.partner]=Object.fromEntries(pNew.map((s,ii)=>[String(ii),s]));
            window._fbSet(window._fbRef(window._fbDb, fk), ms).catch(()=>{});
          }, {onlyOnce:true});
        });
       }, {onlyOnce: true});
    }

    //   getauscht
    setTauschAntraege(prev => (Array.isArray(prev)?prev:[]).map(a =>
      a.id===antragId ? {...a, status:"getauscht", partnerBestaetigt:true} : a
    ));

    //  2    (teddy + yeaji)
    if (window._fbDb && window._fbRef && window._fbSet) {
      const ts = Date.now();
      ["teddy","yeaji"].forEach(mgr => {
        window._fbSet(window._fbRef(window._fbDb, `notifications/tausch_manager_${antragId}_${mgr}`), {
          type: "tausch_manager", status: "partner_ok",
          kategorie: "Schichttausch",
          initiator: antrag.initiator, partner: antrag.partner,
          initiatorDate: antrag.initiatorDate, initiatorFiliale: antrag.initiatorFiliale,
          partnerDate: antrag.partnerDate, partnerFiliale: antrag.partnerFiliale,
          antragId, zustaendig: mgr, bearbeitetVon: null, gelesen: false, ts
        }).catch(e => console.error(e));
      });
    }
  }

  //  (schichten + antrge)   
  const myAntraege = (Array.isArray(antraege)?antraege:[]).filter(a => a.user === userName);
  const allDates = [...new Set([
    ...myShifts.map(s => s.d || s.date),
    ...myAntraege.map(a => a.date),
    ...(Array.isArray(records)?records:[]).filter(r => r.user === userName).map(r => r.date),
  ])].sort();

  return (
    <div style={{padding:"14px", borderTop:`1px solid ${C.border}`}}>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:".05em"}}>
          Meine Schichten & Anträge
        </div>
      </div>

      {/*   Tausch   */}
      {pendingTausch.map(([key, n]) => (
        <div key={key} style={{...S.card,marginBottom:10,border:`1.5px solid ${C.mint}`,background:C.mintLight}}>
          <div style={{fontSize:12,fontWeight:800,color:C.mintDark,marginBottom:4}}>
            {"🔄 Tausch-Anfrage von {n.initiator}"}
          </div>
          <div style={{fontSize:10,color:C.text,marginBottom:2}}>
            Du gibst ab: <strong>{new Date(n.myDate).toLocaleDateString("de-DE",{weekday:"short",day:"numeric",month:"numeric"})} · {n.myFiliale}</strong>
          </div>
          <div style={{fontSize:10,color:C.text,marginBottom:10}}>
            Du bekommst: <strong>{new Date(n.theirDate).toLocaleDateString("de-DE",{weekday:"short",day:"numeric",month:"numeric"})} · {n.theirFiliale}</strong>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>bestaetigenTausch(key, n.antragId, false)}
              style={{flex:1,padding:"8px",borderRadius:8,border:`1px solid ${C.border}`,
                background:"#fff",color:C.muted,fontWeight:700,fontSize:11,cursor:"pointer"}}>
              Ablehnen
            </button>
            <button onClick={()=>bestaetigenTausch(key, n.antragId, true)}
              style={{flex:2,padding:"8px",borderRadius:8,border:"none",
                background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,
                color:"#fff",fontWeight:800,fontSize:11,cursor:"pointer"}}>
              {"✅ Bestätigen"}
            </button>
          </div>
        </div>
      ))}

      {allDates.map(d => {
        const shift = myShifts.find(s => (s.d||s.date) === d);
        const rec = (Array.isArray(records)?records:[]).find(r => r.user === userName && r.date === d);
        const antr = myAntraege.filter(a => a.date === d);
        const status = shift ? getShiftStatus({ time: shift.t||shift.time }, rec) : null;

        const isToday = d === todayStr;
        return (
          <div key={d} style={{marginBottom:14}}>
            {/*   */}
            <div style={{
              fontSize:isToday?13:11,
              fontWeight:isToday?900:700,
              color:isToday?C.mintDark:C.muted,
              marginBottom:6,
              display:"flex",alignItems:"center",gap:6
            }}>
              {isToday&&<span style={{width:6,height:6,borderRadius:"50%",background:C.mintDark,display:"inline-block"}}/>}
              {new Date(d).toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"2-digit"})}
              {isToday&&<span style={{fontSize:9,fontWeight:800,padding:"2px 7px",borderRadius:99,background:C.mintDark,color:"#fff",marginLeft:2}}>Heute</span>}
            </div>

            {/*   */}
            {shift && (
              <div style={{
                borderRadius:12,
                outline:isToday?`2px solid ${C.mintDark}`:"none"
              }}>
                <ShiftRow s={shift} userName={userName} records={records} setNotifications={setNotifications} users={users} myShifts={myShifts}/>
              </div>
            )}

            {/* shift    */}
            {!shift && rec && (
              <div style={{padding:"9px 12px",borderRadius:10,marginBottom:5,
                background:C.mintLight,border:`1px solid ${C.mint}`,
                display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontSize:11,fontWeight:600,color:C.text}}>{rec.filiale} · {rec.ein} – {rec.aus||"läuft"}</div>
                <span style={{fontSize:11,fontWeight:700,color:C.mintDark}}>{stdLabel(rec.ein,rec.aus)}</span>
              </div>
            )}

            {/*  Antrge  */}
            {antr.map((a,i) => (
              <div key={i} style={{marginLeft:12,paddingLeft:10,borderLeft:`2px solid ${C.border}`,marginBottom:4}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                  padding:"7px 10px",borderRadius:8,background:"#fff",border:`1px solid ${C.border}`}}>
                  <div>
                    <div style={{fontSize:10,fontWeight:700,color:C.text}}>{"📌 Nachtrag · "}{a.filiale}</div>
                    <div style={{fontSize:9,color:C.muted}}>{a.ein} – {a.aus}</div>
                  </div>
                  <span style={S.pill(a.status)}>{a.status==="offen"?"Offen":a.status==="genehmigt"?"✅":"❌"}</span>
                </div>
              </div>
            ))}
          </div>
        );
      })}

      {allDates.length === 0 && (
        <div style={{textAlign:"center",color:C.muted,fontSize:12,padding:"20px 0"}}>Noch keine Schichten geplant.</div>
      )}

      {/* Schichttausch는 이제 각 ShiftRow 내부에서 직접 실행됨 */}
    </div>
  );
}

//  ABSAGEN MODAL 
function AbsagenModal({ shift, userName, onClose, onSubmit }) {
  const [grund, setGrund] = useState("");
  const [err, setErr] = useState("");
  const d = shift.d || shift.date;
  const f = shift.f || shift.filiale;
  const t = shift.t || shift.time;

  function doSubmit() {
    if (!grund.trim()) { setErr("Bitte einen Grund angeben."); return; }
    onSubmit({ id: Date.now(), userName, date: d, filiale: f, time: t, grund, status: "offen" });
    onClose();
  }

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(20,20,20,.55)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:300}}>
      <div style={{background:C.card,borderRadius:"22px 22px 0 0",width:"100%",maxWidth:500,padding:"24px 22px 32px",paddingBottom:"max(32px,env(safe-area-inset-bottom))"}}>
        <div style={{width:36,height:4,background:C.border,borderRadius:99,margin:"0 auto 20px"}}/>
        <div style={{fontSize:16,fontWeight:800,color:C.text,marginBottom:4}}>Schicht absagen</div>
        <div style={{...S.card,background:C.redLight,border:`1px solid ${C.red}`,marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:C.red}}>
            {new Date(d).toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"})}
          </div>
          <div style={{fontSize:11,color:C.muted,marginTop:2}}>{f}{t?` · ${t}`:""}</div>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:6}}>Grund <span style={{color:C.red}}>*</span></div>
          <textarea value={grund} onChange={e=>{setGrund(e.target.value);setErr("");}}
            placeholder="z. B. Ich bin krank und kann nicht kommen…"
            style={{...S.input,width:"100%",minHeight:80,resize:"none",fontFamily:"inherit"}}/>
        </div>
        {err&&<div style={{fontSize:11,color:C.red,marginBottom:10,fontWeight:600}}>{"⚠ "}{err}</div>}
        <div style={{fontSize:10,color:C.muted,marginBottom:14}}>
          {"ℹ️ Der Manager wird benachrichtigt. Nach Genehmigung wird deine Schicht als freie Schicht veröffentlicht."}
        </div>
        <div style={{display:"flex",gap:9}}>
          <button onClick={onClose} style={{flex:1,padding:"12px",borderRadius:11,border:`1.5px solid ${C.border}`,background:C.card,color:C.muted,fontWeight:700,fontSize:13,cursor:"pointer"}}>Abbrechen</button>
          <button onClick={doSubmit} style={{flex:2,padding:"12px",borderRadius:11,border:"none",background:`linear-gradient(135deg,${C.red},#A8432E)`,color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}}>Absagen & senden</button>
        </div>
      </div>
    </div>
  );
}

function ShiftRow({ s, userName, records, setNotifications, users, myShifts }) {
  const d = s.d || s.date;
  const f = s.f || s.filiale;
  const t = s.t || s.time;
  const actualRec = (Array.isArray(records)?records:[]).find(r => r.user === userName && r.date === d);
  const status = getShiftStatus({ time: t }, actualRec, d);
  const [showModal, setShowModal] = useState(false);
  const [modalTab, setModalTab] = useState("absagen"); // "absagen" | "nachtrag"
  const [absagenList, setAbsagenList] = useFirebase("absagen", []);
  const [antraege, setAntraege] = useFirebase("antraege", []);
  const [tauschAntraege] = useFirebase("schichttausch", []);
  const [, setNotif] = useFirebase("notifications", {});
  // Nachtrag state
  const [nEin, setNEin] = useState("09:00");
  const [nAus, setNAus] = useState("17:00");
  const [nGrund, setNGrund] = useState("");
  const [nMsg, setNMsg] = useState("");
  const [absGrund, setAbsGrund] = useState("");
  const [absErr, setAbsErr] = useState("");
  const [showTausch, setShowTausch] = useState(false); // Schichttausch 모달
  const now = new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Berlin"}));
  const todayStr = today();
  // 근무시간이 지났는지 (당일 포함)
  const shiftPassed = d < todayStr || (d === todayStr && t && now.getHours()*60+now.getMinutes() > parseMinutes((t.split("-")[1]||"23:59")));

  useEffect(() => {
    if (status === "prüfen" && actualRec) {
      const zustaendig = f === "TEEnJOY" ? "teddy" : "yeaji";
      const notifKey = `prüfen_${userName}_${d}`;
      setNotifications(prev => {
        if (prev && prev[notifKey]) return prev;
        return { ...(prev||{}), [notifKey]: {
          type: "prüfen", user: userName, date: d, filiale: f,
          plannedTime: t, actualEin: actualRec.ein, actualAus: actualRec.aus,
          zustaendig, gelesen: false, ts: Date.now()
        }};
      });
    }
  }, [status]);

  const alreadyAbgesagt = (Array.isArray(absagenList)?absagenList:[])
    .find(a => a.userName === userName && a.date === d);

  // Tausch    (initiator  A)
  const myTausch = (Array.isArray(tauschAntraege)?tauschAntraege:[])
    .find(t => t.initiator === userName && t.initiatorDate === d);
  // (B) :   tausch   
  const partnerTausch = !myTausch ? (Array.isArray(tauschAntraege)?tauschAntraege:[])
    .find(t => t.partner === userName && t.partnerDate === d) : null;

  const tauschLabel = myTausch ? ({
    ausstehend_bestaetigung: `🔄 Tausch-Anfrage an ${myTausch.partner} · Warte auf Bestätigung`,
    ausstehend_manager:      `🔄 Tausch wartet auf Manager-Genehmigung`,
    getauscht:               `✅ Getauscht mit ${myTausch.partner}`,
    abgelehnt_partner:       `❌ Tausch von ${myTausch.partner} abgelehnt`,
  }[myTausch.status] || null) : partnerTausch ? ({
    ausstehend_bestaetigung: `🔄 Tausch angefragt von ${partnerTausch.initiator} · Deine Antwort ausstehend`,
    getauscht:               `✅ Getauscht mit ${partnerTausch.initiator}`,
    abgelehnt_partner:       `❌ Tausch abgelehnt`,
  }[partnerTausch.status] || null) : null;

  function handleAbsagen(antrag) {
    setAbsagenList(prev => [...(Array.isArray(prev)?prev:[]), antrag]);
    // Dienstplan에서 직접 처리 - Alarm 알림 없음
  }

  //   
  const badge = {
    gearbeitet: { color: C.mintDark, bg: C.mintLight, label: "Gearbeitet" },
    prüfen:     { color: C.yellow,   bg: C.yellowLight,label: "Prüfen"    },
    aktiv:      { color: C.yellow,   bg: "#FFF9E6",    label: "Im Dienst" },
    ausstehend: { color: C.muted,    bg: C.bg,         label: "Ausstehend"},
    "nicht erschienen": { color: C.red, bg: C.redLight, label: "Nicht erschienen"},
  }[alreadyAbgesagt ? "ausstehend" : status] || { color: C.red, bg: C.redLight, label: "Nicht erschienen" };

  return (
    <>
      <div style={{borderRadius:10,overflow:"hidden",marginBottom:6,
        border:`1px solid ${alreadyAbgesagt?C.red:status==="aktiv"||status==="gearbeitet"?C.mint:C.border}`}}>

        {/*    */}
        <div onClick={()=>{
            // 과거: Nachtragen / 미래: Absagen + Schichttausch
            if(shiftPassed) { setModalTab("nachtrag"); setShowModal(true); }
            else if(!alreadyAbgesagt) { setModalTab("future"); setShowModal(true); }
          }}
          style={{display:"flex",alignItems:"center",justifyContent:"space-between",
            padding:"10px 12px",
            background:alreadyAbgesagt?C.redLight:C.card,
            cursor:(!alreadyAbgesagt||shiftPassed)?"pointer":"default"}}>
          <div style={{fontSize:12,fontWeight:600,color:alreadyAbgesagt?C.red:C.text}}>
            {f}{t ? ` · ${t}` : ""}
            {alreadyAbgesagt && <span style={{fontSize:10,color:C.red,marginLeft:6}}>{"🚫 Absage "}{alreadyAbgesagt.status==="offen"?"beantragt":alreadyAbgesagt.status==="genehmigt"?"genehmigt":"abgelehnt"}</span>}
          {tauschLabel && <div style={{fontSize:9,color:C.mintDark,marginTop:3,fontWeight:600}}>{tauschLabel}</div>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            {(!alreadyAbgesagt||shiftPassed)&&(
              <span style={{fontSize:8,color:C.muted}}>tippen</span>
            )}
            <span style={{fontSize:9,fontWeight:700,padding:"3px 8px",borderRadius:99,
              color:alreadyAbgesagt?C.red:badge.color,
              background:alreadyAbgesagt?"#fff":badge.bg,
              border:`1px solid ${alreadyAbgesagt?C.red:badge.color}`}}>
              {alreadyAbgesagt?"🚫 Abgesagt":badge.label}
            </span>
          </div>
        </div>

        {/*    ( ) */}
        {actualRec && (
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
            padding:"8px 12px",
            background:status==="gearbeitet"?C.mintLight:status==="prüfen"?C.yellowLight:"#FFF9E6",
            borderTop:`1px dashed ${status==="gearbeitet"?C.mint:C.yellow}`}}>
            <div style={{fontSize:11,color:status==="gearbeitet"?C.mintDark:status==="prüfen"?C.yellow:C.yellow,fontWeight:600}}>
              {actualRec.ein}{"–"}{actualRec.aus||"läuft"}
            </div>
            <span style={{fontSize:11,fontWeight:700,color:status==="gearbeitet"?C.mintDark:C.yellow}}>
              {actualRec.aus ? stdLabel(actualRec.ein, actualRec.aus) : "🟡"}
            </span>
          </div>
        )}
        {/* Nachtrag 제출 대기/완료 표시 */}
        {(()=>{
          const myNachtrag=(Array.isArray(antraege)?antraege:[]).find(a=>a.user===userName&&a.date===d);
          if(!myNachtrag) return null;
          const isPending=myNachtrag.status==="offen";
          const isApproved=myNachtrag.status==="genehmigt";
          if(!isPending&&!isApproved) return null;
          return(
            <div style={{padding:"7px 12px",borderTop:`1px solid ${isPending?C.yellow:C.mint}`,
              background:isPending?C.yellowLight:C.mintLight,
              display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{fontSize:10,fontWeight:700,color:isPending?C.yellow:C.mintDark}}>
                {"📌 Nachtrag · "}{myNachtrag.filiale}
                <div style={{fontSize:9,fontWeight:400,color:C.muted,marginTop:1}}>{myNachtrag.ein}{" – "}{myNachtrag.aus}</div>
              </div>
              <span style={{fontSize:9,padding:"2px 7px",borderRadius:99,fontWeight:700,
                background:isPending?"#fff":C.mint,
                color:isPending?C.yellow:C.mintDark,
                border:`1px solid ${isPending?C.yellow:C.mint}`}}>
                {isPending?"Ausstehend":"✓ Genehmigt"}
              </span>
            </div>
          );
        })()}
      </div>

      {showModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center"}}
          onClick={e=>{if(e.target===e.currentTarget){setShowModal(false);setNMsg("");setAbsGrund("");setAbsErr("");}}}>
          <div style={{background:C.card,borderRadius:"22px 22px 0 0",width:"100%",maxWidth:500,
            padding:"20px 22px 32px",paddingBottom:"max(32px,env(safe-area-inset-bottom))"}}>
            <div style={{width:36,height:4,background:C.border,borderRadius:99,margin:"0 auto 16px"}}/>
            <div style={{fontSize:13,fontWeight:800,color:C.text,marginBottom:12}}>
              {new Date(d).toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"})}
              <span style={{fontSize:11,color:C.muted,fontWeight:400,marginLeft:8}}>{f}{t?` · ${t}`:""}</span>
            </div>
            {/* ── 과거 근무: Nachtragen만 ── */}
            {shiftPassed&&(
              <div style={{display:"flex",gap:0,marginBottom:16,borderRadius:10,overflow:"hidden",border:`1px solid ${C.border}`}}>
                <button onClick={()=>setModalTab("nachtrag")}
                  style={{flex:1,padding:"9px",border:"none",cursor:"pointer",fontSize:12,fontWeight:700,
                    background:C.navy,color:"#fff"}}>
                  {"🕐 Nachtragen"}
                </button>
              </div>
            )}

            {/* ── 미래 근무: Absagen + Schichttausch 선택 화면 ── */}
            {!shiftPassed&&modalTab==="future"&&(
              <div>
                <div style={{fontSize:11,color:C.muted,marginBottom:14,textAlign:"center"}}>Was möchtest du tun?</div>
                <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
                  <button onClick={()=>setModalTab("absagen")}
                    style={{width:"100%",padding:"14px",borderRadius:12,border:`1.5px solid ${C.red}`,
                      background:"#fff",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:12}}>
                    <span style={{fontSize:22}}>{"🚫"}</span>
                    <div>
                      <div style={{fontSize:13,fontWeight:800,color:C.red}}>Absagen</div>
                      <div style={{fontSize:10,color:C.muted,marginTop:2}}>Schicht absagen & Manager benachrichtigen</div>
                    </div>
                  </button>
                  <button onClick={()=>{ setShowModal(false); setShowTausch(true); }}
                    style={{width:"100%",padding:"14px",borderRadius:12,border:`1.5px solid ${C.mint}`,
                      background:"#fff",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:12}}>
                    <span style={{fontSize:22}}>{"🔄"}</span>
                    <div>
                      <div style={{fontSize:13,fontWeight:800,color:C.mintDark}}>Schichttausch</div>
                      <div style={{fontSize:10,color:C.muted,marginTop:2}}>Mit einem Kollegen tauschen</div>

//  EINSPRINGEN VIEW 
function EinspringenView({ userName }) {
  const [freieSchichten, setFreieSchichten] = useFirebase("freieSchichten", []);
  const [, setNotifications] = useFirebase("notifications", {});
  const [schedule, setSchedule] = useFirebase("schedule", {});
  const [msg, setMsg] = useState(null);

  function einspringen(schicht) {
    //   
    setSchedule(prev => {
      const updated = { ...(prev||{}) };
      if (!updated[userName]) updated[userName] = [];
      updated[userName] = [...updated[userName], { d: schicht.date, f: schicht.filiale, t: schicht.time }];
      return updated;
    });
    //   
    setFreieSchichten(prev => (Array.isArray(prev)?prev:[]).filter(s => s.id !== schicht.id));
    //  2  
    const ts = Date.now();
    if (window._fbDb && window._fbRef && window._fbSet) {
      ["teddy","yeaji"].forEach(mgr => {
        window._fbSet(window._fbRef(window._fbDb, `notifications/einspringen_${schicht.id}_${mgr}`), {
          type: "einspringen", kategorie: "Einspringen",
          user: userName, date: schicht.date, filiale: schicht.filiale, time: schicht.time,
          zustaendig: mgr, bearbeitetVon: null, gelesen: false, ts
        }).catch(e => console.error(e));
      });
    }
    setMsg(`✅ Du bist jetzt für ${new Date(schicht.date).toLocaleDateString("de-DE")} in ${schicht.filiale} eingeplant!`);
    setTimeout(() => setMsg(null), 4000);
  }

  const offene = (Array.isArray(freieSchichten)?freieSchichten:[]).filter(s => !s.besetzt);

  return (
    <div style={{padding:"14px"}}>
      <div style={{...S.card,marginBottom:12,background:`linear-gradient(135deg,${C.mintLight},#f0f7fa)`,border:`1.5px solid ${C.mint}`}}>
        <div style={{fontSize:14,fontWeight:800,color:C.mintDark,marginBottom:4}}>{"🙋 Freie Schichten"}</div>
        <div style={{fontSize:11,color:C.muted}}>{"Hier kannst du offene Schichten übernehmen."}</div>
      </div>

      {msg && (
        <div style={{padding:"11px 14px",borderRadius:10,background:C.mintLight,border:`1px solid ${C.mint}`,
          fontSize:12,fontWeight:600,color:C.mintDark,marginBottom:12}}>
          {msg}
        </div>
      )}

      {offene.length === 0 ? (
        <div style={{...S.card,textAlign:"center",padding:"32px 16px"}}>
          <div style={{fontSize:28,marginBottom:8}}>{"🎉"}</div>
          <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:4}}>Keine offenen Schichten</div>
          <div style={{fontSize:11,color:C.muted}}>Aktuell sind alle Schichten besetzt.</div>
        </div>
      ) : (
        offene.map(s => (
          <div key={s.id} style={{...S.card,marginBottom:10,border:`1.5px solid ${C.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div>
                <div style={{fontSize:13,fontWeight:800,color:C.text}}>
                  {new Date(s.date).toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"})}
                </div>
                <div style={{fontSize:11,color:C.muted,marginTop:2}}>{s.filiale}</div>
                {s.time&&<div style={{fontSize:11,fontWeight:600,color:C.mintDark,marginTop:2}}>{"🕐 "}{s.time}</div>}
                {s.note&&<div style={{fontSize:10,color:C.muted,marginTop:4}}>{"📌 "}{s.note}</div>}
              </div>
              <div style={{width:40,height:40,borderRadius:10,background:C.mintLight,
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>
                {s.filiale==="TEEnJOY"?"🧋":"☕"}

            </div>
            <button onClick={()=>einspringen(s)}

                background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,

    </div>
  );
}

//  CLOCK MODAL 
function ClockModal({modal,now,selFiliale,clockFiliale,clockInTime,CLOCK_KEY,onClose,onEin,onAus}){
  const isEin = modal==="ein";
  const nowStr = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const [manualMode, setManualMode] = useState(false);
  const [manualTime, setManualTime] = useState(nowStr);

  const ausInvalid = !isEin && manualMode && clockInTime && (()=>{
    const [ah,am] = manualTime.split(":").map(Number);
    return (ah*60+am) - (clockInTime.getHours()*60+clockInTime.getMinutes()) <= 0;
  })();

  function doEin(){
    const t = manualMode ? manualTime : nowStr;
    const [h,m] = t.split(":").map(Number);
    const d = new Date(); d.setHours(h,m,0,0);
    onEin(d);
  }
  function doAus(){
    if(ausInvalid) return;
    const t = manualMode ? manualTime : nowStr;
    const inStr = `${pad(clockInTime.getHours())}:${pad(clockInTime.getMinutes())}`;
    onAus(inStr, t);
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(20,20,20,.55)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200}}>
      <div style={{background:C.card,borderRadius:"22px 22px 0 0",width:"100%",maxWidth:500,padding:"24px 22px 32px",paddingBottom:"max(32px,env(safe-area-inset-bottom))"}}>
        <div style={{width:36,height:4,background:C.border,borderRadius:99,margin:"0 auto 20px"}}/>
        <div style={{fontSize:16,fontWeight:800,color:C.text,marginBottom:4}}>
          {isEin?"Einstempeln bestätigen":"Ausstempeln bestätigen"}
        </div>
        <div style={{fontSize:12,color:C.muted,marginBottom:14}}>
          Filiale: <strong style={{color:C.text}}>{isEin?selFiliale:clockFiliale}</strong>
        </div>

        <div style={{marginBottom:16}}>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <button onClick={()=>setManualMode(false)}
              style={{flex:1,padding:"9px",borderRadius:9,fontSize:12,fontWeight:700,cursor:"pointer",
                border:`2px solid ${!manualMode?C.mint:C.border}`,
                background:!manualMode?C.mintLight:"#fff",
                color:!manualMode?C.mintDark:C.muted}}>
              {"🕐 Jetzt"}
            </button>
            <button onClick={()=>setManualMode(true)}
              style={{flex:1,padding:"9px",borderRadius:9,fontSize:12,fontWeight:700,cursor:"pointer",
                border:`2px solid ${manualMode?C.yellow:C.border}`,
                background:manualMode?C.yellowLight:"#fff",
                color:manualMode?C.yellow:C.muted}}>
              {"✏️ Zeit eingeben"}
            </button>
          </div>
          {manualMode&&(
            <div style={{background:C.yellowLight,borderRadius:10,padding:"12px 14px",border:`1.5px solid ${ausInvalid?C.red:C.yellow}`}}>
              <div style={{fontSize:10,fontWeight:700,color:C.yellow,marginBottom:6}}>
                {isEin?"Tatsächliche Einstempelzeit":"Tatsächliche Ausstempelzeit"}
              </div>
              <TimeInput value={manualTime} onChange={setManualTime}
                style={{...S.input,width:"80%",display:"block",margin:"0 auto",fontSize:20,fontWeight:700,textAlign:"center",borderColor:ausInvalid?C.red:C.yellow}}/>
              {!isEin&&clockInTime&&(()=>{
                const [ah,am]=manualTime.split(":").map(Number);
                const diff=(ah*60+am)-(clockInTime.getHours()*60+clockInTime.getMinutes());
                if(diff<=0) return(
                  <div style={{fontSize:11,color:C.red,fontWeight:700,marginTop:7,textAlign:"center"}}>
                    <>{"⚠ Die Zeit liegt vor der Einstempelzeit ("}{pad(clockInTime.getHours())}:{pad(clockInTime.getMinutes())}{"  Uhr)"}</>
                  </div>
                );
                return(
                  <div style={{fontSize:11,color:"#3a7a55",fontWeight:700,marginTop:7,textAlign:"center"}}>
                    <>{"⏱ "}{Math.floor(diff/60)}{"h "}{diff%60}{"min Arbeitszeit"}</>
                  </div>
                );
              })()}
              {isEin&&(()=>{
                const [ah,am]=manualTime.split(":").map(Number);
                const diff=(now.getHours()*60+now.getMinutes())-(ah*60+am);
                if(diff<=0) return null;
                return(
                  <div style={{fontSize:11,color:C.yellow,fontWeight:700,marginTop:7,textAlign:"center"}}>
                    <>{"⏱ "}{Math.floor(diff/60)}{"h "}{diff%60}{"min bereits vergangen"}</>
                  </div>
                );
              })()}
            </div>
          )}
        </div>

        <div style={{display:"flex",gap:9}}>
          <button onClick={onClose} style={{flex:1,padding:"12px",borderRadius:11,border:`1.5px solid ${C.border}`,background:C.card,color:C.muted,fontWeight:700,fontSize:13,cursor:"pointer"}}>Abbrechen</button>
          <button onClick={isEin?doEin:doAus} disabled={!!ausInvalid}
            style={{flex:2,padding:"12px",borderRadius:11,border:"none",
              background:ausInvalid?"#ccc":isEin?`linear-gradient(135deg,${C.mint},${C.mintDark})`:`linear-gradient(135deg,${C.red},#A8432E)`,
              color:"#fff",fontWeight:800,fontSize:14,cursor:ausInvalid?"not-allowed":"pointer",opacity:ausInvalid?0.6:1}}>
            {isEin?"Einstempeln":"Ausstempeln"}
          </button>
        </div>
      </div>
    </div>
  );
}

function SettingsView({ user, users, setUsers, userKey, onLogout, onClose, isAdmin }) {
  if (!user) return null;
  const [vorname, setVorname] = useState(user.vorname || "");
  const [saveMsg, setSaveMsg] = useState("");
  const [deleteConfirm, setDeleteConfirm] = useState(false);
  const [impfDoc, setImpfDoc] = useState(user.infektionsschutz || null);
  const [impfViewer, setImpfViewer] = useState(false);
  const fileRef = useRef(null);
  const { getPin, setPin: savePinFn } = usePinStore();
  const [showPinChange, setShowPinChange] = useState(false);
  const [oldPin, setOldPin] = useState("");
  const [newPin1, setNewPin1] = useState("");
  const [newPin2, setNewPin2] = useState("");
  const [pinMsg, setPinMsg] = useState("");

  function changePIN() {
    const current = getPin(userKey);
    if (oldPin !== current) { setPinMsg("Aktuelle PIN falsch."); return; }
    if (!/^[0-9]{4}$/.test(newPin1)) { setPinMsg("PIN muss 4 Ziffern sein."); return; }
    if (newPin1 !== newPin2) { setPinMsg("PINs stimmen nicht überein."); return; }
    savePinFn(userKey, newPin1);
    setPinMsg("PIN geändert!");
    setOldPin(""); setNewPin1(""); setNewPin2("");
    setTimeout(() => { setPinMsg(""); setShowPinChange(false); }, 2000);
  }

  function saveName() {
    if (!vorname.trim()) return;
    setUsers(prev => (Array.isArray(prev)?prev:[]).map(u =>
      u.key === userKey ? { ...u, vorname: vorname.trim() } : u
    ));
    setSaveMsg("✅ Gespeichert!");
    setTimeout(() => setSaveMsg(""), 2000);
  }

  async function handleImpfUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) {
      setSaveMsg("❌ Datei zu groß (max. 10MB)");
      return;
    }
    const b64 = await new Promise(res => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.readAsDataURL(file);
    });
    setImpfDoc(b64);
    setUsers(prev => (Array.isArray(prev)?prev:[]).map(u =>
      u.key === userKey ? { ...u, infektionsschutz: b64 } : u
    ));
    setSaveMsg("✅ Bescheinigung hochgeladen!");
    setTimeout(() => setSaveMsg(""), 2500);
  }

  function deleteAccount() {
    const me = (Array.isArray(users)?users:[]).find(u=>u.key===userKey);
    deleteUserData(userKey, me?.vorname);
    setUsers(prev => (Array.isArray(prev)?prev:[]).filter(u => u.key !== userKey));
    onLogout();
  }

  const isPdf = impfDoc && impfDoc.startsWith("data:application/pdf");

      {/*  */}

//  MITARBEITER 
function MitarbeiterView({userKey,users,setUsers,records,setRecords,antraege,setAntraege,onLogout,csvCtx}){
  const user=(Array.isArray(users)?users:[]).find(u=>u.key===userKey);
  const now=useNow();
  const [tab,setTab]=useState("home");

  //    localStorage  
  const CLOCK_KEY = `teeamo_clock_${userKey}`;
  const [clockedIn,setClockedIn]=useState(()=>{
    try { const s=localStorage.getItem(CLOCK_KEY); return s?JSON.parse(s).clockedIn:false; } catch{return false;}
  });
  const [clockInTime,setClockInTime]=useState(()=>{
    try { const s=localStorage.getItem(CLOCK_KEY); const v=s?JSON.parse(s).clockInTime:null; return v?new Date(v):null; } catch{return null;}
  });
  const [clockFiliale,setClockFiliale]=useState(()=>{
    try { const s=localStorage.getItem(CLOCK_KEY); return s?JSON.parse(s).clockFiliale:""; } catch{return "";}
  });

  //     
  useEffect(()=>{
    try { localStorage.setItem(CLOCK_KEY, JSON.stringify({clockedIn, clockInTime:clockInTime?clockInTime.toISOString():null, clockFiliale})); } catch{}
  },[clockedIn, clockInTime, clockFiliale]);

  const [selFiliale,setSelFiliale]=useState(FILIALEN[0]);
  const [grund,setGrund]=useState("");
  const [elapsed,setElapsed]=useState(()=>{
    //        
    try {
      const s=localStorage.getItem(CLOCK_KEY); const v=s?JSON.parse(s):null;
      if(v&&v.clockedIn&&v.clockInTime) return Math.floor((Date.now()-new Date(v.clockInTime).getTime())/1000);
    } catch{}
    return 0;
  });
  const [modal,setModal]=useState(null);
  const [nDatum,setNDatum]=useState(today());
  const [nFiliale,setNFiliale]=useState(FILIALEN[0]);
  const [nEin,setNEin]=useState("09:00");
  const [nAus,setNAus]=useState("17:00");
  const [nGrund,setNGrund]=useState("");
  const [nMsg,setNMsg]=useState("");

  useEffect(()=>{
    if(!clockedIn){
      // /   record  (aus:null )
      setElapsed(0);
      return;
    }
    //  einstempeln      record 
    const tempId="clock_"+user.vorname+"_"+today();
    const inStr=clockInTime?`${pad(clockInTime.getHours())}:${pad(clockInTime.getMinutes())}`:"??:??";
    setRecords(prev=>{
      const already=(Array.isArray(prev)?prev:[]).find(r=>r.id===tempId);
      if(already) return prev;
      const filtered=(Array.isArray(prev)?prev:[]).filter(r=>r.id!==tempId);
      return [...filtered,{id:tempId,user:user.vorname,date:today(),filiale:clockFiliale||selFiliale,ein:inStr,aus:null,note:"",typ:"normal"}];
    });
    const t=setInterval(()=>setElapsed(e=>e+1),1000); return()=>clearInterval(t);
  },[clockedIn]);

  const displayName=user.vorname;
  const myRecs=records.filter(r=>r.user===user.vorname);
  const myAntraege=antraege.filter(a=>a.user===user.vorname);
  const monthSummary=FILIALEN.map(f=>({f,h:myRecs.filter(r=>r.filiale===f&&r.aus).reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0)})).filter(x=>x.h>0);

  // Dienstplan  :   Tausch  
  const [_notifications] = useFirebase("notifications", {});
  const pendingTauschCount = Object.values(_notifications||{})
    .filter(n => n.type==="tausch_anfrage" && n.targetUser===user.vorname && !n.gelesen).length;

  function handleEin(){
    const inStr=`${pad(new Date().getHours())}:${pad(new Date().getMinutes())}`;
    const tempId="clock_"+user.vorname+"_"+today();
    // einstempeln  aus:null  record    Aktiv    
    setRecords(prev=>{
      const filtered=(Array.isArray(prev)?prev:[]).filter(r=>r.id!==tempId);
      return [...filtered,{id:tempId,user:user.vorname,date:today(),filiale:selFiliale,ein:inStr,aus:null,note:"",typ:"normal"}];
    });
    setClockedIn(true);setClockInTime(new Date());setClockFiliale(selFiliale);setModal(null);
  }
  function handleAus(){
    const outStr=`${pad(now.getHours())}:${pad(now.getMinutes())}`;
    const inStr=`${pad(clockInTime.getHours())}:${pad(clockInTime.getMinutes())}`;
    const tempId="clock_"+user.vorname+"_"+today();
    //  record(aus:null)  record 
    setRecords(prev=>{
      const filtered=(Array.isArray(prev)?prev:[]).filter(r=>r.id!==tempId);
      return [...filtered,{id:Date.now(),user:user.vorname,date:today(),filiale:clockFiliale,ein:inStr,aus:outStr,note:grund,typ:"normal"}];
    });
    setClockedIn(false);setClockInTime(null);setElapsed(0);setGrund("");setModal(null);
    try{localStorage.removeItem(CLOCK_KEY);}catch{}
  }
  function submitNachtrag(){
    if(!nGrund.trim()){setNMsg("Bitte einen Grund angeben.");return;}
    const id = Date.now();
    const ts = id;
    // Firebase   (antraege +   notifications)
    setAntraege(prev=>[...prev,{id,user:user.vorname,date:nDatum,filiale:nFiliale,ein:nEin,aus:nAus,grund:nGrund,status:"offen",zustaendig:"all"}]);
    if (window._fbDb && window._fbRef && window._fbSet) {
      ["teddy","yeaji"].forEach(mgr => {
        window._fbSet(window._fbRef(window._fbDb, `notifications/nachtrag_${id}_${mgr}`), {
          type: "nachtrag", kategorie: "Nachtrag",
          user: user.vorname, date: nDatum, filiale: nFiliale, ein: nEin, aus: nAus,
          grund: nGrund, antragId: id,
          zustaendig: mgr, bearbeitetVon: null, status: "offen", gelesen: false, ts
        }).catch(e => console.error(e));
      });
    }
    setNMsg("Antrag eingereicht! Wird von Yeaji oder Teddy geprüft.");setNGrund("");
  }

  const elStr=`${pad(Math.floor(elapsed/3600))}:${pad(Math.floor((elapsed%3600)/60))}:${pad(elapsed%60)}`;
  const timeStr=`${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

  const [showSettings, setShowSettings] = useState(false);

  return(
    <div style={{background:C.bg,minHeight:"100vh",paddingBottom:80}}>
      {showSettings && (
        <SettingsView
          user={user}
          users={users}
          setUsers={setUsers}
          userKey={userKey}
          onLogout={onLogout}
          onClose={()=>setShowSettings(false)}
        />)}
      <div style={S.hdr}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:11,opacity:.45,marginBottom:3,letterSpacing:".06em",textTransform:"uppercase"}}>{"teeamo Münster"}</div>
            <div style={{fontSize:20,fontWeight:800}}>Hallo, {displayName}!</div>
            <div style={{fontSize:11,opacity:.5,marginTop:1}}>{user.role}</div>
            {!user.infektionsschutz&&(
              <div style={{fontSize:10,color:"#ffb347",fontWeight:700,marginTop:4}}>
                {"⚠️ Bitte Bescheinigung von Infektionsschutzgesetz hochladen"}
              </div>
            )}

//  STATISTIK 
function StatistikTab({records,users}){
  // records에서 달 추출 + 현재 달 포함, 최신순 정렬
  const availMonths = React.useMemo(()=>{
    const d=new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Berlin"}));
    const cur=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    const fromRecs=[...new Set((Array.isArray(records)?records:[])
      .filter(r=>r.aus&&r.date)
      .map(r=>r.date.slice(0,7)))];
    return [...new Set([cur,...fromRecs])].sort((a,b)=>b.localeCompare(a));
  },[records]);
  const [selMonth,setSelMonth]=useState(()=>{
    const d=new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Berlin"}));
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
  });
  const [exported,setExported]=useState(null);
  const empList=(Array.isArray(users)?users:[]).filter(u=>!MANAGERS.includes(u.key)).sort(byName);
  const monthRecs=records.filter(r=>r.date.startsWith(selMonth)&&r.aus);

  function downloadCSV(rows,filename){
    const bom="﻿";
    const csv=bom+rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(";")).join("\r\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=filename;a.click();
    URL.revokeObjectURL(url);
    setExported(filename);setTimeout(()=>setExported(null),3000);
  }
  function downloadXLSX(rows, filename, sheetName="Daten") {
    try {
      const ws = window.XLSX.utils.aoa_to_sheet(rows);
      //    ( )
      const wb = window.XLSX.utils.book_new();
      window.XLSX.utils.book_append_sheet(wb, ws, sheetName);
      window.XLSX.writeFile(wb, filename);
      setExported(filename);setTimeout(()=>setExported(null),3000);
    } catch(e) {
      // fallback to CSV if XLSX unavailable
      downloadCSV(rows, filename.replace(".xlsx",".csv"));
    }
  }
  function exportDetail(fmt="xlsx"){
    const hdr=["Name","Datum","Wochentag","Filiale","Einstempeln","Ausstempeln","Arbeitsstunden","Typ","Anmerkung"];
    const rows=[hdr,...[...monthRecs].sort((a,b)=>a.date.localeCompare(b.date)).map(r=>{
      const h=stunden(r.ein,r.aus);
      return[r.user,r.date,TAGE_DE[new Date(r.date).getDay()],r.filiale,r.ein,r.aus,h!=null?h.toFixed(2):"",r.typ==="nachtrag"?"Nachtrag":"Normal",r.note||""];
    })];
    if(fmt==="xlsx") downloadXLSX(rows,`Stundennachweis_Detail_${selMonth}.xlsx`,"Stundennachweis");
    else downloadCSV(rows,`Stundennachweis_Detail_${selMonth}.csv`);
  }
  function exportSummary(fmt="xlsx"){
    const hdr=["Name","Rolle","Arbeitstage","Gesamtstunden","TEEAMO Arkaden (Std)","TEEAMO Aegidiimarkt (Std)","TEEnJOY (Std)","Ø Std/Tag"];
    const rows=[hdr,...empList.map(emp=>{
      const er=monthRecs.filter(r=>r.user===emp.vorname);
      const total=er.reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0);
      const byFil={};FILIALEN.forEach(f=>{byFil[f]=er.filter(r=>r.filiale===f).reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0);});
      return[emp.vorname,emp.role,er.length,Number(total.toFixed(2)),Number(byFil["TEEAMO Arkaden"].toFixed(2)),Number(byFil["TEEAMO Aegidiimarkt"].toFixed(2)),Number(byFil["TEEnJOY"].toFixed(2)),er.length?Number((total/er.length).toFixed(2)):0];
    })];
    if(fmt==="xlsx") downloadXLSX(rows,`Monatsübersicht_${selMonth}.xlsx`,"Monatsübersicht");
    else downloadCSV(rows,`Monatsübersicht_${selMonth}.csv`);
  }

  return(
    <div style={{padding:"14px"}}>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:7,letterSpacing:".06em",textTransform:"uppercase"}}>{"Monat auswählen"}</div>
        <div style={{display:"flex",gap:7}}>
          {availMonths.map(m=>(
            <button key={m} onClick={()=>setSelMonth(m)} style={{flex:1,padding:"8px 2px",borderRadius:9,fontSize:10,fontWeight:700,cursor:"pointer",border:`2px solid ${selMonth===m?C.mint:C.border}`,background:selMonth===m?C.mintLight:"#fff",color:selMonth===m?C.mintDark:C.muted}}>
              {MONTH_LABELS[m]}
            </button>
          ))}
        </div>
      </div>
      <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:8,letterSpacing:".06em",textTransform:"uppercase"}}>{"Übersicht – "}{selMonth?new Date(selMonth+"-01").toLocaleDateString("de-DE",{month:"long",year:"numeric"}):""}</div>
      <div style={{display:"flex",flexDirection:"column",gap:9,marginBottom:14}}>
        {empList.map(emp=>{
          const er=monthRecs.filter(r=>r.user===emp.vorname);
          const total=er.reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0);
          const byFil={};FILIALEN.forEach(f=>{byFil[f]=er.filter(r=>r.filiale===f).reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0);});
          const fColors=[C.mintLight,C.yellowLight,C.redLight];
          const fTColors=[C.mintDark,"#b37400",C.red];
          const contract = emp.contractHours || 0;
          const diff = contract > 0 ? total - contract : null;
          return(
            <div key={emp.key} style={S.card}>
              <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:9}}>
                <div style={{width:34,height:34,borderRadius:"50%",background:C.navy,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:emp.emoji?18:12,color:"#fff",flexShrink:0}}>{emp.emoji||emp.kuerzel}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:800,color:C.text}}>{emp.emoji&&<span style={{marginRight:3}}>{emp.emoji}</span>}{emp.vorname}</div>
                  <div style={{fontSize:9,color:C.muted}}>{emp.role==="Admin"?"Admin":"Staff"}{contract>0?` · Vertrag: ${contract}h`:""}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:18,fontWeight:800,color:C.mintDark}}>{total.toFixed(1)}<span style={{fontSize:10,color:C.muted}}> Std</span></div>
                  <div style={{fontSize:9,color:C.muted}}>{er.length} Tage</div>
                  {diff !== null && (
                    <div style={{fontSize:10,fontWeight:700,color:diff>=0?C.mintDark:C.red}}>
                      {diff>=0?`+${diff.toFixed(1)}h Mehr`:`${diff.toFixed(1)}h Weniger`}
                    </div>
                  )}
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:5}}>
                {FILIALEN.map((f,fi)=>(
                  <div key={f} style={{background:fColors[fi],borderRadius:7,padding:"6px 7px"}}>
                    <div style={{fontSize:8,fontWeight:700,color:fTColors[fi],marginBottom:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{f}</div>
                    <div style={{fontSize:12,fontWeight:800,color:fTColors[fi]}}>{byFil[f].toFixed(1)}h</div>
                    <div style={{fontSize:8,color:fTColors[fi],opacity:.7}}>{er.filter(r=>r.filiale===f).length}d</div>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{background:C.navy,borderRadius:14,padding:"16px",marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:800,color:"#fff",marginBottom:3}}>{"📥 Daten exportieren"}</div>
        <div style={{fontSize:10,color:"rgba(255,255,255,.4)",marginBottom:14}}>{"Excel oder CSV – öffnet direkt in Excel"}</div>
        {[
          {title:"Stundennachweis (Details)",sub:"Jeder Tag · Name · Datum · Filiale · Ein/Aus · Std",fnXlsx:()=>exportDetail("xlsx"),fnCsv:()=>exportDetail("csv"),file:`Detail_${selMonth}`},
          {title:"Monatsübersicht (Zusammenfassung)",sub:"Pro Mitarbeiterin · Gesamtstunden · je Filiale",fnXlsx:()=>exportSummary("xlsx"),fnCsv:()=>exportSummary("csv"),file:`Übersicht_${selMonth}`},
        ].map(({title,sub,fnXlsx,fnCsv,file})=>(
          <div key={file} style={{background:"rgba(255,255,255,.07)",borderRadius:10,padding:"12px",marginBottom:8}}>
            <div style={{fontSize:12,fontWeight:700,color:"#fff",marginBottom:2}}>{title}</div>
            <div style={{fontSize:9,color:"rgba(255,255,255,.4)",marginBottom:10}}>{sub}</div>
            <div style={{display:"flex",gap:7}}>
              <button onClick={fnXlsx} style={{flex:2,padding:"10px",borderRadius:8,border:"none",background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,color:"#fff",fontWeight:800,fontSize:11,cursor:"pointer"}}>{"⬇ Excel (.xlsx)"}</button>
              <button onClick={fnCsv} style={{flex:1,padding:"10px",borderRadius:8,border:`1px solid rgba(255,255,255,.2)`,background:"transparent",color:"rgba(255,255,255,.6)",fontWeight:700,fontSize:10,cursor:"pointer"}}>CSV</button>
            </div>
          </div>
        ))}
      </div>
      {exported&&(
        <div style={{...S.card,display:"flex",alignItems:"center",gap:9,border:`1.5px solid ${C.mint}`,background:C.mintLight}}>
          <span style={{fontSize:18}}>{"✅"}</span>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:C.mintDark}}>Datei gespeichert!</div>
            <div style={{fontSize:10,color:C.mintDark,opacity:.8}}>{exported}</div>
          </div>
        </div>
      )}
    </div>
  );
}

function AntraegeTab({ antraege, setAntraege, tauschAntraege, setTauschAntraege, absagenList, setAbsagenList, records, setRecords, aTab, setATab, openAId, setOpenAId, userKey }) {
  const nList = Array.isArray(antraege) ? antraege : [];
  const tList = Array.isArray(tauschAntraege) ? tauschAntraege : [];
  const abList = Array.isArray(absagenList) ? absagenList : [];
  const nOffene = nList.filter(a=>a.status==="offen").length;
  const tOffene = tList.filter(a=>a.status==="ausstehend_manager"||a.status==="partner_ok").length;
  const abOffene = abList.filter(a=>a.status==="offen").length;

  function decideNachtrag(a, ok) {
    setAntraege(prev=>(Array.isArray(prev)?prev:[]).map(x=>x.id===a.id?{...x,status:ok?"genehmigt":"abgelehnt"}:x));
    if (ok) {
      const existing = records.find(r=>r.user===a.user&&r.date===a.date&&r.typ==="nachtrag");
      if (!existing) {
        const newRec = {id:Date.now(),user:a.user,date:a.date,filiale:a.filiale,ein:a.ein,aus:a.aus,note:a.grund||"",typ:"nachtrag"};
        // Firebase에 직접 저장
        if (window._fbDb && window._fbRef && window._fbPush) {
          window._fbPush(window._fbRef(window._fbDb, "records"), newRec)
            .catch(e=>console.error("record save error:", e));
        }
        setRecords(prev=>[...(Array.isArray(prev)?prev:[]), newRec]);
      }
    }
    if (!ok) {
      // Firebase에서도 삭제
      if (window._fbDb && window._fbRef && window._fbGet && window._fbRemove) {
        window._fbGet(window._fbRef(window._fbDb, "records")).then(snap=>{
          const data=snap.val()||{};
          Object.entries(data).forEach(([k,v])=>{
            if(v&&v.user===a.user&&v.date===a.date&&v.typ==="nachtrag")
              window._fbRemove(window._fbRef(window._fbDb,`records/${k}`)).catch(()=>{});
          });
        });
      }
      setRecords(prev=>(Array.isArray(prev)?prev:[]).filter(r=>!(r.user===a.user&&r.date===a.date&&r.typ==="nachtrag")));
    }
    setOpenAId(null);
  }
  function reopenNachtrag(id) {
    setAntraege(prev=>(Array.isArray(prev)?prev:[]).map(a=>a.id===id?{...a,status:"offen"}:a));
    setOpenAId(null);
  }
  function decideAbsage(a, ok) {
    setAbsagenList(prev=>(Array.isArray(prev)?prev:[]).map(x=>x.id===a.id?{...x,status:ok?"genehmigt":"abgelehnt"}:x));
    setOpenAId(null);
  }

  const tabs = [
    {id:"tausch", l:"Schichttausch", n:tOffene},
  ];

  return (
    <div style={{padding:"14px"}}>
      {/* Schichttausch 바로 표시 - 탭 없음 */}
      {(()=>{
        const pendingCount = tList.filter(a=>a.status==="ausstehend_manager"||a.status==="partner_ok").length;
        return(
          <div style={{fontSize:12,fontWeight:800,color:C.text,marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
            {"🔄 Schichttausch"}
            {pendingCount>0&&<span style={{fontSize:10,padding:"2px 8px",borderRadius:99,background:C.red,color:"#fff",fontWeight:700}}>{pendingCount}</span>}
          </div>
        );
      })()}
      {(()=>{
        return(<div>
          {tList.length===0&&<div style={{...S.card,textAlign:"center",padding:"24px",color:C.muted}}>Keine Schichttausch-Antraege</div>}
          {tList.map(a=>{
            const isOpen=openAId==="t_"+a.id;
            const offen=a.status==="ausstehend_manager"||a.status==="partner_ok";
            const sc=a.status==="getauscht"?C.mintDark:a.status==="abgelehnt_manager"?C.red:C.yellow;
            const sb=a.status==="getauscht"?C.mintLight:a.status==="abgelehnt_manager"?C.redLight:C.yellowLight;
            const sl=a.status==="getauscht"?"Getauscht":a.status==="abgelehnt_manager"?"Abgelehnt":"Wartet";
            return(
              <div key={"t"+a.id} style={{...S.card,marginBottom:8,padding:0,overflow:"hidden",border:"1.5px solid "+(offen?C.yellow:a.status==="getauscht"?C.mint:C.border)}}>
                <button onClick={()=>setOpenAId(isOpen?null:"t_"+a.id)}
                  style={{width:"100%",padding:"12px 14px",background:"none",border:"none",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{textAlign:"left"}}>
                    <div style={{fontSize:13,fontWeight:700,color:C.text}}>{a.initiator+" + "+a.partner}</div>
                    <div style={{fontSize:11,color:C.muted}}>{a.initiatorDate+" mit "+a.partnerDate}</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:99,color:sc,background:sb}}>{sl}</span>
                    <span style={{fontSize:10,color:C.muted}}>{isOpen?"[-]":"[+]"}</span>
                  </div>
                </button>
                {isOpen&&(
                  <div style={{borderTop:"1px solid "+C.border,padding:"12px 14px"}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                      <div><div style={{fontSize:9,color:C.muted}}>{a.initiator}</div><div style={{fontSize:12,fontWeight:700,color:C.text}}>{a.initiatorDate}</div><div style={{fontSize:10,color:C.muted}}>{a.initiatorFiliale}</div></div>

                    </div>
                    {a.grund&&<div style={{fontSize:11,color:C.text,background:C.bg,borderRadius:8,padding:"8px 10px"}}>{a.grund}</div>}
                  </div>

          })}
        </div>);
      })()}
    </div>
  );
}

  var list = Array.isArray(antraege) ? antraege : [];
  var offene = list.filter(a => a.status === "offen");
  var done = list.filter(a => a.status !== "offen");
  var byDate = {};
  done.forEach(function(a) {
    var d = a.date || "";
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(a);
  });
  var dateKeys = Object.keys(byDate).sort(function(a,b){ return b.localeCompare(a); });

  function reopen(id) {
    setAntraege(function(prev) {
      return (Array.isArray(prev)?prev:[]).map(function(a){ return a.id===id ? {...a,status:"offen"} : a; });
    });
  }
  function decide(a, ok) {
    setAntraege(function(prev) {
      return (Array.isArray(prev)?prev:[]).map(function(x){ return x.id===a.id ? {...x,status:ok?"genehmigt":"abgelehnt"} : x; });
    });
    if (ok) {
      var exists = records.find(function(r){ return r.user===a.user && r.date===a.date && r.typ==="nachtrag"; });
      if (!exists) {
        setRecords(function(prev) {
          return [...(Array.isArray(prev)?prev:[]), {
            id:Date.now(), user:a.user, date:a.date, filiale:a.filiale,
            ein:a.ein, aus:a.aus, note:a.grund||"Nachtrag genehmigt", typ:"nachtrag"
          }];
        });
      }
    } else {
      setRecords(function(prev) {
        return (Array.isArray(prev)?prev:[]).filter(function(r){
          return !(r.user===a.user && r.date===a.date && r.typ==="nachtrag");
        });
      });
    }
  }

  return (
    <div style={{padding:"14px"}}>
      <div style={{fontSize:10, fontWeight:700, color:C.red, marginBottom:8,
        textTransform:"uppercase", letterSpacing:".05em"}}>
        {"Offene Antrage (" + offene.length + ")"}
      </div>
      {offene.length === 0 ? (
        <div style={{...S.card, textAlign:"center", color:C.muted, fontSize:12, padding:"18px", marginBottom:14}}>
          Keine offenen Antrage
        </div>
      ) : offene.map(function(a) {
        return (
          <NachtragCard key={a.id} a={a}
            isOpen={openId===a.id}
            onToggle={function(){ setOpenId(openId===a.id ? null : a.id); }}
            onDecide={function(ok){ decide(a,ok); }}
            onReopen={function(){ reopen(a.id); }}
          />
        );
      })}
      {done.length > 0 && (
        <div style={{marginTop:16}}>
          <div style={{fontSize:10, fontWeight:700, color:C.muted, marginBottom:8,
            textTransform:"uppercase", letterSpacing:".05em"}}>
            Bearbeitete Antrage
          </div>
          {done.filter(function(a){return a.status==="abgelehnt";}).length > 0 && (
            <div style={{...S.card, marginBottom:10, display:"flex", gap:20, padding:"10px 14px"}}>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:18, fontWeight:800, color:C.red}}>
                  {done.filter(function(a){return a.status==="abgelehnt";}).length}
                </div>
                <div style={{fontSize:9, color:C.muted}}>Abgelehnt</div>
              </div>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:18, fontWeight:800, color:C.mintDark}}>
                  {done.filter(function(a){return a.status==="genehmigt";}).length}
                </div>
                <div style={{fontSize:9, color:C.muted}}>Genehmigt</div>
              </div>
            </div>
          )}
          {dateKeys.map(function(d) {
            var label = d ? new Date(d).toLocaleDateString("de-DE",{day:"numeric",month:"long",year:"numeric"}) : "-";
            return (
              <div key={d} style={{marginBottom:4}}>
                <div style={{fontSize:10, color:C.muted, fontWeight:600, marginBottom:4, marginTop:8}}>{label}</div>
                {byDate[d].map(function(a) {
                  return (
                    <NachtragCard key={a.id} a={a}
                      isOpen={openId===a.id}
                      onToggle={function(){ setOpenId(openId===a.id ? null : a.id); }}
                      onDecide={function(ok){ decide(a,ok); }}
                      onReopen={function(){ reopen(a.id); }}
                    />
                  );
                })}
              </div>
            );
          })}
        </div>
      )}
      {myArchiv && myArchiv.length > 0 && (
        <div style={{marginTop:16}}>
          <div style={{fontSize:10, fontWeight:700, color:C.muted, marginBottom:8,
            textTransform:"uppercase", letterSpacing:".05em"}}>Archiv</div>
          {myArchiv.map(function(entry) { return renderErledigtCard(entry[0], entry[1]); })}
        </div>
      )}
    </div>
  );
}

// 근무 기록 상태 배지 컴포넌트
function RecStatusBadge({rec, t}) {
  if(!rec) return null;
  const pln=calcShiftMinutes(t);
  const act=rec.aus?calcShiftMinutes(`${rec.ein}-${rec.aus}`):null;
  const st=!rec.aus?"aktiv":(!pln||!act||act>=pln)?"gearbeitet":"prüfen";
  const sc=st==="gearbeitet"?C.mintDark:C.yellow;
  return(
    <div style={{textAlign:"right"}}>
      <div style={{fontSize:10,fontWeight:700,color:sc}}>
        {rec.ein}{rec.aus?` – ${rec.aus}`:" (läuft)"}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:4,justifyContent:"flex-end",marginTop:2}}>
        <span style={{fontSize:9,color:C.muted}}>{rec.aus?stdLabel(rec.ein,rec.aus):""}</span>
        <span style={{fontSize:8,padding:"1px 5px",borderRadius:99,fontWeight:700,
          background:st==="gearbeitet"?C.mintLight:C.yellowLight,
          color:sc}}>
          {st==="gearbeitet"?"Gearbeitet":st==="aktiv"?"Aktiv":"Prüfen"}
        </span>
      </div>
      {st==="prüfen"&&rec.note&&<div style={{fontSize:8,color:C.muted,marginTop:1}}>{"📝 "}{rec.note}</div>}
    </div>
  );
}

// Nach Datum - 지점별 직원 행 컴포넌트
function NachDatumFilRow({name, d, t, schedule, users, records, todayStr, C, S}) {
  const arr = !schedule[name]?[]:Array.isArray(schedule[name])?schedule[name]:Object.values(schedule[name]);
  const shift = arr.find(s=>(s.date||s.d)===d);
  const accountExists = Array.isArray(users)&&users.some(u=>u.vorname===name);
  const emp = accountExists?(Array.isArray(users)?users:[]).find(u=>u.vorname===name):null;
  const rec = accountExists?records.find(r=>r.user===name&&r.date===d):null;
  let statusLabel, statusColor, statusBg;
  if(!accountExists){
    statusLabel="Ausstehend"; statusColor=C.muted; statusBg=C.border;
  } else if(rec?.aus){
    statusLabel="Feierabend"; statusColor=C.mintDark; statusBg=C.mintLight;
  } else if(rec?.ein){
    statusLabel="Aktiv"; statusColor=C.yellow; statusBg=C.yellowLight;
  } else if(d<todayStr){
    statusLabel="Nicht erschienen"; statusColor=C.red; statusBg=C.redLight;
  } else {
    statusLabel="Ausstehend"; statusColor=C.muted; statusBg=C.border;
  }
  return(
    <div style={{display:"flex",justifyContent:"space-between",
      alignItems:"center",padding:"10px 14px",
      borderBottom:`1px solid ${C.border}`}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:30,height:30,borderRadius:"50%",
          background:accountExists?C.navy:C.border,
          display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:10,fontWeight:800,color:"#fff",flexShrink:0}}>
          {emp?emp.kuerzel:name.slice(0,2)}
        </div>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:C.text}}>{name}</div>
          {(shift?.time||shift?.t)&&(
            <div style={{fontSize:10,color:C.muted}}>{shift.time||shift.t}</div>
          )}
        </div>
      </div>
      <span style={{fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:99,
        color:statusColor,background:statusBg}}>
        {statusLabel}
      </span>
    </div>
  );
}
