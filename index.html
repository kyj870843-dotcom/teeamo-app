// ═══════════════════════════════════════════════════════════════
//  🏬 멀티 지점(프랜차이즈) 확장용 뼈대
//   현재는 Münster 1개 지점만 운영하지만, 아래 BRANCHES에 항목을 추가하면
//   지점별 로고·표기명·소속 매장 목록이 그대로 확장된다.
//
//   ▸ 새 지점 추가 예시:
//       koeln_01: {
//         id:"koeln_01", city:"Köln", nr:1,
//         logo: KOELN_LOGO_SRC,          // 도시명이 박힌 지점 로고
//         filialen:["TEEAMO Köln Dom","ONIGIRI"],
//         pin:"482913",                  // 지점 고유 PIN (총관리자 발급)
//       }
//   ▸ 향후 지점 PIN 인증 → 초대 링크(?branch=koeln_01&invite=...) 가입 플로우로 확장
// ═══════════════════════════════════════════════════════════════
const DEFAULT_BRANCH_ID = "muenster_01";
const BRANCHES = {
  muenster_01: {
    id: "muenster_01",
    city: "Münster",
    // 현재는 3개 매장을 하나로 합쳐 운영 → 도시 이름만 표기한다.
    // 나중에 지점이 늘면 nr:2 처럼 숫자를 넣으면 "Münster 2호점"으로 자동 표기된다.
    nr: null,
    logo: BRANCH_LOGO_SRC,
    // ⚠️ FILIALEN은 아래쪽에서 선언되므로 getter로 '사용 시점'에 읽는다 (TDZ 방지)
    get filialen(){ return FILIALEN; },
    pin: null,                   // 지점 고유 PIN — 총관리자 발급 시 여기 채워짐
  },
};
function getBranch(branchId){ return BRANCHES[branchId] || BRANCHES[DEFAULT_BRANCH_ID]; }
// 등록된 전체 지점 목록 (권한 설정 UI가 이 목록을 그대로 렌더링 → 지점 추가 시 자동 반영)
function allBranches(){
  return Object.values(BRANCHES).sort((a,b)=>
    a.city===b.city ? (a.nr||0)-(b.nr||0) : a.city.localeCompare(b.city));
}
// 상단 표기 텍스트: "Münster 1호점" 형태로 유연하게 결합 (지점 추가 시 자동 대응)
function branchLabel(branchId, opts){
  const b = getBranch(branchId);
  if(!b) return "";
  const style = (opts && opts.style) || "ko";     // "ko" | "de" | "city"
  if(style === "city") return b.city;
  if(style === "de")   return b.nr ? `${b.city} · Filiale ${b.nr}` : b.city;
  return b.nr ? `${b.city} ${b.nr}호점` : b.city; // 기본: Münster 1호점
}
// 사용자의 소속 지점 판별 (미지정 구 데이터는 기본 지점으로 간주 → 기존 데이터 100% 보존)
function branchIdOf(user){ return (user && user.branchId) || DEFAULT_BRANCH_ID; }
// 🔑 이 유저가 접근 가능한 지점 목록
//   · allBranches:true  → 모든 매장 접근 권한(SuperAdmin/Master, 만능키)
//   · accessibleBranches → 최고 관리자가 수동 다중 선택한 지점 코드 배열
//   · 둘 다 없으면 소속 지점 1개만 (구 데이터 100% 하위호환)
function accessibleBranchIds(user){
  if(!user) return [DEFAULT_BRANCH_ID];
  if(user.allBranches) return Object.keys(BRANCHES);
  const arr = Array.isArray(user.accessibleBranches) ? user.accessibleBranches.filter(id=>BRANCHES[id]) : [];
  return arr.length ? arr : [branchIdOf(user)];
}
function canAccessBranch(user, branchId){
  return !!user && (user.allBranches===true || accessibleBranchIds(user).indexOf(branchId)>=0);
}

// 🔄 Schichtbörse에 올라왔지만 아직 아무도 가져가지 않은 근무의 표시 이름
const OFFENE_SCHICHT = "[Offene Schicht]";

// 👤 직원 이름 비교/정규화
//   관리자 로그인 키는 소문자("yeaji")인데 표시 이름은 "Yeaji"라서
//   과거 데이터에 두 형태가 섞여 있다. 비교는 항상 대소문자·공백 무시로 한다.
// 이름 비교용 정규화: 이모지·기호·공백을 제거하고 소문자로 (한글/라틴 문자는 보존)
//   "Yeaji 🤖" · "yeaji" · " YEAJI " → 모두 "yeaji"
const _EMOJI_RE = (()=>{ try{
  return new RegExp("[\\u{FE00}-\\u{FE0F}\\u{200D}\\u{2190}-\\u{2BFF}\\u{2600}-\\u{27BF}\\u{1F000}-\\u{1FAFF}]","gu");
}catch(e){ return /[\u2190-\u2BFF\u2600-\u27BF\uFE0F\u200D]/g; } })();
function stripEmoji(v){ return String(v==null?"":v).replace(_EMOJI_RE,""); }
function nameKey(n){ return stripEmoji(n).replace(/\s+/g," ").trim().toLowerCase(); }
// 🎯 엄격 비교용 — 이모지를 그대로 살린다.
//    "Lena 🍓"와 "Lena 🐻"는 서로 '다른 사람'으로 취급해야 하므로,
//    계정 중복 검사와 신원 확정에는 이 쪽을 쓴다.
function nameKeyStrict(n){ return String(n==null?"":n).replace(/\s+/g," ").trim().toLowerCase(); }
function sameNameStrict(a,b){
  const x=nameKeyStrict(a), y=nameKeyStrict(b);
  return !!x && x===y;
}

// ═══════════════════════════════════════════════════════════════
//  🆔 사용자 고유 ID 체계
//   이 앱은 Firebase Auth 대신 users[].key를 로그인 식별자로 쓴다.
//   key는 계정 생성 후 바뀌지 않으므로 이것을 uid로 삼는다.
//   (이름·이모지는 언제든 바뀔 수 있으므로 식별에 쓰면 안 된다)
// ═══════════════════════════════════════════════════════════════
// 🏷 이 사람이 과거에 쓰던 이름들(별칭) — 이름을 바꿔도 옛 근무 데이터를 계속 인식한다.
//    예) "MJ"로 계정을 만들고 "Mengjun"으로 바꾸면 aliases:["MJ"]가 남아
//        옛 이름으로 저장된 근무표·기록이 여전히 같은 사람으로 연결된다.
function aliasesOf(u){
  return (u && Array.isArray(u.aliases)) ? u.aliases.filter(a=>typeof a==="string" && a.trim()) : [];
}
// 이름/키로 uid를 찾는다. ⚠️ 우선순위가 중요하다.
//   ① 로그인 키  ② 현재 이름  ③ 옛 이름(별칭)
//   '현재 쓰는 이름'이 남의 옛 별칭보다 항상 우선이어야, 같은 이름이 겹쳐도
//   실제 그 이름을 쓰는 사람에게 데이터가 간다.
function uidOf(users, keyOrName){
  const v = String(keyOrName==null?"":keyOrName).trim();
  if(!v) return "";
  const list = (Array.isArray(users)?users:[]).filter(Boolean);
  // ① 로그인 키
  const byKey = list.find(u=>sameName(u.key, v));                       if(byKey) return String(byKey.key);
  // ② 현재 이름 — 이모지까지 정확히 일치
  const strict = list.find(u=>sameNameStrict(u.vorname, v));            if(strict) return String(strict.key);
  // ③ 옛 이름(별칭) — 이모지까지 정확히 일치
  const aStrict = list.find(u=>aliasesOf(u).some(a=>sameNameStrict(a,v)));
  if(aStrict) return String(aStrict.key);
  // ④⑤ 이모지를 뺀 느슨한 일치는 '후보가 딱 한 명일 때만' 인정한다.
  //     (Lena 🍓 / Lena 🐻 처럼 둘 이상이면 함부로 단정하지 않는다)
  const loose = list.filter(u=>sameName(u.vorname, v));
  if(loose.length===1) return String(loose[0].key);
  const aLoose = list.filter(u=>aliasesOf(u).some(a=>sameName(a,v)));
  if(aLoose.length===1) return String(aLoose[0].key);
  return "";
}
// 특정 이름을 이 사람의 별칭으로 추가 (Temp-Konto 연결 등)
function withAlias(u, name){
  const v = String(name==null?"":name).trim();
  if(!v || sameName(v, u.vorname)) return u;
  const list = aliasesOf(u);
  if(list.some(a=>sameName(a,v))) return u;
  return { ...u, aliases:[...list, v] };
}
// 👥 이름 변경을 users 목록 전체에 적용한다.
//   변경 당사자의 옛 이름을 별칭으로 넣는 동시에,
//   '다른 사람'이 이 새 이름을 별칭으로 갖고 있으면 떼어낸다.
//   (실수로 남의 이름을 썼다가 되돌려도 서로 데이터를 가로채지 않는다)
function applyRename(users, key, newName){
  const list = Array.isArray(users)?users:[];
  const nv = String(newName==null?"":newName).trim();
  if(!nv) return list;
  return list.map(u=>{
    if(!u) return u;
    if(u.key === key) return renameUser(u, nv);
    const al = aliasesOf(u);
    return al.some(a=>sameName(a,nv)) ? { ...u, aliases: al.filter(a=>!sameName(a,nv)) } : u;
  });
}

// ✏️ 이름 변경 — 옛 이름을 자동으로 별칭에 넣는다.
//    ⚠️ vorname을 바꾸기 '전에' 호출해야 옛 이름을 붙잡을 수 있다.
//       (이 함수가 변경까지 함께 처리하므로 호출부에서 따로 바꾸지 않는다)
function renameUser(u, newName){
  const nv  = String(newName==null?"":newName).trim();
  const old = String(u.vorname==null?"":u.vorname).trim();
  if(!nv || nv === old) return u;                       // 글자까지 완전히 동일 → 변경 없음
  const list = aliasesOf(u);
  // 이모지만 붙였다 떼는 등 정규화 결과가 같으면 별칭을 만들 필요가 없다
  const needAlias = old && !sameName(old, nv) && !list.some(a=>sameName(a,old));
  const next = needAlias ? [...list, old] : list;
  // 예전 이름으로 되돌린 경우엔 그 이름을 별칭에서 뺀다
  return { ...u, vorname:nv, aliases: next.filter(a=>!sameName(a,nv)) };
}
function userByUid(users, uid){
  if(!uid) return null;
  return (Array.isArray(users)?users:[]).find(u=>u && sameName(u.key,uid)) || null;
}
// 🖋 화면 표시 문자열 = 최신 프로필(이모지 + 이름)
//   uid로 찾으므로 관리자가 이름·이모지를 바꾸면 모든 화면에 즉시 반영된다.
function personLabel(users, uid, fallbackName){
  const u = userByUid(users, uid);
  if(u) return (u.emoji ? u.emoji+" " : "") + (u.vorname || u.key);
  // 계정이 없는 임시 인력 등 → 저장된 이름을 표기만 정리해서 사용
  const raw = String(fallbackName==null?"":fallbackName).trim();
  if(!raw) return "";
  const core = stripEmoji(raw).replace(/\s+/g," ").trim();
  return (core.charAt(0).toUpperCase()+core.slice(1)) || raw;
}
// 🛡 Firebase 리스트 안전 정규화
//   Realtime DB는 배열에 구멍이 생기면 null을 넣어 돌려준다.
//   그대로 .filter(s=>!s.besetzt) 같은 코드를 돌리면 null.besetzt 로 앱이 죽는다(흰 화면).
//   모든 리스트 소비 지점에서 이 함수를 거쳐 null/비객체를 걸러낸다.
function safeList(v){
  const arr = Array.isArray(v) ? v : (v && typeof v==="object" ? Object.values(v) : []);
  return arr.filter(x => x && typeof x === "object");
}

// 🗑 근무를 '모든 저장소'에서 확실히 제거한다.
//   Dienstplan 리스트는 schedule + freieSchichten을 합쳐 보여주므로,
//   schedule만 지우면 Schichtbörse 항목이 다시 살아나 '삭제가 안 된 것처럼' 보인다.
//   → 두 곳을 함께 정리해야 실제로 사라진다.
async function deleteShiftEverywhere({ rawName, uid, date, filiale, freieSchichten, users }){
  const result = { schedule:false, boerse:0, errors:[] };
  // 1) 근무표(schedule / schedule_YYYY_MM)에서 제거
  if(rawName && rawName !== OFFENE_SCHICHT){
    try{
      await deleteScheduleShift(rawName, date);
      result.schedule = true;
    }catch(e){
      console.error("🗑 [deleteShiftEverywhere] schedule 삭제 실패:", e, { rawName, date, filiale });
      result.errors.push(e);
    }
  }
  // 2) Schichtbörse(freieSchichten)에서 같은 날짜·지점의 관련 항목 제거
  try{
    if(window._fbDb && window._fbRef && window._fbRemove){
      const targets = safeList(freieSchichten).filter(fs=>{
        if((fs.date||fs.d) !== date) return false;
        if(!sameFiliale(fs.filiale||fs.f, filiale)) return false;
        if(rawName === OFFENE_SCHICHT) return !fs.besetzt;      // 빈 근무 행 삭제
        const owner = { uid: fs.uebernommen_von_uid || fs.angeboten_von_uid || "",
                        name: fs.uebernommen_von   || fs.angeboten_von   || "" };
        return samePerson(owner, { uid, name: rawName });
      });
      for(const t of targets){
        try{
          await window._fbRemove(window._fbRef(window._fbDb, "freieSchichten/"+t.id));
          result.boerse++;
        }catch(e){
          console.error("🗑 [deleteShiftEverywhere] Schichtbörse 삭제 실패:", e, { id:t?.id, date, filiale });
          result.errors.push(e);
        }
      }
    }
  }catch(e){
    console.error("🗑 [deleteShiftEverywhere] Schichtbörse 조회 실패:", e, { rawName, uid, date, filiale });
    result.errors.push(e);
  }
  console.log("🗑 [deleteShiftEverywhere] 결과:", result, { rawName, uid, date, filiale });
  return result;
}

// 같은 사람인지 판정 — uid 우선, 없으면 이름 정규화 비교(구 데이터 호환)
function samePerson(a, b){
  const ua=String(a&&a.uid||"").trim(), ub=String(b&&b.uid||"").trim();
  if(ua && ub) return sameName(ua, ub);
  return sameName(a&&a.name, b&&b.name);
}
function sameName(a,b){
  const x=nameKey(a), y=nameKey(b);
  return !!x && x===y;
}
// 🖋 화면 표시용 이름 — 저장된 값이 "yeaji"라도 항상 "Yeaji"로 보이게 한다.
//    데이터는 건드리지 않고 표시만 통일하므로 기존 기록이 안전하다.
//    users 목록이 없는 화면(로그인 전 공개 근무표)에서는 첫 글자만 대문자 처리.
function prettyName(name, users){
  const raw = String(name==null?"":name).trim();
  if(!raw || raw === OFFENE_SCHICHT) return raw;
  const hit = (Array.isArray(users)?users:[]).find(u=>u && sameName(u.vorname, raw));
  if(hit && hit.vorname) return hit.vorname;
  return raw.charAt(0).toUpperCase() + raw.slice(1);
}

// 로그인 키 또는 이름으로 '표시용 정식 이름(vorname)'을 찾아 반환
//   users에 없으면 입력값을 그대로 쓴다 (임시 인력 등)
function displayNameOf(users, keyOrName){
  const list = Array.isArray(users)?users:[];
  const hit = list.find(u=>u && (sameName(u.key,keyOrName) || sameName(u.vorname,keyOrName)));
  return (hit && hit.vorname) ? hit.vorname : String(keyOrName==null?"":keyOrName).trim();
}

// 지점 표시 순서 (ONIGIRI는 항상 최하단)
const FILIAL_ORDER = ["TEEAMO Arkaden","TEEAMO Aegidiimarkt","TEEnJOY", ONIGIRI_FILIALE];
function filialRank(f){ if(isOnigiriFiliale(f)) return 900; const i=FILIAL_ORDER.indexOf(f); return i<0?500:i; }

// ═══════════════════════════════════════════════════════════════
//  🔒 근무 세션 키: [직원 · 날짜 · 지점] 조합으로 유일성 보장
//   · 하루에 여러 지점 근무(예: 오전 ONIGIRI + 오후 TEEnJOY)를 해도
//     각 근무가 독립된 record 문서로 생성/정산되어 중복 시급을 차단한다.
// ═══════════════════════════════════════════════════════════════
function filialeSlug(f){ return String(f||"").trim().toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"")||"none"; }
// 🆔 출퇴근 세션 ID — 이름이 아니라 고유 ID(uid)로 만든다.
//   예전엔 이름을 썼기 때문에 출근~퇴근 사이에 이름을 바꾸면 ID가 달라져
//   퇴근 시 옛 기록을 못 지우고 'Aktiv'가 계속 남는 버그가 있었다.
function sessionIdFor(name, date, filiale){
  const uid = uidOf(typeof window!=="undefined" ? window._teeamoUsers : [], name) || nameKey(name) || name;
  return "clock_"+uid+"_"+date+"_"+filialeSlug(filiale);
}
function sameFiliale(a,b){ return filialeSlug(a)===filialeSlug(b); }
// 특정 [직원·날짜·지점] 근무의 실제 기록을 찾는다.
//  · 지점을 지정하면 그 지점 기록만 반환(다른 지점 근무에 간섭 금지)
//  · 구 데이터(지점 없이 저장된 record)는 지점 지정 시 매칭에서 제외
// 🧟 '유령 진행중 기록' 판별
//   출근~퇴근 사이에 이름을 바꾸면 세션 ID가 달라져서, 퇴근 시 옛 기록(aus 없음)이
//   지워지지 않고 남는다. 그 결과 이미 퇴근했는데도 화면에 계속 'Aktiv'로 보인다.
//   → 같은 사람·날짜·지점에 '완료된 기록'이 있으면, 그보다 이르거나 같은 시각에
//     시작된 진행중 기록은 이미 끝난 근무로 간주해 무시한다.
function isStaleOpenRecord(rec, list){
  if(!rec || (rec.aus && rec.aus!=="")) return false;
  return (list||[]).some(r =>
    r && r!==rec && r.aus && r.aus!=="" &&
    String(r.ein||"") >= String(rec.ein||"")
  );
}
function recordForShift(records, name, date, filiale){
  const list=(Array.isArray(records)?records:[]).filter(r=>r&&sameName(r.user,name)&&r.date===date);
  if(filiale===undefined||filiale===null) return list[0]||null;
  const exact=list.filter(r=>sameFiliale(r.filiale, filiale));
  if(exact.length===0) return null;
  const byLatest=(a,b)=>String(b.ein||"").localeCompare(String(a.ein||""));
  // 진행 중(aus 없음) 우선 — 단, 유령 기록은 제외
  const live = exact.filter(r=>(!r.aus||r.aus==="") && !isStaleOpenRecord(r, exact))
                    .sort(byLatest)[0];
  if(live) return live;
  // 진행중 근무가 없으면 완료 기록 중 가장 최근 것을 쓴다.
  // (유령 기록은 절대 고르지 않는다 — 고르면 화면이 계속 Aktiv로 보인다)
  const done = exact.filter(r=>r.aus && r.aus!=="").sort(byLatest)[0];
  if(done) return done;
  return exact.filter(r=>!isStaleOpenRecord(r, exact)).sort(byLatest)[0] || null;
}

function lsGet(key, fallback) {
  try { const v=localStorage.getItem(key); if(v!==null) return JSON.parse(v); return fallback; } catch { return fallback; }
}
function lsSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

// API     localStorage 
function usePersist(lsKey, init) {
  const [state, setState] = React.useState(() => lsGet(lsKey, init));
  const setAndSave = React.useCallback((updater) => {
    setState(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      lsSet(lsKey, next);
      return next;
    });
  }, [lsKey]);
  return [state, setAndSave];
}

function usePinStore() {
  function getPin(userKey) {
    // 캐시 우선
    if (_pinCache[userKey]) return _pinCache[userKey];
    // localStorage에서 읽고 Firebase에도 동기화
    const local = lsGet(`pin_${userKey}`, null);
    if (local && window._fbDb && window._fbRef && window._fbSet) {
      _pinCache[userKey] = local;
      window._fbSet(window._fbRef(window._fbDb, `pins/${userKey}`), local)
        .catch(e => {});
    }
    return local;
  }

  function setPin(userKey, pin) {
    // localStorage 저장
    lsSet(`pin_${userKey}`, pin);
    // 캐시 업데이트
    _pinCache[userKey] = pin;
    // Firebase 저장
    if (window._fbDb && window._fbRef && window._fbSet) {
      window._fbSet(window._fbRef(window._fbDb, `pins/${userKey}`), pin)
        .catch(e => console.error("PIN save error:", e));
    }
  }

  function initPins(users) {
    (Array.isArray(users)?users:[]).forEach(u => {
      if (!lsGet(`pin_${u.key}`, null) && u.pin) {
        lsSet(`pin_${u.key}`, u.pin);
      }
    });
  }

  return { getPin, setPin, initPins };
}

// ⏱ 시간 기반 자동 잠김 없음 — 버전 텍스트를 3번 더 탭하면 즉시 잠긴다(토글).

async function sha256Hex(text){
  const buf = new TextEncoder().encode(String(text));
  const dig = await crypto.subtle.digest("SHA-256", buf);
  return [...new Uint8Array(dig)].map(b=>b.toString(16).padStart(2,"0")).join("");
}

// 🔑 설정된 암호 읽기 (코드 상수만 사용 — 빌드 환경변수에 의존하지 않는다)
//    아직 안 바꾼 예시 문구는 '미설정'으로 처리해 사고를 막는다.
function resolveMaster(){
  const PLACEHOLDERS = ["여기에암호작성","여기에_해시","내가정한암호","teeamo-dev-2026!",""];
  const clean = v => {
    const t = (typeof v === "string" ? v.trim() : "");
    return PLACEHOLDERS.indexOf(t) >= 0 ? "" : t;
  };
  const hash = clean(MASTER_HASH);
  const key  = clean(MASTER_KEY);
  if(hash) return { key:"",  hash, source:"MASTER_HASH (해시)" };
  if(key)  return { key, hash:"", source:"MASTER_KEY (평문)" };
  return { key:"", hash:"", source:"" };          // 미설정
}

// ✅ 입력값 검증 — 설정값·입력값 양쪽 모두 trim 후 비교
//    반환: { ok, reason }   reason: "no-config" | "mismatch" | "crypto" | ""
async function verifyMasterCode(input){
  const cfg = resolveMaster();
  const typed = String(input == null ? "" : input).trim();
  if(!cfg.key && !cfg.hash) return { ok:false, reason:"no-config" };
  if(!typed)                return { ok:false, reason:"mismatch" };
  if(cfg.key)               return { ok: typed === cfg.key, reason:"mismatch" };
  try{
    return { ok: (await sha256Hex(typed)) === cfg.hash, reason:"mismatch" };
  }catch(e){
    return { ok:false, reason:"crypto" };   // crypto.subtle은 HTTPS에서만 동작
  }
}

// 🐞 디버깅 표 — 암호 값 자체는 절대 표시하지 않고 '설정 상태'만 보여준다.

if(typeof window !== "undefined" && !window._teeamoUsers) window._teeamoUsers = [];

function useFirebase(path, fallback) {
  const [data, setData] = useState(fallback);
  const [ready, setReady] = useState(false);
  const unsubRef = useRef(null);

  useEffect(() => {
    let cancelled = false;

    function attach() {
      const db = window._fbDb;
      const fbRef = window._fbRef;
      const fbOnValue = window._fbOnValue;
      if (!db || !fbRef || !fbOnValue) return false;
      const r = fbRef(db, path);
      // onValue returns unsubscribe fn
      unsubRef.current = fbOnValue(r, snap => {
        if (cancelled) return;
        const val = snap.val();
        if (val === null) {
          setData(fallback);
        } else if (Array.isArray(fallback)) {
          // Firebase stores arrays as objects with numeric/string keys
          setData(Object.values(val));
        } else {
          setData(val);
        }
        setReady(true);
      });
      return true;
    }

    if (attach()) return () => { cancelled=true; if(unsubRef.current) unsubRef.current(); };

    let tries = 0;
    const iv = setInterval(() => {
      tries++;
      if (attach()) { clearInterval(iv); return; }
      if (tries > 30) {
        clearInterval(iv);
        console.error("Firebase 연결 실패:", path);
        setData(fallback);
        setReady(true);
      }
    }, 500);

    return () => { cancelled=true; clearInterval(iv); if(unsubRef.current) unsubRef.current(); };
  }, [path]);

  // setter: Firebase   onValue  UI 
  // 🏬 저장되는 모든 근태/스케줄/유저 데이터에 branchId 꼬리표를 자동 부착.
  //    각 호출부를 고치지 않고 저장 길목 한 곳에서 처리해 누락을 원천 차단한다.
  //    (이미 branchId가 있으면 그대로 보존 → 기존 데이터 무손실)
  function tagBranch(v){
    if(!v || typeof v!=="object") return v;
    return v.branchId ? v : { ...v, branchId: activeBranchId() };
  }
  function fbWrite(next) {
    if (!window._fbDb || !window._fbRef || !window._fbSet) return;
    const TAG_PATHS = ["users","records","antraege","schedule","absagen","archiv","freieSchichten"];
    const needTag = TAG_PATHS.indexOf(path)>=0 || path.indexOf("schedule_")===0;
    if(needTag && next && typeof next==="object"){
      if(Array.isArray(next)) next = next.map(tagBranch);
      else next = Object.fromEntries(Object.entries(next).map(([k,v])=>[
        k, Array.isArray(v) ? v.map(tagBranch) : tagBranch(v)
      ]));
    }
    let toSave;
    if (Array.isArray(next)) {
      if (next.length === 0) { toSave = null; }
      else {
        // users path: PIN Firebase  
        const sanitize = path === "users"
          ? v => { const {pin:_, ...rest} = v; return rest; }
          : v => v;
        toSave = Object.fromEntries(next.map((v,i) => [String(v.id||v.key||i), sanitize(v)]));
      }
    } else if (next && typeof next === "object" && Object.keys(next).length === 0) {
      toSave = null;
    } else {
      toSave = next;
    }
    window._fbSet(window._fbRef(window._fbDb, path), toSave)
      .catch(e => console.error("FB write error ["+path+"]:", e));
  }

  function setter(updater) {
    //  :    + Firebase 
    setData(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      fbWrite(next);
      return next;
    });
  }

  //    (path/field  ,   )
  function fbUpdateField(subPath, value) {
    if (!window._fbDb || !window._fbRef || !window._fbSet) return;
    window._fbSet(window._fbRef(window._fbDb, path + "/" + subPath), value)
      .catch(e => console.error("FB field write error:", e));
  }

  return [data, setter, ready, fbUpdateField];
}

function pad(n) { return String(n).padStart(2, "0"); }
function useNow() {

  return t;

function stunden(ein, aus) {
  if (!ein || !aus) return null;
  const [eh, em] = ein.split(":").map(Number);
  const [ah, am] = aus.split(":").map(Number);
  return (ah * 60 + am - eh * 60 - em) / 60;
}
function stdLabel(ein, aus) { const h = stunden(ein, aus); return h === null ? "–" : h.toFixed(2) + "h"; }
// 근무표(schedule)에서 name·date의 예정 종료시간("HH:MM") 추출 — 자동 강제 퇴근용
//  · root({d,f,t}) / 월별({date,filiale,time}) 두 스키마 모두 지원
//  · 같은 날 여러 shift가 있으면 가장 늦은 종료시간을 채택
//  · Onigiri 등 시간이 없는 근무(time:"")는 건너뜀
function scheduledEndTimeFor(schedule, name, date, filiale){
  const sh = schedule && schedule[name];
  const arr = !sh ? [] : (Array.isArray(sh) ? sh : Object.values(sh));
  const sameDay = arr.filter(s => s && (s.date||s.d) === date);
  // 🔒 지점이 주어지면 그 지점 스케줄의 종료시간만 사용 (다중 근무일 혼선 방지)
  const scoped = filiale ? sameDay.filter(s => sameFiliale(s.filiale||s.f, filiale)) : sameDay;
  const ends = (scoped.length?scoped:(filiale?[]:sameDay))
    .map(s => {
      const tm = s.time || s.t || "";
      if(String(tm).includes("-")) return String(tm).split("-")[1].trim();
      // 별도 필드로 저장된 경우도 지원
      return String(s.bis || s.end || "").trim();
    })
    .filter(v => /^\d{1,2}:\d{2}$/.test(v))
    .map(v => v.length===4 ? "0"+v : v);
  if(!ends.length) return null;
  return ends.sort()[ends.length-1];   // 가장 늦은 예정 종료시간
}
// 🌙 자동 강제 퇴근에 쓸 퇴근시각 결정.
//    1순위: 근무표의 예정 종료시간  /  2순위(Fallback): 출근시각 + AUTO_FALLBACK_H 시간
//    ⚠️ 어떤 경우에도 '출근시각과 동일한 값'을 반환하지 않는다(0시간 근무 방지).
const AUTO_FALLBACK_H = 8;
function autoCheckoutAus(schedule, rec){
  const ein = rec && rec.ein;
  // 해당 기록의 지점 스케줄에서 예정 종료시간을 찾는다
  const planned = scheduledEndTimeFor(schedule, rec && rec.user, rec && rec.date, rec && rec.filiale);
  if(planned && planned !== ein) return { aus:planned, viaPlan:true };
  // Fallback: 출근 + N시간 (자정 넘기면 23:59로 클램프)
  const [h,m] = String(ein||"09:00").split(":").map(Number);
  const total = (h||0)*60 + (m||0) + AUTO_FALLBACK_H*60;
  const cl = Math.min(total, 23*60+59);
  const fb = pad(Math.floor(cl/60)) + ":" + pad(cl%60);
  return { aus: fb===ein ? "23:59" : fb, viaPlan:false };
}
// 📌 특정 근무(name·date)에 대한 Nachtragen 신청 상태 — 신청 버튼 락 장치용
//    반환: "genehmigt"(승인 완료) | "offen"(승인 대기) | null(없음)
function nachtragStatusFor(antraege, name, date, filiale){
  const list = (Array.isArray(antraege)?antraege:[])
    .filter(a => a && sameName(a.user,name) && a.date===date &&
      (filiale===undefined||filiale===null||!a.filiale||sameFiliale(a.filiale, filiale)) &&
      (a.typ==="nachtrag" || a.kategorie==="Nachtrag" || a.ein || a.aus));
  if(list.some(a => a.status==="genehmigt" || a.status==="approved")) return "genehmigt";
  if(list.some(a => !a.status || a.status==="offen" || a.status==="pending")) return "offen";
  return null;
}
// 🍙 표시용 라벨: 지점명 + 근무타입 결합 (예: "Arkaden (🍙 Onigiri)")
//    Regulär(normal)은 기본값이므로 지점명만 표시해 화면을 깔끔하게 유지한다.
function filialeMitTyp(filiale, typ, opts){
  const short = String(filiale||"—").replace("TEEAMO ","");
  const t = typNorm(typ);
  if(t==="normal" && !(opts&&opts.always)) return short;
  return short+" ("+typIcon(t)+" "+typLabel(t)+")";
}
// 실제(Ist) 근무시간: name·date의 실제 출퇴근 or 승인된 Nachtragen 시간을 반환.
//  · 승인된 Nachtragen(typ:"nachtrag") 우선 → 그다음 완료된 실시간 출퇴근 기록.
//  · 완전한 ein·aus 쌍이 있을 때만 반환(진행 중/미출근이면 null → Ist 미표시).
function istTimeFor(records, name, date, filiale){
  const list = (Array.isArray(records)?records:[]).filter(r=>r&&sameName(r.user,name)&&r.date===date&&
    (filiale===undefined||filiale===null||sameFiliale(r.filiale, filiale)));
  if(!list.length) return null;
  // ⏱ 같은 날 같은 지점에서 여러 번 근무했다면 '가장 최근(출근 시각이 늦은)' 기록을 쓴다.
  //    (배열 순서상 앞에 있던 옛 기록이 최신 도장을 덮어 표시되던 버그 수정)
  const byLatest = (a,b)=> String(b.ein||"").localeCompare(String(a.ein||""));
  const nach = list.filter(r=>r.typ==="nachtrag" && r.ein && r.aus).sort(byLatest)[0];
  const done = list.filter(r=>r.ein && r.aus).sort(byLatest)[0];
  const pick = nach || done;
  if(!pick || !pick.ein || !pick.aus) return null;
  return { ein:pick.ein, aus:pick.aus, isNachtrag:pick.typ==="nachtrag", isAuto:!!pick.isAutoCheckedOut };
}

// ═══════════════════════════════════════════════════════════════
//  📊 3차원 교차 통계: 직원 → 지점(Filiale) → 근무타입(Arbeitstyp)
//   · records의 typ: "normal"(Regulär) | "einspringen" | "nachtrag"
//     (구 데이터의 "onigiri"는 typNorm()이 Regulär로 귀속시키고, 지점 ONIGIRI가 구분)
//   · "nachtrag"(사후등록)은 별도 타입이 아니라 정규 근무의 보정이므로
//     집계상 "normal"(Regulär)로 귀속시키되, 원장부에는 Nachtrag 여부를 남긴다.
// ═══════════════════════════════════════════════════════════════
function statTyp(r){ const t=String(r&&r.typ||"normal").toLowerCase(); return t==="nachtrag" ? "normal" : typNorm(t); }
function recHours(r){ const h=stunden(r&&r.ein, r&&r.aus); return h==null?0:h; }
// 한 직원의 월간 기록 → {total, byFiliale:[{filiale,total,byTyp:[{typ,icon,lbl,std}]}]}
function buildBreakdown(recs){
  const list=(Array.isArray(recs)?recs:[]).filter(r=>r&&r.ein&&r.aus);
  const total=list.reduce((a,r)=>a+recHours(r),0);
  const filMap={};
  list.forEach(r=>{
    const f=r.filiale||"—";
    const t=statTyp(r);
    filMap[f]=filMap[f]||{filiale:f,total:0,typs:{}};
    filMap[f].total+=recHours(r);
    filMap[f].typs[t]=(filMap[f].typs[t]||0)+recHours(r);
  });
  const byFiliale=Object.values(filMap)
    .sort((a,b)=>filialSort(a.filiale,b.filiale))
    .map(x=>({
      filiale:x.filiale, total:x.total,
      byTyp:ARBEITSTYPEN.filter(t=>(x.typs[t.typ]||0)>0)
        .map(t=>({typ:t.typ,icon:t.icon,lbl:t.lbl,std:x.typs[t.typ]}))
        .sort((a,b)=>b.std-a.std),
    }));
  return { total, byFiliale };
}

// ── 📥 CSV Export (외부 라이브러리 없이 Blob + a[download]) ──────────
function csvEscape(v){ return '"'+String(v==null?"":v).replace(/"/g,'""')+'"'; }
function downloadCsvRows(rows, filename){
  const bom="\uFEFF";
  const csv=bom+rows.map(r=>r.map(csvEscape).join(";")).join("\r\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}
// 근무표에서 계획 시작/종료 시간 추출 → {von,bis}
function plannedTimesFor(schedule, name, date){
  const sh=schedule&&schedule[name];
  const arr=!sh?[]:(Array.isArray(sh)?sh:Object.values(sh));
  const hit=arr.find(s=>(s&&(s.date||s.d))===date);
  const tm=hit&&(hit.time||hit.t);
  if(tm&&String(tm).includes("-")){
    const p=String(tm).split("-");
    return { von:(p[0]||"").trim(), bis:(p[1]||"").trim() };
  }
  return { von:"", bis:"" };
}

// ═══════════════════════════════════════════════════════════════
//  PlanImage  — v5 (Dynamic Aspect-Ratio Container)
//
//  · 컨테이너 높이가 이미지 비율에 맞춰 자동 결정 → 빈 공간 없음
//  · width: 100%,  height = cw × (natH / natW)  (여백 0)
//  · sc=1 상태에서 이미지가 컨테이너를 정확히 채움 (letterbox 없음)
//  · 더블탭 = sc=1 리셋 (여백 없는 전체 이미지 상태)
//  · 핀치줌/휠 줌 (1×~5×), 확대 시에만 드래그 팬, 경계 clamp
//  · overflow:hidden → 레이아웃 절대 밀림 없음
// ═══════════════════════════════════════════════════════════════
function PlanImage({ src }) {
  const boxRef = useRef(null);

  const Z = useRef({
    sc:1, tx:0, ty:0,
    sc0:1, tx0:0, ty0:0,
    d0:0, ptx:0, pty:0,
    dragging:false, lastTap:0
  });
  const [xf, setXf] = useState({ sc:1, tx:0, ty:0 });

  // 이미지 원본 크기 (onLoad 후 확정)
  const [nat, setNat] = useState(null); // { w, h }

  // 컨테이너 너비 (마운트 + nat 확정 후 재측정)
  const [cw, setCw] = useState(375);

  React.useEffect(() => {
    const el = boxRef.current;
    if (el) setCw(el.clientWidth || 375);
  }, [nat]); // nat 바뀌면 컨테이너 크기 재측정

  // 동적 컨테이너 높이: 이미지 비율에 꼭 맞음
  const containerH = nat ? Math.round(cw * nat.h / nat.w) : 200;

  // fitSc: sc=1 일 때 이미지가 컨테이너를 정확히 채우는 배율
  // (width 기준이면 nat.w → cw, height는 자동으로 맞음)
  const fitSc = nat ? cw / nat.w : 1;

  // ── 이벤트 핸들러 ─────────────────────────────────────────
  React.useEffect(() => {
    const el = boxRef.current;
    if (!el) return;
    const z = Z.current;

    const commit = (sc, tx, ty) => {
      const totSc  = fitSc * sc;
      const visW   = (nat ? nat.w : cw)         * totSc;
      const visH   = (nat ? nat.h : containerH) * totSc;
      const maxTx  = Math.max(0, (visW - cw)         / 2);
      const maxTy  = Math.max(0, (visH - containerH) / 2);
      const cl     = (v, m) => Math.max(-m, Math.min(m, v));
      z.sc = sc;
      z.tx = cl(tx, maxTx);
      z.ty = cl(ty, maxTy);
      setXf({ sc: z.sc, tx: z.tx, ty: z.ty });
    };
    const reset = () => commit(1, 0, 0);
    const dist  = ts => Math.hypot(
      ts[0].clientX - ts[1].clientX,
      ts[0].clientY - ts[1].clientY
    );

    function onTouchStart(e) {
      if (e.touches.length === 2) {
        z.d0=dist(e.touches); z.sc0=z.sc; z.tx0=z.tx; z.ty0=z.ty;
      } else if (e.touches.length === 1) {
        z.ptx=e.touches[0].clientX; z.pty=e.touches[0].clientY;
        z.tx0=z.tx; z.ty0=z.ty;
        const now = Date.now();
        if (now - z.lastTap < 300) reset();
        z.lastTap = now;
      }
    }
    function onTouchMove(e) {
      e.preventDefault();
      if (e.touches.length === 2) {
        commit(
          Math.min(5, Math.max(1, z.sc0 * (dist(e.touches) / z.d0))),
          z.tx0, z.ty0
        );
      } else if (e.touches.length === 1 && z.sc > 1) {
        commit(
          z.sc,
          z.tx0 + (e.touches[0].clientX - z.ptx),
          z.ty0 + (e.touches[0].clientY - z.pty)
        );
      }
    }
    function onTouchEnd(e) {
      z.tx0=z.tx; z.ty0=z.ty;
      if (e.touches.length === 1) {
        z.ptx=e.touches[0].clientX;
        z.pty=e.touches[0].clientY;
      }
    }
    function onMouseDown(e) {
      if (z.sc <= 1) return;
      z.dragging=true;
      z.ptx=e.clientX; z.pty=e.clientY; z.tx0=z.tx; z.ty0=z.ty;
      e.preventDefault();
    }
    function onMouseMove(e) {
      if (!z.dragging) return;
      commit(z.sc, z.tx0+(e.clientX-z.ptx), z.ty0+(e.clientY-z.pty));
    }
    const stopDrag = () => { z.dragging=false; };
    function onWheel(e) {
      e.preventDefault();
      commit(
        Math.min(5, Math.max(1, z.sc * (e.deltaY > 0 ? 0.88 : 1.14))),
        z.tx, z.ty
      );
    }

    el.addEventListener("touchstart",  onTouchStart,  { passive: true  });
    el.addEventListener("touchmove",   onTouchMove,   { passive: false });
    el.addEventListener("touchend",    onTouchEnd,    { passive: true  });
    el.addEventListener("mousedown",   onMouseDown);
    el.addEventListener("mousemove",   onMouseMove);
    el.addEventListener("mouseup",     stopDrag);
    el.addEventListener("mouseleave",  stopDrag);
    el.addEventListener("wheel",       onWheel,       { passive: false });
    el.addEventListener("dblclick",    reset);
    return () => {
      el.removeEventListener("touchstart",  onTouchStart);
      el.removeEventListener("touchmove",   onTouchMove);
      el.removeEventListener("touchend",    onTouchEnd);
      el.removeEventListener("mousedown",   onMouseDown);
      el.removeEventListener("mousemove",   onMouseMove);
      el.removeEventListener("mouseup",     stopDrag);
      el.removeEventListener("mouseleave",  stopDrag);
      el.removeEventListener("wheel",       onWheel);
      el.removeEventListener("dblclick",    reset);
    };
  }, [fitSc, nat, cw, containerH]);

  if (!src) return null;

  const { sc, tx, ty } = xf;
  const totSc    = fitSc * sc;
  const transform = `translate(-50%,-50%) scale(${totSc}) translate(${tx/totSc}px,${ty/totSc}px)`;

  // 컨테이너: 이미지 비율에 딱 맞는 높이, 빈 공간 없음
  const box = {

function parseMinutes(timeStr) {
  if (!timeStr) return null;
  const [h, m] = timeStr.split(":").map(Number);
  return h * 60 + m;
}
function calcShiftMinutes(timeRange) {
  if (!timeRange) return null;
  const [start, end] = timeRange.split("-");
  const s = parseMinutes(start), e = parseMinutes(end);
  if (s == null || e == null) return null;
  return e > s ? e - s : null;
}
function getShiftStatus(shift, actualRec, date) {
  const todayStr = today();
  const shiftDate = date || todayStr;
  if (!actualRec) {
    // 날짜 기준: 과거면 nicht erschienen, 오늘 이후면 ausstehend
    if (shiftDate < todayStr) return "nicht erschienen";
    return "ausstehend";
  }
  if (!actualRec.aus || actualRec.aus === "") return "aktiv";
  if (actualRec.geprüft) return "gearbeitet";   // 관리자 OK 확인 완료 → 최종 Feierabend
  if (actualRec.prüfen) return "prüfen";         // 조기 퇴근 → 확인 대기
  const planned = calcShiftMinutes(shift.time || shift.t);
  const actual = calcShiftMinutes(`${actualRec.ein}-${actualRec.aus}`);
  if (planned == null || actual == null) return "gearbeitet";
  return actual >= planned ? "gearbeitet" : "prüfen";
}

//  MEINE SCHICHTEN SECTION 
function MeineSchichtenSection({ userName, myShifts, records, users }) {
  const todayStr = today();
  const [tauschAntraege, setTauschAntraege] = useFirebase("schichttausch", []);
  const [antraege] = useFirebase("antraege", []);
  const [notifications, setNotifications] = useFirebase("notifications", {});
  const [schedule, setSchedule] = useFirebase("schedule", {});

  //   Tausch  
  const pendingTausch = Object.entries(notifications||{})
    .filter(([,n]) => n.type==="tausch_anfrage" && n.targetUser===userName && !n.gelesen);

  function bestaetigenTausch(notifKey, antragId, ok) {
    //   
    if (window._fbDb && window._fbRef && window._fbSet) {
      window._fbSet(window._fbRef(window._fbDb, `notifications/${notifKey}/gelesen`), true)
        .catch(e => console.error(e));
    }

    const list = Array.isArray(tauschAntraege) ? tauschAntraege : [];
    const antrag = list.find(a => a.id === antragId);
    if (!antrag) return;

    if (!ok) {
      setTauschAntraege(prev => (Array.isArray(prev)?prev:[]).map(a =>
        a.id===antragId ? {...a, status:"abgelehnt_partner"} : a
      ));
      return;
    }

    //    schedule  (  )
    if (window._fbDb && window._fbRef && window._fbSet && window._fbOnValue) {
      // once unsubscribe  (onlyOnce: true)
      window._fbOnValue(window._fbRef(window._fbDb, "schedule"), snap => {
        const sched = snap.val() ? JSON.parse(JSON.stringify(snap.val())) : {};
        // initiator:       
        sched[antrag.initiator] = (sched[antrag.initiator]||[])
          .filter(s => (s.d||s.date) !== antrag.initiatorDate);
        sched[antrag.initiator] = [...sched[antrag.initiator],
          {d: antrag.partnerDate, f: antrag.partnerFiliale, t: antrag.partnerTime||null}];
        // partner:     initiator  
        sched[antrag.partner] = (sched[antrag.partner]||[])
          .filter(s => (s.d||s.date) !== antrag.partnerDate);
        sched[antrag.partner] = [...sched[antrag.partner],
          {d: antrag.initiatorDate, f: antrag.initiatorFiliale, t: antrag.initiatorTime||null}];
        window._fbSet(window._fbRef(window._fbDb, "schedule"), sched)
        // root schedule update
        window._fbSet(window._fbRef(window._fbDb, "schedule"), sched)
          .then(() => console.log("root schedule swapped"))
          .catch(e => console.error("root error:", e));
        // monthly schedule_YYYY_MM update (admin + partner real-time)
        const affectedMonths = [...new Set([
          antrag.initiatorDate ? antrag.initiatorDate.slice(0,7).replace("-","_") : null,
          antrag.partnerDate ? antrag.partnerDate.slice(0,7).replace("-","_") : null,
        ])].filter(Boolean);
        affectedMonths.forEach(mk => {
          const fk = "schedule_"+mk;
          window._fbOnValue(window._fbRef(window._fbDb, fk), mSnap => {
            const ms = mSnap.val() ? JSON.parse(JSON.stringify(mSnap.val())) : {};
            const iArr = Object.values(ms[antrag.initiator]||{});
            const iNew = iArr.filter(s=>(s.d||s.date)!==antrag.initiatorDate);
            if((antrag.partnerDate||"").slice(0,7).replace("-","_")===mk)
              iNew.push({d:antrag.partnerDate,f:antrag.partnerFiliale,t:antrag.partnerTime||null});
            ms[antrag.initiator]=Object.fromEntries(iNew.map((s,ii)=>[String(ii),s]));
            const pArr = Object.values(ms[antrag.partner]||{});
            const pNew = pArr.filter(s=>(s.d||s.date)!==antrag.partnerDate);
            if((antrag.initiatorDate||"").slice(0,7).replace("-","_")===mk)
              pNew.push({d:antrag.initiatorDate,f:antrag.initiatorFiliale,t:antrag.initiatorTime||null});
            ms[antrag.partner]=Object.fromEntries(pNew.map((s,ii)=>[String(ii),s]));
            window._fbSet(window._fbRef(window._fbDb, fk), ms).catch(()=>{});
          }, {onlyOnce:true});
        });
       }, {onlyOnce: true});
    }

    //   getauscht
    setTauschAntraege(prev => (Array.isArray(prev)?prev:[]).map(a =>
      a.id===antragId ? {...a, status:"getauscht", partnerBestaetigt:true} : a
    ));

    //  2    (teddy + yeaji)

// ── 스케줄 shift 부분 수정 헬퍼: root schedule({d,f,t}) + 월별({date,filiale,time}) 두 노드에서
//    (직원 name · 날짜 date)에 해당하는 shift를 찾아 patch(status/getauschtMit/getauschtVon 등)를 병합 저장.
//    교환(Freigeben/Getauscht) 히스토리를 스케줄 자체에 기록하여 직원·관리자 모든 화면에 실시간 반영한다.
// 🔑 schedule 노드에서 실제로 저장된 키를 대소문자 무시로 찾아준다.
//    "Yeaji"로 조회해도 과거에 "yeaji"로 저장된 데이터를 찾아낸다.
//    (못 찾으면 입력값 그대로 → 신규 저장 시 정식 표기 유지)
function scheduleKeyOf(obj, name){
  if(!obj || typeof obj!=="object") return name;
  if(Object.prototype.hasOwnProperty.call(obj, name)) return name;
  const hit = Object.keys(obj).find(k=>sameName(k, name));
  return hit || name;
}

async function patchScheduleShift(name, date, patch) {
  if (!(window._fbDb && window._fbRef && window._fbGet && window._fbSet)) return;
  try {
    // 1) root schedule
    const rsnap = await window._fbGet(window._fbRef(window._fbDb, "schedule"));
    const root = rsnap.val() ? JSON.parse(JSON.stringify(rsnap.val())) : {};
    const rKey = scheduleKeyOf(root, name);
    if (root[rKey]) {
      let arr = Array.isArray(root[rKey]) ? root[rKey] : Object.values(root[rKey] || {});
      arr = arr.map(s => (s.d || s.date) === date ? { ...s, ...patch } : s);
      root[rKey] = arr;
      await window._fbSet(window._fbRef(window._fbDb, "schedule"), root);
    }
    // 2) 월별 schedule_YYYY_MM
    const mk = "schedule_" + date.slice(0, 7).replace("-", "_");
    const msnap = await window._fbGet(window._fbRef(window._fbDb, mk));
    const mdata = msnap.val() ? JSON.parse(JSON.stringify(msnap.val())) : null;
    const mKey = mdata ? scheduleKeyOf(mdata, name) : name;
    if (mdata && mdata[mKey]) {
      let arr = Array.isArray(mdata[mKey]) ? mdata[mKey] : Object.values(mdata[mKey] || {});
      arr = arr.map(s => (s.date || s.d) === date ? { ...s, ...patch } : s);
      mdata[mKey] = Object.fromEntries(arr.map((s, i) => [String(i), s]));
      await window._fbSet(window._fbRef(window._fbDb, mk), mdata);
    }
  } catch (e) { console.error("patchScheduleShift error:", e); }
}

// (name·date) shift를 root + 월별 노드에서 삭제
async function deleteScheduleShift(name, date) {
  if (!(window._fbDb && window._fbRef && window._fbGet && window._fbSet)) return;
  try {
    const mk = "schedule_" + date.slice(0,7).replace("-","_");
    const snap = await window._fbGet(window._fbRef(window._fbDb, mk));
    const ex = snap.val() ? JSON.parse(JSON.stringify(snap.val())) : {};
    // 👤 대소문자가 다르게 저장된 과거 데이터도 확실히 삭제되도록 키를 해석한다
    const eKey = scheduleKeyOf(ex, name);
    if (ex[eKey]) {
      let arr = Array.isArray(ex[eKey]) ? ex[eKey] : Object.values(ex[eKey] || {});
      arr = arr.filter(s => (s.date || s.d) !== date);
      ex[eKey] = Object.fromEntries(arr.map((s,i)=>[String(i), s]));
      await window._fbSet(window._fbRef(window._fbDb, mk), ex);
    }
    const rsnap = await window._fbGet(window._fbRef(window._fbDb, "schedule"));
    const root = rsnap.val() ? JSON.parse(JSON.stringify(rsnap.val())) : {};
    const rKey = scheduleKeyOf(root, name);
    if (root[rKey]) {
      let rarr = Array.isArray(root[rKey]) ? root[rKey] : Object.values(root[rKey] || {});
      rarr = rarr.filter(s => (s.d || s.date) !== date);
      root[rKey] = rarr;
      await window._fbSet(window._fbRef(window._fbDb, "schedule"), root);
    }
  } catch (e) { console.error("deleteScheduleShift error:", e); }
}

// 근무 양도(Schicht freigeben): freieSchichten 게시 + 동료 알림 + schedule 상태 'freigegeben'
// ⚠️ 이 로직은 데이터 초기화(Reset)와 무관하게 항상 코드에 존재한다(격리/보호).

    angeboten_von:userName, angeboten_von_uid:uidOf(users,userName)||"", ts:schichtId };

// Nachtragen(사후 등록): 자동승인 record 저장 + 관리자 Anträge(Nachtragen) 알림 로그
function nachtragenSchicht({ userName, date, filiale, ein, aus, setRecords }) {
  const rec = { id:Date.now(), user:userName, date, filiale:filiale||"", ein, aus, note:"", typ:"nachtrag" };
  if (typeof setRecords === "function") {
    setRecords(prev => [...(Array.isArray(prev)?prev:[]), rec]);  // 로컬 + Firebase 전체노드 동기화
  } else if (window._fbDb && window._fbRef && window._fbPush) {
    window._fbPush(window._fbRef(window._fbDb,"records"), rec).catch(()=>{});
  }
  // 관리자 Anträge(Nachtragen) 알림 로그
  if (window._fbDb && window._fbRef && window._fbSet) {
    const ts = Date.now();
    ["teddy","yeaji","tingting"].forEach(mgr=>{
      window._fbSet(window._fbRef(window._fbDb,"notifications/nachtrag_log_"+ts+"_"+mgr),{
        type:"nachtrag_log", kategorie:"Nachtragen", zustaendig:mgr,
        user:userName, date, filiale:filiale||"", ein, aus,
        text:"📝 "+userName+" — "+date+" · "+ein+"-"+aus, gelesen:false, ts
      }).catch(()=>{});

  return rec;
}

// ── Nachtragen 최종 반영: 중복 근무 방지(덮어쓰기) ──────────────────
//  특정 근무(user+date)에 대해 Nachtragen이 승인되면, 같은 날 기록되어
//  있던 실시간 출퇴근(Einstempeln/Ausstempeln, typ !== "nachtrag") 로그와
//  이전 Nachtragen 기록을 모두 무효화(삭제)하고, 승인된 Nachtragen 시간만
//  최종 근무로 남긴다. → 통계/누적 시간에 하루 2번 잡히는 버그 제거.
function overrideWithNachtrag({ a, setRecords }){
  // 🔒 같은 [직원·날짜·지점] 세션만 대체한다.
  //    (같은 날 다른 지점 근무 기록을 지워 정산이 누락되는 것을 방지)
  const sameSession = (r)=> r && sameName(r.user,a.user) && r.date===a.date &&
    (!a.filiale || !r.filiale || sameFiliale(r.filiale, a.filiale));
  const newRec={ id:Date.now(), user:a.user, date:a.date, filiale:a.filiale,
    ein:a.ein, aus:a.aus, note:a.grund||"Nachtrag genehmigt", typ:"nachtrag",
    isAutoCheckedOut:false, prüfen:false, frühGrund:"" };
  // ⚠️ records는 setRecords가 노드 전체를 다시 기록하므로, 개별 _fbRemove를 병행하면
  //    비동기 삭제가 '새로 승인된 기록'까지 지워버리는 경합이 발생한다(근무표 미반영 원인).
  //    → 상태 갱신 한 번으로 원자적으로 처리한다.
  if(typeof setRecords==="function"){
    setRecords(prev=>[
      ...((Array.isArray(prev)?prev:[]).filter(r=>!sameSession(r))),
      newRec
    ]);
  } else if(window._fbDb && window._fbRef && window._fbGet && window._fbRemove && window._fbPush){
    // setRecords가 없을 때만 직접 정리 후 추가 (새 기록은 삭제 대상에서 제외)
    window._fbGet(window._fbRef(window._fbDb,"records")).then(snap=>{
      const data=snap.val()||{};
      Object.entries(data).forEach(([k,v])=>{
        if(sameSession(v) && String(v.id)!==String(newRec.id))
          window._fbRemove(window._fbRef(window._fbDb,"records/"+k)).catch(()=>{});
      });
      window._fbPush(window._fbRef(window._fbDb,"records"), newRec).catch(()=>{});
    }).catch(()=>{});
  }
  return newRec;
}

// (name·date)에 shift 추가 (root + 월별). 같은 날 기존 shift는 대체.
//  · typ: Arbeitstyp("normal"=Regulär | "einspringen"). Onigiri는 지점(ONIGIRI)으로 운영.
//  · ONIGIRI 지점은 계획시간 없이(time:"") 이름만으로 정상 저장된다.
async function addScheduleShift(name, date, filiale, time, typ, opts) {
  if (!(window._fbDb && window._fbRef && window._fbGet && window._fbSet) || !name || !date) return;
  const t = typNorm(typ);
  // 🆔 근무의 주인을 고유 ID로 함께 기록한다 (이름·이모지가 바뀌어도 매칭 유지)
  const uid = (opts && opts.uid) || uidOf(window._teeamoUsers, name) || "";
  // 🍙 ONIGIRI 지점은 계획 시간 없이 등록 (시간 필드 비활성 → "")
  const safeTime = isOnigiriFiliale(filiale) ? "" : (time||"");
  // opts.extra 로 추가 필드(getauschtVon, status 등)를 함께 저장할 수 있다
  const extra = Object.assign({},
    (opts && opts.autoCreated) ? { autoCreated:true } : {},
    uid ? { uid } : {},
    (opts && opts.extra && typeof opts.extra==="object") ? opts.extra : {});
  // 🔒 같은 날짜라도 '다른 지점' 근무는 절대 지우지 않는다.
  //    (예: 오전 ONIGIRI + 오후 TEEnJOY 대타 → 두 카드가 함께 유지되어야 함)
  const isSameSlot = (s) => (s.date||s.d) === date && sameFiliale(s.filiale||s.f, filiale);
  try {
    const mk = "schedule_" + date.slice(0,7).replace("-","_");
    const snap = await window._fbGet(window._fbRef(window._fbDb, mk));
    const ex = snap.val() ? JSON.parse(JSON.stringify(snap.val())) : {};
    const eKey = scheduleKeyOf(ex, name);           // 👤 기존 키(대소문자) 유지
    let arr = Array.isArray(ex[eKey]) ? ex[eKey] : Object.values(ex[eKey] || {});
    arr = arr.filter(s => !isSameSlot(s));
    arr.push({ date, filiale, time:safeTime, typ:t, ...extra });
    ex[eKey] = Object.fromEntries(arr.map((s,i)=>[String(i), s]));
    await window._fbSet(window._fbRef(window._fbDb, mk), ex);
    const rsnap = await window._fbGet(window._fbRef(window._fbDb, "schedule"));
    const root = rsnap.val() ? JSON.parse(JSON.stringify(rsnap.val())) : {};
    const rKey = scheduleKeyOf(root, name);
    let rarr = Array.isArray(root[rKey]) ? root[rKey] : Object.values(root[rKey] || {});
    rarr = rarr.filter(s => !isSameSlot(s));
    rarr.push({ d:date, f:filiale, t:safeTime, typ:t, ...extra });
    root[rKey] = rarr;
    await window._fbSet(window._fbRef(window._fbDb, "schedule"), root);
  } catch(e) { console.error("addScheduleShift error:", e); }
}

// ⏰ 매장 임시 마감 시간 — 대타 자동 스케줄의 예정 퇴근(bis) 기본값
const SHOP_CLOSING_TIME = "20:00";

// 🆘 당일 대타(Einspringen) 자동 스케줄 생성
//   · 출근 도장을 찍는 순간 해당 [직원·날짜·지점] 스케줄이 없으면 즉시 생성한다.
//   · von = 실제 출근 시각, bis = 매장 마감시간(임시), typ = "einspringen"
//   · autoCreated:true 플래그를 심어, 퇴근 시 실제 시간으로 보정할 수 있게 한다.
//   · 근무표(schedule)에 기록되므로 직원/공용/관리자 화면 모두 실시간 반영된다.
async function ensureEinspringenShift(name, date, filiale, vonTime) {
  if (!(window._fbDb && window._fbRef && window._fbGet) || !name || !date) return false;
  try {
    const rsnap = await window._fbGet(window._fbRef(window._fbDb, "schedule"));
    const root = rsnap.val() || {};
    const sh = root[name];
    const arr = !sh ? [] : (Array.isArray(sh) ? sh : Object.values(sh));
    // 이미 그 날 · 그 지점 스케줄이 있으면 아무것도 하지 않는다(기존 계획 보존)
    const exists = arr.some(s => s && (s.d||s.date) === date && sameFiliale(s.f||s.filiale, filiale));
    if (exists) return false;
    const bis = isOnigiriFiliale(filiale) ? "" : SHOP_CLOSING_TIME;
    await addScheduleShift(name, date, filiale, bis ? (vonTime + "-" + bis) : "", "einspringen", { autoCreated:true });
    return true;
  } catch(e) { console.error("ensureEinspringenShift error:", e); return false; }
}

// ═══════════════════════════════════════════════════════════════
//  📍 완료된 근무의 '지점'만 나중에 변경 (퇴근 후 수정)
//   실수로 다른 지점을 고르고 출퇴근했을 때, 시간은 그대로 두고
//   지점만 옮긴다. 통계·정산은 record.filiale 기준이라 즉시 재계산된다.
//
//   · ein/aus/pauseSec/typ 등 시간 관련 값은 절대 건드리지 않는다.
//   · 진행 중 기록은 id가 [직원·날짜·지점] 기반이라 id도 함께 옮긴다.
//     완료 기록은 타임스탬프 id라 filiale만 바꾸면 된다.
//   · 자동 생성된 대타 근무표가 있으면 함께 옮긴다.
// ═══════════════════════════════════════════════════════════════
async function changeRecordFiliale({ rec, newFiliale, setRecords }){
  if(!rec || !newFiliale || sameFiliale(rec.filiale, newFiliale)) return false;
  const isOpen = !rec.aus || rec.aus==="";
  const oldId = rec.id;
  const newId = isOpen ? sessionIdFor(rec.user, rec.date, newFiliale) : rec.id;

  console.log("📍 [changeRecordFiliale]", {
    von:rec.filiale, nach:newFiliale, 진행중:isOpen,
    시간_유지:{ein:rec.ein, aus:rec.aus}, oldId, newId
  });

  setRecords(prev=>{
    const list=(Array.isArray(prev)?prev:[]).filter(r=>r && r.id!==oldId && (newId===oldId || r.id!==newId));
    return [...list, { ...rec, id:newId, filiale:newFiliale }];   // ⏱ ein/aus 그대로
  });

  if(isOpen && oldId!==newId && window._fbDb && window._fbRef && window._fbRemove){
    try{ await window._fbRemove(window._fbRef(window._fbDb,"records/"+oldId)); }
    catch(e){ console.error("📍 [changeRecordFiliale] 옛 record 제거 실패:", e, { oldId }); }
  }

  // 자동 생성된 대타 근무표도 새 지점으로 이동 (관리자 계획은 건드리지 않음)
  try{
    const moved = await removeAutoShift(rec.user, rec.date, rec.filiale);
    if(moved && rec.ein) await ensureEinspringenShift(rec.user, rec.date, newFiliale, rec.ein);
  }catch(e){ console.error("📍 [changeRecordFiliale] 근무표 이동 실패:", e); }
  return true;
}

// 🧹 자동 생성된(autoCreated) 대타 근무만 근무표에서 제거
//   출근 중 지점을 바꿨을 때 옛 지점에 남은 자동 스케줄을 정리하는 용도.
//   관리자가 직접 짠 계획(autoCreated 없음)은 절대 건드리지 않는다.
async function removeAutoShift(name, date, filiale){
  if(!(window._fbDb && window._fbRef && window._fbGet) || !name || !date) return false;
  try{
    const rsnap = await window._fbGet(window._fbRef(window._fbDb, "schedule"));
    const root = rsnap.val() || {};
    const key = scheduleKeyOf(root, name);
    const arr = !root[key] ? [] : (Array.isArray(root[key]) ? root[key] : Object.values(root[key]));
    const hit = arr.find(s => s && (s.d||s.date)===date && sameFiliale(s.f||s.filiale, filiale));
    if(!hit || !hit.autoCreated) return false;      // 자동 생성분만 삭제
    await deleteScheduleShiftAtFiliale(name, date, filiale);
    return true;
  }catch(e){ console.error("removeAutoShift error:", e); return false; }
}

// 특정 [직원·날짜·지점] 근무 1건만 삭제 (같은 날 다른 지점 근무는 보존)
async function deleteScheduleShiftAtFiliale(name, date, filiale){
  if(!(window._fbDb && window._fbRef && window._fbGet && window._fbSet) || !name || !date) return;
  const keep = s => !((s.date||s.d)===date && sameFiliale(s.filiale||s.f, filiale));
  try{
    const mk = "schedule_" + date.slice(0,7).replace("-","_");
    const snap = await window._fbGet(window._fbRef(window._fbDb, mk));
    const ex = snap.val() ? JSON.parse(JSON.stringify(snap.val())) : {};
    const eKey = scheduleKeyOf(ex, name);
    if(ex[eKey]){
      const arr = (Array.isArray(ex[eKey]) ? ex[eKey] : Object.values(ex[eKey])).filter(s=>s&&keep(s));
      ex[eKey] = Object.fromEntries(arr.map((s,i)=>[String(i), s]));
      await window._fbSet(window._fbRef(window._fbDb, mk), ex);
    }
    const rsnap = await window._fbGet(window._fbRef(window._fbDb, "schedule"));
    const root = rsnap.val() ? JSON.parse(JSON.stringify(rsnap.val())) : {};
    const rKey = scheduleKeyOf(root, name);
    if(root[rKey]){
      root[rKey] = (Array.isArray(root[rKey]) ? root[rKey] : Object.values(root[rKey])).filter(s=>s&&keep(s));
      await window._fbSet(window._fbRef(window._fbDb, "schedule"), root);
    }
  }catch(e){ console.error("deleteScheduleShiftAtFiliale error:", e); }
}

// 🔄 대타 자동 스케줄의 예정 퇴근시간을 '실제 퇴근시간'으로 보정
//   · autoCreated 플래그가 있는 근무에만 적용 (관리자가 짠 계획은 건드리지 않음)
async function syncAutoShiftEnd(name, date, filiale, vonTime, bisTime) {
  if (!(window._fbDb && window._fbRef && window._fbGet) || !name || !date) return;
  try {
    const rsnap = await window._fbGet(window._fbRef(window._fbDb, "schedule"));
    const root = rsnap.val() || {};
    const sh = root[name];
    const arr = !sh ? [] : (Array.isArray(sh) ? sh : Object.values(sh));
    const hit = arr.find(s => s && (s.d||s.date) === date && sameFiliale(s.f||s.filiale, filiale));
    if (!hit || !hit.autoCreated) return;          // 자동 생성분만 보정
    if (isOnigiriFiliale(filiale)) return;         // ONIGIRI는 시간 미사용
    await addScheduleShift(name, date, filiale, vonTime + "-" + bisTime, "einspringen", { autoCreated:true });
  } catch(e) { console.error("syncAutoShiftEnd error:", e); }
}

// 임시 이름 → 정식 계정으로 데이터 귀속 (schedule + records의 user 이름을 이전)
async function reassignTempName(tempName, realName, realUid) {
  if (!(window._fbDb && window._fbRef && window._fbGet && window._fbSet) || !tempName || !realName || tempName===realName) return;
  // 🆔 옮기는 근무마다 주인의 고유 ID를 새겨 둔다.
  //    이후 이름이 또 바뀌어도 uid로 매칭되므로 연결이 끊기지 않는다.
  const uid = realUid || uidOf(window._teeamoUsers, realName) || "";
  const stamp = arr => (Array.isArray(arr)?arr:[]).map(x => (x && uid) ? {...x, uid} : x);
  try {
    // root schedule
    const rsnap = await window._fbGet(window._fbRef(window._fbDb, "schedule"));
    const root = rsnap.val() ? JSON.parse(JSON.stringify(rsnap.val())) : {};
    if (root[tempName]) {
      const tArr = stamp(Array.isArray(root[tempName]) ? root[tempName] : Object.values(root[tempName]));
      const rArr = stamp(Array.isArray(root[realName]) ? root[realName] : Object.values(root[realName] || {}));
      root[realName] = [...rArr, ...tArr];
      delete root[tempName];
      await window._fbSet(window._fbRef(window._fbDb, "schedule"), root);
    }
    // 월별 노드 범위
    const yr = new Date().getFullYear();
    for (let y=yr-1; y<=yr+2; y++) for (let m=1; m<=12; m++) {
      const mk = "schedule_" + y + "_" + String(m).padStart(2,"0");
      const snap = await window._fbGet(window._fbRef(window._fbDb, mk));
      const data = snap.val();
      if (!data || !data[tempName]) continue;
      const md = JSON.parse(JSON.stringify(data));
      const tArr = stamp(Array.isArray(md[tempName]) ? md[tempName] : Object.values(md[tempName]));
      const rArr = stamp(Array.isArray(md[realName]) ? md[realName] : Object.values(md[realName] || {}));
      const merged = [...rArr, ...tArr];
      md[realName] = Object.fromEntries(merged.map((s,i)=>[String(i), s]));
      delete md[tempName];
      await window._fbSet(window._fbRef(window._fbDb, mk), md);
    }
    // records의 user 이름 이전
    const recSnap = await window._fbGet(window._fbRef(window._fbDb, "records"));
    const recs = recSnap.val();
    if (recs) {
      for (const [k,v] of Object.entries(recs)) {
        if (v && v.user === tempName) {
          await window._fbSet(window._fbRef(window._fbDb, "records/"+k+"/user"), realName).catch(()=>{});
        }
      }
    }
  } catch(e) { console.error("reassignTempName error:", e); }
}
