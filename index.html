//  MITARBEITER 
function MitarbeiterView({userKey,users,setUsers,records,setRecords,antraege,setAntraege,onLogout,csvCtx,onSwitchToAdmin,hybridStaff}){
  const user=(Array.isArray(users)?users:[]).find(u=>u.key===userKey);
  const now=useNow();
  const [tab,setTab]=useState("home");

  //    localStorage  
  const CLOCK_KEY = `teeamo_clock_${userKey}`;
  const [clockedIn,setClockedIn]=useState(()=>{
    try { const s=localStorage.getItem(CLOCK_KEY); return s?JSON.parse(s).clockedIn:false; } catch{return false;}
  });
  const [clockInTime,setClockInTime]=useState(()=>{
    try { const s=localStorage.getItem(CLOCK_KEY); const v=s?JSON.parse(s).clockInTime:null; return v?new Date(v):null; } catch{return null;}
  });
  const [clockFiliale,setClockFiliale]=useState(()=>{
    try { const s=localStorage.getItem(CLOCK_KEY); return s?JSON.parse(s).clockFiliale:""; } catch{return "";}
  });

  const [selFiliale,setSelFiliale]=useState(FILIALEN[0]);
  // 🧋 Arbeitstyp: 새로고침 후에도 유지되도록 localStorage에서 복원
  const [clockTyp,setClockTyp]=useState(()=>{
    try{ const s=localStorage.getItem(CLOCK_KEY); return s?typNorm(JSON.parse(s).clockTyp):"normal"; }
    catch{ return "normal"; }
  });
  // interval/effect 클로저에서 낡은 값이 잡히지 않도록 최신값 ref 유지
  const clockTypRef=useRef(clockTyp); clockTypRef.current=clockTyp;
  const [grund,setGrund]=useState("");
  // ── Pause 상태 ──────────────────────────────────────────────
  const [isPaused,setIsPaused]=useState(()=>{
    try{const s=localStorage.getItem(CLOCK_KEY);return s?JSON.parse(s).isPaused||false:false;}catch{return false;}
  });
  const [pauseStart,setPauseStart]=useState(()=>{
    try{const s=localStorage.getItem(CLOCK_KEY);const v=s?JSON.parse(s).pauseStart:null;return v?new Date(v):null;}catch{return null;}
  });
  const [totalPauseSec,setTotalPauseSec]=useState(()=>{
    try{const s=localStorage.getItem(CLOCK_KEY);return s?JSON.parse(s).totalPauseSec||0:0;}catch{return 0;}
  });
  const [elapsed,setElapsed]=useState(()=>{
    // 복원: 저장된 출근 시간 기준으로 경과 초 계산
    try {
      const s=localStorage.getItem(CLOCK_KEY); const v=s?JSON.parse(s):null;
      if(v&&v.clockedIn&&v.clockInTime) return Math.floor((Date.now()-new Date(v.clockInTime).getTime())/1000);
    } catch{}
    return 0;
  });
  const [modal,setModal]=useState(null);
  const [nDatum,setNDatum]=useState(today());
  const [nFiliale,setNFiliale]=useState(FILIALEN[0]);
  const [nEin,setNEin]=useState("09:00");
  const [nAus,setNAus]=useState("17:00");
  const [nGrund,setNGrund]=useState("");
  const [nMsg,setNMsg]=useState("");
  // 조기 퇴근(Vorzeitiges Ausstempeln) 관련
  const [scheduleData]=useFirebase("schedule",{});
  const [fruehData,setFruehData]=useState(null);  // {inStr,outStr} — 사유 입력 대기중인 퇴근 데이터
  const [fruehGrund,setFruehGrund]=useState("");

  // 근무 상태를 localStorage에 저장 (새로고침 후 복원용)
  useEffect(()=>{
    try { localStorage.setItem(CLOCK_KEY, JSON.stringify({
      clockedIn, clockInTime:clockInTime?clockInTime.toISOString():null, clockFiliale,
      clockTyp,   // 🧋 선택한 Arbeitstyp도 함께 보존
      isPaused, pauseStart:pauseStart?pauseStart.toISOString():null, totalPauseSec
    })); } catch{}
  },[clockedIn, clockInTime, clockFiliale, clockTyp, isPaused, pauseStart, totalPauseSec]);

  // 🌙 자정 넘긴(어제 시작) 세션 감지 → 로컬 근무 상태를 초기화하고 배너용 정보 저장.
  //    (시스템은 App 레벨에서 예정 종료시간으로 자동 강제 퇴근 처리한다.)
  const [autoOutDismissed,setAutoOutDismissed]=useState(()=>{
    const s=new Set();
    try{
      const prefix="teeamo_autoout_ack_"+userKey+"_";
      Object.keys(localStorage).forEach(k=>{ if(k.indexOf(prefix)===0 && localStorage.getItem(k)==="1") s.add(k.slice(prefix.length)); });
    }catch{}
    return s;
  });
  useEffect(()=>{
    try{
      const s=localStorage.getItem(CLOCK_KEY);
      if(!s) return;
      const v=JSON.parse(s);
      if(v&&v.clockedIn&&v.clockInTime){
        const inDay=new Date(v.clockInTime).toLocaleDateString("sv-SE",{timeZone:"Europe/Berlin"});
        if(inDay!==today()){
          // 어제 출근 → 오늘 접속: 자동 강제 퇴근 대상. 로컬 상태 리셋.
          setClockedIn(false); setClockInTime(null); setElapsed(0);
          setIsPaused(false); setPauseStart(null); setTotalPauseSec(0);
          try{ localStorage.removeItem(CLOCK_KEY); }catch{}
        }
      }
    }catch{}
  },[]);

  // 출근 시 임시 record 생성(aus:null) / 퇴근 시 경과시간 리셋
  useEffect(()=>{
    if(!clockedIn){
      setElapsed(0);
      return;
    }
    // 🌙 자정 넘긴 세션이면 오늘자 임시 record를 만들지 않는다 (자동 퇴근 대상).
    if(clockInTime){
      const inDay=new Date(clockInTime).toLocaleDateString("sv-SE",{timeZone:"Europe/Berlin"});
      if(inDay!==today()) return;
    }
    // 🔒 세션 키에 지점을 포함 → 같은 날 다른 지점 근무와 절대 섞이지 않는다.
    const fil = clockFiliale||selFiliale;
    const tempId = sessionIdFor(user.vorname, today(), fil);
    const inStr=clockInTime?`${pad(clockInTime.getHours())}:${pad(clockInTime.getMinutes())}`:"??:??";
    // 🧋 선택한 Arbeitstyp을 반드시 반영
    const typ = typNorm(clockTypRef.current);
    setRecords(prev=>{
      const arr=Array.isArray(prev)?prev:[];
      const already=arr.find(r=>r.id===tempId);
      // 이미 record가 있으면 유지하되, typ이 다르면 보정한다.
      if(already){
        if(typNorm(already.typ)===typ) return prev;
        return arr.map(r=>r.id===tempId?{...r,typ}:r);
      }
      const filtered=arr.filter(r=>r.id!==tempId);
      return [...filtered,{id:tempId,user:user.vorname,date:today(),
        filiale:fil,ein:inStr,aus:null,note:"",typ}];
    });
  },[clockedIn, clockTyp, clockFiliale]);

  // 🕒 근무 타이머: 출근 중(clockedIn)이고 Pause가 아닐 때만 1초씩 증가.
  //    isPaused를 의존성에 포함해야 Pause 시작 즉시 interval이 정지되고,
  //    Pause 종료 시 다시 시작된다. (기존엔 [clockedIn]만 있어 낡은 isPaused가
  //    클로저에 갇혀 타이머가 멈추지 않던 버그가 있었음)
  useEffect(()=>{
    if(!clockedIn || isPaused) return;
    const t=setInterval(()=>{ setElapsed(e=>e+1); },1000);
    return()=>clearInterval(t);
  },[clockedIn, isPaused]);

  const displayName=user.vorname;
  const myRecs=records.filter(r=>r.user===user.vorname);

  // 🌙 자동 강제 퇴근 배너: 내 이름으로 isAutoCheckedOut 기록이 있고, 아직

  const autoOutRec = (Array.isArray(records)?records:[]).find(r =>
    r && r.user===user.vorname && r.isAutoCheckedOut &&
    !autoOutDismissed.has(r.date) &&
    // 🔒 이미 신청(대기) 또는 승인된 Nachtragen이 있으면 배너를 더 이상 띄우지 않음
    !nachtragStatusFor(antraege, user.vorname, r.date)
  );
  function dismissAutoOut(dateStr){
    try{ localStorage.setItem("teeamo_autoout_ack_"+userKey+"_"+dateStr,"1"); }catch{}
    setAutoOutDismissed(prev=>{ const n=new Set(prev); n.add(dateStr); return n; });
  }
  function openAutoOutNachtrag(rec){

    setNMsg("");
    setModal("nachtragAuto");
  }
  const myAntraege=antraege.filter(a=>a.user===user.vorname);
  // 이번 달 records만
  const curMo2=(()=>{const d=new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Berlin"}));return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");})();
  const myMonthRecs=myRecs.filter(r=>r.date&&r.date.startsWith(curMo2)&&r.aus);
  // 유형별 분류 (Nachtragen(사후 등록)도 정규 근무로 합산에 포함)
  // 📊 관리자 Statistik과 100% 동일한 소스/계산식 사용 (buildBreakdown)
  //    → 직원 화면과 관리자 화면의 정산 시간이 1초도 어긋나지 않는다.
  const myBreakdown = buildBreakdown(myMonthRecs);
  const normalH=myMonthRecs.filter(r=>statTyp(r)==="normal").reduce((a,r)=>a+recHours(r),0);
  const einsprH=myMonthRecs.filter(r=>statTyp(r)==="einspringen").reduce((a,r)=>a+recHours(r),0);
  // Pause 누적: record.pauseSec 필드에서 집계 (참고 표시용)
  const pauseH=myMonthRecs.reduce((a,r)=>a+((r.pauseSec||0)/3600),0);
  // 총 근무 = 지점별 합계의 총합 (관리자 통계와 동일 정의)
  const totalH=myBreakdown.total;
  function fmtH(h){const hh=Math.floor(h);const mm=Math.round((h-hh)*60);return hh+"h"+String(mm).padStart(2,"0")+"m";}
  const monthSummary=FILIALEN.map(f=>({f,h:myRecs.filter(r=>r.filiale===f&&r.aus).reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0)})).filter(x=>x.h>0);

  // 알림 카운트 (Schichtbörse 새 근무 + Tausch 요청)
  const [_notifications] = useFirebase("notifications", {});
  const pendingTauschCount = Object.values(_notifications||{})
    .filter(n => n.type==="tausch_anfrage" && n.targetUser===user.vorname && !n.gelesen).length;
  // Schichtbörse 새 알림 (전체 직원 대상)
  const pendingBoerseCount = Object.values(_notifications||{})
    .filter(n => n.type==="schichtboerse_new" && n.zielUser===user.vorname && !n.gelesen).length;
  // 매칭 완료 알림 (내가 내놓은 근무가 이어받아짐)
  const pendingBoerseTakenCount = Object.values(_notifications||{})
    .filter(n => n.type==="schichtboerse_taken" && n.zielUser===user.vorname && !n.gelesen).length;
  const boerseBadge = pendingBoerseCount + pendingBoerseTakenCount;

  function handleEin(){
    const inStr=`${pad(new Date().getHours())}:${pad(new Date().getMinutes())}`;
    // 🔒 [직원·날짜·지점] 단위 고유 세션 → 같은 날 다른 지점 근무와 분리
    const tempId=sessionIdFor(user.vorname, today(), selFiliale);
    // 🧋 선택한 Arbeitstyp을 정규화해서 저장 (normal | einspringen)
    const typ = typNorm(clockTyp);
    // 출근 도장: 선택한 지점의 세션만 새로 만든다(다른 지점 기록은 건드리지 않음)
    setRecords(prev=>{
      const filtered=(Array.isArray(prev)?prev:[]).filter(r=>r.id!==tempId);
      return [...filtered,{id:tempId,user:user.vorname,date:today(),filiale:selFiliale,ein:inStr,aus:null,note:"",typ}];
    });
    setClockedIn(true);setClockInTime(new Date());setClockFiliale(selFiliale);setModal(null);

    if(window._fbDb&&window._fbRef&&window._fbRemove)
      window._fbRemove(window._fbRef(window._fbDb,"notifications/noshow_"+user.vorname+"_"+today())).catch(()=>{});
  }
  // 오늘 예정 근무의 종료 시각(분) — 조기 퇴근 판정용
  function getPlannedEndMin(){
    const name=user.vorname, date=today();
    const arr=!scheduleData[name]?[]:Array.isArray(scheduleData[name])?scheduleData[name]:Object.values(scheduleData[name]);
    const sh=arr.find(s=>(s.d||s.date)===date);
    const tm=sh&&(sh.t||sh.time);
    if(!tm||!tm.includes("-")) return null;
    return parseMinutes(tm.split("-")[1]);
  }
  // 실제 퇴근 처리: 임시 record 제거 + 완료 record 저장 (Pause 정산 + 조기퇴근 prüfen/사유 반영)
  function finishAus(inStr, outStr, isFrueh, gr){
    // 🔒 퇴근도 '출근했던 그 지점의 세션'만 종료한다.
    //    (기존엔 user+date만 봐서 오전 ONIGIRI 퇴근이 오후 TEEnJOY 근무까지
    //     Feierabend로 만들고 시간이 중복 계상되던 치명적 버그)
    const fil = clockFiliale || selFiliale;
    const tempId=sessionIdFor(user.vorname, today(), fil);
    const existRec=(Array.isArray(records)?records:[]).find(r=>r.id===tempId)
      || recordForShift(records, user.vorname, today(), fil);
    // 🧋 퇴근 시에도 출근 때 저장된 Arbeitstyp을 그대로 승계 (없으면 현재 선택값)
    const typ=typNorm(existRec?.typ||clockTypRef.current||clockTyp);
    let finalPauseSec=totalPauseSec;
    if(isPaused&&pauseStart){ finalPauseSec+=Math.floor((Date.now()-pauseStart.getTime())/1000); }
    const finalId=Date.now();
    const completed={id:finalId,user:user.vorname,date:today(),filiale:fil,ein:inStr,aus:outStr,
      note:(isFrueh?gr:grund)||"", typ, pauseSec:finalPauseSec,
      prüfen:isFrueh?true:false, frühGrund:isFrueh?(gr||""):""};
    setRecords(prev=>{
      // 이 지점 세션(임시/기존)만 제거 — 다른 지점 근무 기록은 그대로 유지
      const filtered=(Array.isArray(prev)?prev:[]).filter(r=>
        r.id!==tempId && !(existRec && r.id===existRec.id));
      return [...filtered,completed];
    });
    // 임시(aus:null) record 노드 직접 제거 → 관리자 화면 즉시 Aktiv 해제
    if(window._fbDb&&window._fbRef&&window._fbRemove){
      window._fbRemove(window._fbRef(window._fbDb,"records/"+tempId)).catch(()=>{});
    }
    setClockedIn(false);setClockInTime(null);setElapsed(0);setGrund("");setModal(null);
    setClockTyp("normal");setIsPaused(false);setPauseStart(null);setTotalPauseSec(0);
    setFruehData(null);setFruehGrund("");
    try{localStorage.removeItem(CLOCK_KEY);}catch{}
  }

        }).catch(e => console.error(e));

    setNMsg("Antrag eingereicht! Wird von Yeaji oder Teddy geprüft.");setNGrund("");
  }

  const elStr=`${pad(Math.floor(elapsed/3600))}:${pad(Math.floor((elapsed%3600)/60))}:${pad(elapsed%60)}`;

          boxShadow:"0 2px 8px rgba(0,0,0,.18)"}}>

            <div style={{minWidth:0}}>
              <div style={{fontSize:12,fontWeight:800,whiteSpace:"nowrap"}}>Mitarbeiter-Modus</div>
              <div style={{fontSize:9,opacity:.7,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>Du arbeitest gerade als Mitarbeiter/in</div>
            </div>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:11,opacity:.45,marginBottom:3,letterSpacing:".06em",textTransform:"uppercase"}}>{"teeamo Münster"}</div>
            <div style={{fontSize:20,fontWeight:800}}>Hallo, {displayName}!</div>

            {!user.infektionsschutz&&(

          </div>

                <div style={{display:"flex",alignItems:"center",gap:6}}>

          }}
          onAus={(inStr,outStr)=>{
            const plannedEnd=getPlannedEndMin();
            const [oh,om]=outStr.split(":").map(Number);
            const outMin=oh*60+om;
            if(plannedEnd!=null && outMin < plannedEnd-1){
              // ⏱ 조기 퇴근 → 사유 입력 모달 먼저 표시 (퇴근 처리는 사유 입력 후)

                {clockFiliale}{" · "}{fruehData.inStr}{" – "}{fruehData.outStr}

            <textarea value={fruehGrund} onChange={e=>setFruehGrund(e.target.value)}

              style={{...S.input,width:"100%",minHeight:70,resize:"none",fontFamily:"inherit",marginBottom:14,boxSizing:"border-box"}}/>

          <div style={{background:C.card,borderRadius:"22px 22px 0 0",width:"100%",maxWidth:500,
            padding:"24px 22px 32px",paddingBottom:"max(32px,env(safe-area-inset-bottom))"}}>

              {new Date(nDatum).toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"})}{" · "}{nFiliale}
            </div>
            <div style={{display:"flex",gap:10,marginBottom:12}}>
              {[["Einstempeln",nEin,setNEin],["Ausstempeln",nAus,setNAus]].map(([lbl,val,set])=>(
                <div key={lbl} style={{flex:1}}>

//  STATISTIK 
// 📊 통계에서 완전히 제외할 더미/과거 월 (예: Juni 2026)
const STAT_EXCLUDED_MONTHS = new Set(["2026-06"]);
function StatistikTab({records,users,schedule}){
  // records + Dienstplan(schedule)에서 달 추출 + 현재 달 포함, 최신순 정렬
  const availMonths = React.useMemo(()=>{
    const d=new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Berlin"}));
    const cur=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    const set=new Set([cur]);
    // 실제 근무 기록(records)의 달
    (Array.isArray(records)?records:[]).forEach(r=>{ if(r.aus&&r.date) set.add(r.date.slice(0,7)); });
    // Dienstplan(schedule)에 존재하는 근무 일자의 달
    Object.values(schedule||{}).forEach(sh=>{
      const arr=!sh?[]:Array.isArray(sh)?sh:Object.values(sh);
      arr.forEach(s=>{ const dd=s&&(s.date||s.d); if(dd) set.add(dd.slice(0,7)); });
    });
    // 🚫 더미/제외 월(Juni 2026) 필터 옵션 완전 제거
    STAT_EXCLUDED_MONTHS.forEach(m=>set.delete(m));
    return [...set].sort((a,b)=>b.localeCompare(a));
  },[records,schedule]);
  const [selMonth,setSelMonth]=useState(()=>{
    const d=new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Berlin"}));
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
  });
  const [exported,setExported]=useState(null);
  // 근무 기록이 있는 계정은 관리자(하이브리드 포함)여도 정산 목록에 포함
  const _workerNames = new Set((Array.isArray(records)?records:[]).map(r=>r.user));
  const empList=(Array.isArray(users)?users:[])
    .filter(u=>!MANAGERS.includes(u.key) || _workerNames.has(u.vorname))
    .sort(byName);
  const monthRecs=records.filter(r=>r.date&&r.date.startsWith(selMonth)&&r.aus&&!STAT_EXCLUDED_MONTHS.has(r.date.slice(0,7)));

  function downloadCSV(rows,filename){
    const bom="﻿";
    const csv=bom+rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(";")).join("\r\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=filename;a.click();
    URL.revokeObjectURL(url);
    setExported(filename);setTimeout(()=>setExported(null),3000);
  }
  function downloadXLSX(rows, filename, sheetName="Daten") {
    try {
      const ws = window.XLSX.utils.aoa_to_sheet(rows);
      //    ( )
      const wb = window.XLSX.utils.book_new();
      window.XLSX.utils.book_append_sheet(wb, ws, sheetName);
      window.XLSX.writeFile(wb, filename);
      setExported(filename);setTimeout(()=>setExported(null),3000);
    } catch(e) {
      // fallback to CSV if XLSX unavailable
      downloadCSV(rows, filename.replace(".xlsx",".csv"));
    }
  }
  function exportDetail(fmt="xlsx"){
    const hdr=["Name","Datum","Wochentag","Filiale","Einstempeln","Ausstempeln","Arbeitsstunden","Typ","Anmerkung"];
    const rows=[hdr,...[...monthRecs].sort((a,b)=>a.date.localeCompare(b.date)).map(r=>{
      const h=stunden(r.ein,r.aus);
      return[r.user,r.date,TAGE_DE[new Date(r.date).getDay()],r.filiale,r.ein,r.aus,h!=null?h.toFixed(2):"",r.typ==="nachtrag"?"Nachtrag":"Regulär",r.note||""];
    })];
    if(fmt==="xlsx") downloadXLSX(rows,`Stundennachweis_Detail_${selMonth}.xlsx`,"Stundennachweis");
    else downloadCSV(rows,`Stundennachweis_Detail_${selMonth}.csv`);
  }
  function exportSummary(fmt="xlsx"){
    const hdr=["Name","Rolle","Arbeitstage","Gesamtstunden","TEEAMO Arkaden (Std)","TEEAMO Aegidiimarkt (Std)","TEEnJOY (Std)","Ø Std/Tag"];
    const rows=[hdr,...empList.map(emp=>{
      const er=monthRecs.filter(r=>r.user===emp.vorname);
      const total=er.reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0);
      const byFil={};FILIALEN.forEach(f=>{byFil[f]=er.filter(r=>r.filiale===f).reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0);});
      return[emp.vorname,emp.role,er.length,Number(total.toFixed(2)),Number(byFil["TEEAMO Arkaden"].toFixed(2)),Number(byFil["TEEAMO Aegidiimarkt"].toFixed(2)),Number(byFil["TEEnJOY"].toFixed(2)),er.length?Number((total/er.length).toFixed(2)):0];
    })];
    if(fmt==="xlsx") downloadXLSX(rows,`Monatsübersicht_${selMonth}.xlsx`,"Monatsübersicht");
    else downloadCSV(rows,`Monatsübersicht_${selMonth}.csv`);
  }

  // 📥 A. 통합본 CSV — 선택한 달의 모든 직원 근태 원장 (브라우저 내장 API만 사용)
  function exportAbrechnungGesamt(){
    const rows=[ABRECHNUNG_HEADER, ...abrechnungRows(monthRecs, schedule)];
    const fn=`Monatsabrechnung_Gesamt_${selMonth}.csv`;
    downloadCsvRows(rows, fn);
    setExported(fn); setTimeout(()=>setExported(null),3000);
  }
  // 📥 B. 직원별 개별 CSV — 일자별 상세 + 지점별/타입별 집계 요약 포함
  function exportAbrechnungMitarbeiter(emp){
    const er=monthRecs.filter(r=>r.user===emp.vorname);
    const bd=buildBreakdown(er);
    const num=h=>h.toFixed(2).replace(".",",");
    const rows=[
      ["Abrechnung", emp.vorname+(emp.nachname?" "+emp.nachname:"")],
      ["Monat", monthLabel(selMonth)],
      ["Arbeitstage", String(er.length)],
      ["Gesamtstunden", num(bd.total)],
      [],
      ["— Aufschlüsselung: Filiale → Arbeitstyp —"],
      ["Filiale","Arbeitstyp","Stunden"],
      ...bd.byFiliale.flatMap(f=>[
        [f.filiale,"GESAMT",num(f.total)],
        ...f.byTyp.map(t=>[f.filiale, t.icon+" "+t.lbl, num(t.std)]),
      ]),
      [],
      ["— Tagesdetails —"],
      ABRECHNUNG_HEADER,
      ...abrechnungRows(er, schedule),
    ];
    const fn=`Abrechnung_${(emp.vorname||"Mitarbeiter").replace(/[^\p{L}\p{N}_-]/gu,"")}_${selMonth}.csv`;
    downloadCsvRows(rows, fn);
    setExported(fn); setTimeout(()=>setExported(null),3000);
  }

  return(
    <div style={{padding:"14px"}}>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:7,letterSpacing:".06em",textTransform:"uppercase"}}>{"Monat auswählen"}</div>
        <div style={{display:"flex",gap:7}}>
          {availMonths.map(m=>(

function EmpDetailView({ empKey, safeUsers, records, setRecords, getStatus, sColor, sBg, setDetailKey, setUsers, monthAccordion, setMonthAccordion, delRecordConfirm, setDelRecordConfirm }) {
  const emp = safeUsers.find(u=>u.key===empKey);
  if (!emp) return null;

  const empRecs = records.filter(r=>r.user===emp.vorname);
  const total = empRecs.filter(r=>r.aus).reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0);
  const byMonth={};
  empRecs.forEach(r=>{const m=r.date.slice(0,7);if(!byMonth[m])byMonth[m]=[];byMonth[m].push(r);});
  const monthKeys=Object.keys(byMonth).sort((a,b)=>b.localeCompare(a));
  const mn=["","Jan","Feb","Mar","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
  const DAY=["So","Mo","Di","Mi","Do","Fr","Sa"];

  return (
    <div style={{padding:"14px"}}>
      {delRecordConfirm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>

              <button onClick={()=>setDelRecordConfirm(null)}

          <div style={{fontSize:17,fontWeight:800,color:C.text}}>{emp.vorname}{emp.nachname&&<span style={{fontSize:13,fontWeight:400,color:C.muted}}>{" "+emp.nachname}</span>}</div>
          <div style={{fontSize:11,color:C.muted}}>{emp.role==="Admin"?"Admin":"Staff"}</div>
          <span style={{fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:99,marginTop:4,display:"inline-block",color:sColor(getStatus(emp.vorname)),background:sBg(getStatus(emp.vorname))}}>{getStatus(emp.vorname)}</span>
        </div>

          <div key={l} style={S.card}><div style={{fontSize:11,color:C.muted,marginBottom:4}}>{l}</div><div style={{fontSize:22,fontWeight:800,color:c}}>{v}</div></div>

                  <BreakdownView recs={mRecs} compact={true}/>
                </div>
                {[...mRecs].sort((a,b)=>b.date.localeCompare(a.date)).map((r,i)=>(

                        <div style={{fontSize:13,fontWeight:700,color:C.text}}>

    </div>
  );

function UebersichtAllTab({ empList, schedule, records, getStatus, sColor, sBg, setDetailKey, setDeleteConfirm, uTab, setUTab, userKey, safeUsers, onConfirmPruefen }) {
  const norm = v => !v?[]:Array.isArray(v)?v:Object.values(v);
  const todayStr = today();
  const todayRecs = (Array.isArray(records)?records:[]).filter(r=>r.date===todayStr);

  // 🧩 오늘 근무 로스터: 스케줄에 등록된 모든 이름(정식 계정 + 계정 없는 임시 직원)을
  //    빠짐없이 포함한다. 관리자 계정만 제외. (누락 방지 요구사항)
  const _rosterUsers = Array.isArray(safeUsers)?safeUsers:(Array.isArray(empList)?empList:[]);
  //  ⚠️ 하루에 여러 지점 근무가 있으면 각 근무를 독립 항목으로 펼친다
  //     (오전 ONIGIRI / 오후 TEEnJOY 가 각각 별도 카드·별도 상태로 표시)
  const todayRoster = Object.keys(schedule||{})
    .flatMap(nm => {
      const emp = _rosterUsers.find(u=>u.vorname===nm) || null;
      return norm(schedule[nm]||[])
        .filter(s => (s.date||s.d)===todayStr)
        .map(s => ({ name:nm, emp, isTemp:!emp,
          filiale:(s.filiale||s.f||""), time:(s.time||s.t||"") }));
    })
    // 관리자 계정은 로스터에서 제외 (임시 직원은 emp=null 이므로 유지됨)
    .filter(x => !(x.emp && MANAGERS.includes(x.emp.key)));

  const todayEmps = todayRoster;      // 배지 카운트용 (임시 직원 포함)
  const todayShiftEmps = todayRoster; // 그룹 렌더용 (임시 직원 포함)

  return (
    <div style={{padding:"14px"}}>

      <div style={{display:"flex",gap:0,marginBottom:12,borderRadius:10,overflow:"hidden",border:`1px solid ${C.border}`}}>

              background:uTab===id?C.navy:"#fff",color:uTab===id?"#fff":C.muted}}>
            {l}
            {n>0&&<span style={{marginLeft:5,fontSize:9,fontWeight:800,padding:"1px 5px",borderRadius:99,
              background:uTab===id?"rgba(255,255,255,.25)":"rgba(0,0,0,.08)",color:uTab===id?"#fff":C.muted}}>
              {n}
            </span>}
          </button>
        ))}
      </div>

      {/*   1: All Staffs  */}
      {uTab==="all"&&(
        <div>
          {empList.map(emp=>(
            <div key={emp.key} style={{...S.card,display:"flex",alignItems:"center",gap:11,padding:"12px 14px",marginBottom:8}}>
              <button onClick={()=>setDetailKey(emp.key)}
                style={{flex:1,border:"none",background:"none",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:11,padding:0}}>
                <div style={{width:40,height:40,borderRadius:"50%",background:C.navy,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,color:"#fff",flexShrink:0}}>
                  {emp.kuerzel}

                </div>
                <span style={{fontSize:14,color:C.muted}}>{">"}</span>

              <button onClick={()=>setDeleteConfirm(emp.key)}

          </div>

            //   shift  (임시 직원 포함 — todayShiftEmps 항목은 {name,emp,isTemp})

            const withShift = todayShiftEmps.map(({name,emp,isTemp,filiale,time})=>
              ({name,emp,isTemp,fil:filiale,time}));
            //         
            return filOrder.map(fil=>{

                    // 🔒 이 지점 근무만 보고 상태/기록을 판정한다
                    const st=getStatus(name, f);

                    return(

                              <div style={{fontSize:10,fontWeight:600,color:st==="Feierabend"?C.mintDark:C.yellow,marginTop:2}}>

                                {rec.aus&&<span style={{color:C.muted,fontWeight:400}}>{" · "}{stdLabel(rec.ein,rec.aus)}</span>}
                                {rec.isAutoCheckedOut&&<span style={{color:C.muted,fontWeight:400}}>{" · ⏱ Auto"}</span>}
                              </div>

                          </div>
                          <span style={{fontSize:9,fontWeight:700,padding:"3px 9px",borderRadius:99,color:sColor(st),background:sBg(st),flexShrink:0}}>{st}</span>
                        </button>
                        {st==="Prüfen"&&(
                          <div style={{marginTop:9,paddingTop:9,borderTop:`1px dashed ${C.yellow}`}}>
                            {rec?.frühGrund&&(
                              <div style={{fontSize:11,color:C.text,background:C.yellowLight,borderRadius:8,padding:"7px 10px",marginBottom:8}}>

                                  fontWeight:800,fontSize:12,cursor:"pointer"}}>
                                {"OK"}
                              </button>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              );
            });
          })()}
        </div>
      )}
    </div>
  );
}

function AntraegeTab({ antraege, setAntraege, tauschAntraege, setTauschAntraege, records, setRecords, aTab, setATab, openAId, setOpenAId, userKey }) {
  const nList = Array.isArray(antraege) ? antraege : [];
  const tList = Array.isArray(tauschAntraege) ? tauschAntraege : [];
  const nOffene = nList.filter(a=>a.status==="offen").length;
  const tOffene = tList.filter(a=>a.status==="ausstehend_manager"||a.status==="partner_ok").length;

  function decideNachtrag(a, ok) {
    setAntraege(prev=>(Array.isArray(prev)?prev:[]).map(x=>x.id===a.id?{...x,status:ok?"genehmigt":"abgelehnt"}:x));
    if (ok) {
      // ✅ 중복 근무 방지: 기존 실시간 출퇴근 기록 무효화 후 승인된 Nachtragen만 반영
      overrideWithNachtrag({ a, setRecords });
    }
    if (!ok) {
      // Firebase에서도 삭제
      if (window._fbDb && window._fbRef && window._fbGet && window._fbRemove) {
        window._fbGet(window._fbRef(window._fbDb, "records")).then(snap=>{
          const data=snap.val()||{};
          Object.entries(data).forEach(([k,v])=>{
            if(v&&v.user===a.user&&v.date===a.date&&v.typ==="nachtrag")
              window._fbRemove(window._fbRef(window._fbDb,`records/${k}`)).catch(()=>{});
          });
        });
      }
      setRecords(prev=>(Array.isArray(prev)?prev:[]).filter(r=>!(r.user===a.user&&r.date===a.date&&r.typ==="nachtrag")));
    }
    setOpenAId(null);
  }
  function reopenNachtrag(id) {
    setAntraege(prev=>(Array.isArray(prev)?prev:[]).map(a=>a.id===id?{...a,status:"offen"}:a));
    setOpenAId(null);
  }
  const tabs = [
    {id:"tausch", l:"Schichttausch", n:tOffene},
  ];

  return (
    <div style={{padding:"14px"}}>
      {/* Schichttausch 바로 표시 - 탭 없음 */}
      {(()=>{
        const pendingCount = tList.filter(a=>a.status==="ausstehend_manager"||a.status==="partner_ok").length;
        return(
          <div style={{fontSize:12,fontWeight:800,color:C.text,marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
            {"🔄 Schichttausch"}
            {pendingCount>0&&<span style={{fontSize:10,padding:"2px 8px",borderRadius:99,background:C.red,color:"#fff",fontWeight:700}}>{pendingCount}</span>}
          </div>
        );
      })()}
      {(()=>{
        return(<div>
          {tList.length===0&&<div style={{...S.card,textAlign:"center",padding:"24px",color:C.muted}}>Keine Schichttausch-Antraege</div>}
          {tList.map(a=>{
            const isOpen=openAId==="t_"+a.id;
            const offen=a.status==="ausstehend_manager"||a.status==="partner_ok";
            const sc=a.status==="getauscht"?C.mintDark:a.status==="abgelehnt_manager"?C.red:C.yellow;
            const sb=a.status==="getauscht"?C.mintLight:a.status==="abgelehnt_manager"?C.redLight:C.yellowLight;
            const sl=a.status==="getauscht"?"Getauscht":a.status==="abgelehnt_manager"?"Abgelehnt":"Wartet";
            return(
              <div key={"t"+a.id} style={{...S.card,marginBottom:8,padding:0,overflow:"hidden",border:"1.5px solid "+(offen?C.yellow:a.status==="getauscht"?C.mint:C.border)}}>
                <button onClick={()=>setOpenAId(isOpen?null:"t_"+a.id)}
                  style={{width:"100%",padding:"12px 14px",background:"none",border:"none",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{textAlign:"left"}}>
                    <div style={{fontSize:13,fontWeight:700,color:C.text}}>{a.initiator+" + "+a.partner}</div>
                    <div style={{fontSize:11,color:C.muted}}>{a.initiatorDate+" mit "+a.partnerDate}</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:99,color:sc,background:sb}}>{sl}</span>
                    <span style={{fontSize:10,color:C.muted}}>{isOpen?"[-]":"[+]"}</span>
                  </div>
                </button>
                {isOpen&&(
                  <div style={{borderTop:"1px solid "+C.border,padding:"12px 14px"}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                      <div><div style={{fontSize:9,color:C.muted}}>{a.initiator}</div><div style={{fontSize:12,fontWeight:700,color:C.text}}>{a.initiatorDate}</div><div style={{fontSize:10,color:C.muted}}>{a.initiatorFiliale}</div></div>
                      <div><div style={{fontSize:9,color:C.muted}}>{a.partner}</div><div style={{fontSize:12,fontWeight:700,color:C.text}}>{a.partnerDate}</div><div style={{fontSize:10,color:C.muted}}>{a.partnerFiliale}</div></div>
                    </div>
                    {a.grund&&<div style={{fontSize:11,color:C.text,background:C.bg,borderRadius:8,padding:"8px 10px"}}>{a.grund}</div>}
                  </div>

          })}

      })()}
    </div>

}

  var bc = a.status==="offen" ? C.yellow : a.status==="genehmigt" ? C.mint : C.border;
  var dateStr = a.date ? new Date(a.date).toLocaleDateString("de-DE",{day:"numeric",month:"long"}) : "";

  var dateFull = a.date ? new Date(a.date).toLocaleDateString("de-DE") : "-";

    <div style={{...S.card, marginBottom:8, padding:0, overflow:"hidden", border:"1.5px solid "+bc}}>

          <span style={{fontSize:11, color:C.muted}}>{isOpen ? "▲" : "▼"}</span>
        </div>
      </button>
      {isOpen && (
        <div style={{borderTop:"1px solid "+C.border, padding:"12px 14px"}}>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:10}}>
            <div>
              <div style={{fontSize:9, color:C.muted}}>Datum</div>

              <div style={{fontSize:9, color:C.muted}}>Filiale</div>

              <div style={{fontSize:9, color:C.muted}}>Einstempeln</div>
              <div style={{fontSize:13, fontWeight:700, color:C.text}}>{a.ein || "-"}</div>

function AdminAntraegeView({ antraege, setAntraege, myArchiv, renderErledigtCard, setRecords, records }) {
  const [openId, setOpenId] = useState(null);
  var list = Array.isArray(antraege) ? antraege : [];
  var offene = list.filter(a => a.status === "offen");
  var done = list.filter(a => a.status !== "offen");
  var byDate = {};
  done.forEach(function(a) {
    var d = a.date || "";
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(a);
  });
  var dateKeys = Object.keys(byDate).sort(function(a,b){ return b.localeCompare(a); });

  function reopen(id) {
    setAntraege(function(prev) {
      return (Array.isArray(prev)?prev:[]).map(function(a){ return a.id===id ? {...a,status:"offen"} : a; });
    });
  }
  function decide(a, ok) {
    setAntraege(function(prev) {
      return (Array.isArray(prev)?prev:[]).map(function(x){ return x.id===a.id ? {...x,status:ok?"genehmigt":"abgelehnt"} : x; });
    });
    if (ok) {
      // ✅ 중복 근무 방지: 기존 실시간 출퇴근 기록 무효화 후 승인된 Nachtragen만 반영
      overrideWithNachtrag({ a, setRecords });
    } else {
      setRecords(function(prev) {
        return (Array.isArray(prev)?prev:[]).filter(function(r){
          return !(r.user===a.user && r.date===a.date && r.typ==="nachtrag");
        });
      });
    }
  }

  return (
    <div style={{padding:"14px"}}>
      <div style={{fontSize:10, fontWeight:700, color:C.red, marginBottom:8,
        textTransform:"uppercase", letterSpacing:".05em"}}>
        {"Offene Antrage (" + offene.length + ")"}
      </div>
      {offene.length === 0 ? (
        <div style={{...S.card, textAlign:"center", color:C.muted, fontSize:12, padding:"18px", marginBottom:14}}>
          Keine offenen Antrage
        </div>
      ) : offene.map(function(a) {
        return (
          <NachtragCard key={a.id} a={a}
            isOpen={openId===a.id}
            onToggle={function(){ setOpenId(openId===a.id ? null : a.id); }}
            onDecide={function(ok){ decide(a,ok); }}
            onReopen={function(){ reopen(a.id); }}
          />
        );
      })}
      {done.length > 0 && (
        <div style={{marginTop:16}}>
          <div style={{fontSize:10, fontWeight:700, color:C.muted, marginBottom:8,
            textTransform:"uppercase", letterSpacing:".05em"}}>
            Bearbeitete Antrage
          </div>
          {done.filter(function(a){return a.status==="abgelehnt";}).length > 0 && (
            <div style={{...S.card, marginBottom:10, display:"flex", gap:20, padding:"10px 14px"}}>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:18, fontWeight:800, color:C.red}}>
                  {done.filter(function(a){return a.status==="abgelehnt";}).length}
                </div>
                <div style={{fontSize:9, color:C.muted}}>Abgelehnt</div>
              </div>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:18, fontWeight:800, color:C.mintDark}}>
                  {done.filter(function(a){return a.status==="genehmigt";}).length}
                </div>
                <div style={{fontSize:9, color:C.muted}}>Genehmigt</div>
              </div>
            </div>
          )}
          {dateKeys.map(function(d) {
            var label = d ? new Date(d).toLocaleDateString("de-DE",{day:"numeric",month:"long",year:"numeric"}) : "-";
            return (
              <div key={d} style={{marginBottom:4}}>
                <div style={{fontSize:10, color:C.muted, fontWeight:600, marginBottom:4, marginTop:8}}>{label}</div>
                {byDate[d].map(function(a) {
                  return (
                    <NachtragCard key={a.id} a={a}
                      isOpen={openId===a.id}
                      onToggle={function(){ setOpenId(openId===a.id ? null : a.id); }}
                      onDecide={function(ok){ decide(a,ok); }}
                      onReopen={function(){ reopen(a.id); }}
                    />
                  );
                })}
              </div>
            );
          })}
        </div>
      )}
      {myArchiv && myArchiv.length > 0 && (
        <div style={{marginTop:16}}>
          <div style={{fontSize:10, fontWeight:700, color:C.muted, marginBottom:8,
            textTransform:"uppercase", letterSpacing:".05em"}}>Archiv</div>
          {myArchiv.map(function(entry) { return renderErledigtCard(entry[0], entry[1]); })}
        </div>
      )}
    </div>
  );
}

function RecStatusBadge({rec, t}) {
  if(!rec) return null;
  const pln=calcShiftMinutes(t);
  const act=rec.aus?calcShiftMinutes(`${rec.ein}-${rec.aus}`):null;
  const st=!rec.aus?"aktiv":(!pln||!act||act>=pln)?"gearbeitet":"prüfen";
  const sc=st==="gearbeitet"?C.mintDark:C.yellow;
  return(
    <div style={{textAlign:"right"}}>
      <div style={{fontSize:10,fontWeight:700,color:sc}}>
        {rec.ein}{rec.aus?` – ${rec.aus}`:" (läuft)"}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:4,justifyContent:"flex-end",marginTop:2}}>
        <span style={{fontSize:9,color:C.muted}}>{rec.aus?stdLabel(rec.ein,rec.aus):""}</span>
        <span style={{fontSize:8,padding:"1px 5px",borderRadius:99,fontWeight:700,
          background:st==="gearbeitet"?C.mintLight:C.yellowLight,
          color:sc}}>
          {st==="gearbeitet"?"Gearbeitet":st==="aktiv"?"Aktiv":"Prüfen"}
        </span>
      </div>
      {st==="prüfen"&&rec.note&&<div style={{fontSize:8,color:C.muted,marginTop:1}}>{"📝 "}{rec.note}</div>}
    </div>
  );
}

// Nach Datum - 지점별 직원 행 컴포넌트
function NachDatumFilRow({name, d, t, schedule, users, records, todayStr, C, S}) {
  const arr = !schedule[name]?[]:Array.isArray(schedule[name])?schedule[name]:Object.values(schedule[name]);
  const shift = arr.find(s=>(s.date||s.d)===d);
  const accountExists = Array.isArray(users)&&users.some(u=>u.vorname===name);
  const emp = accountExists?(Array.isArray(users)?users:[]).find(u=>u.vorname===name):null;
  const rec = accountExists?records.find(r=>r.user===name&&r.date===d):null;
  const sSt = shift?.status||null, gMit = shift?.getauschtMit||null, gVon = shift?.getauschtVon||null;
  const transl = sSt==="freigegeben"||sSt==="getauscht";
  let statusLabel, statusColor, statusBg;
  if(sSt==="freigegeben"){
    statusLabel="🔄 Frei"; statusColor="#b45309"; statusBg="#fef3c7";
  } else if(sSt==="getauscht"){
    statusLabel="↔ Getauscht"; statusColor=C.mintDark; statusBg=C.mintLight;
  } else if(!accountExists){
    statusLabel="Ausstehend"; statusColor=C.muted; statusBg=C.border;
  } else if(rec?.aus){
    statusLabel="Feierabend"; statusColor=C.mintDark; statusBg=C.mintLight;
  } else if(rec?.ein){
    statusLabel="Aktiv"; statusColor=C.yellow; statusBg=C.yellowLight;
  } else if(d<todayStr){
    statusLabel="Nicht erschienen"; statusColor=C.red; statusBg=C.redLight;
  } else {
    statusLabel="Ausstehend"; statusColor=C.muted; statusBg=C.border;
  }
  return(
    <div style={{display:"flex",justifyContent:"space-between",
      alignItems:"center",padding:"10px 14px",opacity:transl?0.55:1,
      borderBottom:`1px solid ${C.border}`}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:30,height:30,borderRadius:"50%",
          background:accountExists?C.navy:C.border,
          display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:10,fontWeight:800,color:"#fff",flexShrink:0}}>
          {emp?emp.kuerzel:name.slice(0,2)}
        </div>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:C.text}}>{name}</div>
          {(shift?.time||shift?.t)&&(
            <div style={{fontSize:10,color:C.muted}}>{shift.time||shift.t}</div>
          )}
          {sSt==="freigegeben"&&<div style={{fontSize:9,fontWeight:700,color:"#b45309",marginTop:1}}>wartet auf Tausch</div>}
          {sSt==="getauscht"&&<div style={{fontSize:9,fontWeight:700,color:C.mintDark,marginTop:1}}>Getauscht mit {gMit||"?"}</div>}
          {gVon&&sSt!=="getauscht"&&<div style={{fontSize:9,fontWeight:700,color:C.mintDark,marginTop:1}}>✔️ Getauscht mit {gVon}</div>}
        </div>
      </div>
      <span style={{fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:99,
        color:statusColor,background:statusBg}}>
        {statusLabel}
      </span>
    </div>
  );
}

function NachMitarbeiterAntrag({name, d, nList, approveNachtrag, rejectNachtrag}) {
  const [exp, setExp] = useState(false);
  const pN = nList.find(a=>a.user===name&&a.date===d&&a.status==="offen");
  const dN = nList.find(a=>a.user===name&&a.date===d&&a.status!=="offen");
  if(!pN&&!dN) return null;
  return(
    <div style={{borderTop:`1px solid ${pN?C.yellow:C.border}`,marginTop:0}}>
      {pN&&(
        <div style={{padding:"8px 10px",background:C.yellowLight}}>
          <div style={{fontSize:10,fontWeight:700,color:C.yellow,marginBottom:3}}>{"🕐 Nachtrag · "}{pN.ein}{" – "}{pN.aus}</div>
          {pN.grund&&<div style={{fontSize:9,color:C.muted,marginBottom:6}}>{"📝 "}{pN.grund}</div>}
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>rejectNachtrag(pN)} style={{flex:1,padding:"5px",borderRadius:7,border:`1px solid ${C.red}`,background:"#fff",color:C.red,fontWeight:700,fontSize:10,cursor:"pointer"}}>{"✕ Ablehnen"}</button>
            <button onClick={()=>approveNachtrag(pN)} style={{flex:1,padding:"5px",borderRadius:7,border:"none",background:C.mintDark,color:"#fff",fontWeight:700,fontSize:10,cursor:"pointer"}}>{"✓ Genehmigen"}</button>
          </div>
        </div>
      )}
      {!pN&&dN&&(
        <div style={{background:dN.status==="genehmigt"?C.mintLight:C.redLight}}>
          <button onClick={()=>setExp(p=>!p)} style={{width:"100%",padding:"6px 10px",border:"none",background:"none",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:9,fontWeight:700,color:dN.status==="genehmigt"?C.mintDark:C.red}}>
              {"🕐 Nachtrag "}{dN.status==="genehmigt"?"genehmigt ✓":"abgelehnt ✕"}{" · "}{dN.ein}{" – "}{dN.aus}
            </span>
            <span style={{fontSize:9,color:C.muted}}>{exp?"▲":"▼"}</span>
          </button>
          {exp&&(
            <div style={{padding:"6px 10px 8px",borderTop:`1px solid ${C.border}`}}>
              {dN.grund&&<div style={{fontSize:9,color:C.muted,marginBottom:6}}>{"📝 "}{dN.grund}</div>}
              <div style={{fontSize:9,color:C.muted,marginBottom:6}}>{"Zeit: "}{dN.ein}{" – "}{dN.aus}</div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>rejectNachtrag(dN)} style={{flex:1,padding:"5px",borderRadius:7,border:`1px solid ${C.red}`,background:"#fff",color:C.red,fontWeight:700,fontSize:10,cursor:"pointer"}}>{"✕ Ablehnen"}</button>
                <button onClick={()=>approveNachtrag(dN)} style={{flex:1,padding:"5px",borderRadius:7,border:"none",background:C.mintDark,color:"#fff",fontWeight:700,fontSize:10,cursor:"pointer"}}>{"✓ Genehmigen"}</button>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── 공용 Dienstplan 캘린더: 월 달력 + 선택일의 지점별 근무자 리스트 ──
//    highlightName이 주어지면(직원 뷰) 본인 근무를 강조. 안전 렌더링(정규화)으로 크래시 방지.
function DienstplanKalender({ schedule, records, highlightName, allowDelete, users, setRecords, FILIALEN_LIST }) {
  const norm = v => !v ? [] : Array.isArray(v) ? v : Object.values(v);
  const filShort = { "TEEAMO Arkaden":"Arkaden","TEEAMO Aegidiimarkt":"Aegidiimarkt","TEEnJOY":"TEEnJOY","ONIGIRI":"ONIGIRI" };
  const FILS = Array.isArray(FILIALEN_LIST)&&FILIALEN_LIST.length?FILIALEN_LIST:(typeof FILIALEN!=="undefined"?FILIALEN:[]);
  const todayStr = today();
  const [calYM, setCalYM] = useState(()=>{ const p=todayStr.split("-"); return {y:+p[0], m:(+p[1])-1}; });
  const [selDate, setSelDate] = useState(todayStr);
  // 🔒 Nachtragen 락 판정을 위한 신청 목록 구독
  const [antraegeList] = useFirebase("antraege", []);
  // 인라인 수정/양도/Nachtragen 상태
  const [editRow, setEditRow] = useState(null);   // {name, fil, von, bis}
  const [nachRow, setNachRow] = useState(null);   // {name, von, bis}
  const [actMsg, setActMsg]   = useState("");
  // 날짜 우선 추가 폼 (관리자)
  const [addOpen, setAddOpen] = useState(false);
  const [addFil, setAddFil]   = useState("");
  const [addEmp, setAddEmp]   = useState("");     // vorname | "__temp__"
  const [addTemp, setAddTemp] = useState("");
  const [addVon, setAddVon]   = useState("");
  const [addBis, setAddBis]   = useState("");
  const [addTyp, setAddTyp]   = useState("normal");   // 🧋 Arbeitstyp: normal | einspringen

  // 날짜별 근무 인덱스 (안전 정규화)
  const byDate = React.useMemo(()=>{
    const map={};
    Object.entries(schedule||{}).forEach(([name,sh])=>{
      norm(sh).forEach(s=>{
        if(!s) return;
        const d=s.date||s.d; if(!d) return;
        (map[d]=map[d]||[]).push({
          name, filiale:s.filiale||s.f||"", time:s.time||s.t||"", typ:typNorm(s.typ),
          status:s.status||null, getauschtMit:s.getauschtMit||null, getauschtVon:s.getauschtVon||null
        });
      });
    });
    return map;
  },[schedule]);

  const daysInMonth=new Date(calYM.y, calYM.m+1, 0).getDate();
  const firstDow=(new Date(calYM.y, calYM.m, 1).getDay()+6)%7;
  const cells=[]; for(let i=0;i<firstDow;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);
  const ymStr=d=>calYM.y+"-"+String(calYM.m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
  const calLabel=new Date(calYM.y, calYM.m, 1).toLocaleDateString("de-DE",{month:"long",year:"numeric"});
  const navBtn={border:"none",background:C.bg,borderRadius:8,width:30,height:30,fontSize:15,cursor:"pointer",color:C.text};

  const dayShifts=(byDate[selDate]||[]).slice()
    .sort((a,b)=>(a.filiale||"").localeCompare(b.filiale||"")||(a.time||"").localeCompare(b.time||""));
  const byFil={}; dayShifts.forEach(r=>{ (byFil[r.filiale]=byFil[r.filiale]||[]).push(r); });
  // 🔒 [직원·날짜·지점] 단위로 기록을 찾는다 (지점별 독립 판정)
  const recFor=(name, filiale)=> selDate!==todayStr ? null
    : recordForShift(records, name, selDate, filiale);

  return (
    <div>
      {/* 달력 */}
      <div style={{border:"1px solid "+C.border,borderRadius:14,padding:"12px",marginBottom:14,background:"#fff"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <button onClick={()=>setCalYM(p=>{const m=p.m-1;return m<0?{y:p.y-1,m:11}:{y:p.y,m};})} style={navBtn}>{"‹"}</button>
          <div style={{fontSize:13,fontWeight:800,color:C.text}}>{calLabel}</div>
          <button onClick={()=>setCalYM(p=>{const m=p.m+1;return m>11?{y:p.y+1,m:0}:{y:p.y,m};})} style={navBtn}>{"›"}</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:4}}>
          {["Mo","Di","Mi","Do","Fr","Sa","So"].map(w=><div key={w} style={{textAlign:"center",fontSize:9,fontWeight:700,color:C.muted}}>{w}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
          {cells.map((d,i)=>{
            if(d===null) return <div key={"e"+i}/>;
            const ds=ymStr(d);
            const shifts=byDate[ds]||[];
            const mine=highlightName&&shifts.some(s=>s.name===highlightName);
            const isSel=ds===selDate;
            const isToday=ds===todayStr;
            return(
              <button key={ds} onClick={()=>setSelDate(ds)}
                style={{aspectRatio:"1",borderRadius:9,cursor:"pointer",position:"relative",padding:0,
                  border:isSel?"2px solid "+C.navy:isToday?"1.5px solid "+C.mint:"1px solid "+C.border,
                  background:isSel?C.navy:mine?C.mintLight:"#fff",color:isSel?"#fff":C.text,
                  display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
                <span style={{fontSize:12,fontWeight:mine||isSel?800:600}}>{d}</span>
                {shifts.length>0&&(
                  <span style={{width:5,height:5,borderRadius:"50%",background:isSel?"#fff":mine?C.mintDark:C.muted}}/>
                )}
              </button>
            );
          })}
        </div>
      </div>

      {/* 선택일 상세: 지점별 근무자 */}
      <div>
        <div style={{fontSize:12,fontWeight:800,color:C.text,marginBottom:8}}>
          {new Date(selDate).toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"})}
        </div>
        {actMsg&&(
          <div style={{fontSize:11,fontWeight:700,padding:"8px 11px",borderRadius:9,marginBottom:8,
            background:actMsg.startsWith("✅")?"#dcfce7":"#fee2e2",color:actMsg.startsWith("✅")?"#15803d":C.red}}>
            {actMsg}
          </div>
        )}
        {dayShifts.length===0 ? (
          <div style={{...S.card,textAlign:"center",padding:"22px",color:C.muted,fontSize:12}}>Keine Schichten an diesem Tag.</div>
        ) : (
          Object.keys(byFil).sort(filialSort).map(fil=>(
            <div key={fil} style={{marginBottom:12}}>
              <div style={{fontSize:10,fontWeight:800,color:C.mintDark,marginBottom:6,textTransform:"uppercase",letterSpacing:".04em"}}>
                {filialIcon(fil)+" "+(filShort[fil]||fil||"—")}
              </div>
              {byFil[fil].map((r,idx)=>{
                const isMine=highlightName&&r.name===highlightName;
                const rec=recFor(r.name, fil);
                const transl=r.status==="freigegeben"||r.status==="getauscht";
                const rowKey=r.name+"|"+fil+"|"+idx;
                const editing = editRow&&editRow.key===rowKey;
                const nachting = nachRow&&nachRow.key===rowKey;
                const isPastOrToday = selDate<=todayStr;
                const iBtn={flexShrink:0,width:30,height:30,borderRadius:8,border:"1px solid "+C.border,
                  fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"};

                // ── 인라인 수정 폼 (관리자) ──
                if(editing){
                  return(
                    <div key={rowKey} style={{...S.card,padding:"11px 12px",marginBottom:6,border:"1.5px solid "+C.navy}}>
                      <div style={{fontSize:12,fontWeight:800,color:C.text,marginBottom:8}}>{"✏️ "+r.name}</div>
                      <div style={{marginBottom:8}}>
                        <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:3}}>FILIALE</div>
                        <select value={editRow.fil} onChange={e=>setEditRow({...editRow,fil:e.target.value})}
                          style={{...S.input,width:"100%",fontSize:13,padding:"8px 10px",boxSizing:"border-box"}}>
                          {FILS.map(f=><option key={f} value={f}>{filShort[f]||f}</option>)}
                        </select>
                      </div>
                      <div style={{display:"flex",gap:10,marginBottom:10}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:3}}>VON</div>
                          <TimeInput value={editRow.von} onChange={v=>setEditRow({...editRow,von:v})} style={{...S.input,width:"100%",fontSize:14,padding:"8px 6px",boxSizing:"border-box"}}/>
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:3}}>BIS</div>
                          <TimeInput value={editRow.bis} onChange={v=>setEditRow({...editRow,bis:v})} style={{...S.input,width:"100%",fontSize:14,padding:"8px 6px",boxSizing:"border-box"}}/>
                        </div>
                      </div>
                      <div style={{display:"flex",gap:8}}>
                        <button onClick={()=>setEditRow(null)} style={{flex:1,padding:"10px",borderRadius:9,border:"1px solid "+C.border,background:"#fff",color:C.muted,fontWeight:700,fontSize:12,cursor:"pointer"}}>Abbrechen</button>
                        <button onClick={()=>{
                          const nt=(editRow.von&&editRow.bis)?editRow.von+"-"+editRow.bis:(r.time||"");
                          patchScheduleShift(r.name, selDate, {f:editRow.fil, filiale:editRow.fil, t:nt, time:nt});
                          setEditRow(null);
                        }} style={{flex:2,padding:"10px",borderRadius:9,border:"none",background:C.navy,color:"#fff",fontWeight:800,fontSize:12,cursor:"pointer"}}>{"💾 Speichern"}</button>
                      </div>
                    </div>
                  );
                }
                // ── Nachtragen 인라인 폼 (직원 본인) ──
                if(nachting){
                  return(
                    <div key={rowKey} style={{...S.card,padding:"11px 12px",marginBottom:6,border:"1.5px solid "+C.yellow}}>
                      <div style={{fontSize:12,fontWeight:800,color:C.text,marginBottom:2}}>{"📝 Nachtragen · "+r.name}</div>
                      <div style={{fontSize:10,color:C.muted,marginBottom:8}}>Wird automatisch genehmigt & in Statistik übernommen.</div>
                      <div style={{display:"flex",gap:10,marginBottom:10}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:3}}>VON</div>
                          <TimeInput value={nachRow.von} onChange={v=>setNachRow({...nachRow,von:v})} style={{...S.input,width:"100%",fontSize:14,padding:"8px 6px",boxSizing:"border-box"}}/>
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:3}}>BIS</div>
                          <TimeInput value={nachRow.bis} onChange={v=>setNachRow({...nachRow,bis:v})} style={{...S.input,width:"100%",fontSize:14,padding:"8px 6px",boxSizing:"border-box"}}/>
                        </div>
                      </div>
                      <div style={{display:"flex",gap:8}}>
                        <button onClick={()=>setNachRow(null)} style={{flex:1,padding:"10px",borderRadius:9,border:"1px solid "+C.border,background:"#fff",color:C.muted,fontWeight:700,fontSize:12,cursor:"pointer"}}>Abbrechen</button>
                        <button onClick={()=>{
                          if(!nachRow.von||!nachRow.bis){ setActMsg("Bitte VON und BIS angeben."); return; }
                          nachtragenSchicht({userName:r.name, date:selDate, filiale:fil, ein:nachRow.von, aus:nachRow.bis, setRecords});
                          setNachRow(null); setActMsg("✅ Nachgetragen & genehmigt.");
                          setTimeout(()=>setActMsg(""),2500);
                        }} style={{flex:2,padding:"10px",borderRadius:9,border:"none",background:C.yellow,color:"#fff",fontWeight:800,fontSize:12,cursor:"pointer"}}>{"✅ Nachtragen"}</button>
                      </div>
                    </div>
                  );
                }
                // ── 일반 카드 + 액션 ──
                return(
                  <div key={rowKey} style={{...S.card,display:"flex",alignItems:"center",gap:10,padding:"9px 12px",marginBottom:6,
                    opacity:transl?0.55:1,
                    border:isMine?"1.5px solid "+C.mint:"1px solid "+C.border,
                    background:isMine?C.mintLight:"#fff"}}>
                    <div style={{width:32,height:32,borderRadius:"50%",background:isMine?C.mintDark:C.navy,color:"#fff",
                      display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:11,flexShrink:0}}>
                      {(r.name||"?").slice(0,2)}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:700,color:C.text,display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
                        <span>{r.name}</span>
                        {isOnigiriFiliale(fil)&&(
                          <span style={{fontSize:9,fontWeight:800,padding:"2px 7px",borderRadius:99,
                            background:"#fce7f3",color:"#9d174d"}}>{"🍙 ONIGIRI"}</span>
                        )}
                        {typNorm(r.typ)==="einspringen"&&(
                          <span style={{fontSize:9,fontWeight:800,padding:"2px 7px",borderRadius:99,
                            background:"#fef9c3",color:"#92400e"}}>{"⚡ Einspringen"}</span>
                        )}
                        {isMine&&<span style={{fontSize:9,color:C.mintDark,fontWeight:800}}>(Du)</span>}
                      </div>
                      {(()=>{
                        const on=isOnigiriFiliale(fil);   // 🍙 ONIGIRI 지점: 시간 표시 생략
                        const timePart = on ? "" : (r.time||"—");
                        const statusPart = rec?.aus?" · ✅ Feierabend":rec?.ein?" · 🟢 Aktiv":"";
                        if(on && !statusPart) return null;  // 🍙 Onigiri: 시간 표시 영역 생략(이름만)
                        return (
                          <div style={{fontSize:10,color:C.muted,marginTop:1}}>
                            {timePart}{statusPart}
                          </div>
                        );
                      })()}
                      {(()=>{ const ist=istTimeFor(records,r.name,selDate,fil); if(!ist) return null;
                        return (
                          <div style={{fontSize:9,fontWeight:700,color:C.mintDark,marginTop:1}}>
                            {"Ist: "+ist.ein+" – "+ist.aus}
                            {ist.isNachtrag&&<span style={{color:C.muted,fontWeight:400}}>{" · korrigiert"}</span>}
                            {ist.isAuto&&<span style={{color:C.muted,fontWeight:400}}>{" · Auto"}</span>}
                          </div>
                        );
                      })()}
                      {r.status==="freigegeben"&&<div style={{fontSize:9,fontWeight:700,color:"#b45309",marginTop:1}}>{"🔄 Freigegeben"}</div>}
                      {r.status==="getauscht"&&<div style={{fontSize:9,fontWeight:700,color:C.mintDark,marginTop:1}}>{"🔄 Getauscht mit "+(r.getauschtMit||"?")}</div>}
                      {r.getauschtVon&&r.status!=="getauscht"&&<div style={{fontSize:9,fontWeight:700,color:C.mintDark,marginTop:1}}>{"✔️ Getauscht mit "+r.getauschtVon}</div>}
                    </div>
                    {/* 관리자: 수정/삭제 */}
                    {allowDelete&&(
                      <div style={{display:"flex",gap:6,flexShrink:0}}>
                        <button onClick={()=>{ const p=(r.time||"").split("-"); setEditRow({key:rowKey,name:r.name,fil,von:p[0]||"",bis:p[1]||""}); }}
                          style={{...iBtn,background:"#fff",color:C.navy}}>{"✏️"}</button>
                        <button onClick={()=>{ if(window.confirm(r.name+" · "+selDate+"\nSchicht löschen?")) deleteScheduleShift(r.name, selDate); }}
                          style={{...iBtn,background:C.redLight,color:C.red}}>{"×"}</button>
                      </div>
                    )}
                    {/* 직원 본인: 양도 / Nachtragen */}
                    {isMine&&!transl&&!allowDelete&&(
                      <div style={{display:"flex",flexDirection:"column",gap:5,flexShrink:0}}>
                        {/* Freigeben: 내일(미래) 근무만 — 과거/당일은 차단 */}
                        {selDate>todayStr&&(
                          <button onClick={()=>{ if(window.confirm("Schicht freigeben?\n"+r.name+" · "+selDate)) freigebenSchicht({userName:highlightName,date:selDate,filiale:fil,time:r.time,users}); }}
                            style={{padding:"6px 9px",borderRadius:8,border:"none",background:C.navy,color:"#fff",fontSize:10,fontWeight:800,cursor:"pointer",whiteSpace:"nowrap"}}>{"🔁 Freigeben"}</button>
                        )}
                        {/* Nachtragen 노출 규칙:
                            · 오늘(당일): 이미 실시간 출퇴근 기록(Einstempeln)이 있으면 차단
                              (근무 중 or 정상 종료 상태) — 단 자동퇴근은 수정 위해 허용
                            · 과거: 완료 기록이 없거나, 자동퇴근된 근무는 수정 위해 허용 */}
                        {(()=>{
                          // 🔒 이미 승인/대기 중인 Nachtragen이 있으면 버튼 대신 상태 배지
                          const lock = nachtragStatusFor(antraegeList, r.name, selDate, fil);
                          if(lock){
                            return (
                              <span style={{padding:"6px 9px",borderRadius:8,fontSize:10,fontWeight:800,whiteSpace:"nowrap",
                                border:"1px solid "+(lock==="genehmigt"?C.mint:C.yellow),
                                background:lock==="genehmigt"?C.mintLight:C.yellowLight,
                                color:lock==="genehmigt"?C.mintDark:C.yellow}}>
                                {lock==="genehmigt"?"✅ Korrigiert":"⏳ In Prüfung"}
                              </span>
                            );
                          }
                          const realClock = rec && rec.ein && rec.typ!=="nachtrag" && !rec.isAutoCheckedOut;
                          const showNach = isPastOrToday && (
                            selDate===todayStr
                              ? !realClock
                              : (!(rec&&rec.aus) || rec.isAutoCheckedOut)
                          );
                          if(!showNach) return null;
                          return (
                            <button onClick={()=>{ const p=(r.time||"").split("-"); setNachRow({key:rowKey,von:p[0]||"",bis:p[1]||""}); }}
                              style={{padding:"6px 9px",borderRadius:8,border:"1px solid "+C.yellow,background:C.yellowLight,color:C.yellow,fontSize:10,fontWeight:800,cursor:"pointer",whiteSpace:"nowrap"}}>{"📝 Nachtragen"}</button>
                          );
                        })()}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          ))
        )}

        {/* ➕ 날짜 우선 추가 (관리자): 지점 → 직원(임시이름 가능) → 시간 */}
        {allowDelete&&(
          <div style={{marginTop:6}}>
            {!addOpen ? (
              <button onClick={()=>{setAddOpen(true);setAddFil(FILS[0]||"");setAddEmp("");setAddTemp("");setAddVon("");setAddBis("");setAddTyp("normal");setActMsg("");}}

  })();
  const [selMonth, setSelMonth] = useState(currentMonth);
  const empList = (Array.isArray(users)?users:[]).filter(u=>!MANAGERS.includes(u.key))
    .sort(byName);

  const norm = v => !v?[]:Array.isArray(v)?v:Object.values(v);

  // Firebase에서 월별 schedule 목록 로드
  const [allMonthSchedules, setAllMonthSchedules] = React.useState({});
  React.useEffect(()=>{
    if(!window._fbDb||!window._fbRef||!window._fbGet) return;
    // schedule_YYYY_MM 키들 찾기
    const months = ["2026_01","2026_02","2026_03","2026_04","2026_05","2026_06",
                    "2026_07","2026_08","2026_09","2026_10","2026_11","2026_12",
                    "2027_01","2027_02","2027_03","2027_04","2027_05","2027_06"];
    const promises = months.map(m=>
      window._fbGet(window._fbRef(window._fbDb,"schedule_"+m))
        .then(snap=>({m, data:snap.val()}))
        .catch(()=>({m,data:null}))
    );
    Promise.all(promises).then(results=>{
      const found={};
      results.forEach(({m,data})=>{ if(data) found[m]=data; });
      setAllMonthSchedules(found);
    });
  },[]);

  // 선택된 달의 스케줄을 실시간 구독 (Freigeben/Getauscht 상태 변경이 즉시 반영되도록)
  const liveScheduleKey = selMonth ? "schedule_"+selMonth : "schedule";
  const [liveMonthSched] = useFirebase(liveScheduleKey, {});

  // 선택된 월의 schedule (월별 독립 — 다른 달 데이터 유출 없음)
  const activeSchedule = React.useMemo(()=>{
    // 우선순위: 선택된 달의 실시간 노드 → 마운트 시 로드한 allMonthSchedules → root schedule
    let raw = null;
    if (liveMonthSched && Object.keys(liveMonthSched).length > 0) {
      raw = liveMonthSched;
    } else if (Object.keys(allMonthSchedules).length > 0) {
      raw = selMonth ? allMonthSchedules[selMonth] : null;
    } else {
      raw = schedule || {};
    }
    if (!raw) return {};
    // Firebase object → array 변환
    const result={};
    for(const [name,shifts] of Object.entries(raw)){
      result[name]=Array.isArray(shifts)?shifts:Object.values(shifts||{});
    }
    return result;
  },[selMonth, allMonthSchedules, schedule, liveMonthSched]);

  // 사용 가능한 월 목록
  const availableMonths = React.useMemo(()=>{
    const months=Object.keys(allMonthSchedules);
    // 현재 schedule의 월도 추출
    const currentDates=Object.values(schedule||{}).flatMap(sh=>norm(sh).map(s=>s.date||s.d)).filter(Boolean);
    if(currentDates.length>0){
      const m=currentDates[0].slice(0,7).replace("-","_");
      if(!months.includes(m)) months.push(m);
    }
    return months.sort().reverse();
  },[allMonthSchedules, schedule]);

  // 선택된 schedule 기반 데이터
  const scheduleNames = Object.keys(activeSchedule).filter(name=>
    norm(activeSchedule[name]).length>0
  ).sort((a,b)=>a.localeCompare(b));

  const allNames = [...new Set([
    ...scheduleNames,
    ...empList.map(e=>e.vorname)
  ])].sort((a,b)=>a.localeCompare(b));

  const hasAccount = name => empList.some(e=>e.vorname===name);

  const allDates = [...new Set(
    allNames.flatMap(name => norm(activeSchedule[name]||[]).map(s=>s.date||s.d))
  )].filter(Boolean).sort((a,b)=>a.localeCompare(b));

  const todayStr = today();
  const nList = Array.isArray(antraege) ? antraege : [];

    setAntraege(prev=>(Array.isArray(prev)?prev:[]).map(x=>x.id===a.id?{...x,status:"genehmigt"}:x));

    overrideWithNachtrag({ a, setRecords });
  }

      {/*   */}

        {[{id:"plan",l:"📋 Plan"},
          {id:"by_emp",l:"👤 Nach Mitarbeiter"}].map(({id,l})=>(
          <button key={id} onClick={()=>setViewMode(id)}
