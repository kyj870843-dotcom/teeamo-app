function DienstplanUploadView({ users, selMonth, onScheduleSaved, adminName }) {
  const norm = v => !v ? [] : Array.isArray(v) ? v : Object.values(v);
  const empOptions = (Array.isArray(users)?users:[]).filter(u=>!MANAGERS.includes(u.key) && u.vorname!==adminName).sort(byName);
  const QUICK = ["09:30","11:30","12:30","14:00","15:00","16:00","18:00","19:00","20:00"];
  const DRAFT_KEY = "teeamo_schicht_cart_v1";
  const filShort = { "TEEAMO Arkaden":"Arkaden", "TEEAMO Aegidiimarkt":"Aegidiimarkt", "TEEnJOY":"TEEnJOY", "ONIGIRI":"ONIGIRI" };

  // 선택된 월 스케줄 (달력 점 표시용)
  const scheduleKey = selMonth ? "schedule_"+selMonth : "schedule";
  const [monthSched] = useFirebase(scheduleKey, {});
  // root 스케줄 (실시간) — 모달의 '기존 근무 조회' + 달력 점 (저장 즉시 반영)
  const [rootSched] = useFirebase("schedule", {});

  const [showAdd, setShowAdd] = useState(false);
  const [saving, setSaving]   = useState(false);
  const [msg, setMsg]         = useState(null);

  // ── Draft 복원 (장바구니 + 선택 날짜) ──
  const draft0 = (()=>{ try{const s=localStorage.getItem(DRAFT_KEY);return s?JSON.parse(s):null;}catch{return null;} })();
  const [cart, setCart] = useState(Array.isArray(draft0?.cart)?draft0.cart:[]); // [{date,filiale,name,von,bis}]
  const [selDate, setSelDate] = useState(draft0?.selDate || today());

  // 하위 입력 (지점 → 직원 → 시간)
  const [aFil, setAFil]   = useState(FILIALEN[0]);
  const [aEmp, setAEmp]   = useState("");
  const [aTemp, setATemp] = useState("");
  const [aVon, setAVon]   = useState("");
  const [aBis, setABis]   = useState("");
  const [aTyp, setATyp]   = useState("normal");   // 🧋 Arbeitstyp: normal | einspringen

  const [calYM, setCalYM] = useState(()=>{ const p=(selDate||today()).split("-"); return {y:+p[0], m:(+p[1])-1}; });

  useEffect(()=>{ try{ localStorage.setItem(DRAFT_KEY, JSON.stringify({cart, selDate})); }catch{} },[cart, selDate]);

  const resolveAName = () => aEmp==="__temp__" ? (aTemp||"").trim() : aEmp;
  const hasDraft = cart.length>0;

  function addToCart(){
    const name=resolveAName();
    if(!name){ setMsg({t:"err",m:"Bitte Mitarbeiter oder Temp-Name wählen."}); return; }
    const on=isOnigiriFiliale(aFil);   // 🍙 ONIGIRI: 시간 없이도 유효
    // 🍙 Onigiri: 시간 없이도 유효 — 그 외 타입만 VON/BIS 필수
    if(!on && (!aVon||!aBis)){ setMsg({t:"err",m:"Bitte VON und BIS angeben."}); return; }
    setCart(prev=>[...prev, {date:selDate, filiale:aFil, name, von:on?"":aVon, bis:on?"":aBis, typ:aTyp}]);
    setAEmp(""); setATemp(""); setAVon(""); setABis(""); setATyp("normal"); setMsg(null);  // 지점은 유지
  }
  function removeCart(idx){ setCart(prev=>prev.filter((_,i)=>i!==idx)); }
  function resetInputs(){ setAEmp("");setATemp("");setAVon("");setABis("");setATyp("normal"); }
  function clearAll(){ setCart([]); resetInputs(); try{localStorage.removeItem(DRAFT_KEY);}catch{} }

  // ── 저장: 장바구니 전체를 root + 월별 두 노드에 기록. 저장 후 모달 유지 + 초기화 ──
  async function saveCart(){
    if(cart.length===0){ setMsg({t:"err",m:"Noch keine Schichten hinzugefügt."}); return; }
    if(!(window._fbDb&&window._fbRef&&window._fbGet&&window._fbSet)){ setMsg({t:"err",m:"Keine Verbindung zur Datenbank."}); return; }
    setSaving(true); setMsg(null);
    try{
      const byName={};  // {name: [{date,filiale,time,typ}]}
      cart.forEach(it=>{ const on=isOnigiriFiliale(it.filiale);
        (byName[it.name]=byName[it.name]||[]).push({date:it.date, filiale:it.filiale, time: on ? "" : it.von+"-"+it.bis, typ:typNorm(it.typ)}); });
      // 1) 월별 노드
      const monthsTouched=new Set(cart.map(it=>it.date.slice(0,7).replace("-","_")));
      for(const mk of monthsTouched){
        const key="schedule_"+mk;
        const snap=await window._fbGet(window._fbRef(window._fbDb,key));
        const ex=snap.val()?JSON.parse(JSON.stringify(snap.val())):{};
        for(const [name,entries] of Object.entries(byName)){
          const me=entries.filter(e=>e.date.slice(0,7).replace("-","_")===mk);
          if(me.length===0) continue;
          let arr=Array.isArray(ex[name])?ex[name]:Object.values(ex[name]||{});
          me.forEach(e=>{ arr=arr.filter(s=>!((s.date||s.d)===e.date&&(s.filiale||s.f)===e.filiale)); arr.push({date:e.date,filiale:e.filiale,time:e.time,typ:e.typ}); });
          ex[name]=Object.fromEntries(arr.map((s,i)=>[String(i),s]));
        }
        await window._fbSet(window._fbRef(window._fbDb,key),ex);
        const pd={}; for(const [n,sh] of Object.entries(ex)){ pd[n]=norm(sh); }
        if(onScheduleSaved) onScheduleSaved(mk, pd);
      }
      // 2) root schedule
      const rsnap=await window._fbGet(window._fbRef(window._fbDb,"schedule"));
      const root=rsnap.val()?JSON.parse(JSON.stringify(rsnap.val())):{};
      for(const [name,entries] of Object.entries(byName)){
        let rarr=Array.isArray(root[name])?root[name]:Object.values(root[name]||{});
        entries.forEach(e=>{ rarr=rarr.filter(s=>!((s.d||s.date)===e.date&&(s.f||s.filiale)===e.filiale)); rarr.push({d:e.date,f:e.filiale,t:e.time,typ:e.typ}); });
        root[name]=rarr;
      }
      await window._fbSet(window._fbRef(window._fbDb,"schedule"),root);
      setSaving(false);
      setMsg({t:"ok",m:"✅ "+cart.length+" Schicht(en) gespeichert. Weiter mit dem nächsten Tag!"});
      clearAll();  // 초기화하되 모달은 유지
    }catch(e){
      setSaving(false);
      setMsg({t:"err",m:"Fehler beim Speichern: "+(e.message||e)});
    }
  }

  // ── 달력 셀 ──
  const daysInMonth=new Date(calYM.y, calYM.m+1, 0).getDate();
  const firstDow=(new Date(calYM.y, calYM.m, 1).getDay()+6)%7;
  const cells=[]; for(let i=0;i<firstDow;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);
  const ymStr=(d)=>calYM.y+"-"+String(calYM.m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
  const calLabel=new Date(calYM.y, calYM.m, 1).toLocaleDateString("de-DE",{month:"long",year:"numeric"});
  const todayStr=today();

  // 기존 스케줄 있는 날짜 (달력 점)
  const existDates = new Set();
  Object.values(rootSched||{}).forEach(sh=>{ norm(sh).forEach(s=>{ const dd=s&&(s.date||s.d); if(dd) existDates.add(dd); }); });
  // 선택 날짜에 이미 저장된 근무 (실시간)
  const existingForSel = [];
  Object.entries(rootSched||{}).forEach(([name,sh])=>{
    if(MANAGERS.includes((name||"").toLowerCase())) return;
    norm(sh).forEach(s=>{
      if(!s) return;
      const dd=s.date||s.d; if(dd!==selDate) return;
      existingForSel.push({ name, filiale:s.filiale||s.f||"", time:s.time||s.t||"", status:s.status||null });
    });
  });
  existingForSel.sort((a,b)=>(a.filiale||"").localeCompare(b.filiale||"")||(a.time||"").localeCompare(b.time||""));
  const cartDates = new Set(cart.map(c=>c.date));

  const inp = {...S.input, width:"100%", fontSize:13, padding:"9px 11px", boxSizing:"border-box"};

  // 시간 입력 + 퀵버튼 (하위 입력용)
  const timeField = (val, setter, label) => (
    <div style={{flex:1,minWidth:0}}>
      <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:3}}>{label}</div>
      <TimeInput value={val} onChange={setter} style={{...S.input,width:"100%",fontSize:14,fontWeight:700,textAlign:"center",padding:"8px 4px",boxSizing:"border-box"}}/>
      <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:5}}>
        {QUICK.map(q=>(
          <button key={label+q} onClick={()=>setter(q)}
            style={{fontSize:10,fontWeight:700,padding:"5px 6px",borderRadius:7,cursor:"pointer",flex:"0 0 auto",
              border:"1px solid "+(val===q?C.mintDark:C.border),
              background:val===q?C.mintDark:"#fff",color:val===q?"#fff":C.text}}>{q}</button>
        ))}
      </div>
    </div>
  );

  const cartForSel = cart.map((c,i)=>({...c,_i:i})).filter(c=>c.date===selDate);

  return (
    <div>
      {/* 헤더 + 추가 버튼 */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,gap:10}}>
        <div>
          <div style={{fontSize:14,fontWeight:800,color:C.text}}>{"📋 Dienstplan"}</div>
          <div style={{fontSize:10,color:C.muted,marginTop:1}}>Pro Tag mehrere Schichten sammeln & speichern</div>
        </div>
        <button onClick={()=>{setShowAdd(true);setMsg(null);}}
          style={{flexShrink:0,padding:"10px 16px",borderRadius:10,border:"none",
            background:"linear-gradient(135deg,"+C.mint+","+C.mintDark+")",color:"#fff",
            fontWeight:800,fontSize:12,cursor:"pointer",boxShadow:"0 3px 10px rgba(92,127,148,.35)"}}>
          {"+ Schicht hinzufügen"}
        </button>
      </div>

      {hasDraft && !showAdd && (
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,
          background:"#fffbeb",border:"1px solid #fde68a",borderRadius:10,padding:"8px 12px",marginBottom:10}}>
          <span style={{fontSize:11,color:"#92400e",fontWeight:600}}>{"💾 "+cart.length+" Schicht(en) im Warenkorb (Entwurf)."}</span>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>setShowAdd(true)} style={{fontSize:10,padding:"5px 10px",borderRadius:7,border:"none",background:"#f59e0b",color:"#fff",fontWeight:700,cursor:"pointer"}}>Weiter</button>
            <button onClick={clearAll} style={{fontSize:10,padding:"5px 10px",borderRadius:7,border:"1px solid #fde68a",background:"#fff",color:"#92400e",fontWeight:700,cursor:"pointer"}}>Verwerfen</button>
          </div>
        </div>
      )}
      {msg && !showAdd && (
        <div style={{fontSize:11,fontWeight:700,padding:"9px 12px",borderRadius:9,marginBottom:10,
          background:msg.t==="ok"?"#dcfce7":"#fee2e2",color:msg.t==="ok"?"#15803d":C.red}}>{msg.m}</div>
      )}

      {/* ── 모달 ── */}
      {showAdd && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}
          onClick={()=>setShowAdd(false)}>
          <div onClick={e=>e.stopPropagation()}
            style={{background:"#fff",borderRadius:"18px 18px 0 0",width:"100%",maxWidth:480,height:"92vh",display:"flex",flexDirection:"column"}}>
            {/* 고정 헤더 */}
            <div style={{padding:"16px 16px 10px",borderBottom:"1px solid "+C.border,flexShrink:0,
              display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{fontSize:16,fontWeight:800,color:C.text}}>Schicht hinzufügen</div>
              <button onClick={()=>setShowAdd(false)}
                style={{border:"none",background:C.bg,borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:800,color:C.text,cursor:"pointer"}}>{"Fertig ✕"}</button>
            </div>

            {/* 스크롤 영역 */}
            <div style={{flex:1,overflowY:"auto",padding:"14px 16px"}}>
              {/* 1) 날짜 선택 (단일) */}
              <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:4}}>{"1 · DATUM WÄHLEN"}</div>
              <div style={{border:"1px solid "+C.border,borderRadius:12,padding:"10px",marginBottom:12}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                  <button onClick={()=>setCalYM(p=>{const m=p.m-1;return m<0?{y:p.y-1,m:11}:{y:p.y,m};})}
                    style={{border:"none",background:C.bg,borderRadius:8,width:30,height:30,fontSize:15,cursor:"pointer",color:C.text}}>{"‹"}</button>
                  <div style={{fontSize:12,fontWeight:800,color:C.text}}>{calLabel}</div>
                  <button onClick={()=>setCalYM(p=>{const m=p.m+1;return m>11?{y:p.y+1,m:0}:{y:p.y,m};})}
                    style={{border:"none",background:C.bg,borderRadius:8,width:30,height:30,fontSize:15,cursor:"pointer",color:C.text}}>{"›"}</button>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:4}}>
                  {["Mo","Di","Mi","Do","Fr","Sa","So"].map(w=><div key={w} style={{textAlign:"center",fontSize:8,fontWeight:700,color:C.muted}}>{w}</div>)}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
                  {cells.map((d,i)=>{
                    if(d===null) return <div key={"e"+i}/>;
                    const ds=ymStr(d);
                    const on=ds===selDate;
                    const hasCart=cartDates.has(ds);
                    const hasExist=existDates.has(ds);
                    const isToday=ds===todayStr;
                    return(
                      <button key={ds} onClick={()=>setSelDate(ds)}
                        style={{aspectRatio:"1",borderRadius:8,cursor:"pointer",position:"relative",padding:0,fontSize:12,fontWeight:on?800:600,
                          border:isToday&&!on?"1.5px solid "+C.mint:"1px solid "+(on?C.mintDark:C.border),
                          background:on?C.mintDark:"#fff",color:on?"#fff":C.text,
                          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
                        {d}
                        {(hasCart||hasExist)&&<span style={{width:5,height:5,borderRadius:"50%",background:on?"#fff":hasCart?"#f59e0b":C.muted}}/>}
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* 선택 날짜 */}
              <div style={{fontSize:13,fontWeight:800,color:C.navy,marginBottom:8}}>
                {new Date(selDate).toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"})}
              </div>

              {/* 2) 실시간 기존 근무 조회 (Firebase에 이미 저장된 근무) */}
              <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:6}}>
                {"2 · GESPEICHERTE SCHICHTEN"}{existingForSel.length>0?" · "+existingForSel.length+" an diesem Tag":""}
              </div>
              {existingForSel.length===0 ? (
                <div style={{fontSize:11,color:C.muted,textAlign:"center",padding:"12px 10px",background:C.bg,borderRadius:10,marginBottom:12}}>
                  Noch leer — keine gespeicherten Schichten.
                </div>
              ) : (
                <div style={{marginBottom:12}}>
                  {existingForSel.map((e, i)=>{
                    const transl=e.status==="freigegeben"||e.status==="getauscht";
                    return(
                      <div key={"ex"+i} style={{...S.card,display:"flex",alignItems:"center",gap:10,padding:"8px 11px",marginBottom:6,opacity:transl?0.55:1,border:"1px solid "+C.mint}}>
                        <div style={{width:30,height:30,borderRadius:"50%",background:C.mintDark,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:10,flexShrink:0}}>{(e.name||"?").slice(0,2)}</div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:12,fontWeight:700,color:C.text}}>{e.name}</div>
                          <div style={{fontSize:10,color:C.muted}}>{typIcon(e.typ)+" "+(filShort[e.filiale]||e.filiale)+(e.time?" · "+e.time:"")}</div>
                        </div>
                        <span style={{fontSize:8,fontWeight:800,color:C.mintDark,background:C.mintLight,padding:"3px 7px",borderRadius:99,flexShrink:0}}>{"✓ gespeichert"}</span>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* 3) 이번 세션에서 추가할 근무 장바구니 */}
              {cartForSel.length>0&&(
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:9,fontWeight:700,color:"#b45309",marginBottom:6}}>{"3 · NEU HINZUGEFÜGT (Warenkorb)"}</div>
                  {cartForSel.map(c=>(
                    <div key={c._i} style={{...S.card,display:"flex",alignItems:"center",gap:10,padding:"8px 11px",marginBottom:6,border:"1px dashed #f59e0b",background:"#fffbeb"}}>
                      <div style={{width:30,height:30,borderRadius:"50%",background:"#f59e0b",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:10,flexShrink:0}}>{(c.name||"?").slice(0,2)}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,fontWeight:700,color:C.text}}>{c.name}</div>
                        <div style={{fontSize:10,color:C.muted}}>{typIcon(c.typ)+" "+(filShort[c.filiale]||c.filiale)+((c.von&&c.bis)?" · "+c.von+"-"+c.bis:"")}</div>
                      </div>
                      <button onClick={()=>removeCart(c._i)}
                        style={{flexShrink:0,width:26,height:26,borderRadius:7,border:"1px solid "+C.border,background:C.redLight,color:C.red,fontSize:13,fontWeight:700,cursor:"pointer"}}>{"×"}</button>
                    </div>
                  ))}
                </div>
              )}

              {/* 4) 하위 항목 추가: 지점 → 직원 → 시간 */}
              <div style={{border:"1.5px dashed "+C.mint,borderRadius:12,padding:"12px",marginBottom:6,background:C.mintLight}}>
                <div style={{fontSize:9,fontWeight:700,color:C.mintDark,marginBottom:8}}>{"4 · NEUE SCHICHT FÜR DIESEN TAG"}</div>
                <div style={{marginBottom:8}}>
                  <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:3}}>FILIALE</div>
                  <select value={aFil} onChange={e=>setAFil(e.target.value)} style={inp}>
                    {FILIALEN.map(f=><option key={f} value={f}>{filShort[f]||f}</option>)}
                  </select>
                </div>
                <div style={{marginBottom:8}}>
                  <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:3}}>MITARBEITER/IN</div>
                  <select value={aEmp} onChange={e=>setAEmp(e.target.value)} style={inp}>
                    <option value="">{"— auswählen —"}</option>
                    {adminName&&<option value={adminName}>{adminName+" (Admin)"}</option>}
                    {empOptions.map(u=><option key={u.key} value={u.vorname}>{u.vorname}{u.nachname?" "+u.nachname:""}</option>)}
                    <option disabled>{"──────────"}</option>
                    <option value="__temp__">{"➕ Temp-Name direkt eingeben…"}</option>
                  </select>
                  {aEmp==="__temp__"&&(
                    <input value={aTemp} onChange={e=>setATemp(e.target.value)} placeholder="z. B. Tingting" style={{...inp,marginTop:6}}/>
                  )}
                </div>
                {/* 🧋 ARBEITSTYP — Onigiri 선택 시 시간 입력 숨김 */}
                <div style={{marginBottom:8}}>
                  <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:3}}>ARBEITSTYP</div>
                  <div style={{display:"flex",gap:6}}>
                    {ARBEITSTYPEN.map(({typ,icon,lbl})=>(
                      <button key={typ} onClick={()=>setATyp(typ)}
                        style={{flex:1,padding:"8px 4px",borderRadius:9,fontSize:10,fontWeight:800,cursor:"pointer",
                          border:`2px solid ${aTyp===typ?C.mintDark:C.border}`,
                          background:aTyp===typ?"#fff":"rgba(255,255,255,.6)",
                          color:aTyp===typ?C.mintDark:C.muted}}>
                        <div style={{fontSize:14}}>{icon}</div>
                        <div style={{fontSize:9,marginTop:2}}>{lbl}</div>
                      </button>
                    ))}
                  </div>
                </div>
                {isOnigiriFiliale(aFil) ? (
                  <div style={{fontSize:10,color:C.mintDark,fontWeight:700,background:"#fff",
                    border:"1px solid "+C.mint,borderRadius:9,padding:"9px 11px",marginBottom:10}}>
                    {"🍙 Onigiri: Keine Uhrzeit nötig – nur Name eintragen."}
                  </div>
                ) : (
                  <div style={{display:"flex",gap:12,marginBottom:10}}>
                    {timeField(aVon,setAVon,"VON")}
                    {timeField(aBis,setABis,"BIS")}
                  </div>
                )}
                <button onClick={addToCart}
                  style={{width:"100%",padding:"11px",borderRadius:10,border:"none",background:C.navy,color:"#fff",fontWeight:800,fontSize:12,cursor:"pointer"}}>
                  {"+ Zu diesem Tag hinzufügen"}
                </button>
              </div>

              {msg && (
                <div style={{fontSize:11,fontWeight:700,padding:"9px 12px",borderRadius:9,marginTop:6,
                  background:msg.t==="ok"?"#dcfce7":"#fee2e2",color:msg.t==="ok"?"#15803d":C.red}}>{msg.m}</div>
              )}
            </div>

            {/* 고정 하단: 저장 / 완료 */}
            <div style={{padding:"12px 16px calc(12px + env(safe-area-inset-bottom,0px))",borderTop:"1px solid "+C.border,display:"flex",gap:8,flexShrink:0}}>
              <button onClick={()=>setShowAdd(false)}
                style={{flex:1,padding:"12px",borderRadius:11,border:"1px solid "+C.border,background:"#fff",color:C.muted,fontWeight:700,fontSize:12,cursor:"pointer"}}>
                Fertig
              </button>
              <button onClick={saveCart} disabled={saving||cart.length===0}
                style={{flex:2,padding:"12px",borderRadius:11,border:"none",
                  background:(saving||cart.length===0)?"#aaa":"linear-gradient(135deg,"+C.mint+","+C.mintDark+")",
                  color:"#fff",fontWeight:800,fontSize:13,cursor:(saving||cart.length===0)?"not-allowed":"pointer"}}>
                {saving?"⏳ Speichern…":"✓ Speichern"+(cart.length?" ("+cart.length+")":"")}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function ManagerView({records,setRecords,antraege,setAntraege,onLogout,userKey,users,setUsers,csvCtx,onSwitchToStaff,hybrid}){
  const [tab,setTab]=useState("uebersicht");
  const [antragTab,setAntragTab]=useState("schichtboerse"); // Anträge 서브탭
  const [detailKey,setDetailKey]=useState(null);
  const [deleteConfirm,setDeleteConfirm]=useState(null);
  const [erledigtExpanded,setErledigtExpanded]=useState({});
  const [monthAccordion,setMonthAccordion]=useState({});
  const [delRecordConfirm,setDelRecordConfirm]=useState(null);
  const [showMgrSettings, setShowMgrSettings] = useState(false);
  const [aTab, setATab] = useState("nachtrag");
  const [openAId, setOpenAId] = useState(null);
  const [uTab, setUTab] = useState("all");
  const safeUsers=Array.isArray(users)&&users.length>0?users:INIT_USERS;

  // 🚨 미출근 경보 시스템: 5분마다 근무 시작 시간 체크
  React.useEffect(()=>{
    function checkNoShow(){
      if(!window._fbDb||!window._fbRef||!window._fbGet||!window._fbSet) return;
      const now = new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Berlin"}));
      const todayStr = now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0");
      const nowMin = now.getHours()*60+now.getMinutes();
      // 오늘 schedule에서 아직 출근 안 한 직원 체크
      window._fbGet(window._fbRef(window._fbDb,"schedule")).then(snap=>{
        const sched=snap.val()||{};
        for(const [name, shifts] of Object.entries(sched)){
          if(MANAGERS.includes(name.toLowerCase())) continue;
          const todayShifts=(Array.isArray(shifts)?shifts:Object.values(shifts)).filter(s=>(s.d||s.date)===todayStr);
          for(const sh of todayShifts){
            const t=sh.t||sh.time;
            if(!t||!t.includes("-")) continue;
            const startTime=t.split("-")[0];
            const [sh2,sm2]=startTime.split(":").map(Number);
            if(isNaN(sh2)) continue;
            const startMin=sh2*60+sm2;
            // 15분 초과 && 아직 알림 안 보냄
            if(nowMin-startMin<15) continue;
            // [동일 날짜 + 동일 직원] 단일 키 → 매니저별 중복(3개) 생성 방지, 단 1개만
            const alertKey="noshow_"+name+"_"+todayStr;
            window._fbGet(window._fbRef(window._fbDb,"notifications/"+alertKey)).then(ex=>{
              if(ex.val()) return; // 이미 존재 → 중복 인서트 차단
              // 실제 출근 기록 체크
              window._fbGet(window._fbRef(window._fbDb,"records")).then(recSnap=>{
                const recs=Object.values(recSnap.val()||{});
                const clocked=recs.some(r=>r.user===name&&r.date===todayStr&&r.ein);
                if(clocked) return; // 이미 출근함
                // 미출근 경보 발송 (단 1개)
                const alertMsg="🚨 [No-Show] "+name+" — "+(sh.f||sh.filiale)+" · "+startTime+" — kein Einstempeln.";
                window._fbSet(window._fbRef(window._fbDb,"notifications/"+alertKey),{
                  type:"noshow_alert", kategorie:"🚨 NoShow",
                  user:name, date:todayStr, filiale:sh.f||sh.filiale, time:startTime,
                  text:alertMsg, gelesen:false, urgent:true, ts:Date.now()
                }).catch(()=>{});
              }).catch(()=>{});
            }).catch(()=>{});
          }
        }
      }).catch(()=>{});
    }

  },[]);
  // userKey ,  key prefix fallback (  )
  const manager=safeUsers.find(u=>u.key===userKey)
    || {key:userKey, vorname:userKey?.split("_")[0]||"Manager", emoji:"", kuerzel:"M", role:"Admin"};

  const todayRecs=records.filter(r=>r.date===today());

  //    (오전 ONIGIRI 퇴근이 오후 TEEnJOY 카드까지 Feierabend로 만들던 버그 방지)
  const getStatus=(name, filiale)=>{
    const recs=todayRecs.filter(x=>x.user===name&&x.ein&&
      (filiale===undefined||filiale===null||sameFiliale(x.filiale, filiale)));

    if(recs.some(r=>!r.aus||r.aus==="")) return "Aktiv";
    // 조기 퇴근으로 확인 대기(prüfen)인 record가 있고 아직 확인 전이면 Prüfen
    if(recs.some(r=>r.aus&&r.prüfen&&!r.geprüft)) return "Prüfen";
    return "Feierabend";
  };
  // 조기 퇴근 확인(OK): record를 geprüft 처리 → 직원 화면도 Feierabend로 즉시 전환
  function confirmPruefen(rec){
    if(!rec||!rec.id) return;
    setRecords(prev=>(Array.isArray(prev)?prev:[]).map(r=>r.id===rec.id?{...r,prüfen:false,geprüft:true}:r));

  const getBranch=name=>{const r=todayRecs.find(x=>x.user===name);return r?.filiale||null;};
  const sColor=s=>s==="Aktiv"?C.mintDark:s==="Feierabend"?C.muted:s==="Prüfen"?C.yellow:C.red;
  const sBg=s=>s==="Aktiv"?C.mintLight:s==="Feierabend"?"#F0F0F0":s==="Prüfen"?C.yellowLight:C.redLight;

  const [notifications, setNotifications] = useFirebase("notifications", {});
  const [tauschAntraege, setTauschAntraege] = useFirebase("schichttausch", []);

  //     (Alarm  )
  // Schichtbörse 자동 승인 알림은 확인용으로만 표시 (별도 처리 불필요)
  const boerseMatchNotifs = Object.entries(notifications||{})
    .filter(([,n])=>n.type==="schichtboerse_match"&&!n.gelesen&&MANAGERS.includes(n.zustaendig))

  // Schichtbörse 탭 진입 시 매칭 알림을 읽음 처리 → 하단 탭바 배지 즉시 0
  useEffect(()=>{
    if(tab!=="schichtboerse_mgr") return;
    const keys=boerseMatchNotifs.map(([k])=>k);
    if(keys.length===0) return;
    setNotifications(prev=>{
      const next={...(prev||{})};
      keys.forEach(k=>{ next[k]={...(next[k]||{}),gelesen:true}; });
      return next;
    });
    if(window._fbSet&&window._fbRef&&window._fbDb)
      keys.forEach(k=>window._fbSet(window._fbRef(window._fbDb,"notifications/"+k+"/gelesen"),true).catch(()=>{}));
  },[tab]);
  const pendingNotifs = Object.entries(notifications||{})

  //         ( )
  const handledByOther = Object.entries(notifications||{})

  const antraegeUnread = Object.entries(notifications||{}).filter(([,n])=>

  useEffect(()=>{

    const keys=antraegeUnread.map(([k])=>k);

    setNotifications(prev=>{ const next={...(prev||{})}; keys.forEach(k=>{ next[k]={...(next[k]||{}),gelesen:true}; }); return next; });

  //    
  function handleTausch(notifKey, n, ok) {
    //      
    const antrag = (Array.isArray(tauschAntraege)?tauschAntraege:[]).find(a=>a.id===n.antragId);

    if (ok && antrag) {
      // schedule swap
      if (window._fbDb && window._fbRef && window._fbSet && window._fbOnValue) {
        window._fbOnValue(window._fbRef(window._fbDb, "schedule"), snap => {
          const raw = snap.val() ? JSON.parse(JSON.stringify(snap.val())) : {};
          // Firebase     
          const norm = (v) => !v ? [] : Array.isArray(v) ? v : Object.values(v);
          const sched = {};
          for (const [k,v] of Object.entries(raw)) sched[k] = norm(v);
          sched[antrag.initiator] = (sched[antrag.initiator]||[])
            .filter(s => (s.d||s.date) !== antrag.initiatorDate);
          sched[antrag.initiator] = [...(sched[antrag.initiator]||[]),
            {d: antrag.partnerDate, f: antrag.partnerFiliale, t: antrag.partnerTime||null, tauschMit: antrag.partner}];
          sched[antrag.partner] = (sched[antrag.partner]||[])
            .filter(s => (s.d||s.date) !== antrag.partnerDate);
          sched[antrag.partner] = [...(sched[antrag.partner]||[]),
            {d: antrag.initiatorDate, f: antrag.initiatorFiliale, t: antrag.initiatorTime||null, tauschMit: antrag.initiator}];
          window._fbSet(window._fbRef(window._fbDb, "schedule"), sched).catch(e=>console.error(e));
        }, {onlyOnce:true});
      }
      setTauschAntraege(prev=>(Array.isArray(prev)?prev:[]).map(a=>
        a.id===n.antragId?{...a,status:"getauscht",partnerBestaetigt:true}:a));
    }

    const entscheidung = ok ? "genehmigt" : "abgelehnt";
    //     bearbeitetVon 
    ["teddy","yeaji"].forEach(mgr => {
      const k = `${notifKey.replace(/_teddy$|_yeaji$/,"")}_${mgr}`;
      if (window._fbDb && window._fbRef && window._fbSet) {
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/bearbeitetVon`), userKey).catch(()=>{});
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/gelesen`), true).catch(()=>{});
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/entscheidung`), entscheidung).catch(()=>{});
      }
    });
    markRead(notifKey);

    // Archiv 
    if (window._fbDb && window._fbRef && window._fbSet) {
      window._fbSet(window._fbRef(window._fbDb, `archiv/${notifKey}`), {
        ...n, entscheidung, bearbeitetVon: userKey, archiviertTs: Date.now(), gelesen: true
      }).catch(e=>console.error(e));

    setTab("antraege"); setATab("tausch");

    if (ok) {

//  APP ROOT 
function App(){
  const [screen,setScreen]=useState("login");
  const [staffView,setStaffView]=useState(false); // 하이브리드 관리자: 직원 뷰로 전환 여부
  React.useEffect(()=>{ loadPinsFromFirebase(); },[]);
  const [userKey,setUserKey]=useState(null);
  const { getPin, setPin, initPins } = usePinStore();

  //   Firebase  
  const [users,    setUsers,    usersReady]    = useFirebase("users",    INIT_USERS);
  const [records,  setRecords,  recordsReady]  = useFirebase("records",  INIT_RECORDS);
  const [antraege, setAntraege, antraegeReady] = useFirebase("antraege", INIT_ANTRAEGE);
  const [schedule, , scheduleReady] = useFirebase("schedule", {});
  const csvCtx = useDienstplanCSV();

  // 최신 값 참조용 ref (interval 클로저에서 stale 방지)
  const recordsRef  = useRef(records);  recordsRef.current  = records;
  const scheduleRef = useRef(schedule); scheduleRef.current = schedule;

  // 🧹 (1회성) 데이터베이스에 남은 6월 더미 records 정리
  useEffect(()=>{ cleanupJuneDummyRecords(); },[]);

  // 🌙 자정 자동 강제 퇴근 (Auto-Ausstempeln)
  //    · '근무 중(ein 있고 aus 없음)'이면서 날짜가 과거인 세션을 강제 종료.
  //    · 퇴근시각 = 근무표의 예정 종료시간(예: 20:00) — autoCheckoutAus() 참고.
  //      찾지 못할 때만 Fallback(출근+8h)이며, 절대 출근시각과 같아지지 않는다.
  //    ⚠️ schedule 로딩 완료(scheduleReady) 전에는 실행하지 않는다.
  //       (예정 종료시간을 못 읽어 퇴근시간이 '출근시간'으로 저장되던 버그 방지)
  useEffect(()=>{
    if(!recordsReady || !scheduleReady) return;
    const isStale = (r,td)=> r && r.ein && (r.aus===null||r.aus===undefined||r.aus==="") && r.typ!=="nachtrag" && r.date && r.date < td;
    function runAutoCheckout(){
      const td = today();
      const arr = Array.isArray(recordsRef.current)?recordsRef.current:[];
      if(!arr.some(r=>isStale(r,td))) return;   // 처리할 게 없으면 쓰기 생략
      setRecords(prev=>{
        const p=Array.isArray(prev)?prev:[];
        return p.map(r=>{
          if(isStale(r,td)){
            const { aus, viaPlan } = autoCheckoutAus(scheduleRef.current, r);
            return {...r, aus, isAutoCheckedOut:true,
              note:(r.note?r.note+" · ":"")+(viaPlan?"Auto-Ausstempeln (Planende)":"Auto-Ausstempeln (geschätzt)"),
              prüfen:false, frühGrund:""};
          }
          return r;
        });
      });
    }
    runAutoCheckout();
    const iv=setInterval(runAutoCheckout, 60*1000);
    return ()=>clearInterval(iv);
  },[recordsReady, scheduleReady]);

  // INIT_USERS PIN LS  1 
  useEffect(() => { if (usersReady) initPins(INIT_USERS); }, [usersReady]);

  //    :     
  useEffect(() => {
    if (!usersReady) return;
    const arr = Array.isArray(users) ? users : [];
    if (arr.length === 0) return;

    //   
    const roleMap = {
      "Mitarbeiterin":"Staff","Mitarbeiter":"Staff",
      "Chefin":"Admin","Chef":"Admin",
      "Manager":"Admin","Managerin":"Admin",
    };

    let changed = false;
    const migrated = arr.map(u => {
      const patch = {};
      // role 
      if (roleMap[u.role]) { patch.role = roleMap[u.role]; }
      //   
      if (u.infektionsschutz === undefined) patch.infektionsschutz = null;
      if (u.contractHours   === undefined) patch.contractHours   = 0;
      if (u.nachname        === undefined) patch.nachname        = "";
      if (u.emoji           === undefined) patch.emoji           = "";
      if (Object.keys(patch).length > 0) { changed = true; return {...u, ...patch}; }
      return u;
    });

    if (changed) {
      setUsers(migrated);
    }
  }, [usersReady]);

  const [splashDone, setSplashDone] = useState(false);
  useEffect(() => {
    const t = setTimeout(() => setSplashDone(true), 2000);
    return () => clearTimeout(t);
  }, []);
  const allReady = usersReady && recordsReady && splashDone;

  function handleLogin(key){
    const u=(Array.isArray(users)?users:[]).find(x=>x.key===key);
    const isAdmin=MANAGERS.includes(key)||(u&&u.isAdmin);
    setUserKey(key);setStaffView(false);setScreen(isAdmin?"manager":"mitarbeiter");
  }
  function handleLogout(){setUserKey(null);setStaffView(false);setScreen("login");}

  // users setUsers  Firebase   wrapper
  function setUsersFirebase(updater) {
    setUsers(updater);
  }

  if(!allReady) return(
    <div style={{maxWidth:500,margin:"0 auto",minHeight:"100vh",background:"#fff",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>

      {/*    -    */}
      <div style={{
        position:"absolute",
        width:"min(88vw,420px)",height:"min(88vw,420px)",
        borderRadius:"50%",
        border:"2.5px solid #e0e0e0",
        top:"50%",left:"50%",
        transform:"translate(-50%,-50%)"
      }}/>
      <div style={{
        position:"absolute",
        width:"min(76vw,365px)",height:"min(76vw,365px)",
        borderRadius:"50%",
        border:"1.5px solid #ececec",
        top:"50%",left:"50%",
        transform:"translate(-50%,-50%)"
      }}/>

      {/*   */}
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",animation:"fadeIn .7s ease both",zIndex:1}}>

        {/* Mnster  */}
        <div style={{
          fontSize:"min(5.5vw,22px)",
          fontStyle:"italic",
          fontWeight:600,
          color:"#1a1a1a",
          letterSpacing:".01em",
          marginBottom:8
        }}>{"Münster"}</div>

        {/* teeamo   */}
        <div style={{
          fontSize:"min(15vw,64px)",
          fontWeight:900,
          color:"#1a1a1a",
          letterSpacing:"-.02em",
          lineHeight:1,
          marginBottom:18
        }}>teeamo</div>

        {/* 3  (  / ) */}
        <div style={{display:"flex",gap:"min(5vw,22px)",marginBottom:22}}>
          {[
            {color:"#9B2A2A"},
            {color:"#7A9BBF"},
            {color:"#C8A84B"},
          ].map(({color},i)=>(
            <svg key={i} width="min(9vw,38px)" height="min(9vw,38px)" viewBox="0 0 40 40" fill="none">
              <path d="M20 8 C20 8 13 4 9 9 C5 14 9 20 14 21 C10 24 8 30 13 33 C17 36 20 32 20 32 C20 32 23 36 27 33 C32 30 30 24 26 21 C31 20 35 14 31 9 C27 4 20 8 20 8Z" fill={color}/>
            </svg>
          ))}
        </div>

        {/* Love Tea and More */}
        <div style={{textAlign:"center",lineHeight:1.3}}>
          <div style={{
            fontSize:"min(4.5vw,18px)",
            fontStyle:"italic",
            fontWeight:500,
            color:"#1a1a1a",
            letterSpacing:".01em"
          }}>Love Tea</div>
          <div style={{
            fontSize:"min(4.5vw,18px)",
            fontStyle:"italic",
            fontWeight:500,
            color:"#1a1a1a"
          }}>and More</div>
        </div>
      </div>

      {/*    */}
      <div style={{position:"absolute",bottom:48,display:"flex",gap:8}}>
        {[0,1,2].map(i=>(
          <div key={i} style={{
            width:6,height:6,borderRadius:"50%",
            background:"#ccc",
            animation:"pulse 1.2s ease-in-out "+i*0.22+"s infinite"
          }}/>
        ))}
      </div>
    </div>
  );

  return(
    <div style={{maxWidth:500,margin:"0 auto",minHeight:"100vh",background:C.bg}}>
      {screen==="login"&&<LoginView onLogin={handleLogin} users={users} setUsers={setUsersFirebase} getPin={getPin} setPin={setPin} csvCtx={csvCtx}/>}
      {screen==="mitarbeiter"&&<MitarbeiterView userKey={userKey} users={users} setUsers={setUsersFirebase} records={records} setRecords={setRecords} antraege={antraege} setAntraege={setAntraege} onLogout={handleLogout} csvCtx={csvCtx}/>}
      {screen==="manager"&&(
        <div>
          {/* 🔁 상단 고정 모드 전환 탭 (하이브리드 관리자) */}
          <div style={{position:"sticky",top:0,zIndex:300,background:"#0f1f2a",
            padding:"8px 10px calc(8px + env(safe-area-inset-top,0px))",paddingTop:"max(8px,env(safe-area-inset-top))"}}>
            <div style={{display:"flex",background:"rgba(255,255,255,.10)",borderRadius:10,padding:3,maxWidth:420,margin:"0 auto"}}>
              {[{id:false,l:"👑 Admin-Modus"},{id:true,l:"👤 Mitarbeiter-Modus"}].map(o=>(
                <button key={String(o.id)} onClick={()=>setStaffView(o.id)}
                  style={{flex:1,padding:"9px 6px",border:"none",borderRadius:8,cursor:"pointer",
                    fontSize:12,fontWeight:800,transition:"all .15s",
                    background:staffView===o.id?"#fff":"transparent",
                    color:staffView===o.id?"#0f1f2a":"rgba(255,255,255,.75)"}}>
                  {o.l}
                </button>
              ))}
            </div>
          </div>
          {!staffView
            ? <ManagerView records={records} setRecords={setRecords} antraege={antraege} setAntraege={setAntraege} onLogout={handleLogout} userKey={userKey} users={users} setUsers={setUsersFirebase} csvCtx={csvCtx} hybrid={true}/>
            : <MitarbeiterView userKey={userKey} users={users} setUsers={setUsersFirebase} records={records} setRecords={setRecords} antraege={antraege} setAntraege={setAntraege} onLogout={handleLogout} csvCtx={csvCtx} hybridStaff={true}/>}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
