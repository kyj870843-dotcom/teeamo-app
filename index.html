function recordForShift(records, name, date, filiale){
  const list=(Array.isArray(records)?records:[]).filter(r=>r&&r.user===name&&r.date===date);
  if(filiale===undefined||filiale===null) return list[0]||null;
  const exact=list.filter(r=>sameFiliale(r.filiale, filiale));
  if(exact.length===0) return null;
  // 진행 중(aus 없음) > 완료 기록 순으로 우선 반환
  return exact.find(r=>!r.aus||r.aus==="") || exact[0];
}

//  PIN LocalStorage  () 
function lsGet(key, fallback) {
  try { const v=localStorage.getItem(key); if(v!==null) return JSON.parse(v); return fallback; } catch { return fallback; }
}
function lsSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

// API     localStorage 
function usePersist(lsKey, init) {
  const [state, setState] = React.useState(() => lsGet(lsKey, init));
  const setAndSave = React.useCallback((updater) => {
    setState(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      lsSet(lsKey, next);
      return next;
    });
  }, [lsKey]);
  return [state, setAndSave];
}

const _pinCache = {};

function loadPinsFromFirebase() {
  if (!window._fbDb || !window._fbRef || !window._fbOnValue) return;
  window._fbOnValue(window._fbRef(window._fbDb, "pins"), snap => {
    const data = snap.val() || {};
    Object.assign(_pinCache, data);
    // localStorage에도 동기화
    Object.entries(data).forEach(([k,v]) => { if(v) lsSet(`pin_${k}`, v); });
  });
}

function usePinStore() {
  function getPin(userKey) {
    // 캐시 우선
    if (_pinCache[userKey]) return _pinCache[userKey];
    // localStorage에서 읽고 Firebase에도 동기화
    const local = lsGet(`pin_${userKey}`, null);
    if (local && window._fbDb && window._fbRef && window._fbSet) {
      _pinCache[userKey] = local;
      window._fbSet(window._fbRef(window._fbDb, `pins/${userKey}`), local)
        .catch(e => {});
    }
    return local;
  }

  function setPin(userKey, pin) {
    // localStorage 저장
    lsSet(`pin_${userKey}`, pin);
    // 캐시 업데이트
    _pinCache[userKey] = pin;
    // Firebase 저장
    if (window._fbDb && window._fbRef && window._fbSet) {
      window._fbSet(window._fbRef(window._fbDb, `pins/${userKey}`), pin)
        .catch(e => console.error("PIN save error:", e));
    }
  }

  function initPins(users) {
    (Array.isArray(users)?users:[]).forEach(u => {
      if (!lsGet(`pin_${u.key}`, null) && u.pin) {
        lsSet(`pin_${u.key}`, u.pin);
      }
    });
  }

  return { getPin, setPin, initPins };
}

//  Firebase    () 
function useFirebase(path, fallback) {
  const [data, setData] = useState(fallback);
  const [ready, setReady] = useState(false);
  const unsubRef = useRef(null);

  useEffect(() => {
    let cancelled = false;

    function attach() {
      const db = window._fbDb;
      const fbRef = window._fbRef;
      const fbOnValue = window._fbOnValue;
      if (!db || !fbRef || !fbOnValue) return false;
      const r = fbRef(db, path);
      // onValue returns unsubscribe fn
      unsubRef.current = fbOnValue(r, snap => {
        if (cancelled) return;
        const val = snap.val();
        if (val === null) {
          setData(fallback);
        } else if (Array.isArray(fallback)) {
          // Firebase stores arrays as objects with numeric/string keys
          setData(Object.values(val));
        } else {
          setData(val);
        }
        setReady(true);
      });
      return true;
    }

    if (attach()) return () => { cancelled=true; if(unsubRef.current) unsubRef.current(); };

    let tries = 0;
    const iv = setInterval(() => {
      tries++;
      if (attach()) { clearInterval(iv); return; }
      if (tries > 30) {
        clearInterval(iv);
        console.error("Firebase 연결 실패:", path);
        setData(fallback);
        setReady(true);
      }
    }, 500);

    return () => { cancelled=true; clearInterval(iv); if(unsubRef.current) unsubRef.current(); };
  }, [path]);

  // setter: Firebase   onValue  UI 
  function fbWrite(next) {
    if (!window._fbDb || !window._fbRef || !window._fbSet) return;
    let toSave;
    if (Array.isArray(next)) {
      if (next.length === 0) { toSave = null; }
      else {
        // users path: PIN Firebase  
        const sanitize = path === "users"
          ? v => { const {pin:_, ...rest} = v; return rest; }
          : v => v;
        toSave = Object.fromEntries(next.map((v,i) => [String(v.id||v.key||i), sanitize(v)]));
      }
    } else if (next && typeof next === "object" && Object.keys(next).length === 0) {
      toSave = null;
    } else {
      toSave = next;
    }
    window._fbSet(window._fbRef(window._fbDb, path), toSave)
      .catch(e => console.error("FB write error ["+path+"]:", e));
  }

  function setter(updater) {
    //  :    + Firebase 
    setData(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      fbWrite(next);
      return next;
    });
  }

  //    (path/field  ,   )
  function fbUpdateField(subPath, value) {
    if (!window._fbDb || !window._fbRef || !window._fbSet) return;
    window._fbSet(window._fbRef(window._fbDb, path + "/" + subPath), value)
      .catch(e => console.error("FB field write error:", e));
  }

  return [data, setter, ready, fbUpdateField];
}

function pad(n) { return String(n).padStart(2, "0"); }
function useNow() {
  const [t, setT] = useState(new Date());
  useEffect(() => { const i = setInterval(() => setT(new Date()), 1000); return () => clearInterval(i); }, []);

}
function stunden(ein, aus) {
  if (!ein || !aus) return null;
  const [eh, em] = ein.split(":").map(Number);
  const [ah, am] = aus.split(":").map(Number);
  return (ah * 60 + am - eh * 60 - em) / 60;
}
function stdLabel(ein, aus) { const h = stunden(ein, aus); return h === null ? "–" : h.toFixed(1) + "h"; }
// 근무표(schedule)에서 name·date의 예정 종료시간("HH:MM") 추출 — 자동 강제 퇴근용
//  · root({d,f,t}) / 월별({date,filiale,time}) 두 스키마 모두 지원
//  · 같은 날 여러 shift가 있으면 가장 늦은 종료시간을 채택
//  · Onigiri 등 시간이 없는 근무(time:"")는 건너뜀
function scheduledEndTimeFor(schedule, name, date, filiale){
  const sh = schedule && schedule[name];
  const arr = !sh ? [] : (Array.isArray(sh) ? sh : Object.values(sh));
  const sameDay = arr.filter(s => s && (s.date||s.d) === date);
  // 🔒 지점이 주어지면 그 지점 스케줄의 종료시간만 사용 (다중 근무일 혼선 방지)
  const scoped = filiale ? sameDay.filter(s => sameFiliale(s.filiale||s.f, filiale)) : sameDay;
  const ends = (scoped.length?scoped:(filiale?[]:sameDay))
    .map(s => {
      const tm = s.time || s.t || "";
      if(String(tm).includes("-")) return String(tm).split("-")[1].trim();
      // 별도 필드로 저장된 경우도 지원
      return String(s.bis || s.end || "").trim();
    })
    .filter(v => /^\d{1,2}:\d{2}$/.test(v))
    .map(v => v.length===4 ? "0"+v : v);
  if(!ends.length) return null;
  return ends.sort()[ends.length-1];   // 가장 늦은 예정 종료시간
}
// 🌙 자동 강제 퇴근에 쓸 퇴근시각 결정.
//    1순위: 근무표의 예정 종료시간  /  2순위(Fallback): 출근시각 + AUTO_FALLBACK_H 시간
//    ⚠️ 어떤 경우에도 '출근시각과 동일한 값'을 반환하지 않는다(0시간 근무 방지).
const AUTO_FALLBACK_H = 8;
function autoCheckoutAus(schedule, rec){
  const ein = rec && rec.ein;
  // 해당 기록의 지점 스케줄에서 예정 종료시간을 찾는다
  const planned = scheduledEndTimeFor(schedule, rec && rec.user, rec && rec.date, rec && rec.filiale);
  if(planned && planned !== ein) return { aus:planned, viaPlan:true };
  // Fallback: 출근 + N시간 (자정 넘기면 23:59로 클램프)
  const [h,m] = String(ein||"09:00").split(":").map(Number);
  const total = (h||0)*60 + (m||0) + AUTO_FALLBACK_H*60;
  const cl = Math.min(total, 23*60+59);
  const fb = pad(Math.floor(cl/60)) + ":" + pad(cl%60);
  return { aus: fb===ein ? "23:59" : fb, viaPlan:false };
}
// 📌 특정 근무(name·date)에 대한 Nachtragen 신청 상태 — 신청 버튼 락 장치용
//    반환: "genehmigt"(승인 완료) | "offen"(승인 대기) | null(없음)
function nachtragStatusFor(antraege, name, date, filiale){
  const list = (Array.isArray(antraege)?antraege:[])
    .filter(a => a && a.user===name && a.date===date &&
      (filiale===undefined||filiale===null||!a.filiale||sameFiliale(a.filiale, filiale)) &&
      (a.typ==="nachtrag" || a.kategorie==="Nachtrag" || a.ein || a.aus));
  if(list.some(a => a.status==="genehmigt" || a.status==="approved")) return "genehmigt";
  if(list.some(a => !a.status || a.status==="offen" || a.status==="pending")) return "offen";
  return null;
}
// 🍙 표시용 라벨: 지점명 + 근무타입 결합 (예: "Arkaden (🍙 Onigiri)")
//    Regulär(normal)은 기본값이므로 지점명만 표시해 화면을 깔끔하게 유지한다.
function filialeMitTyp(filiale, typ, opts){
  const short = String(filiale||"—").replace("TEEAMO ","");
  const t = typNorm(typ);
  if(t==="normal" && !(opts&&opts.always)) return short;
  return short+" ("+typIcon(t)+" "+typLabel(t)+")";
}
// 실제(Ist) 근무시간: name·date의 실제 출퇴근 or 승인된 Nachtragen 시간을 반환.
//  · 승인된 Nachtragen(typ:"nachtrag") 우선 → 그다음 완료된 실시간 출퇴근 기록.
//  · 완전한 ein·aus 쌍이 있을 때만 반환(진행 중/미출근이면 null → Ist 미표시).
function istTimeFor(records, name, date, filiale){
  const list = (Array.isArray(records)?records:[]).filter(r=>r&&r.user===name&&r.date===date&&
    (filiale===undefined||filiale===null||sameFiliale(r.filiale, filiale)));
  if(!list.length) return null;
  const nach = list.find(r=>r.typ==="nachtrag" && r.ein && r.aus);
  const done = list.find(r=>r.ein && r.aus);
  const pick = nach || done;
  if(!pick || !pick.ein || !pick.aus) return null;
  return { ein:pick.ein, aus:pick.aus, isNachtrag:pick.typ==="nachtrag", isAuto:!!pick.isAutoCheckedOut };
}
function today() {
  //    (CET=UTC+1, CEST=UTC+2  )
  return new Date().toLocaleDateString("sv-SE", {timeZone:"Europe/Berlin"});
}

// ═══════════════════════════════════════════════════════════════
//  📊 3차원 교차 통계: 직원 → 지점(Filiale) → 근무타입(Arbeitstyp)
//   · records의 typ: "normal"(Regulär) | "einspringen" | "nachtrag"
//     (구 데이터의 "onigiri"는 typNorm()이 Regulär로 귀속시키고, 지점 ONIGIRI가 구분)
//   · "nachtrag"(사후등록)은 별도 타입이 아니라 정규 근무의 보정이므로
//     집계상 "normal"(Regulär)로 귀속시키되, 원장부에는 Nachtrag 여부를 남긴다.
// ═══════════════════════════════════════════════════════════════
function statTyp(r){ const t=String(r&&r.typ||"normal").toLowerCase(); return t==="nachtrag" ? "normal" : typNorm(t); }
function recHours(r){ const h=stunden(r&&r.ein, r&&r.aus); return h==null?0:h; }
// 한 직원의 월간 기록 → {total, byFiliale:[{filiale,total,byTyp:[{typ,icon,lbl,std}]}]}
function buildBreakdown(recs){
  const list=(Array.isArray(recs)?recs:[]).filter(r=>r&&r.ein&&r.aus);
  const total=list.reduce((a,r)=>a+recHours(r),0);
  const filMap={};
  list.forEach(r=>{
    const f=r.filiale||"—";
    const t=statTyp(r);
    filMap[f]=filMap[f]||{filiale:f,total:0,typs:{}};
    filMap[f].total+=recHours(r);
    filMap[f].typs[t]=(filMap[f].typs[t]||0)+recHours(r);
  });
  const byFiliale=Object.values(filMap)
    .sort((a,b)=>filialSort(a.filiale,b.filiale))
    .map(x=>({
      filiale:x.filiale, total:x.total,
      byTyp:ARBEITSTYPEN.filter(t=>(x.typs[t.typ]||0)>0)
        .map(t=>({typ:t.typ,icon:t.icon,lbl:t.lbl,std:x.typs[t.typ]}))
        .sort((a,b)=>b.std-a.std),
    }));
  return { total, byFiliale };
}

// ── 📥 CSV Export (외부 라이브러리 없이 Blob + a[download]) ──────────
function csvEscape(v){ return '"'+String(v==null?"":v).replace(/"/g,'""')+'"'; }
function downloadCsvRows(rows, filename){
  const bom="\uFEFF";
  const csv=bom+rows.map(r=>r.map(csvEscape).join(";")).join("\r\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}
// 근무표에서 계획 시작/종료 시간 추출 → {von,bis}
function plannedTimesFor(schedule, name, date){
  const sh=schedule&&schedule[name];
  const arr=!sh?[]:(Array.isArray(sh)?sh:Object.values(sh));
  const hit=arr.find(s=>(s&&(s.date||s.d))===date);
  const tm=hit&&(hit.time||hit.t);
  if(tm&&String(tm).includes("-")){
    const p=String(tm).split("-");
    return { von:(p[0]||"").trim(), bis:(p[1]||"").trim() };
  }
  return { von:"", bis:"" };
}
// 정산 원장 행 생성 (통합본/개별 공용)
const ABRECHNUNG_HEADER = ["Datum","Wochentag","Mitarbeiter/in","Filiale","Arbeitstyp",
  "Plan Von","Plan Bis","Ist Einstempeln","Ist Ausstempeln","Stunden","Nachtragen","Auto-Ausstempeln","Anmerkung"];
function abrechnungRows(recs, schedule){
  return (Array.isArray(recs)?recs:[])
    .filter(r=>r&&r.ein&&r.aus)
    .slice()
    .sort((a,b)=>(a.date||"").localeCompare(b.date||"")||String(a.user||"").localeCompare(String(b.user||"")))
    .map(r=>{
      const pl=plannedTimesFor(schedule, r.user, r.date);
      const h=recHours(r);
      return [
        r.date||"", TAGE_DE[new Date(r.date).getDay()]||"", r.user||"", r.filiale||"",
        typLabel(statTyp(r)), pl.von, pl.bis, r.ein||"", r.aus||"",
        h.toFixed(2).replace(".",","), r.typ==="nachtrag"?"Ja":"Nein",
        r.isAutoCheckedOut?"Ja":"Nein", r.note||"",
      ];
    });
}

// ═══════════════════════════════════════════════════════════════
//  🔧 [임시/개발자용] 과거 Onigiri 데이터 일괄 이관 마이그레이션
//   구조 변경: Onigiri = Arbeitstyp  →  Onigiri = 독립 지점(Filiale)
//   대상 노드:
//     · records            : 실제 출퇴근 기록      {user,date,filiale,typ,...}
//     · schedule           : 근무표(root)          {name:[{d,f,t,typ}]}
//     · schedule_YYYY_MM   : 근무표(월별)          {name:{i:{date,filiale,time,typ}}}
//   변환 규칙:
//     1) typ/arbeitstyp === "onigiri"  → filiale = "ONIGIRI", typ = "normal"(Regulär)
//     2) 과거에 지점명으로 저장된 "Onigiri"(대소문자 무관) → "ONIGIRI"로 표준화
//     3) ONIGIRI 지점 근무표는 계획시간을 사용하지 않으므로 time/t = "" 로 정리
//   ⚠️ dryRun:true 로 먼저 미리보기 → 이상 없으면 apply 실행
// ═══════════════════════════════════════════════════════════════
async function migrateOnigiriData({ dryRun = true } = {}) {
  const db = window._fbDb, fbRef = window._fbRef, fbGet = window._fbGet, fbSet = window._fbSet;
  if (!(db && fbRef && fbGet && fbSet)) throw new Error("Keine Verbindung zur Datenbank.");

  const isOldOnigiriTyp = v => String(v ?? "").trim().toLowerCase() === "onigiri";
  const isOldOnigiriFil = v => String(v ?? "").trim().toLowerCase() === "onigiri";
  const report = { dryRun, records:0, scheduleRoot:0, scheduleMonth:0, monthNodes:[], samples:[], duplicates:[] };

  // 루트 스냅샷 1회 조회 (schedule_YYYY_MM 노드를 모두 찾기 위함)
  const rootSnap = await fbGet(fbRef(db, "/"));
  const root = rootSnap.val() || {};

  // ── 1) records ────────────────────────────────────────────────
  const records = root.records ? JSON.parse(JSON.stringify(root.records)) : null;
  if (records && typeof records === "object") {
    Object.entries(records).forEach(([key, r]) => {
      if (!r || typeof r !== "object") return;
      const hitTyp = isOldOnigiriTyp(r.typ) || isOldOnigiriTyp(r.arbeitstyp);
      const hitFil = isOldOnigiriFil(r.filiale) || isOldOnigiriFil(r.filialeId);
      if (!hitTyp && !hitFil) return;
      if (report.samples.length < 8) {
        report.samples.push(`records/${key}: ${r.user||"?"} ${r.date||"?"} · ${r.filiale||"—"} (${r.typ||"—"}) → ONIGIRI (Regulär)`);
      }
      r.filiale = ONIGIRI_FILIALE;
      if ("filialeId" in r) r.filialeId = ONIGIRI_FILIALE;
      r.typ = "normal";                       // 🧋 Regulär
      if ("arbeitstyp" in r) r.arbeitstyp = "normal";
      records[key] = r;
      report.records++;
    });
    // 이관 후 [직원·날짜·ONIGIRI]가 중복되면 이중 정산 위험 → 경고만 보고(자동 삭제 안 함)
    const seen = {};
    Object.entries(records).forEach(([key, r]) => {
      if (!r || !isOldOnigiriFil(r.filiale) && r.filiale !== ONIGIRI_FILIALE) return;
      if (r.filiale !== ONIGIRI_FILIALE || !r.ein) return;
      const k = `${r.user}|${r.date}`;
      if (seen[k]) report.duplicates.push(`${r.user} · ${r.date} (${seen[k]} / ${key})`);
      else seen[k] = key;
    });
  }

  // ── 2) schedule (root) ────────────────────────────────────────
  const schedule = root.schedule ? JSON.parse(JSON.stringify(root.schedule)) : null;
  if (schedule && typeof schedule === "object") {
    Object.entries(schedule).forEach(([name, sh]) => {
      const isArr = Array.isArray(sh);
      const entries = isArr ? sh.map((v,i)=>[i,v]) : Object.entries(sh || {});
      entries.forEach(([idx, s]) => {
        if (!s || typeof s !== "object") return;
        const hitTyp = isOldOnigiriTyp(s.typ) || isOldOnigiriTyp(s.arbeitstyp);
        const hitFil = isOldOnigiriFil(s.f) || isOldOnigiriFil(s.filiale);
        if (!hitTyp && !hitFil) return;
        s.f = ONIGIRI_FILIALE;
        if ("filiale" in s) s.filiale = ONIGIRI_FILIALE;
        s.typ = "normal";
        if ("arbeitstyp" in s) s.arbeitstyp = "normal";
        s.t = "";                              // 🍙 ONIGIRI: 계획시간 없음
        if ("time" in s) s.time = "";
        if (isArr) sh[idx] = s; else sh[idx] = s;
        report.scheduleRoot++;
      });
      schedule[name] = sh;
    });
  }

  // ── 3) schedule_YYYY_MM (월별 노드 전체) ──────────────────────
  const monthKeys = Object.keys(root).filter(k => /^schedule_\d{4}_\d{2}$/.test(k));
  const monthPatches = {};
  monthKeys.forEach(mk => {
    const node = JSON.parse(JSON.stringify(root[mk] || {}));
    let touched = 0;
    Object.entries(node).forEach(([name, sh]) => {
      const isArr = Array.isArray(sh);
      const entries = isArr ? sh.map((v,i)=>[i,v]) : Object.entries(sh || {});
      entries.forEach(([idx, s]) => {
        if (!s || typeof s !== "object") return;
        const hitTyp = isOldOnigiriTyp(s.typ) || isOldOnigiriTyp(s.arbeitstyp);
        const hitFil = isOldOnigiriFil(s.filiale) || isOldOnigiriFil(s.f);
        if (!hitTyp && !hitFil) return;
        s.filiale = ONIGIRI_FILIALE;
        if ("f" in s) s.f = ONIGIRI_FILIALE;
        s.typ = "normal";
        if ("arbeitstyp" in s) s.arbeitstyp = "normal";
        s.time = "";
        if ("t" in s) s.t = "";
        sh[idx] = s;
        touched++;
      });
      node[name] = sh;
    });
    if (touched > 0) { monthPatches[mk] = node; report.scheduleMonth += touched; report.monthNodes.push(mk+" ("+touched+")"); }
  });

  // ── 4) 쓰기 (dryRun이면 생략) ─────────────────────────────────
  if (!dryRun) {
    if (report.records > 0 && records)   await fbSet(fbRef(db, "records"), records);
    if (report.scheduleRoot > 0 && schedule) await fbSet(fbRef(db, "schedule"), schedule);
    for (const [mk, node] of Object.entries(monthPatches)) await fbSet(fbRef(db, mk), node);
  }
  report.total = report.records + report.scheduleRoot + report.scheduleMonth;
  return report;
}

// 🔧 [임시/개발자용] 마이그레이션 실행 버튼 — 작업 완료 후 이 컴포넌트와

          + (rep.duplicates.length

            cursor:busy?"not-allowed":"pointer"}}>
          {busy?"⏳ …":"🔍 Vorschau (Dry-Run)"}
        </button>
        <button onClick={()=>{ if(window.confirm("과거 Onigiri 데이터를 ONIGIRI 지점으로 일괄 이관합니다.\n(지점 → ONIGIRI / 근무형태 → Regulär)\n\n계속할까요?")) run(false); }}
          disabled={busy}
          style={{flex:2,padding:"10px",borderRadius:9,border:"none",
            background:"linear-gradient(135deg,#f59e0b,#c2410c)",color:"#fff",fontWeight:800,fontSize:11,
            cursor:busy?"not-allowed":"pointer",lineHeight:1.35}}>
          {busy?"⏳ 이관 중…":"⚠️ 과거 Onigiri 데이터 새 지점으로 일괄 이관"}
        </button>
      </div>

      {err&&<div style={{...box,background:"rgba(220,80,60,.25)"}}><div style={line}>{"❌ "+err}</div></div>}

      {preview&&(
        <div style={box}>
          <div style={{fontSize:10,fontWeight:800,color:"#ffd28a",marginBottom:4}}>
            {"🔍 Vorschau · "+preview.total+" Einträge betroffen"}

// ═══════════════════════════════════════════════════════════════
//  PlanImage  — v5 (Dynamic Aspect-Ratio Container)
//
//  · 컨테이너 높이가 이미지 비율에 맞춰 자동 결정 → 빈 공간 없음
//  · width: 100%,  height = cw × (natH / natW)  (여백 0)
//  · sc=1 상태에서 이미지가 컨테이너를 정확히 채움 (letterbox 없음)
//  · 더블탭 = sc=1 리셋 (여백 없는 전체 이미지 상태)
//  · 핀치줌/휠 줌 (1×~5×), 확대 시에만 드래그 팬, 경계 clamp
//  · overflow:hidden → 레이아웃 절대 밀림 없음
// ═══════════════════════════════════════════════════════════════
function PlanImage({ src }) {
  const boxRef = useRef(null);

  const Z = useRef({
    sc:1, tx:0, ty:0,
    sc0:1, tx0:0, ty0:0,
    d0:0, ptx:0, pty:0,
    dragging:false, lastTap:0
  });
  const [xf, setXf] = useState({ sc:1, tx:0, ty:0 });

  // 이미지 원본 크기 (onLoad 후 확정)
  const [nat, setNat] = useState(null); // { w, h }

  // 컨테이너 너비 (마운트 + nat 확정 후 재측정)
  const [cw, setCw] = useState(375);

  React.useEffect(() => {
    const el = boxRef.current;
    if (el) setCw(el.clientWidth || 375);
  }, [nat]); // nat 바뀌면 컨테이너 크기 재측정

  // 동적 컨테이너 높이: 이미지 비율에 꼭 맞음
  const containerH = nat ? Math.round(cw * nat.h / nat.w) : 200;

  // fitSc: sc=1 일 때 이미지가 컨테이너를 정확히 채우는 배율
  // (width 기준이면 nat.w → cw, height는 자동으로 맞음)
  const fitSc = nat ? cw / nat.w : 1;

  // ── 이벤트 핸들러 ─────────────────────────────────────────
  React.useEffect(() => {
    const el = boxRef.current;
    if (!el) return;
    const z = Z.current;

    const commit = (sc, tx, ty) => {
      const totSc  = fitSc * sc;
      const visW   = (nat ? nat.w : cw)         * totSc;
      const visH   = (nat ? nat.h : containerH) * totSc;
      const maxTx  = Math.max(0, (visW - cw)         / 2);
      const maxTy  = Math.max(0, (visH - containerH) / 2);
      const cl     = (v, m) => Math.max(-m, Math.min(m, v));
      z.sc = sc;
      z.tx = cl(tx, maxTx);
      z.ty = cl(ty, maxTy);
      setXf({ sc: z.sc, tx: z.tx, ty: z.ty });
    };
    const reset = () => commit(1, 0, 0);
    const dist  = ts => Math.hypot(
      ts[0].clientX - ts[1].clientX,
      ts[0].clientY - ts[1].clientY
    );

    function onTouchStart(e) {
      if (e.touches.length === 2) {
        z.d0=dist(e.touches); z.sc0=z.sc; z.tx0=z.tx; z.ty0=z.ty;
      } else if (e.touches.length === 1) {
        z.ptx=e.touches[0].clientX; z.pty=e.touches[0].clientY;
        z.tx0=z.tx; z.ty0=z.ty;
        const now = Date.now();
        if (now - z.lastTap < 300) reset();
        z.lastTap = now;
      }
    }
    function onTouchMove(e) {
      e.preventDefault();
      if (e.touches.length === 2) {
        commit(
          Math.min(5, Math.max(1, z.sc0 * (dist(e.touches) / z.d0))),
          z.tx0, z.ty0
        );
      } else if (e.touches.length === 1 && z.sc > 1) {
        commit(
          z.sc,
          z.tx0 + (e.touches[0].clientX - z.ptx),
          z.ty0 + (e.touches[0].clientY - z.pty)
        );
      }
    }
    function onTouchEnd(e) {
      z.tx0=z.tx; z.ty0=z.ty;
      if (e.touches.length === 1) {
        z.ptx=e.touches[0].clientX;
        z.pty=e.touches[0].clientY;
      }
    }
    function onMouseDown(e) {
      if (z.sc <= 1) return;
      z.dragging=true;
      z.ptx=e.clientX; z.pty=e.clientY; z.tx0=z.tx; z.ty0=z.ty;
      e.preventDefault();
    }
    function onMouseMove(e) {
      if (!z.dragging) return;
      commit(z.sc, z.tx0+(e.clientX-z.ptx), z.ty0+(e.clientY-z.pty));
    }
    const stopDrag = () => { z.dragging=false; };
    function onWheel(e) {
      e.preventDefault();
      commit(
        Math.min(5, Math.max(1, z.sc * (e.deltaY > 0 ? 0.88 : 1.14))),
        z.tx, z.ty
      );
    }

    el.addEventListener("touchstart",  onTouchStart,  { passive: true  });
    el.addEventListener("touchmove",   onTouchMove,   { passive: false });
    el.addEventListener("touchend",    onTouchEnd,    { passive: true  });
    el.addEventListener("mousedown",   onMouseDown);
    el.addEventListener("mousemove",   onMouseMove);
    el.addEventListener("mouseup",     stopDrag);
    el.addEventListener("mouseleave",  stopDrag);
    el.addEventListener("wheel",       onWheel,       { passive: false });
    el.addEventListener("dblclick",    reset);
    return () => {
      el.removeEventListener("touchstart",  onTouchStart);
      el.removeEventListener("touchmove",   onTouchMove);
      el.removeEventListener("touchend",    onTouchEnd);
      el.removeEventListener("mousedown",   onMouseDown);
      el.removeEventListener("mousemove",   onMouseMove);
      el.removeEventListener("mouseup",     stopDrag);
      el.removeEventListener("mouseleave",  stopDrag);
      el.removeEventListener("wheel",       onWheel);
      el.removeEventListener("dblclick",    reset);
    };
  }, [fitSc, nat, cw, containerH]);

  if (!src) return null;

  const { sc, tx, ty } = xf;
  const totSc    = fitSc * sc;
  const transform = `translate(-50%,-50%) scale(${totSc}) translate(${tx/totSc}px,${ty/totSc}px)`;

  // 컨테이너: 이미지 비율에 딱 맞는 높이, 빈 공간 없음
  const box = {
    position:    "relative",
    width:       "100%",
    height:      containerH + "px",   // ← 동적! 이미지 비율에 맞춤
    overflow:    "hidden",
    background:  "#f0f0f0",
    touchAction: "none",
    userSelect:  "none",
    cursor:      sc > 1 ? "grab" : "default"
  };

  const inner = {
    position:        "absolute",
    top:             "50%",
    left:            "50%",
    transformOrigin: "center center",
    transition:      "none",
    pointerEvents:   "none",
    display:         "block",
    transform
  };

  return (
    <div ref={boxRef} style={box}>
      <img
        src={src}
        alt="Dienstplan"
        onLoad={e => {
          const nw=e.target.naturalWidth, nh=e.target.naturalHeight;
          if (nw && nh) setNat({ w:nw, h:nh });
        }}
        style={nat
          ? { ...inner, width: nat.w+"px", height: nat.h+"px" }
          : { ...inner, maxWidth:"100%", maxHeight:"100%",
              width:"auto", height:"auto" }
        }
      />
    </div>
  );
}

//      
function parseMinutes(timeStr) {
  if (!timeStr) return null;
  const [h, m] = timeStr.split(":").map(Number);
  return h * 60 + m;
}
function calcShiftMinutes(timeRange) {
  if (!timeRange) return null;
  const [start, end] = timeRange.split("-");
  const s = parseMinutes(start), e = parseMinutes(end);
  if (s == null || e == null) return null;
  return e > s ? e - s : null;
}
function getShiftStatus(shift, actualRec, date) {
  const todayStr = today();
  const shiftDate = date || todayStr;
  if (!actualRec) {
    // 날짜 기준: 과거면 nicht erschienen, 오늘 이후면 ausstehend
    if (shiftDate < todayStr) return "nicht erschienen";
    return "ausstehend";
  }
  if (!actualRec.aus || actualRec.aus === "") return "aktiv";
  if (actualRec.geprüft) return "gearbeitet";   // 관리자 OK 확인 완료 → 최종 Feierabend
  if (actualRec.prüfen) return "prüfen";         // 조기 퇴근 → 확인 대기
  const planned = calcShiftMinutes(shift.time || shift.t);
  const actual = calcShiftMinutes(`${actualRec.ein}-${actualRec.aus}`);
  if (planned == null || actual == null) return "gearbeitet";
  return actual >= planned ? "gearbeitet" : "prüfen";
}

//  MEINE SCHICHTEN SECTION 
function MeineSchichtenSection({ userName, myShifts, records, users }) {
  const todayStr = today();
  const [tauschAntraege, setTauschAntraege] = useFirebase("schichttausch", []);
  const [antraege] = useFirebase("antraege", []);
  const [notifications, setNotifications] = useFirebase("notifications", {});
  const [schedule, setSchedule] = useFirebase("schedule", {});

  //   Tausch  
  const pendingTausch = Object.entries(notifications||{})
    .filter(([,n]) => n.type==="tausch_anfrage" && n.targetUser===userName && !n.gelesen);

  function bestaetigenTausch(notifKey, antragId, ok) {
    //   
    if (window._fbDb && window._fbRef && window._fbSet) {
      window._fbSet(window._fbRef(window._fbDb, `notifications/${notifKey}/gelesen`), true)
        .catch(e => console.error(e));
    }

    const list = Array.isArray(tauschAntraege) ? tauschAntraege : [];
    const antrag = list.find(a => a.id === antragId);
    if (!antrag) return;

    if (!ok) {
      setTauschAntraege(prev => (Array.isArray(prev)?prev:[]).map(a =>
        a.id===antragId ? {...a, status:"abgelehnt_partner"} : a
      ));
      return;
    }

    //    schedule  (  )
    if (window._fbDb && window._fbRef && window._fbSet && window._fbOnValue) {
      // once unsubscribe  (onlyOnce: true)
      window._fbOnValue(window._fbRef(window._fbDb, "schedule"), snap => {
        const sched = snap.val() ? JSON.parse(JSON.stringify(snap.val())) : {};
        // initiator:       
        sched[antrag.initiator] = (sched[antrag.initiator]||[])
          .filter(s => (s.d||s.date) !== antrag.initiatorDate);
        sched[antrag.initiator] = [...sched[antrag.initiator],
          {d: antrag.partnerDate, f: antrag.partnerFiliale, t: antrag.partnerTime||null}];
        // partner:     initiator  
        sched[antrag.partner] = (sched[antrag.partner]||[])
          .filter(s => (s.d||s.date) !== antrag.partnerDate);
        sched[antrag.partner] = [...sched[antrag.partner],
          {d: antrag.initiatorDate, f: antrag.initiatorFiliale, t: antrag.initiatorTime||null}];
        window._fbSet(window._fbRef(window._fbDb, "schedule"), sched)
        // root schedule update
        window._fbSet(window._fbRef(window._fbDb, "schedule"), sched)
          .then(() => console.log("root schedule swapped"))
          .catch(e => console.error("root error:", e));
        // monthly schedule_YYYY_MM update (admin + partner real-time)
        const affectedMonths = [...new Set([
          antrag.initiatorDate ? antrag.initiatorDate.slice(0,7).replace("-","_") : null,
          antrag.partnerDate ? antrag.partnerDate.slice(0,7).replace("-","_") : null,
        ])].filter(Boolean);
        affectedMonths.forEach(mk => {
          const fk = "schedule_"+mk;
          window._fbOnValue(window._fbRef(window._fbDb, fk), mSnap => {
            const ms = mSnap.val() ? JSON.parse(JSON.stringify(mSnap.val())) : {};
            const iArr = Object.values(ms[antrag.initiator]||{});
            const iNew = iArr.filter(s=>(s.d||s.date)!==antrag.initiatorDate);
            if((antrag.partnerDate||"").slice(0,7).replace("-","_")===mk)
              iNew.push({d:antrag.partnerDate,f:antrag.partnerFiliale,t:antrag.partnerTime||null});
            ms[antrag.initiator]=Object.fromEntries(iNew.map((s,ii)=>[String(ii),s]));
            const pArr = Object.values(ms[antrag.partner]||{});
            const pNew = pArr.filter(s=>(s.d||s.date)!==antrag.partnerDate);
            if((antrag.initiatorDate||"").slice(0,7).replace("-","_")===mk)
              pNew.push({d:antrag.initiatorDate,f:antrag.initiatorFiliale,t:antrag.initiatorTime||null});
            ms[antrag.partner]=Object.fromEntries(pNew.map((s,ii)=>[String(ii),s]));
            window._fbSet(window._fbRef(window._fbDb, fk), ms).catch(()=>{});
          }, {onlyOnce:true});
        });
       }, {onlyOnce: true});
    }

    //   getauscht
    setTauschAntraege(prev => (Array.isArray(prev)?prev:[]).map(a =>
      a.id===antragId ? {...a, status:"getauscht", partnerBestaetigt:true} : a
    ));

    //  2    (teddy + yeaji)
    if (window._fbDb && window._fbRef && window._fbSet) {
      const ts = Date.now();
      ["teddy","yeaji"].forEach(mgr => {
        window._fbSet(window._fbRef(window._fbDb, `notifications/tausch_manager_${antragId}_${mgr}`), {
          type: "tausch_manager", status: "partner_ok",
          kategorie: "Schichttausch",
          initiator: antrag.initiator, partner: antrag.partner,
          initiatorDate: antrag.initiatorDate, initiatorFiliale: antrag.initiatorFiliale,
          partnerDate: antrag.partnerDate, partnerFiliale: antrag.partnerFiliale,
          antragId, zustaendig: mgr, bearbeitetVon: null, gelesen: false, ts
        }).catch(e => console.error(e));
      });
    }
  }

  //  (schichten + antrge)   
  const myAntraege = (Array.isArray(antraege)?antraege:[]).filter(a => a.user === userName);
  const allDates = [...new Set([
    ...myShifts.map(s => s.d || s.date),
    ...myAntraege.map(a => a.date),
    ...(Array.isArray(records)?records:[]).filter(r => r.user === userName).map(r => r.date),
  ])].sort();

  return (
    <div style={{padding:"14px", borderTop:`1px solid ${C.border}`}}>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:".05em"}}>
          Meine Schichten & Anträge
        </div>
      </div>

      {/*   Tausch   */}
      {pendingTausch.map(([key, n]) => (
        <div key={key} style={{...S.card,marginBottom:10,border:`1.5px solid ${C.mint}`,background:C.mintLight}}>
          <div style={{fontSize:12,fontWeight:800,color:C.mintDark,marginBottom:4}}>
            {"🔄 Tausch-Anfrage von {n.initiator}"}
          </div>
          <div style={{fontSize:10,color:C.text,marginBottom:2}}>
            Du gibst ab: <strong>{new Date(n.myDate).toLocaleDateString("de-DE",{weekday:"short",day:"numeric",month:"numeric"})} · {n.myFiliale}</strong>
          </div>
          <div style={{fontSize:10,color:C.text,marginBottom:10}}>
            Du bekommst: <strong>{new Date(n.theirDate).toLocaleDateString("de-DE",{weekday:"short",day:"numeric",month:"numeric"})} · {n.theirFiliale}</strong>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>bestaetigenTausch(key, n.antragId, false)}
              style={{flex:1,padding:"8px",borderRadius:8,border:`1px solid ${C.border}`,
                background:"#fff",color:C.muted,fontWeight:700,fontSize:11,cursor:"pointer"}}>
              Ablehnen
            </button>
            <button onClick={()=>bestaetigenTausch(key, n.antragId, true)}
              style={{flex:2,padding:"8px",borderRadius:8,border:"none",
                background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,
                color:"#fff",fontWeight:800,fontSize:11,cursor:"pointer"}}>
              {"✅ Bestätigen"}
            </button>
          </div>
        </div>
      ))}

      {allDates.map(d => {
        const shift = myShifts.find(s => (s.d||s.date) === d);
        const rec = (Array.isArray(records)?records:[]).find(r => r.user === userName && r.date === d);
        const antr = myAntraege.filter(a => a.date === d);
        const status = shift ? getShiftStatus({ time: shift.t||shift.time }, rec) : null;

        const isToday = d === todayStr;
        return (
          <div key={d} style={{marginBottom:14}}>
            {/*   */}
            <div style={{
              fontSize:isToday?13:11,
              fontWeight:isToday?900:700,
              color:isToday?C.mintDark:C.muted,
              marginBottom:6,
              display:"flex",alignItems:"center",gap:6
            }}>
              {isToday&&<span style={{width:6,height:6,borderRadius:"50%",background:C.mintDark,display:"inline-block"}}/>}
              {new Date(d).toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"2-digit"})}
              {isToday&&<span style={{fontSize:9,fontWeight:800,padding:"2px 7px",borderRadius:99,background:C.mintDark,color:"#fff",marginLeft:2}}>Heute</span>}
            </div>

            {/*   */}
            {shift && (
              <div style={{
                borderRadius:12,
                outline:isToday?`2px solid ${C.mintDark}`:"none"
              }}>
                <ShiftRow s={shift} userName={userName} records={records} setNotifications={setNotifications} users={users} myShifts={myShifts}/>
              </div>
            )}

            {/* shift    */}
            {!shift && rec && (
              <div style={{padding:"9px 12px",borderRadius:10,marginBottom:5,
                background:C.mintLight,border:`1px solid ${C.mint}`,
                display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontSize:11,fontWeight:600,color:C.text}}>{rec.filiale} · {rec.ein} – {rec.aus||"läuft"}</div>
                <span style={{fontSize:11,fontWeight:700,color:C.mintDark}}>{stdLabel(rec.ein,rec.aus)}</span>
              </div>
            )}

            {/*  Antrge  */}
            {antr.map((a,i) => (
              <div key={i} style={{marginLeft:12,paddingLeft:10,borderLeft:`2px solid ${C.border}`,marginBottom:4}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                  padding:"7px 10px",borderRadius:8,background:"#fff",border:`1px solid ${C.border}`}}>
                  <div>
                    <div style={{fontSize:10,fontWeight:700,color:C.text}}>{"📌 Nachtrag · "}{a.filiale}</div>
                    <div style={{fontSize:9,color:C.muted}}>{a.ein} – {a.aus}</div>
                  </div>
                  <span style={S.pill(a.status)}>{a.status==="offen"?"Offen":a.status==="genehmigt"?"✅":"❌"}</span>
                </div>
              </div>
            ))}
          </div>
        );
      })}

      {allDates.length === 0 && (
        <div style={{textAlign:"center",color:C.muted,fontSize:12,padding:"20px 0"}}>Noch keine Schichten geplant.</div>
      )}

      {/* Schichttausch는 이제 각 ShiftRow 내부에서 직접 실행됨 */}
    </div>
  );
}

// ── 스케줄 shift 부분 수정 헬퍼: root schedule({d,f,t}) + 월별({date,filiale,time}) 두 노드에서
//    (직원 name · 날짜 date)에 해당하는 shift를 찾아 patch(status/getauschtMit/getauschtVon 등)를 병합 저장.
//    교환(Freigeben/Getauscht) 히스토리를 스케줄 자체에 기록하여 직원·관리자 모든 화면에 실시간 반영한다.
async function patchScheduleShift(name, date, patch) {
  if (!(window._fbDb && window._fbRef && window._fbGet && window._fbSet)) return;
  try {
    // 1) root schedule
    const rsnap = await window._fbGet(window._fbRef(window._fbDb, "schedule"));
    const root = rsnap.val() ? JSON.parse(JSON.stringify(rsnap.val())) : {};
    if (root[name]) {
      let arr = Array.isArray(root[name]) ? root[name] : Object.values(root[name] || {});
      arr = arr.map(s => (s.d || s.date) === date ? { ...s, ...patch } : s);
      root[name] = arr;
      await window._fbSet(window._fbRef(window._fbDb, "schedule"), root);
    }
    // 2) 월별 schedule_YYYY_MM
    const mk = "schedule_" + date.slice(0, 7).replace("-", "_");
    const msnap = await window._fbGet(window._fbRef(window._fbDb, mk));
    const mdata = msnap.val() ? JSON.parse(JSON.stringify(msnap.val())) : null;
    if (mdata && mdata[name]) {
      let arr = Array.isArray(mdata[name]) ? mdata[name] : Object.values(mdata[name] || {});
      arr = arr.map(s => (s.date || s.d) === date ? { ...s, ...patch } : s);
      mdata[name] = Object.fromEntries(arr.map((s, i) => [String(i), s]));
      await window._fbSet(window._fbRef(window._fbDb, mk), mdata);
    }
  } catch (e) { console.error("patchScheduleShift error:", e); }
}

// (name·date) shift를 root + 월별 노드에서 삭제
async function deleteScheduleShift(name, date) {
  if (!(window._fbDb && window._fbRef && window._fbGet && window._fbSet)) return;
  try {
    const mk = "schedule_" + date.slice(0,7).replace("-","_");
    const snap = await window._fbGet(window._fbRef(window._fbDb, mk));
    const ex = snap.val() ? JSON.parse(JSON.stringify(snap.val())) : {};
    if (ex[name]) {
      let arr = Array.isArray(ex[name]) ? ex[name] : Object.values(ex[name] || {});
      arr = arr.filter(s => (s.date || s.d) !== date);
      ex[name] = Object.fromEntries(arr.map((s,i)=>[String(i), s]));
      await window._fbSet(window._fbRef(window._fbDb, mk), ex);
    }
    const rsnap = await window._fbGet(window._fbRef(window._fbDb, "schedule"));
    const root = rsnap.val() ? JSON.parse(JSON.stringify(rsnap.val())) : {};
    if (root[name]) {
      let rarr = Array.isArray(root[name]) ? root[name] : Object.values(root[name] || {});
      rarr = rarr.filter(s => (s.d || s.date) !== date);
      root[name] = rarr;
      await window._fbSet(window._fbRef(window._fbDb, "schedule"), root);
    }
  } catch (e) { console.error("deleteScheduleShift error:", e); }
}

// 근무 양도(Schicht freigeben): freieSchichten 게시 + 동료 알림 + schedule 상태 'freigegeben'

function freigebenSchicht({ userName, date, filiale, time, grund, users }) {
  const schichtId = Date.now();
  const newFrei = { id:schichtId, date, filiale, time:time||null, note:grund||"", besetzt:false, angeboten_von:userName, ts:schichtId };
  if (window._fbDb && window._fbRef && window._fbSet) {
    window._fbSet(window._fbRef(window._fbDb,"freieSchichten/"+schichtId), newFrei).catch(()=>{});
    const dateStr = new Date(date).toLocaleDateString("de-DE",{weekday:"short",day:"numeric",month:"numeric"});
    const msgTxt = "📢 [Schichtbörse] "+userName+" gibt Schicht frei! "+dateStr+" · "+filiale+(time?" · "+time:"")+" — Jetzt übernehmen!";
    (Array.isArray(users)?users:[]).filter(u=>!u.isAdmin&&u.vorname!==userName).forEach(u=>{
      window._fbSet(window._fbRef(window._fbDb,"notifications/boerse_new_"+schichtId+"_"+u.key),{
        type:"schichtboerse_new",kategorie:"Schichtbörse",schichtId,
        zielUser:u.vorname,zielKey:u.key,angeboten_von:userName,
        date,filiale,time:time||null,text:msgTxt,gelesen:false,ts:schichtId
      }).catch(()=>{});
    });
  }
  patchScheduleShift(userName, date, {status:"freigegeben", freigabeGrund:grund||""});
}

// Nachtragen(사후 등록): 자동승인 record 저장 + 관리자 Anträge(Nachtragen) 알림 로그
function nachtragenSchicht({ userName, date, filiale, ein, aus, setRecords }) {
  const rec = { id:Date.now(), user:userName, date, filiale:filiale||"", ein, aus, note:"", typ:"nachtrag" };
  if (typeof setRecords === "function") {
    setRecords(prev => [...(Array.isArray(prev)?prev:[]), rec]);  // 로컬 + Firebase 전체노드 동기화
  } else if (window._fbDb && window._fbRef && window._fbPush) {
    window._fbPush(window._fbRef(window._fbDb,"records"), rec).catch(()=>{});
  }
  // 관리자 Anträge(Nachtragen) 알림 로그
  if (window._fbDb && window._fbRef && window._fbSet) {
    const ts = Date.now();
    ["teddy","yeaji","tingting"].forEach(mgr=>{
      window._fbSet(window._fbRef(window._fbDb,"notifications/nachtrag_log_"+ts+"_"+mgr),{
        type:"nachtrag_log", kategorie:"Nachtragen", zustaendig:mgr,
        user:userName, date, filiale:filiale||"", ein, aus,
        text:"📝 "+userName+" — "+date+" · "+ein+"-"+aus, gelesen:false, ts
      }).catch(()=>{});
    });
  }
  return rec;
}

// ── Nachtragen 최종 반영: 중복 근무 방지(덮어쓰기) ──────────────────
//  특정 근무(user+date)에 대해 Nachtragen이 승인되면, 같은 날 기록되어
//  있던 실시간 출퇴근(Einstempeln/Ausstempeln, typ !== "nachtrag") 로그와
//  이전 Nachtragen 기록을 모두 무효화(삭제)하고, 승인된 Nachtragen 시간만
//  최종 근무로 남긴다. → 통계/누적 시간에 하루 2번 잡히는 버그 제거.
function overrideWithNachtrag({ a, setRecords }){
  // 🔒 같은 [직원·날짜·지점] 세션만 대체한다.
  //    (같은 날 다른 지점 근무 기록을 지워 정산이 누락되는 것을 방지)
  const sameSession = (r)=> r && r.user===a.user && r.date===a.date &&
    (!a.filiale || !r.filiale || sameFiliale(r.filiale, a.filiale));
  const newRec={ id:Date.now(), user:a.user, date:a.date, filiale:a.filiale,
    ein:a.ein, aus:a.aus, note:a.grund||"Nachtrag genehmigt", typ:"nachtrag",
    isAutoCheckedOut:false, prüfen:false, frühGrund:"" };
  // ⚠️ records는 setRecords가 노드 전체를 다시 기록하므로, 개별 _fbRemove를 병행하면
  //    비동기 삭제가 '새로 승인된 기록'까지 지워버리는 경합이 발생한다(근무표 미반영 원인).
  //    → 상태 갱신 한 번으로 원자적으로 처리한다.
  if(typeof setRecords==="function"){
    setRecords(prev=>[
      ...((Array.isArray(prev)?prev:[]).filter(r=>!sameSession(r))),
      newRec
    ]);
  } else if(window._fbDb && window._fbRef && window._fbGet && window._fbRemove && window._fbPush){
    // setRecords가 없을 때만 직접 정리 후 추가 (새 기록은 삭제 대상에서 제외)
    window._fbGet(window._fbRef(window._fbDb,"records")).then(snap=>{
      const data=snap.val()||{};
      Object.entries(data).forEach(([k,v])=>{
        if(sameSession(v) && String(v.id)!==String(newRec.id))
          window._fbRemove(window._fbRef(window._fbDb,"records/"+k)).catch(()=>{});
      });
      window._fbPush(window._fbRef(window._fbDb,"records"), newRec).catch(()=>{});
    }).catch(()=>{});
  }
  return newRec;
}

// (name·date)에 shift 추가 (root + 월별). 같은 날 기존 shift는 대체.
//  · typ: Arbeitstyp("normal"=Regulär | "einspringen"). Onigiri는 지점(ONIGIRI)으로 운영.
//  · ONIGIRI 지점은 계획시간 없이(time:"") 이름만으로 정상 저장된다.
async function addScheduleShift(name, date, filiale, time, typ) {
  if (!(window._fbDb && window._fbRef && window._fbGet && window._fbSet) || !name || !date) return;
  const t = typNorm(typ);
  // 🍙 ONIGIRI 지점은 계획 시간 없이 등록 (시간 필드 비활성 → "")
  const safeTime = isOnigiriFiliale(filiale) ? "" : (time||"");
  try {
    const mk = "schedule_" + date.slice(0,7).replace("-","_");
    const snap = await window._fbGet(window._fbRef(window._fbDb, mk));
    const ex = snap.val() ? JSON.parse(JSON.stringify(snap.val())) : {};
    let arr = Array.isArray(ex[name]) ? ex[name] : Object.values(ex[name] || {});
    arr = arr.filter(s => (s.date||s.d) !== date);
    arr.push({ date, filiale, time:safeTime, typ:t });
    ex[name] = Object.fromEntries(arr.map((s,i)=>[String(i), s]));
    await window._fbSet(window._fbRef(window._fbDb, mk), ex);
    const rsnap = await window._fbGet(window._fbRef(window._fbDb, "schedule"));
    const root = rsnap.val() ? JSON.parse(JSON.stringify(rsnap.val())) : {};
    let rarr = Array.isArray(root[name]) ? root[name] : Object.values(root[name] || {});
    rarr = rarr.filter(s => (s.d||s.date) !== date);
    rarr.push({ d:date, f:filiale, t:safeTime, typ:t });
    root[name] = rarr;
    await window._fbSet(window._fbRef(window._fbDb, "schedule"), root);
  } catch(e) { console.error("addScheduleShift error:", e); }
}

// 임시 이름 → 정식 계정으로 데이터 귀속 (schedule + records의 user 이름을 이전)
async function reassignTempName(tempName, realName) {
  if (!(window._fbDb && window._fbRef && window._fbGet && window._fbSet) || !tempName || !realName || tempName===realName) return;
  try {
    // root schedule
    const rsnap = await window._fbGet(window._fbRef(window._fbDb, "schedule"));
    const root = rsnap.val() ? JSON.parse(JSON.stringify(rsnap.val())) : {};
    if (root[tempName]) {
      const tArr = Array.isArray(root[tempName]) ? root[tempName] : Object.values(root[tempName]);
      const rArr = Array.isArray(root[realName]) ? root[realName] : Object.values(root[realName] || {});
      root[realName] = [...rArr, ...tArr];
      delete root[tempName];
      await window._fbSet(window._fbRef(window._fbDb, "schedule"), root);
    }
    // 월별 노드 범위
    const yr = new Date().getFullYear();
    for (let y=yr-1; y<=yr+2; y++) for (let m=1; m<=12; m++) {
      const mk = "schedule_" + y + "_" + String(m).padStart(2,"0");
      const snap = await window._fbGet(window._fbRef(window._fbDb, mk));
      const data = snap.val();
      if (!data || !data[tempName]) continue;
      const md = JSON.parse(JSON.stringify(data));
      const tArr = Array.isArray(md[tempName]) ? md[tempName] : Object.values(md[tempName]);
      const rArr = Array.isArray(md[realName]) ? md[realName] : Object.values(md[realName] || {});
      const merged = [...rArr, ...tArr];
      md[realName] = Object.fromEntries(merged.map((s,i)=>[String(i), s]));
      delete md[tempName];
      await window._fbSet(window._fbRef(window._fbDb, mk), md);
    }
    // records의 user 이름 이전
    const recSnap = await window._fbGet(window._fbRef(window._fbDb, "records"));
    const recs = recSnap.val();
    if (recs) {
      for (const [k,v] of Object.entries(recs)) {
        if (v && v.user === tempName) {
          await window._fbSet(window._fbRef(window._fbDb, "records/"+k+"/user"), realName).catch(()=>{});
        }
      }
    }
  } catch(e) { console.error("reassignTempName error:", e); }
}

                <div style={{fontSize:10,color:C.muted,marginBottom:12}}>
                  Wird in der Schichtbörse veröffentlicht. Alle Kollegen werden benachrichtigt.
                </div>
                <div style={{marginBottom:10}}>
                  <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:4}}>GRUND (optional)</div>
                  <textarea value={absGrund} onChange={e=>setAbsGrund(e.target.value)}
                    placeholder="z. B. Krankheit, privater Termin..."
                    style={{width:"100%",minHeight:60,borderRadius:9,border:"1.5px solid "+C.border,
                      padding:"8px 10px",fontSize:12,outline:"none",boxSizing:"border-box",resize:"none"}}/>
                </div>
                <button onClick={()=>{
                  const schichtId=Date.now();
                  const newFrei={id:schichtId,date:d,filiale:f,time:t||null,
                    note:absGrund||"",besetzt:false,angeboten_von:userName,ts:schichtId};
                  if(window._fbDb&&window._fbRef&&window._fbSet){
                    window._fbSet(window._fbRef(window._fbDb,"freieSchichten/"+schichtId),newFrei).catch(()=>{});
                    const dateStr=new Date(d).toLocaleDateString("de-DE",{weekday:"short",day:"numeric",month:"numeric"});
                    const msgTxt="📢 [Schichtbörse] "+userName+" gibt Schicht frei! "+dateStr+" · "+f+(t?" · "+t:"")+" — Jetzt übernehmen!";
                    (Array.isArray(users)?users:[]).filter(u=>!u.isAdmin&&u.vorname!==userName).forEach(u=>{
                      window._fbSet(window._fbRef(window._fbDb,"notifications/boerse_new_"+schichtId+"_"+u.key),{
                        type:"schichtboerse_new",kategorie:"Schichtbörse",schichtId,
                        zielUser:u.vorname,zielKey:u.key,angeboten_von:userName,
                        date:d,filiale:f,time:t||null,text:msgTxt,gelesen:false,ts:schichtId
                      }).catch(()=>{});
                    });
                  }
                  // 🔄 스케줄 shift를 삭제하지 않고 그대로 두되 'freigegeben' 상태로 표시 (반투명 + 교환 대기중)
                  patchScheduleShift(userName, d, {status:"freigegeben", freigabeGrund:absGrund||""});
                  setShowModal(false);setAbsGrund("");
                }} style={{width:"100%",padding:"13px",borderRadius:11,border:"none",
                  background:"linear-gradient(135deg,"+C.navy+",#444)",
                  color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}}>
                  {"🔔 In Schichtbörse einstellen"}
                </button>
              </div>
            )}
            {/* Nachtragen 탭 */}
            {modalTab==="nachtrag"&&(
              <div>
                <div style={{display:"flex",gap:10,marginBottom:12}}>
                  {[["Einstempeln",nEin,setNEin],["Ausstempeln",nAus,setNAus]].map(([lbl,val,set])=>(
                    <div key={lbl} style={{flex:1}}>
                      <div style={{fontSize:10,color:C.muted,marginBottom:4,fontWeight:700}}>{lbl}</div>
                      <TimeInput value={val} onChange={set} style={{...S.input,width:"100%",textAlign:"center",fontSize:14}}/>
                    </div>
                  ))}
                </div>
                <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:6}}>{"Grund "}<span style={{color:C.red}}>*</span></div>
                <textarea value={nGrund} onChange={e=>setNGrund(e.target.value)}
                  placeholder="z. B. Vergessen einzustempeln…"
                  style={{...S.input,width:"100%",minHeight:60,resize:"none",fontFamily:"inherit",marginBottom:8}}/>
                {nMsg&&<div style={{fontSize:11,color:nMsg.includes("gesendet")?C.mintDark:C.red,marginBottom:8,fontWeight:600}}>{nMsg}</div>}
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setShowModal(false)} style={{flex:1,padding:"11px",borderRadius:10,border:`1px solid ${C.border}`,background:"#fff",color:C.muted,fontWeight:700,fontSize:12,cursor:"pointer"}}>Abbrechen</button>
                  <button onClick={()=>{
                    if(!nGrund.trim()){setNMsg("Bitte einen Grund angeben.");return;}
                    const id=Date.now();
                    const antrag={id,user:userName,date:d,filiale:f,ein:nEin,aus:nAus,grund:nGrund,status:"offen",zustaendig:"all"};
                    setAntraege(prev=>[...(Array.isArray(prev)?prev:[]),antrag]);
                    // Dienstplan에서 직접 처리 - Alarm 알림 없음
                    setNMsg("Nachtrag gesendet!");
                    setTimeout(()=>{setShowModal(false);setNMsg("");setNGrund("");},1500);
                  }} style={{flex:2,padding:"11px",borderRadius:10,border:"none",background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,color:"#fff",fontWeight:800,fontSize:12,cursor:"pointer"}}>
                    Nachtrag senden
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}
      {showTausch&&(
        <SchichttauschModal
          userName={userName}
          myShifts={myShifts||[]}
          users={users||[]}
          preselectedShift={s}
          onClose={()=>setShowTausch(false)}/>
      )}
    </>
  );
}

//  EINSPRINGEN VIEW 
// ── Schichtbörse: 대타 매칭 게시판 ─────────────────────────────
// · Einspringen(당일 갑작스러운 출근)과 완전히 분리된 개념
// · 여기서 Übernehmen → 내 Dienstplan에 "Normal" 근무로 추가됨
function SchichtboerseView({ userName, users, isAdmin }) {
  const [freieSchichten, setFreieSchichten] = useFirebase("freieSchichten", []);
  const [myTab, setMyTab] = useState("offen");
  const [msg, setMsg] = useState(null);
  const [fsDate, setFsDate] = useState(today());
  const [fsFiliale, setFsFiliale] = useState(FILIALEN[0]);
  const [fsTimeFrom, setFsTimeFrom] = useState("09:00");
  const [fsTimeTo, setFsTimeTo] = useState("17:00");
  const [fsNote, setFsNote] = useState("");

  // ── 전체 직원 목록 (알림 발송용) ──────────────────────────────
  const allStaff = (Array.isArray(users)?users:[]).filter(u=>!u.isAdmin&&u.vorname!==userName);
  const allManagers = MANAGERS;

  // ── [2] 근무 내놓기 → 전체 직원 실시간 알림 ──────────────────
  function anbieten() {
    if (!fsDate || !fsFiliale) return;
    const id = Date.now();
    const newSchicht = {
      id, date:fsDate, filiale:fsFiliale,
      time: fsTimeFrom&&fsTimeTo ? fsTimeFrom+"-"+fsTimeTo : null,
      note:fsNote, besetzt:false, angeboten_von:userName, ts:id
    };

    // Firebase에 freieSchichten 저장
    setFreieSchichten(prev=>[...(Array.isArray(prev)?prev:[]), newSchicht]);
    if (window._fbDb && window._fbRef && window._fbSet) {
      window._fbSet(window._fbRef(window._fbDb, "freieSchichten/"+id), newSchicht).catch(()=>{});

      // 📢 가입된 전체 직원에게 실시간 알림 발송 (당사자 제외)
      const dateStr = new Date(fsDate).toLocaleDateString("de-DE",{weekday:"short",day:"numeric",month:"numeric"});
      const timeStr = newSchicht.time||"";
      const msgTxt  = "📢 [Schichtbörse] Neue Schicht von "+userName+"! "+dateStr+" · "+fsFiliale+(timeStr?" · "+timeStr:"")+" — Jetzt übernehmen!";

      allStaff.forEach(staffUser=>{
        // 각 직원 개인 알림 노드에 저장
        window._fbSet(window._fbRef(window._fbDb,
          "notifications/boerse_new_"+id+"_"+staffUser.key), {
          type: "schichtboerse_new",
          kategorie: "Schichtbörse",
          schichtId: id,
          zielUser: staffUser.vorname,
          zielKey:  staffUser.key,
          angeboten_von: userName,
          date: fsDate, filiale: fsFiliale, time: newSchicht.time,
          text: msgTxt,
          gelesen: false,
          ts: id
        }).catch(()=>{});
      });
    }

    setMsg("📢 Schicht eingestellt & alle Mitarbeiter benachrichtigt!");
    setFsNote("");
    setTimeout(()=>setMsg(null), 4000);
  }

  // ── [3] 근무 이어받기 → 자동 승인 + 관리자 확인 알림 ─────────
  async function uebernehmen(schicht) {
    // ⛔ 중복 근무 방지: 같은 날 본인 기존 근무와 시간이 1분이라도 겹치면 차단
    try{
      if(window._fbDb&&window._fbRef&&window._fbGet&&schicht.time&&schicht.time.includes("-")){
        const snap=await window._fbGet(window._fbRef(window._fbDb,"schedule"));
        const sched=snap.val()||{};
        const mine=!sched[userName]?[]:Array.isArray(sched[userName])?sched[userName]:Object.values(sched[userName]);
        const [ns,ne]=schicht.time.split("-").map(t=>parseMinutes(t));
        const conflict=mine.some(s=>{
          if((s.d||s.date)!==schicht.date) return false;
          if(s.status==="getauscht"||s.status==="freigegeben") return false; // 이미 넘긴 근무는 제외
          const tm=s.t||s.time; if(!tm||!tm.includes("-")) return false;
          const [es,ee]=tm.split("-").map(t=>parseMinutes(t));
          if(ns==null||ne==null||es==null||ee==null) return false;
          return ns<ee && es<ne; // 구간 겹침
        });
        if(conflict){
          alert("⛔ Überschneidung!\n\nDiese Schicht überschneidet sich mit einer deiner bestehenden Schichten am selben Tag. Übernahme nicht möglich.");
          return;
        }
      }
    }catch(e){ console.error("overlap check error:",e); }
    // 1) schedule 자동 업데이트 (관리자 승인 불필요)
    if (window._fbDb && window._fbRef && window._fbGet && window._fbSet) {
      try {
        const monthKey = "schedule_"+schicht.date.slice(0,7).replace("-","_");
        // root schedule
        const rootSnap = await window._fbGet(window._fbRef(window._fbDb,"schedule"));
        const rootSched = rootSnap.val()?JSON.parse(JSON.stringify(rootSnap.val())):{};
        if (!rootSched[userName]) rootSched[userName]=[];
        if (!Array.isArray(rootSched[userName])) rootSched[userName]=Object.values(rootSched[userName]);
        rootSched[userName]=rootSched[userName].filter(s=>(s.d||s.date)!==schicht.date);
        rootSched[userName].push({d:schicht.date,f:schicht.filiale,t:schicht.time||null,getauschtVon:schicht.angeboten_von||null});
        await window._fbSet(window._fbRef(window._fbDb,"schedule"),rootSched);
        // 월별 schedule_YYYY_MM
        const mSnap=await window._fbGet(window._fbRef(window._fbDb,monthKey));
        const mSched=mSnap.val()?JSON.parse(JSON.stringify(mSnap.val())):{};
        const mArr=Object.values(mSched[userName]||{}).filter(s=>(s.date||s.d)!==schicht.date);
        mArr.push({date:schicht.date,filiale:schicht.filiale,time:schicht.time||null,getauschtVon:schicht.angeboten_von||null});
        mSched[userName]=Object.fromEntries(mArr.map((s,i)=>[String(i),s]));
        await window._fbSet(window._fbRef(window._fbDb,monthKey),mSched);
      } catch(e){console.error("schedule update error:",e);}
    }

    // 2) freieSchichten besetzt 처리
    setFreieSchichten(prev=>(Array.isArray(prev)?prev:[]).map(s=>
      s.id===schicht.id?{...s,besetzt:true,uebernommen_von:userName}:s
    ));
    if(window._fbDb&&window._fbRef&&window._fbSet){
      window._fbSet(window._fbRef(window._fbDb,"freieSchichten/"+schicht.id),
        {...schicht,besetzt:true,uebernommen_von:userName}).catch(()=>{});
    }

    // 2b) 🔄 원 소유자의 스케줄 shift를 삭제하지 않고 'getauscht'로 갱신 (반투명 + 원 주인 추적)
    if(schicht.angeboten_von && schicht.angeboten_von!==userName){
      await patchScheduleShift(schicht.angeboten_von, schicht.date,
        {status:"getauscht", getauschtMit:userName});
    }

    // 3) 관리자에게 자동 승인 확인 알림 (단방향)
    const ts=Date.now();
    const dateStr=new Date(schicht.date).toLocaleDateString("de-DE",{weekday:"short",day:"numeric",month:"numeric"});
    const confirmMsg=`✅ [Schichtbörse] ${dateStr} · ${schicht.filiale} — Schicht von "${schicht.angeboten_von||"?"}" wurde von "${userName}" übernommen und automatisch eingetragen.`;

    if(window._fbDb&&window._fbRef&&window._fbSet){
      allManagers.forEach(mgr=>{
        window._fbSet(window._fbRef(window._fbDb,
          "notifications/boerse_match_"+schicht.id+"_"+mgr),{
          type:"schichtboerse_match",
          kategorie:"Schichtbörse",
          zustaendig:mgr,
          angeboten_von:schicht.angeboten_von||"",
          uebernommen_von:userName,
          date:schicht.date, filiale:schicht.filiale, time:schicht.time,
          text:confirmMsg,
          gelesen:false, auto_approved:true, ts
        }).catch(()=>{});
      });

      // 근무 내놓은 직원에게도 매칭 완료 알림
      if(schicht.angeboten_von&&schicht.angeboten_von!==userName){
        const origUser=(Array.isArray(users)?users:[]).find(u=>u.vorname===schicht.angeboten_von);
        if(origUser){
          window._fbSet(window._fbRef(window._fbDb,
            "notifications/boerse_taken_"+schicht.id+"_"+origUser.key),{
            type:"schichtboerse_taken",
            kategorie:"Schichtbörse",
            zielUser:schicht.angeboten_von,
            zielKey:origUser.key,
            uebernommen_von:userName,
            date:schicht.date, filiale:schicht.filiale, time:schicht.time,
            text:"✅ Deine Schicht am "+dateStr+" ("+schicht.filiale+") wurde von "+userName+" übernommen!",
            gelesen:false, ts
          }).catch(()=>{});
        }
      }
    }

    setMsg("✅ Schicht übernommen & in deinen Dienstplan eingetragen!");
    setTimeout(()=>setMsg(null),5000);
  }

  const offene = (Array.isArray(freieSchichten)?freieSchichten:[]).filter(s=>!s.besetzt);
  const meineAngebote = (Array.isArray(freieSchichten)?freieSchichten:[]).filter(s=>s.angeboten_von===userName);

  return (
    <div style={{padding:"14px"}}>
      {/* 헤더 */}
      <div style={{...S.card,marginBottom:12,background:"linear-gradient(135deg,#EEF4FF,#f0f7fa)",border:"1.5px solid "+C.navy}}>
        <div style={{fontSize:14,fontWeight:800,color:C.navy,marginBottom:4}}>{"🔔 Schichtbörse"}</div>
        <div style={{fontSize:11,color:C.muted}}>Offene Schichten übernehmen oder eigene anbieten.</div>
        <div style={{fontSize:10,color:C.muted,marginTop:4,padding:"4px 8px",borderRadius:6,background:"rgba(0,0,0,.04)"}}>
          ℹ️ Übernommene Schichten erscheinen als <b>Regulär</b>-Schicht in deinem Dienstplan.
        </div>
      </div>

      {/* 탭 전환 */}
      <div style={{display:"flex",gap:0,marginBottom:14,borderRadius:10,overflow:"hidden",border:"1px solid "+C.border}}>
        {(isAdmin?[["offen","🔓 Offene Schichten ("+offene.length+")"],["anbieten","📢 Anbieten (Admin)"]]:
        [["offen","🔓 Offene Schichten ("+offene.length+")"]]).map(([id,lbl])=>(
          <button key={id} onClick={()=>setMyTab(id)}
            style={{flex:1,padding:"9px 4px",border:"none",cursor:"pointer",fontSize:11,fontWeight:700,
              background:myTab===id?C.navy:"#fff",color:myTab===id?"#fff":C.muted}}>
            {lbl}
          </button>
        ))}
      </div>

      {msg&&(
        <div style={{padding:"10px 14px",borderRadius:10,background:C.mintLight,border:"1px solid "+C.mint,
          fontSize:12,fontWeight:600,color:C.mintDark,marginBottom:12}}>
          {msg}
        </div>
      )}

      {/* 오픈 근무 목록 */}
      {myTab==="offen"&&(
        offene.length===0 ? (
          <div style={{...S.card,textAlign:"center",padding:"32px 16px"}}>
            <div style={{fontSize:28,marginBottom:8}}>🎉</div>
            <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:4}}>Keine offenen Schichten</div>
            <div style={{fontSize:11,color:C.muted}}>Aktuell sind keine Schichten verfügbar.</div>
          </div>
        ) : (
          offene.map(s=>(
            <div key={s.id} style={{...S.card,marginBottom:10,border:"1.5px solid "+C.border}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                <div>
                  <div style={{fontSize:13,fontWeight:800,color:C.text}}>
                    {new Date(s.date).toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"})}
                  </div>
                  <div style={{fontSize:11,color:C.muted,marginTop:2}}>{s.filiale}</div>
                  {s.time&&<div style={{fontSize:11,fontWeight:600,color:C.mintDark,marginTop:2}}>{"🕐 "}{s.time}</div>}
                  {s.angeboten_von&&<div style={{fontSize:10,color:C.muted,marginTop:3}}>{"von "}{s.angeboten_von}</div>}
                  {s.note&&<div style={{fontSize:10,color:C.muted,marginTop:4}}>{"📌 "}{s.note}</div>}
                </div>
                <div style={{width:40,height:40,borderRadius:10,background:"#EEF4FF",
                  display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>
                  {s.filiale==="TEEnJOY"?"🧋":s.filiale==="TEEAMO Aegidiimarkt"?"🏬":"🏪"}
                </div>
              </div>
              {s.angeboten_von===userName ? (
                <button onClick={()=>uebernehmen(s)}
                  style={{width:"100%",padding:"10px",borderRadius:10,border:`1.5px solid ${C.yellow}`,
                    background:C.yellowLight,cursor:"pointer",fontWeight:700,fontSize:12,color:"#7c5c00"}}>
                  {"↩️ Zurücknehmen (eigene Schicht)"}
                </button>
              ) : (
                <button onClick={()=>uebernehmen(s)}
                  style={{width:"100%",padding:"11px",borderRadius:10,border:"none",
                    background:"linear-gradient(135deg,"+C.navy+",#444)",
                    color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}}>
                  {"✅ Übernehmen → Dienstplan"}
                </button>
              )}
            </div>
          ))
        )
      )}

      {/* 내 근무 내놓기 */}
      {myTab==="anbieten"&&(
        <div>
          <div style={{...S.card,marginBottom:10}}>
            <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:10}}>Schicht zur Börse einstellen</div>
            {/* DATUM — 한 줄 전체 폭 (iOS 날짜 입력 오버플로우 방지) */}
            <div style={{marginBottom:10,width:"100%",minWidth:0}}>
              <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:4}}>DATUM</div>
              <input type="date" value={fsDate} onChange={e=>setFsDate(e.target.value)}
                style={{...S.input,display:"block",width:"100%",maxWidth:"100%",minWidth:0,fontSize:13,
                  padding:"10px 12px",boxSizing:"border-box",WebkitAppearance:"none",appearance:"none"}}/>
            </div>
            {/* FILIALE — 한 줄 전체 폭 */}
            <div style={{marginBottom:10}}>
              <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:4}}>FILIALE</div>
              <select value={fsFiliale} onChange={e=>setFsFiliale(e.target.value)}
                style={{...S.input,width:"100%",fontSize:13,padding:"10px 12px",boxSizing:"border-box"}}>
                {FILIALEN.map(f=><option key={f} value={f}>{f.replace("TEEAMO ","")}</option>)}
              </select>
            </div>
            {/* VON / BIS — 나란히, 넉넉한 간격과 padding으로 겹침 방지 */}
            <div style={{display:"flex",gap:14,marginBottom:10}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:4}}>VON</div>
                <TimeInput value={fsTimeFrom} onChange={setFsTimeFrom}
                  style={{...S.input,width:"100%",fontSize:14,padding:"10px 12px",boxSizing:"border-box"}}/>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:4}}>BIS</div>
                <TimeInput value={fsTimeTo} onChange={setFsTimeTo}
                  style={{...S.input,width:"100%",fontSize:14,padding:"10px 12px",boxSizing:"border-box"}}/>
              </div>
            </div>
            <div style={{marginBottom:10}}>
              <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:3}}>GRUND (optional)</div>
              <input value={fsNote} onChange={e=>setFsNote(e.target.value)}
                placeholder="z. B. Urlaub, privater Termin…"
                style={{...S.input,width:"100%",fontSize:12,padding:"6px 8px",boxSizing:"border-box"}}/>
            </div>
            <button onClick={anbieten}
              style={{width:"100%",padding:"11px",borderRadius:10,border:"none",
                background:"linear-gradient(135deg,"+C.mint+","+C.mintDark+")",
                color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}}>
              {"📢 Schicht einstellen"}
            </button>
          </div>

          {/* 내가 내놓은 근무 목록 */}
          {meineAngebote.length>0&&(
            <div>
              <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:8,textTransform:"uppercase"}}>
                Meine angebotenen Schichten
              </div>
              {meineAngebote.map(s=>(
                <div key={s.id} style={{...S.card,marginBottom:8,border:"1px solid "+C.border,
                  opacity:s.besetzt?0.6:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontSize:12,fontWeight:700}}>{new Date(s.date).toLocaleDateString("de-DE")}</div>
                      <div style={{fontSize:10,color:C.muted}}>{s.filiale}{s.time?" · "+s.time:""}</div>
                    </div>
                    {s.besetzt
                      ? <span style={{fontSize:10,padding:"3px 8px",borderRadius:99,background:C.mintLight,color:C.mintDark,fontWeight:700}}>
                          {"✅ Übernommen"+(s.uebernommen_von?" von "+s.uebernommen_von:"")}
                        </span>
                      : <span style={{fontSize:10,padding:"3px 8px",borderRadius:99,background:"#fef9c3",color:"#92400e",fontWeight:700}}>
                          Offen
                        </span>
                    }
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

//  CLOCK MODAL 
function ClockModal({modal,now,selFiliale,clockFiliale,clockInTime,CLOCK_KEY,onClose,onEin,onAus}){
  const isEin = modal==="ein";
  const nowStr = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const [manualMode, setManualMode] = useState(false);
  const [manualTime, setManualTime] = useState(nowStr);

  const ausInvalid = !isEin && manualMode && clockInTime && (()=>{
    const [ah,am] = manualTime.split(":").map(Number);
    return (ah*60+am) - (clockInTime.getHours()*60+clockInTime.getMinutes()) <= 0;
  })();

  function doEin(){
    const t = manualMode ? manualTime : nowStr;
    const [h,m] = t.split(":").map(Number);
    const d = new Date(); d.setHours(h,m,0,0);
    onEin(d);
  }
  function doAus(){
    if(ausInvalid) return;
    const t = manualMode ? manualTime : nowStr;
    const inStr = `${pad(clockInTime.getHours())}:${pad(clockInTime.getMinutes())}`;
    onAus(inStr, t);
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(20,20,20,.55)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200}}>
      <div style={{background:C.card,borderRadius:"22px 22px 0 0",width:"100%",maxWidth:500,padding:"24px 22px 32px",paddingBottom:"max(32px,env(safe-area-inset-bottom))"}}>
        <div style={{width:36,height:4,background:C.border,borderRadius:99,margin:"0 auto 20px"}}/>
        <div style={{fontSize:16,fontWeight:800,color:C.text,marginBottom:4}}>
          {isEin?"Einstempeln bestätigen":"Ausstempeln bestätigen"}
        </div>
        <div style={{fontSize:12,color:C.muted,marginBottom:14}}>
          Filiale: <strong style={{color:C.text}}>{isEin?selFiliale:clockFiliale}</strong>
        </div>

        <div style={{marginBottom:16}}>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <button onClick={()=>setManualMode(false)}
              style={{flex:1,padding:"9px",borderRadius:9,fontSize:12,fontWeight:700,cursor:"pointer",
                border:`2px solid ${!manualMode?C.mint:C.border}`,
                background:!manualMode?C.mintLight:"#fff",
                color:!manualMode?C.mintDark:C.muted}}>
              {"🕐 Jetzt"}
            </button>
            <button onClick={()=>setManualMode(true)}
              style={{flex:1,padding:"9px",borderRadius:9,fontSize:12,fontWeight:700,cursor:"pointer",
                border:`2px solid ${manualMode?C.yellow:C.border}`,
                background:manualMode?C.yellowLight:"#fff",
                color:manualMode?C.yellow:C.muted}}>
              {"✏️ Zeit eingeben"}
            </button>
          </div>
          {manualMode&&(
            <div style={{background:C.yellowLight,borderRadius:10,padding:"12px 14px",border:`1.5px solid ${ausInvalid?C.red:C.yellow}`}}>
              <div style={{fontSize:10,fontWeight:700,color:C.yellow,marginBottom:6}}>
                {isEin?"Tatsächliche Einstempelzeit":"Tatsächliche Ausstempelzeit"}
              </div>
              <TimeInput value={manualTime} onChange={setManualTime}
                style={{...S.input,width:"80%",display:"block",margin:"0 auto",fontSize:20,fontWeight:700,textAlign:"center",borderColor:ausInvalid?C.red:C.yellow}}/>
              {!isEin&&clockInTime&&(()=>{
                const [ah,am]=manualTime.split(":").map(Number);
                const diff=(ah*60+am)-(clockInTime.getHours()*60+clockInTime.getMinutes());
                if(diff<=0) return(
                  <div style={{fontSize:11,color:C.red,fontWeight:700,marginTop:7,textAlign:"center"}}>
                    <>{"⚠ Die Zeit liegt vor der Einstempelzeit ("}{pad(clockInTime.getHours())}:{pad(clockInTime.getMinutes())}{"  Uhr)"}</>
                  </div>
                );
                return(
                  <div style={{fontSize:11,color:"#3a7a55",fontWeight:700,marginTop:7,textAlign:"center"}}>
                    <>{"⏱ "}{Math.floor(diff/60)}{"h "}{diff%60}{"min Arbeitszeit"}</>
                  </div>
                );
              })()}
              {isEin&&(()=>{
                const [ah,am]=manualTime.split(":").map(Number);
                const diff=(now.getHours()*60+now.getMinutes())-(ah*60+am);
                if(diff<=0) return null;
                return(
                  <div style={{fontSize:11,color:C.yellow,fontWeight:700,marginTop:7,textAlign:"center"}}>
                    <>{"⏱ "}{Math.floor(diff/60)}{"h "}{diff%60}{"min bereits vergangen"}</>
                  </div>
                );
              })()}
            </div>
          )}
        </div>

        <div style={{display:"flex",gap:9}}>
          <button onClick={onClose} style={{flex:1,padding:"12px",borderRadius:11,border:`1.5px solid ${C.border}`,background:C.card,color:C.muted,fontWeight:700,fontSize:13,cursor:"pointer"}}>Abbrechen</button>
          <button onClick={isEin?doEin:doAus} disabled={!!ausInvalid}
            style={{flex:2,padding:"12px",borderRadius:11,border:"none",
              background:ausInvalid?"#ccc":isEin?`linear-gradient(135deg,${C.mint},${C.mintDark})`:`linear-gradient(135deg,${C.red},#A8432E)`,
              color:"#fff",fontWeight:800,fontSize:14,cursor:ausInvalid?"not-allowed":"pointer",opacity:ausInvalid?0.6:1}}>
            {isEin?"Einstempeln":"Ausstempeln"}
          </button>
        </div>
      </div>
    </div>
  );
}

  const [newPin1, setNewPin1] = useState("");
  const [newPin2, setNewPin2] = useState("");
  const [pinMsg, setPinMsg] = useState("");
  // 🧹 Dienstplan(스케줄) 전체 초기화 (관리자 전용)
  const [resetConfirm, setResetConfirm] = useState(false);
  const [resetting, setResetting] = useState(false);
  const [resetMsg, setResetMsg] = useState("");
  // 임시 계정 매칭 (Zuweisen)
  const [schedForMatch] = useFirebase("schedule", {});
  const [zuweisenSel, setZuweisenSel] = useState({});
  const [zuweisenMsg, setZuweisenMsg] = useState("");

  // 모든 운영 데이터를 삭제해 완전한 백지 상태로 초기화 (계정/PIN은 유지)
  async function resetDienstplan(){
    if(!(window._fbDb&&window._fbRef&&window._fbRemove)){ setResetMsg("❌ Keine Verbindung zur Datenbank."); return; }
    setResetting(true); setResetMsg("");
    try{
      const yr=new Date().getFullYear();
      const months=[];
      for(let y=yr-1;y<=yr+2;y++) for(let m=1;m<=12;m++) months.push(y+"_"+String(m).padStart(2,"0"));
      const paths=[
        // Dienstplan / Schichtbörse
        "schedule","planImage","freieSchichten",
        ...months.map(m=>"schedule_"+m),
        ...months.map(m=>"planImage_"+m),
        // Stempelzeiten & Anträge & Benachrichtigungen (완전 초기화)
        "records","notifications","antraege","schichttausch","absagen","archiv"
      ];
      await Promise.all(paths.map(p=>window._fbRemove(window._fbRef(window._fbDb,p)).catch(()=>{})));
      // localStorage 정리: 스케줄 Draft + 모든 사용자 출퇴근 임시상태(teeamo_clock_*)
      try{
