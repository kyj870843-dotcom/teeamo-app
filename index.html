function EmpDetailView({ empKey, safeUsers, records, setRecords, getStatus, sColor, sBg, setDetailKey, setUsers, monthAccordion, setMonthAccordion, delRecordConfirm, setDelRecordConfirm }) {
  const emp = safeUsers.find(u=>u.key===empKey);
  if (!emp) return null;

  const empRecs = records.filter(r=>r.user===emp.vorname);
  const total = empRecs.filter(r=>r.aus).reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0);
  const byMonth={};
  empRecs.forEach(r=>{const m=r.date.slice(0,7);if(!byMonth[m])byMonth[m]=[];byMonth[m].push(r);});
  const monthKeys=Object.keys(byMonth).sort((a,b)=>b.localeCompare(a));
  const mn=["","Jan","Feb","Mar","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
  const DAY=["So","Mo","Di","Mi","Do","Fr","Sa"];
  const contract=emp.contractHours||0;
  const totalDiff=contract>0?total-contract:null;

  return (
    <div style={{padding:"14px"}}>
      {delRecordConfirm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:"#fff",borderRadius:18,padding:"24px 20px",width:"100%",maxWidth:320}}>
            <div style={{fontSize:16,fontWeight:800,color:C.text,marginBottom:8,textAlign:"center"}}>{"Eintrag löschen?"}</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:20,textAlign:"center"}}>{"Dieser Eintrag wird dauerhaft gelöscht."}</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setDelRecordConfirm(null)}
                style={{flex:1,padding:"11px",borderRadius:10,border:"1px solid "+C.border,background:"#fff",color:C.muted,fontWeight:700,fontSize:13,cursor:"pointer"}}>
                Abbrechen
              </button>
              <button onClick={()=>{setRecords(prev=>(Array.isArray(prev)?prev:[]).filter(r=>r.id!==delRecordConfirm));setDelRecordConfirm(null);}}
                style={{flex:1,padding:"11px",borderRadius:10,border:"none",background:"linear-gradient(135deg,"+C.red+",#A8432E)",color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}}>
                {"Löschen"}
              </button>
            </div>
          </div>
        </div>
      )}
      <button onClick={()=>setDetailKey(null)}
        style={{background:"none",border:"none",cursor:"pointer",color:C.mintDark,fontSize:13,fontWeight:700,marginBottom:12}}>
        {"< Zurück"}
      </button>
      <div style={{...S.card,display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
        <div style={{width:52,height:52,borderRadius:"50%",background:C.navy,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:17,color:"#fff"}}>{emp.kuerzel}</div>
        <div style={{flex:1}}>
          <div style={{fontSize:17,fontWeight:800,color:C.text}}>{emp.vorname}{emp.nachname&&<span style={{fontSize:13,fontWeight:400,color:C.muted}}>{" "+emp.nachname}</span>}</div>
          <div style={{fontSize:11,color:C.muted}}>{emp.role==="Admin"?"Admin":"Staff"}</div>
          <span style={{fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:99,marginTop:4,display:"inline-block",color:sColor(getStatus(emp.vorname)),background:sBg(getStatus(emp.vorname))}}>{getStatus(emp.vorname)}</span>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
        {[{l:"Std. gesamt",v:total.toFixed(1)+"h",c:C.mintDark},{l:"Arbeitstage",v:empRecs.filter(r=>r.aus).length+"d",c:C.navy}].map(({l,v,c})=>(
          <div key={l} style={S.card}><div style={{fontSize:11,color:C.muted,marginBottom:4}}>{l}</div><div style={{fontSize:22,fontWeight:800,color:c}}>{v}</div></div>
        ))}
      </div>
      <div style={{...S.card,marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:8}}>Vertragsstunden / Monat</div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <input type="number" min="0" max="300" step="0.5" defaultValue={contract}
            onBlur={e=>{const h=parseFloat(e.target.value)||0;setUsers(prev=>(Array.isArray(prev)?prev:[]).map(u=>u.key===emp.key?{...u,contractHours:h}:u));}}
            style={{...S.input,width:90,textAlign:"center",fontSize:16,fontWeight:700}}/>
          <div style={{fontSize:12,color:C.muted}}>Std/Monat</div>
          {totalDiff!==null&&(
            <div style={{marginLeft:"auto",textAlign:"right"}}>
              <div style={{fontSize:13,fontWeight:800,color:totalDiff>=0?C.mintDark:C.red}}>{(totalDiff>=0?"+":"")+totalDiff.toFixed(1)+"h"}</div>
              <div style={{fontSize:10,color:C.muted}}>{totalDiff>=0?"Mehrst.":"Fehlst."}</div>
            </div>
          )}
        </div>
      </div>
      {empRecs.length===0?(
        <div style={{...S.card,textAlign:"center",color:C.muted,fontSize:13,padding:"24px"}}>Keine Eintraege.</div>
      ):monthKeys.map(m=>{
        const mRecs=byMonth[m];
        const mTotal=mRecs.filter(r=>r.aus).reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0);
        const mDays=mRecs.filter(r=>r.aus).length;
        const mDiff=contract>0?mTotal-contract:null;
        const isOpen=monthAccordion[m]!==false;
        const [y,mo]=m.split("-");
        return(
          <div key={m} style={{...S.card,padding:0,overflow:"hidden",marginBottom:10}}>
            <button onClick={()=>setMonthAccordion(p=>({...p,[m]:!isOpen}))}
              style={{width:"100%",padding:"12px 14px",background:"none",border:"none",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:14,fontWeight:800,color:C.text}}>{mn[parseInt(mo)]+" "+y}</span>
                <span style={{fontSize:11,color:C.mintDark,fontWeight:700}}>{mTotal.toFixed(1)+"h"}</span>
                <span style={{fontSize:10,color:C.muted}}>{mDays+" Tage"}</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                {mDiff!==null&&<span style={{fontSize:11,fontWeight:700,color:mDiff>=0?C.mintDark:C.red}}>{(mDiff>=0?"+":"")+mDiff.toFixed(1)+"h"}</span>}
                <span style={{fontSize:11,color:C.muted}}>{isOpen?"[-]":"[+]"}</span>
              </div>
            </button>
            {isOpen&&(
              <div>
                {contract>0&&(
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:1,borderTop:"1px solid "+C.border,borderBottom:"1px solid "+C.border}}>
                    {[{l:"Geplant",v:contract+"h",bg:"#fff",vc:C.text},{l:"Geleistet",v:mTotal.toFixed(1)+"h",bg:C.mintLight,vc:C.mintDark}].map(({l,v,bg,vc})=>(
                      <div key={l} style={{padding:"8px 14px",background:bg}}><div style={{fontSize:9,color:C.muted,marginBottom:2}}>{l}</div><div style={{fontSize:15,fontWeight:800,color:vc}}>{v}</div></div>
                    ))}
                  </div>
                )}
                {/* 📊 지점 → 근무타입 계층 breakdown */}
                <div style={{padding:"10px 14px",borderTop:"1px solid "+C.border,background:"#fff"}}>
                  <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:6,
                    textTransform:"uppercase",letterSpacing:".05em"}}>{"Filiale · Arbeitstyp"}</div>
                  <BreakdownView recs={mRecs} compact={true}/>
                </div>
                {[...mRecs].sort((a,b)=>b.date.localeCompare(a.date)).map((r,i)=>(
                  <div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 14px",borderBottom:i<mRecs.length-1?"1px solid "+C.border:"none"}}>
                    <div style={{display:"flex",gap:10,alignItems:"center"}}>
                      <div style={{width:36,height:36,borderRadius:9,background:r.aus?C.mintLight:C.yellowLight,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        <span style={{fontSize:9,color:C.muted,fontWeight:600}}>{DAY[new Date(r.date).getDay()]}</span>
                        <span style={{fontSize:11,fontWeight:800,color:r.aus?C.mintDark:C.yellow}}>{filialInit(r.filiale)}</span>
                      </div>
                      <div>
                        <div style={{fontSize:13,fontWeight:700,color:C.text}}>
                          {new Date(r.date).toLocaleDateString("de-DE",{day:"numeric",month:"numeric"})}
                          <span style={{fontSize:10,fontWeight:400,color:C.muted,marginLeft:5}}>{filialeMitTyp(r.filiale, r.typ)}</span>
                        </div>
                        <div style={{fontSize:12,color:C.muted,marginTop:1}}>{r.ein+" - "+(r.aus||"aktiv")}</div>
                      </div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{fontSize:14,fontWeight:800,color:r.aus?C.text:C.yellow}}>{stdLabel(r.ein,r.aus)}</div>
                      <button onClick={()=>setDelRecordConfirm(r.id)}
                        style={{width:28,height:28,borderRadius:7,border:"1px solid "+C.border,background:C.redLight,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:C.red,fontSize:11,fontWeight:700}}>
                        del
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function UebersichtAllTab({ empList, schedule, records, getStatus, sColor, sBg, setDetailKey, setDeleteConfirm, uTab, setUTab, userKey, safeUsers, onConfirmPruefen }) {
  const norm = v => !v?[]:Array.isArray(v)?v:Object.values(v);
  const todayStr = today();
  const todayRecs = (Array.isArray(records)?records:[]).filter(r=>r.date===todayStr);

  // 🧩 오늘 근무 로스터: 스케줄에 등록된 모든 이름(정식 계정 + 계정 없는 임시 직원)을
  //    빠짐없이 포함한다. 관리자 계정만 제외. (누락 방지 요구사항)
  const _rosterUsers = Array.isArray(safeUsers)?safeUsers:(Array.isArray(empList)?empList:[]);
  //  ⚠️ 하루에 여러 지점 근무가 있으면 각 근무를 독립 항목으로 펼친다
  //     (오전 ONIGIRI / 오후 TEEnJOY 가 각각 별도 카드·별도 상태로 표시)
  const todayRoster = Object.keys(schedule||{})
    .flatMap(nm => {
      const emp = _rosterUsers.find(u=>u.vorname===nm) || null;
      return norm(schedule[nm]||[])
        .filter(s => (s.date||s.d)===todayStr)
        .map(s => ({ name:nm, emp, isTemp:!emp,
          filiale:(s.filiale||s.f||""), time:(s.time||s.t||"") }));
    })
    // 관리자 계정은 로스터에서 제외 (임시 직원은 emp=null 이므로 유지됨)
    .filter(x => !(x.emp && MANAGERS.includes(x.emp.key)));

  const todayEmps = todayRoster;      // 배지 카운트용 (임시 직원 포함)
  const todayShiftEmps = todayRoster; // 그룹 렌더용 (임시 직원 포함)

  return (
    <div style={{padding:"14px"}}>
      {/*  */}
      <div style={{display:"flex",gap:0,marginBottom:12,borderRadius:10,overflow:"hidden",border:`1px solid ${C.border}`}}>
        {[{id:"all",l:"All Staffs",n:empList.length},{id:"today",l:"Heutige Staffs",n:todayEmps.length}].map(({id,l,n})=>(
          <button key={id} onClick={()=>setUTab(id)}
            style={{flex:1,padding:"10px 4px",border:"none",cursor:"pointer",fontSize:11,fontWeight:700,
              background:uTab===id?C.navy:"#fff",color:uTab===id?"#fff":C.muted}}>
            {l}
            {n>0&&<span style={{marginLeft:5,fontSize:9,fontWeight:800,padding:"1px 5px",borderRadius:99,
              background:uTab===id?"rgba(255,255,255,.25)":"rgba(0,0,0,.08)",color:uTab===id?"#fff":C.muted}}>
              {n}
            </span>}
          </button>
        ))}
      </div>

      {/*   1: All Staffs  */}
      {uTab==="all"&&(
        <div>
          {empList.map(emp=>(
            <div key={emp.key} style={{...S.card,display:"flex",alignItems:"center",gap:11,padding:"12px 14px",marginBottom:8}}>
              <button onClick={()=>setDetailKey(emp.key)}
                style={{flex:1,border:"none",background:"none",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:11,padding:0}}>
                <div style={{width:40,height:40,borderRadius:"50%",background:C.navy,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,color:"#fff",flexShrink:0}}>
                  {emp.kuerzel}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:700,color:C.text}}>
                    {emp.vorname}{emp.nachname&&<span style={{fontSize:11,fontWeight:400,color:C.muted}}> {emp.nachname}</span>}
                  </div>
                  <div style={{fontSize:10,color:C.muted,marginTop:2}}>{emp.role==="Admin"?"Admin":"Staff"}</div>
                </div>
                <span style={{fontSize:14,color:C.muted}}>{">"}</span>
              </button>
              <button onClick={()=>setDeleteConfirm(emp.key)}
                style={{flexShrink:0,width:30,height:30,borderRadius:8,border:`1px solid ${C.border}`,background:C.redLight,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",marginLeft:4}}>
                <span style={{fontSize:13,color:C.red,fontWeight:700}}>del</span>
              </button>
            </div>
          ))}
        </div>
      )}

      {/*   2: Heutige Staffs  */}
      {uTab==="today"&&(
        <div>
          {/*  */}
          <div style={{...S.card,marginBottom:10,padding:"9px 12px"}}>
            <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:".04em"}}>Legende</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:"6px 14px",marginBottom:6}}>
              {[
                {c:C.mintLight,tc:C.mintDark,l:"Aktiv"},
                {c:"#F0F0F0",tc:C.muted,l:"Feierabend"},
                {c:C.redLight,tc:C.red,l:"Nicht erschienen"},
              ].map(({c,tc,l})=>(
                <div key={l} style={{display:"flex",alignItems:"center",gap:5}}>
                  <div style={{width:10,height:10,borderRadius:3,background:c,border:`1px solid ${tc}`,flexShrink:0}}/>
                  <span style={{fontSize:9,color:C.muted}}>{l}</span>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap",borderTop:`1px solid ${C.border}`,paddingTop:6}}>
              {[{init:"Ar",l:"Arkaden"},{init:"Ae",l:"Aegidiimarkt"},{init:"Tj",l:"TEEnJOY"}].map(({init,l})=>(
                <div key={l} style={{display:"flex",alignItems:"center",gap:4}}>
                  <span style={{fontSize:10,fontWeight:800,color:C.navy,background:C.border,borderRadius:4,padding:"1px 5px"}}>{init}</span>
                  <span style={{fontSize:9,color:C.muted}}>{l}</span>
                </div>
              ))}
            </div>
            <div style={{fontSize:8,color:C.muted,marginTop:6,borderTop:`1px solid ${C.border}`,paddingTop:5}}>
              Hinweis: Nicht erschienen = kein Einstempeleintrag für heute.
            </div>
          </div>

          {todayShiftEmps.length===0?(
            <div style={{...S.card,textAlign:"center",color:C.muted,fontSize:12,padding:"24px"}}>
              Kein Dienstplan für heute eingetragen.
            </div>
          ):(()=>{
            //  : Arkaden  Aegidiimarkt  TEEnJOY
            const filOrder=["TEEAMO Arkaden","TEEAMO Aegidiimarkt","TEEnJOY"];
            //   shift  (임시 직원 포함 — todayShiftEmps 항목은 {name,emp,isTemp})
            // 각 항목이 이미 [직원 · 지점 · 시간] 단위로 펼쳐져 있다
            const withShift = todayShiftEmps.map(({name,emp,isTemp,filiale,time})=>
              ({name,emp,isTemp,fil:filiale,time}));
            //         
            return filOrder.map(fil=>{
              const group=withShift.filter(x=>x.fil===fil);
              if(group.length===0) return null;
              const sorted=group.sort((a,b)=>(a.time||"99:99").localeCompare(b.time||"99:99"));
              return(
                <div key={fil} style={{marginBottom:14}}>
                  <div style={{fontSize:10,fontWeight:800,color:C.muted,marginBottom:7,
                    textTransform:"uppercase",letterSpacing:".06em",display:"flex",alignItems:"center",gap:6}}>
                    <span style={{background:C.navy,color:"#fff",borderRadius:5,padding:"2px 7px",fontSize:10,fontWeight:800}}>
                      {filialInit(fil)}
                    </span>
                    {fil.replace("TEEAMO ","")}
                  </div>
                  {sorted.map(({name,emp,isTemp,time,fil:f})=>{
                    // 🔒 이 지점 근무만 보고 상태/기록을 판정한다
                    const st=getStatus(name, f);
                    const rec=recordForShift(todayRecs, name, todayStr, f);
                    return(
                      <div key={(emp?emp.key:("temp_"+name))+"|"+filialeSlug(f)} style={{...S.card,padding:"11px 14px",marginBottom:7}}>
                        <button onClick={()=>{ if(emp) setDetailKey(emp.key); }}
                          style={{width:"100%",border:"none",background:"none",cursor:emp?"pointer":"default",textAlign:"left",display:"flex",alignItems:"center",gap:11,padding:0}}>
                          <StaffAvatarCircle name={name} emp={emp} size={38}/>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:13,fontWeight:700,color:C.text}}>{name}</div>
                            {isTemp
                              ? <div style={{fontSize:9,color:C.muted,marginTop:1}}>Kein Konto</div>
                              : null}
                            {time&&<div style={{fontSize:10,color:C.muted,marginTop:1}}>{"Geplant: "}{time}</div>}
                            {rec?.ein&&(
                              <div style={{fontSize:10,fontWeight:600,color:st==="Feierabend"?C.mintDark:C.yellow,marginTop:2}}>
                                {rec.ein}{rec.aus?` – ${rec.aus}`:" (läuft)"}
                                {typNorm(rec.typ)!=="normal"&&<span style={{color:C.muted,fontWeight:700}}>{" · "+typIcon(rec.typ)+" "+typLabel(rec.typ)}</span>}
                                {rec.aus&&<span style={{color:C.muted,fontWeight:400}}>{" · "}{stdLabel(rec.ein,rec.aus)}</span>}
                                {rec.isAutoCheckedOut&&<span style={{color:C.muted,fontWeight:400}}>{" · ⏱ Auto"}</span>}
                              </div>
                            )}
                          </div>
                          <span style={{fontSize:9,fontWeight:700,padding:"3px 9px",borderRadius:99,color:sColor(st),background:sBg(st),flexShrink:0}}>{st}</span>
                        </button>
                        {st==="Prüfen"&&(
                          <div style={{marginTop:9,paddingTop:9,borderTop:`1px dashed ${C.yellow}`}}>
                            {rec?.frühGrund&&(
                              <div style={{fontSize:11,color:C.text,background:C.yellowLight,borderRadius:8,padding:"7px 10px",marginBottom:8}}>
                                {"📝 "}{rec.frühGrund}
                              </div>
                            )}
                            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
                              <span style={{fontSize:10,color:C.muted,fontWeight:600}}>{"⏱ Vorzeitig ausgestempelt"}</span>
                              <button onClick={()=>onConfirmPruefen&&onConfirmPruefen(rec)}
                                style={{padding:"7px 20px",borderRadius:9,border:"none",
                                  background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,color:"#fff",
                                  fontWeight:800,fontSize:12,cursor:"pointer"}}>
                                {"OK"}
                              </button>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              );
            });
          })()}
        </div>
      )}
    </div>
  );
}

function AntraegeTab({ antraege, setAntraege, tauschAntraege, setTauschAntraege, records, setRecords, aTab, setATab, openAId, setOpenAId, userKey }) {
  const nList = Array.isArray(antraege) ? antraege : [];
  const tList = Array.isArray(tauschAntraege) ? tauschAntraege : [];
  const nOffene = nList.filter(a=>a.status==="offen").length;
  const tOffene = tList.filter(a=>a.status==="ausstehend_manager"||a.status==="partner_ok").length;

  function decideNachtrag(a, ok) {
    setAntraege(prev=>(Array.isArray(prev)?prev:[]).map(x=>x.id===a.id?{...x,status:ok?"genehmigt":"abgelehnt"}:x));
    if (ok) {
      // ✅ 중복 근무 방지: 기존 실시간 출퇴근 기록 무효화 후 승인된 Nachtragen만 반영
      overrideWithNachtrag({ a, setRecords });
    }
    if (!ok) {
      // Firebase에서도 삭제
      if (window._fbDb && window._fbRef && window._fbGet && window._fbRemove) {
        window._fbGet(window._fbRef(window._fbDb, "records")).then(snap=>{
          const data=snap.val()||{};
          Object.entries(data).forEach(([k,v])=>{
            if(v&&v.user===a.user&&v.date===a.date&&v.typ==="nachtrag")
              window._fbRemove(window._fbRef(window._fbDb,`records/${k}`)).catch(()=>{});
          });
        });
      }
      setRecords(prev=>(Array.isArray(prev)?prev:[]).filter(r=>!(r.user===a.user&&r.date===a.date&&r.typ==="nachtrag")));
    }
    setOpenAId(null);
  }
  function reopenNachtrag(id) {
    setAntraege(prev=>(Array.isArray(prev)?prev:[]).map(a=>a.id===id?{...a,status:"offen"}:a));
    setOpenAId(null);
  }
  const tabs = [
    {id:"tausch", l:"Schichttausch", n:tOffene},
  ];

  return (
    <div style={{padding:"14px"}}>
      {/* Schichttausch 바로 표시 - 탭 없음 */}
      {(()=>{
        const pendingCount = tList.filter(a=>a.status==="ausstehend_manager"||a.status==="partner_ok").length;
        return(

  var done = list.filter(a => a.status !== "offen");
  var byDate = {};
  done.forEach(function(a) {
    var d = a.date || "";
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(a);
  });
  var dateKeys = Object.keys(byDate).sort(function(a,b){ return b.localeCompare(a); });

  function reopen(id) {
    setAntraege(function(prev) {
      return (Array.isArray(prev)?prev:[]).map(function(a){ return a.id===id ? {...a,status:"offen"} : a; });
    });
  }
  function decide(a, ok) {
    setAntraege(function(prev) {
      return (Array.isArray(prev)?prev:[]).map(function(x){ return x.id===a.id ? {...x,status:ok?"genehmigt":"abgelehnt"} : x; });
    });
    if (ok) {
      // ✅ 중복 근무 방지: 기존 실시간 출퇴근 기록 무효화 후 승인된 Nachtragen만 반영

      setRecords(function(prev) {
        return (Array.isArray(prev)?prev:[]).filter(function(r){
          return !(r.user===a.user && r.date===a.date && r.typ==="nachtrag");
        });
      });
    }
  }

  return (
    <div style={{padding:"14px"}}>

function NachDatumFilRow({name, d, t, schedule, users, records, todayStr, C, S}) {
  const arr = !schedule[name]?[]:Array.isArray(schedule[name])?schedule[name]:Object.values(schedule[name]);
  const shift = arr.find(s=>(s.date||s.d)===d);
  const accountExists = Array.isArray(users)&&users.some(u=>u.vorname===name);
  const emp = accountExists?(Array.isArray(users)?users:[]).find(u=>u.vorname===name):null;
  const rec = accountExists?records.find(r=>r.user===name&&r.date===d):null;
  const sSt = shift?.status||null, gMit = shift?.getauschtMit||null, gVon = shift?.getauschtVon||null;
  const transl = sSt==="freigegeben"||sSt==="getauscht";
  let statusLabel, statusColor, statusBg;
  if(sSt==="freigegeben"){
    statusLabel="🔄 Frei"; statusColor="#b45309"; statusBg="#fef3c7";
  } else if(sSt==="getauscht"){
    statusLabel="↔ Getauscht"; statusColor=C.mintDark; statusBg=C.mintLight;
  } else if(!accountExists){
    statusLabel="Ausstehend"; statusColor=C.muted; statusBg=C.border;
  } else if(rec?.aus){
    statusLabel="Feierabend"; statusColor=C.mintDark; statusBg=C.mintLight;
  } else if(rec?.ein){
    statusLabel="Aktiv"; statusColor=C.yellow; statusBg=C.yellowLight;
  } else if(d<todayStr){
    statusLabel="Nicht erschienen"; statusColor=C.red; statusBg=C.redLight;
  } else {
    statusLabel="Ausstehend"; statusColor=C.muted; statusBg=C.border;
  }
  return(
    <div style={{display:"flex",justifyContent:"space-between",
      alignItems:"center",padding:"10px 14px",opacity:transl?0.55:1,
      borderBottom:`1px solid ${C.border}`}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:30,height:30,borderRadius:"50%",
          background:accountExists?C.navy:C.border,
          display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:10,fontWeight:800,color:"#fff",flexShrink:0}}>
          {emp?emp.kuerzel:name.slice(0,2)}
        </div>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:C.text}}>{name}</div>
          {(shift?.time||shift?.t)&&(
            <div style={{fontSize:10,color:C.muted}}>{shift.time||shift.t}</div>
          )}
          {sSt==="freigegeben"&&<div style={{fontSize:9,fontWeight:700,color:"#b45309",marginTop:1}}>wartet auf Tausch</div>}
          {sSt==="getauscht"&&<div style={{fontSize:9,fontWeight:700,color:C.mintDark,marginTop:1}}>Getauscht mit {gMit||"?"}</div>}
          {gVon&&sSt!=="getauscht"&&<div style={{fontSize:9,fontWeight:700,color:C.mintDark,marginTop:1}}>✔️ Getauscht mit {gVon}</div>}
        </div>
      </div>
      <span style={{fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:99,
        color:statusColor,background:statusBg}}>
        {statusLabel}
      </span>
    </div>
  );
}

// ── 공용 Dienstplan 캘린더: 월 달력 + 선택일의 지점별 근무자 리스트 ──
//    highlightName이 주어지면(직원 뷰) 본인 근무를 강조. 안전 렌더링(정규화)으로 크래시 방지.
function DienstplanKalender({ schedule, records, highlightName, allowDelete, users, setRecords, FILIALEN_LIST }) {
  const norm = v => !v ? [] : Array.isArray(v) ? v : Object.values(v);
  const filShort = { "TEEAMO Arkaden":"Arkaden","TEEAMO Aegidiimarkt":"Aegidiimarkt","TEEnJOY":"TEEnJOY","ONIGIRI":"ONIGIRI" };
  const FILS = Array.isArray(FILIALEN_LIST)&&FILIALEN_LIST.length?FILIALEN_LIST:(typeof FILIALEN!=="undefined"?FILIALEN:[]);
  const todayStr = today();
  const [calYM, setCalYM] = useState(()=>{ const p=todayStr.split("-"); return {y:+p[0], m:(+p[1])-1}; });
  const [selDate, setSelDate] = useState(todayStr);
  // 🔒 Nachtragen 락 판정을 위한 신청 목록 구독
  const [antraegeList] = useFirebase("antraege", []);
  // 인라인 수정/양도/Nachtragen 상태
  const [editRow, setEditRow] = useState(null);   // {name, fil, von, bis}
  const [nachRow, setNachRow] = useState(null);   // {name, von, bis}
  const [actMsg, setActMsg]   = useState("");
  // 날짜 우선 추가 폼 (관리자)
  const [addOpen, setAddOpen] = useState(false);
  const [addFil, setAddFil]   = useState("");
  const [addEmp, setAddEmp]   = useState("");     // vorname | "__temp__"
  const [addTemp, setAddTemp] = useState("");
  const [addVon, setAddVon]   = useState("");
  const [addBis, setAddBis]   = useState("");
  const [addTyp, setAddTyp]   = useState("normal");   // 🧋 Arbeitstyp: normal | einspringen

  // 날짜별 근무 인덱스 (안전 정규화)
  const byDate = React.useMemo(()=>{
    const map={};
    Object.entries(schedule||{}).forEach(([name,sh])=>{
      norm(sh).forEach(s=>{
        if(!s) return;
        const d=s.date||s.d; if(!d) return;
        (map[d]=map[d]||[]).push({
          name, filiale:s.filiale||s.f||"", time:s.time||s.t||"", typ:typNorm(s.typ),
          autoCreated:!!s.autoCreated,
          status:s.status||null, getauschtMit:s.getauschtMit||null, getauschtVon:s.getauschtVon||null
        });
      });
    });
    return map;
  },[schedule]);

  const daysInMonth=new Date(calYM.y, calYM.m+1, 0).getDate();
  const firstDow=(new Date(calYM.y, calYM.m, 1).getDay()+6)%7;
  const cells=[]; for(let i=0;i<firstDow;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);
  const ymStr=d=>calYM.y+"-"+String(calYM.m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
  const calLabel=new Date(calYM.y, calYM.m, 1).toLocaleDateString("de-DE",{month:"long",year:"numeric"});
  const navBtn={border:"none",background:C.bg,borderRadius:8,width:30,height:30,fontSize:15,cursor:"pointer",color:C.text};

  const dayShifts=(byDate[selDate]||[]).slice()
    .sort((a,b)=>(a.filiale||"").localeCompare(b.filiale||"")||(a.time||"").localeCompare(b.time||""));
  const byFil={}; dayShifts.forEach(r=>{ (byFil[r.filiale]=byFil[r.filiale]||[]).push(r); });
  // 🔒 [직원·날짜·지점] 단위로 기록을 찾는다 (지점별 독립 판정)
  const recFor=(name, filiale)=> selDate!==todayStr ? null
    : recordForShift(records, name, selDate, filiale);

  return (
    <div>
      {/* 달력 */}
      <div style={{border:"1px solid "+C.border,borderRadius:14,padding:"12px",marginBottom:14,background:"#fff"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <button onClick={()=>setCalYM(p=>{const m=p.m-1;return m<0?{y:p.y-1,m:11}:{y:p.y,m};})} style={navBtn}>{"‹"}</button>
          <div style={{fontSize:13,fontWeight:800,color:C.text}}>{calLabel}</div>
          <button onClick={()=>setCalYM(p=>{const m=p.m+1;return m>11?{y:p.y+1,m:0}:{y:p.y,m};})} style={navBtn}>{"›"}</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:4}}>
          {["Mo","Di","Mi","Do","Fr","Sa","So"].map(w=><div key={w} style={{textAlign:"center",fontSize:9,fontWeight:700,color:C.muted}}>{w}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
          {cells.map((d,i)=>{
            if(d===null) return <div key={"e"+i}/>;
            const ds=ymStr(d);
            const shifts=byDate[ds]||[];
            const mine=highlightName&&shifts.some(s=>s.name===highlightName);
            const isSel=ds===selDate;
            const isToday=ds===todayStr;
            return(
              <button key={ds} onClick={()=>setSelDate(ds)}
                style={{aspectRatio:"1",borderRadius:9,cursor:"pointer",position:"relative",padding:0,
                  border:isSel?"2px solid "+C.navy:isToday?"1.5px solid "+C.mint:"1px solid "+C.border,
                  background:isSel?C.navy:mine?C.mintLight:"#fff",color:isSel?"#fff":C.text,
                  display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
                <span style={{fontSize:12,fontWeight:mine||isSel?800:600}}>{d}</span>
                {shifts.length>0&&(
                  <span style={{width:5,height:5,borderRadius:"50%",background:isSel?"#fff":mine?C.mintDark:C.muted}}/>
                )}
              </button>
            );
          })}
        </div>
      </div>

      {/* 선택일 상세: 지점별 근무자 */}
      <div>
        <div style={{fontSize:12,fontWeight:800,color:C.text,marginBottom:8}}>
          {new Date(selDate).toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"})}
        </div>
        {actMsg&&(
          <div style={{fontSize:11,fontWeight:700,padding:"8px 11px",borderRadius:9,marginBottom:8,
            background:actMsg.startsWith("✅")?"#dcfce7":"#fee2e2",color:actMsg.startsWith("✅")?"#15803d":C.red}}>
            {actMsg}
          </div>
        )}
        {dayShifts.length===0 ? (
          <div style={{...S.card,textAlign:"center",padding:"22px",color:C.muted,fontSize:12}}>Keine Schichten an diesem Tag.</div>
        ) : (
          Object.keys(byFil).sort(filialSort).map(fil=>(
            <div key={fil} style={{marginBottom:12}}>
              <div style={{fontSize:10,fontWeight:800,color:C.mintDark,marginBottom:6,textTransform:"uppercase",letterSpacing:".04em"}}>
                {filialIcon(fil)+" "+(filShort[fil]||fil||"—")}
              </div>
              {byFil[fil].map((r,idx)=>{
                const isMine=highlightName&&r.name===highlightName;
                const rec=recFor(r.name, fil);
                const transl=r.status==="freigegeben"||r.status==="getauscht";
                const rowKey=r.name+"|"+fil+"|"+idx;
                const editing = editRow&&editRow.key===rowKey;
                const nachting = nachRow&&nachRow.key===rowKey;
                const isPastOrToday = selDate<=todayStr;
                const iBtn={flexShrink:0,width:30,height:30,borderRadius:8,border:"1px solid "+C.border,
                  fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"};

                // ── 인라인 수정 폼 (관리자) ──
                if(editing){
                  return(
                    <div key={rowKey} style={{...S.card,padding:"11px 12px",marginBottom:6,border:"1.5px solid "+C.navy}}>
                      <div style={{fontSize:12,fontWeight:800,color:C.text,marginBottom:8}}>{"✏️ "+r.name}</div>
                      <div style={{marginBottom:8}}>
                        <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:3}}>FILIALE</div>
                        <select value={editRow.fil} onChange={e=>setEditRow({...editRow,fil:e.target.value})}
                          style={{...S.input,width:"100%",fontSize:13,padding:"8px 10px",boxSizing:"border-box"}}>
                          {FILS.map(f=><option key={f} value={f}>{filShort[f]||f}</option>)}
                        </select>
                      </div>
                      <div style={{display:"flex",gap:10,marginBottom:10}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:3}}>VON</div>
                          <TimeInput value={editRow.von} onChange={v=>setEditRow({...editRow,von:v})} style={{...S.input,width:"100%",fontSize:14,padding:"8px 6px",boxSizing:"border-box"}}/>
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:3}}>BIS</div>
                          <TimeInput value={editRow.bis} onChange={v=>setEditRow({...editRow,bis:v})} style={{...S.input,width:"100%",fontSize:14,padding:"8px 6px",boxSizing:"border-box"}}/>
                        </div>
                      </div>
                      <div style={{display:"flex",gap:8}}>
                        <button onClick={()=>setEditRow(null)} style={{flex:1,padding:"10px",borderRadius:9,border:"1px solid "+C.border,background:"#fff",color:C.muted,fontWeight:700,fontSize:12,cursor:"pointer"}}>Abbrechen</button>
                        <button onClick={()=>{
                          const nt=(editRow.von&&editRow.bis)?editRow.von+"-"+editRow.bis:(r.time||"");
                          patchScheduleShift(r.name, selDate, {f:editRow.fil, filiale:editRow.fil, t:nt, time:nt});
                          setEditRow(null);
                        }} style={{flex:2,padding:"10px",borderRadius:9,border:"none",background:C.navy,color:"#fff",fontWeight:800,fontSize:12,cursor:"pointer"}}>{"💾 Speichern"}</button>
                      </div>
                    </div>
                  );
                }
                // ── Nachtragen 인라인 폼 (직원 본인) ──
                if(nachting){
                  return(
                    <div key={rowKey} style={{...S.card,padding:"11px 12px",marginBottom:6,border:"1.5px solid "+C.yellow}}>
                      <div style={{fontSize:12,fontWeight:800,color:C.text,marginBottom:2}}>{"📝 Nachtragen · "+r.name}</div>
                      <div style={{fontSize:10,color:C.muted,marginBottom:8}}>Wird automatisch genehmigt & in Statistik übernommen.</div>
                      <div style={{display:"flex",gap:10,marginBottom:10}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:3}}>VON</div>
                          <TimeInput value={nachRow.von} onChange={v=>setNachRow({...nachRow,von:v})} style={{...S.input,width:"100%",fontSize:14,padding:"8px 6px",boxSizing:"border-box"}}/>
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:3}}>BIS</div>
                          <TimeInput value={nachRow.bis} onChange={v=>setNachRow({...nachRow,bis:v})} style={{...S.input,width:"100%",fontSize:14,padding:"8px 6px",boxSizing:"border-box"}}/>
                        </div>
                      </div>
                      <div style={{display:"flex",gap:8}}>
                        <button onClick={()=>setNachRow(null)} style={{flex:1,padding:"10px",borderRadius:9,border:"1px solid "+C.border,background:"#fff",color:C.muted,fontWeight:700,fontSize:12,cursor:"pointer"}}>Abbrechen</button>
                        <button onClick={()=>{
                          if(!nachRow.von||!nachRow.bis){ setActMsg("Bitte VON und BIS angeben."); return; }
                          nachtragenSchicht({userName:r.name, date:selDate, filiale:fil, ein:nachRow.von, aus:nachRow.bis, setRecords});
                          setNachRow(null); setActMsg("✅ Nachgetragen & genehmigt.");
                          setTimeout(()=>setActMsg(""),2500);
                        }} style={{flex:2,padding:"10px",borderRadius:9,border:"none",background:C.yellow,color:"#fff",fontWeight:800,fontSize:12,cursor:"pointer"}}>{"✅ Nachtragen"}</button>
                      </div>
                    </div>
                  );
                }
                // ── 일반 카드 + 액션 ──
                return(
                  <div key={rowKey} style={{...S.card,display:"flex",alignItems:"center",gap:10,padding:"9px 12px",marginBottom:6,
                    opacity:transl?0.55:1,
                    border:isMine?"1.5px solid "+C.mint:"1px solid "+C.border,
                    background:isMine?C.mintLight:"#fff"}}>
                    <div style={{width:32,height:32,borderRadius:"50%",background:isMine?C.mintDark:C.navy,color:"#fff",
                      display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:11,flexShrink:0}}>
                      {(r.name||"?").slice(0,2)}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:700,color:C.text,display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
                        <span>{r.name}</span>
                        {isOnigiriFiliale(fil)&&(
                          <span style={{fontSize:9,fontWeight:800,padding:"2px 7px",borderRadius:99,
                            background:"#fce7f3",color:"#9d174d"}}>{"🍙 ONIGIRI"}</span>
                        )}
                        {typNorm(r.typ)==="einspringen"&&(
                          <span style={{fontSize:9,fontWeight:800,padding:"2px 7px",borderRadius:99,
                            background:"#fef9c3",color:"#92400e"}}>
                            {r.autoCreated?"⚡ Einspringen (auto)":"⚡ Einspringen"}
                          </span>
                        )}
                        {isMine&&<span style={{fontSize:9,color:C.mintDark,fontWeight:800}}>(Du)</span>}
                      </div>
                      {(()=>{
                        const on=isOnigiriFiliale(fil);   // 🍙 ONIGIRI 지점: 시간 표시 생략
                        const timePart = on ? "" : (r.time||"—");
                        const statusPart = rec?.aus?" · ✅ Feierabend":rec?.ein?" · 🟢 Aktiv":"";
                        if(on && !statusPart) return null;  // 🍙 Onigiri: 시간 표시 영역 생략(이름만)
                        return (
                          <div style={{fontSize:10,color:C.muted,marginTop:1}}>
                            {timePart}{statusPart}
                          </div>
                        );
                      })()}
                      {(()=>{ const ist=istTimeFor(records,r.name,selDate,fil); if(!ist) return null;
                        return (
                          <div style={{fontSize:9,fontWeight:700,color:C.mintDark,marginTop:1}}>
                            {"Ist: "+ist.ein+" – "+ist.aus}
                            {ist.isNachtrag&&<span style={{color:C.muted,fontWeight:400}}>{" · korrigiert"}</span>}
                            {ist.isAuto&&<span style={{color:C.muted,fontWeight:400}}>{" · Auto"}</span>}
                          </div>
                        );
                      })()}
                      {r.status==="freigegeben"&&<div style={{fontSize:9,fontWeight:700,color:"#b45309",marginTop:1}}>{"🔄 Freigegeben"}</div>}
                      {r.status==="getauscht"&&<div style={{fontSize:9,fontWeight:700,color:C.mintDark,marginTop:1}}>{"🔄 Getauscht mit "+(r.getauschtMit||"?")}</div>}
                      {r.getauschtVon&&r.status!=="getauscht"&&<div style={{fontSize:9,fontWeight:700,color:C.mintDark,marginTop:1}}>{"✔️ Getauscht mit "+r.getauschtVon}</div>}
                    </div>
                    {/* 관리자: 수정/삭제 */}
                    {allowDelete&&(
                      <div style={{display:"flex",gap:6,flexShrink:0}}>
                        <button onClick={()=>{ const p=(r.time||"").split("-"); setEditRow({key:rowKey,name:r.name,fil,von:p[0]||"",bis:p[1]||""}); }}
                          style={{...iBtn,background:"#fff",color:C.navy}}>{"✏️"}</button>
                        <button onClick={()=>{ if(window.confirm(r.name+" · "+selDate+"\nSchicht löschen?")) deleteScheduleShift(r.name, selDate); }}
                          style={{...iBtn,background:C.redLight,color:C.red}}>{"×"}</button>
                      </div>
                    )}
                    {/* 직원 본인: 양도 / Nachtragen */}
                    {isMine&&!transl&&!allowDelete&&(
                      <div style={{display:"flex",flexDirection:"column",gap:5,flexShrink:0}}>
                        {/* Freigeben: 내일(미래) 근무만 — 과거/당일은 차단 */}
                        {selDate>todayStr&&(
                          <button onClick={()=>{ if(window.confirm("Schicht freigeben?\n"+r.name+" · "+selDate)) freigebenSchicht({userName:highlightName,date:selDate,filiale:fil,time:r.time,users}); }}
                            style={{padding:"6px 9px",borderRadius:8,border:"none",background:C.navy,color:"#fff",fontSize:10,fontWeight:800,cursor:"pointer",whiteSpace:"nowrap"}}>{"🔁 Freigeben"}</button>
                        )}
                        {/* Nachtragen 노출 규칙:
                            · 오늘(당일): 이미 실시간 출퇴근 기록(Einstempeln)이 있으면 차단
                              (근무 중 or 정상 종료 상태) — 단 자동퇴근은 수정 위해 허용
                            · 과거: 완료 기록이 없거나, 자동퇴근된 근무는 수정 위해 허용 */}
                        {(()=>{
                          // 🔒 과거 달(정산 완료)은 Nachtragen 원천 차단
                          const pastMonth = String(selDate||"").slice(0,7) < todayStr.slice(0,7);
                          if(pastMonth){
                            return (
                              <span style={{padding:"6px 9px",borderRadius:8,fontSize:10,fontWeight:800,whiteSpace:"nowrap",
                                border:"1px solid "+C.border,background:"#f1f1f1",color:C.muted}}>
                                {"🔒 Abgeschlossen"}
                              </span>
                            );
                          }
                          // 🔒 이미 승인/대기 중인 Nachtragen이 있으면 버튼 대신 상태 배지
                          const lock = nachtragStatusFor(antraegeList, r.name, selDate, fil);
                          if(lock){
                            return (
                              <span style={{padding:"6px 9px",borderRadius:8,fontSize:10,fontWeight:800,whiteSpace:"nowrap",
                                border:"1px solid "+(lock==="genehmigt"?C.mint:C.yellow),
                                background:lock==="genehmigt"?C.mintLight:C.yellowLight,
                                color:lock==="genehmigt"?C.mintDark:C.yellow}}>
                                {lock==="genehmigt"?"✅ Korrigiert":"⏳ In Prüfung"}
                              </span>
                            );
                          }
                          const realClock = rec && rec.ein && rec.typ!=="nachtrag" && !rec.isAutoCheckedOut;
                          const showNach = isPastOrToday && (
                            selDate===todayStr
                              ? !realClock
                              : (!(rec&&rec.aus) || rec.isAutoCheckedOut)
                          );
                          if(!showNach) return null;
                          return (
                            <button onClick={()=>{ const p=(r.time||"").split("-"); setNachRow({key:rowKey,von:p[0]||"",bis:p[1]||""}); }}
                              style={{padding:"6px 9px",borderRadius:8,border:"1px solid "+C.yellow,background:C.yellowLight,color:C.yellow,fontSize:10,fontWeight:800,cursor:"pointer",whiteSpace:"nowrap"}}>{"📝 Nachtragen"}</button>
                          );
                        })()}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          ))
        )}

        {/* ➕ 날짜 우선 추가 (관리자): 지점 → 직원(임시이름 가능) → 시간 */}
        {allowDelete&&(
          <div style={{marginTop:6}}>
            {!addOpen ? (
              <button onClick={()=>{setAddOpen(true);setAddFil(FILS[0]||"");setAddEmp("");setAddTemp("");setAddVon("");setAddBis("");setAddTyp("normal");setActMsg("");}}
                style={{width:"100%",padding:"11px",borderRadius:11,border:"1.5px dashed "+C.mint,background:C.mintLight,color:C.mintDark,fontWeight:800,fontSize:12,cursor:"pointer"}}>
                {"+ Schicht für diesen Tag hinzufügen"}
              </button>
            ) : (
              <div style={{...S.card,padding:"12px",border:"1.5px solid "+C.mint}}>
                <div style={{fontSize:12,fontWeight:800,color:C.text,marginBottom:2}}>{"+ Neue Schicht"}</div>
                <div style={{fontSize:10,color:C.muted,marginBottom:10}}>{new Date(selDate).toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"})}</div>
                <div style={{marginBottom:8}}>
                  <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:3}}>{"1 · FILIALE"}</div>
                  <select value={addFil} onChange={e=>setAddFil(e.target.value)} style={{...S.input,width:"100%",fontSize:13,padding:"8px 10px",boxSizing:"border-box"}}>
                    {FILS.map(f=><option key={f} value={f}>{filShort[f]||f}</option>)}
                  </select>
                </div>
                <div style={{marginBottom:8}}>
                  <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:3}}>{"2 · MITARBEITER/IN"}</div>
                  <select value={addEmp} onChange={e=>setAddEmp(e.target.value)} style={{...S.input,width:"100%",fontSize:13,padding:"8px 10px",boxSizing:"border-box"}}>
                    <option value="">{"— auswählen —"}</option>
                    {(Array.isArray(users)?users:[]).filter(u=>!MANAGERS.includes(u.key)).sort(byName).map(u=>(
                      <option key={u.key} value={u.vorname}>{u.vorname}{u.nachname?" "+u.nachname:""}</option>
                    ))}
                    <option disabled>{"──────────"}</option>
                    <option value="__temp__">{"➕ Temp-Name direkt eingeben…"}</option>
                  </select>
                  {addEmp==="__temp__"&&(
                    <input value={addTemp} onChange={e=>setAddTemp(e.target.value)} placeholder="z. B. Tingting"
                      style={{...S.input,width:"100%",fontSize:13,padding:"8px 10px",boxSizing:"border-box",marginTop:6}}/>
                  )}
                </div>
                {/* 🧋 3 · ARBEITSTYP — Onigiri 선택 시 시간 입력 숨김 */}
                <div style={{marginBottom:8}}>
                  <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:3}}>{"3 · ARBEITSTYP"}</div>
                  <div style={{display:"flex",gap:6}}>
                    {ARBEITSTYPEN.map(({typ,icon,lbl})=>(
                      <button key={typ} onClick={()=>setAddTyp(typ)}
                        style={{flex:1,padding:"8px 4px",borderRadius:9,fontSize:10,fontWeight:800,cursor:"pointer",
                          border:`2px solid ${addTyp===typ?C.mintDark:C.border}`,
                          background:addTyp===typ?C.mintLight:"#fff",
                          color:addTyp===typ?C.mintDark:C.muted}}>
                        <div style={{fontSize:14}}>{icon}</div>
                        <div style={{fontSize:9,marginTop:2}}>{lbl}</div>
                      </button>
                    ))}
                  </div>
                </div>
                {isOnigiriFiliale(addFil) ? (
                  <div style={{fontSize:10,color:C.mintDark,fontWeight:700,background:C.mintLight,
                    borderRadius:9,padding:"9px 11px",marginBottom:10}}>
                    {"🍙 Onigiri: Keine Uhrzeit nötig – nur Name eintragen."}
                  </div>
                ) : (
                  <div style={{display:"flex",gap:10,marginBottom:10}}>
                    {[{lbl:"4 · VON",val:addVon,set:setAddVon,quick:QUICK_VON_TIMES},
                      {lbl:"BIS",   val:addBis,set:setAddBis,quick:QUICK_BIS_TIMES}].map(({lbl,val,set,quick})=>(
                      <div key={lbl} style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:3}}>{lbl}</div>
                        <TimeInput value={val} onChange={set} style={{...S.input,width:"100%",fontSize:14,padding:"8px 6px",boxSizing:"border-box"}}/>
                        {/* ⏰ VON/BIS 각각의 추천 시간 버튼 */}
                        <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:5}}>
                          {quick.map(q=>(
                            <button key={lbl+q} onClick={()=>set(q)}
                              style={{fontSize:9,fontWeight:700,padding:"4px 6px",borderRadius:7,cursor:"pointer",flex:"0 0 auto",
                                border:"1px solid "+(val===q?C.mintDark:C.border),
                                background:val===q?C.mintDark:"#fff",color:val===q?"#fff":C.text}}>{q}</button>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setAddOpen(false)} style={{flex:1,padding:"10px",borderRadius:9,border:"1px solid "+C.border,background:"#fff",color:C.muted,fontWeight:700,fontSize:12,cursor:"pointer"}}>Abbrechen</button>
                  <button onClick={()=>{
                    const name=addEmp==="__temp__"?addTemp.trim():addEmp;
                    if(!name){ setActMsg("Bitte Mitarbeiter oder Temp-Name wählen."); return; }
                    const on=isOnigiriFiliale(addFil);   // 🍙 ONIGIRI: 시간 없이도 유효
                    // 🍙 Onigiri: 시간 없이도 유효 — 그 외 타입만 VON/BIS 필수
                    if(!on && (!addVon||!addBis)){ setActMsg("Bitte VON und BIS angeben."); return; }
                    addScheduleShift(name, selDate, addFil, on ? "" : addVon+"-"+addBis, addTyp);
                    setAddOpen(false); setActMsg("✅ Schicht hinzugefügt.");
                    setTimeout(()=>setActMsg(""),2500);
                  }} style={{flex:2,padding:"10px",borderRadius:9,border:"none",background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,color:"#fff",fontWeight:800,fontSize:12,cursor:"pointer"}}>{"✅ Hinzufügen"}</button>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function AdminDienstplanView({ records, setRecords, users, userKey, manager, csvCtx, schedule, antraege, setAntraege }) {
  const [viewMode, setViewMode] = useState("plan");
  const [openEmp, setOpenEmp] = useState(null);
  const [openDate, setOpenDate] = useState(null);
  const currentMonth=(()=>{
    const d=new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Berlin"}));
    return d.getFullYear()+"_"+String(d.getMonth()+1).padStart(2,"0");
  })();
  const [selMonth, setSelMonth] = useState(currentMonth);
  const empList = (Array.isArray(users)?users:[]).filter(u=>!MANAGERS.includes(u.key))
    .sort(byName);

  const norm = v => !v?[]:Array.isArray(v)?v:Object.values(v);

  // Firebase에서 월별 schedule 목록 로드
  const [allMonthSchedules, setAllMonthSchedules] = React.useState({});
  React.useEffect(()=>{
    if(!window._fbDb||!window._fbRef||!window._fbGet) return;
    // schedule_YYYY_MM 키들 찾기
    const months = ["2026_01","2026_02","2026_03","2026_04","2026_05","2026_06",
                    "2026_07","2026_08","2026_09","2026_10","2026_11","2026_12",
                    "2027_01","2027_02","2027_03","2027_04","2027_05","2027_06"];
    const promises = months.map(m=>
      window._fbGet(window._fbRef(window._fbDb,"schedule_"+m))
        .then(snap=>({m, data:snap.val()}))
        .catch(()=>({m,data:null}))
    );
    Promise.all(promises).then(results=>{
      const found={};
      results.forEach(({m,data})=>{ if(data) found[m]=data; });
      setAllMonthSchedules(found);
    });
  },[]);

  // 선택된 달의 스케줄을 실시간 구독 (Freigeben/Getauscht 상태 변경이 즉시 반영되도록)
  const liveScheduleKey = selMonth ? "schedule_"+selMonth : "schedule";
  const [liveMonthSched] = useFirebase(liveScheduleKey, {});

  // 선택된 월의 schedule (월별 독립 — 다른 달 데이터 유출 없음)
  const activeSchedule = React.useMemo(()=>{
    // 우선순위: 선택된 달의 실시간 노드 → 마운트 시 로드한 allMonthSchedules → root schedule
    let raw = null;
    if (liveMonthSched && Object.keys(liveMonthSched).length > 0) {
      raw = liveMonthSched;
    } else if (Object.keys(allMonthSchedules).length > 0) {
      raw = selMonth ? allMonthSchedules[selMonth] : null;
    } else {
      raw = schedule || {};
    }
    if (!raw) return {};
    // Firebase object → array 변환
    const result={};
    for(const [name,shifts] of Object.entries(raw)){
      result[name]=Array.isArray(shifts)?shifts:Object.values(shifts||{});
    }
    return result;
  },[selMonth, allMonthSchedules, schedule, liveMonthSched]);

  // 사용 가능한 월 목록
  const availableMonths = React.useMemo(()=>{
    const months=Object.keys(allMonthSchedules);
    // 현재 schedule의 월도 추출
    const currentDates=Object.values(schedule||{}).flatMap(sh=>norm(sh).map(s=>s.date||s.d)).filter(Boolean);
    if(currentDates.length>0){
      const m=currentDates[0].slice(0,7).replace("-","_");
      if(!months.includes(m)) months.push(m);
    }
    return months.sort().reverse();
  },[allMonthSchedules, schedule]);

  // 선택된 schedule 기반 데이터
  const scheduleNames = Object.keys(activeSchedule).filter(name=>
    norm(activeSchedule[name]).length>0
  ).sort((a,b)=>a.localeCompare(b));

  const allNames = [...new Set([
    ...scheduleNames,
    ...empList.map(e=>e.vorname)
  ])].sort((a,b)=>a.localeCompare(b));

  const hasAccount = name => empList.some(e=>e.vorname===name);

  const allDates = [...new Set(
    allNames.flatMap(name => norm(activeSchedule[name]||[]).map(s=>s.date||s.d))
  )].filter(Boolean).sort((a,b)=>a.localeCompare(b));

  const todayStr = today();
  const nList = Array.isArray(antraege) ? antraege : [];

  function approveNachtrag(a) {
    setAntraege(prev=>(Array.isArray(prev)?prev:[]).map(x=>x.id===a.id?{...x,status:"genehmigt"}:x));
    // ✅ 중복 근무 방지: 같은 날 실시간 출퇴근 기록을 무효화하고 승인된 Nachtragen만 반영
    overrideWithNachtrag({ a, setRecords });
  }
  function rejectNachtrag(a) {
    setAntraege(prev=>(Array.isArray(prev)?prev:[]).map(x=>x.id===a.id?{...x,status:"abgelehnt"}:x));
  }

  function getEmpStatus(vorname, filiale) {
    const r = recordForShift(records, vorname, todayStr, filiale);
    if(!r) return null;
    return {ein:r.ein,aus:r.aus,filiale:r.filiale};
  }

  return (
    <div style={{paddingBottom:20}}>
      {/* 월 선택 */}
      {availableMonths.length>0&&(
        <div style={{padding:"12px 14px 0"}}>
          <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:".05em"}}>
            Monat auswählen
          </div>
          <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4}}>
            {availableMonths.map(m=>{
              const [yr,mo]=m.split("_");
              const label=new Date(yr+"-"+mo+"-01").toLocaleDateString("de-DE",{month:"long",year:"numeric"});
              const isActive=selMonth===m;
              return(
                <button key={m} onClick={()=>setSelMonth(m===availableMonths[0]&&!selMonth?null:m)}
                  style={{flexShrink:0,padding:"8px 14px",borderRadius:10,border:`1.5px solid ${isActive?C.navy:C.border}`,
                    background:isActive?C.navy:"#fff",color:isActive?"#fff":C.muted,
                    fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
                  {label}
                </button>
              );
            })}
          </div>
        </div>
      )}
      {/*   */}
      <div style={{display:"flex",gap:0,margin:"14px 14px 0",borderRadius:12,overflow:"hidden",border:`1px solid ${C.border}`}}>
        {[{id:"plan",l:"📋 Plan"},
          {id:"by_emp",l:"👤 Nach Mitarbeiter"}].map(({id,l})=>(
          <button key={id} onClick={()=>setViewMode(id)}
            style={{flex:1,padding:"11px 4px",border:"none",cursor:"pointer",fontSize:11,fontWeight:700,
              background:viewMode===id?C.navy:"#fff",
              color:viewMode===id?"#fff":C.muted,transition:"all .15s"}}>
            {l}
          </button>
        ))}
      </div>

      {/* Plan: 근무 추가 + 캘린더(선택일 지점별 리스트) */}
      {viewMode==="plan"&&(
        <div style={{padding:"14px"}}>
          <DienstplanUploadView users={users} adminName={manager?.vorname}
            selMonth={selMonth}
            onScheduleSaved={(mk, pd) => {
              const fbFmt = Object.fromEntries(Object.entries(pd).map(([n,s])=>[n,Object.fromEntries((s||[]).map((x,i)=>[String(i),x]))]));
              setAllMonthSchedules(prev => ({...prev, [mk]: fbFmt}));
              setSelMonth(mk);
            }}/>
          <div style={{marginTop:16}}>
            <DienstplanKalender schedule={schedule} records={records} allowDelete={true} users={users}/>
          </div>
        </div>
      )}

      {/*    */}
      {viewMode==="by_emp"&&(
        <div style={{padding:"14px"}}>
          {allNames.map(name=>{
            const emp = empList.find(e=>e.vorname===name);
            const accountExists = !!emp;
            const shifts = norm(activeSchedule[name]||[])
              .filter(s=>s.date||s.d)
              .sort((a,b)=>(a.date||a.d).localeCompare(b.date||b.d));
            const isOpen = openEmp===(emp?emp.key:name);
            return (
              <React.Fragment key={emp?emp.key:name}>
              <div style={{...S.card,marginBottom:8,padding:0,overflow:"hidden"}}>
                <button onClick={()=>setOpenEmp(isOpen?null:(emp?emp.key:name))}
                  style={{width:"100%",padding:"12px 14px",background:"none",border:"none",cursor:"pointer",
                    display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:34,height:34,borderRadius:"50%",background:accountExists?C.navy:C.border,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:13,fontWeight:800,color:"#fff",flexShrink:0}}>
                      {emp?emp.kuerzel:name.slice(0,2)}
                    </div>
                    <div>
                      <div style={{fontSize:13,fontWeight:700,color:C.text}}>{name}</div>
                      {!accountExists&&<div style={{fontSize:9,color:C.muted}}>Kein Konto</div>}
                    </div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:10,color:C.muted,fontWeight:600}}>{shifts.length} Schichten</span>
                    <span style={{fontSize:12,color:C.muted}}>{isOpen ? "A" : "V"}</span>
                  </div>
                </button>
                {isOpen&&(
                  <div style={{borderTop:`1px solid ${C.border}`}}>
                    {shifts.length===0?(
                      <div style={{padding:"12px 14px",fontSize:12,color:C.muted}}>Keine Schichten eingetragen.</div>
                    ):shifts.map((s,i)=>{
                      const d=s.date||s.d, f=s.filiale||s.f, t=s.time||s.t;
                      const sSt=s.status||null, gMit=s.getauschtMit||null, gVon=s.getauschtVon||null;
                      const transl=sSt==="freigegeben"||sSt==="getauscht";
                      const rec=accountExists?records.find(r=>r.user===name&&r.date===d):null;
                      return(

                          background:rec?.aus?C.mintLight:rec?.ein?C.yellowLight:"#fff"}}>
                          <div style={{display:"flex",gap:10,alignItems:"center"}}>
                            <div style={{width:34,height:34,borderRadius:8,background:"rgba(255,255,255,.7)",
                              display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                              <span style={{fontSize:8,color:C.muted}}>{["So","Mo","Di","Mi","Do","Fr","Sa"][new Date(d).getDay()]}</span>
                              <span style={{fontSize:11,fontWeight:800,color:C.navy}}>{filialInit(f)}</span>
                            </div>
                            <div>
                              <div style={{fontSize:13,fontWeight:700,color:C.text}}>
                                {new Date(d).toLocaleDateString("de-DE",{day:"numeric",month:"numeric"})}
                              </div>
                              <div style={{fontSize:10,color:C.muted}}>{f}{t?` · ${t}`:""}</div>
                              {accountExists&&(()=>{ const ist=istTimeFor(records,name,d,f); if(!ist) return null;
                                return (
                                  <div style={{fontSize:9,fontWeight:700,color:C.mintDark,marginTop:1}}>
                                    {"Ist: "+ist.ein+" – "+ist.aus}
                                    {ist.isNachtrag&&<span style={{color:C.muted,fontWeight:400}}>{" · korrigiert"}</span>}
                                    {ist.isAuto&&<span style={{color:C.muted,fontWeight:400}}>{" · Auto"}</span>}
                                  </div>
                                );
                              })()}
                              {sSt==="freigegeben"&&<div style={{fontSize:9,fontWeight:700,color:"#b45309",marginTop:2}}>🔄 Freigegeben · wartet auf Tausch</div>}
                              {sSt==="getauscht"&&<div style={{fontSize:9,fontWeight:700,color:C.mintDark,marginTop:2}}>🔄 Getauscht mit {gMit||"?"}</div>}
                              {gVon&&sSt!=="getauscht"&&<div style={{fontSize:9,fontWeight:700,color:C.mintDark,marginTop:2}}>✔️ Getauscht mit {gVon}</div>}
                            </div>
                          </div>
                          <div style={{textAlign:"right"}}>
                            {!accountExists?(
                              <span style={{fontSize:9,padding:"3px 7px",borderRadius:99,background:C.bg,color:C.muted,fontWeight:600}}>Ausstehend</span>
                            ):rec?(
                              <RecStatusBadge rec={rec} t={t}/>
                            ):(
                              <span style={{fontSize:9,padding:"3px 7px",borderRadius:99,

                          </div>
                        </div>
                        <NachMitarbeiterAntrag name={name} d={d} nList={nList}
                            approveNachtrag={approveNachtrag} rejectNachtrag={rejectNachtrag}/>
                        </React.Fragment>
                      );
                    })}
                  </div>
                )}
              </div>
              </React.Fragment>
            );
          })}
        </div>
      )}

      {/*    */}
    </div>
  );
}

//  DIENSTPLAN UPLOAD + AI ANALYSE 
function DienstplanUploadView({ users, selMonth, onScheduleSaved, adminName }) {
  const norm = v => !v ? [] : Array.isArray(v) ? v : Object.values(v);
  const empOptions = (Array.isArray(users)?users:[]).filter(u=>!MANAGERS.includes(u.key) && u.vorname!==adminName).sort(byName);
  // ⏰ 추천 시간: VON/BIS 독립 배열 (전역 상수 공유)
  const QUICK_VON = QUICK_VON_TIMES, QUICK_BIS = QUICK_BIS_TIMES;
  const DRAFT_KEY = "teeamo_schicht_cart_v1";
  const filShort = { "TEEAMO Arkaden":"Arkaden", "TEEAMO Aegidiimarkt":"Aegidiimarkt", "TEEnJOY":"TEEnJOY", "ONIGIRI":"ONIGIRI" };

  // 선택된 월 스케줄 (달력 점 표시용)
  const scheduleKey = selMonth ? "schedule_"+selMonth : "schedule";
  const [monthSched] = useFirebase(scheduleKey, {});
  // root 스케줄 (실시간) — 모달의 '기존 근무 조회' + 달력 점 (저장 즉시 반영)
  const [rootSched] = useFirebase("schedule", {});

  const [showAdd, setShowAdd] = useState(false);
  const [saving, setSaving]   = useState(false);
  const [msg, setMsg]         = useState(null);

  // ── Draft 복원 (장바구니 + 선택 날짜) ──
  const draft0 = (()=>{ try{const s=localStorage.getItem(DRAFT_KEY);return s?JSON.parse(s):null;}catch{return null;} })();
  const [cart, setCart] = useState(Array.isArray(draft0?.cart)?draft0.cart:[]); // [{date,filiale,name,von,bis}]
  const [selDate, setSelDate] = useState(draft0?.selDate || today());

  // 하위 입력 (지점 → 직원 → 시간)
  const [aFil, setAFil]   = useState(FILIALEN[0]);
  const [aEmp, setAEmp]   = useState("");
  const [aTemp, setATemp] = useState("");
  const [aVon, setAVon]   = useState("");
  const [aBis, setABis]   = useState("");
  const [aTyp, setATyp]   = useState("normal");   // 🧋 Arbeitstyp: normal | einspringen

  const [calYM, setCalYM] = useState(()=>{ const p=(selDate||today()).split("-"); return {y:+p[0], m:(+p[1])-1}; });

  useEffect(()=>{ try{ localStorage.setItem(DRAFT_KEY, JSON.stringify({cart, selDate})); }catch{} },[cart, selDate]);

  const resolveAName = () => aEmp==="__temp__" ? (aTemp||"").trim() : aEmp;
  const hasDraft = cart.length>0;

  function addToCart(){
    const name=resolveAName();
    if(!name){ setMsg({t:"err",m:"Bitte Mitarbeiter oder Temp-Name wählen."}); return; }
    const on=isOnigiriFiliale(aFil);   // 🍙 ONIGIRI: 시간 없이도 유효
    // 🍙 Onigiri: 시간 없이도 유효 — 그 외 타입만 VON/BIS 필수
    if(!on && (!aVon||!aBis)){ setMsg({t:"err",m:"Bitte VON und BIS angeben."}); return; }
    setCart(prev=>[...prev, {date:selDate, filiale:aFil, name, von:on?"":aVon, bis:on?"":aBis, typ:aTyp}]);
    setAEmp(""); setATemp(""); setAVon(""); setABis(""); setATyp("normal"); setMsg(null);  // 지점은 유지
  }
  function removeCart(idx){ setCart(prev=>prev.filter((_,i)=>i!==idx)); }
  function resetInputs(){ setAEmp("");setATemp("");setAVon("");setABis("");setATyp("normal"); }
  function clearAll(){ setCart([]); resetInputs(); try{localStorage.removeItem(DRAFT_KEY);}catch{} }

  // ── 저장: 장바구니 전체를 root + 월별 두 노드에 기록. 저장 후 모달 유지 + 초기화 ──
  async function saveCart(){
    if(cart.length===0){ setMsg({t:"err",m:"Noch keine Schichten hinzugefügt."}); return; }
    if(!(window._fbDb&&window._fbRef&&window._fbGet&&window._fbSet)){ setMsg({t:"err",m:"Keine Verbindung zur Datenbank."}); return; }
    setSaving(true); setMsg(null);
    try{
      const byName={};  // {name: [{date,filiale,time,typ}]}
      cart.forEach(it=>{ const on=isOnigiriFiliale(it.filiale);
        (byName[it.name]=byName[it.name]||[]).push({date:it.date, filiale:it.filiale, time: on ? "" : it.von+"-"+it.bis, typ:typNorm(it.typ)}); });
      // 1) 월별 노드
      const monthsTouched=new Set(cart.map(it=>it.date.slice(0,7).replace("-","_")));
      for(const mk of monthsTouched){
        const key="schedule_"+mk;
        const snap=await window._fbGet(window._fbRef(window._fbDb,key));
        const ex=snap.val()?JSON.parse(JSON.stringify(snap.val())):{};
        for(const [name,entries] of Object.entries(byName)){
          const me=entries.filter(e=>e.date.slice(0,7).replace("-","_")===mk);
          if(me.length===0) continue;
          let arr=Array.isArray(ex[name])?ex[name]:Object.values(ex[name]||{});
          me.forEach(e=>{ arr=arr.filter(s=>!((s.date||s.d)===e.date&&(s.filiale||s.f)===e.filiale)); arr.push({date:e.date,filiale:e.filiale,time:e.time,typ:e.typ}); });
          ex[name]=Object.fromEntries(arr.map((s,i)=>[String(i),s]));
        }
        await window._fbSet(window._fbRef(window._fbDb,key),ex);
        const pd={}; for(const [n,sh] of Object.entries(ex)){ pd[n]=norm(sh); }
        if(onScheduleSaved) onScheduleSaved(mk, pd);
      }
      // 2) root schedule
      const rsnap=await window._fbGet(window._fbRef(window._fbDb,"schedule"));
      const root=rsnap.val()?JSON.parse(JSON.stringify(rsnap.val())):{};
      for(const [name,entries] of Object.entries(byName)){
        let rarr=Array.isArray(root[name])?root[name]:Object.values(root[name]||{});
        entries.forEach(e=>{ rarr=rarr.filter(s=>!((s.d||s.date)===e.date&&(s.f||s.filiale)===e.filiale)); rarr.push({d:e.date,f:e.filiale,t:e.time,typ:e.typ}); });
        root[name]=rarr;
      }
      await window._fbSet(window._fbRef(window._fbDb,"schedule"),root);
      setSaving(false);
      setMsg({t:"ok",m:"✅ "+cart.length+" Schicht(en) gespeichert. Weiter mit dem nächsten Tag!"});
      clearAll();  // 초기화하되 모달은 유지
    }catch(e){
      setSaving(false);
      setMsg({t:"err",m:"Fehler beim Speichern: "+(e.message||e)});
    }
  }

  // ── 달력 셀 ──
  const daysInMonth=new Date(calYM.y, calYM.m+1, 0).getDate();
  const firstDow=(new Date(calYM.y, calYM.m, 1).getDay()+6)%7;
  const cells=[]; for(let i=0;i<firstDow;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);
  const ymStr=(d)=>calYM.y+"-"+String(calYM.m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
  const calLabel=new Date(calYM.y, calYM.m, 1).toLocaleDateString("de-DE",{month:"long",year:"numeric"});
  const todayStr=today();

  // 기존 스케줄 있는 날짜 (달력 점)
  const existDates = new Set();
  Object.values(rootSched||{}).forEach(sh=>{ norm(sh).forEach(s=>{ const dd=s&&(s.date||s.d); if(dd) existDates.add(dd); }); });
  // 선택 날짜에 이미 저장된 근무 (실시간)
  const existingForSel = [];
  Object.entries(rootSched||{}).forEach(([name,sh])=>{
    if(MANAGERS.includes((name||"").toLowerCase())) return;
    norm(sh).forEach(s=>{
      if(!s) return;
      const dd=s.date||s.d; if(dd!==selDate) return;
      existingForSel.push({ name, filiale:s.filiale||s.f||"", time:s.time||s.t||"", status:s.status||null });
    });
  });
  existingForSel.sort((a,b)=>(a.filiale||"").localeCompare(b.filiale||"")||(a.time||"").localeCompare(b.time||""));
  const cartDates = new Set(cart.map(c=>c.date));

  const inp = {...S.input, width:"100%", fontSize:13, padding:"9px 11px", boxSizing:"border-box"};

  // 시간 입력 + 퀵버튼 (하위 입력용)
  //  label("VON"/"BIS")에 따라 각기 다른 추천 시간 배열을 렌더링
  const timeField = (val, setter, label) => (
    <div style={{flex:1,minWidth:0}}>
      <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:3}}>{label}</div>
      <TimeInput value={val} onChange={setter} style={{...S.input,width:"100%",fontSize:14,fontWeight:700,textAlign:"center",padding:"8px 4px",boxSizing:"border-box"}}/>
      <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:5}}>
        {(label==="BIS"?QUICK_BIS:QUICK_VON).map(q=>(
          <button key={label+q} onClick={()=>setter(q)}
            style={{fontSize:10,fontWeight:700,padding:"5px 6px",borderRadius:7,cursor:"pointer",flex:"0 0 auto",
              border:"1px solid "+(val===q?C.mintDark:C.border),
              background:val===q?C.mintDark:"#fff",color:val===q?"#fff":C.text}}>{q}</button>
        ))}
      </div>
    </div>
  );

  const cartForSel = cart.map((c,i)=>({...c,_i:i})).filter(c=>c.date===selDate);

                  <div style={{display:"flex",gap:6}}>

                  {"+ Zu diesem Tag hinzufügen"}
                </button>

              {msg && (
                <div style={{fontSize:11,fontWeight:700,padding:"9px 12px",borderRadius:9,marginTop:6,

            {/* 고정 하단: 저장 / 완료 */}
            <div style={{padding:"12px 16px calc(12px + env(safe-area-inset-bottom,0px))",borderTop:"1px solid "+C.border,display:"flex",gap:8,flexShrink:0}}>
              <button onClick={()=>setShowAdd(false)}

                Fertig
