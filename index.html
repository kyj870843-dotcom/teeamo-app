                </div>
                <button onClick={()=>{
                  const schichtId=Date.now();
                  const newFrei={id:schichtId,date:d,filiale:f,time:t||null,
                    note:absGrund||"",besetzt:false,angeboten_von:userName,
                    angeboten_von_uid:uidOf(users,userName)||"",ts:schichtId};
                  if(window._fbDb&&window._fbRef&&window._fbSet){
                    window._fbSet(window._fbRef(window._fbDb,"freieSchichten/"+schichtId),newFrei).catch(()=>{});
                    const dateStr=new Date(d).toLocaleDateString("de-DE",{weekday:"short",day:"numeric",month:"numeric"});
                    const msgTxt="📢 [Schichtbörse] "+userName+" gibt Schicht frei! "+dateStr+" · "+f+(t?" · "+t:"")+" — Jetzt übernehmen!";
                    (Array.isArray(users)?users:[]).filter(u=>!u.isAdmin&&u.vorname!==userName).forEach(u=>{
                      window._fbSet(window._fbRef(window._fbDb,"notifications/boerse_new_"+schichtId+"_"+u.key),{
                        type:"schichtboerse_new",kategorie:"Schichtbörse",schichtId,
                        zielUser:u.vorname,zielKey:u.key,angeboten_von:userName,
                        date:d,filiale:f,time:t||null,text:msgTxt,gelesen:false,ts:schichtId
                      }).catch(()=>{});
                    });
                  }
                  // 🔄 스케줄 shift를 삭제하지 않고 그대로 두되 'freigegeben' 상태로 표시 (반투명 + 교환 대기중)
                  patchScheduleShift(userName, d, {status:"freigegeben", freigabeGrund:absGrund||""});
                  setShowModal(false);setAbsGrund("");
                }} style={{width:"100%",padding:"13px",borderRadius:11,border:"none",
                  background:"linear-gradient(135deg,"+C.navy+",#444)",
                  color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}}>
                  {"🔔 In Schichtbörse einstellen"}
                </button>
              </div>
            )}
            {/* Nachtragen 탭 */}
            {modalTab==="nachtrag"&&(
              <div>
                <div style={{display:"flex",gap:10,marginBottom:12}}>
                  {[["Einstempeln",nEin,setNEin],["Ausstempeln",nAus,setNAus]].map(([lbl,val,set])=>(
                    <div key={lbl} style={{flex:1}}>
                      <div style={{fontSize:10,color:C.muted,marginBottom:4,fontWeight:700}}>{lbl}</div>
                      <TimeInput value={val} onChange={set} style={{...S.input,width:"100%",textAlign:"center",fontSize:14}}/>
                    </div>
                  ))}
                </div>
                <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:6}}>{"Grund "}<span style={{color:C.red}}>*</span></div>
                <textarea value={nGrund} onChange={e=>setNGrund(e.target.value)}
                  placeholder="z. B. Vergessen einzustempeln…"
                  style={{...S.input,width:"100%",minHeight:60,resize:"none",fontFamily:"inherit",marginBottom:8}}/>
                {nMsg&&<div style={{fontSize:11,color:nMsg.includes("gesendet")?C.mintDark:C.red,marginBottom:8,fontWeight:600}}>{nMsg}</div>}
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setShowModal(false)} style={{flex:1,padding:"11px",borderRadius:10,border:`1px solid ${C.border}`,background:"#fff",color:C.muted,fontWeight:700,fontSize:12,cursor:"pointer"}}>Abbrechen</button>
                  <button onClick={()=>{
                    if(!nGrund.trim()){setNMsg("Bitte einen Grund angeben.");return;}
                    const id=Date.now();
                    const antrag={id,user:userName,date:d,filiale:f,ein:nEin,aus:nAus,grund:nGrund,status:"offen",zustaendig:"all"};
                    setAntraege(prev=>[...(Array.isArray(prev)?prev:[]),antrag]);
                    // Dienstplan에서 직접 처리 - Alarm 알림 없음
                    setNMsg("Nachtrag gesendet!");
                    setTimeout(()=>{setShowModal(false);setNMsg("");setNGrund("");},1500);
                  }} style={{flex:2,padding:"11px",borderRadius:10,border:"none",background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,color:"#fff",fontWeight:800,fontSize:12,cursor:"pointer"}}>
                    Nachtrag senden
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}
      {showTausch&&(
        <SchichttauschModal
          userName={userName}
          myShifts={myShifts||[]}
          users={users||[]}
          preselectedShift={s}
          onClose={()=>setShowTausch(false)}/>
      )}
    </>
  );
}

//  EINSPRINGEN VIEW 
// ── Schichtbörse: 대타 매칭 게시판 ─────────────────────────────
// · Einspringen(당일 갑작스러운 출근)과 완전히 분리된 개념
// · 여기서 Übernehmen → 내 Dienstplan에 "Normal" 근무로 추가됨
function SchichtboerseView({ userName, users, isAdmin }) {
  const [freieSchichten, setFreieSchichten] = useFirebase("freieSchichten", []);
  const [myTab, setMyTab] = useState("offen");
  const [msg, setMsg] = useState(null);
  const [fsDate, setFsDate] = useState(today());
  const [fsFiliale, setFsFiliale] = useState(FILIALEN[0]);
  const [fsTimeFrom, setFsTimeFrom] = useState("09:00");
  const [fsTimeTo, setFsTimeTo] = useState("17:00");
  const [fsNote, setFsNote] = useState("");

  // 🆔 로그인한 사람의 고유 ID — 관리자 모드/직원 모드 어디서 눌러도 동일한 값.
  //    수락한 근무는 '직원으로서 배정받은 근무'로 이 uid에 귀속된다.
  const myUid = uidOf(users, userName);

  // ── 전체 직원 목록 (알림 발송용) ──────────────────────────────
  const allStaff = safeList(users).filter(u=>!u.isAdmin && !sameName(u.vorname,userName));
  const allManagers = MANAGERS;

  // ── [2] 근무 내놓기 → 전체 직원 실시간 알림 ──────────────────
  function anbieten() {
    if (!fsDate || !fsFiliale) return;
    const id = Date.now();
    const newSchicht = {
      id, date:fsDate, filiale:fsFiliale,
      time: fsTimeFrom&&fsTimeTo ? fsTimeFrom+"-"+fsTimeTo : null,
      note:fsNote, besetzt:false, angeboten_von:userName,
      angeboten_von_uid:myUid||"", ts:id
    };

    // Firebase에 freieSchichten 저장
    setFreieSchichten(prev=>[...safeList(prev), newSchicht]);
    if (window._fbDb && window._fbRef && window._fbSet) {
      window._fbSet(window._fbRef(window._fbDb, "freieSchichten/"+id), newSchicht).catch(()=>{});

      // 📢 가입된 전체 직원에게 실시간 알림 발송 (당사자 제외)
      const dateStr = new Date(fsDate).toLocaleDateString("de-DE",{weekday:"short",day:"numeric",month:"numeric"});
      const timeStr = newSchicht.time||"";
      const msgTxt  = "📢 [Schichtbörse] Neue Schicht von "+userName+"! "+dateStr+" · "+fsFiliale+(timeStr?" · "+timeStr:"")+" — Jetzt übernehmen!";

      allStaff.forEach(staffUser=>{
        // 각 직원 개인 알림 노드에 저장
        window._fbSet(window._fbRef(window._fbDb,
          "notifications/boerse_new_"+id+"_"+staffUser.key), {
          type: "schichtboerse_new",
          kategorie: "Schichtbörse",
          schichtId: id,
          zielUser: staffUser.vorname,
          zielKey:  staffUser.key,
          angeboten_von: userName,
          date: fsDate, filiale: fsFiliale, time: newSchicht.time,
          text: msgTxt,
          gelesen: false,
          ts: id
        }).catch(()=>{});
      });
    }

    setMsg("📢 Schicht eingestellt & alle Mitarbeiter benachrichtigt!");
    setFsNote("");
    setTimeout(()=>setMsg(null), 4000);
  }

  // ── [3] 근무 이어받기 → 자동 승인 + 관리자 확인 알림 ─────────
  async function uebernehmen(schicht) {
    // 🐞 임시 디버깅: 수락 시점의 입력 데이터 기록
    console.log("✅ [uebernehmen] 시작:", { schicht, userName, uid: uidOf(users,userName) });
    // 🛡 방어: 잘못된 데이터로 들어오면 조용히 중단 (앱이 죽지 않도록)
    if(!schicht || typeof schicht!=="object" || !schicht.date){
      console.error("✅ [uebernehmen] 잘못된 schicht 데이터:", schicht);
      setMsg("❌ Ungültige Schicht-Daten.");
      setTimeout(()=>setMsg(null),4000);
      return;
    }
    // ⛔ 중복 근무 방지: 같은 날 본인 기존 근무와 시간이 1분이라도 겹치면 차단
    try{
      if(window._fbDb&&window._fbRef&&window._fbGet&&schicht.time&&schicht.time.includes("-")){
        const snap=await window._fbGet(window._fbRef(window._fbDb,"schedule"));
        const sched=snap.val()||{};
        const mine=!sched[userName]?[]:Array.isArray(sched[userName])?sched[userName]:Object.values(sched[userName]);
        const [ns,ne]=schicht.time.split("-").map(t=>parseMinutes(t));
        const conflict=mine.some(s=>{
          if((s.d||s.date)!==schicht.date) return false;
          if(s.status==="getauscht"||s.status==="freigegeben") return false; // 이미 넘긴 근무는 제외
          const tm=s.t||s.time; if(!tm||!tm.includes("-")) return false;
          const [es,ee]=tm.split("-").map(t=>parseMinutes(t));
          if(ns==null||ne==null||es==null||ee==null) return false;
          return ns<ee && es<ne; // 구간 겹침
        });
        if(conflict){
          alert("⛔ Überschneidung!\n\nDiese Schicht überschneidet sich mit einer deiner bestehenden Schichten am selben Tag. Übernahme nicht möglich.");
          return;
        }
      }
    }catch(e){ console.error("overlap check error:",e); }
    // 1) schedule 자동 업데이트 (관리자 승인 불필요)
    //    ⚠️ 예전에는 여기서 직접 노드를 써서 3가지 문제가 있었다:
    //       ① uid 미저장 → 이름이 바뀌면 '내 근무' 인식이 깨짐
    //       ② rootSched[userName] 직접 접근 → 기존 키("yeaji")와 별개의
    //          새 키("Yeaji 🤖")가 생겨 같은 근무가 두 줄로 보임
    //       ③ 같은 날짜 근무를 지점 구분 없이 전부 삭제
    //          → 오전 ONIGIRI 근무가 있는데 오후 대타를 수락하면 오전 근무가 사라짐
    //    → addScheduleShift()가 세 문제를 모두 올바르게 처리하므로 그것으로 통일한다.
    //      (지점별 격리 + scheduleKeyOf로 기존 키 유지 + uid 저장 + root/월별 동시 기록)
    try{
      await addScheduleShift(
        userName, schicht.date, schicht.filiale, schicht.time || "", "normal",
        { uid: myUid, extra: { getauschtVon: schicht.angeboten_von || null } }
      );
      // 🐞 진단: 실제로 근무표에 기록됐는지 즉시 되읽어 확인한다
      try{
        const chk = await window._fbGet(window._fbRef(window._fbDb,"schedule"));
        const root = chk.val()||{};
        const key = scheduleKeyOf(root, userName);
        const arr = !root[key] ? [] : (Array.isArray(root[key])?root[key]:Object.values(root[key]));
        const hit = arr.filter(x=>x && (x.d||x.date)===schicht.date &&
                                     sameFiliale(x.f||x.filiale, schicht.filiale));
        console.log("✅ [uebernehmen] 근무표 기록 확인:", {
          저장키:key, 해당날짜지점_건수:hit.length, 내용:hit, 전체키목록:Object.keys(root)
        });
        if(hit.length===0) console.error("✅ [uebernehmen] ⚠️ 근무표에 기록되지 않았습니다!", { userName, schicht });
      }catch(e){ console.error("✅ [uebernehmen] 기록 확인 실패:", e); }
    }catch(e){
      console.error("✅ [uebernehmen] schedule 기록 실패:", e, { schicht, userName, myUid });
      throw e;   // 상위 uebernehmenSafe가 잡아 사용자에게 알린다
    }

    // 2) freieSchichten besetzt 처리
    setFreieSchichten(prev=>safeList(prev).map(s=>
      s?.id===schicht?.id?{...s,besetzt:true,uebernommen_von:userName,
        uebernommen_von_uid:myUid||""}:s
    ));
    if(window._fbDb&&window._fbRef&&window._fbSet){
      window._fbSet(window._fbRef(window._fbDb,"freieSchichten/"+schicht.id),
        {...schicht,besetzt:true,uebernommen_von:userName,
          uebernommen_von_uid:myUid||""}).catch(()=>{});
    }

    // 2b) 🔄 원 소유자의 스케줄 shift를 삭제하지 않고 'getauscht'로 갱신 (반투명 + 원 주인 추적)
    if(schicht.angeboten_von && schicht.angeboten_von!==userName){
      await patchScheduleShift(schicht.angeboten_von, schicht.date,
        {status:"getauscht", getauschtMit:userName});
    }

    // 3) 관리자에게 자동 승인 확인 알림 (단방향)
    const ts=Date.now();
    const dateStr=new Date(schicht.date).toLocaleDateString("de-DE",{weekday:"short",day:"numeric",month:"numeric"});
    const confirmMsg=`✅ [Schichtbörse] ${dateStr} · ${schicht.filiale} — Schicht von "${schicht.angeboten_von||"?"}" wurde von "${userName}" übernommen und automatisch eingetragen.`;

    if(window._fbDb&&window._fbRef&&window._fbSet){
      allManagers.forEach(mgr=>{
        window._fbSet(window._fbRef(window._fbDb,
          "notifications/boerse_match_"+schicht.id+"_"+mgr),{
          type:"schichtboerse_match",
          kategorie:"Schichtbörse",
          zustaendig:mgr,
          angeboten_von:schicht.angeboten_von||"",
          uebernommen_von:userName,
          date:schicht.date, filiale:schicht.filiale, time:schicht.time,
          text:confirmMsg,
          gelesen:false, auto_approved:true, ts
        }).catch(()=>{});
      });

      // 근무 내놓은 직원에게도 매칭 완료 알림
      if(schicht.angeboten_von&&schicht.angeboten_von!==userName){
        const origUser=safeList(users).find(u=>sameName(u?.vorname,schicht?.angeboten_von));
        if(origUser){
          window._fbSet(window._fbRef(window._fbDb,
            "notifications/boerse_taken_"+schicht.id+"_"+origUser.key),{
            type:"schichtboerse_taken",
            kategorie:"Schichtbörse",
            zielUser:schicht.angeboten_von,
            zielKey:origUser.key,
            uebernommen_von:userName,
            date:schicht.date, filiale:schicht.filiale, time:schicht.time,
            text:"✅ Deine Schicht am "+dateStr+" ("+schicht.filiale+") wurde von "+userName+" übernommen!",
            gelesen:false, ts
          }).catch(()=>{});
        }
      }
    }

    console.log("✅ [uebernehmen] 완료:", { id:schicht?.id, date:schicht?.date, filiale:schicht?.filiale });
    setMsg("✅ Schicht übernommen & in deinen Dienstplan eingetragen!");
    setTimeout(()=>setMsg(null),5000);
  }

  // 🛡 수락 처리 중 어떤 예외가 나도 앱이 흰 화면이 되지 않도록 감싸는 래퍼
  //    (에러 오브젝트 전체를 콘솔에 남겨 원인 추적 가능)
  async function uebernehmenSafe(schicht){
    try{
      await uebernehmen(schicht);
    }catch(e){
      console.error("✅ [uebernehmen] 처리 중 예외 발생:", e, {
        schicht, userName,
        stack: e?.stack,
        freieSchichtenTyp: Array.isArray(freieSchichten)?"array":typeof freieSchichten,
        usersAnzahl: safeList(users).length
      });
      setMsg("❌ Fehler bei der Übernahme — Details in der Konsole (F12).");
      setTimeout(()=>setMsg(null),6000);
    }
  }

  // ── 🗑 마켓에서 근무 내리기 (취소 / 삭제) ─────────────────────
  //   · 본인이 내놓은 근무   → 되가져오기(Zurücknehmen): 원래 내 근무로 복구
  //   · 관리자              → 어떤 빈 근무든 삭제(Löschen) 가능
  //   freieSchichten 노드에서 제거하므로 모든 Dienstplan 리스트의
  //   [Offene Schicht] 행도 실시간으로 함께 사라진다.
  async function zuruecknehmen(schicht){
    console.log("↩️ [zuruecknehmen] 시작:", { schicht, userName });
    if(!schicht || typeof schicht!=="object" || schicht.besetzt){
      console.error("↩️ [zuruecknehmen] 처리 불가한 데이터:", schicht);
      return;
    }
    const own = sameName(schicht.angeboten_von, userName);
    const label = own ? "Zurücknehmen?" : "Diese offene Schicht löschen?";
    const dateStr = new Date(schicht.date).toLocaleDateString("de-DE",{weekday:"short",day:"numeric",month:"numeric"});
    if(!window.confirm(label+"\n"+dateStr+" · "+schicht.filiale+(schicht.time?" · "+schicht.time:""))) return;

    // 1) 마켓에서 제거 (로컬 + Firebase)
    setFreieSchichten(prev=>safeList(prev).filter(x=>x?.id!==schicht?.id));
    if(window._fbDb&&window._fbRef&&window._fbRemove){
      await window._fbRemove(window._fbRef(window._fbDb,"freieSchichten/"+schicht.id)).catch(()=>{});
    }
    // 2) 직원이 내놓은 근무였다면 'freigegeben' 표시를 풀어 원래 상태로 되돌린다
    if(schicht.angeboten_von){
      await patchScheduleShift(schicht.angeboten_von, schicht.date, {status:null});
    }
    // 3) 관련 알림 정리 (남아있으면 눌렀을 때 없는 근무로 이동)
    if(window._fbDb&&window._fbRef&&window._fbGet&&window._fbRemove){
      try{
        const snap=await window._fbGet(window._fbRef(window._fbDb,"notifications"));
        const all=snap.val()||{};
        Object.entries(all).forEach(([k,v])=>{
          if(v && String(v.schichtId)===String(schicht.id))
            window._fbRemove(window._fbRef(window._fbDb,"notifications/"+k)).catch(()=>{});
        });
      }catch(e){}
    }
    // ⚠️ msg는 화면에 {msg}로 그대로 렌더링되므로 반드시 '문자열'이어야 한다.
    //    객체를 넣으면 React error #31 (Objects are not valid as a React child)로 앱이 죽는다.
    setMsg(own ? "↩️ Schicht zurückgenommen." : "🗑 Offene Schicht gelöscht.");
    setTimeout(()=>setMsg(null),4000);
  }

  // 🛡 safeList로 null 항목 제거 후 필터 (기존엔 null.besetzt 접근으로 앱이 죽었다)
  const offene = safeList(freieSchichten).filter(s=>!s.besetzt);
  // 👤 대소문자 무시 비교 — 과거에 소문자로 저장된 데이터도 '내 제안'으로 인식
  const meineAngebote = safeList(freieSchichten).filter(s=>sameName(s?.angeboten_von,userName));

  return (
    <div style={{padding:"14px"}}>
      {/* 헤더 */}
      <div style={{...S.card,marginBottom:12,background:"linear-gradient(135deg,#EEF4FF,#f0f7fa)",border:"1.5px solid "+C.navy}}>
        <div style={{fontSize:14,fontWeight:800,color:C.navy,marginBottom:4}}>{"🔔 Schichtbörse"}</div>
        <div style={{fontSize:11,color:C.muted}}>Offene Schichten übernehmen oder eigene anbieten.</div>
        <div style={{fontSize:10,color:C.muted,marginTop:4,padding:"4px 8px",borderRadius:6,background:"rgba(0,0,0,.04)"}}>
          ℹ️ Übernommene Schichten erscheinen als <b>Regulär</b>-Schicht in deinem Dienstplan.
        </div>
      </div>

      {/* 탭 전환 */}
      <div style={{display:"flex",gap:0,marginBottom:14,borderRadius:10,overflow:"hidden",border:"1px solid "+C.border}}>
        {(isAdmin?[["offen","🔓 Offene Schichten ("+offene.length+")"],["anbieten","📢 Anbieten (Admin)"]]:
        [["offen","🔓 Offene Schichten ("+offene.length+")"]]).map(([id,lbl])=>(
          <button key={id} onClick={()=>setMyTab(id)}
            style={{flex:1,padding:"9px 4px",border:"none",cursor:"pointer",fontSize:11,fontWeight:700,
              background:myTab===id?C.navy:"#fff",color:myTab===id?"#fff":C.muted}}>
            {lbl}
          </button>
        ))}
      </div>

      {msg&&(
        <div style={{padding:"10px 14px",borderRadius:10,background:C.mintLight,border:"1px solid "+C.mint,
          fontSize:12,fontWeight:600,color:C.mintDark,marginBottom:12}}>
          {/* 🛡 실수로 객체가 들어와도 앱이 죽지 않도록 문자열로 변환해 렌더링 */}
          {typeof msg==="string" ? msg : (msg?.text || JSON.stringify(msg))}
        </div>
      )}

      {/* 오픈 근무 목록 */}
      {myTab==="offen"&&(
        offene.length===0 ? (
          <div style={{...S.card,textAlign:"center",padding:"32px 16px"}}>
            <div style={{fontSize:28,marginBottom:8}}>🎉</div>
            <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:4}}>Keine offenen Schichten</div>
            <div style={{fontSize:11,color:C.muted}}>Aktuell sind keine Schichten verfügbar.</div>
          </div>
        ) : (
          offene.map(s=>(
            <div key={s.id} style={{...S.card,marginBottom:10,border:"1.5px solid "+C.border}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                <div>
                  <div style={{fontSize:13,fontWeight:800,color:C.text}}>
                    {new Date(s.date).toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"})}
                  </div>
                  <div style={{fontSize:11,color:C.muted,marginTop:2}}>{s.filiale}</div>
                  {s.time&&<div style={{fontSize:11,fontWeight:600,color:C.mintDark,marginTop:2}}>{"🕐 "}{s.time}</div>}
                  {s.angeboten_von&&<div style={{fontSize:10,color:C.muted,marginTop:3}}>{"von "}{prettyName(s.angeboten_von,users)}</div>}
                  {s.note&&<div style={{fontSize:10,color:C.muted,marginTop:4}}>{"📌 "}{s.note}</div>}
                </div>
                <div style={{width:40,height:40,borderRadius:10,background:"#EEF4FF",
                  display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>
                  {s.filiale==="TEEnJOY"?"🧋":s.filiale==="TEEAMO Aegidiimarkt"?"🏬":"🏪"}
                </div>
              </div>
              {sameName(s.angeboten_von,userName) ? (
                /* 내가 내놓은 근무 → 마켓에서 내리고 내 근무로 되돌린다 */
                <button onClick={()=>zuruecknehmen(s)}
                  style={{width:"100%",padding:"10px",borderRadius:10,border:`1.5px solid ${C.yellow}`,
                    background:C.yellowLight,cursor:"pointer",fontWeight:700,fontSize:12,color:"#7c5c00"}}>
                  {"↩️ Zurücknehmen (eigene Schicht)"}
                </button>
              ) : (
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>uebernehmenSafe(s)}
                    style={{flex:1,padding:"11px",borderRadius:10,border:"none",
                      background:"linear-gradient(135deg,"+C.navy+",#444)",
                      color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}}>
                    {"✅ Übernehmen → Dienstplan"}
                  </button>
                  {/* 🗑 관리자: 잘못 올렸거나 필요 없어진 빈 근무를 마켓에서 삭제 */}
                  {isAdmin&&(
                    <button onClick={()=>zuruecknehmen(s)} title="Offene Schicht löschen"
                      style={{flexShrink:0,padding:"11px 13px",borderRadius:10,
                        border:`1.5px solid ${C.border}`,background:C.redLight,
                        color:C.red,fontWeight:800,fontSize:13,cursor:"pointer"}}>
                      {"🗑"}
                    </button>
                  )}
                </div>
              )}
            </div>
          ))
        )
      )}

      {/* 내 근무 내놓기 */}
      {myTab==="anbieten"&&(
        <div>
          <div style={{...S.card,marginBottom:10}}>
            <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:10}}>Schicht zur Börse einstellen</div>
            {/* DATUM — 한 줄 전체 폭 (iOS 날짜 입력 오버플로우 방지) */}
            <div style={{marginBottom:10,width:"100%",minWidth:0}}>
              <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:4}}>DATUM</div>
              <input type="date" value={fsDate} onChange={e=>setFsDate(e.target.value)}
                style={{...S.input,display:"block",width:"100%",maxWidth:"100%",minWidth:0,fontSize:13,
                  padding:"10px 12px",boxSizing:"border-box",WebkitAppearance:"none",appearance:"none"}}/>
            </div>
            {/* FILIALE — 한 줄 전체 폭 */}
            <div style={{marginBottom:10}}>
              <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:4}}>FILIALE</div>
              <select value={fsFiliale} onChange={e=>setFsFiliale(e.target.value)}
                style={{...S.input,width:"100%",fontSize:13,padding:"10px 12px",boxSizing:"border-box"}}>
                {FILIALEN.map(f=><option key={f} value={f}>{f.replace("TEEAMO ","")}</option>)}
              </select>
            </div>
            {/* VON / BIS — 나란히, 넉넉한 간격과 padding으로 겹침 방지 */}
            <div style={{display:"flex",gap:14,marginBottom:10}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:4}}>VON</div>
                <TimeInput value={fsTimeFrom} onChange={setFsTimeFrom}
                  style={{...S.input,width:"100%",fontSize:14,padding:"10px 12px",boxSizing:"border-box"}}/>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:4}}>BIS</div>
                <TimeInput value={fsTimeTo} onChange={setFsTimeTo}
                  style={{...S.input,width:"100%",fontSize:14,padding:"10px 12px",boxSizing:"border-box"}}/>
              </div>
            </div>
            <div style={{marginBottom:10}}>
              <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:3}}>GRUND (optional)</div>
              <input value={fsNote} onChange={e=>setFsNote(e.target.value)}
                placeholder="z. B. Urlaub, privater Termin…"
                style={{...S.input,width:"100%",fontSize:12,padding:"6px 8px",boxSizing:"border-box"}}/>
            </div>
            <button onClick={anbieten}
              style={{width:"100%",padding:"11px",borderRadius:10,border:"none",
                background:"linear-gradient(135deg,"+C.mint+","+C.mintDark+")",
                color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}}>
              {"📢 Schicht einstellen"}
            </button>
          </div>

          {/* 내가 내놓은 근무 목록 */}
          {meineAngebote.length>0&&(
            <div>
              <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:8,textTransform:"uppercase"}}>
                Meine angebotenen Schichten
              </div>
              {meineAngebote.map(s=>(
                <div key={s.id} style={{...S.card,marginBottom:8,border:"1px solid "+C.border,
                  opacity:s.besetzt?0.6:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontSize:12,fontWeight:700}}>{new Date(s.date).toLocaleDateString("de-DE")}</div>
                      <div style={{fontSize:10,color:C.muted}}>{s.filiale}{s.time?" · "+s.time:""}</div>
                    </div>
                    {s.besetzt
                      ? <span style={{fontSize:10,padding:"3px 8px",borderRadius:99,background:C.mintLight,color:C.mintDark,fontWeight:700}}>
                          {"✅ Übernommen"+(s.uebernommen_von?" von "+prettyName(s.uebernommen_von,users):"")}
                        </span>
                      : (
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <span style={{fontSize:10,padding:"3px 8px",borderRadius:99,background:"#fef9c3",color:"#92400e",fontWeight:700}}>
                            Offen
                          </span>
                          {/* ↩️ 아직 아무도 안 가져갔으면 되가져올 수 있다 */}
                          <button onClick={()=>zuruecknehmen(s)}
                            style={{padding:"4px 9px",borderRadius:8,cursor:"pointer",
                              border:`1px solid ${C.border}`,background:"#fff",
                              color:C.red,fontSize:10,fontWeight:800,whiteSpace:"nowrap"}}>
                            {"↩️ Zurücknehmen"}
                          </button>
                        </div>
                      )
                    }
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function LoginView({onLogin,users,setUsers,getPin,setPin:savePinFn,csvCtx}){
  const now=useNow();
  const [page,setPage]=useState("list");
  const [selUser,setSelUser]=useState(null);
  const [pin,setPin]=useState("");
  const [err,setErr]=useState("");
  const [regV,setRegV]=useState("");
  const [regN,setRegN]=useState("");
  const [regP,setRegP]=useState("");
  const [regP2,setRegP2]=useState("");
  const [regErr,setRegErr]=useState("");
  const [regRole,setRegRole]=useState("Staff");
  const [preSchedule]=useFirebase("schedule",{});   // 로그인 전 Dienstplan 실시간 구독
  const [preRecords]=useFirebase("records",[]);
  const ADMIN_NAMES=["yeaji","tingting","teddy","huy"];
  const safeUsers=Array.isArray(users)?users:[];
  const isAdminName=regV.trim()!==""&&ADMIN_NAMES.some(n=>regV.trim().toLowerCase().includes(n));
  // 역할이 Admin/Management이거나 isAdmin이면 무조건 MANAGEMENT 그룹으로 분류 (하이브리드 관리자 포함)
  const isMgmtAcc = u => MANAGERS.includes(u.key) || u.isAdmin===true || u.role==="Admin" || u.role==="Management";
  const empList=[...safeUsers.filter(u=>!isMgmtAcc(u))].sort(byName);
  const mgrList=[...safeUsers.filter(u=>isMgmtAcc(u))].sort(byName);

  function selectUser(u){setSelUser(u);setPin("");setErr("");setPage("pin");}
  function back(){setPage("list");setSelUser(null);setPin("");setErr("");}
  function pinKey(k){
    if(pin.length>=4)return;
    const next=pin+k; setPin(next);
    if(next.length===4){
      // PIN localStorage  (Firebase PIN   )
      const stored = getPin(selUser.key);
      const correct = stored || selUser.pin; // fallback to INIT pin
      if(next===correct) onLogin(selUser.key);
      else{setErr("Falsche PIN. Erneut versuchen.");setTimeout(()=>{setPin("");setErr("");},1400);}
    }
  }
  function doRegister(){
    if(!regV.trim()){setRegErr("Vorname ist Pflichtfeld.");return;}
    // ⛔ 이미 있는 이름은 사용할 수 없다 (이름이 근무 데이터의 키로 쓰이기 때문).
    //    단, 이모지로 구분하면 허용된다. 예) "Lena 🍓" 와 "Lena 🐻"
    {
      const dup = safeList(users).find(u=>sameNameStrict(u.vorname, regV.trim()));
      if(dup){
        setRegErr("„"+regV.trim()+"“ existiert bereits. Bitte mit Emoji unterscheiden, z.B. "+regV.trim()+" 🍓");
        return;
      }
    }
    // 👤 Nachname도 필수 (관리자에게만 보이며 정산·서류 확인에 쓰인다)
    if(!regN.trim()){setRegErr("Nachname ist Pflichtfeld.");return;}
    if(!/^\d{4}$/.test(regP)){setRegErr("PIN muss 4 Ziffern sein.");return;}
    if(regP!==regP2){setRegErr("PINs stimmen nicht überein.");return;}
    const vn=regV.trim(),nn=regN.trim();
    const baseKey=vn.toLowerCase().replace(/[^a-z0-9]/g,"").slice(0,12)||"user";
    const key=baseKey+"_"+Date.now();
    const isAdmin=isAdminName&&regRole==="Admin";
    const newUser={key,vorname:vn,nachname:nn,kuerzel:vn.slice(0,2),role:isAdmin?"Admin":"Staff",isAdmin,infektionsschutz:null,contractHours:0};
     savePinFn(key, regP);
     setUsers(prev=>[...(Array.isArray(prev)?prev:[]),newUser]);

     // ── 이름 기반 선-저장 데이터 자동 매핑 트리거 ──────────────
     // 신규 가입 시 Firebase에 이미 이름 기준으로 저장된 근무 데이터가
     // 자동으로 이 직원과 연결됨 (schedule의 키가 vorname이므로 추가 작업 불필요)
     if (window._fbDb && window._fbRef && window._fbGet) {
       // root schedule 확인
       window._fbGet(window._fbRef(window._fbDb,"schedule")).then(snap=>{
         const s=snap.val()||{};
         if(s[vn]) console.log("✅ Auto-Mapping:",vn,"root schedule",Object.values(s[vn]).length,"Schichten");
       }).catch(()=>{});
       // 현재 월 schedule_YYYY_MM 확인
       const _now=new Date();
       const _mk=_now.getFullYear()+"_"+String(_now.getMonth()+1).padStart(2,"0");
       window._fbGet(window._fbRef(window._fbDb,"schedule_"+_mk)).then(snap=>{
         const ms=snap.val()||{};
         if(ms[vn]) console.log("✅ Auto-Mapping:",vn,"schedule_"+_mk);
       }).catch(()=>{});
     }
     setRegV("");setRegN("");setRegP("");setRegP2("");setRegErr("");setRegRole("Staff");setPage("list");
  }

  if(page==="kalender")return(
    <div style={{background:C.bg,minHeight:"100vh"}}>
      <div style={S.hdr}>
        <button onClick={()=>setPage("list")} style={S.backBtn}>{"← Zurück"}</button>
        <div style={{fontSize:18,fontWeight:800}}>Dienstplan</div>
        <div style={{fontSize:11,opacity:.45,marginTop:2}}>{"Leseansicht – ohne Anmeldung"}</div>
      </div>
      <div style={{padding:"14px"}}><DienstplanKalender schedule={preSchedule} records={preRecords}/></div>
    </div>
  );

  if(page==="pin"&&selUser){
    const isMgr=MANAGERS.includes(selUser.key);
    const dots=Array.from({length:4}).map((_,i)=>i<pin.length);
    return(
      <div style={{background:C.bg,minHeight:"100vh"}}>
        <div style={S.hdr}>
          <button onClick={back} style={S.backBtn}>{"← Zurück"}</button>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:46,height:46,borderRadius:"50%",background:isMgr?C.yellow:C.mint,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:15,color:C.navy}}>{selUser.kuerzel}</div>
            <div><div style={{fontSize:18,fontWeight:800}}>{selUser.vorname}</div><div style={{fontSize:11,opacity:.45}}>{selUser.role==="Admin"?"Admin":"Staff"}</div></div>
          </div>
        </div>
        <div style={{padding:"32px 24px",textAlign:"center"}}>
          <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:28}}>PIN eingeben</div>
          <div style={{display:"flex",justifyContent:"center",gap:18,marginBottom:8}}>
            {dots.map((f,i)=><div key={i} style={{width:16,height:16,borderRadius:"50%",background:f?(err?C.red:C.navy):C.border,transition:"background .15s"}}/>)}
          </div>
          <div style={{minHeight:28,marginBottom:8,fontSize:12,color:C.red,fontWeight:600}}>{err}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,maxWidth:260,margin:"0 auto"}}>
            {["1","2","3","4","5","6","7","8","9","","0","⌫"].map((k,i)=>(
              k===""?<div key={i}/>:
              <button key={i} onClick={()=>k==="⌫"?setPin(p=>p.slice(0,-1)):pinKey(k)}
                style={{height:56,borderRadius:14,border:`1px solid ${C.border}`,background:C.card,fontSize:k==="⌫"?20:22,fontWeight:600,color:C.text,cursor:"pointer"}}
                onTouchStart={e=>e.currentTarget.style.background="#eee"} onTouchEnd={e=>e.currentTarget.style.background=C.card}>{k}</button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  if(page==="register")return(
    <div style={{background:C.bg,minHeight:"100vh"}}>
      <div style={S.hdr}>
        <button onClick={()=>setPage("list")} style={S.backBtn}>{"← Zurück"}</button>
        <div style={{fontSize:18,fontWeight:800}}>Registrieren</div>
        <div style={{fontSize:11,opacity:.45,marginTop:2}}>Neues Konto erstellen</div>
      </div>
      <div style={{padding:"16px 16px 40px"}}>
        <div style={{...S.card,padding:"18px 16px"}}>
          {/* Vorname (  ) */}
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:2}}>
              Vorname <span style={{color:C.red}}>*</span>
            </div>
            <div style={{fontSize:9,color:C.muted,marginBottom:5}}>
              Tipp: Emoji erlaubt! z.B. <strong>{"Lena 🍓"}</strong> oder <strong>{"Alex 🐻"}</strong>
            </div>
            <input value={regV} onChange={e=>setRegV(e.target.value)}
              placeholder="z.B. Lena 🍓"
              style={{...S.input,fontSize:15}}/>
            {regV&&(()=>{
              // ⛔ 완전히 같은 이름 / ⚠️ 이모지만 다른 같은 이름을 실시간으로 알려준다
              const exact = safeList(users).find(u=>sameNameStrict(u.vorname, regV.trim()));
              const base  = safeList(users).filter(u=>sameName(u.vorname, regV.trim()));
              if(exact) return (
                <div style={{marginTop:6,padding:"8px 11px",borderRadius:9,background:C.redLight,
                  border:`1px solid ${C.red}`,fontSize:11,color:C.red,fontWeight:700,lineHeight:1.5}}>
                  {"⛔ „"+regV.trim()+"“ existiert bereits."}<br/>
                  {"Tipp: Emoji anhängen, z.B. "+regV.trim()+" 🍓"}
                </div>
              );
              if(base.length>0) return (
                <div style={{marginTop:6,padding:"8px 11px",borderRadius:9,background:C.yellowLight,
                  border:`1px solid ${C.yellow}`,fontSize:11,color:"#92400e",fontWeight:700,lineHeight:1.5}}>
                  {"⚠️ Ähnlicher Name vorhanden: "+base.map(u=>u.vorname).join(", ")}<br/>
                  {"Vorschau: Hallo, "+regV+"!"}
                </div>
              );
              return (
                <div style={{marginTop:6,padding:"8px 11px",borderRadius:9,background:C.mintLight,border:`1px solid ${C.mint}`,fontSize:12,color:C.mintDark,fontWeight:700}}>
                  Vorschau: Hallo, {regV}!
                </div>
              );
            })()}
          </div>
          {/* Nachname */}
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:2}}>
              Nachname <span style={{color:C.red}}>*</span>
            </div>
            <div style={{fontSize:9,color:C.muted,marginBottom:5}}>
              {"Nur für Admin sichtbar — für Lohnabrechnung & Unterlagen."}
            </div>
            <input value={regN} onChange={e=>setRegN(e.target.value)}
              placeholder="z.B. Kim" style={{...S.input,fontSize:15}}/>
          </div>
          {/*    */}
          <div style={{fontSize:10,color:C.muted,marginBottom:12,padding:"7px 10px",borderRadius:8,background:C.bg,border:`1px solid ${C.border}`}}>
            {"ℹ️ Der Name kann nach der Registrierung jederzeit in den Einstellungen geändert werden."}
          </div>
          {isAdminName&&(
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:4}}>Rolle</div>
              <div style={{display:"flex",gap:9}}>
                {["Staff","Admin"].map(r=>(
                  <button key={r} onClick={()=>setRegRole(r)} style={{flex:1,padding:"10px",borderRadius:9,fontSize:12,fontWeight:700,cursor:"pointer",border:`2px solid ${regRole===r?C.mint:C.border}`,background:regRole===r?C.mintLight:"#fff",color:regRole===r?C.mintDark:C.muted}}>
                    {r==="Admin"?"👑 Admin":"👤 Staff"}
                  </button>
                ))}
              </div>
            </div>
          )}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            {[["PIN (4 Ziffern) *",regP,setRegP],["PIN wiederholen *",regP2,setRegP2]].map(([lbl,val,set])=>(
              <div key={lbl}>
                <div style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:4}}>{lbl}</div>
                <input type="password" inputMode="numeric" maxLength={4} value={val} onChange={e=>set(e.target.value.replace(/\D/g,""))} placeholder="••••" style={{...S.input,letterSpacing:"0.3em",fontSize:18}}/>
              </div>
            ))}
          </div>
          {regErr&&<div style={{fontSize:11,color:C.red,fontWeight:600,marginBottom:10}}>{regErr}</div>}
          {/* 👤 Vorname · Nachname · PIN이 모두 채워져야 생성 가능 */}
          {(()=>{
            const dupName = !!safeList(users).find(u=>sameNameStrict(u.vorname, regV.trim()));
            const ready = !!regV.trim() && !dupName && !!regN.trim() && /^\d{4}$/.test(regP) && regP===regP2;
            return (
              <button onClick={doRegister} disabled={!ready}
                style={{width:"100%",padding:"13px",borderRadius:11,border:"none",
                  background:ready?`linear-gradient(135deg,${C.mint},${C.mintDark})`:"#e5e5e5",
                  color:ready?"#fff":C.muted,fontSize:14,fontWeight:800,
                  cursor:ready?"pointer":"not-allowed"}}>
                Konto erstellen
              </button>
            );
          })()}
        </div>
      </div>
    </div>
  );

  const UserCard=({u})=>{
    const isMgr=MANAGERS.includes(u.key);
    //  :  + vorname  
    const displayLabel = (u.emoji ? u.emoji+" " : "") + u.vorname;
    return(
      <button onClick={()=>selectUser(u)} style={{width:"100%",display:"flex",alignItems:"center",gap:13,padding:"12px 14px",borderRadius:14,border:`1px solid ${C.border}`,background:C.card,cursor:"pointer",boxShadow:"0 2px 8px rgba(44,44,44,.05)",textAlign:"left",marginBottom:7}}
        onTouchStart={e=>e.currentTarget.style.background=C.mintLight} onTouchEnd={e=>e.currentTarget.style.background=C.card}>
        <div style={{width:40,height:40,borderRadius:"50%",flexShrink:0,background:isMgr?C.yellow:C.navy,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:isMgr?800:700,fontSize:u.emoji?18:13,color:"#fff"}}>
          {u.emoji || u.kuerzel}
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:700,color:C.text}}>{displayLabel}</div>
          <div style={{fontSize:10,color:C.muted,marginTop:1}}>{u.role==="Admin"?"Admin":"Staff"}</div>
        </div>
        <span style={{fontSize:14,color:C.muted}}>{"🔒"}</span>
      </button>

//  CLOCK MODAL 
function ClockModal({modal,now,selFiliale,clockFiliale,clockInTime,CLOCK_KEY,onClose,onEin,onAus}){
  const isEin = modal==="ein";
  const nowStr = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const [manualMode, setManualMode] = useState(false);
  const [manualTime, setManualTime] = useState(nowStr);

  const ausInvalid = !isEin && manualMode && clockInTime && (()=>{
    const [ah,am] = manualTime.split(":").map(Number);
    return (ah*60+am) - (clockInTime.getHours()*60+clockInTime.getMinutes()) <= 0;
  })();

  function doEin(){
    const t = manualMode ? manualTime : nowStr;
    const [h,m] = t.split(":").map(Number);
    const d = new Date(); d.setHours(h,m,0,0);
    onEin(d);
  }
  function doAus(){
    if(ausInvalid) return;
    const t = manualMode ? manualTime : nowStr;
    const inStr = `${pad(clockInTime.getHours())}:${pad(clockInTime.getMinutes())}`;
    onAus(inStr, t);
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(20,20,20,.55)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200}}>
      <div style={{background:C.card,borderRadius:"22px 22px 0 0",width:"100%",maxWidth:500,padding:"24px 22px 32px",paddingBottom:"max(32px,env(safe-area-inset-bottom))"}}>
        <div style={{width:36,height:4,background:C.border,borderRadius:99,margin:"0 auto 20px"}}/>
        <div style={{fontSize:16,fontWeight:800,color:C.text,marginBottom:4}}>
          {isEin?"Einstempeln bestätigen":"Ausstempeln bestätigen"}
        </div>
        <div style={{fontSize:12,color:C.muted,marginBottom:14}}>
          Filiale: <strong style={{color:C.text}}>{isEin?selFiliale:clockFiliale}</strong>
        </div>

        <div style={{marginBottom:16}}>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <button onClick={()=>setManualMode(false)}
              style={{flex:1,padding:"9px",borderRadius:9,fontSize:12,fontWeight:700,cursor:"pointer",
                border:`2px solid ${!manualMode?C.mint:C.border}`,
                background:!manualMode?C.mintLight:"#fff",
                color:!manualMode?C.mintDark:C.muted}}>
              {"🕐 Jetzt"}
            </button>
            <button onClick={()=>setManualMode(true)}
              style={{flex:1,padding:"9px",borderRadius:9,fontSize:12,fontWeight:700,cursor:"pointer",
                border:`2px solid ${manualMode?C.yellow:C.border}`,
                background:manualMode?C.yellowLight:"#fff",
                color:manualMode?C.yellow:C.muted}}>
              {"✏️ Zeit eingeben"}
            </button>
          </div>
          {manualMode&&(
            <div style={{background:C.yellowLight,borderRadius:10,padding:"12px 14px",border:`1.5px solid ${ausInvalid?C.red:C.yellow}`}}>
              <div style={{fontSize:10,fontWeight:700,color:C.yellow,marginBottom:6}}>
                {isEin?"Tatsächliche Einstempelzeit":"Tatsächliche Ausstempelzeit"}
              </div>
              <TimeInput value={manualTime} onChange={setManualTime}
                style={{...S.input,width:"80%",display:"block",margin:"0 auto",fontSize:20,fontWeight:700,textAlign:"center",borderColor:ausInvalid?C.red:C.yellow}}/>
              {!isEin&&clockInTime&&(()=>{
                const [ah,am]=manualTime.split(":").map(Number);
                const diff=(ah*60+am)-(clockInTime.getHours()*60+clockInTime.getMinutes());
                if(diff<=0) return(
                  <div style={{fontSize:11,color:C.red,fontWeight:700,marginTop:7,textAlign:"center"}}>
                    <>{"⚠ Die Zeit liegt vor der Einstempelzeit ("}{pad(clockInTime.getHours())}:{pad(clockInTime.getMinutes())}{"  Uhr)"}</>
                  </div>
                );
                return(
                  <div style={{fontSize:11,color:"#3a7a55",fontWeight:700,marginTop:7,textAlign:"center"}}>
                    <>{"⏱ "}{Math.floor(diff/60)}{"h "}{diff%60}{"min Arbeitszeit"}</>
                  </div>
                );
              })()}
              {isEin&&(()=>{
                const [ah,am]=manualTime.split(":").map(Number);
                const diff=(now.getHours()*60+now.getMinutes())-(ah*60+am);
                if(diff<=0) return null;
                return(
                  <div style={{fontSize:11,color:C.yellow,fontWeight:700,marginTop:7,textAlign:"center"}}>
                    <>{"⏱ "}{Math.floor(diff/60)}{"h "}{diff%60}{"min bereits vergangen"}</>
                  </div>
                );
              })()}
            </div>
          )}
        </div>

        <div style={{display:"flex",gap:9}}>
          <button onClick={onClose} style={{flex:1,padding:"12px",borderRadius:11,border:`1.5px solid ${C.border}`,background:C.card,color:C.muted,fontWeight:700,fontSize:13,cursor:"pointer"}}>Abbrechen</button>
          <button onClick={isEin?doEin:doAus} disabled={!!ausInvalid}
            style={{flex:2,padding:"12px",borderRadius:11,border:"none",
              background:ausInvalid?"#ccc":isEin?`linear-gradient(135deg,${C.mint},${C.mintDark})`:`linear-gradient(135deg,${C.red},#A8432E)`,
              color:"#fff",fontWeight:800,fontSize:14,cursor:ausInvalid?"not-allowed":"pointer",opacity:ausInvalid?0.6:1}}>
            {isEin?"Einstempeln":"Ausstempeln"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  🕵️ 히든 마스터 게이트
//   겉보기엔 평범한 버전 표시 텍스트. 3번 연속 탭하면 암호창이 열린다.
//   (3초 안에 연타해야 하며, 그 외에는 아무 반응도 없어 눈치채기 어렵다)
//   해제 상태에서는 작은 자물쇠 표시가 뜨고, 눌러서 다시 잠글 수 있다.
// ═══════════════════════════════════════════════════════════════
function MasterGate(){
  const unlocked = useMasterUnlocked();
  const [taps, setTaps]   = useState(0);
  const [ask, setAsk]     = useState(false);
  const [pw, setPw]       = useState("");
  const [err, setErr]     = useState("");
  const [busy, setBusy]   = useState(false);
  const [diag, setDiag]   = useState(null);   // 🐞 임시 디버깅 정보
  const [locked, setLocked] = useState(false); // 잠금 완료 안내 표시
  const [genHash, setGenHash] = useState("");  // 🆕 앱 안에서 만든 해시 결과
  const [copied, setCopied]   = useState(false);
  const [showPw, setShowPw]   = useState(false);  // 👁 암호 표시/숨김 토글
  const timer = React.useRef(null);
  // 암호가 아직 코드에 설정되지 않았다면 '설정 도우미' 모드로 전환
  const notConfigured = !resolveMaster().source;

  // 3초 안에 3번 탭 = 토글
  //   · 잠긴 상태  → 암호 입력창 열기
  //   · 해제된 상태 → 즉시 다시 잠그기 (암호 불필요)
  function onTap(){
    clearTimeout(timer.current);
    const n = taps + 1;
    if(n >= 3){
      setTaps(0);
      if(unlocked){
        lockMaster();                                   // 🔒 3연타로 즉시 잠금
        setLocked(true);
        setTimeout(()=>setLocked(false), 1600);         // 잠금 완료 표시 잠깐 노출
      }else{
        setAsk(true); setPw(""); setErr(""); setDiag(null);
      }
      return;
    }
    setTaps(n);
    timer.current = setTimeout(()=>setTaps(0), 3000);   // 3초 내 연타만 인정
  }

  // 🛠 앱 안에서 해시 생성 (아이폰 등 콘솔을 못 쓰는 환경 대응)
  async function makeHash(){
    const pw2 = String(pw||"").trim();
    if(!pw2){ setErr("암호를 입력하세요."); return; }
    if(pw2.length < 4){ setErr("4자 이상으로 정해주세요."); return; }
    setBusy(true); setErr("");
    try{
      setGenHash(await sha256Hex(pw2));
      setCopied(false);
    }catch(e){
      setErr("Krypto nicht verfügbar (HTTPS erforderlich).");
    }
    setBusy(false);
  }
  function copyLine(){
    const line = 'const MASTER_HASH = "' + genHash + '";';
    try{
      if(navigator.clipboard&&navigator.clipboard.writeText){
        navigator.clipboard.writeText(line).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});
      }else{
        const ta=document.createElement("textarea");
        ta.value=line; document.body.appendChild(ta); ta.select();
        document.execCommand("copy"); document.body.removeChild(ta);
        setCopied(true); setTimeout(()=>setCopied(false),2000);
      }
    }catch(e){ setErr("복사 실패 — 아래 값을 길게 눌러 직접 복사하세요."); }
  }

  async function submit(){
    if(!pw) return;
    setBusy(true);
    const res = await verifyMasterCode(pw);          // 입력·설정값 모두 trim 후 비교
    if(res.ok){
      unlockMaster(); setAsk(false); setPw(""); setErr(""); setDiag(null);
    }else{
      // 🐞 임시 디버깅: 실패 원인을 콘솔 + 화면에 표시 (암호 값은 출력하지 않음)
      const d = masterDiagnostics(pw);
      console.log("🔐 [Master] 인증 실패:", res.reason, d);
      setDiag(d);
      setErr(
        res.reason === "no-config" ? "암호가 설정되어 있지 않습니다."
      : res.reason === "crypto"    ? "Krypto nicht verfügbar (HTTPS erforderlich)."
      : "Falscher Code."
      );
      setPw("");
    }
    setBusy(false);
  }

  return (
    <>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,
        marginTop:18,marginBottom:4}}>
        {/* 위장용 버전 텍스트 = 히든 트리거 */}
        <div onClick={onTap}
          style={{fontSize:9,color:C.muted,opacity:.45,cursor:"default",
            userSelect:"none",WebkitUserSelect:"none",padding:"4px 8px"}}>
          {"teeamo · v1.0"}
        </div>
        {unlocked&&!locked&&(
          <button onClick={lockMaster}
            style={{fontSize:8,fontWeight:800,padding:"3px 8px",borderRadius:99,cursor:"pointer",
              border:`1px solid ${C.yellow}`,background:C.yellowLight,color:"#92400e"}}>
            {"🔓 Master · 3번 탭하면 잠김"}
          </button>
        )}
        {locked&&(
          <span style={{fontSize:8,fontWeight:800,padding:"3px 8px",borderRadius:99,
            border:`1px solid ${C.border}`,background:"#f1f1f1",color:C.muted}}>
            {"🔒 잠금 완료"}
          </span>
        )}
      </div>

      {ask&&(
        <div onClick={()=>{setAsk(false);setShowPw(false);}}
          style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:9999,
            display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div onClick={e=>e.stopPropagation()}
            style={{background:"#fff",borderRadius:16,padding:"20px 18px",width:"100%",maxWidth:320,
              boxShadow:"0 10px 40px rgba(0,0,0,.25)"}}>
            <div style={{fontSize:13,fontWeight:800,color:C.text,marginBottom:4}}>
              {notConfigured ? "🛠 마스터 암호 설정" : "🔐 Wartungszugang"}
            </div>
            <div style={{fontSize:10,color:C.muted,marginBottom:12,lineHeight:1.5}}>
              {notConfigured
                ? "원하는 암호를 입력하면 코드에 붙여넣을 값을 만들어 드립니다."
                : "Code eingeben"}
            </div>
            {/* 👁 눈 아이콘을 누르면 입력한 암호가 보이고, 다시 누르면 숨겨진다 */}
            <div style={{position:"relative"}}>
              <input type={showPw ? "text" : "password"} value={pw} autoFocus
                autoComplete="off" autoCorrect="off" autoCapitalize="none" spellCheck={false}
                onChange={e=>{setPw(e.target.value);setErr("");}}
                onKeyDown={e=>{ if(e.key==="Enter") (notConfigured?makeHash:submit)(); }}
                style={{...S.input,width:"100%",boxSizing:"border-box",fontSize:15,
                  textAlign:"center",letterSpacing:showPw?".05em":".2em",
                  padding:"11px 42px 11px 42px"}}/>
              <button type="button" onClick={()=>setShowPw(v=>!v)}
                aria-label={showPw?"암호 숨기기":"암호 보기"}
                style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",
                  border:"none",background:"transparent",cursor:"pointer",
                  fontSize:16,lineHeight:1,padding:"6px 8px",opacity:.65}}>
                {showPw ? "🙈" : "👁"}
              </button>
            </div>
            {err&&<div style={{fontSize:10,color:C.red,fontWeight:700,marginTop:8}}>{err}</div>}
            {/* 🐞 임시 디버깅 패널 — 원인 파악 후 이 블록만 지우면 된다 */}
            {diag&&(
              <div style={{marginTop:8,padding:"8px 9px",borderRadius:8,background:"#f8f8f8",
                border:`1px solid ${C.border}`,fontSize:9,color:C.muted,lineHeight:1.6}}>
                {Object.entries(diag).map(([k,v])=>(
                  <div key={k} style={{display:"flex",justifyContent:"space-between",gap:8}}>
                    <span>{k}</span>
                    <b style={{color:C.text,textAlign:"right"}}>{String(v)}</b>
                  </div>
                ))}
              </div>
            )}
            {/* 🛠 설정 도우미: 생성된 해시 + 복사 버튼 */}
            {notConfigured&&genHash&&(
              <div style={{marginTop:10,padding:"10px",borderRadius:9,
                background:C.mintLight,border:`1px solid ${C.mint}`}}>
                <div style={{fontSize:9,fontWeight:800,color:C.mintDark,marginBottom:5}}>
                  {"✅ 아래 한 줄을 index.html 의 MASTER_HASH 자리에 붙여넣으세요"}
                </div>
                <div style={{fontSize:8,color:C.text,wordBreak:"break-all",lineHeight:1.5,
                  background:"#fff",padding:"7px",borderRadius:6,userSelect:"all"}}>
                  {'const MASTER_HASH = "' + genHash + '";'}
                </div>
                <button onClick={copyLine}
                  style={{width:"100%",marginTop:7,padding:"8px",borderRadius:8,border:"none",
                    background:copied?C.mintDark:C.navy,color:"#fff",
                    fontWeight:800,fontSize:10,cursor:"pointer"}}>
                  {copied?"✅ 복사됨":"📋 복사하기"}
                </button>
                <div style={{fontSize:8,color:C.muted,marginTop:6,lineHeight:1.5}}>
                  {"붙여넣고 재배포하면 이 암호로 잠금이 열립니다. 암호 원문은 코드에 남지 않습니다."}
                </div>
              </div>
            )}

            <div style={{display:"flex",gap:8,marginTop:14}}>
              <button onClick={()=>{setAsk(false);setShowPw(false);}}
                style={{flex:1,padding:"10px",borderRadius:9,border:`1px solid ${C.border}`,
                  background:"#fff",color:C.muted,fontWeight:700,fontSize:11,cursor:"pointer"}}>
                {"Abbrechen"}
              </button>
              <button onClick={notConfigured ? makeHash : submit} disabled={busy||!pw}
                style={{flex:1,padding:"10px",borderRadius:9,border:"none",
                  background:pw?`linear-gradient(135deg,${C.navy},#1a2b38)`:"#e5e5e5",
                  color:pw?"#fff":C.muted,fontWeight:800,fontSize:11,
                  cursor:(busy||!pw)?"not-allowed":"pointer"}}>
                {busy?"…":(notConfigured?"해시 만들기":"OK")}
              </button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

  // 모든 운영 데이터를 삭제해 완전한 백지 상태로 초기화 (계정/PIN은 유지)
  // ═══════════════════════════════════════════════════════════

      lbl:"스케줄표",
      sub:"Dienstpläne · Schichtbörse · Planbilder",
      paths:()=>["schedule","planImage","freieSchichten","schichttausch",
        ...monthSuffixes().map(m=>"schedule_"+m),
        ...monthSuffixes().map(m=>"planImage_"+m)],
    },
  };

  async function runSelectiveReset(){
    const chosen = Object.keys(RESET_GROUPS).filter(k=>resetSel[k]);
    if(chosen.length===0){ setResetMsg("❌ Bitte mindestens eine Kategorie auswählen."); return; }
    if(!(window._fbDb&&window._fbRef&&window._fbRemove)){ setResetMsg("❌ Keine Verbindung zur Datenbank."); return; }
    // 🔐 최종 확인
    if(!window.confirm("선택한 데이터 범주가 영구히 삭제됩니다. 정말 진행하시겠습니까?\n\n· "
      + chosen.map(k=>RESET_GROUPS[k].lbl).join("\n· ")
      + (resetSel.accounts ? "" : "\n\n✅ 직원 계정 및 비밀번호는 보존됩니다."))) return;

    setResetting(true); setResetMsg("");
    try{
      // 선택된 그룹의 경로만 수집 (중복 제거)
      const paths=[...new Set(chosen.flatMap(k=>RESET_GROUPS[k].paths()))];
      // 🛡️ 방어: accounts 미선택 시 users 경로가 섞여 들어가는 것을 원천 차단
      const safePaths = resetSel.accounts ? paths : paths.filter(pth=>pth!=="users");
      await Promise.all(safePaths.map(pth=>
        window._fbRemove(window._fbRef(window._fbDb,pth)).catch(()=>{})));

      // localStorage 정리 (선택 범주에 해당하는 것만)
      try{
        if(resetSel.schedule){
          localStorage.removeItem("teeamo_schicht_draft_v2");
          localStorage.removeItem("teeamo_schicht_draft");
        }
        if(resetSel.records){
          Object.keys(localStorage).forEach(k=>{
            if(k.indexOf("teeamo_clock_")===0 || k.indexOf("teeamo_autoout_ack_")===0)
              localStorage.removeItem(k);
          });
        }
        if(resetSel.accounts){
          // PIN(비밀번호)은 계정 삭제를 선택했을 때만 함께 제거
          Object.keys(localStorage).forEach(k=>{
            if(k.indexOf("teeamo_pin")===0) localStorage.removeItem(k);
          });
        }
      }catch{}

      setResetMsg("✅ "+chosen.length+" Kategorie(n) gelöscht"
        +(resetSel.accounts?"":" · Konten & PINs bleiben erhalten")+". App wird neu geladen…");
      setTimeout(()=>{ try{ window.location.reload(); }catch{} }, 1500);
    }catch(e){
      setResetting(false);
      setResetMsg("❌ Fehler: "+(e.message||e));
    }
  }

  function changePIN() {
    const current = getPin(userKey);
    if (oldPin !== current) { setPinMsg("Aktuelle PIN falsch."); return; }
    if (!/^[0-9]{4}$/.test(newPin1)) { setPinMsg("PIN muss 4 Ziffern sein."); return; }
    if (newPin1 !== newPin2) { setPinMsg("PINs stimmen nicht überein."); return; }
    savePinFn(userKey, newPin1);
    setPinMsg("PIN geändert!");
    setOldPin(""); setNewPin1(""); setNewPin2("");
    setTimeout(() => { setPinMsg(""); setShowPinChange(false); }, 2000);
  }

  function saveName() {
    const nv = vorname.trim();
    if (!nv) return;
    // ⛔ 다른 직원이 이미 쓰는 이름은 막는다.
    //    두 사람이 같은 이름을 동시에 쓰면 근무표·기록이 누구 것인지
    //    구분할 방법이 없어진다(이름이 데이터 키로 쓰이기 때문).
    const taken = safeList(users).find(u => u.key !== userKey && sameNameStrict(u.vorname, nv));
    if (taken) {
      setSaveMsg("❌ „" + nv + "“ wird bereits verwendet. Tipp: mit Emoji unterscheiden, z.B. " + nv + " 🍓");
      setTimeout(() => setSaveMsg(""), 4000);
      return;
    }
    // 🏷 옛 이름을 별칭(aliases)으로 남긴다.
    //    근무표·기록은 이름 문자열을 키로 쓰기 때문에, 별칭이 없으면
    //    이름을 바꾼 순간 과거 근무가 다른 사람 것처럼 끊어져 버린다.
    setUsers(prev => applyRename(prev, userKey, nv));
    setSaveMsg("✅ Gespeichert!");
    setTimeout(() => setSaveMsg(""), 2000);
  }

  async function handleImpfUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) {
      setSaveMsg("❌ Datei zu groß (max. 10MB)");
      return;
    }
    const b64 = await new Promise(res => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.readAsDataURL(file);
    });
    setImpfDoc(b64);
    setUsers(prev => (Array.isArray(prev)?prev:[]).map(u =>
      u.key === userKey ? { ...u, infektionsschutz: b64 } : u
    ));
    setSaveMsg("✅ Bescheinigung hochgeladen!");
    setTimeout(() => setSaveMsg(""), 2500);
  }

  function deleteAccount() {
    const me = (Array.isArray(users)?users:[]).find(u=>u.key===userKey);
    deleteUserData(userKey, me?.vorname);
    setUsers(prev => (Array.isArray(prev)?prev:[]).filter(u => u.key !== userKey));
    onLogout();
  }

  const isPdf = impfDoc && impfDoc.startsWith("data:application/pdf");

    <div style={{position:"fixed",inset:0,background:C.bg,zIndex:500,overflowY:"auto"}}>
      {/*    */}
      {impfViewer && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.92)",zIndex:600,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <button onClick={()=>setImpfViewer(false)}
            style={{position:"absolute",top:20,right:20,background:"rgba(255,255,255,.15)",border:"none",borderRadius:10,padding:"8px 14px",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>
            {"✕ Schließen"}
          </button>
          {isPdf ? (
            <iframe src={impfDoc} style={{width:"92vw",height:"82vh",borderRadius:12,border:"none"}}/>
          ) : (
            <img src={impfDoc} alt="Bescheinigung" style={{maxWidth:"92vw",maxHeight:"82vh",borderRadius:12,objectFit:"contain"}}/>
          )}

      {/*  */}
      <div style={{...S.hdr,paddingBottom:20}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button onClick={onClose}
            style={{background:"rgba(255,255,255,.12)",border:"none",borderRadius:10,padding:"7px 12px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>

          </button>
          <div>

            <div style={{fontSize:11,opacity:.45}}>{user.vorname}</div>
          </div>
        </div>
      </div>

      <div style={{padding:"16px"}}>

        {/*    */}
        <div style={{...S.card,marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:800,color:C.text,marginBottom:10}}>{"✏️ Name ändern"}</div>
          <div style={{fontSize:9,color:C.muted,marginBottom:6}}>
            Tipp: Emoji erlaubt! z.B. <strong>{"Lena 🍓"}</strong> oder <strong>{"Alex 🐻"}</strong>
          </div>
          <input value={vorname} onChange={e=>setVorname(e.target.value)}
            placeholder="Vorname (mit Emoji)"
            style={{...S.input,fontSize:15,marginBottom:10}}/>
          {vorname&&<div style={{fontSize:11,color:C.mintDark,marginBottom:10}}>Vorschau: Hallo, {vorname}!</div>}
          <div style={{fontSize:9,color:C.muted,marginBottom:10}}>
            {"ℹ️ Der Name kann jederzeit hier geändert werden."}
          </div>
          <button onClick={saveName}
            style={{width:"100%",padding:"10px",borderRadius:9,border:"none",
              background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,
              color:"#fff",fontWeight:800,fontSize:12,cursor:"pointer"}}>
            Speichern

          {saveMsg&&<div style={{fontSize:11,marginTop:8,fontWeight:600,textAlign:"center",lineHeight:1.5,
            color:saveMsg.startsWith("❌")?C.red:C.mintDark}}>{saveMsg}</div>}
        </div>

        {/* PIN */}
        <div style={{...S.card,marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:800,color:C.text,marginBottom:8}}>{"🔑 PIN ändern"}</div>
          {!showPinChange ? (
            <button onClick={()=>setShowPinChange(true)}

              <div style={{display:"flex",gap:8,marginTop:4}}>
                <button onClick={()=>{setShowPinChange(false);setOldPin("");setNewPin1("");setNewPin2("");setPinMsg("");}}

                <button onClick={changePIN}
                  style={{flex:2,padding:"9px",borderRadius:9,border:"none",background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,color:"#fff",fontWeight:800,fontSize:11,cursor:"pointer"}}>
                  PIN speichern
                </button>
              </div>
              {pinMsg&&<div style={{fontSize:11,color:pinMsg.includes("geändert")?C.mintDark:C.red,marginTop:8,textAlign:"center",fontWeight:600}}>{pinMsg}</div>}

          )}
        </div>

        {/*     */}
        <div style={{...S.card,marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:800,color:C.text,marginBottom:4}}>{"🛡️ Bescheinigung von Infektionsschutzgesetz"}</div>

          </div>

          {impfDoc ? (

              <button onClick={()=>setImpfViewer(true)}

              </button>
            </div>
          ) : (
            <div>
              {/*     */}
              <div style={{padding:"16px",borderRadius:10,border:`2px dashed ${C.red}`,background:C.redLight,

                <div style={{fontSize:11,fontWeight:700,color:C.red,marginBottom:2}}>
                  Noch nicht hochgeladen
                </div>
                <div style={{fontSize:9,color:C.muted}}>

              <input type="file" accept="image/*,application/pdf" ref={fileRef}
                style={{display:"none"}} onChange={handleImpfUpload}/>
              <button onClick={()=>fileRef.current.click()}
                style={{width:"100%",padding:"12px",borderRadius:9,border:"none",
                  background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,
                  color:"#fff",fontWeight:800,fontSize:12,cursor:"pointer"}}>
                 Bescheinigung hochladen
              </button>
            </div>
          )}
        </div>

        {/* 🔗 임시 계정 매칭 (Zuweisen) — 관리자 전용 */}
        {isAdmin && (()=>{
          const registered = new Set((Array.isArray(users)?users:[]).map(u=>(u.vorname||"").toLowerCase()));
          const tempNames = Object.keys(schedForMatch||{})
            .filter(n=>n && !registered.has(n.toLowerCase()) && !MANAGERS.includes(n.toLowerCase()));
          const realEmps = (Array.isArray(users)?users:[]).filter(u=>!MANAGERS.includes(u.key)).sort(byName);
          return(
            <div style={{...S.card,marginBottom:12,border:`1px solid ${C.mint}`}}>
              <div style={{fontSize:12,fontWeight:800,color:C.mintDark,marginBottom:4}}>{"🔗 Temp-Konto zuweisen"}</div>
              <div style={{fontSize:10,color:C.muted,marginBottom:10,lineHeight:1.5}}>
                {"Im Dienstplan angelegte Temp-Namen (ohne echtes Konto) einem registrierten Konto zuordnen. Alle Schichten & Stempelzeiten werden übertragen."}
              </div>
              {zuweisenMsg&&<div style={{fontSize:11,fontWeight:700,color:C.mintDark,marginBottom:8}}>{zuweisenMsg}</div>}
              {tempNames.length===0 ? (

                  <select value={zuweisenSel[tn]||""} onChange={e=>setZuweisenSel(prev=>({...prev,[tn]:e.target.value}))}
                    style={{...S.input,flex:1,minWidth:0,fontSize:12,padding:"7px 8px",boxSizing:"border-box"}}>
                    <option value="">{"— Konto —"}</option>
                    {realEmps.map(u=><option key={u.key} value={u.vorname}>{u.vorname}{u.nachname?" "+u.nachname:""}</option>)}
                  </select>
                  <button onClick={async()=>{
                    const real=zuweisenSel[tn];
                    if(!real) return;
                    const target=safeList(users).find(u=>sameName(u.vorname,real));
                    await reassignTempName(tn, real, target?.key);
                    // 🏷 임시 이름을 별칭으로 등록 → 이후 이 직원이 이름을 바꿔도

              ))}

        {/* 🧹 데이터 초기화 — 🔐 마스터(개발자) 인증 시에만 렌더링.

          <div style={{...S.card,marginBottom:12,border:`1px solid ${C.red}`}}>

                    <input type="checkbox" checked={on}
                      onChange={e=>setResetSel(prev=>({...prev,[key]:e.target.checked}))}
                      style={{marginTop:2,width:16,height:16,accentColor:danger?C.red:C.mintDark,cursor:"pointer"}}/>
                    <div style={{flex:1,minWidth:0}}>

            {/* 🛡️ 계정 보존 안내 */}
            {!resetSel.accounts&&(
              <div style={{fontSize:10,color:C.mintDark,fontWeight:700,background:C.mintLight,
                borderRadius:9,padding:"8px 10px",marginBottom:10}}>
                {"🛡️ 직원 계정 및 비밀번호는 삭제되지 않고 100% 보존됩니다."}
              </div>
            )}
            <button onClick={runSelectiveReset}
              disabled={resetting||!Object.values(resetSel).some(Boolean)}
              style={{width:"100%",padding:"11px",borderRadius:9,border:"none",
                background:Object.values(resetSel).some(Boolean)
                  ? `linear-gradient(135deg,${C.red},#A8432E)` : "#e5e5e5",
                color:Object.values(resetSel).some(Boolean)?"#fff":C.muted,
                fontWeight:800,fontSize:12,
                cursor:(resetting||!Object.values(resetSel).some(Boolean))?"not-allowed":"pointer",
                opacity:resetting?0.7:1}}>
              {resetting?"⏳ Löschen…":"선택 항목 삭제"}
            </button>
          </div>
        )}

        {/*    */}
        <div style={{...S.card,marginBottom:12,border:`1px solid ${C.redLight}`}}>
          <div style={{fontSize:12,fontWeight:800,color:C.red,marginBottom:6}}>{"🗑 Konto löschen"}</div>
          <div style={{fontSize:10,color:C.muted,marginBottom:10}}>
            Diese Aktion kann nicht rückgängig gemacht werden.
          </div>
          {!deleteConfirm ? (
            <button onClick={()=>setDeleteConfirm(true)}
              style={{width:"100%",padding:"10px",borderRadius:9,border:`1.5px solid ${C.red}`,
                background:C.redLight,color:C.red,fontWeight:800,fontSize:12,cursor:"pointer"}}>

              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setDeleteConfirm(false)}

                    background:"#fff",color:C.muted,fontWeight:700,fontSize:11,cursor:"pointer"}}>

                    background:`linear-gradient(135deg,${C.red},#A8432E)`,
                    color:"#fff",fontWeight:800,fontSize:11,cursor:"pointer"}}>
                  Ja, löschen
                </button>
              </div>
            </div>
          )}
        </div>

        {/*  */}
        <div style={{marginBottom:30}}>
          <button onClick={onLogout}
            style={{width:"100%",padding:"12px",borderRadius:11,border:`1.5px solid ${C.border}`,
              background:"#fff",color:C.muted,fontWeight:700,fontSize:13,cursor:"pointer",marginBottom:6}}>
            Abmelden

          {/* 🕵️ 히든 마스터 게이트 — 겉보기엔 버전 표기, 3번 연타 시 암호창 */}
          <MasterGate/>
        </div>

      </div>
    </div>
  );
}

//  MITARBEITER 
function MitarbeiterView({userKey,users,setUsers,records,setRecords,antraege,setAntraege,onLogout,csvCtx,onSwitchToAdmin,hybridStaff}){

  // 🕒 근무 타이머: 출근 중(clockedIn)이고 Pause가 아닐 때만 1초씩 증가.

  const displayName=user.vorname;

  // 🌙 자동 강제 퇴근 배너: 내 이름으로 isAutoCheckedOut 기록이 있고, 아직

  const autoOutRec = (Array.isArray(records)?records:[]).find(r =>

    // 🔒 이미 신청(대기) 또는 승인된 Nachtragen이 있으면 배너를 더 이상 띄우지 않음

  const myAntraege=antraege.filter(a=>sameName(a.user,user.vorname));
  // 이번 달 records만
  const curMo2=(()=>{const d=new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Berlin"}));return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");})();
  // 📅 기본은 '이번 달'만 노출 → 새 달이 시작되면 자동으로 깔끔하게 비워진 상태로 시작.
  //    직원이 드롭다운에서 과거 달을 직접 고를 때만 지난 기록을 불러온다.

  const myAvailMonths = React.useMemo(()=>{

  const myMonthRecs=myRecs.filter(r=>r.date&&r.date.startsWith(viewMonth)&&r.aus);
  // 유형별 분류 (Nachtragen(사후 등록)도 정규 근무로 합산에 포함)

  const totalH=myBreakdown.total;

  const monthSummary=FILIALEN.map(f=>({f,h:myRecs.filter(r=>r.filiale===f&&r.aus).reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0)})).filter(x=>x.h>0);

  function handleEin(){

    //    ⏱ von 값은 위에서 캡처한 실제 도장 시각(inStr) 그대로 사용
    ensureEinspringenShift(user.vorname, today(), selFiliale, inStr);
    // 🚨 미출근 알림 자동 제거: 지각이라도 출근 도장을 찍으면 해당 날짜·직원 알림 삭제

  // ═══════════════════════════════════════════════════════════════
  //  ✏️ 출근 중 지점 / Arbeitstyp 변경
  //   실수로 잘못 고르고 출근했을 때, 퇴근하지 않고 바로 고칠 수 있다.
  //
  //   [핵심 1] 최초 출근 시각(ein)은 절대 건드리지 않는다.
  //            기존 record의 ein 값을 그대로 옮겨 담는다.
  //   [핵심 2] 새 출근 기록을 만들지 않는다. 진행 중인 record 하나의
  //            filiale / typ 필드만 갱신한다(중복 생성 방지).
  //            단, record id는 [직원·날짜·지점] 기반이라 지점이 바뀌면
  //            id도 바뀌어야 하므로 '옛 id 제거 + 같은 ein으로 새 id 저장'을
  //            한 번의 상태 갱신 안에서 원자적으로 처리한다.
  // ═══════════════════════════════════════════════════════════════
  async function changeActiveShift(newFiliale, newTyp){
    const date = today();
    const oldFil = clockFiliale || selFiliale;
    const fil = newFiliale || oldFil;
    const typ = typNorm(newTyp);
    if(sameFiliale(fil, oldFil) && typ === typNorm(clockTyp)) return;   // 바뀐 게 없음

    // 진행 중인 기록을 찾아 출근 시각을 확보한다 (없으면 화면 상태에서 복원)
    const cur = recordForShift(records, user.vorname, date, oldFil);
    const keepEin = (cur && cur.ein)
      || (clockInTime ? `${pad(clockInTime.getHours())}:${pad(clockInTime.getMinutes())}` : null);
    if(!keepEin){
      console.error("✏️ [changeActiveShift] 출근 시각을 찾을 수 없습니다.", { cur, clockInTime });
      return;
    }
    const oldId = cur?.id ?? sessionIdFor(user.vorname, date, oldFil);
    const newId = sessionIdFor(user.vorname, date, fil);

    console.log("✏️ [changeActiveShift]", {
      von:{ filiale:oldFil, typ:typNorm(clockTyp), id:oldId },
      nach:{ filiale:fil, typ, id:newId },
      출근시각_유지:keepEin
    });

    // 1) record 갱신 — 옛 세션 제거 + 동일한 ein으로 새 세션 저장 (중복 없음)
    setRecords(prev=>{
      const list = (Array.isArray(prev)?prev:[]).filter(r=>r && r.id!==oldId && r.id!==newId);
      const base = cur ? {...cur} : { user:user.vorname, date, note:"" };
      return [...list, {
        ...base,
        id:newId,
        user:user.vorname, date,
        filiale:fil,
        typ,                       // Arbeitstyp 갱신
        ein:keepEin,               // ⏱ 출근 시각 그대로 유지
        aus:null                   // 아직 근무 중
      }];
    });
    // 옛 세션 노드가 남지 않도록 DB에서도 직접 제거 (지점이 바뀐 경우)
    if(oldId !== newId && window._fbDb && window._fbRef && window._fbRemove){
      try{ await window._fbRemove(window._fbRef(window._fbDb, "records/"+oldId)); }
      catch(e){ console.error("✏️ [changeActiveShift] 옛 record 제거 실패:", e, { oldId }); }
    }

    // 2) 화면 상태 갱신 — 출근 시각(clockInTime)은 건드리지 않는다
    setClockFiliale(fil);
    setSelFiliale(fil);
    setClockTyp(typ);

    // 3) 자동 생성된 대타 근무표 정리
    //    지점이 바뀌었으면 옛 지점의 자동 스케줄을 지우고 새 지점에 다시 만든다.
    //    (관리자가 직접 짠 계획은 autoCreated가 아니므로 건드리지 않는다)
    try{
      if(!sameFiliale(fil, oldFil)) await removeAutoShift(user.vorname, date, oldFil);
      await ensureEinspringenShift(user.vorname, date, fil, keepEin);
    }catch(e){
      console.error("✏️ [changeActiveShift] 근무표 동기화 실패:", e);
    }
  }

  // ⚡ 현재 진행 중인 근무가 Einspringen(대타)인지 판별
  //    ① 저장된 record의 typ  ② 근무표가 자동 생성(autoCreated)된 대타인지
  //    ③ 출근 시 선택한 Arbeitstyp — 순서로 확인
  function isEinspringenSession(){
    const fil = clockFiliale || selFiliale, date = today();
    const rec = recordForShift(records, user.vorname, date, fil);
    if(rec && rec.typ) return typNorm(rec.typ)==="einspringen";
    const arr = !scheduleData[user.vorname] ? []
      : (Array.isArray(scheduleData[user.vorname]) ? scheduleData[user.vorname]
                                                   : Object.values(scheduleData[user.vorname]));
    const sh = arr.find(x=>(x.d||x.date)===date && sameFiliale(x.f||x.filiale, fil));
    if(sh && (sh.autoCreated || typNorm(sh.typ)==="einspringen")) return true;
    return typNorm(clockTyp)==="einspringen";
  }

  // 오늘 예정 근무의 종료 시각(분) — 조기 퇴근 판정용
  function getPlannedEndMin(){
    const name=user.vorname, date=today(), fil=clockFiliale||selFiliale;
    const arr=!scheduleData[name]?[]:Array.isArray(scheduleData[name])?scheduleData[name]:Object.values(scheduleData[name]);
    // 🔒 지금 근무 중인 '그 지점'의 계획만 본다 (같은 날 다른 지점 계획과 혼동 방지)
    const sh=arr.find(s=>(s.d||s.date)===date && sameFiliale(s.f||s.filiale, fil))
          || arr.find(s=>(s.d||s.date)===date && !(s.f||s.filiale));
    // ⚡ 대타 자동 생성분(autoCreated)의 bis는 임시값(20:00)이므로 조기퇴근 기준이 될 수 없다
    if(!sh || sh.autoCreated || typNorm(sh.typ)==="einspringen") return null;
    const tm=sh&&(sh.t||sh.time);
    if(!tm||!tm.includes("-")) return null;
    return parseMinutes(tm.split("-")[1]);
  }
  // 실제 퇴근 처리: 임시 record 제거 + 완료 record 저장 (Pause 정산 + 조기퇴근 prüfen/사유 반영)
  function finishAus(inStr, outStr, isFrueh, gr){
    // 🔒 퇴근도 '출근했던 그 지점의 세션'만 종료한다.
    //    (기존엔 user+date만 봐서 오전 ONIGIRI 퇴근이 오후 TEEnJOY 근무까지
    //     Feierabend로 만들고 시간이 중복 계상되던 치명적 버그)
    const fil = clockFiliale || selFiliale;
    const tempId=sessionIdFor(user.vorname, today(), fil);
    const existRec=(Array.isArray(records)?records:[]).find(r=>r.id===tempId)
      || recordForShift(records, user.vorname, today(), fil);
    // 🧋 퇴근 시에도 출근 때 저장된 Arbeitstyp을 그대로 승계 (없으면 현재 선택값)
    const typ=typNorm(existRec?.typ||clockTypRef.current||clockTyp);
    let finalPauseSec=totalPauseSec;
    if(isPaused&&pauseStart){ finalPauseSec+=Math.floor((Date.now()-pauseStart.getTime())/1000); }
    const finalId=Date.now();
    const completed={id:finalId,user:user.vorname,date:today(),filiale:fil,ein:inStr,aus:outStr,
      note:(isFrueh?gr:grund)||"", typ, pauseSec:finalPauseSec,
      prüfen:isFrueh?true:false, frühGrund:isFrueh?(gr||""):""};
    setRecords(prev=>{
      // 이 지점 세션(임시/기존)만 제거 — 다른 지점 근무 기록은 그대로 유지
      const filtered=(Array.isArray(prev)?prev:[]).filter(r=>
        r.id!==tempId && !(existRec && r.id===existRec.id));
      return [...filtered,completed];
    });
    // 🔄 대타 자동 생성 스케줄이라면 예정 퇴근시간(임시 20:00)을 실제 퇴근시간으로 보정
    syncAutoShiftEnd(user.vorname, today(), fil, inStr, outStr);
    // 임시(aus:null) record 노드 직접 제거 → 관리자 화면 즉시 Aktiv 해제
    if(window._fbDb&&window._fbRef&&window._fbRemove){
      window._fbRemove(window._fbRef(window._fbDb,"records/"+tempId)).catch(()=>{});
    }
    setClockedIn(false);setClockInTime(null);setElapsed(0);setGrund("");setModal(null);
    // 🔁 다음 출근 때 다시 고르도록 초기화 (지점 미선택 · Arbeitstyp Regulär)
    setClockTyp("normal");setSelFiliale("");setClockFiliale("");setEditShift(false);
    setIsPaused(false);setPauseStart(null);setTotalPauseSec(0);
    setFruehData(null);setFruehGrund("");
    try{localStorage.removeItem(CLOCK_KEY);}catch{}
  }
