function DienstplanUploadView({ records, users }) {
  const [apiKey, setApiKey] = usePersist("teeamo_apikey", "");
  const [schedule, setSchedule, scheduleReady] = useFirebase("schedule", {});
  const [imgSrc, setImgSrc] = useState(null);
  const [analyzing, setAnalyzing] = useState(false);
  const [msg, setMsg] = useState(null);
  const [showKeyInput, setShowKeyInput] = useState(false);
  const fileRef = useRef(null);

  const [planImg, setPlanImg, planReady] = useFirebase("planImage", null);

  async function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (!apiKey) { setShowKeyInput(true); return; }

    if (file.type === "image/heic" || file.type === "image/heif" || file.name.toLowerCase().endsWith(".heic")) {
      setMsg({ type: "err", text: "\u274C HEIC \uD615\uC2DD\uC740 \uC9C0\uC6D0\uB418\uC9C0 \uC54A\uC544\uC694. JPEG\uB85C \uBCC0\uD658 \uD6C4 \uC5C5\uB85C\uB4DC\uD574\uC8FC\uC138\uC694." });
      return;
    }

    const isPdf = file.type === "application/pdf";

    const maxSize = isPdf ? 20 * 1024 * 1024 : 5 * 1024 * 1024;
    if (file.size > maxSize) {
      setMsg({ type: "err", text: `❌ Datei zu groß (${(file.size/1024/1024).toFixed(1)}MB). Max: ${isPdf?"20MB":"5MB"}` });
      return;
    }

    setAnalyzing(true);
    setMsg({ type: "info", text: "\u23F3 Analysiere\u2026 (kann 20\u201340 Sek. dauern)" });

    const b64 = await new Promise(res => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(",")[1]);
      r.readAsDataURL(file);
    });
    const dataUrl = isPdf ? null : `data:${file.type};base64,${b64}`;
    if (!isPdf) setImgSrc(dataUrl);

    const empNames = (Array.isArray(users)?users:[]).filter(u =>{" !MANAGERS.includes(u.key)).map(u => u.vorname).join(", ");
    const promptText = `Du bist ein Assistent, der Dienstpl\u00E4ne analysiert. Analysiere diesen Dienstplan sehr sorgf\u00E4ltig.

WICHTIG: Erkenne nur Namen aus dieser exakten Liste (Gro\u00DF-/Kleinschreibung ignorieren):
$"}{empNames}

Regeln:
- Jeder Name in der Liste entspricht GENAU einem Mitarbeiter. Ordne gefundene Namen der Liste zu (auch bei leichten Schreibfehlern im Bild).
- Filialen: "Arkaden" oder "TEEAMO Arkaden" → "TEEAMO Arkaden"; "Aegidiimarkt" oder "Aegidiimarkt" oder ähnlich → "TEEAMO Aegidiimarkt"; "Teenjoy" oder "TEEnJOY" → "Teenjoy"
- Datum: Jahr ${new Date().getFullYear()}, Format YYYY-MM-DD
- Zeit: Format HH:MM-HH:MM (z.B. "09:00-17:00"), null wenn nicht angegeben
- Ignoriere Namen die NICHT in der obigen Liste sind

Antworte NUR mit validem JSON, ohne jeglichen anderen Text, keine Markdown-Backticks:
{"VornameGenauWieInListe":[{"d":"YYYY-MM-DD","f":"TEEAMO Arkaden","t":"09:00-17:00"}]}

Verwende die Vornamen EXAKT so wie sie in der Liste stehen.`;

    const contentBlock = isPdf
      ? { type: "document", source: { type: "base64", media_type: "application/pdf", data: b64 } }
      : { type: "image", source: { type: "base64", media_type: file.type, data: b64 } };

    try {
      let res;
      try {
        res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": apiKey,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true",
          },
          body: JSON.stringify({
            model: "claude-sonnet-4-6",
            max_tokens: 8000,
            messages: [{
              role: "user",
              content: [ contentBlock, { type: "text", text: promptText } ]
            }]
          })
        });
      } catch(fetchErr) {
        throw new Error(`Netzwerkfehler: ${fetchErr.message}. Bitte API-Schlüssel prüfen und erneut versuchen.`);
      }

      if (!res.ok) {
        let errBody = "";
        try { const j = await res.json(); errBody = j.error?.message || JSON.stringify(j); } catch{}
        throw new Error(`API ${res.status}: ${errBody}`);
      }
      const data = await res.json();
      const text = data.content.map(c => c.text || "").join("");
      const clean = text.replace(/```json|```/g, "").trim();
      let parsed;
      try {
        const raw = JSON.parse(clean);
        parsed = {};
        for (const [name, shifts] of Object.entries(raw)) {
          parsed[name] = (shifts || []).map(s => ({
            date: s.date || s.d,
            filiale: s.filiale || s.f,
            time: s.time || s.t || null,
          }));
        }
      } catch(pe) {
        console.error("Raw response:", text);
        throw new Error(`Raw: ${text.slice(0, 200)}`);
      }

      const parsedForFb = {};
      for (const [name, shifts] of Object.entries(parsed)) {
        parsedForFb[name] = Object.fromEntries((shifts||[]).map((s,i)=>[String(i),s]));
      }
      if (window._fbDb && window._fbRef && window._fbSet) {
        window._fbSet(window._fbRef(window._fbDb, "schedule"), parsedForFb)
          .then(()=>console.log("\u2705 schedule saved:", Object.keys(parsedForFb)))
          .catch(e=>console.error("schedule save error:", e));
      }
      setSchedule(parsed);
      if (!isPdf && b64.length < 4000000) {
        setPlanImg(dataUrl);
      }
      setMsg({ type: "ok", text: `✅ Analyse abgeschlossen! ${Object.keys(parsed).length} Personen erfasst.` });
    } catch (err) {
      setMsg({ type: "err", text: `❌ 오류: ${err.message}` });
    }
    setAnalyzing(false);
  }

  const displayImg = imgSrc || planImg;

  return (
    <div style={{padding:"14px"}}>

      
      {showKeyInput && (
        <div style={{...S.card, marginBottom:12, border:`1.5px solid ${C.yellow}`}}>
          <div style={{fontSize:12,fontWeight:800,color:C.text,marginBottom:6}}>{"\u1F511 Anthropic API-Schl\u00FCssel"}</div>
          <input value={apiKey} onChange={e=>setApiKey(e.target.value)}
            placeholder="sk-ant-..."
            style={{...S.input, width:"100%", fontSize:11, marginBottom:8}}/>
          <button onClick={()=>setShowKeyInput(false)}
            style={{width:"100%",padding:"9px",borderRadius:9,border:"none",background:C.mint,color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}}>
            Speichern
          </button>
        </div>
      )}

      
      <div style={{...S.card, marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:800,color:C.text,marginBottom:4}}>{"\u1F4CB Dienstplan hochladen"}</div>
        <div style={{fontSize:10,color:C.muted,marginBottom:12}}>{"Bild hochladen \u2192 KI analysiert automatisch die Schichten"}</div>
        <input ref={fileRef} type="file" accept="image/jpeg,image/png,image/webp,image/gif,application/pdf" onChange={handleFile} style={{display:"none"}}/>
        <button onClick={()=>fileRef.current.click()} disabled={analyzing}
          style={{width:"100%",padding:"12px",borderRadius:11,border:`2px dashed ${C.mint}`,
            background:C.mintLight,color:C.mintDark,fontWeight:800,fontSize:13,cursor:"pointer",
            opacity:analyzing?0.6:1}}>
          {analyzing ? "\u23F3 KI analysiert\u2026" : "\uD83D\uDCF7 Bild oder PDF ausw\u00E4hlen & analysieren"}
        </button>
        {!apiKey&&(
          <button onClick={()=>setShowKeyInput(true)}
            style={{marginTop:8,width:"100%",padding:"7px",borderRadius:8,border:`1px solid ${C.border}`,background:"#fff",color:C.muted,fontSize:10,cursor:"pointer"}}>
            \uD83D\uDD11 API-Schl\u00FCssel eingeben
          </button>
        )}
        {apiKey&&(
          <button onClick={()=>setShowKeyInput(v=>!v)}
            style={{marginTop:8,width:"100%",padding:"7px",borderRadius:8,border:`1px solid ${C.border}`,background:"#fff",color:C.muted,fontSize:10,cursor:"pointer"}}>
            \uD83D\uDD11 API-Schl\u00FCssel \u00E4ndern
          </button>
        )}
        {msg&&(
          <div style={{marginTop:10,padding:"9px 12px",borderRadius:9,
            background:msg.type==="ok"?C.mintLight:C.redLight,
            color:msg.type==="ok"?C.mintDark:C.red,fontSize:11,fontWeight:600}}>
            {msg.text}
          </div>
        )}
      </div>

      
      {displayImg && (
        <div style={{marginBottom:12}}>
          <img src={displayImg} alt="Dienstplan"
            style={{width:"100%",height:"auto",borderRadius:14,display:"block"}}/>
        </div>
      )}

      
      {schedule && Object.keys(schedule).length > 0 && (
        <div>
          <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:9,textTransform:"uppercase",letterSpacing:".05em"}}>
            Extrahierte Schichten
          </div>
          {Object.entries(schedule).map(([name, shifts]) => {
            if (!Array.isArray(shifts) || shifts.length === 0) return null;
            return (
              <div key={name} style={{...S.card, marginBottom:10}}>
                <div style={{fontSize:13,fontWeight:800,color:C.text,marginBottom:8}}>{name}</div>
                {shifts.map((s, i) => {
                  const actualRec = records.find(r => r.user === name && r.date === s.date);
                  const status = !actualRec ? "ausstehend" : !actualRec.aus ? "aktiv" : "erledigt";
                  return (
                    <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",
                      padding:"8px 10px",borderRadius:9,marginBottom:5,
                      background:status==="erledigt"?C.mintLight:status==="aktiv"?"#FFF9E6":C.bg}}>
                      <div>
                        <div style={{fontSize:11,fontWeight:700,color:C.text}}>
                          {new Date(s.date).toLocaleDateString("de-DE",{weekday:"short",day:"numeric",month:"numeric"})}
                        </div>
                        <div style={{fontSize:10,color:C.muted}}>{s.filiale}{s.time?` · ${s.time}`:""}</div>
                      </div>
                      <span style={{fontSize:9,fontWeight:700,padding:"3px 8px",borderRadius:99,
                        color:status==="erledigt"?C.mintDark:status==="aktiv"?C.yellow:C.muted,
                        background:status==="erledigt"?C.mintLight:status==="aktiv"?C.yellowLight:C.border}}>
                        {status==="erledigt"?"\u2705 Gearbeitet":status==="aktiv"?"\uD83D\uDFE1 Aktiv":"\u23F3 Ausstehend"}
                      </span>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

  const manager=safeUsers.find(u=>u.key===userKey)
    || {key:userKey, vorname:userKey?.split("_")[0]||"Manager", emoji:"", kuerzel:"M", role:"Admin"};
  const empList=safeUsers.filter(u=>!MANAGERS.includes(u.key)).sort((a,b)=>a.vorname.localeCompare(b.vorname));
  const todayRecs=records.filter(r=>r.date===today());
  const getStatus=name=>{const r=todayRecs.find(x=>x.user===name);if(!r||!r.ein)return"Nicht erschienen";if(!r.aus||r.aus==="")return"Aktiv";return"Feierabend";};

  const sBg=s=>s==="Aktiv"?C.mintLight:s==="Feierabend"?"#F0F0F0":C.redLight;

  const [freieSchichten, setFreieSchichten] = useFirebase("freieSchichten", []);

  const [fsTime, setFsTime] = useState("");
  const [fsNote, setFsNote] = useState("");

  const pendingNotifs = Object.entries(notifications||{})
    .filter(([,n]) => n.zustaendig === userKey && !n.gelesen && !n.bearbeitetVon)
    .sort((a,b) => b[1].ts - a[1].ts);

  const handledByOther = Object.entries(notifications||{})
    .filter(([,n]) => n.zustaendig === userKey && !n.gelesen && n.bearbeitetVon && n.bearbeitetVon !== userKey);

  const offeneNachtraege = antraege.filter(a => a.status==="offen");

  const alarmCount = pendingNotifs.length + offeneNachtraege.length;

  const myArchiv = Object.entries(archiv||{})
    .filter(([,a]) => a.bearbeitetVon === userKey || a.zustaendig === userKey)
    .sort((a,b) => b[1].ts - a[1].ts);

  function markRead(key) {
    setNotifications(prev => ({ ...(prev||{}), [key]: { ...(prev[key]||{}), gelesen: true } }));
  }
  function deleteArchiv(key) {
    if (window._fbDb && window._fbRef && window._fbSet) {
      const { [key]: _, ...rest } = (archiv||{});
      window._fbSet(window._fbRef(window._fbDb, "archiv"), rest || {}).catch(e=>console.error(e));
    }
  }
  function addFreieSchicht() {
    if (!fsDate) return;
    setFreieSchichten(prev => [...(Array.isArray(prev)?prev:[]), {
      id: Date.now(), date: fsDate, filiale: fsFiliale, time: fsTime||null, note: fsNote, besetzt: false
    }]);
    setFsTime(""); setFsNote("");
  }

  function handleTausch(notifKey, n, ok) {
    const antrag = (Array.isArray(tauschAntraege)?tauschAntraege:[]).find(a=>a.id===n.antragId);

    if (ok && antrag) {
      if (window._fbDb && window._fbRef && window._fbSet && window._fbOnValue) {
        window._fbOnValue(window._fbRef(window._fbDb, "schedule"), snap => {
          const raw = snap.val() ? JSON.parse(JSON.stringify(snap.val())) : {};
          const norm = (v) => !v ? [] : Array.isArray(v) ? v : Object.values(v);
          const sched = {};
          for (const [k,v] of Object.entries(raw)) sched[k] = norm(v);
          sched[antrag.initiator] = (sched[antrag.initiator]||[])
            .filter(s => (s.d||s.date) !== antrag.initiatorDate);
          sched[antrag.initiator] = [...(sched[antrag.initiator]||[]),
            {d: antrag.partnerDate, f: antrag.partnerFiliale, t: antrag.partnerTime||null}];
          sched[antrag.partner] = (sched[antrag.partner]||[])
            .filter(s => (s.d||s.date) !== antrag.partnerDate);
          sched[antrag.partner] = [...(sched[antrag.partner]||[]),
            {d: antrag.initiatorDate, f: antrag.initiatorFiliale, t: antrag.initiatorTime||null}];
          window._fbSet(window._fbRef(window._fbDb, "schedule"), sched).catch(e=>console.error(e));
        }, {onlyOnce:true});
      }
      setTauschAntraege(prev=>(Array.isArray(prev)?prev:[]).map(a=>
        a.id===n.antragId?{...a,status:"getauscht",partnerBestaetigt:true}:a));
    }

    const entscheidung = ok ? "genehmigt" : "abgelehnt";
    ["teddy","yeaji"].forEach(mgr => {
      const k = `${notifKey.replace(/_teddy$|_yeaji$/,"")}_${mgr}`;
      if (window._fbDb && window._fbRef && window._fbSet) {
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/bearbeitetVon`), userKey).catch(()=>{});
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/gelesen`), true).catch(()=>{});
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/entscheidung`), entscheidung).catch(()=>{});
      }
    });
    markRead(notifKey);

    if (window._fbDb && window._fbRef && window._fbSet) {
      window._fbSet(window._fbRef(window._fbDb, `archiv/${notifKey}`), {
        ...n, entscheidung, bearbeitetVon: userKey, archiviertTs: Date.now(), gelesen: true
      }).catch(e=>console.error(e));
    }
    setTab("antraege"); setATab("tausch");
  }

  function handleAbsagenNotif(notifKey, n, ok) {
    const empName = n.userName || n.user;
    if (ok) {
      setSchedule(prev => {
        const updated = {...(prev||{})};
        if (updated[empName]) updated[empName] = updated[empName].filter(s=>(s.d||s.date)!==n.date);
        return updated;
      });
      setFreieSchichten(prev => [...(Array.isArray(prev)?prev:[]), {
        id: Date.now(), date: n.date, filiale: n.filiale,
        time: n.time||null, note: `Abgesagt von ${empName}`, besetzt: false
      }]);
    }
    setAbsagenList(prev=>(Array.isArray(prev)?prev:[]).map(a=>
      a.id===n.absageId?{...a,status:ok?"genehmigt":"abgelehnt"}:a));

    const entscheidung = ok ? "genehmigt" : "abgelehnt";
    ["teddy","yeaji"].forEach(mgr => {
      const k = `absagen_${n.absageId}_${mgr}`;
      if (window._fbDb && window._fbRef && window._fbSet) {
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/bearbeitetVon`), userKey).catch(()=>{});
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/gelesen`), true).catch(()=>{});
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/entscheidung`), entscheidung).catch(()=>{});
      }
    });
    markRead(notifKey);
    if (n.absageId) {
      setAbsagenList(prev => {
        const list = Array.isArray(prev)?prev:[];
        if (!list.find(a=>a.id===n.absageId)) {
          return [...list, {id:n.absageId, userName:empName, user:empName, date:n.date, filiale:n.filiale, time:n.time, grund:n.grund||"", status:ok?"genehmigt":"abgelehnt"}];
        }
        return list;
      });
    }
    if (window._fbDb && window._fbRef && window._fbSet) {
      window._fbSet(window._fbRef(window._fbDb, `archiv/${notifKey}`), {
        ...n, entscheidung, bearbeitetVon: userKey, archiviertTs: Date.now(), gelesen: true
      }).catch(e=>console.error(e));
    }
    setTab("antraege"); setATab("absage");
  }

  function handleNachtragNotif(notifKey, n, ok) {
    setAntraege(prev=>prev.map(a=>a.id===n.antragId?{...a,status:ok?"genehmigt":"abgelehnt"}:a));
    const entscheidung = ok ? "genehmigt" : "abgelehnt";
    ["teddy","yeaji"].forEach(mgr => {
      const k = `nachtrag_${n.antragId}_${mgr}`;
      if (window._fbDb && window._fbRef && window._fbSet) {
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/bearbeitetVon`), userKey).catch(()=>{});
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/gelesen`), true).catch(()=>{});
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/entscheidung`), entscheidung).catch(()=>{});
      }
    });
    markRead(notifKey);
    if (n.antragId) {
      setAntraege(prev => {
        const list = Array.isArray(prev)?prev:[];

        }
        return list;

    }
    if (window._fbDb && window._fbRef && window._fbSet) {
      window._fbSet(window._fbRef(window._fbDb, `archiv/${notifKey}`), {
        ...n, entscheidung, bearbeitetVon: userKey, archiviertTs: Date.now(), gelesen: true

    setTab("antraege"); setATab("nachtrag");
  }

    markRead(notifKey);

            <div style={{fontSize:11,opacity:.5,marginTop:1}}>Admin</div>
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
            <button onClick={()=>setShowMgrSettings(true)}
              style={{background:"rgba(255,255,255,.12)",border:"0.5px solid rgba(255,255,255,.2)",borderRadius:10,padding:"8px",cursor:"pointer",fontSize:20,lineHeight:1}}>
              \u2699\uFE0F
            </button>
            <button onClick={onLogout}
              style={{fontSize:10,background:"rgba(255,255,255,.08)",border:"0.5px solid rgba(255,255,255,.2)",color:"rgba(255,255,255,.65)",borderRadius:7,padding:"4px 10px",cursor:"pointer"}}>
              Abmelden
            </button>
          </div>
        </div>
        
        {!manager?.infektionsschutz&&(
          <div style={{fontSize:10,color:"#ffb347",fontWeight:700,marginTop:8}}>
            \u26A0\uFE0F Bitte Bescheinigung von Infektionsschutzgesetz hochladen
          </div>
        )}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginTop:14}}>
          {[{l:"Aktiv",n:empList.filter(u=>getStatus(u.vorname)==="Aktiv").length,c:C.mint},
            {l:"Feierabend",n:empList.filter(u=>getStatus(u.vorname)==="Feierabend").length,c:"rgba(255,255,255,.4)"},
            {l:"Nicht da",n:empList.filter(u=>getStatus(u.vorname)==="Nicht erschienen").length,c:C.red}].map(({l,n,c})=>(
            <div key={l} style={{background:"rgba(255,255,255,.07)",borderRadius:11,padding:"9px 10px",textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:800,color:c}}>{n}</div>
              <div style={{fontSize:9,opacity:.45,marginTop:1}}>{l}</div>
            </div>
          ))}
        </div>
      </div>

      
      {tab==="uebersicht"&&!detailKey&&(
        <UebersichtAllTab
          empList={empList}
          schedule={schedule}
          records={records}
          getStatus={getStatus}
          sColor={sColor}
          sBg={sBg}
          setDetailKey={setDetailKey}
          setDeleteConfirm={setDeleteConfirm}
          uTab={uTab}
          setUTab={setUTab}
        />
      )}

      {tab==="uebersicht"&&detailKey&&(
        <EmpDetailView
          empKey={detailKey}
          safeUsers={safeUsers}
          records={records}
          setRecords={setRecords}
          getStatus={getStatus}
          sColor={sColor}
          sBg={sBg}
          setDetailKey={setDetailKey}
          setUsers={setUsers}
          monthAccordion={monthAccordion}
          setMonthAccordion={setMonthAccordion}
          delRecordConfirm={delRecordConfirm}
          setDelRecordConfirm={setDelRecordConfirm}
        />}
      )}

      
      {tab==="dienstplan"&&(
        <AdminDienstplanView
          records={records}
          users={users}
          userKey={userKey}
          manager={manager}
          csvCtx={csvCtx}
          schedule={schedule}
        />
      )}

      
      {tab==="antraege"&&(
        <AntraegeTab
          antraege={antraege}
          setAntraege={setAntraege}
          tauschAntraege={tauschAntraege}
          absagenList={absagenList}
          setAbsagenList={setAbsagenList}
          records={records}
          setRecords={setRecords}
          aTab={aTab}
          setATab={setATab}
          openAId={openAId}
          setOpenAId={setOpenAId}
        />
      )}

      
      {tab==="statistik"&&<StatistikTab records={records} users={users}/>}

      
      {tab==="benachrichtigungen"&&(
        <div style={{padding:"14px"}}>

          
          <div style={{...S.card,marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:800,color:C.text,marginBottom:10}}>{"\u2795 Freie Schicht eintragen"}</div>
            <div style={{display:"flex",gap:8,marginBottom:8,alignItems:"flex-end"}}>
              <div>
                <div style={{fontSize:9,color:C.muted,marginBottom:3}}>Datum</div>
                <input type="date" value={fsDate} onChange={e=>setFsDate(e.target.value)}
                  style={{...S.input,width:"auto",minWidth:0,fontSize:12}}/>
              </div>
              <div>
                <div style={{fontSize:9,color:C.muted,marginBottom:3}}>Uhrzeit</div>
                <input type="time" value={fsTime} onChange={e=>setFsTime(e.target.value)}
                  style={{...S.input,width:"auto",minWidth:0,fontSize:12}}/>
              </div>
            </div>
            <div style={{marginBottom:8}}>
              <div style={{fontSize:9,color:C.muted,marginBottom:3}}>Filiale</div>
              <div style={{display:"flex",gap:6}}>
                {FILIALEN.map(f=>(
                  <button key={f} onClick={()=>setFsFiliale(f)}
                    style={{flex:1,padding:"7px 2px",borderRadius:8,fontSize:9,fontWeight:700,cursor:"pointer",
                      border:`2px solid ${fsFiliale===f?C.mint:C.border}`,
                      background:fsFiliale===f?C.mintLight:"#fff",
                      color:fsFiliale===f?C.mintDark:C.muted}}>
                    {f.replace("TEEAMO ","")}
                  </button>
                ))}
              </div>
            </div>
            <input value={fsNote} onChange={e=>setFsNote(e.target.value)} placeholder="Hinweis (optional)"
              style={{...S.input,width:"100%",marginBottom:8}}/>
            <button onClick={addFreieSchicht}
              style={{width:"100%",padding:"10px",borderRadius:9,border:"none",
                background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,
                color:"#fff",fontWeight:800,fontSize:12,cursor:"pointer"}}>
              Schicht ver\u00F6ffentlichen
            </button>
          </div>

          
          {(Array.isArray(freieSchichten)?freieSchichten:[]).length>0&&(
            <div style={{marginBottom:14}}>
              <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:".05em"}}>{"Ver\u00F6ffentlichte Schichten"}</div>
              {(Array.isArray(freieSchichten)?freieSchichten:[]).map(s=>(
                <div key={s.id} style={{...S.card,marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontSize:11,fontWeight:700,color:C.text}}>{new Date(s.date).toLocaleDateString("de-DE",{weekday:"short",day:"numeric",month:"numeric"})}</div>
                    <div style={{fontSize:10,color:C.muted}}>{s.filiale}{s.time?` · ${s.time}`:""}</div>
                    {s.note&&<div style={{fontSize:9,color:C.muted}}>{s.note}</div>}
                  </div>
                  <button onClick={()=>setFreieSchichten(prev=>(Array.isArray(prev)?prev:[]).filter(x=>x.id!==s.id))}
                    style={{fontSize:10,color:C.red,border:`1px solid ${C.red}`,borderRadius:6,padding:"3px 8px",background:C.redLight,cursor:"pointer"}}>
                    L\u00F6schen
                  </button>
                </div>
              ))}
            </div>
          )}

          
          {(pendingNotifs.length>0||offeneNachtraege.length>0) ? (
            <div style={{marginBottom:14}}>
              <div style={{fontSize:10,fontWeight:700,color:C.red,marginBottom:10,textTransform:"uppercase",letterSpacing:".05em"}}>
                \uD83D\uDD14 Offene Vorg\u00E4nge ({pendingNotifs.length+offeneNachtraege.length})
              </div>

              
              {offeneNachtraege.map(a=>(
                <div key={a.id} style={{...S.card,marginBottom:10,border:`1.5px solid ${C.yellow}`}}>
                  <div style={{fontSize:11,fontWeight:800,color:C.yellow,marginBottom:4}}>{"\uD83D\uDD50 Nachtrag \u00B7 "}{a.user}</div>
                  <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:2}}>
                    {new Date(a.date).toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"})}
                  </div>
                  <div style={{fontSize:10,color:C.muted,marginBottom:2}}>{a.filiale} \u00B7 {a.ein} \u2013 {a.aus}</div>
                  <div style={{fontSize:11,color:C.text,background:C.bg,borderRadius:8,padding:"7px 9px",marginBottom:10}}>{"\uD83D\uDCCC ""}{a.grund}"</div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>approveNachtrag(a.id,false)}
                      style={{flex:1,padding:"9px",borderRadius:9,border:`1px solid ${C.border}`,background:"#fff",color:C.muted,fontWeight:700,fontSize:11,cursor:"pointer"}}>Ablehnen</button>
                    <button onClick={()=>approveNachtrag(a.id,true)}
                      style={{flex:2,padding:"9px",borderRadius:9,border:"none",background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,color:"#fff",fontWeight:800,fontSize:11,cursor:"pointer"}}>{"\u2705 Genehmigen"}</button>
                  </div>
                </div>
              ))}

              
              {pendingNotifs.map(([key,n])=>renderAlarmCard(key,n))}
            </div>
          ) : (
            <div style={{...S.card,textAlign:"center",padding:"24px 16px",marginBottom:14}}>
              <div style={{fontSize:24,marginBottom:6}}>{"\u2705"}</div>
              <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:4}}>Alles erledigt!</div>
              <div style={{fontSize:11,color:C.muted}}>{"Keine offenen Vorg\u00E4nge."}</div>
            </div>
          )}

          
          {myArchiv.length>0&&(
            <div style={{marginBottom:14}}>
              <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:".05em"}}>
                \u2705 Erledigt ({myArchiv.length})
              </div>
              {myArchiv.map(([key,a])=>renderErledigtCard(key,a))}
            </div>
          )}
        </div>
      )}

      
      <div style={S.nav}>
        {[{id:"uebersicht",icon:"\uD83D\uDC65",lbl:"\u00DCbersicht"},
          {id:"dienstplan",icon:"\uD83D\uDCCB",lbl:"Dienstplan"},
          {id:"antraege",icon:"\uD83D\uDCC2",lbl:"Antr\u00E4ge"},
          {id:"benachrichtigungen",icon:"\uD83D\uDD14",lbl:`Alarm${alarmCount>0?" ("+alarmCount+")":""}` },
          {id:"statistik",icon:"\uD83D\uDCCA",lbl:"Statistik"}].map(t=>(
          <button key={t.id} onClick={()=>{setTab(t.id);setDetailKey(null);}} style={{flex:1,border:"none",background:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"3px 0",position:"relative"}}>
            <div style={{position:"relative",display:"inline-block"}}>
              <span style={{fontSize:19}}>{t.icon}</span>
              {t.id==="benachrichtigungen"&&alarmCount>0&&(
                <span style={{position:"absolute",top:-4,right:-6,minWidth:16,height:16,borderRadius:99,
                  background:C.red,color:"#fff",fontSize:9,fontWeight:800,
                  display:"flex",alignItems:"center",justifyContent:"center",padding:"0 3px",lineHeight:1}}>
                  {alarmCount}
                </span>
              )}
            </div>
            <span style={{fontSize:9,fontWeight:600,color:tab===t.id?C.mintDark:C.muted}}>{t.lbl}</span>
            {tab===t.id&&<div style={{width:16,height:2,background:C.mint,borderRadius:99}}/>}
          </button>
        ))}
      </div>

      {deleteConfirm&&(()=>{
        const empToDel=safeUsers.find(u=>u.key===deleteConfirm);
        return(
          <div style={{position:"fixed",inset:0,background:"rgba(20,20,20,.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:"24px"}}>
            <div style={{background:C.card,borderRadius:18,padding:"24px 22px",width:"100%",maxWidth:340,boxShadow:"0 8px 32px rgba(0,0,0,.18)"}}>
              <div style={{width:48,height:48,borderRadius:"50%",background:C.redLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,margin:"0 auto 14px"}}>{"\u1F5D1"}</div>
              <div style={{fontSize:16,fontWeight:800,color:C.text,textAlign:"center",marginBottom:6}}>{"Konto l\u00F6schen?"}</div>
              <div style={{fontSize:12,color:C.muted,textAlign:"center",marginBottom:20}}>
                Das Konto von <strong style={{color:C.text}}>{empToDel?.vorname}</strong>{" wird dauerhaft gel\u00F6scht. Diese Aktion kann nicht r\u00FCckg\u00E4ngig gemacht werden."}
              </div>
              <div style={{display:"flex",gap:9}}>
                <button onClick={()=>setDeleteConfirm(null)} style={{flex:1,padding:"12px",borderRadius:11,border:`1.5px solid ${C.border}`,background:C.card,color:C.muted,fontWeight:700,fontSize:13,cursor:"pointer"}}>Abbrechen</button>
                <button onClick={()=>{setUsers(prev=>(Array.isArray(prev)?prev:[]).filter(u=>u.key!==deleteConfirm));setDeleteConfirm(null);setDetailKey(null);}}
                  style={{flex:1,padding:"12px",borderRadius:11,border:"none",background:`linear-gradient(135deg,${C.red},#A8432E)`,color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}}>{"L\u00F6schen"}</button>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );

function App(){
  const [screen,setScreen]=useState("login");
  const [userKey,setUserKey]=useState(null);
  const { getPin, setPin, initPins } = usePinStore();

  const [users,    setUsers,    usersReady]    = useFirebase("users",    INIT_USERS);
  const [records,  setRecords,  recordsReady]  = useFirebase("records",  INIT_RECORDS);
  const [antraege, setAntraege, antraegeReady] = useFirebase("antraege", INIT_ANTRAEGE);
  const csvCtx = useDienstplanCSV();

  useEffect(() => { if (usersReady) initPins(INIT_USERS); }, [usersReady]);

  useEffect(() => {
    if (!usersReady) return;
    const arr = Array.isArray(users) ? users : [];
    if (arr.length === 0) return;

    const roleMap = {
      "Mitarbeiterin":"Staff","Mitarbeiter":"Staff",
      "Chefin":"Admin","Chef":"Admin",
      "Manager":"Admin","Managerin":"Admin",
    };

    let changed = false;
    const migrated = arr.map(u => {
      const patch = {};
      if (roleMap[u.role]) { patch.role = roleMap[u.role]; }
      if (u.infektionsschutz === undefined) patch.infektionsschutz = null;
      if (u.contractHours   === undefined) patch.contractHours   = 0;
      if (u.nachname        === undefined) patch.nachname        = "";
      if (u.emoji           === undefined) patch.emoji           = "";
      if (Object.keys(patch).length > 0) { changed = true; return {...u, ...patch}; }
      return u;
    });

    if (changed) {
      setUsers(migrated);
    }
  }, [usersReady]);

  const [splashDone, setSplashDone] = useState(false);
  useEffect(() => {
    const t = setTimeout(() => setSplashDone(true), 2000);
    return () => clearTimeout(t);
  }, []);
  const allReady = usersReady && recordsReady && splashDone;

  function handleLogin(key){
    const u=(Array.isArray(users)?users:[]).find(x=>x.key===key);
    const isAdmin=MANAGERS.includes(key)||(u&&u.isAdmin);
    setUserKey(key);setScreen(isAdmin?"manager":"mitarbeiter");
  }
  function handleLogout(){setUserKey(null);setScreen("login");}

  function setUsersFirebase(updater) {
    setUsers(updater);
  }

  if(!allReady) return(
    <div style={{maxWidth:500,margin:"0 auto",minHeight:"100vh",background:"#fff",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>

      
      <div style={{
        position:"absolute",
        width:"min(88vw,420px)",height:"min(88vw,420px)",
        borderRadius:"50%",
        border:"2.5px solid #e0e0e0",
        top:"50%",left:"50%",
        transform:"translate(-50%,-50%)"
      }}/>
      <div style={{
        position:"absolute",
        width:"min(76vw,365px)",height:"min(76vw,365px)",
        borderRadius:"50%",
        border:"1.5px solid #ececec",
        top:"50%",left:"50%",
        transform:"translate(-50%,-50%)"
      }}/>

      
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",animation:"fadeIn .7s ease both",zIndex:1}}>

        
        <div style={{
          fontSize:"min(5.5vw,22px)",
          fontStyle:"italic",
          fontWeight:600,
          color:"#1a1a1a",
          letterSpacing:".01em",
          marginBottom:8
        }}>{"M\u00FCnster"}</div>

        
        <div style={{
          fontSize:"min(15vw,64px)",
          fontWeight:900,
          color:"#1a1a1a",
          letterSpacing:"-.02em",
          lineHeight:1,
          marginBottom:18
        }}>teeamo</div>

        
        <div style={{display:"flex",gap:"min(5vw,22px)",marginBottom:22}}>
          {[
            {color:"#9B2A2A"},
            {color:"#7A9BBF"},
            {color:"#C8A84B"},
          ].map(({color},i)=>(
            <svg key={i} width="min(9vw,38px)" height="min(9vw,38px)" viewBox="0 0 40 40" fill="none">
              <path d="M20 8 C20 8 13 4 9 9 C5 14 9 20 14 21 C10 24 8 30 13 33 C17 36 20 32 20 32 C20 32 23 36 27 33 C32 30 30 24 26 21 C31 20 35 14 31 9 C27 4 20 8 20 8Z" fill={color}/>
            </svg>
          ))}
        </div>

        
        <div style={{textAlign:"center",lineHeight:1.3}}>
          <div style={{
            fontSize:"min(4.5vw,18px)",
            fontStyle:"italic",
            fontWeight:500,
            color:"#1a1a1a",
            letterSpacing:".01em"
          }}>Love Tea</div>
          <div style={{
            fontSize:"min(4.5vw,18px)",
            fontStyle:"italic",
            fontWeight:500,
            color:"#1a1a1a"
          }}>and More</div>
        </div>
      </div>

      
      <div style={{position:"absolute",bottom:48,display:"flex",gap:8}}>
        {[0,1,2].map(i=>(
          <div key={i} style={{
            width:6,height:6,borderRadius:"50%",
            background:"#ccc",
            animation:"pulse 1.2s ease-in-out "+i*0.22+"s infinite"
          }}/>
        ))}
      </div>
    </div>
  );

  return(
    <div style={{maxWidth:500,margin:"0 auto",minHeight:"100vh",background:C.bg}}>
      {screen==="login"&&<LoginView onLogin={handleLogin} users={users} setUsers={setUsersFirebase} getPin={getPin} setPin={setPin} csvCtx={csvCtx}/>}
      {screen==="mitarbeiter"&&<MitarbeiterView userKey={userKey} users={users} setUsers={setUsersFirebase} records={records} setRecords={setRecords} antraege={antraege} setAntraege={setAntraege} onLogout={handleLogout} csvCtx={csvCtx}/>}
      {screen==="manager"&&<ManagerView records={records} antraege={antraege} setAntraege={setAntraege} onLogout={handleLogout} userKey={userKey} users={users} setUsers={setUsersFirebase} csvCtx={csvCtx}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);




</script>
</body>
</html>
