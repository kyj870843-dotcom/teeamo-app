function AdminDienstplanView({ records, setRecords, users, userKey, manager, csvCtx, schedule, antraege, setAntraege, absagenList, setAbsagenList }) {
  const [viewMode, setViewMode] = useState("plan");
  const [openEmp, setOpenEmp] = useState(null);
  const [openDate, setOpenDate] = useState(null);
  const currentMonth=(()=>{
    const d=new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Berlin"}));
    return d.getFullYear()+"_"+String(d.getMonth()+1).padStart(2,"0");
  })();
  const [selMonth, setSelMonth] = useState(currentMonth);
  const empList = (Array.isArray(users)?users:[]).filter(u=>!MANAGERS.includes(u.key))
    .sort(byName);

  const norm = v => !v?[]:Array.isArray(v)?v:Object.values(v);

  // Firebase에서 월별 schedule 목록 로드
  const [allMonthSchedules, setAllMonthSchedules] = React.useState({});
  React.useEffect(()=>{
    if(!window._fbDb||!window._fbRef||!window._fbGet) return;
    // schedule_YYYY_MM 키들 찾기
    const months = ["2026_01","2026_02","2026_03","2026_04","2026_05","2026_06",
                    "2026_07","2026_08","2026_09","2026_10","2026_11","2026_12",
                    "2027_01","2027_02","2027_03","2027_04","2027_05","2027_06"];
    const promises = months.map(m=>
      window._fbGet(window._fbRef(window._fbDb,"schedule_"+m))
        .then(snap=>({m, data:snap.val()}))
        .catch(()=>({m,data:null}))
    );
    Promise.all(promises).then(results=>{
      const found={};
      results.forEach(({m,data})=>{ if(data) found[m]=data; });
      setAllMonthSchedules(found);
    });
  },[]);

  // 선택된 월의 schedule (월별 독립 — 다른 달 데이터 유출 없음)
  const activeSchedule = React.useMemo(()=>{
    const hasMonthly = Object.keys(allMonthSchedules).length > 0;
    if (!hasMonthly) return schedule||{};  // 초기: 월별 데이터 없으면 root 사용
    if (!selMonth) return {};
    const raw = allMonthSchedules[selMonth];
    if (!raw) return {};  // 해당 달 데이터 없음 → 빈 스케줄
    // Firebase object → array 변환
    const result={};
    for(const [name,shifts] of Object.entries(raw)){
      result[name]=Array.isArray(shifts)?shifts:Object.values(shifts||{});
    }
    return result;
  },[selMonth, allMonthSchedules, schedule]);

  // 사용 가능한 월 목록
  const availableMonths = React.useMemo(()=>{
    const months=Object.keys(allMonthSchedules);
    // 현재 schedule의 월도 추출
    const currentDates=Object.values(schedule||{}).flatMap(sh=>norm(sh).map(s=>s.date||s.d)).filter(Boolean);
    if(currentDates.length>0){
      const m=currentDates[0].slice(0,7).replace("-","_");
      if(!months.includes(m)) months.push(m);
    }
    return months.sort().reverse();
  },[allMonthSchedules, schedule]);

  // 선택된 schedule 기반 데이터
  const scheduleNames = Object.keys(activeSchedule).filter(name=>
    norm(activeSchedule[name]).length>0
  ).sort((a,b)=>a.localeCompare(b));

  const allNames = [...new Set([
    ...scheduleNames,
    ...empList.map(e=>e.vorname)
  ])].sort((a,b)=>a.localeCompare(b));

  const hasAccount = name => empList.some(e=>e.vorname===name);

  const allDates = [...new Set(
    allNames.flatMap(name => norm(activeSchedule[name]||[]).map(s=>s.date||s.d))
  )].filter(Boolean).sort((a,b)=>a.localeCompare(b));

  const todayStr = today();
  const nList = Array.isArray(antraege) ? antraege : [];
  const abList = Array.isArray(absagenList) ? absagenList : [];

  function approveNachtrag(a) {
    setAntraege(prev=>(Array.isArray(prev)?prev:[]).map(x=>x.id===a.id?{...x,status:"genehmigt"}:x));
    const newRec={id:Date.now(),user:a.user,date:a.date,filiale:a.filiale,ein:a.ein,aus:a.aus,note:a.grund||"",typ:"nachtrag"};
    if(window._fbDb&&window._fbRef&&window._fbPush)
      window._fbPush(window._fbRef(window._fbDb,"records"),newRec).catch(()=>{});
    setRecords(prev=>[...(Array.isArray(prev)?prev:[]),newRec]);
  }
  function rejectNachtrag(a) {
    setAntraege(prev=>(Array.isArray(prev)?prev:[]).map(x=>x.id===a.id?{...x,status:"abgelehnt"}:x));
  }
  function approveAbsage(a) {
    setAbsagenList(prev=>(Array.isArray(prev)?prev:[]).map(x=>x.id===a.id?{...x,status:"genehmigt"}:x));
  }
  function rejectAbsage(a) {
    setAbsagenList(prev=>(Array.isArray(prev)?prev:[]).map(x=>x.id===a.id?{...x,status:"abgelehnt"}:x));
  }

  function getEmpStatus(vorname) {
    const r = records.find(r=>r.user===vorname&&r.date===todayStr);
    if(!r) return null;
    return {ein:r.ein,aus:r.aus,filiale:r.filiale};
  }

  return (
    <div style={{paddingBottom:20}}>
      {/* 월 선택 */}
      {availableMonths.length>0&&(
        <div style={{padding:"12px 14px 0"}}>
          <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:".05em"}}>
            Monat auswählen
          </div>
          <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4}}>
            {availableMonths.map(m=>{
              const [yr,mo]=m.split("_");
              const label=new Date(yr+"-"+mo+"-01").toLocaleDateString("de-DE",{month:"long",year:"numeric"});
              const isActive=selMonth===m;
              return(
                <button key={m} onClick={()=>setSelMonth(m===availableMonths[0]&&!selMonth?null:m)}
                  style={{flexShrink:0,padding:"8px 14px",borderRadius:10,border:`1.5px solid ${isActive?C.navy:C.border}`,
                    background:isActive?C.navy:"#fff",color:isActive?"#fff":C.muted,
                    fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
                  {label}
                </button>
              );
            })}
          </div>
        </div>
      )}
      {/*   */}
      <div style={{display:"flex",gap:0,margin:"14px 14px 0",borderRadius:12,overflow:"hidden",border:`1px solid ${C.border}`}}>
        {[{id:"plan",l:"📋 Plan"},
          {id:"by_emp",l:"👤 Nach Mitarbeiter"},
          {id:"by_date",l:"📅 Nach Datum"}].map(({id,l})=>(
          <button key={id} onClick={()=>setViewMode(id)}
            style={{flex:1,padding:"10px 4px",border:"none",cursor:"pointer",fontSize:10,fontWeight:700,
              background:viewMode===id?C.navy:"#fff",
              color:viewMode===id?"#fff":C.muted,transition:"all .15s"}}>
            {l}
          </button>
        ))}
      </div>

      {/*    ( ) */}
      {viewMode==="plan"&&(
        <div style={{padding:"14px"}}>
          {!MANAGERS.includes(userKey)&&manager?.vorname&&(
            <div style={{marginBottom:12}}>
              <KalenderView csvCtx={csvCtx} userName={manager.vorname} records={records} users={users}/>
            </div>
          )}
          <DienstplanUploadView records={records} users={users} antraege={antraege} setAntraege={setAntraege} absagenList={absagenList} setAbsagenList={setAbsagenList} setRecords={setRecords} approveNachtrag={approveNachtrag} rejectNachtrag={rejectNachtrag} approveAbsage={approveAbsage} rejectAbsage={rejectAbsage}
            selMonth={selMonth}
            onScheduleSaved={(mk, pd) => {
              // allMonthSchedules 즉시 갱신 (Firebase 재로드 불필요)
              const fbFmt = Object.fromEntries(Object.entries(pd).map(([n,s])=>[n,Object.fromEntries((s||[]).map((x,i)=>[String(i),x]))]));
              setAllMonthSchedules(prev => ({...prev, [mk]: fbFmt}));
              setSelMonth(mk);  // 업로드한 달로 자동 전환
            }}/>
        </div>
      )}

      {/*    */}
      {viewMode==="by_emp"&&(
        <div style={{padding:"14px"}}>
          {allNames.map(name=>{
            const emp = empList.find(e=>e.vorname===name);
            const accountExists = !!emp;
            const shifts = norm(activeSchedule[name]||[])
              .filter(s=>s.date||s.d)
              .sort((a,b)=>(a.date||a.d).localeCompare(b.date||b.d));
            const isOpen = openEmp===(emp?emp.key:name);
            return (
              <React.Fragment key={emp?emp.key:name}>
              <div style={{...S.card,marginBottom:8,padding:0,overflow:"hidden"}}>
                <button onClick={()=>setOpenEmp(isOpen?null:(emp?emp.key:name))}
                  style={{width:"100%",padding:"12px 14px",background:"none",border:"none",cursor:"pointer",
                    display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:34,height:34,borderRadius:"50%",background:accountExists?C.navy:C.border,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:13,fontWeight:800,color:"#fff",flexShrink:0}}>
                      {emp?emp.kuerzel:name.slice(0,2)}
                    </div>
                    <div>
                      <div style={{fontSize:13,fontWeight:700,color:C.text}}>{name}</div>
                      {!accountExists&&<div style={{fontSize:9,color:C.muted}}>Kein Konto</div>}
                    </div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:10,color:C.muted,fontWeight:600}}>{shifts.length} Schichten</span>
                    <span style={{fontSize:12,color:C.muted}}>{isOpen ? "A" : "V"}</span>
                  </div>
                </button>
                {isOpen&&(
                  <div style={{borderTop:`1px solid ${C.border}`}}>

          {(()=>{
            // KW  
            function getKW(dateStr) {
              const d=new Date(dateStr);
              const jan1=new Date(d.getFullYear(),0,1);
              const dayOfYear=Math.floor((d-jan1)/86400000)+1;
              const dayOfWeek=jan1.getDay()||7;
              return Math.ceil((dayOfYear+dayOfWeek-1)/7);
            }
            function getMonthYear(dateStr) {
              const d=new Date(dateStr);
              return d.toLocaleDateString("de-DE",{month:"long",year:"numeric"});
            }
            // allDates  KW  
            const weeks={};
            allDates.forEach(d=>{

              const yr=new Date(d).getFullYear();
              const key=`${yr}-KW${String(kw).padStart(2,"0")}`;
              if(!weeks[key]) weeks[key]={kw,yr,dates:[]};
              weeks[key].dates.push(d);
            });
            const weekKeys=Object.keys(weeks).sort();
            const WOCHENTAGE=["So","Mo","Di","Mi","Do","Fr","Sa"];
            const WOCHENTAGE_LONG=["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];
            const todayStr=today();

            return weekKeys.map(wk=>{

                    const dow=new Date(d).getDay();

                    // schedule  
                    const allNamesForDay=Object.keys(schedule||{}).filter(name=>
                      (()=>{const arr=!schedule[name]?[]:Array.isArray(schedule[name])?schedule[name]:Object.values(schedule[name]);return arr.some(s=>(s.date||s.d)===d);})()

                    return(
                      <React.Fragment key={d}>

                                {WOCHENTAGE[dow]}
                              </span>
                              <span style={{fontSize:14,fontWeight:800,color:d===todayStr?"#fff":C.text}}>
                                {dayNum}.
                              </span>
                            </div>
                            <div>
                              <div style={{fontSize:13,fontWeight:800,color:C.text}}>

                                const sh=arr.find(s=>(s.date||s.d)===d);
                                return sh&&(sh.filiale||sh.f)===fil;
                              });
                              if(filNames.length===0) return null;
                              return(
                                <div key={fil}>
                                  <div style={{padding:"6px 14px",background:C.bg,fontSize:10,fontWeight:700,color:C.muted}}>

                      </div>
                      <NachMitarbeiterAntrag name={name} d={d} nList={nList} abList={abList}
                        approveNachtrag={approveNachtrag} rejectNachtrag={rejectNachtrag}
                        approveAbsage={approveAbsage} rejectAbsage={rejectAbsage}/>
                      </React.Fragment>
                    );
                  })}
                </div>
              );
            });
          })()}
        </div>
      )}
    </div>
  );
}

//  DIENSTPLAN UPLOAD + AI ANALYSE 
function DienstplanUploadView({ records, users, antraege, setAntraege, absagenList, setAbsagenList, setRecords, approveNachtrag, rejectNachtrag, approveAbsage, rejectAbsage, selMonth, onScheduleSaved }) {
  const nList = Array.isArray(antraege) ? antraege : [];
  const abList = Array.isArray(absagenList) ? absagenList : [];
  const [apiKey, setApiKey] = usePersist("teeamo_apikey", "");
  // 로컬 업로드 상태 (월별로 따로 관리)
  const [localImgSrc, setLocalImgSrc] = useState(null);  // 방금 업로드한 이미지 미리보기
  const [localImgMonth, setLocalImgMonth] = useState(null); // 어느 달 이미지인지
  const [analyzing, setAnalyzing] = useState(false);
  const [msg, setMsg] = useState(null);
  const [showKeyInput, setShowKeyInput] = useState(false);
  const fileRef = useRef(null);
  // 검수 보정 UI 상태
  const [pendingAnalysis, setPendingAnalysis] = useState(null);
  // schedule 변경 시 editRows 자동 초기화
  React.useEffect(()=>{
    if (pendingAnalysis) return;
    if (!schedule || Object.keys(schedule).length===0) return;
    const rows = [];
    for (const [name, rawShifts] of Object.entries(schedule)) {
      const shifts = Array.isArray(rawShifts)?rawShifts:Object.values(rawShifts||{});
      for (const s of shifts) {
        rows.push({id:Math.random().toString(36).slice(2),
          name, date:s.date||s.d||"", filiale:s.filiale||s.f||"", time:s.time||s.t||""});
      }
    }
    rows.sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:a.name<b.name?-1:1);
    setEditRows(rows);
  }, [selMonth, schedule, pendingAnalysis]);

  const [editRows, setEditRows] = useState([]);
  const [saving, setSaving] = useState(false);

  // 선택된 월의 plan 이미지 Firebase 로드
  const planImgKey = selMonth ? "planImage_"+selMonth : "planImage";
  const [planImg] = useFirebase(planImgKey, null);
  // 선택된 월의 schedule Firebase 로드
  const scheduleKey = selMonth ? "schedule_"+selMonth : "schedule";
  const [monthScheduleData] = useFirebase(scheduleKey, {});

  // 현재 표시할 이미지: 방금 업로드한 달과 선택된 달이 같으면 로컬, 아니면 Firebase
  const displayImg = (localImgSrc && localImgMonth === selMonth) ? localImgSrc : planImg;
  // 현재 표시할 schedule
  const schedule = monthScheduleData || {};

  //    
  async function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (!apiKey) { setShowKeyInput(true); return; }

    // HEIC/HEIF 
    if (file.type === "image/heic" || file.type === "image/heif" || file.name.toLowerCase().endsWith(".heic")) {
      setMsg({ type: "err", text: "❌ HEIC 형식은 지원되지 않아요. JPEG로 변환 후 업로드해주세요." });
      return;
    }

    const isPdf = file.type === "application/pdf";

    //    (PDF 20MB,  5MB)
    const maxSize = isPdf ? 20 * 1024 * 1024 : 5 * 1024 * 1024;
    if (file.size > maxSize) {
      setMsg({ type: "err", text: `❌ Datei zu groß (${(file.size/1024/1024).toFixed(1)}MB). Max: ${isPdf?"20MB":"5MB"}` });
      return;
    }

    setAnalyzing(true);
    setMsg({ type: "info", text: "⏳ Analysiere… (kann 20–40 Sek. dauern)" });

    const b64 = await new Promise(res => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(",")[1]);
      r.readAsDataURL(file);
    });

    // PDF → 이미지 변환 (PDF.js 사용)
    // PDF를 이미지로 변환하면 어떤 비율이든 완벽한 fit-to-contain 가능
    let dataUrl = isPdf ? null : `data:${file.type};base64,${b64}`;
    if (isPdf && window.pdfjsLib) {
      try {
        setMsg({ type:"info", text:"⏳ PDF wird in Bild umgewandelt…" });
        const pdfLib = window.pdfjsLib;
        pdfLib.GlobalWorkerOptions.workerSrc =
          "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        const raw = atob(b64);
        const bytes = new Uint8Array(raw.length);
        for (let i=0; i<raw.length; i++) bytes[i]=raw.charCodeAt(i);
        const pdf  = await pdfLib.getDocument({ data: bytes }).promise;
        const page = await pdf.getPage(1);
        // 3x 해상도로 고화질 렌더
        const viewport = page.getViewport({ scale: 3.0 });
        const canvas   = document.createElement("canvas");
        canvas.width   = viewport.width;
        canvas.height  = viewport.height;
        await page.render({ canvasContext: canvas.getContext("2d"), viewport }).promise;
        dataUrl = canvas.toDataURL("image/jpeg", 0.93);
        setMsg({ type:"info", text:"⏳ Analysiere… (kann 20–40 Sek. dauern)" });
      } catch(pdfErr) {
        console.warn("PDF→Image 변환 실패, PDF 원본 사용:", pdfErr);
        dataUrl = `data:application/pdf;base64,${b64}`;
      }
    }
    if (dataUrl) { setLocalImgSrc(dataUrl); setLocalImgMonth(selMonth); }

    const empNames = (Array.isArray(users)?users:[]).filter(u=>!MANAGERS.includes(u.key)).map(u=>u.vorname).join(", ");
    const curYear = new Date().getFullYear();

    // ── STEP A: PDF 텍스트 레이어 추출 ──────────────────────────
    let extractedText = "";
    if (isPdf && window.pdfjsLib) {
      try {
        setMsg({ type:"info", text:"Schritt 1/3: Textebene wird extrahiert..." });
        const pdfLib = window.pdfjsLib;
        pdfLib.GlobalWorkerOptions.workerSrc =
          "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        const rawB = atob(b64);
        const bytesB = new Uint8Array(rawB.length);
        for (let i=0;i<rawB.length;i++) bytesB[i]=rawB.charCodeAt(i);
        const pdfDoc = await pdfLib.getDocument({data:bytesB}).promise;
        const totalPages = Math.min(pdfDoc.numPages, 3);
        const pageTexts = [];
        for (let p=1; p<=totalPages; p++) {
          const pg = await pdfDoc.getPage(p);
          const tc = await pg.getTextContent();
          const items = tc.items.map(it=>({text:it.str, x:Math.round(it.transform[4]), y:Math.round(it.transform[5])}));
          const rowMap = {};
          items.forEach(it=>{const yk=Math.round(it.y/8)*8; if(!rowMap[yk])rowMap[yk]=[]; rowMap[yk].push(it);});
          const rows = Object.entries(rowMap)
            .sort((a,b)=>Number(b[0])-Number(a[0]))
            .map(([,cells])=>cells.sort((a,b)=>a.x-b.x).map(c=>c.text).join(" | "));
          pageTexts.push(rows.join("\n"));
        }
        extractedText = pageTexts.join("\n---\n");
        console.log("PDF Text:", extractedText.slice(0,500));
      } catch(e) { console.warn("Textextraktion fehlgeschlagen:", e); }
    }

    // ── STEP B: Chain-of-Thought API-Aufruf ──────────────────────
    setMsg({ type:"info", text:"Schritt 2/3: KI analysiert sorgfaeltig..." });
    const textSection = extractedText
      ? "\n\nDIREKT EXTRAHIERTER TEXT AUS PDF:\n" + extractedText + "\n"
      : "";

    const promptText = "Du bist ein praeziser Dienstplan-Analysator. Befolge diese Schritte EXAKT:\n\n"
      + "=== MITARBEITERLISTE (NUR diese Namen) ===\n" + empNames + "\n"
      + textSection
      + "\n=== SCHRITT 1: TABELLENSTRUKTUR ===\n"
      + "Beschreibe: Wie viele Spalten? Was steht in Spaltenkoepfen (Daten/Wochentage)? "
      + "Wie viele Zeilen? Was steht in Zeilenkoepfen?\n\n"
      + "=== SCHRITT 2: ZELLENWEISE AUSLESEN ===\n"
      + "Lies JEDE Zelle systematisch. Fuer jeden Namen aus der Liste:\n"
      + "Format: Name | Datum YYYY-MM-DD | Filiale | Zeit HH:MM-HH:MM\n"
      + "Filialen: Arkaden/TEEAMO Arkaden -> TEEAMO Arkaden | Aegidiimarkt/TEEAMO Aegidiimarkt -> TEEAMO Aegidiimarkt | Teenjoy/TEEnJOY/Teenjoy -> TEEnJOY\n"
      + "Jahr: " + curYear + "\n\n"
      + "=== SCHRITT 3: JSON AUSGABE ===\n"
      + "Antworte exakt so:\n"
      + "<analyse>\n[Deine Analyse aus Schritt 1 und 2]\n</analyse>\n"
      + "<json>\n"
      + '{"VornameExakt":[{"d":"YYYY-MM-DD","f":"TEEAMO Arkaden","t":"09:00-17:00"}]}\n'
      + "</json>\n\n"
      + "REGELN: Vornamen EXAKT wie in Liste. Datum YYYY-MM-DD. Zeit HH:MM-HH:MM oder null. "
      + "Namen NICHT in Liste ignorieren.";

    const contentBlock = dataUrl
      ? { type:"image", source:{type:"base64", media_type:"image/jpeg", data: dataUrl.split(",")[1]} }
      : { type:"document", source:{type:"base64", media_type:"application/pdf", data:b64} };

    try {
      let res;
      try {
        res = await fetch("https://api.anthropic.com/v1/messages", {
          method:"POST",
          headers:{
            "Content-Type":"application/json",
            "x-api-key":apiKey,
            "anthropic-version":"2023-06-01",
            "anthropic-dangerous-direct-browser-access":"true",
          },
          body: JSON.stringify({
            model:"claude-sonnet-4-6",
            max_tokens:8000,
            messages:[{role:"user", content:[contentBlock,{type:"text",text:promptText}]}]
          })
        });
      } catch(fe) {
        throw new Error("Netzwerkfehler: " + fe.message);
      }
      if (!res.ok) {
        let eb=""; try{const j=await res.json();eb=j.error?.message||JSON.stringify(j);}catch{}
        throw new Error("API " + res.status + ": " + eb);
      }
      const data = await res.json();
      const fullText = data.content.map(c=>c.text||"").join("");
      console.log("KI-Antwort:", fullText);

      let jsonStr = "";
      const jsonMatch = fullText.match(/<json>([\s\S]*?)<\/json>/i);
      if (jsonMatch) { jsonStr = jsonMatch[1].trim(); }
      else { const m=fullText.match(/\{[\s\S]*\}/); jsonStr=m?m[0]:""; }
      jsonStr = jsonStr.replace(/```json|```/g,"").trim();

      let parsed;
      try {
        const raw = JSON.parse(jsonStr);
        parsed = {};
        for (const [name, shifts] of Object.entries(raw)) {
          parsed[name] = (shifts||[]).map(s=>({
            date: s.date||s.d||"",
            filiale: s.filiale||s.f||"",
            time: s.time||s.t||null,
          })).filter(s=>s.date);
        }
      } catch(pe) {
        console.error("JSON Fehler:", jsonStr);
        throw new Error("JSON-Fehler: " + jsonStr.slice(0,200));
      }

      // ── STEP C: 검수 UI 진입 (즉시 저장 안 함) ────────────────
      // 직원 이름 퍼지 매칭: AI 오타를 등록된 직원으로 자동 보정
      const empVornamen = (Array.isArray(users)?users:[])
        .filter(u=>!MANAGERS.includes(u.key)).map(u=>u.vorname);
      function fuzzyMatchName(aiName) {
        if (!aiName) return aiName;
        // 1) 완전 일치 (대소문자 무시)
        const exact = empVornamen.find(n=>n.toLowerCase()===aiName.toLowerCase());
        if (exact) return exact;
        // 2) 포함 관계 (AI 이름이 등록 이름을 포함하거나 반대)
        const contains = empVornamen.find(n=>
          n.toLowerCase().includes(aiName.toLowerCase()) ||
          aiName.toLowerCase().includes(n.toLowerCase())
        );
        if (contains) return contains;
        // 3) 편집 거리(Levenshtein) 1~2이면 보정
        function lev(a,b){
          const m=a.length,n=b.length;
          const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i?j?0:i:j));
          for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
            dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
          return dp[m][n];
        }
        const byDist = empVornamen
          .map(n=>({n, d:lev(n.toLowerCase(), aiName.toLowerCase())}))
          .sort((a,b)=>a.d-b.d);
        if (byDist.length>0 && byDist[0].d<=2) return byDist[0].n;
        // 4) 매칭 없으면 AI 이름 그대로 (⚠ 경고 표시됨)
        return aiName;
      }

      const rows = [];
      for (const [name, shifts] of Object.entries(parsed)) {
        const correctedName = fuzzyMatchName(name);
        for (const s of shifts) {
          rows.push({ id:Math.random().toString(36).slice(2),
            name: correctedName,
            date:s.date, filiale:s.filiale, time:s.time||"" });
        }
      }
      rows.sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:a.name<b.name?-1:1);
      setPendingAnalysis({ parsed, dataUrl, selMonthAtTime: selMonth });
      setEditRows(rows);
      setMsg({ type:"review", text:"Analyse fertig! " + rows.length + " Schichten erkannt. Bitte pruefen." });
    } catch(err) {
      setMsg({ type:"err", text:"Fehler: " + err.message });
    }
    setAnalyzing(false);
  }

  // ── 검수 확인 후 Firebase 저장 ────────────────────────────────
  async function confirmAndSave() {
    if (!pendingAnalysis) return;
    setSaving(true);
    setMsg({ type:"info", text:"Wird gespeichert..." });

    const parsed = {};
    for (const row of editRows) {
      if (!row.name||!row.date) continue;
      if (!parsed[row.name]) parsed[row.name] = [];
      parsed[row.name].push({ date:row.date, filiale:row.filiale, time:row.time||null });
    }

    const parsedForFb = {};
    for (const [name,shifts] of Object.entries(parsed)) {
      parsedForFb[name] = Object.fromEntries((shifts||[]).map((s,i)=>[String(i),s]));
    }

    let saveMonthKey = pendingAnalysis.selMonthAtTime;
    if (!saveMonthKey) {
      const allDates = editRows.map(r=>r.date).filter(Boolean);
      if (allDates.length>0){
        const mc={};
        allDates.forEach(d=>{const m=d.slice(0,7).replace("-","_");mc[m]=(mc[m]||0)+1;});
        saveMonthKey=Object.entries(mc).sort((a,b)=>b[1]-a[1])[0][0];
      } else {
        const now=new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Berlin"}));

            <button onClick={()=>{

            {/* 데이터 없을 때 안내 */}
      {editRows.length === 0 && !analyzing && (

}

  const getBranch=name=>{const r=todayRecs.find(x=>x.user===name);return r?.filiale||null;};
  const sColor=s=>s==="Aktiv"?C.mintDark:s==="Feierabend"?C.muted:C.red;
  const sBg=s=>s==="Aktiv"?C.mintLight:s==="Feierabend"?"#F0F0F0":C.redLight;

  const [notifications, setNotifications] = useFirebase("notifications", {});
  const [tauschAntraege, setTauschAntraege] = useFirebase("schichttausch", []);
  const [freieSchichten, setFreieSchichten] = useFirebase("freieSchichten", []);
  const [absagenList, setAbsagenList] = useFirebase("absagen", []);
  const [schedule, setSchedule] = useFirebase("schedule", {});

  const [fsDate, setFsDate] = useState(today());
  const [fsFiliale, setFsFiliale] = useState(FILIALEN[0]);
  const [fsTimeFrom, setFsTimeFrom] = useState("");
  const [fsTimeTo, setFsTimeTo] = useState("");
  const [fsNote, setFsNote] = useState("");

  //     (Alarm  )
  const pendingNotifs = Object.entries(notifications||{})
    .filter(([,n]) => n.zustaendig === userKey && !n.gelesen && !n.bearbeitetVon)
    .sort((a,b) => b[1].ts - a[1].ts);

  //         ( )
  const handledByOther = Object.entries(notifications||{})
    .filter(([,n]) => n.zustaendig === userKey && !n.gelesen && n.bearbeitetVon && n.bearbeitetVon !== userKey);

  // Nachtrag(antraege) :   ,   
  const offeneNachtraege = antraege.filter(a => a.status==="offen");

  //  + Nachtraege  
  const alarmCount = pendingNotifs.length + offeneNachtraege.length;

  // Archiv ()
  const myArchiv = Object.entries(archiv||{})
    .filter(([,a]) => a.bearbeitetVon === userKey || a.zustaendig === userKey)
    .sort((a,b) => b[1].ts - a[1].ts);

  function markRead(key) {
    setNotifications(prev => ({ ...(prev||{}), [key]: { ...(prev[key]||{}), gelesen: true } }));
  }
  function deleteArchiv(key) {
    if (window._fbDb && window._fbRef && window._fbSet) {
      const { [key]: _, ...rest } = (archiv||{});
      window._fbSet(window._fbRef(window._fbDb, "archiv"), rest || {}).catch(e=>console.error(e));
    }
  }
  function addFreieSchicht() {
    if (!fsDate) return;
    setFreieSchichten(prev => [...(Array.isArray(prev)?prev:[]), {
      id: Date.now(), date: fsDate, filiale: fsFiliale, time: (fsTimeFrom&&fsTimeTo)?`${fsTimeFrom}-${fsTimeTo}`:fsTimeFrom||null, note: fsNote, besetzt: false
    }]);
    setFsTime(""); setFsNote("");
  }

  //    
  function handleTausch(notifKey, n, ok) {
    //      
    const antrag = (Array.isArray(tauschAntraege)?tauschAntraege:[]).find(a=>a.id===n.antragId);

    if (ok && antrag) {
      // schedule swap
      if (window._fbDb && window._fbRef && window._fbSet && window._fbOnValue) {
        window._fbOnValue(window._fbRef(window._fbDb, "schedule"), snap => {
          const raw = snap.val() ? JSON.parse(JSON.stringify(snap.val())) : {};
          // Firebase     
          const norm = (v) => !v ? [] : Array.isArray(v) ? v : Object.values(v);
          const sched = {};
          for (const [k,v] of Object.entries(raw)) sched[k] = norm(v);
          sched[antrag.initiator] = (sched[antrag.initiator]||[])
            .filter(s => (s.d||s.date) !== antrag.initiatorDate);
          sched[antrag.initiator] = [...(sched[antrag.initiator]||[]),
            {d: antrag.partnerDate, f: antrag.partnerFiliale, t: antrag.partnerTime||null, tauschMit: antrag.partner}];
          sched[antrag.partner] = (sched[antrag.partner]||[])
            .filter(s => (s.d||s.date) !== antrag.partnerDate);
          sched[antrag.partner] = [...(sched[antrag.partner]||[]),
            {d: antrag.initiatorDate, f: antrag.initiatorFiliale, t: antrag.initiatorTime||null, tauschMit: antrag.initiator}];
          window._fbSet(window._fbRef(window._fbDb, "schedule"), sched).catch(e=>console.error(e));
        }, {onlyOnce:true});
      }
      setTauschAntraege(prev=>(Array.isArray(prev)?prev:[]).map(a=>
        a.id===n.antragId?{...a,status:"getauscht",partnerBestaetigt:true}:a));
    }

    const entscheidung = ok ? "genehmigt" : "abgelehnt";
    //     bearbeitetVon 
    ["teddy","yeaji"].forEach(mgr => {
      const k = `${notifKey.replace(/_teddy$|_yeaji$/,"")}_${mgr}`;
      if (window._fbDb && window._fbRef && window._fbSet) {
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/bearbeitetVon`), userKey).catch(()=>{});
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/gelesen`), true).catch(()=>{});
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/entscheidung`), entscheidung).catch(()=>{});
      }
    });
    markRead(notifKey);

    // Archiv 
    if (window._fbDb && window._fbRef && window._fbSet) {
      window._fbSet(window._fbRef(window._fbDb, `archiv/${notifKey}`), {
        ...n, entscheidung, bearbeitetVon: userKey, archiviertTs: Date.now(), gelesen: true
      }).catch(e=>console.error(e));
    }
    // Antraege  
    setTab("antraege"); setATab("tausch");
  }

  function handleAbsagenNotif(notifKey, n, ok) {
    const empName = n.userName || n.user;
    if (ok) {
      setSchedule(prev => {
        const updated = {...(prev||{})};
        if (updated[empName]) updated[empName] = updated[empName].filter(s=>(s.d||s.date)!==n.date);
        return updated;
      });
      setFreieSchichten(prev => [...(Array.isArray(prev)?prev:[]), {
        id: Date.now(), date: n.date, filiale: n.filiale,
        time: n.time||null, note: `Abgesagt von ${empName}`, besetzt: false
      }]);
    }
    setAbsagenList(prev=>(Array.isArray(prev)?prev:[]).map(a=>
      a.id===n.absageId?{...a,status:ok?"genehmigt":"abgelehnt"}:a));

    const entscheidung = ok ? "genehmigt" : "abgelehnt";
    ["teddy","yeaji"].forEach(mgr => {
      const k = `absagen_${n.absageId}_${mgr}`;
      if (window._fbDb && window._fbRef && window._fbSet) {
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/bearbeitetVon`), userKey).catch(()=>{});
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/gelesen`), true).catch(()=>{});
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/entscheidung`), entscheidung).catch(()=>{});
      }
    });
    markRead(notifKey);
    // absagenList   (  list  )
    if (n.absageId) {
      setAbsagenList(prev => {
        const list = Array.isArray(prev)?prev:[];
        if (!list.find(a=>a.id===n.absageId)) {
          return [...list, {id:n.absageId, userName:empName, user:empName, date:n.date, filiale:n.filiale, time:n.time, grund:n.grund||"", status:ok?"genehmigt":"abgelehnt"}];
        }
        return list;
      });
    }
    if (window._fbDb && window._fbRef && window._fbSet) {
      window._fbSet(window._fbRef(window._fbDb, `archiv/${notifKey}`), {
        ...n, entscheidung, bearbeitetVon: userKey, archiviertTs: Date.now(), gelesen: true
      }).catch(e=>console.error(e));
    }
    // Antraege  
    setTab("antraege"); setATab("absage");
  }

  function handleNachtragNotif(notifKey, n, ok) {
    setAntraege(prev=>prev.map(a=>a.id===n.antragId?{...a,status:ok?"genehmigt":"abgelehnt"}:a));
    const entscheidung = ok ? "genehmigt" : "abgelehnt";
    ["teddy","yeaji"].forEach(mgr => {
      const k = `nachtrag_${n.antragId}_${mgr}`;
      if (window._fbDb && window._fbRef && window._fbSet) {
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/bearbeitetVon`), userKey).catch(()=>{});
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/gelesen`), true).catch(()=>{});
        window._fbSet(window._fbRef(window._fbDb, `notifications/${k}/entscheidung`), entscheidung).catch(()=>{});
      }
    });
    markRead(notifKey);
    // antraege   (  antraege  )
    if (n.antragId) {
      setAntraege(prev => {
        const list = Array.isArray(prev)?prev:[];
        if (!list.find(a=>a.id===n.antragId)) {
          return [...list, {id:n.antragId, user:n.user, date:n.date, filiale:n.filiale, ein:n.ein, aus:n.aus, grund:n.grund||"", status:ok?"genehmigt":"abgelehnt", typ:"nachtrag"}];
        }
        return list;
      });
    }
    if (window._fbDb && window._fbRef && window._fbSet) {
      window._fbSet(window._fbRef(window._fbDb, `archiv/${notifKey}`), {
        ...n, entscheidung, bearbeitetVon: userKey, archiviertTs: Date.now(), gelesen: true

      if (window._fbDb && window._fbRef && window._fbSet) {

              </div>
            </div>
            <input value={fsNote} onChange={e=>setFsNote(e.target.value)} placeholder="Hinweis (optional)"
              style={{...S.input,width:"100%",marginBottom:8}}/>
            <button onClick={addFreieSchicht}
              style={{width:"100%",padding:"10px",borderRadius:9,border:"none",
                background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,
                color:"#fff",fontWeight:800,fontSize:12,cursor:"pointer"}}>
              Schicht veröffentlichen
            </button>
          </div>

          {/*     */}
          {(Array.isArray(freieSchichten)?freieSchichten:[]).length>0&&(
            <div style={{marginBottom:14}}>
              <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:".05em"}}>{"Veröffentlichte Schichten"}</div>
              {(Array.isArray(freieSchichten)?freieSchichten:[]).map(s=>(
                <div key={s.id} style={{...S.card,marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontSize:11,fontWeight:700,color:C.text}}>{new Date(s.date).toLocaleDateString("de-DE",{weekday:"short",day:"numeric",month:"numeric"})}</div>
                    <div style={{fontSize:10,color:C.muted}}>{s.filiale}{s.time?` · ${s.time}`:""}</div>
                    {s.note&&<div style={{fontSize:9,color:C.muted}}>{s.note}</div>}
                  </div>
                  <button onClick={()=>setFreieSchichten(prev=>(Array.isArray(prev)?prev:[]).filter(x=>x.id!==s.id))}
                    style={{fontSize:10,color:C.red,border:`1px solid ${C.red}`,borderRadius:6,padding:"3px 8px",background:C.redLight,cursor:"pointer"}}>
                    Löschen
                  </button>
                </div>
              ))}
            </div>
          )}

          {/*    (Offene Vorgnge) */}
          {(pendingNotifs.length>0||offeneNachtraege.length>0) ? (
            <div style={{marginBottom:14}}>
              <div style={{fontSize:10,fontWeight:700,color:C.red,marginBottom:10,textTransform:"uppercase",letterSpacing:".05em"}}>
                {"🔔 Offene Vorgänge ({pendingNotifs.length+offeneNachtraege.length})"}
              </div>

              {/* Nachtrag (antraege ) */}
              {offeneNachtraege.map(a=>(
                <div key={a.id} style={{...S.card,marginBottom:10,border:`1.5px solid ${C.yellow}`}}>
                  <div style={{fontSize:11,fontWeight:800,color:C.yellow,marginBottom:4}}>{"🕐 Nachtrag · "}{a.user}</div>
                  <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:2}}>
                    {new Date(a.date).toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"})}
                  </div>
                  <div style={{fontSize:10,color:C.muted,marginBottom:2}}>{a.filiale} · {a.ein} – {a.aus}</div>
                  <div style={{fontSize:11,color:C.text,background:C.bg,borderRadius:8,padding:"7px 9px",marginBottom:10}}>{"📌"}{a.grund}"</div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>approveNachtrag(a.id,false)}
                      style={{flex:1,padding:"9px",borderRadius:9,border:`1px solid ${C.border}`,background:"#fff",color:C.muted,fontWeight:700,fontSize:11,cursor:"pointer"}}>Ablehnen</button>
                    <button onClick={()=>approveNachtrag(a.id,true)}
                      style={{flex:2,padding:"9px",borderRadius:9,border:"none",background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,color:"#fff",fontWeight:800,fontSize:11,cursor:"pointer"}}>{"✅ Genehmigen"}</button>
                  </div>
                </div>
              ))}

              {/*  (tausch/absage/einspringen/prufen) */}
              {pendingNotifs.map(([key,n])=>renderAlarmCard(key,n))}
            </div>
          ) : (
            <div style={{...S.card,textAlign:"center",padding:"24px 16px",marginBottom:14}}>
              <div style={{fontSize:24,marginBottom:6}}>{"✅"}</div>
              <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:4}}>Alles erledigt!</div>
              <div style={{fontSize:11,color:C.muted}}>{"Keine offenen Vorgänge."}</div>
            </div>
          )}

          {/*  Erledigt ( ,  ) */}
          {myArchiv.length>0&&(
            <div style={{marginBottom:14}}>
              <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:".05em"}}>
                {"✅ Erledigt ({myArchiv.length})"}
              </div>
              {myArchiv.map(([key,a])=>renderErledigtCard(key,a))}
            </div>
          )}
        </div>
      )}

      {/*  NAVIGATION  */}
      <div style={S.nav}>
        {[{id:"uebersicht",icon:"👥",lbl:"Übersicht"},
          {id:"dienstplan",icon:"📋",lbl:"Dienstplan"},
          {id:"antraege",icon:"📂",lbl:"Anträge"},
          {id:"benachrichtigungen",icon:"🔔",lbl:`Alarm${alarmCount>0?" ("+alarmCount+")":""}` },
          {id:"statistik",icon:"📊",lbl:"Statistik"}].map(t=>(
          <button key={t.id} onClick={()=>{setTab(t.id);setDetailKey(null);}} style={{flex:1,border:"none",background:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"3px 0",position:"relative"}}>
            <div style={{position:"relative",display:"inline-block"}}>
              <span style={{fontSize:19}}>{t.icon}</span>
              {t.id==="benachrichtigungen"&&alarmCount>0&&(
                <span style={{position:"absolute",top:-4,right:-6,minWidth:16,height:16,borderRadius:99,
                  background:C.red,color:"#fff",fontSize:9,fontWeight:800,
                  display:"flex",alignItems:"center",justifyContent:"center",padding:"0 3px",lineHeight:1}}>
                  {alarmCount}
                </span>
              )}
            </div>
            <span style={{fontSize:9,fontWeight:600,color:tab===t.id?C.mintDark:C.muted}}>{t.lbl}</span>
            {tab===t.id&&<div style={{width:16,height:2,background:C.mint,borderRadius:99}}/>}
          </button>
        ))}
      </div>

      {deleteConfirm&&(()=>{
        const empToDel=safeUsers.find(u=>u.key===deleteConfirm);
        return(
          <div style={{position:"fixed",inset:0,background:"rgba(20,20,20,.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:"24px"}}>
            <div style={{background:C.card,borderRadius:18,padding:"24px 22px",width:"100%",maxWidth:340,boxShadow:"0 8px 32px rgba(0,0,0,.18)"}}>
              <div style={{width:48,height:48,borderRadius:"50%",background:C.redLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,margin:"0 auto 14px"}}>{"🗑"}</div>
              <div style={{fontSize:16,fontWeight:800,color:C.text,textAlign:"center",marginBottom:6}}>{"Konto löschen?"}</div>
              <div style={{fontSize:12,color:C.muted,textAlign:"center",marginBottom:20}}>
                Das Konto von <strong style={{color:C.text}}>{empToDel?.vorname}</strong>{" wird dauerhaft gelöscht. Diese Aktion kann nicht rückgängig gemacht werden."}
              </div>
              <div style={{display:"flex",gap:9}}>
                <button onClick={()=>setDeleteConfirm(null)} style={{flex:1,padding:"12px",borderRadius:11,border:`1.5px solid ${C.border}`,background:C.card,color:C.muted,fontWeight:700,fontSize:13,cursor:"pointer"}}>Abbrechen</button>
                <button onClick={()=>{
                  const toDel=safeUsers.find(u=>u.key===deleteConfirm);
                  deleteUserData(deleteConfirm, toDel?.vorname);
                  setUsers(prev=>(Array.isArray(prev)?prev:[]).filter(u=>u.key!==deleteConfirm));
                  setDeleteConfirm(null);setDetailKey(null);}}
                  style={{flex:1,padding:"12px",borderRadius:11,border:"none",background:`linear-gradient(135deg,${C.red},#A8432E)`,color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}}>{"Löschen"}</button>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

//  APP ROOT 
function App(){
  const [screen,setScreen]=useState("login");
  React.useEffect(()=>{ loadPinsFromFirebase(); },[]);
  const [userKey,setUserKey]=useState(null);
  const { getPin, setPin, initPins } = usePinStore();

  //   Firebase  
  const [users,    setUsers,    usersReady]    = useFirebase("users",    INIT_USERS);
  const [records,  setRecords,  recordsReady]  = useFirebase("records",  INIT_RECORDS);
  const [antraege, setAntraege, antraegeReady] = useFirebase("antraege", INIT_ANTRAEGE);
  const csvCtx = useDienstplanCSV();

  // INIT_USERS PIN LS  1 
  useEffect(() => { if (usersReady) initPins(INIT_USERS); }, [usersReady]);

  //    :     
  useEffect(() => {
    if (!usersReady) return;
    const arr = Array.isArray(users) ? users : [];
    if (arr.length === 0) return;

    //   
    const roleMap = {
      "Mitarbeiterin":"Staff","Mitarbeiter":"Staff",
      "Chefin":"Admin","Chef":"Admin",
      "Manager":"Admin","Managerin":"Admin",
    };

    let changed = false;
    const migrated = arr.map(u => {
      const patch = {};
      // role 
      if (roleMap[u.role]) { patch.role = roleMap[u.role]; }
      //   
      if (u.infektionsschutz === undefined) patch.infektionsschutz = null;
      if (u.contractHours   === undefined) patch.contractHours   = 0;
      if (u.nachname        === undefined) patch.nachname        = "";
      if (u.emoji           === undefined) patch.emoji           = "";
      if (Object.keys(patch).length > 0) { changed = true; return {...u, ...patch}; }
      return u;
    });

    if (changed) {
      setUsers(migrated);
    }
  }, [usersReady]);

  const [splashDone, setSplashDone] = useState(false);
  useEffect(() => {
    const t = setTimeout(() => setSplashDone(true), 2000);
    return () => clearTimeout(t);
  }, []);
  const allReady = usersReady && recordsReady && splashDone;

  function handleLogin(key){
    const u=(Array.isArray(users)?users:[]).find(x=>x.key===key);
    const isAdmin=MANAGERS.includes(key)||(u&&u.isAdmin);
    setUserKey(key);setScreen(isAdmin?"manager":"mitarbeiter");
  }
  function handleLogout(){setUserKey(null);setScreen("login");}

  // users setUsers  Firebase   wrapper
  function setUsersFirebase(updater) {
    setUsers(updater);
  }

  if(!allReady) return(
    <div style={{maxWidth:500,margin:"0 auto",minHeight:"100vh",background:"#fff",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>

      {/*    -    */}
      <div style={{
        position:"absolute",
        width:"min(88vw,420px)",height:"min(88vw,420px)",
        borderRadius:"50%",
        border:"2.5px solid #e0e0e0",
        top:"50%",left:"50%",
        transform:"translate(-50%,-50%)"
      }}/>
      <div style={{
        position:"absolute",
        width:"min(76vw,365px)",height:"min(76vw,365px)",
        borderRadius:"50%",
        border:"1.5px solid #ececec",
        top:"50%",left:"50%",
        transform:"translate(-50%,-50%)"
      }}/>

      {/*   */}
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",animation:"fadeIn .7s ease both",zIndex:1}}>

        {/* Mnster  */}
        <div style={{
          fontSize:"min(5.5vw,22px)",
          fontStyle:"italic",
          fontWeight:600,
          color:"#1a1a1a",
          letterSpacing:".01em",
          marginBottom:8
        }}>{"Münster"}</div>

        {/* teeamo   */}
        <div style={{
          fontSize:"min(15vw,64px)",
          fontWeight:900,
          color:"#1a1a1a",
          letterSpacing:"-.02em",
          lineHeight:1,
          marginBottom:18
        }}>teeamo</div>

        {/* 3  (  / ) */}
        <div style={{display:"flex",gap:"min(5vw,22px)",marginBottom:22}}>
          {[
            {color:"#9B2A2A"},
            {color:"#7A9BBF"},
            {color:"#C8A84B"},
          ].map(({color},i)=>(
            <svg key={i} width="min(9vw,38px)" height="min(9vw,38px)" viewBox="0 0 40 40" fill="none">
              <path d="M20 8 C20 8 13 4 9 9 C5 14 9 20 14 21 C10 24 8 30 13 33 C17 36 20 32 20 32 C20 32 23 36 27 33 C32 30 30 24 26 21 C31 20 35 14 31 9 C27 4 20 8 20 8Z" fill={color}/>
            </svg>
          ))}
        </div>

        {/* Love Tea and More */}
        <div style={{textAlign:"center",lineHeight:1.3}}>
          <div style={{
            fontSize:"min(4.5vw,18px)",
            fontStyle:"italic",
            fontWeight:500,
            color:"#1a1a1a",
            letterSpacing:".01em"
          }}>Love Tea</div>
          <div style={{
            fontSize:"min(4.5vw,18px)",
            fontStyle:"italic",
            fontWeight:500,
            color:"#1a1a1a"
          }}>and More</div>
        </div>
      </div>

      {/*    */}
      <div style={{position:"absolute",bottom:48,display:"flex",gap:8}}>
        {[0,1,2].map(i=>(
          <div key={i} style={{
            width:6,height:6,borderRadius:"50%",
            background:"#ccc",
            animation:"pulse 1.2s ease-in-out "+i*0.22+"s infinite"
          }}/>
        ))}
      </div>
    </div>
  );

  return(
    <div style={{maxWidth:500,margin:"0 auto",minHeight:"100vh",background:C.bg}}>
      {screen==="login"&&<LoginView onLogin={handleLogin} users={users} setUsers={setUsersFirebase} getPin={getPin} setPin={setPin} csvCtx={csvCtx}/>}
      {screen==="mitarbeiter"&&<MitarbeiterView userKey={userKey} users={users} setUsers={setUsersFirebase} records={records} setRecords={setRecords} antraege={antraege} setAntraege={setAntraege} onLogout={handleLogout} csvCtx={csvCtx}/>}
      {screen==="manager"&&<ManagerView records={records} setRecords={setRecords} antraege={antraege} setAntraege={setAntraege} onLogout={handleLogout} userKey={userKey} users={users} setUsers={setUsersFirebase} csvCtx={csvCtx}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
