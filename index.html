              {/* 📅 과거 달 조회 필터 — 기본값은 항상 이번 달 */}
              <select value={viewMonth} onChange={e=>setViewMonth(e.target.value)}
                style={{...S.input,padding:"6px 8px",fontSize:11,fontWeight:700,borderRadius:8,
                  color:isCurrentMonth?C.text:C.yellow,
                  border:`1px solid ${isCurrentMonth?C.border:C.yellow}`}}>
                {myAvailMonths.map(m=>(
                  <option key={m} value={m}>{monthLabel(m)}{m===curMo2?" (aktuell)":""}</option>
                ))}
              </select>
            </div>

            {/* 🔒 과거 달 조회 안내 — Nachtragen 불가 */}
            {!isCurrentMonth&&(
              <div style={{background:C.yellowLight,border:`1px solid ${C.yellow}`,borderRadius:9,
                padding:"8px 10px",marginBottom:10,fontSize:10,color:"#92400e",lineHeight:1.5}}>
                {"🔒 Abgeschlossener Monat – nur zur Ansicht. Nachtragen ist nur im laufenden Monat möglich."}
                <button onClick={()=>setViewMonth(curMo2)}
                  style={{marginLeft:6,padding:"2px 8px",borderRadius:7,border:`1px solid ${C.yellow}`,
                    background:"#fff",color:"#92400e",fontSize:9,fontWeight:800,cursor:"pointer"}}>
                  {"Aktueller Monat"}
                </button>
              </div>
            )}

            {/* 총 합산 근무 시간 — 가장 크게 */}
            <div style={{textAlign:"center",padding:"12px 0 14px",borderBottom:`1px solid ${C.border}`,marginBottom:12}}>
              <div style={{fontSize:10,color:C.muted,marginBottom:4}}>Gesamt gearbeitet</div>
              <div style={{fontSize:28,fontWeight:900,color:C.navy,letterSpacing:"-.02em"}}>
                {fmtH(totalH)}
              </div>
            </div>

            {/* 유형별 분류 */}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                padding:"8px 10px",borderRadius:9,background:normalH>0?C.mintLight:"#f8f8f8"}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:14}}>🧋</span>
                  <span style={{fontSize:11,fontWeight:700,color:C.text}}>Regulär</span>
                </div>
                <span style={{fontSize:13,fontWeight:800,color:normalH>0?C.mintDark:C.muted}}>
                  {normalH>0?fmtH(normalH):"—"}
                </span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                padding:"8px 10px",borderRadius:9,background:einsprH>0?"#fef9c3":"#f8f8f8"}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:14}}>⚡</span>
                  <span style={{fontSize:11,fontWeight:700,color:C.text}}>Einspringen</span>
                </div>
                <span style={{fontSize:13,fontWeight:800,color:einsprH>0?"#92400e":C.muted}}>
                  {einsprH>0?fmtH(einsprH):"—"}
                </span>
              </div>
              {/* Pause 항목 — 총합에서 차감됨 표시 */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                padding:"8px 10px",borderRadius:9,
                background:pauseH>0?"#fff7ed":"#f8f8f8",
                border:pauseH>0?"1px solid #fed7aa":"none"}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:14}}>⏸️</span>
                  <div>
                    <span style={{fontSize:11,fontWeight:700,color:C.text}}>Pause</span>
                    <span style={{fontSize:9,color:C.muted,marginLeft:4}}>(erfasst)</span>
                  </div>
                </div>
                <span style={{fontSize:13,fontWeight:800,color:pauseH>0?"#ea580c":C.muted}}>
                  {pauseH>0?fmtH(pauseH):"—"}
                </span>
              </div>
            </div>

            {/* 📊 지점 → 근무타입 계층 breakdown (이번 달) */}
            <div style={{marginTop:14,paddingTop:12,borderTop:`1px solid ${C.border}`}}>
              <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:7,
                textTransform:"uppercase",letterSpacing:".05em"}}>{"Nach Filiale · Arbeitstyp"}</div>
              <BreakdownView recs={myMonthRecs} compact={true}/>
            </div>

            {totalH===0&&<div style={{fontSize:12,color:C.muted,textAlign:"center",marginTop:8}}>Noch keine Einträge diesen Monat.</div>}
          </div>
        </div>
      )}

      {tab==="dienstplan"&&(
        <div style={{padding:"14px"}}>
          <DienstplanKalender schedule={scheduleData} records={records} highlightName={user.vorname} users={users} setRecords={setRecords}/>
        </div>
      )}



      {tab==="schichtboerse"&&(()=>{
        // 탭 진입 시 Schichtbörse 알림 읽음 처리
        if(window._fbDb&&window._fbRef&&window._fbSet){
          Object.entries(_notifications||{})
            .filter(([,n])=>
              (n.type==="schichtboerse_new"||n.type==="schichtboerse_taken")&&
              n.zielUser===user.vorname&&!n.gelesen)
            .forEach(([k])=>
              window._fbSet(window._fbRef(window._fbDb,"notifications/"+k+"/gelesen"),true).catch(()=>{})
            );
        }
        return <SchichtboerseView userName={user.vorname} users={users} isAdmin={false}/>;
      })()}

      <div style={S.nav}>
        {[
          {id:"home",       icon:"🏠", lbl:"Startseite"},
          {id:"dienstplan", icon:"📋", lbl:"Dienstplan", badge: pendingTauschCount},
          {id:"schichtboerse",icon:"🔔", lbl:"Schichtbörse", badge:boerseBadge},
        ].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,border:"none",background:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"3px 0",position:"relative"}}>
            <div style={{position:"relative",display:"inline-block"}}>
              <span style={{fontSize:19}}>{t.icon}</span>
              {t.badge>0&&(
                <span style={{position:"absolute",top:-4,right:-6,minWidth:16,height:16,borderRadius:99,
                  background:C.red,color:"#fff",fontSize:9,fontWeight:800,
                  display:"flex",alignItems:"center",justifyContent:"center",padding:"0 3px",
                  lineHeight:1}}>
                  {t.badge}
                </span>
              )}
            </div>
            <span style={{fontSize:9,fontWeight:600,color:tab===t.id?C.mintDark:C.muted}}>{t.lbl}</span>
            {tab===t.id&&<div style={{width:16,height:2,background:C.mint,borderRadius:99}}/>}
          </button>
        ))}
      </div>

      {(modal==="ein"||modal==="aus")&&(
        <ClockModal
          modal={modal}
          now={now}
          selFiliale={selFiliale}
          clockFiliale={clockFiliale}
          clockInTime={clockInTime}
          grund={grund}
          CLOCK_KEY={CLOCK_KEY}
          onClose={()=>setModal(null)}
          onEin={(d)=>{
            // ⏱ 모달이 확정한 시각(d) 하나만을 진실의 원천으로 사용한다.
            const inStr = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
            const tempId = sessionIdFor(user.vorname, today(), selFiliale);
            // record를 여기서 확정 생성 → effect가 낡은 state로 다시 만들 여지를 없앤다
            setRecords(prev=>{
              const filtered=(Array.isArray(prev)?prev:[]).filter(r=>r.id!==tempId);
              return [...filtered,{id:tempId,user:user.vorname,date:today(),
                filiale:selFiliale,ein:inStr,aus:null,note:"",typ:typNorm(clockTyp)}];
            });
            setClockedIn(true);setClockInTime(d);setClockFiliale(selFiliale);setModal(null);
            // 🆘 대타 자동 스케줄 (ClockModal 경유 출근에도 동일 적용)
            ensureEinspringenShift(user.vorname, today(), selFiliale, inStr);
            if(window._fbDb&&window._fbRef&&window._fbRemove)
              window._fbRemove(window._fbRef(window._fbDb,"notifications/noshow_"+user.vorname+"_"+today())).catch(()=>{});
          }}
          onAus={(inStr,outStr)=>{
            // ⚡ Einspringen(대타)은 예정 스케줄이 없다. bis(20:00)는 임시값일 뿐이므로
            //    '조기 퇴근' 개념이 성립하지 않는다 → 사유 입력 팝업을 띄우지 않고 즉시 처리.
            //    (사유 확인은 Regulär 등 정규 스케줄 근무에만 적용)
            if(isEinspringenSession()){ finishAus(inStr,outStr,false,""); return; }
            const plannedEnd=getPlannedEndMin();
            const [oh,om]=outStr.split(":").map(Number);
            const outMin=oh*60+om;
            if(plannedEnd!=null && outMin < plannedEnd-1){
              // ⏱ 조기 퇴근 → 사유 입력 모달 먼저 표시 (퇴근 처리는 사유 입력 후)
              setFruehData({inStr,outStr});
              setFruehGrund("");
              setModal("fruehGrund");
            } else {
              finishAus(inStr,outStr,false,"");
            }
          }}
        />
      )}

      {/* ⏱ 조기 퇴근 사유 입력 모달 */}
      {modal==="fruehGrund"&&fruehData&&(
        <div style={{position:"fixed",inset:0,background:"rgba(20,20,20,.55)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:210}}
          onClick={e=>{if(e.target===e.currentTarget){setModal(null);setFruehData(null);setFruehGrund("");}}}>
          <div style={{background:C.card,borderRadius:"22px 22px 0 0",width:"100%",maxWidth:500,
            padding:"24px 22px 32px",paddingBottom:"max(32px,env(safe-area-inset-bottom))"}}>
            <div style={{width:36,height:4,background:C.border,borderRadius:99,margin:"0 auto 18px"}}/>
            <div style={{fontSize:16,fontWeight:800,color:C.text,marginBottom:4}}>{"⏱ Vorzeitiges Ausstempeln"}</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:14}}>
              {"Du stempelst früher aus als geplant. Bitte kurz den Grund angeben."}
            </div>
            <div style={{...S.card,background:C.yellowLight,border:`1px solid ${C.yellow}`,marginBottom:14,padding:"9px 12px"}}>
              <div style={{fontSize:11,fontWeight:700,color:C.yellow}}>
                {clockFiliale}{" · "}{fruehData.inStr}{" – "}{fruehData.outStr}
              </div>
            </div>
            <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:6}}>{"Grund für vorzeitiges Ausstempeln"}</div>
            <textarea value={fruehGrund} onChange={e=>setFruehGrund(e.target.value)}
              placeholder="z. B. mit Yeaji gesprochen"
              style={{...S.input,width:"100%",minHeight:70,resize:"none",fontFamily:"inherit",marginBottom:14,boxSizing:"border-box"}}/>
            <div style={{display:"flex",gap:9}}>
              <button onClick={()=>{setModal(null);setFruehData(null);setFruehGrund("");}}
                style={{flex:1,padding:"12px",borderRadius:11,border:`1.5px solid ${C.border}`,background:C.card,color:C.muted,fontWeight:700,fontSize:13,cursor:"pointer"}}>Abbrechen</button>
              <button onClick={()=>finishAus(fruehData.inStr,fruehData.outStr,true,fruehGrund.trim())}
                style={{flex:2,padding:"12px",borderRadius:11,border:"none",background:`linear-gradient(135deg,${C.yellow},#C99A2E)`,color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}}>
                {"Ausstempeln & senden"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* 🌙 자동 강제 퇴근 → Nachtragen 수정 모달 (배너에서 진입) */}
      {modal==="nachtragAuto"&&(
        <div style={{position:"fixed",inset:0,background:"rgba(20,20,20,.55)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:210}}
          onClick={e=>{if(e.target===e.currentTarget){setModal(null);setNMsg("");}}}>
          <div style={{background:C.card,borderRadius:"22px 22px 0 0",width:"100%",maxWidth:500,
            padding:"24px 22px 32px",paddingBottom:"max(32px,env(safe-area-inset-bottom))"}}>
            <div style={{width:36,height:4,background:C.border,borderRadius:99,margin:"0 auto 18px"}}/>
            <div style={{fontSize:16,fontWeight:800,color:C.text,marginBottom:4}}>{"📝 Nachtragen (Korrektur)"}</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:14}}>
              {new Date(nDatum).toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"})}{" · "}{nFiliale}
            </div>
            <div style={{display:"flex",gap:10,marginBottom:12}}>
              {[["Einstempeln",nEin,setNEin],["Ausstempeln",nAus,setNAus]].map(([lbl,val,set])=>(
                <div key={lbl} style={{flex:1}}>
                  <div style={{fontSize:10,color:C.muted,marginBottom:4,fontWeight:700}}>{lbl}</div>
                  <TimeInput value={val} onChange={set} style={{...S.input,width:"100%",textAlign:"center",fontSize:14,boxSizing:"border-box"}}/>
                </div>
              ))}
            </div>
            <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:6}}>{"Grund "}<span style={{color:C.red}}>*</span></div>
            <textarea value={nGrund} onChange={e=>setNGrund(e.target.value)}
              placeholder="z. B. tatsächliche Endzeit war 20:30…"
              style={{...S.input,width:"100%",minHeight:64,resize:"none",fontFamily:"inherit",marginBottom:8,boxSizing:"border-box"}}/>
            {nMsg&&<div style={{fontSize:11,color:nMsg.includes("eingereicht")?C.mintDark:C.red,marginBottom:8,fontWeight:600}}>{nMsg}</div>}
            <div style={{display:"flex",gap:9}}>
              <button onClick={()=>{setModal(null);setNMsg("");}}
                style={{flex:1,padding:"12px",borderRadius:11,border:`1.5px solid ${C.border}`,background:C.card,color:C.muted,fontWeight:700,fontSize:13,cursor:"pointer"}}>Abbrechen</button>
              <button onClick={()=>{
                if(!nGrund.trim()){setNMsg("Bitte einen Grund angeben.");return;}
                submitNachtrag();
                // 신청 완료 → 해당 날짜 배너 자동 숨김 처리 + 모달 닫기
                dismissAutoOut(nDatum);
                setTimeout(()=>{setModal(null);setNMsg("");},1200);
              }} style={{flex:2,padding:"12px",borderRadius:11,border:"none",background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}}>
                {"Nachtrag senden"}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

//  STATISTIK 
// 📊 통계에서 완전히 제외할 더미/과거 월 (예: Juni 2026)
const STAT_EXCLUDED_MONTHS = new Set(["2026-06"]);
function StatistikTab({records,users,schedule}){
  // records + Dienstplan(schedule)에서 달 추출 + 현재 달 포함, 최신순 정렬
  const availMonths = React.useMemo(()=>{
    const d=new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Berlin"}));
    const cur=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    const set=new Set([cur]);
    // 실제 근무 기록(records)의 달
    (Array.isArray(records)?records:[]).forEach(r=>{ if(r.aus&&r.date) set.add(r.date.slice(0,7)); });
    // Dienstplan(schedule)에 존재하는 근무 일자의 달
    Object.values(schedule||{}).forEach(sh=>{
      const arr=!sh?[]:Array.isArray(sh)?sh:Object.values(sh);
      arr.forEach(s=>{ const dd=s&&(s.date||s.d); if(dd) set.add(dd.slice(0,7)); });
    });
    // 🚫 더미/제외 월(Juni 2026) 필터 옵션 완전 제거
    STAT_EXCLUDED_MONTHS.forEach(m=>set.delete(m));
    return [...set].sort((a,b)=>b.localeCompare(a));
  },[records,schedule]);
  const [selMonth,setSelMonth]=useState(()=>{
    const d=new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Berlin"}));
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
  });
  const [exported,setExported]=useState(null);
  // 근무 기록이 있는 계정은 관리자(하이브리드 포함)여도 정산 목록에 포함
  const _workerNames = new Set((Array.isArray(records)?records:[]).map(r=>r.user));
  const empList=(Array.isArray(users)?users:[])
    .filter(u=>!MANAGERS.includes(u.key) || _workerNames.has(u.vorname))
    .sort(byName);
  const monthRecs=records.filter(r=>r.date&&r.date.startsWith(selMonth)&&r.aus&&!STAT_EXCLUDED_MONTHS.has(r.date.slice(0,7)));

  function downloadCSV(rows,filename){
    const bom="﻿";
    const csv=bom+rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(";")).join("\r\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=filename;a.click();
    URL.revokeObjectURL(url);
    setExported(filename);setTimeout(()=>setExported(null),3000);
  }
  function downloadXLSX(rows, filename, sheetName="Daten") {
    try {
      const ws = window.XLSX.utils.aoa_to_sheet(rows);
      //    ( )
      const wb = window.XLSX.utils.book_new();
      window.XLSX.utils.book_append_sheet(wb, ws, sheetName);
      window.XLSX.writeFile(wb, filename);
      setExported(filename);setTimeout(()=>setExported(null),3000);
    } catch(e) {
      // fallback to CSV if XLSX unavailable
      downloadCSV(rows, filename.replace(".xlsx",".csv"));
    }
  }
  function exportDetail(fmt="xlsx"){
    const hdr=["Name","Datum","Wochentag","Filiale","Einstempeln","Ausstempeln","Arbeitsstunden","Typ","Anmerkung"];
    const rows=[hdr,...[...monthRecs].sort((a,b)=>a.date.localeCompare(b.date)).map(r=>{
      const h=stunden(r.ein,r.aus);
      return[r.user,r.date,TAGE_DE[new Date(r.date).getDay()],r.filiale,r.ein,r.aus,h!=null?h.toFixed(2):"",r.typ==="nachtrag"?"Nachtrag":"Regulär",r.note||""];
    })];
    if(fmt==="xlsx") downloadXLSX(rows,`Stundennachweis_Detail_${selMonth}.xlsx`,"Stundennachweis");
    else downloadCSV(rows,`Stundennachweis_Detail_${selMonth}.csv`);
  }
  function exportSummary(fmt="xlsx"){
    const hdr=["Name","Rolle","Arbeitstage","Gesamtstunden","TEEAMO Arkaden (Std)","TEEAMO Aegidiimarkt (Std)","TEEnJOY (Std)","Ø Std/Tag"];
    const rows=[hdr,...empList.map(emp=>{
      const er=monthRecs.filter(r=>sameName(r.user,emp.vorname));
      const total=er.reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0);
      const byFil={};FILIALEN.forEach(f=>{byFil[f]=er.filter(r=>r.filiale===f).reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0);});
      return[emp.vorname,emp.role,er.length,Number(total.toFixed(2)),Number(byFil["TEEAMO Arkaden"].toFixed(2)),Number(byFil["TEEAMO Aegidiimarkt"].toFixed(2)),Number(byFil["TEEnJOY"].toFixed(2)),er.length?Number((total/er.length).toFixed(2)):0];
    })];
    if(fmt==="xlsx") downloadXLSX(rows,`Monatsübersicht_${selMonth}.xlsx`,"Monatsübersicht");
    else downloadCSV(rows,`Monatsübersicht_${selMonth}.csv`);
  }

  // 📥 A. 통합본 CSV — 선택한 달의 모든 직원 근태 원장 (브라우저 내장 API만 사용)
  function exportAbrechnungGesamt(){
    const rows=[ABRECHNUNG_HEADER, ...abrechnungRows(monthRecs, schedule)];
    const fn=`Monatsabrechnung_Gesamt_${selMonth}.csv`;
    downloadCsvRows(rows, fn);
    setExported(fn); setTimeout(()=>setExported(null),3000);
  }
  // 📥 B. 직원별 개별 CSV — 일자별 상세 + 지점별/타입별 집계 요약 포함
  function exportAbrechnungMitarbeiter(emp){
    const er=monthRecs.filter(r=>sameName(r.user,emp.vorname));
    const bd=buildBreakdown(er);
    const num=h=>h.toFixed(2).replace(".",",");
    const rows=[
      ["Abrechnung", emp.vorname+(emp.nachname?" "+emp.nachname:"")],
      ["Monat", monthLabel(selMonth)],
      ["Arbeitstage", String(er.length)],
      ["Gesamtstunden", num(bd.total)],
      [],
      ["— Aufschlüsselung: Filiale → Arbeitstyp —"],
      ["Filiale","Arbeitstyp","Stunden"],
      ...bd.byFiliale.flatMap(f=>[
        [f.filiale,"GESAMT",num(f.total)],
        ...f.byTyp.map(t=>[f.filiale, t.icon+" "+t.lbl, num(t.std)]),
      ]),
      [],
      ["— Tagesdetails —"],
      ABRECHNUNG_HEADER,
      ...abrechnungRows(er, schedule),
    ];
    const fn=`Abrechnung_${(emp.vorname||"Mitarbeiter").replace(/[^\p{L}\p{N}_-]/gu,"")}_${selMonth}.csv`;
    downloadCsvRows(rows, fn);
    setExported(fn); setTimeout(()=>setExported(null),3000);
  }

  return(
    <div style={{padding:"14px"}}>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:7,letterSpacing:".06em",textTransform:"uppercase"}}>{"Monat auswählen"}</div>
        <div style={{display:"flex",gap:7}}>
          {availMonths.map(m=>(

//  BERSICHT ALL TAB 
// ═══════════════════════════════════════════════════════════════
//  🔑 [지점 권한 설정란] — 최고 관리자 전용 다중 선택 제어판
//   · 최상단 : "모든 매장 접근 권한(SuperAdmin/Master)" = 만능키
//              → 체크 시 아래 개별 지점은 전체 선택 + 비활성 처리
//   · 하단   : 등록된 지점 리스트를 체크박스로 다중 선택
//   · 저장   : users 문서의 accessibleBranches(배열) / allBranches(불린) 갱신
//   ▸ 자동 분배가 아니라 최고 관리자가 요청 시 수동 지정하는 방식
// ═══════════════════════════════════════════════════════════════
function BranchAccessPanel({ emp, setUsers }){
  // 🔐 마스터(개발자) 인증자에게만 노출. 일반 관리자 화면에는 렌더링되지 않는다.
  //    컴포넌트 자체에서 막으므로 어디에 배치하더라도 새어나가지 않는다.
  const masterOn = useMasterUnlocked();
  const branches = allBranches();
  const [master, setMaster]   = useState(!!emp.allBranches);
  const [picked, setPicked]   = useState(()=>new Set(accessibleBranchIds(emp)));
  const [homeId, setHomeId]   = useState(branchIdOf(emp));
  const [msg, setMsg]         = useState("");
  const [saving, setSaving]   = useState(false);

  // 다른 직원을 열었을 때 현재 값으로 다시 동기화
  useEffect(()=>{
    setMaster(!!emp.allBranches);
    setPicked(new Set(accessibleBranchIds(emp)));
    setHomeId(branchIdOf(emp));
    setMsg("");
  },[emp.key]);

  // ⚠️ 조기 반환은 반드시 모든 훅을 호출한 '뒤'에 와야 한다 (React 훅 규칙)
  if(!masterOn) return null;

  function toggle(id){
    if(master) return;                       // 만능키 상태에서는 개별 선택 잠금
    setPicked(prev=>{ const n=new Set(prev); n.has(id)?n.delete(id):n.add(id); return n; });
    setMsg("");
  }
  function toggleMaster(on){
    setMaster(on);
    // 만능키 ON → 전체 자동 선택 / OFF → 소속 지점만 남긴다
    setPicked(on ? new Set(branches.map(b=>b.id)) : new Set([homeId]));
    setMsg("");
  }

  // 💾 users 컬렉션의 해당 유저 문서만 정밀 업데이트 (다른 필드는 그대로 보존)
  function save(){
    const list = master ? branches.map(b=>b.id) : [...picked];
    if(!master && list.length===0){ setMsg("❌ 최소 1개 지점을 선택해야 합니다."); return; }
    const home = list.indexOf(homeId)>=0 ? homeId : list[0];
    setSaving(true);
    setUsers(prev=>(Array.isArray(prev)?prev:[]).map(u=>
      u.key===emp.key
        ? { ...u, allBranches:master, accessibleBranches:list, branchId:home }
        : u));
    setMsg("✅ 저장되었습니다 · "+(master?"모든 매장":list.length+"개 지점"));
    setTimeout(()=>setSaving(false),400);
  }

  const dirty = master!==!!emp.allBranches
    || homeId!==branchIdOf(emp)
    || [...picked].sort().join()!==accessibleBranchIds(emp).sort().join();

  return (
    <div style={{...S.card,marginTop:12}}>
      <div style={{fontSize:11,fontWeight:800,color:C.muted,letterSpacing:".05em",
        textTransform:"uppercase",marginBottom:10}}>{"🔑 지점 권한 설정"}</div>

      {/* ── 만능키: 모든 매장 접근 권한 ── */}
      <label style={{display:"flex",alignItems:"flex-start",gap:9,cursor:"pointer",
        padding:"11px 12px",borderRadius:10,marginBottom:10,
        border:`1.5px solid ${master?C.yellow:C.border}`,
        background:master?C.yellowLight:"#fff"}}>
        <input type="checkbox" checked={master} onChange={e=>toggleMaster(e.target.checked)}
          style={{marginTop:2,width:16,height:16,accentColor:C.yellow,cursor:"pointer"}}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:12,fontWeight:800,color:master?"#92400e":C.text}}>
            {"모든 매장 접근 권한 (SuperAdmin / Master)"}
          </div>
          <div style={{fontSize:9,color:C.muted,marginTop:2}}>
            {"체크 시 신규 지점을 포함한 전 매장에 자동으로 접근합니다."}
          </div>
        </div>
      </label>

      {/* ── 개별 지점 다중 선택 ── */}
      <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:6}}>
        {master ? "🔒 만능키 활성 — 개별 선택은 잠금 상태입니다" : "접근을 허용할 지점 (다중 선택)"}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6,opacity:master?.5:1}}>
        {branches.map(b=>{
          const on = master || picked.has(b.id);
          return (
            <label key={b.id}
              style={{display:"flex",alignItems:"center",gap:9,
                cursor:master?"not-allowed":"pointer",padding:"9px 11px",borderRadius:9,
                border:`1.5px solid ${on?C.mintDark:C.border}`,
                background:on?C.mintLight:"#fff"}}>
              <input type="checkbox" checked={on} disabled={master}
                onChange={()=>toggle(b.id)}
                style={{width:15,height:15,accentColor:C.mintDark,
                  cursor:master?"not-allowed":"pointer"}}/>
              <img src={b.logo} alt="" style={{width:22,height:22,objectFit:"contain",borderRadius:"50%"}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:11,fontWeight:800,color:C.text}}>{branchLabel(b.id)}</div>
                <div style={{fontSize:9,color:C.muted}}>{b.id}</div>
              </div>
              {/* 소속(기본) 지점 지정 — 로그인 후 처음 진입할 지점 */}
              {on&&(
                <button onClick={e=>{e.preventDefault();setHomeId(b.id);setMsg("");}}
                  style={{fontSize:8,fontWeight:800,padding:"3px 7px",borderRadius:99,cursor:"pointer",
                    border:`1px solid ${homeId===b.id?C.mintDark:C.border}`,
                    background:homeId===b.id?C.mintDark:"#fff",
                    color:homeId===b.id?"#fff":C.muted,whiteSpace:"nowrap"}}>
                  {homeId===b.id?"★ 기본":"기본으로"}
                </button>
              )}
            </label>
          );
        })}
      </div>

      {msg&&(
        <div style={{fontSize:10,fontWeight:700,marginTop:9,
          color:msg.startsWith("✅")?C.mintDark:C.red}}>{msg}</div>
      )}
      <button onClick={save} disabled={saving||!dirty}
        style={{width:"100%",marginTop:11,padding:"11px",borderRadius:9,border:"none",
          background:dirty?`linear-gradient(135deg,${C.mint},${C.mintDark})`:"#e5e5e5",
          color:dirty?"#fff":C.muted,fontWeight:800,fontSize:12,
          cursor:(saving||!dirty)?"not-allowed":"pointer"}}>
        {saving?"⏳ 저장 중…":"권한 저장"}
      </button>
    </div>
  );
}

  const masterOn = useMasterUnlocked();
  const norm = v => !v?[]:Array.isArray(v)?v:Object.values(v);
  const todayStr = today();
  const todayRecs = (Array.isArray(records)?records:[]).filter(r=>r.date===todayStr);

  // 🧩 오늘 근무 로스터: 스케줄에 등록된 모든 이름(정식 계정 + 계정 없는 임시 직원)을
  //    빠짐없이 포함한다. 관리자 계정만 제외. (누락 방지 요구사항)
  const _rosterUsers = Array.isArray(safeUsers)?safeUsers:(Array.isArray(empList)?empList:[]);
  //  ⚠️ 하루에 여러 지점 근무가 있으면 각 근무를 독립 항목으로 펼친다
  //     (오전 ONIGIRI / 오후 TEEnJOY 가 각각 별도 카드·별도 상태로 표시)
  const todayRoster = Object.keys(schedule||{})
    .flatMap(nm => {
      const emp = _rosterUsers.find(u=>sameName(u.vorname,nm)) || null;
      return norm(schedule[nm]||[])
        .filter(s => (s.date||s.d)===todayStr)
        .map(s => ({ name:nm, emp, isTemp:!emp,
          filiale:(s.filiale||s.f||""), time:(s.time||s.t||"") }));
    })
    // 관리자 계정은 로스터에서 제외 (임시 직원은 emp=null 이므로 유지됨)
    .filter(x => !(x.emp && MANAGERS.includes(x.emp.key)));

  const todayEmps = todayRoster;      // 배지 카운트용 (임시 직원 포함)

      </div>

      {/*   1: All Staffs  */}
      {uTab==="all"&&(

            <div key={emp.key} style={{...S.card,display:"flex",alignItems:"center",gap:11,padding:"12px 14px",marginBottom:8}}>

                  <div style={{fontSize:10,color:C.muted,marginTop:2}}>{emp.role==="Admin"?"Admin":"Staff"}</div>

              </button>

              {masterOn&&(
                <button onClick={()=>setDeleteConfirm(emp.key)}
                  style={{flexShrink:0,width:30,height:30,borderRadius:8,border:`1px solid ${C.border}`,background:C.redLight,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",marginLeft:4}}>
                  <span style={{fontSize:13,color:C.red,fontWeight:700}}>del</span>

      {/*   2: Heutige Staffs  */}

                            {rec?.ein&&(

                                {typNorm(rec.typ)!=="normal"&&<span style={{color:C.muted,fontWeight:700}}>{" · "+typIcon(rec.typ)+" "+typLabel(rec.typ)}</span>}

                          </div>
                          <span style={{fontSize:9,fontWeight:700,padding:"3px 9px",borderRadius:99,color:sColor(st),background:sBg(st),flexShrink:0}}>{st}</span>
                        </button>
                        {st==="Prüfen"&&(
                          <div style={{marginTop:9,paddingTop:9,borderTop:`1px dashed ${C.yellow}`}}>
                            {rec?.frühGrund&&(
                              <div style={{fontSize:11,color:C.text,background:C.yellowLight,borderRadius:8,padding:"7px 10px",marginBottom:8}}>
                                {"📝 "}{rec.frühGrund}

                            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>

                                  background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,color:"#fff",
                                  fontWeight:800,fontSize:12,cursor:"pointer"}}>
                                {"OK"}
                              </button>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              );
            });
          })()}
        </div>
      )}
    </div>
  );
}

function AntraegeTab({ antraege, setAntraege, tauschAntraege, setTauschAntraege, records, setRecords, aTab, setATab, openAId, setOpenAId, userKey }) {
  const nList = Array.isArray(antraege) ? antraege : [];
  const tList = Array.isArray(tauschAntraege) ? tauschAntraege : [];
  const nOffene = nList.filter(a=>a.status==="offen").length;
  const tOffene = tList.filter(a=>a.status==="ausstehend_manager"||a.status==="partner_ok").length;

  function decideNachtrag(a, ok) {
    setAntraege(prev=>(Array.isArray(prev)?prev:[]).map(x=>x.id===a.id?{...x,status:ok?"genehmigt":"abgelehnt"}:x));
    if (ok) {
      // ✅ 중복 근무 방지: 기존 실시간 출퇴근 기록 무효화 후 승인된 Nachtragen만 반영
      overrideWithNachtrag({ a, setRecords });
    }
    if (!ok) {
      // Firebase에서도 삭제
      if (window._fbDb && window._fbRef && window._fbGet && window._fbRemove) {
        window._fbGet(window._fbRef(window._fbDb, "records")).then(snap=>{
          const data=snap.val()||{};
          Object.entries(data).forEach(([k,v])=>{
            if(v&&v.user===a.user&&v.date===a.date&&v.typ==="nachtrag")
              window._fbRemove(window._fbRef(window._fbDb,`records/${k}`)).catch(()=>{});
          });
        });
      }
      setRecords(prev=>(Array.isArray(prev)?prev:[]).filter(r=>!(sameName(r.user,a.user)&&r.date===a.date&&r.typ==="nachtrag")));
    }
    setOpenAId(null);
  }
  function reopenNachtrag(id) {
    setAntraege(prev=>(Array.isArray(prev)?prev:[]).map(a=>a.id===id?{...a,status:"offen"}:a));
    setOpenAId(null);
  }
  const tabs = [
    {id:"tausch", l:"Schichttausch", n:tOffene},
  ];

  return (
    <div style={{padding:"14px"}}>
      {/* Schichttausch 바로 표시 - 탭 없음 */}
      {(()=>{
        const pendingCount = tList.filter(a=>a.status==="ausstehend_manager"||a.status==="partner_ok").length;
        return(
          <div style={{fontSize:12,fontWeight:800,color:C.text,marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
            {"🔄 Schichttausch"}
            {pendingCount>0&&<span style={{fontSize:10,padding:"2px 8px",borderRadius:99,background:C.red,color:"#fff",fontWeight:700}}>{pendingCount}</span>}
          </div>
        );
      })()}
      {(()=>{
        return(<div>
          {tList.length===0&&<div style={{...S.card,textAlign:"center",padding:"24px",color:C.muted}}>Keine Schichttausch-Antraege</div>}
          {tList.map(a=>{
            const isOpen=openAId==="t_"+a.id;
            const offen=a.status==="ausstehend_manager"||a.status==="partner_ok";
            const sc=a.status==="getauscht"?C.mintDark:a.status==="abgelehnt_manager"?C.red:C.yellow;
            const sb=a.status==="getauscht"?C.mintLight:a.status==="abgelehnt_manager"?C.redLight:C.yellowLight;
            const sl=a.status==="getauscht"?"Getauscht":a.status==="abgelehnt_manager"?"Abgelehnt":"Wartet";
            return(
              <div key={"t"+a.id} style={{...S.card,marginBottom:8,padding:0,overflow:"hidden",border:"1.5px solid "+(offen?C.yellow:a.status==="getauscht"?C.mint:C.border)}}>
                <button onClick={()=>setOpenAId(isOpen?null:"t_"+a.id)}
                  style={{width:"100%",padding:"12px 14px",background:"none",border:"none",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{textAlign:"left"}}>
                    <div style={{fontSize:13,fontWeight:700,color:C.text}}>{a.initiator+" + "+a.partner}</div>
                    <div style={{fontSize:11,color:C.muted}}>{a.initiatorDate+" mit "+a.partnerDate}</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:99,color:sc,background:sb}}>{sl}</span>
                    <span style={{fontSize:10,color:C.muted}}>{isOpen?"[-]":"[+]"}</span>
                  </div>
                </button>
                {isOpen&&(
                  <div style={{borderTop:"1px solid "+C.border,padding:"12px 14px"}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                      <div><div style={{fontSize:9,color:C.muted}}>{a.initiator}</div><div style={{fontSize:12,fontWeight:700,color:C.text}}>{a.initiatorDate}</div><div style={{fontSize:10,color:C.muted}}>{a.initiatorFiliale}</div></div>
                      <div><div style={{fontSize:9,color:C.muted}}>{a.partner}</div><div style={{fontSize:12,fontWeight:700,color:C.text}}>{a.partnerDate}</div><div style={{fontSize:10,color:C.muted}}>{a.partnerFiliale}</div></div>
                    </div>
                    {a.grund&&<div style={{fontSize:11,color:C.text,background:C.bg,borderRadius:8,padding:"8px 10px"}}>{a.grund}</div>}
                  </div>
                )}
              </div>
            );
          })}
        </div>);
      })()}
    </div>
  );
}

  var byDate = {};
  done.forEach(function(a) {
    var d = a.date || "";
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(a);
  });
  var dateKeys = Object.keys(byDate).sort(function(a,b){ return b.localeCompare(a); });

  function reopen(id) {
    setAntraege(function(prev) {
      return (Array.isArray(prev)?prev:[]).map(function(a){ return a.id===id ? {...a,status:"offen"} : a; });
    });
  }
  function decide(a, ok) {
    setAntraege(function(prev) {
      return (Array.isArray(prev)?prev:[]).map(function(x){ return x.id===a.id ? {...x,status:ok?"genehmigt":"abgelehnt"} : x; });
    });
    if (ok) {
      // ✅ 중복 근무 방지: 기존 실시간 출퇴근 기록 무효화 후 승인된 Nachtragen만 반영
      overrideWithNachtrag({ a, setRecords });
    } else {
      setRecords(function(prev) {
        return (Array.isArray(prev)?prev:[]).filter(function(r){
          return !(sameName(r.user,a.user) && r.date===a.date && r.typ==="nachtrag");
        });
      });
    }
  }

  return (
    <div style={{padding:"14px"}}>
      <div style={{fontSize:10, fontWeight:700, color:C.red, marginBottom:8,
        textTransform:"uppercase", letterSpacing:".05em"}}>
        {"Offene Antrage (" + offene.length + ")"}
      </div>
      {offene.length === 0 ? (
        <div style={{...S.card, textAlign:"center", color:C.muted, fontSize:12, padding:"18px", marginBottom:14}}>
          Keine offenen Antrage
        </div>
      ) : offene.map(function(a) {
        return (
          <NachtragCard key={a.id} a={a}
            isOpen={openId===a.id}
            onToggle={function(){ setOpenId(openId===a.id ? null : a.id); }}
            onDecide={function(ok){ decide(a,ok); }}
            onReopen={function(){ reopen(a.id); }}
          />
        );
      })}
      {done.length > 0 && (
        <div style={{marginTop:16}}>
          <div style={{fontSize:10, fontWeight:700, color:C.muted, marginBottom:8,
            textTransform:"uppercase", letterSpacing:".05em"}}>
            Bearbeitete Antrage
          </div>
          {done.filter(function(a){return a.status==="abgelehnt";}).length > 0 && (
            <div style={{...S.card, marginBottom:10, display:"flex", gap:20, padding:"10px 14px"}}>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:18, fontWeight:800, color:C.red}}>
                  {done.filter(function(a){return a.status==="abgelehnt";}).length}
                </div>
                <div style={{fontSize:9, color:C.muted}}>Abgelehnt</div>
              </div>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:18, fontWeight:800, color:C.mintDark}}>
                  {done.filter(function(a){return a.status==="genehmigt";}).length}
                </div>
                <div style={{fontSize:9, color:C.muted}}>Genehmigt</div>
              </div>
            </div>
          )}
          {dateKeys.map(function(d) {
            var label = d ? new Date(d).toLocaleDateString("de-DE",{day:"numeric",month:"long",year:"numeric"}) : "-";
            return (
              <div key={d} style={{marginBottom:4}}>
                <div style={{fontSize:10, color:C.muted, fontWeight:600, marginBottom:4, marginTop:8}}>{label}</div>
                {byDate[d].map(function(a) {
                  return (
                    <NachtragCard key={a.id} a={a}
                      isOpen={openId===a.id}
                      onToggle={function(){ setOpenId(openId===a.id ? null : a.id); }}
                      onDecide={function(ok){ decide(a,ok); }}
                      onReopen={function(){ reopen(a.id); }}
                    />
                  );
                })}
              </div>
            );
          })}
        </div>
      )}
      {myArchiv && myArchiv.length > 0 && (
        <div style={{marginTop:16}}>
          <div style={{fontSize:10, fontWeight:700, color:C.muted, marginBottom:8,
            textTransform:"uppercase", letterSpacing:".05em"}}>Archiv</div>
          {myArchiv.map(function(entry) { return renderErledigtCard(entry[0], entry[1]); })}
        </div>
      )}
    </div>
  );
}

// Nach Mitarbeiter - Nachtrag/Absage 처리 컴포넌트
// 근무 기록 상태 배지 컴포넌트
function RecStatusBadge({rec, t}) {
  if(!rec) return null;
  const pln=calcShiftMinutes(t);
  const act=rec.aus?calcShiftMinutes(`${rec.ein}-${rec.aus}`):null;
  const st=!rec.aus?"aktiv":(!pln||!act||act>=pln)?"gearbeitet":"prüfen";
  const sc=st==="gearbeitet"?C.mintDark:C.yellow;
  return(
    <div style={{textAlign:"right"}}>
      <div style={{fontSize:10,fontWeight:700,color:sc}}>
        {rec.ein}{rec.aus?` – ${rec.aus}`:" (läuft)"}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:4,justifyContent:"flex-end",marginTop:2}}>
        <span style={{fontSize:9,color:C.muted}}>{rec.aus?stdLabel(rec.ein,rec.aus):""}</span>
        <span style={{fontSize:8,padding:"1px 5px",borderRadius:99,fontWeight:700,
          background:st==="gearbeitet"?C.mintLight:C.yellowLight,
          color:sc}}>
          {st==="gearbeitet"?"Gearbeitet":st==="aktiv"?"Aktiv":"Prüfen"}
        </span>
      </div>
      {st==="prüfen"&&rec.note&&<div style={{fontSize:8,color:C.muted,marginTop:1}}>{"📝 "}{rec.note}</div>}
    </div>
  );
}

// Nach Datum - 지점별 직원 행 컴포넌트
function NachDatumFilRow({name, d, t, schedule, users, records, todayStr, C, S}) {
  const arr = !schedule[name]?[]:Array.isArray(schedule[name])?schedule[name]:Object.values(schedule[name]);
  const shift = arr.find(s=>(s.date||s.d)===d);
  const accountExists = Array.isArray(users)&&users.some(u=>sameName(u.vorname,name));
  const emp = accountExists?(Array.isArray(users)?users:[]).find(u=>sameName(u.vorname,name)):null;
  const rec = accountExists?records.find(r=>sameName(r.user,name)&&r.date===d):null;
  const sSt = shift?.status||null, gMit = shift?.getauschtMit||null, gVon = shift?.getauschtVon||null;
  const transl = sSt==="freigegeben"||sSt==="getauscht";
  let statusLabel, statusColor, statusBg;
  if(sSt==="freigegeben"){
    statusLabel="🔄 Frei"; statusColor="#b45309"; statusBg="#fef3c7";
  } else if(sSt==="getauscht"){
    statusLabel="↔ Getauscht"; statusColor=C.mintDark; statusBg=C.mintLight;
  } else if(!accountExists){
    statusLabel="Ausstehend"; statusColor=C.muted; statusBg=C.border;
  } else if(rec?.aus){
    statusLabel="Feierabend"; statusColor=C.mintDark; statusBg=C.mintLight;
  } else if(rec?.ein){
    statusLabel="Aktiv"; statusColor=C.yellow; statusBg=C.yellowLight;
  } else if(d<todayStr){
    statusLabel="Nicht erschienen"; statusColor=C.red; statusBg=C.redLight;
  } else {
    statusLabel="Ausstehend"; statusColor=C.muted; statusBg=C.border;
  }
  return(
    <div style={{display:"flex",justifyContent:"space-between",
      alignItems:"center",padding:"10px 14px",opacity:transl?0.55:1,
      borderBottom:`1px solid ${C.border}`}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:30,height:30,borderRadius:"50%",
          background:accountExists?C.navy:C.border,
          display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:10,fontWeight:800,color:"#fff",flexShrink:0}}>
          {emp?emp.kuerzel:name.slice(0,2)}
        </div>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:C.text}}>{name}</div>
          {(shift?.time||shift?.t)&&(
            <div style={{fontSize:10,color:C.muted}}>{shift.time||shift.t}</div>
          )}
          {sSt==="freigegeben"&&<div style={{fontSize:9,fontWeight:700,color:"#b45309",marginTop:1}}>wartet auf Tausch</div>}
          {sSt==="getauscht"&&<div style={{fontSize:9,fontWeight:700,color:C.mintDark,marginTop:1}}>Getauscht mit {gMit||"?"}</div>}
          {gVon&&sSt!=="getauscht"&&<div style={{fontSize:9,fontWeight:700,color:C.mintDark,marginTop:1}}>✔️ Getauscht mit {gVon}</div>}
        </div>
      </div>
      <span style={{fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:99,
        color:statusColor,background:statusBg}}>
        {statusLabel}
      </span>
    </div>
  );
}

function NachMitarbeiterAntrag({name, d, nList, approveNachtrag, rejectNachtrag}) {
  const [exp, setExp] = useState(false);
  const pN = nList.find(a=>sameName(a.user,name)&&a.date===d&&a.status==="offen");
  const dN = nList.find(a=>sameName(a.user,name)&&a.date===d&&a.status!=="offen");
  if(!pN&&!dN) return null;
  return(
    <div style={{borderTop:`1px solid ${pN?C.yellow:C.border}`,marginTop:0}}>
      {pN&&(
        <div style={{padding:"8px 10px",background:C.yellowLight}}>
          <div style={{fontSize:10,fontWeight:700,color:C.yellow,marginBottom:3}}>{"🕐 Nachtrag · "}{pN.ein}{" – "}{pN.aus}</div>
          {pN.grund&&<div style={{fontSize:9,color:C.muted,marginBottom:6}}>{"📝 "}{pN.grund}</div>}
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>rejectNachtrag(pN)} style={{flex:1,padding:"5px",borderRadius:7,border:`1px solid ${C.red}`,background:"#fff",color:C.red,fontWeight:700,fontSize:10,cursor:"pointer"}}>{"✕ Ablehnen"}</button>
            <button onClick={()=>approveNachtrag(pN)} style={{flex:1,padding:"5px",borderRadius:7,border:"none",background:C.mintDark,color:"#fff",fontWeight:700,fontSize:10,cursor:"pointer"}}>{"✓ Genehmigen"}</button>
          </div>
        </div>
      )}
      {!pN&&dN&&(
        <div style={{background:dN.status==="genehmigt"?C.mintLight:C.redLight}}>
          <button onClick={()=>setExp(p=>!p)} style={{width:"100%",padding:"6px 10px",border:"none",background:"none",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:9,fontWeight:700,color:dN.status==="genehmigt"?C.mintDark:C.red}}>
              {"🕐 Nachtrag "}{dN.status==="genehmigt"?"genehmigt ✓":"abgelehnt ✕"}{" · "}{dN.ein}{" – "}{dN.aus}
            </span>
            <span style={{fontSize:9,color:C.muted}}>{exp?"▲":"▼"}</span>
          </button>
          {exp&&(
            <div style={{padding:"6px 10px 8px",borderTop:`1px solid ${C.border}`}}>
              {dN.grund&&<div style={{fontSize:9,color:C.muted,marginBottom:6}}>{"📝 "}{dN.grund}</div>}
              <div style={{fontSize:9,color:C.muted,marginBottom:6}}>{"Zeit: "}{dN.ein}{" – "}{dN.aus}</div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>rejectNachtrag(dN)} style={{flex:1,padding:"5px",borderRadius:7,border:`1px solid ${C.red}`,background:"#fff",color:C.red,fontWeight:700,fontSize:10,cursor:"pointer"}}>{"✕ Ablehnen"}</button>
                <button onClick={()=>approveNachtrag(dN)} style={{flex:1,padding:"5px",borderRadius:7,border:"none",background:C.mintDark,color:"#fff",fontWeight:700,fontSize:10,cursor:"pointer"}}>{"✓ Genehmigen"}</button>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── 공용 Dienstplan 캘린더: 월 달력 + 선택일의 지점별 근무자 리스트 ──
//    highlightName이 주어지면(직원 뷰) 본인 근무를 강조. 안전 렌더링(정규화)으로 크래시 방지.
function DienstplanKalender({ schedule, records, highlightName, allowDelete, users, setRecords, FILIALEN_LIST }) {
  const norm = v => !v ? [] : Array.isArray(v) ? v : Object.values(v);
  const filShort = { "TEEAMO Arkaden":"Arkaden","TEEAMO Aegidiimarkt":"Aegidiimarkt","TEEnJOY":"TEEnJOY","ONIGIRI":"ONIGIRI" };
  const FILS = Array.isArray(FILIALEN_LIST)&&FILIALEN_LIST.length?FILIALEN_LIST:(typeof FILIALEN!=="undefined"?FILIALEN:[]);
  const todayStr = today();
  const [calYM, setCalYM] = useState(()=>{ const p=todayStr.split("-"); return {y:+p[0], m:(+p[1])-1}; });
  const [selDate, setSelDate] = useState(todayStr);
  // 🔒 Nachtragen 락 판정을 위한 신청 목록 구독
  const [antraegeList] = useFirebase("antraege", []);
  // 🔄 Schichtbörse 구독 — 세 화면(공개/관리자/직원)이 이 컴포넌트를 공유하므로
  //    여기서 한 번만 구독하면 모든 Dienstplan 리스트에 자동 반영된다.
  const [freieSchichten] = useFirebase("freieSchichten", []);
  // 인라인 수정/양도/Nachtragen 상태
  const [editRow, setEditRow] = useState(null);   // {name, fil, von, bis}
  const [nachRow, setNachRow] = useState(null);   // {name, von, bis}
  const [actMsg, setActMsg]   = useState("");
  // 날짜 우선 추가 폼 (관리자)
  const [addOpen, setAddOpen] = useState(false);
  const [addFil, setAddFil]   = useState("");
  const [addEmp, setAddEmp]   = useState("");     // vorname | "__temp__"
  const [addTemp, setAddTemp] = useState("");
  const [addVon, setAddVon]   = useState("");
  const [addBis, setAddBis]   = useState("");
  const [addTyp, setAddTyp]   = useState("normal");   // 🧋 Arbeitstyp: normal | einspringen

  const [moveRow,setMoveRow]=useState(null);   // 📍 지점 변경 패널이 열린 행

  // 🆔 현재 로그인한 사람의 고유 ID — 모드(관리자/직원)와 무관하게 동일한 값
  const myUid = uidOf(users, highlightName);

  // 날짜별 근무 인덱스 (안전 정규화 + 🔄 Schichtbörse 병합)
  const byDate = React.useMemo(()=>{
    const map={};
    Object.entries(schedule||{}).forEach(([name,sh])=>{
      norm(sh).forEach(s=>{
        if(!s) return;
        const d=s.date||s.d; if(!d) return;
        // 🆔 uid = 근무에 저장된 값 우선, 없으면(구 데이터) 이름으로 역추적
        const uid = s.uid || uidOf(users, name) || "";
        (map[d]=map[d]||[]).push({
          uid,                                   // 본인 판별용 고유 ID
          rawName: name,                         // DB의 실제 키 (수정/삭제에 사용)
          name: personLabel(users, uid, name),   // 화면 표시용 (이모지+최신 이름)
          filiale:s.filiale||s.f||"", time:s.time||s.t||"", typ:typNorm(s.typ),
          autoCreated:!!s.autoCreated,
          status:s.status||null, getauschtMit:s.getauschtMit||null, getauschtVon:s.getauschtVon||null
        });
      });
    });

    // 🔄 Schichtbörse(freieSchichten)를 같은 리스트에 합친다.
    //   · 아직 주인이 없으면      → 이름 자리에 "[Offene Schicht]"
    //   · 누군가 übernehmen 하면  → 그 직원 이름으로 자동 교체 (실시간)
    //   · 이미 schedule에 같은 근무가 있으면 중복 행을 만들지 않는다.
    const boerse = safeList(freieSchichten);   // 🛡 null 구멍 제거 (흰 화면 방지)
    boerse.forEach(fs=>{
      if(!fs) return;
      const d = fs.date||fs.d; if(!d) return;
      const fil = fs.filiale||fs.f||"";
      const owner = fs.besetzt ? (fs.uebernommen_von||"") : "";
      // 🆔 uid 우선 (übernehmen 시 저장됨) → 없으면 이름으로 역추적
      const ownerUid = owner ? (fs.uebernommen_von_uid || uidOf(users, owner) || "") : "";
      // 중복 방지: 수락자(또는 원 제공자)의 근무가 이미 스케줄에 있으면 건너뛴다
      const dupName = owner || fs.angeboten_von || "";
      const dupUid  = ownerUid || fs.angeboten_von_uid || uidOf(users, dupName) || "";
      if(dupName && (map[d]||[]).some(r=>
          samePerson({uid:r.uid,name:r.rawName},{uid:dupUid,name:dupName}) &&
          sameFiliale(r.filiale, fil))) return;
      (map[d]=map[d]||[]).push({
        uid: ownerUid,
        rawName: owner || OFFENE_SCHICHT,
        name: owner ? personLabel(users, ownerUid, owner) : OFFENE_SCHICHT,   // 주인 없으면 [Offene Schicht]
        filiale: fil,
        time: fs.time||fs.t||"",
        typ: typNorm(fs.typ),
        autoCreated:false, status:null, getauschtMit:null,
        getauschtVon: owner ? (fs.angeboten_von||null) : null,
        isOffen: !owner,                        // 아직 비어있는 근무인지
        boerseId: fs.id||null,
        note: fs.note||""
      });
    });
    return map;
  },[schedule, freieSchichten, users]);

  const daysInMonth=new Date(calYM.y, calYM.m+1, 0).getDate();
  const firstDow=(new Date(calYM.y, calYM.m, 1).getDay()+6)%7;
  const cells=[]; for(let i=0;i<firstDow;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);
  const ymStr=d=>calYM.y+"-"+String(calYM.m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
  const calLabel=new Date(calYM.y, calYM.m, 1).toLocaleDateString("de-DE",{month:"long",year:"numeric"});
  const navBtn={border:"none",background:C.bg,borderRadius:8,width:30,height:30,fontSize:15,cursor:"pointer",color:C.text};

  const dayShifts=(byDate[selDate]||[]).slice()
    .sort((a,b)=>(a.filiale||"").localeCompare(b.filiale||"")||(a.time||"").localeCompare(b.time||""));
  const byFil={}; dayShifts.forEach(r=>{ (byFil[r.filiale]=byFil[r.filiale]||[]).push(r); });
  // 🔒 [직원·날짜·지점] 단위로 기록을 찾는다 (지점별 독립 판정)
  const recFor=(name, filiale)=> selDate!==todayStr ? null
    : recordForShift(records, name, selDate, filiale);

  return (
    <div>
      {/* 달력 */}
      <div style={{border:"1px solid "+C.border,borderRadius:14,padding:"12px",marginBottom:14,background:"#fff"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <button onClick={()=>setCalYM(p=>{const m=p.m-1;return m<0?{y:p.y-1,m:11}:{y:p.y,m};})} style={navBtn}>{"‹"}</button>
          <div style={{fontSize:13,fontWeight:800,color:C.text}}>{calLabel}</div>
          <button onClick={()=>setCalYM(p=>{const m=p.m+1;return m>11?{y:p.y+1,m:0}:{y:p.y,m};})} style={navBtn}>{"›"}</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:4}}>
          {["Mo","Di","Mi","Do","Fr","Sa","So"].map(w=><div key={w} style={{textAlign:"center",fontSize:9,fontWeight:700,color:C.muted}}>{w}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
          {cells.map((d,i)=>{
            if(d===null) return <div key={"e"+i}/>;
            const ds=ymStr(d);
            const shifts=byDate[ds]||[];
            const mine=highlightName&&shifts.some(s=>
              samePerson({uid:s.uid,name:s.rawName},{uid:myUid,name:highlightName}));
            const isSel=ds===selDate;
            const isToday=ds===todayStr;
            return(
              <button key={ds} onClick={()=>setSelDate(ds)}
                style={{aspectRatio:"1",borderRadius:9,cursor:"pointer",position:"relative",padding:0,
                  border:isSel?"2px solid "+C.navy:isToday?"1.5px solid "+C.mint:"1px solid "+C.border,
                  background:isSel?C.navy:mine?C.mintLight:"#fff",color:isSel?"#fff":C.text,
                  display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
                <span style={{fontSize:12,fontWeight:mine||isSel?800:600}}>{d}</span>
                {/* 점 표시 — 일반 근무(회색/민트) + Schichtbörse 빈 근무(노랑) */}
                <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:2,height:5}}>
                  {shifts.some(s=>!s.isOffen)&&(
                    <span style={{width:5,height:5,borderRadius:"50%",
                      background:isSel?"#fff":mine?C.mintDark:C.muted}}/>
                  )}
                  {/* 🔄 아직 주인이 없는 freigegebene Schicht가 있는 날 */}
                  {shifts.some(s=>s.isOffen)&&(
                    <span title="Offene Schicht"
                      style={{width:5,height:5,borderRadius:"50%",
                        background:C.yellow,
                        boxShadow:isSel?"0 0 0 1px rgba(255,255,255,.9)":"none"}}/>
                  )}
                </span>
              </button>
            );
          })}
        </div>
      </div>

      {/* 선택일 상세: 지점별 근무자 */}
      <div>
        <div style={{fontSize:12,fontWeight:800,color:C.text,marginBottom:8}}>
          {new Date(selDate).toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"})}
        </div>
        {actMsg&&(

                <div style={{display:"flex",gap:8}}>

                  <button onClick={()=>{
                    const name=addEmp==="__temp__"?addTemp.trim():addEmp;
                    if(!name){ setActMsg("Bitte Mitarbeiter oder Temp-Name wählen."); return; }
                    const on=isOnigiriFiliale(addFil);   // 🍙 ONIGIRI: 시간 없이도 유효
                    // 🍙 Onigiri: 시간 없이도 유효 — 그 외 타입만 VON/BIS 필수
                    if(!on && (!addVon||!addBis)){ setActMsg("Bitte VON und BIS angeben."); return; }
                    addScheduleShift(name, selDate, addFil, on ? "" : addVon+"-"+addBis, addTyp);
                    setAddOpen(false); setActMsg("✅ Schicht hinzugefügt.");
                    setTimeout(()=>setActMsg(""),2500);
                  }} style={{flex:2,padding:"10px",borderRadius:9,border:"none",background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,color:"#fff",fontWeight:800,fontSize:12,cursor:"pointer"}}>{"✅ Hinzufügen"}</button>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

      const found={};
      results.forEach(({m,data})=>{ if(data) found[m]=data; });
      setAllMonthSchedules(found);

  // 선택된 달의 스케줄을 실시간 구독 (Freigeben/Getauscht 상태 변경이 즉시 반영되도록)

//  DIENSTPLAN UPLOAD + AI ANALYSE 
function DienstplanUploadView({ users, selMonth, onScheduleSaved, adminName }) {
  const norm = v => !v ? [] : Array.isArray(v) ? v : Object.values(v);
  const empOptions = (Array.isArray(users)?users:[]).filter(u=>!MANAGERS.includes(u.key) && u.vorname!==adminName).sort(byName);
  // ⏰ 추천 시간: VON/BIS 독립 배열 (전역 상수 공유)
  const QUICK_VON = QUICK_VON_TIMES, QUICK_BIS = QUICK_BIS_TIMES;
  const DRAFT_KEY = "teeamo_schicht_cart_v1";
  const filShort = { "TEEAMO Arkaden":"Arkaden", "TEEAMO Aegidiimarkt":"Aegidiimarkt", "TEEnJOY":"TEEnJOY", "ONIGIRI":"ONIGIRI" };

  // 선택된 월 스케줄 (달력 점 표시용)
  const scheduleKey = selMonth ? "schedule_"+selMonth : "schedule";
  const [monthSched] = useFirebase(scheduleKey, {});
  // root 스케줄 (실시간) — 모달의 '기존 근무 조회' + 달력 점 (저장 즉시 반영)
  const [rootSched] = useFirebase("schedule", {});

  const [showAdd, setShowAdd] = useState(false);
  const [saving, setSaving]   = useState(false);
  const [msg, setMsg]         = useState(null);

  // ── Draft 복원 (장바구니 + 선택 날짜) ──
  const draft0 = (()=>{ try{const s=localStorage.getItem(DRAFT_KEY);return s?JSON.parse(s):null;}catch{return null;} })();
  const [cart, setCart] = useState(Array.isArray(draft0?.cart)?draft0.cart:[]); // [{date,filiale,name,von,bis}]
  const [selDate, setSelDate] = useState(draft0?.selDate || today());

  // 하위 입력 (지점 → 직원 → 시간)
  const [aFil, setAFil]   = useState(FILIALEN[0]);
  const [aEmp, setAEmp]   = useState("");
  const [aTemp, setATemp] = useState("");
  const [aVon, setAVon]   = useState("");
  const [aBis, setABis]   = useState("");
  const [aTyp, setATyp]   = useState("normal");   // 🧋 Arbeitstyp: normal | einspringen

  const [calYM, setCalYM] = useState(()=>{ const p=(selDate||today()).split("-"); return {y:+p[0], m:(+p[1])-1}; });

  useEffect(()=>{ try{ localStorage.setItem(DRAFT_KEY, JSON.stringify({cart, selDate})); }catch{} },[cart, selDate]);

  const resolveAName = () => aEmp==="__temp__" ? (aTemp||"").trim() : aEmp;
  const hasDraft = cart.length>0;

  function addToCart(){
    const name=resolveAName();
    if(!name){ setMsg({t:"err",m:"Bitte Mitarbeiter oder Temp-Name wählen."}); return; }
    const on=isOnigiriFiliale(aFil);   // 🍙 ONIGIRI: 시간 없이도 유효
    // 🍙 Onigiri: 시간 없이도 유효 — 그 외 타입만 VON/BIS 필수
    if(!on && (!aVon||!aBis)){ setMsg({t:"err",m:"Bitte VON und BIS angeben."}); return; }
    setCart(prev=>[...prev, {date:selDate, filiale:aFil, name, von:on?"":aVon, bis:on?"":aBis, typ:aTyp}]);
    setAEmp(""); setATemp(""); setAVon(""); setABis(""); setATyp("normal"); setMsg(null);  // 지점은 유지
  }
  function removeCart(idx){ setCart(prev=>prev.filter((_,i)=>i!==idx)); }
  function resetInputs(){ setAEmp("");setATemp("");setAVon("");setABis("");setATyp("normal"); }
  function clearAll(){ setCart([]); resetInputs(); try{localStorage.removeItem(DRAFT_KEY);}catch{} }

  // ── 저장: 장바구니 전체를 root + 월별 두 노드에 기록. 저장 후 모달 유지 + 초기화 ──
  async function saveCart(){
    if(cart.length===0){ setMsg({t:"err",m:"Noch keine Schichten hinzugefügt."}); return; }
    if(!(window._fbDb&&window._fbRef&&window._fbGet&&window._fbSet)){ setMsg({t:"err",m:"Keine Verbindung zur Datenbank."}); return; }
    setSaving(true); setMsg(null);
    try{
      const byName={};  // {name: [{date,filiale,time,typ}]}
      cart.forEach(it=>{ const on=isOnigiriFiliale(it.filiale);
        (byName[it.name]=byName[it.name]||[]).push({date:it.date, filiale:it.filiale, time: on ? "" : it.von+"-"+it.bis, typ:typNorm(it.typ)}); });
      // 1) 월별 노드
      const monthsTouched=new Set(cart.map(it=>it.date.slice(0,7).replace("-","_")));
      for(const mk of monthsTouched){
        const key="schedule_"+mk;
        const snap=await window._fbGet(window._fbRef(window._fbDb,key));
        const ex=snap.val()?JSON.parse(JSON.stringify(snap.val())):{};
        for(const [name,entries] of Object.entries(byName)){
          const me=entries.filter(e=>e.date.slice(0,7).replace("-","_")===mk);
          if(me.length===0) continue;
          let arr=Array.isArray(ex[name])?ex[name]:Object.values(ex[name]||{});
          me.forEach(e=>{ arr=arr.filter(s=>!((s.date||s.d)===e.date&&(s.filiale||s.f)===e.filiale)); arr.push({date:e.date,filiale:e.filiale,time:e.time,typ:e.typ}); });
          ex[name]=Object.fromEntries(arr.map((s,i)=>[String(i),s]));
        }
        await window._fbSet(window._fbRef(window._fbDb,key),ex);
        const pd={}; for(const [n,sh] of Object.entries(ex)){ pd[n]=norm(sh); }
        if(onScheduleSaved) onScheduleSaved(mk, pd);
      }
      // 2) root schedule
      const rsnap=await window._fbGet(window._fbRef(window._fbDb,"schedule"));
      const root=rsnap.val()?JSON.parse(JSON.stringify(rsnap.val())):{};
      for(const [name,entries] of Object.entries(byName)){
        let rarr=Array.isArray(root[name])?root[name]:Object.values(root[name]||{});
        entries.forEach(e=>{ rarr=rarr.filter(s=>!((s.d||s.date)===e.date&&(s.f||s.filiale)===e.filiale)); rarr.push({d:e.date,f:e.filiale,t:e.time,typ:e.typ}); });
        root[name]=rarr;
      }
      await window._fbSet(window._fbRef(window._fbDb,"schedule"),root);
      setSaving(false);
      setMsg({t:"ok",m:"✅ "+cart.length+" Schicht(en) gespeichert. Weiter mit dem nächsten Tag!"});
      clearAll();  // 초기화하되 모달은 유지
    }catch(e){
      setSaving(false);
      setMsg({t:"err",m:"Fehler beim Speichern: "+(e.message||e)});
    }
  }

  // ── 달력 셀 ──
  const daysInMonth=new Date(calYM.y, calYM.m+1, 0).getDate();
  const firstDow=(new Date(calYM.y, calYM.m, 1).getDay()+6)%7;
  const cells=[]; for(let i=0;i<firstDow;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);
  const ymStr=(d)=>calYM.y+"-"+String(calYM.m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
  const calLabel=new Date(calYM.y, calYM.m, 1).toLocaleDateString("de-DE",{month:"long",year:"numeric"});
  const todayStr=today();

  // 기존 스케줄 있는 날짜 (달력 점)

  Object.values(rootSched||{}).forEach(sh=>{ norm(sh).forEach(s=>{ const dd=s&&(s.date||s.d); if(dd) existDates.add(dd); }); });

  return (

      {hasDraft && !showAdd && (

          background:"#fffbeb",border:"1px solid #fde68a",borderRadius:10,padding:"8px 12px",marginBottom:10}}>
          <span style={{fontSize:11,color:"#92400e",fontWeight:600}}>{"💾 "+cart.length+" Schicht(en) im Warenkorb (Entwurf)."}</span>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>setShowAdd(true)} style={{fontSize:10,padding:"5px 10px",borderRadius:7,border:"none",background:"#f59e0b",color:"#fff",fontWeight:700,cursor:"pointer"}}>Weiter</button>
            <button onClick={clearAll} style={{fontSize:10,padding:"5px 10px",borderRadius:7,border:"1px solid #fde68a",background:"#fff",color:"#92400e",fontWeight:700,cursor:"pointer"}}>Verwerfen</button>

      {msg && !showAdd && (
        <div style={{fontSize:11,fontWeight:700,padding:"9px 12px",borderRadius:9,marginBottom:10,
          background:msg.t==="ok"?"#dcfce7":"#fee2e2",color:msg.t==="ok"?"#15803d":C.red}}>{msg.m}</div>

      {/* ── 모달 ── */}
      {showAdd && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}
          onClick={()=>setShowAdd(false)}>
          <div onClick={e=>e.stopPropagation()}
            style={{background:"#fff",borderRadius:"18px 18px 0 0",width:"100%",maxWidth:480,height:"92vh",display:"flex",flexDirection:"column"}}>

              display:"flex",alignItems:"center",justifyContent:"space-between"}}>

                    return(
                      <div key={"ex"+i} style={{...S.card,display:"flex",alignItems:"center",gap:10,padding:"8px 11px",marginBottom:6,opacity:transl?0.55:1,border:"1px solid "+C.mint}}>
                        <div style={{width:30,height:30,borderRadius:"50%",background:C.mintDark,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:10,flexShrink:0}}>{(e.name||"?").slice(0,2)}</div>

                          <div style={{fontSize:10,color:C.muted}}>{typIcon(e.typ)+" "+(filShort[e.filiale]||e.filiale)+(e.time?" · "+e.time:"")}</div>

                        <span style={{fontSize:8,fontWeight:800,color:C.mintDark,background:C.mintLight,padding:"3px 7px",borderRadius:99,flexShrink:0}}>{"✓ gespeichert"}</span>

                    );

              )}

              {/* 3) 이번 세션에서 추가할 근무 장바구니 */}
              {cartForSel.length>0&&(
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:9,fontWeight:700,color:"#b45309",marginBottom:6}}>{"3 · NEU HINZUGEFÜGT (Warenkorb)"}</div>
                  {cartForSel.map(c=>(
                    <div key={c._i} style={{...S.card,display:"flex",alignItems:"center",gap:10,padding:"8px 11px",marginBottom:6,border:"1px dashed #f59e0b",background:"#fffbeb"}}>
                      <div style={{width:30,height:30,borderRadius:"50%",background:"#f59e0b",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:10,flexShrink:0}}>{(c.name||"?").slice(0,2)}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,fontWeight:700,color:C.text}}>{c.name}</div>
                        <div style={{fontSize:10,color:C.muted}}>{typIcon(c.typ)+" "+(filShort[c.filiale]||c.filiale)+((c.von&&c.bis)?" · "+c.von+"-"+c.bis:"")}</div>
                      </div>
                      <button onClick={()=>removeCart(c._i)}
                        style={{flexShrink:0,width:26,height:26,borderRadius:7,border:"1px solid "+C.border,background:C.redLight,color:C.red,fontSize:13,fontWeight:700,cursor:"pointer"}}>{"×"}</button>
                    </div>
