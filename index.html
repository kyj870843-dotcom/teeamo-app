// ── ✅ LocalStorage: 최초 1회만 INIT 사용, 이후 변경은 즉시 저장 ─────────────
function lsGet(key, fallback) {
  try {
    const v = localStorage.getItem(key);
    if (v !== null) return JSON.parse(v);
    localStorage.setItem(key, JSON.stringify(fallback));
    return fallback;
  } catch { return fallback; }
}
function lsSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}
function usePersist(lsKey, init) {
  const [state, setState] = useState(() => lsGet(lsKey, init));
  const setAndSave = useCallback((updater) => {
    setState(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      lsSet(lsKey, next);
      return next;
    });
  }, [lsKey]);
  return [state, setAndSave];
}

// ── 유틸 ─────────────────────────────────────────────────────────────────────
function pad(n) { return String(n).padStart(2, "0"); }
function useNow() {
  const [t, setT] = useState(new Date());
  useEffect(() => { const i = setInterval(() => setT(new Date()), 1000); return () => clearInterval(i); }, []);

}
function stunden(ein, aus) {
  if (!ein || !aus) return null;
  const [eh, em] = ein.split(":").map(Number);
  const [ah, am] = aus.split(":").map(Number);
  return (ah * 60 + am - eh * 60 - em) / 60;
}
function stdLabel(ein, aus) { const h = stunden(ein, aus); return h === null ? "–" : h.toFixed(1) + "h"; }

// ── 독일어 월 이름 → YYYY-MM ─────────────────────────────────────────────────
const DE_MONTH_MAP = {
  januar:"01",februar:"02","m\u00e4rz":"03",maerz:"03",april:"04",mai:"05",juni:"06",
  juli:"07",august:"08",september:"09",oktober:"10",november:"11",dezember:"12",
};
function parseMonthStr(text) {
  if (!text) return null;
  const lo = text.toLowerCase();
  for (const [name, num] of Object.entries(DE_MONTH_MAP)) {
    if (lo.includes(name)) {
      const ym = text.match(/20\d{2}/);
      const year = ym ? ym[0] : String(new Date().getFullYear());
      return `${year}-${num}`;
    }
  }
  return null;
}

// ── CSV 한 줄 파싱 ────────────────────────────────────────────────────────────
function parseCSVLine(line) {
  const res = []; let cur = "", inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { if (inQ && line[i+1]==='"') { cur+='"'; i++; } else inQ=!inQ; }
    else if (ch===',' && !inQ) { res.push(cur.trim()); cur=""; }
    else cur+=ch;
  }
  res.push(cur.trim());
  return res;
}

// ── ✅ 핵심: CSV → Dienstplan 변환 ───────────────────────────────────────────
// A열에서 지점명(Arkaden/Aegidiimarkt/Teenjoy) 자동 탐지 →
// 헤더 행의 날짜 컬럼 매핑 → 각 직원 행에서 근무일 추출
// A1(또는 상단) 셀의 독일어 월 이름 자동 인식
function csvToDienstplan(csvText) {
  const lines = csvText.trim().split(/\r?\n/);
  if (lines.length < 2) return { plan:{}, sheetMonth:null };
  const rows = lines.map(l => parseCSVLine(l));

  // 1. 월 이름 탐지 (첫 5행 × 첫 5열)
  let sheetMonth = null;
  outer: for (let r = 0; r < Math.min(5, rows.length); r++) {
    for (let c = 0; c < Math.min(8, rows[r].length); c++) {
      const m = parseMonthStr(rows[r][c] || "");
      if (m) { sheetMonth = m; break outer; }
    }
  }

  // 2. 날짜 헤더 행 탐지: B열 이후에 1~31 숫자가 3개 이상인 행
  function extractDay(cell) {
    const s = String(cell || "").trim();
    if (/^\d{1,2}$/.test(s)) { const n=parseInt(s); return n>=1&&n<=31?n:null; }
    const m1 = s.match(/^(\d{1,2})[.\/]\d/); if (m1) { const n=parseInt(m1[1]); return n>=1&&n<=31?n:null; }
    const m2 = s.match(/(?:Mo|Di|Mi|Do|Fr|Sa|So)[.\s]+(\d{1,2})/i); if (m2) return parseInt(m2[1]);
    return null;
  }

  let headerRowIdx = -1;
  let dateColMap = {}; // colIndex(int) -> day(int)
  for (let r = 0; r < rows.length; r++) {
    const tmp = {}; let cnt = 0;
    for (let c = 1; c < rows[r].length; c++) {
      const d = extractDay(rows[r][c]);
      if (d !== null) { tmp[c] = d; cnt++; }
    }
    if (cnt >= 3) { headerRowIdx = r; dateColMap = tmp; break; }
  }

  const plan = {};

  if (headerRowIdx === -1) {
    // 폴백: Datum+Name+Filiale 컬럼 구조
    const hdr = rows[0].map(h => (h||"").toLowerCase());
    const di = hdr.findIndex(h=>h.includes("datum")||h.includes("date")||h.includes("tag"));
    const ni = hdr.findIndex(h=>h.includes("name")||h.includes("mitarbeit")||h.includes("person"));
    const fi = hdr.findIndex(h=>h.includes("filiale")||h.includes("branch")||h.includes("laden"));
    if (di>=0 && ni>=0) {
      for (let r=1;r<rows.length;r++) {
        const row=rows[r]; const rawD=row[di]||""; const name=(row[ni]||"").trim();
        if(!rawD||!name) continue;
        let dk="";
        const d1=rawD.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
        const d2=rawD.match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if(d1) dk=`${d1[3]}-${pad(d1[2])}-${pad(d1[1])}`;
        else if(d2) dk=rawD;
        else { const p=new Date(rawD); if(!isNaN(p)) dk=p.toISOString().slice(0,10); }
        if(!dk) continue;
        const rf=(fi>=0?row[fi]||"":"").toLowerCase();
        let f="A";
        if(rf.includes("aegidii")||rf.includes("markt")) f="B";
        else if(rf.includes("teenjoy")||rf.includes("joy")) f="C";
        if(!plan[dk]) plan[dk]=[];
        if(!plan[dk].find(e=>e.n===name)) plan[dk].push({n:name,f});
      }
    }
    return { plan, sheetMonth };
  }

  // 3. 지점 행 탐지 & 직원 근무일 추출
  const baseYear  = sheetMonth ? sheetMonth.slice(0,4) : String(new Date().getFullYear());
  const baseMonth = sheetMonth ? sheetMonth.slice(5,7) : pad(new Date().getMonth()+1);
  let currentFil = null;

  for (let r = headerRowIdx+1; r < rows.length; r++) {
    const row = rows[r];
    const a = (row[0]||"").trim();
    if (!a) continue;

    // A열이 지점명인지 확인 (텍스트 포함 검색)
    const aLow = a.toLowerCase();
    let detFil = null;
    if      (aLow.includes("arkaden"))                          detFil = "A";
    else if (aLow.includes("aegidii")||aLow.includes("markt")) detFil = "B";
    else if (aLow.includes("teenjoy")||aLow.includes("joy"))   detFil = "C";

    if (detFil) { currentFil = detFil; continue; }
    if (!currentFil) continue;

    // 직원 이름 행: 날짜 컬럼 순회
    const name = a;
    for (const [colStr, day] of Object.entries(dateColMap)) {
      const cell = (row[parseInt(colStr)]||"").trim();
      // 비어있거나 휴무 표시면 skip
      if (!cell || cell==="-" || cell==="0" || cell.toLowerCase()==="frei" || cell.toLowerCase()==="x" || cell==="") continue;
      const dk = `${baseYear}-${baseMonth}-${pad(day)}`;
      if (!plan[dk]) plan[dk]=[];
      if (!plan[dk].find(e=>e.n===name&&e.f===currentFil)) {
        // shift 값이 의미있는 시간 정보면 저장 (1,true,o,v 같은 단순 체크는 제외)
        const isTimeInfo = /^\d{1,2}:\d{2}/.test(cell) || (cell.length>2&&cell.includes(":"));
        plan[dk].push({ n:name, f:currentFil, shift: isTimeInfo ? cell : null });
      }
    }
  }

  return { plan, sheetMonth };
}

// ── ✅ CSV fetch 훅 (allorigins 프록시) ──────────────────────────────────────
function useDienstplanCSV() {
  const [plan, setPlan] = useState(null);
  const [sheetMonth, setSheetMonth] = useState(null);
  const [error, setError] = useState(null);
  const [lastFetch, setLastFetch] = useState(null);

  const fetchData = useCallback(async () => {
    setError(null);
    try {
      const url = PROXY_URL + encodeURIComponent(SHEET_CSV_URL);
      const res = await fetch(url, { cache:"no-cache" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      if (!text || text.length < 10) throw new Error("Leere Antwort");
      const { plan: parsed, sheetMonth: sm } = csvToDienstplan(text);
      setPlan(parsed);
      if (sm) setSheetMonth(sm);
      setLastFetch(new Date());
    } catch(e) {
      setError(e.message||"Fehler");
      setPlan(p => p || {});
    }
  }, []);

  useEffect(() => {
    fetchData();
    const iv = setInterval(fetchData, 5*60*1000);
    return () => clearInterval(iv);
  }, [fetchData]);

  return { plan, sheetMonth, error, lastFetch, refresh:fetchData };
}

                <div style={{fontSize:10,color:C.mintDark,opacity:.7,marginTop:1}}>{selEntries.length} Mitarbeiter{selEntries.length!==1?"innen":"in"} eingeplant</div>

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function LoginView({onLogin,users,setUsers,csvCtx}){
  const now=useNow();
  const [page,setPage]=useState("list");
  const [selUser,setSelUser]=useState(null);
  const [pin,setPin]=useState("");
  const [err,setErr]=useState("");
  const [regV,setRegV]=useState("");
  const [regN,setRegN]=useState("");
  const [regP,setRegP]=useState("");
  const [regP2,setRegP2]=useState("");
  const [regErr,setRegErr]=useState("");
  const [regRole,setRegRole]=useState("Staff");
  const ADMIN_NAMES=["yeaji","tingting","teddy","huy"];
  const isAdminName=regV.trim().toLowerCase()!==""&&ADMIN_NAMES.includes(regV.trim().toLowerCase());
  const empList=[...users.filter(u=>!MANAGERS.includes(u.key))].sort((a,b)=>a.vorname.localeCompare(b.vorname));
  const mgrList=[...users.filter(u=>MANAGERS.includes(u.key))].sort((a,b)=>a.vorname.localeCompare(b.vorname));

  function selectUser(u){setSelUser(u);setPin("");setErr("");setPage("pin");}
  function back(){setPage("list");setSelUser(null);setPin("");setErr("");}
  function pinKey(k){
    if(pin.length>=4)return;
    const next=pin+k; setPin(next);
    if(next.length===4){
      if(next===selUser.pin) onLogin(selUser.key);
      else{setErr("Falsche PIN. Erneut versuchen.");setTimeout(()=>{setPin("");setErr("");},1400);}
    }
  }
  function doRegister(){
    if(!regV.trim()){setRegErr("Vorname ist Pflichtfeld.");return;}
    if(!/^\d{4}$/.test(regP)){setRegErr("PIN muss 4 Ziffern sein.");return;}
    if(regP!==regP2){setRegErr("PINs stimmen nicht überein.");return;}
    const vn=regV.trim(),nn=regN.trim(),key=vn.toLowerCase()+"_"+Date.now();
    const isAdmin=isAdminName&&regRole==="Admin";
    setUsers(prev=>[...prev,{key,vorname:vn,nachname:nn,kuerzel:vn.slice(0,2),role:isAdmin?"Admin":"Staff",pin:regP,isAdmin}]);
    setRegV("");setRegN("");setRegP("");setRegP2("");setRegErr("");setRegRole("Staff");setPage("list");
  }

  if(page==="kalender")return(
    <div style={{background:C.bg,minHeight:"100vh"}}>
      <div style={S.hdr}>
        <button onClick={()=>setPage("list")} style={S.backBtn}>← Zurück</button>
        <div style={{fontSize:18,fontWeight:800}}>Dienstplan</div>
        <div style={{fontSize:11,opacity:.45,marginTop:2}}>Leseansicht – ohne Anmeldung</div>
      </div>
      <div style={{padding:"14px"}}><div style={{...S.card,padding:0,overflow:"hidden"}}><KalenderView csvCtx={csvCtx}/></div></div>
    </div>
  );

  if(page==="pin"&&selUser){
    const isMgr=MANAGERS.includes(selUser.key);
    const dots=Array.from({length:4}).map((_,i)=>i<pin.length);
    return(
      <div style={{background:C.bg,minHeight:"100vh"}}>
        <div style={S.hdr}>
          <button onClick={back} style={S.backBtn}>← Zurück</button>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:46,height:46,borderRadius:"50%",background:isMgr?C.yellow:C.mint,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:15,color:C.navy}}>{selUser.kuerzel}</div>
            <div><div style={{fontSize:18,fontWeight:800}}>{selUser.vorname}{selUser.nachname?" "+selUser.nachname:""}</div><div style={{fontSize:11,opacity:.45}}>{selUser.role}</div></div>
          </div>
        </div>
        <div style={{padding:"32px 24px",textAlign:"center"}}>
          <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:28}}>PIN eingeben</div>
          <div style={{display:"flex",justifyContent:"center",gap:18,marginBottom:8}}>
            {dots.map((f,i)=><div key={i} style={{width:16,height:16,borderRadius:"50%",background:f?(err?C.red:C.navy):C.border,transition:"background .15s"}}/>)}
          </div>
          <div style={{minHeight:28,marginBottom:8,fontSize:12,color:C.red,fontWeight:600}}>{err}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,maxWidth:260,margin:"0 auto"}}>
            {["1","2","3","4","5","6","7","8","9","","0","⌫"].map((k,i)=>(
              k===""?<div key={i}/>:
              <button key={i} onClick={()=>k==="⌫"?setPin(p=>p.slice(0,-1)):pinKey(k)}
                style={{height:56,borderRadius:14,border:`1px solid ${C.border}`,background:C.card,fontSize:k==="⌫"?20:22,fontWeight:600,color:C.text,cursor:"pointer"}}
                onTouchStart={e=>e.currentTarget.style.background="#eee"} onTouchEnd={e=>e.currentTarget.style.background=C.card}>{k}</button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  if(page==="register")return(
    <div style={{background:C.bg,minHeight:"100vh"}}>
      <div style={S.hdr}>
        <button onClick={()=>setPage("list")} style={S.backBtn}>← Zurück</button>
        <div style={{fontSize:18,fontWeight:800}}>Registrieren</div>
        <div style={{fontSize:11,opacity:.45,marginTop:2}}>Neues Konto erstellen</div>
      </div>
      <div style={{padding:"16px 16px 40px"}}>
        <div style={{...S.card,padding:"18px 16px"}}>
          {[["Vorname *",regV,setRegV,"Anna"],["Nachname (optional)",regN,setRegN,"Kim"]].map(([lbl,val,set,ph])=>(
            <div key={lbl} style={{marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:4}}>{lbl}</div>
              <input value={val} onChange={e=>set(e.target.value)} placeholder={ph} style={S.input}/>
            </div>
          ))}
          {isAdminName&&(
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:4}}>Rolle</div>
              <div style={{display:"flex",gap:9}}>
                {["Staff","Admin"].map(r=>(
                  <button key={r} onClick={()=>setRegRole(r)} style={{flex:1,padding:"10px",borderRadius:9,fontSize:12,fontWeight:700,cursor:"pointer",border:`2px solid ${regRole===r?C.mint:C.border}`,background:regRole===r?C.mintLight:"#fff",color:regRole===r?C.mintDark:C.muted}}>
                    {r==="Admin"?"👑 Admin":"👤 Staff"}
                  </button>
                ))}
              </div>
            </div>
          )}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            {[["PIN (4 Ziffern) *",regP,setRegP],["PIN wiederholen *",regP2,setRegP2]].map(([lbl,val,set])=>(
              <div key={lbl}>
                <div style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:4}}>{lbl}</div>
                <input type="password" inputMode="numeric" maxLength={4} value={val} onChange={e=>set(e.target.value.replace(/\D/g,""))} placeholder="••••" style={{...S.input,letterSpacing:"0.3em",fontSize:18}}/>
              </div>
            ))}
          </div>
          {regErr&&<div style={{fontSize:11,color:C.red,fontWeight:600,marginBottom:10}}>{regErr}</div>}
          <button onClick={doRegister} style={{width:"100%",padding:"13px",borderRadius:11,border:"none",background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,color:"#fff",fontSize:14,fontWeight:800,cursor:"pointer"}}>Konto erstellen</button>
        </div>
      </div>
    </div>
  );

  const UserCard=({u})=>{
    const isMgr=MANAGERS.includes(u.key);
    return(
      <button onClick={()=>selectUser(u)} style={{width:"100%",display:"flex",alignItems:"center",gap:13,padding:"12px 14px",borderRadius:14,border:`1px solid ${C.border}`,background:C.card,cursor:"pointer",boxShadow:"0 2px 8px rgba(44,44,44,.05)",textAlign:"left",marginBottom:7}}
        onTouchStart={e=>e.currentTarget.style.background=C.mintLight} onTouchEnd={e=>e.currentTarget.style.background=C.card}>
        <div style={{width:40,height:40,borderRadius:"50%",flexShrink:0,background:isMgr?C.yellow:C.navy,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,color:"#fff"}}>{u.kuerzel}</div>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:700,color:C.text}}>{u.vorname}{u.nachname?" "+u.nachname:""}</div>
          <div style={{fontSize:10,color:C.muted,marginTop:1}}>{u.role}</div>
        </div>
        <span style={{fontSize:14,color:C.muted}}>🔒</span>
      </button>
    );
  };

  return(
    <div style={{background:C.bg,minHeight:"100vh"}}>
      <div style={S.hdr}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:11,opacity:.4,marginBottom:3,letterSpacing:".08em",textTransform:"uppercase"}}>Willkommen</div>
            <div style={{fontSize:28,fontWeight:800,lineHeight:1.1}}>teeamo</div>
            <div style={{fontSize:11,opacity:.4,marginTop:3}}>Münster · Stempeluhr</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:24,fontWeight:700,fontVariantNumeric:"tabular-nums"}}>{pad(now.getHours())}:{pad(now.getMinutes())}</div>
            <div style={{fontSize:10,opacity:.4,marginTop:2}}>{new Date().toLocaleDateString("de-DE")}</div>
          </div>
        </div>
      </div>
      <div style={{padding:"16px 16px 40px"}}>
        <button onClick={()=>setPage("kalender")} style={{width:"100%",padding:"14px 16px",borderRadius:14,border:`1.5px solid ${C.mint}`,background:C.mintLight,color:C.mintDark,fontSize:14,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:6}}
          onTouchStart={e=>{e.currentTarget.style.background=C.mint;e.currentTarget.style.color="#fff";}} onTouchEnd={e=>{e.currentTarget.style.background=C.mintLight;e.currentTarget.style.color=C.mintDark;}}>
          📋 Dienstplan anzeigen
        </button>
        <div style={{textAlign:"center",fontSize:10,color:C.muted,marginBottom:18}}>Ohne Anmeldung – nur Leseansicht</div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
          <div style={{flex:1,height:1,background:C.border}}/><span style={{fontSize:10,color:C.muted,fontWeight:600}}>ODER ANMELDEN</span><div style={{flex:1,height:1,background:C.border}}/>
        </div>
        {empList.map(u=><UserCard key={u.key} u={u}/>)}
        <div style={{display:"flex",alignItems:"center",gap:10,margin:"14px 0"}}>
          <div style={{flex:1,height:1,background:C.border}}/><span style={{fontSize:10,color:C.muted,fontWeight:600}}>MANAGEMENT</span><div style={{flex:1,height:1,background:C.border}}/>
        </div>
        {mgrList.map(u=><UserCard key={u.key} u={u}/>)}
        <button onClick={()=>setPage("register")} style={{width:"100%",padding:"12px",borderRadius:14,border:`1px dashed ${C.border}`,background:"transparent",color:C.muted,fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:8}}>
          + Neues Konto erstellen
        </button>
      </div>
    </div>
  );
}

// ── MITARBEITER ───────────────────────────────────────────────────────────────
function MitarbeiterView({userKey,users,records,setRecords,antraege,setAntraege,onLogout,csvCtx}){
  const user=users.find(u=>u.key===userKey);
  const now=useNow();
  const [tab,setTab]=useState("home");
  const [clockedIn,setClockedIn]=useState(false);
  const [clockInTime,setClockInTime]=useState(null);
  const [clockFiliale,setClockFiliale]=useState("");
  const [selFiliale,setSelFiliale]=useState(FILIALEN[0]);
  const [grund,setGrund]=useState("");
  const [elapsed,setElapsed]=useState(0);
  const [modal,setModal]=useState(null);
  const [nDatum,setNDatum]=useState(today());
  const [nFiliale,setNFiliale]=useState(FILIALEN[0]);
  const [nEin,setNEin]=useState("09:00");
  const [nAus,setNAus]=useState("17:00");
  const [nGrund,setNGrund]=useState("");
  const [nMsg,setNMsg]=useState("");

  useEffect(()=>{
    if(!clockedIn){setElapsed(0);return;}
    const t=setInterval(()=>setElapsed(e=>e+1),1000); return()=>clearInterval(t);
  },[clockedIn]);

  const displayName=user.vorname+(user.nachname?" "+user.nachname:"");
  const myRecs=records.filter(r=>r.user===user.vorname);
  const myAntraege=antraege.filter(a=>a.user===user.vorname);
  const monthSummary=FILIALEN.map(f=>({f,h:myRecs.filter(r=>r.filiale===f&&r.aus).reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0)})).filter(x=>x.h>0);

  function handleEin(){setClockedIn(true);setClockInTime(new Date());setClockFiliale(selFiliale);setModal(null);}
  function handleAus(){
    const outStr=`${pad(now.getHours())}:${pad(now.getMinutes())}`;
    const inStr=`${pad(clockInTime.getHours())}:${pad(clockInTime.getMinutes())}`;
    setRecords(prev=>[...prev,{id:Date.now(),user:user.vorname,date:today(),filiale:clockFiliale,ein:inStr,aus:outStr,note:grund,typ:"normal"}]);
    setClockedIn(false);setClockInTime(null);setElapsed(0);setGrund("");setModal(null);
  }
  function submitNachtrag(){
    if(!nGrund.trim()){setNMsg("Bitte einen Grund angeben.");return;}
    const z=NACHTRAG_ROUTING[nFiliale]||"yeaji";

  const elStr=`${pad(Math.floor(elapsed/3600))}:${pad(Math.floor((elapsed%3600)/60))}:${pad(elapsed%60)}`;

}

// ── STATISTIK ─────────────────────────────────────────────────────────────────
function StatistikTab({records,users}){
  const [selMonth,setSelMonth]=useState("2026-06");
  const [exported,setExported]=useState(null);
  const empList=users.filter(u=>!MANAGERS.includes(u.key)).sort((a,b)=>a.vorname.localeCompare(b.vorname));
  const monthRecs=records.filter(r=>r.date.startsWith(selMonth)&&r.aus);

  function downloadCSV(rows,filename){
    const bom="\uFEFF";
    const csv=bom+rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(";")).join("\r\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=filename;a.click();
    URL.revokeObjectURL(url);
    setExported(filename);setTimeout(()=>setExported(null),3000);
  }
  function exportDetail(){
    const hdr=["Name","Datum","Wochentag","Filiale","Einstempeln","Ausstempeln","Arbeitsstunden","Typ","Anmerkung"];
    const rows=[hdr,...[...monthRecs].sort((a,b)=>a.date.localeCompare(b.date)).map(r=>{
      const h=stunden(r.ein,r.aus);
      return[r.user,r.date,TAGE_DE[new Date(r.date).getDay()],r.filiale,r.ein,r.aus,h!=null?h.toFixed(2):"",r.typ==="nachtrag"?"Nachtrag":"Normal",r.note||""];
    })];
    downloadCSV(rows,`Stundennachweis_Detail_${selMonth}.csv`);
  }
  function exportSummary(){
    const hdr=["Name","Rolle","Arbeitstage","Gesamtstunden","TEEAMO Arkaden (Std)","TEEAMO Aegidiimarkt (Std)","Teenjoy (Std)","Ø Std/Tag"];
    const rows=[hdr,...empList.map(emp=>{
      const er=monthRecs.filter(r=>r.user===emp.vorname);
      const total=er.reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0);
      const byFil={};FILIALEN.forEach(f=>{byFil[f]=er.filter(r=>r.filiale===f).reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0);});
      return[emp.vorname,emp.role,er.length,total.toFixed(2),byFil["TEEAMO Arkaden"].toFixed(2),byFil["TEEAMO Aegidiimarkt"].toFixed(2),byFil["Teenjoy"].toFixed(2),er.length?(total/er.length).toFixed(2):"0.00"];
    })];
    downloadCSV(rows,`Monatsübersicht_${selMonth}.csv`);
  }

  return(
    <div style={{padding:"14px"}}>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:7,letterSpacing:".06em",textTransform:"uppercase"}}>Monat auswählen</div>
        <div style={{display:"flex",gap:7}}>
          {MONTHS.map(m=>(
            <button key={m} onClick={()=>setSelMonth(m)} style={{flex:1,padding:"8px 2px",borderRadius:9,fontSize:10,fontWeight:700,cursor:"pointer",border:`2px solid ${selMonth===m?C.mint:C.border}`,background:selMonth===m?C.mintLight:"#fff",color:selMonth===m?C.mintDark:C.muted}}>
              {MONTH_LABELS[m]}
            </button>
          ))}
        </div>
      </div>
      <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:8,letterSpacing:".06em",textTransform:"uppercase"}}>Übersicht – {MONTH_LABELS[selMonth]}</div>
      <div style={{display:"flex",flexDirection:"column",gap:9,marginBottom:14}}>
        {empList.map(emp=>{
          const er=monthRecs.filter(r=>r.user===emp.vorname);
          const total=er.reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0);
          const byFil={};FILIALEN.forEach(f=>{byFil[f]=er.filter(r=>r.filiale===f).reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0);});
          const fColors=[C.mintLight,C.yellowLight,C.redLight];
          const fTColors=[C.mintDark,"#b37400",C.red];
          return(
            <div key={emp.key} style={S.card}>
              <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:9}}>
                <div style={{width:34,height:34,borderRadius:"50%",background:C.navy,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:12,color:"#fff",flexShrink:0}}>{emp.kuerzel}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:800,color:C.text}}>{emp.vorname}</div>
                  <div style={{fontSize:9,color:C.muted}}>{emp.role}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:18,fontWeight:800,color:C.mintDark}}>{total.toFixed(1)}<span style={{fontSize:10,color:C.muted}}> Std</span></div>
                  <div style={{fontSize:9,color:C.muted}}>{er.length} Tage</div>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:5}}>
                {FILIALEN.map((f,fi)=>(
                  <div key={f} style={{background:fColors[fi],borderRadius:7,padding:"6px 7px"}}>
                    <div style={{fontSize:8,fontWeight:700,color:fTColors[fi],marginBottom:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{f}</div>
                    <div style={{fontSize:12,fontWeight:800,color:fTColors[fi]}}>{byFil[f].toFixed(1)}h</div>
                    <div style={{fontSize:8,color:fTColors[fi],opacity:.7}}>{er.filter(r=>r.filiale===f).length}d</div>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{background:C.navy,borderRadius:14,padding:"16px",marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:800,color:"#fff",marginBottom:3}}>📥 Daten exportieren</div>
        <div style={{fontSize:10,color:"rgba(255,255,255,.4)",marginBottom:14}}>Als CSV – öffnet direkt in Excel</div>
        {[
          {title:"Stundennachweis (Details)",sub:"Jeder Tag · Name · Datum · Filiale · Ein/Aus · Std",fn:exportDetail,file:`Detail_${selMonth}.csv`},
          {title:"Monatsübersicht (Zusammenfassung)",sub:"Pro Mitarbeiterin · Gesamtstunden · je Filiale",fn:exportSummary,file:`Übersicht_${selMonth}.csv`},
        ].map(({title,sub,fn,file})=>(
          <div key={file} style={{background:"rgba(255,255,255,.07)",borderRadius:10,padding:"12px",marginBottom:8}}>
            <div style={{fontSize:12,fontWeight:700,color:"#fff",marginBottom:2}}>{title}</div>
            <div style={{fontSize:9,color:"rgba(255,255,255,.4)",marginBottom:10}}>{sub}</div>
            <button onClick={fn} style={{width:"100%",padding:"10px",borderRadius:8,border:"none",background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,color:"#fff",fontWeight:800,fontSize:11,cursor:"pointer"}}>⬇ {file}</button>
          </div>
        ))}
      </div>
      {exported&&(
        <div style={{...S.card,display:"flex",alignItems:"center",gap:9,border:`1.5px solid ${C.mint}`,background:C.mintLight}}>
          <span style={{fontSize:18}}>✅</span>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:C.mintDark}}>Datei gespeichert!</div>
            <div style={{fontSize:10,color:C.mintDark,opacity:.8}}>{exported}</div>
          </div>
        </div>
      )}
    </div>
  );
}

  const approve=(id,ok)=>setAntraege(prev=>prev.map(a=>a.id===id?{...a,status:ok?"genehmigt":"abgelehnt"}:a));

          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:7}}>
            <div style={{width:38,height:38,borderRadius:"50%",background:C.yellow,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,color:C.navy}}>{manager?.kuerzel||"M"}</div>
            <button onClick={onLogout} style={{fontSize:10,background:"rgba(255,255,255,.1)",border:"0.5px solid rgba(255,255,255,.2)",color:"rgba(255,255,255,.6)",borderRadius:7,padding:"3px 8px",cursor:"pointer"}}>Abmelden</button>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginTop:14}}>
          {[{l:"Aktiv",n:empList.filter(u=>getStatus(u.vorname)==="Aktiv").length,c:C.mint},
            {l:"Feierabend",n:empList.filter(u=>getStatus(u.vorname)==="Feierabend").length,c:"rgba(255,255,255,.4)"},
            {l:"Nicht da",n:empList.filter(u=>getStatus(u.vorname)==="Nicht erschienen").length,c:C.red}].map(({l,n,c})=>(
            <div key={l} style={{background:"rgba(255,255,255,.07)",borderRadius:11,padding:"9px 10px",textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:800,color:c}}>{n}</div>
              <div style={{fontSize:9,opacity:.45,marginTop:1}}>{l}</div>
            </div>
          ))}
        </div>
      </div>

      {tab==="uebersicht"&&!detailKey&&(
        <div style={{padding:"14px"}}>
          <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:9,textTransform:"uppercase",letterSpacing:".05em"}}>Heutige Mitarbeiterinnen</div>
          <div style={{display:"flex",flexDirection:"column",gap:9}}>
            {empList.map(emp=>{
              const st=getStatus(emp.vorname),br=getBranch(emp.vorname);
              return(
                <div key={emp.key} style={{...S.card,display:"flex",alignItems:"center",gap:11,padding:"12px 14px"}}>
                  <button onClick={()=>setDetailKey(emp.key)} style={{flex:1,border:"none",background:"none",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:11,padding:0}}>
                    <div style={{width:40,height:40,borderRadius:"50%",background:C.navy,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,color:"#fff",flexShrink:0}}>{emp.kuerzel}</div>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:7}}>
                        <span style={{fontSize:13,fontWeight:700,color:C.text}}>{emp.vorname}</span>
                        <span style={{fontSize:9,color:C.muted,background:C.border,padding:"2px 6px",borderRadius:99}}>{emp.role}</span>
                      </div>
                      <div style={{fontSize:10,color:C.muted,marginTop:2}}>{br?br+" · ":""}Heute</div>
                    </div>
                    <span style={{fontSize:9,fontWeight:700,padding:"3px 9px",borderRadius:99,color:sColor(st),background:sBg(st)}}>{st}</span>
                  </button>
                  <button onClick={()=>setDeleteConfirm(emp.key)} style={{flexShrink:0,width:30,height:30,borderRadius:8,border:`1px solid ${C.border}`,background:C.redLight,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",marginLeft:4}}>
                    <span style={{fontSize:13,color:C.red}}>🗑</span>
                  </button>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {tab==="uebersicht"&&detailKey&&(()=>{
        const emp=users.find(u=>u.key===detailKey);
        const empRecs=records.filter(r=>r.user===emp.vorname);
        const total=empRecs.filter(r=>r.aus).reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0);
        return(
          <div style={{padding:"14px"}}>
            <button onClick={()=>setDetailKey(null)} style={{background:"none",border:"none",cursor:"pointer",color:C.mintDark,fontSize:12,fontWeight:700,marginBottom:12}}>← Zurück</button>
            <div style={{...S.card,display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
              <div style={{width:48,height:48,borderRadius:"50%",background:C.navy,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:16,color:"#fff"}}>{emp.kuerzel}</div>
              <div>
                <div style={{fontSize:16,fontWeight:800,color:C.text}}>{emp.vorname}</div>
                <div style={{fontSize:11,color:C.muted}}>{emp.role}</div>
                <span style={{fontSize:9,fontWeight:700,padding:"3px 9px",borderRadius:99,marginTop:5,display:"inline-block",color:sColor(getStatus(emp.vorname)),background:sBg(getStatus(emp.vorname))}}>{getStatus(emp.vorname)}</span>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              {[{l:"Std. gesamt",v:total.toFixed(1)+"h"},{l:"Arbeitstage",v:empRecs.length+"d"}].map(({l,v})=>(
                <div key={l} style={S.card}>
                  <div style={{fontSize:10,color:C.muted,marginBottom:4}}>{l}</div>
                  <div style={{fontSize:20,fontWeight:800,color:C.mintDark}}>{v}</div>
                </div>
              ))}
            </div>
            <div style={{...S.card,padding:0,overflow:"hidden"}}>
              <div style={{padding:"11px 13px",borderBottom:`1px solid ${C.border}`,fontSize:11,fontWeight:700,color:C.text}}>Arbeitsnachweise</div>
              {empRecs.length===0?<div style={{padding:"12px",fontSize:11,color:C.muted}}>Keine Einträge.</div>:empRecs.map((r,i)=>(
                <div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 13px",borderBottom:i<empRecs.length-1?`1px solid ${C.border}`:"none"}}>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <div style={{width:30,height:30,borderRadius:7,background:r.aus?C.mintLight:C.yellowLight,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                      <span style={{fontSize:7,color:C.muted}}>{r.date.slice(5)}</span>
                      <span style={{fontSize:9,fontWeight:700,color:r.aus?C.mintDark:C.yellow}}>{r.filiale.slice(-1)}</span>
                    </div>
                    <div>
                      <div style={{fontSize:11,color:C.muted}}>{r.ein} → {r.aus||"läuft"}</div>
                      <div style={{fontSize:9,color:C.muted}}>{r.filiale}</div>
                    </div>
                  </div>
                  <span style={{fontSize:11,fontWeight:700,color:r.aus?C.text:C.yellow}}>{stdLabel(r.ein,r.aus)}</span>
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {tab==="dienstplan"&&(
        <div style={{padding:"14px"}}>
          <div style={{...S.card,padding:0,overflow:"hidden"}}><KalenderView csvCtx={csvCtx}/></div>
        </div>
      )}

      {tab==="antraege"&&(
        <div style={{padding:"14px"}}>
          {offene.length>0&&(
            <div style={{marginBottom:12}}>
              <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:9,textTransform:"uppercase",letterSpacing:".05em"}}>Offene Anträge ({offene.length})</div>
              {offene.map(a=>(
                <div key={a.id} style={{...S.card,marginBottom:9}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
                    <div>
                      <div style={{fontSize:12,fontWeight:700,color:C.text}}>{a.user}</div>
                      <div style={{fontSize:10,color:C.muted}}>{a.date} · {a.filiale} · {a.ein}–{a.aus}</div>
                    </div>
                    <span style={{fontSize:9,fontWeight:700,color:C.yellow,background:C.yellowLight,padding:"3px 7px",borderRadius:99}}>Offen</span>
                  </div>
                  <div style={{fontSize:11,color:C.text,background:C.bg,borderRadius:7,padding:"6px 9px",marginBottom:9}}>📌 „{a.grund}"</div>
                  <div style={{display:"flex",gap:7}}>
                    <button onClick={()=>approve(a.id,false)} style={{flex:1,padding:"9px",borderRadius:9,border:`1.5px solid ${C.red}`,background:C.redLight,color:C.red,fontWeight:700,fontSize:12,cursor:"pointer"}}>✕ Ablehnen</button>
                    <button onClick={()=>approve(a.id,true)} style={{flex:1,padding:"9px",borderRadius:9,border:"none",background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}}>✓ Genehmigen</button>
                  </div>
                </div>
              ))}
            </div>
          )}
          <div style={S.card}>
            <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:9,textTransform:"uppercase",letterSpacing:".05em"}}>Alle Anträge</div>
            {antraege.length===0?<div style={{fontSize:11,color:C.muted}}>Keine Anträge.</div>:antraege.map((a,i)=>(
              <div key={a.id} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",paddingBottom:i<antraege.length-1?9:0,marginBottom:i<antraege.length-1?9:0,borderBottom:i<antraege.length-1?`1px solid ${C.border}`:"none"}}>
                <div>
                  <div style={{fontSize:11,fontWeight:700,color:C.text}}>{a.user} · {a.date}</div>
                  <div style={{fontSize:10,color:C.muted}}>{a.filiale} · {a.ein}–{a.aus}</div>
                </div>
                <span style={S.pill(a.status)}>{a.status==="offen"?"Offen":a.status==="genehmigt"?"Genehmigt":"Abgelehnt"}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {tab==="statistik"&&<StatistikTab records={records} users={users}/>}

      <div style={S.nav}>
        {[{id:"uebersicht",icon:"👥",lbl:"Übersicht"},
          {id:"dienstplan",icon:"📋",lbl:"Dienstplan"},
          {id:"antraege",icon:"📥",lbl:`Anträge${offene.length>0?" ("+offene.length+")":""}`},
          {id:"statistik",icon:"📊",lbl:"Statistik"}].map(t=>(
          <button key={t.id} onClick={()=>{setTab(t.id);setDetailKey(null);}} style={{flex:1,border:"none",background:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"3px 0"}}>
            <span style={{fontSize:19}}>{t.icon}</span>
            <span style={{fontSize:9,fontWeight:600,color:tab===t.id?C.mintDark:C.muted}}>{t.lbl}</span>
            {tab===t.id&&<div style={{width:16,height:2,background:C.mint,borderRadius:99}}/>}
          </button>
        ))}
      </div>

      {deleteConfirm&&(()=>{
        const empToDel=users.find(u=>u.key===deleteConfirm);
        return(
          <div style={{position:"fixed",inset:0,background:"rgba(20,20,20,.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:"24px"}}>
            <div style={{background:C.card,borderRadius:18,padding:"24px 22px",width:"100%",maxWidth:340,boxShadow:"0 8px 32px rgba(0,0,0,.18)"}}>
              <div style={{width:48,height:48,borderRadius:"50%",background:C.redLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,margin:"0 auto 14px"}}>🗑</div>
              <div style={{fontSize:16,fontWeight:800,color:C.text,textAlign:"center",marginBottom:6}}>Konto löschen?</div>
              <div style={{fontSize:12,color:C.muted,textAlign:"center",marginBottom:20}}>
                Das Konto von <strong style={{color:C.text}}>{empToDel?.vorname}</strong> wird dauerhaft gelöscht. Diese Aktion kann nicht rückgängig gemacht werden.
              </div>
              <div style={{display:"flex",gap:9}}>
                <button onClick={()=>setDeleteConfirm(null)} style={{flex:1,padding:"12px",borderRadius:11,border:`1.5px solid ${C.border}`,background:C.card,color:C.muted,fontWeight:700,fontSize:13,cursor:"pointer"}}>Abbrechen</button>
                <button onClick={()=>{setUsers(prev=>prev.filter(u=>u.key!==deleteConfirm));setDeleteConfirm(null);setDetailKey(null);}}
                  style={{flex:1,padding:"12px",borderRadius:11,border:"none",background:`linear-gradient(135deg,${C.red},#A8432E)`,color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}}>Löschen</button>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState("login");
  const [userKey,setUserKey]=useState(null);
  // ✅ usePersist: ls 우선, INIT은 최초 1회만 사용, 변경 즉시 저장
  const [records, setRecords]   = usePersist("teeamo_records",  INIT_RECORDS);
  const [antraege,setAntraege]  = usePersist("teeamo_antraege", INIT_ANTRAEGE);
  const [users,   setUsers]     = usePersist("teeamo_users",    INIT_USERS);
  // ✅ CSV: 앱 최상단 1회 fetch, 모든 화면에 공유
  const csvCtx = useDienstplanCSV();

  function handleLogin(key){
    const u=users.find(x=>x.key===key);
    const isAdmin=MANAGERS.includes(key)||(u&&u.isAdmin);
    setUserKey(key);setScreen(isAdmin?"manager":"mitarbeiter");
  }
  function handleLogout(){setUserKey(null);setScreen("login");}

  return(
    <div style={{maxWidth:500,margin:"0 auto",minHeight:"100vh",background:C.bg}}>
      {screen==="login"&&<LoginView onLogin={handleLogin} users={users} setUsers={setUsers} csvCtx={csvCtx}/>}
      {screen==="mitarbeiter"&&<MitarbeiterView userKey={userKey} users={users} records={records} setRecords={setRecords} antraege={antraege} setAntraege={setAntraege} onLogout={handleLogout} csvCtx={csvCtx}/>}
      {screen==="manager"&&<ManagerView records={records} antraege={antraege} setAntraege={setAntraege} onLogout={handleLogout} userKey={userKey} users={users} setUsers={setUsers} csvCtx={csvCtx}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
