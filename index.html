// ── ✅ LocalStorage: 최초 1회만 INIT 사용, 이후 변경은 즉시 저장 ─────────────
function lsGet(key, fallback) {
  try {
    const v = localStorage.getItem(key);
    if (v !== null) return JSON.parse(v);
    localStorage.setItem(key, JSON.stringify(fallback));
    return fallback;
  } catch { return fallback; }
}
function lsSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}
function usePersist(lsKey, init) {
  const [state, setState] = useState(() => lsGet(lsKey, init));
  const setAndSave = useCallback((updater) => {
    setState(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      lsSet(lsKey, next);
      return next;
    });
  }, [lsKey]);
  return [state, setAndSave];
}

// ── Firebase 실시간 동기화 훅 ─────────────────────────────────────────────────
function useFirebase(path, fallback) {
  const [data, setData] = useState(fallback);
  const [ready, setReady] = useState(false);

  useEffect(() => {
    let unsubscribe = null;

    function attach() {
      const db = window._fbDb;
      const fbRef = window._fbRef;
      const fbOnValue = window._fbOnValue;
      if (!db || !fbRef || !fbOnValue) return false;
      const r = fbRef(db, path);
      fbOnValue(r, snap => {
        const val = snap.val();
        if (val === null) {
          setData(fallback);
        } else if (Array.isArray(fallback)) {
          setData(Object.values(val));
        } else {
          setData(val);
        }
        setReady(true);
      });
      return true;
    }

    // 이미 준비됐으면 바로 연결
    if (attach()) return;

    // 아직 안 됐으면 폴링으로 재시도 (최대 10초)
    let tries = 0;
    const iv = setInterval(() => {
      tries++;
      if (attach()) { clearInterval(iv); return; }
      if (tries > 20) {
        clearInterval(iv);
        console.error("Firebase 연결 실패");
        setReady(true); // 로딩 풀어주기
      }
    }, 500);

    return () => clearInterval(iv);
  }, [path]);

  function setter(updater) {
    setData(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      if (window._fbDb && window._fbRef && window._fbSet) {
        const toSave = Array.isArray(next)
          ? Object.fromEntries(next.map((v, i) => [v.id || i, v]))
          : next;
        window._fbSet(window._fbRef(window._fbDb, path), toSave)
          .catch(e => console.error("FB write error:", e));
      }
      return next;
    });
  }

  return [data, setter, ready];
}

// ── 유틸 ─────────────────────────────────────────────────────────────────────
function pad(n) { return String(n).padStart(2, "0"); }
function useNow() {
  const [t, setT] = useState(new Date());
  useEffect(() => { const i = setInterval(() => setT(new Date()), 1000); return () => clearInterval(i); }, []);
  return t;
}
function stunden(ein, aus) {
  if (!ein || !aus) return null;
  const [eh, em] = ein.split(":").map(Number);
  const [ah, am] = aus.split(":").map(Number);
  return (ah * 60 + am - eh * 60 - em) / 60;
}
function stdLabel(ein, aus) { const h = stunden(ein, aus); return h === null ? "–" : h.toFixed(1) + "h"; }
function today() { return new Date().toISOString().slice(0, 10); }

// ── KALENDER VIEW (plan.png 이미지 뷰어 + 내 일정) ──────────────────────────
function KalenderView({ csvCtx, userName, records }) {
  const [imgErr, setImgErr] = useState(false);
  const [scale, setScale] = useState(1);
  const [offset, setOffset] = useState({ x: 0, y: 0 });
  const containerRef = useRef(null);
  const lastTouchRef = useRef(null);
  const lastDistRef = useRef(null);
  const lastScaleRef = useRef(1);
  const lastOffsetRef = useRef({ x: 0, y: 0 });

  const [schedule] = useFirebase("schedule", {});
  const [planImg] = useFirebase("planImage", null);
  const myShifts = (userName && schedule[userName]) ? schedule[userName] : [];

  // viewport는 그대로 유지 (페이지 줌 비활성화 상태 유지)

  function clampOffset(ox, oy, sc, el) {
    if (!el) return { x: ox, y: oy };
    const cw = el.clientWidth;
    const ch = el.clientHeight;
    const imgW = cw * sc;
    const imgH = ch * sc; // height auto이므로 근사
    const maxX = Math.max(0, (imgW - cw) / 2);
    const maxY = Math.max(0, (imgH - ch) / 2);
    return { x: Math.min(maxX, Math.max(-maxX, ox)), y: Math.min(maxY, Math.max(-maxY, oy)) };
  }

  function getDist(t1, t2) {
    const dx = t1.clientX - t2.clientX;
    const dy = t1.clientY - t2.clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }
  function getMid(t1, t2) {
    return { x: (t1.clientX + t2.clientX) / 2, y: (t1.clientY + t2.clientY) / 2 };
  }

  function onTouchStart(e) {
    e.stopPropagation();
    if (e.touches.length === 2) {
      lastDistRef.current = getDist(e.touches[0], e.touches[1]);
      lastScaleRef.current = scale;
      lastOffsetRef.current = offset;
    } else if (e.touches.length === 1) {
      lastTouchRef.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      lastOffsetRef.current = offset;
    }
  }

  function onTouchMove(e) {
    e.preventDefault();
    e.stopPropagation();
    const el = containerRef.current;
    if (e.touches.length === 2) {
      const dist = getDist(e.touches[0], e.touches[1]);
      const ratio = dist / lastDistRef.current;
      const newScale = Math.min(5, Math.max(1, lastScaleRef.current * ratio));
      setScale(newScale);
      if (newScale === 1) setOffset({ x: 0, y: 0 });
    } else if (e.touches.length === 1 && scale > 1) {
      const dx = e.touches[0].clientX - lastTouchRef.current.x;
      const dy = e.touches[0].clientY - lastTouchRef.current.y;
      const raw = { x: lastOffsetRef.current.x + dx, y: lastOffsetRef.current.y + dy };
      setOffset(clampOffset(raw.x, raw.y, scale, el));
    }
  }

  function onTouchEnd(e) {
    e.stopPropagation();
    lastDistRef.current = null;
    if (e.touches.length === 1) {
      lastTouchRef.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      lastOffsetRef.current = offset;
    }
  }

  function onDoubleClick() {
    setScale(1);
    setOffset({ x: 0, y: 0 });
  }

  return (
    <div style={{ width: "100%", background: C.card, borderRadius: 14, overflow: "hidden" }}>
      {(imgErr && !planImg) ? (
        <div style={{
          display: "flex", flexDirection: "column", alignItems: "center",
          justifyContent: "center", padding: "48px 24px", gap: 12, textAlign: "center",
        }}>
          <span style={{fontSize: 36}}>📋</span>
          <div style={{fontSize: 13, fontWeight: 700, color: C.text}}>Kein Dienstplan vorhanden</div>
          <div style={{fontSize: 11, color: C.muted, lineHeight: 1.5}}>
            Der Manager hat noch keinen Dienstplan hochgeladen.
          </div>
        </div>
      ) : (
        <div>
          <div
            ref={containerRef}
            onTouchStart={onTouchStart}
            onTouchMove={onTouchMove}
            onTouchEnd={onTouchEnd}
            onDoubleClick={onDoubleClick}
            style={{ overflow: "hidden", touchAction: "none", cursor: scale > 1 ? "grab" : "default" }}
          >
            <img
              src={planImg || "plan.png"}
              alt="Dienstplan"
              onError={() => setImgErr(true)}
              style={{
                display: "block", width: "100%", height: "auto",
                transform: `scale(${scale}) translate(${offset.x / scale}px, ${offset.y / scale}px)`,
                transformOrigin: "center center", transition: "none",
                userSelect: "none", pointerEvents: "none",
              }}
            />
          </div>
        </div>
      )}

      {/* 내 일정 */}
      {userName && myShifts.length > 0 && (
        <div style={{padding:"14px", borderTop:`1px solid ${C.border}`}}>
          <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:9,textTransform:"uppercase",letterSpacing:".05em"}}>
            Meine Schichten
          </div>
          {myShifts.map((s, i) => {
            const actualRec = records?.find(r => r.user === userName && r.date === s.date);
            const status = !actualRec ? "ausstehend" : !actualRec.aus ? "aktiv" : "erledigt";
            return (
              <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",
                padding:"10px 12px",borderRadius:10,marginBottom:6,
                background:status==="erledigt"?C.mintLight:status==="aktiv"?"#FFF9E6":C.bg,
                border:`1px solid ${status==="erledigt"?C.mint:status==="aktiv"?C.yellow:C.border}`}}>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:C.text}}>
                    {new Date(s.date).toLocaleDateString("de-DE",{weekday:"short",day:"numeric",month:"numeric"})}
                  </div>
                  <div style={{fontSize:10,color:C.muted,marginTop:1}}>{s.filiale}{s.time?` · ${s.time}`:""}</div>
                </div>
                <span style={{fontSize:9,fontWeight:700,padding:"4px 9px",borderRadius:99,
                  color:status==="erledigt"?C.mintDark:status==="aktiv"?C.yellow:C.muted,
                  background:status==="erledigt"?"#fff":status==="aktiv"?C.yellowLight:C.border}}>
                  {status==="erledigt"?"✅ Gearbeitet":status==="aktiv"?"🟡 Im Dienst":"⏳ Ausstehend"}
                </span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── CLOCK MODAL ───────────────────────────────────────────────────────────────
function ClockModal({modal,now,selFiliale,clockFiliale,clockInTime,CLOCK_KEY,onClose,onEin,onAus}){
  const isEin = modal==="ein";
  const nowStr = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const [manualMode, setManualMode] = useState(false);
  const [manualTime, setManualTime] = useState(nowStr);

  const ausInvalid = !isEin && manualMode && clockInTime && (()=>{
    const [ah,am] = manualTime.split(":").map(Number);
    return (ah*60+am) - (clockInTime.getHours()*60+clockInTime.getMinutes()) <= 0;
  })();

  function doEin(){
    const t = manualMode ? manualTime : nowStr;
    const [h,m] = t.split(":").map(Number);
    const d = new Date(); d.setHours(h,m,0,0);
    onEin(d);
  }
  function doAus(){
    if(ausInvalid) return;
    const t = manualMode ? manualTime : nowStr;
    const inStr = `${pad(clockInTime.getHours())}:${pad(clockInTime.getMinutes())}`;
    onAus(inStr, t);
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(20,20,20,.55)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200}}>
      <div style={{background:C.card,borderRadius:"22px 22px 0 0",width:"100%",maxWidth:500,padding:"24px 22px 32px",paddingBottom:"max(32px,env(safe-area-inset-bottom))"}}>
        <div style={{width:36,height:4,background:C.border,borderRadius:99,margin:"0 auto 20px"}}/>
        <div style={{fontSize:16,fontWeight:800,color:C.text,marginBottom:4}}>
          {isEin?"Einstempeln bestätigen":"Ausstempeln bestätigen"}
        </div>
        <div style={{fontSize:12,color:C.muted,marginBottom:14}}>
          Filiale: <strong style={{color:C.text}}>{isEin?selFiliale:clockFiliale}</strong>
        </div>

        <div style={{marginBottom:16}}>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <button onClick={()=>setManualMode(false)}
              style={{flex:1,padding:"9px",borderRadius:9,fontSize:12,fontWeight:700,cursor:"pointer",
                border:`2px solid ${!manualMode?C.mint:C.border}`,
                background:!manualMode?C.mintLight:"#fff",
                color:!manualMode?C.mintDark:C.muted}}>
              🕐 Jetzt ({nowStr})
            </button>
            <button onClick={()=>setManualMode(true)}
              style={{flex:1,padding:"9px",borderRadius:9,fontSize:12,fontWeight:700,cursor:"pointer",
                border:`2px solid ${manualMode?C.yellow:C.border}`,
                background:manualMode?C.yellowLight:"#fff",
                color:manualMode?C.yellow:C.muted}}>
              ✏️ Zeit eingeben
            </button>
          </div>
          {manualMode&&(
            <div style={{background:C.yellowLight,borderRadius:10,padding:"12px 14px",border:`1.5px solid ${ausInvalid?C.red:C.yellow}`}}>
              <div style={{fontSize:10,fontWeight:700,color:C.yellow,marginBottom:6}}>
                {isEin?"Tatsächliche Einstempelzeit":"Tatsächliche Ausstempelzeit"}
              </div>
              <input type="time" value={manualTime} onChange={e=>setManualTime(e.target.value)}
                style={{...S.input,width:"80%",display:"block",margin:"0 auto",fontSize:20,fontWeight:700,textAlign:"center",borderColor:ausInvalid?C.red:C.yellow}}/>
              {!isEin&&clockInTime&&(()=>{
                const [ah,am]=manualTime.split(":").map(Number);
                const diff=(ah*60+am)-(clockInTime.getHours()*60+clockInTime.getMinutes());
                if(diff<=0) return(
                  <div style={{fontSize:11,color:C.red,fontWeight:700,marginTop:7,textAlign:"center"}}>
                    ⚠ Die Zeit liegt vor der Einstempelzeit ({pad(clockInTime.getHours())}:{pad(clockInTime.getMinutes())} Uhr)
                  </div>
                );
                return(
                  <div style={{fontSize:11,color:"#3a7a55",fontWeight:700,marginTop:7,textAlign:"center"}}>
                    ⏱ {Math.floor(diff/60)}h {diff%60}min Arbeitszeit
                  </div>
                );
              })()}
              {isEin&&(()=>{
                const [ah,am]=manualTime.split(":").map(Number);
                const diff=(now.getHours()*60+now.getMinutes())-(ah*60+am);
                if(diff<=0) return null;
                return(
                  <div style={{fontSize:11,color:C.yellow,fontWeight:700,marginTop:7,textAlign:"center"}}>
                    ⏱ {Math.floor(diff/60)}h {diff%60}min bereits vergangen
                  </div>
                );
              })()}
            </div>
          )}
        </div>

        <div style={{display:"flex",gap:9}}>
          <button onClick={onClose} style={{flex:1,padding:"12px",borderRadius:11,border:`1.5px solid ${C.border}`,background:C.card,color:C.muted,fontWeight:700,fontSize:13,cursor:"pointer"}}>Abbrechen</button>
          <button onClick={isEin?doEin:doAus} disabled={!!ausInvalid}
            style={{flex:2,padding:"12px",borderRadius:11,border:"none",
              background:ausInvalid?"#ccc":isEin?`linear-gradient(135deg,${C.mint},${C.mintDark})`:`linear-gradient(135deg,${C.red},#A8432E)`,
              color:"#fff",fontWeight:800,fontSize:14,cursor:ausInvalid?"not-allowed":"pointer",opacity:ausInvalid?0.6:1}}>
            {isEin?"Einstempeln":"Ausstempeln"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── MITARBEITER ───────────────────────────────────────────────────────────────
function MitarbeiterView({userKey,users,records,setRecords,antraege,setAntraege,onLogout,csvCtx}){
  const user=users.find(u=>u.key===userKey);
  const now=useNow();
  const [tab,setTab]=useState("home");

  // ── 근무 상태 localStorage 유지 ──────────────────────────────────────────────
  const CLOCK_KEY = `teeamo_clock_${userKey}`;
  const [clockedIn,setClockedIn]=useState(()=>{
    try { const s=localStorage.getItem(CLOCK_KEY); return s?JSON.parse(s).clockedIn:false; } catch{return false;}
  });
  const [clockInTime,setClockInTime]=useState(()=>{
    try { const s=localStorage.getItem(CLOCK_KEY); const v=s?JSON.parse(s).clockInTime:null; return v?new Date(v):null; } catch{return null;}
  });
  const [clockFiliale,setClockFiliale]=useState(()=>{
    try { const s=localStorage.getItem(CLOCK_KEY); return s?JSON.parse(s).clockFiliale:""; } catch{return "";}
  });

  // 상태 바뀔 때마다 즉시 저장
  useEffect(()=>{
    try { localStorage.setItem(CLOCK_KEY, JSON.stringify({clockedIn, clockInTime:clockInTime?clockInTime.toISOString():null, clockFiliale})); } catch{}
  },[clockedIn, clockInTime, clockFiliale]);

  const [selFiliale,setSelFiliale]=useState(FILIALEN[0]);
  const [grund,setGrund]=useState("");
  const [elapsed,setElapsed]=useState(()=>{
    // 앱 재시작 시 이미 근무 중이면 경과시간 복원
    try {
      const s=localStorage.getItem(CLOCK_KEY); const v=s?JSON.parse(s):null;
      if(v&&v.clockedIn&&v.clockInTime) return Math.floor((Date.now()-new Date(v.clockInTime).getTime())/1000);
    } catch{}
    return 0;
  });
  const [modal,setModal]=useState(null);
  const [nDatum,setNDatum]=useState(today());
  const [nFiliale,setNFiliale]=useState(FILIALEN[0]);
  const [nEin,setNEin]=useState("09:00");
  const [nAus,setNAus]=useState("17:00");
  const [nGrund,setNGrund]=useState("");
  const [nMsg,setNMsg]=useState("");

  useEffect(()=>{
    if(!clockedIn){setElapsed(0);return;}
    const t=setInterval(()=>setElapsed(e=>e+1),1000); return()=>clearInterval(t);
  },[clockedIn]);

  const displayName=user.vorname+(user.nachname?" "+user.nachname:"");
  const myRecs=records.filter(r=>r.user===user.vorname);
  const myAntraege=antraege.filter(a=>a.user===user.vorname);
  const monthSummary=FILIALEN.map(f=>({f,h:myRecs.filter(r=>r.filiale===f&&r.aus).reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0)})).filter(x=>x.h>0);

  function handleEin(){setClockedIn(true);setClockInTime(new Date());setClockFiliale(selFiliale);setModal(null);}
  function handleAus(){
    const outStr=`${pad(now.getHours())}:${pad(now.getMinutes())}`;
    const inStr=`${pad(clockInTime.getHours())}:${pad(clockInTime.getMinutes())}`;
    setRecords(prev=>[...prev,{id:Date.now(),user:user.vorname,date:today(),filiale:clockFiliale,ein:inStr,aus:outStr,note:grund,typ:"normal"}]);
    setClockedIn(false);setClockInTime(null);setElapsed(0);setGrund("");setModal(null);
    try{localStorage.removeItem(CLOCK_KEY);}catch{}
  }
  function submitNachtrag(){
    if(!nGrund.trim()){setNMsg("Bitte einen Grund angeben.");return;}
    const z=NACHTRAG_ROUTING[nFiliale]||"yeaji";
    setAntraege(prev=>[...prev,{id:Date.now(),user:user.vorname,date:nDatum,filiale:nFiliale,ein:nEin,aus:nAus,grund:nGrund,status:"offen",zustaendig:z}]);
    setNMsg(`Antrag eingereicht! Wird von ${z==="yeaji"?"Yeaji":"Teddy"} geprüft.`);setNGrund("");
  }

  const elStr=`${pad(Math.floor(elapsed/3600))}:${pad(Math.floor((elapsed%3600)/60))}:${pad(elapsed%60)}`;
  const timeStr=`${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

  return(
    <div style={{background:C.bg,minHeight:"100vh",paddingBottom:80}}>
      <div style={S.hdr}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:11,opacity:.45,marginBottom:3,letterSpacing:".06em",textTransform:"uppercase"}}>teeamo Münster</div>
            <div style={{fontSize:20,fontWeight:800}}>{displayName}</div>
            <div style={{fontSize:11,opacity:.5,marginTop:1}}>{user.role}</div>
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:7}}>
            <div style={{width:38,height:38,borderRadius:"50%",background:C.mint,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,color:C.navy}}>{user.kuerzel}</div>
            <button onClick={onLogout} style={{fontSize:10,background:"rgba(255,255,255,.1)",border:"0.5px solid rgba(255,255,255,.2)",color:"rgba(255,255,255,.6)",borderRadius:7,padding:"3px 8px",cursor:"pointer"}}>Abmelden</button>

          <div>

          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:9,opacity:.4,marginBottom:2}}>Heute</div>
            <div style={{fontSize:12,fontWeight:600}}>{new Date().toLocaleDateString("de-DE")}</div>
          </div>
        </div>
      </div>

      {clockedIn&&(
        <div style={{background:"#d4f0e0",borderBottom:`2px solid #a8dfc0`,padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:90}}>

              </div>
            </div>
          </div>
          <button onClick={()=>{setModal("aus");setTab("home");}}

function StatistikTab({records,users}){
  const [selMonth,setSelMonth]=useState("2026-06");
  const [exported,setExported]=useState(null);
  const empList=users.filter(u=>!MANAGERS.includes(u.key)).sort((a,b)=>a.vorname.localeCompare(b.vorname));
  const monthRecs=records.filter(r=>r.date.startsWith(selMonth)&&r.aus);

  function downloadCSV(rows,filename){
    const bom="\uFEFF";
    const csv=bom+rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(";")).join("\r\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=filename;a.click();
    URL.revokeObjectURL(url);
    setExported(filename);setTimeout(()=>setExported(null),3000);
  }
  function exportDetail(){
    const hdr=["Name","Datum","Wochentag","Filiale","Einstempeln","Ausstempeln","Arbeitsstunden","Typ","Anmerkung"];
    const rows=[hdr,...[...monthRecs].sort((a,b)=>a.date.localeCompare(b.date)).map(r=>{
      const h=stunden(r.ein,r.aus);
      return[r.user,r.date,TAGE_DE[new Date(r.date).getDay()],r.filiale,r.ein,r.aus,h!=null?h.toFixed(2):"",r.typ==="nachtrag"?"Nachtrag":"Normal",r.note||""];
    })];
    downloadCSV(rows,`Stundennachweis_Detail_${selMonth}.csv`);
  }
  function exportSummary(){
    const hdr=["Name","Rolle","Arbeitstage","Gesamtstunden","TEEAMO Arkaden (Std)","TEEAMO Aegidiimarkt (Std)","Teenjoy (Std)","Ø Std/Tag"];
    const rows=[hdr,...empList.map(emp=>{
      const er=monthRecs.filter(r=>r.user===emp.vorname);
      const total=er.reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0);
      const byFil={};FILIALEN.forEach(f=>{byFil[f]=er.filter(r=>r.filiale===f).reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0);});
      return[emp.vorname,emp.role,er.length,total.toFixed(2),byFil["TEEAMO Arkaden"].toFixed(2),byFil["TEEAMO Aegidiimarkt"].toFixed(2),byFil["Teenjoy"].toFixed(2),er.length?(total/er.length).toFixed(2):"0.00"];
    })];
    downloadCSV(rows,`Monatsübersicht_${selMonth}.csv`);
  }

  return(
    <div style={{padding:"14px"}}>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:7,letterSpacing:".06em",textTransform:"uppercase"}}>Monat auswählen</div>
        <div style={{display:"flex",gap:7}}>
          {MONTHS.map(m=>(
            <button key={m} onClick={()=>setSelMonth(m)} style={{flex:1,padding:"8px 2px",borderRadius:9,fontSize:10,fontWeight:700,cursor:"pointer",border:`2px solid ${selMonth===m?C.mint:C.border}`,background:selMonth===m?C.mintLight:"#fff",color:selMonth===m?C.mintDark:C.muted}}>
              {MONTH_LABELS[m]}
            </button>
          ))}
        </div>
      </div>
      <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:8,letterSpacing:".06em",textTransform:"uppercase"}}>Übersicht – {MONTH_LABELS[selMonth]}</div>
      <div style={{display:"flex",flexDirection:"column",gap:9,marginBottom:14}}>
        {empList.map(emp=>{
          const er=monthRecs.filter(r=>r.user===emp.vorname);
          const total=er.reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0);
          const byFil={};FILIALEN.forEach(f=>{byFil[f]=er.filter(r=>r.filiale===f).reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0);});
          const fColors=[C.mintLight,C.yellowLight,C.redLight];
          const fTColors=[C.mintDark,"#b37400",C.red];
          return(
            <div key={emp.key} style={S.card}>
              <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:9}}>

                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:800,color:C.text}}>{emp.vorname}</div>
                  <div style={{fontSize:9,color:C.muted}}>{emp.role}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:18,fontWeight:800,color:C.mintDark}}>{total.toFixed(1)}<span style={{fontSize:10,color:C.muted}}> Std</span></div>
                  <div style={{fontSize:9,color:C.muted}}>{er.length} Tage</div>

      <div style={{background:C.navy,borderRadius:14,padding:"16px",marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:800,color:"#fff",marginBottom:3}}>📥 Daten exportieren</div>
        <div style={{fontSize:10,color:"rgba(255,255,255,.4)",marginBottom:14}}>Als CSV – öffnet direkt in Excel</div>
        {[
          {title:"Stundennachweis (Details)",sub:"Jeder Tag · Name · Datum · Filiale · Ein/Aus · Std",fn:exportDetail,file:`Detail_${selMonth}.csv`},
          {title:"Monatsübersicht (Zusammenfassung)",sub:"Pro Mitarbeiterin · Gesamtstunden · je Filiale",fn:exportSummary,file:`Übersicht_${selMonth}.csv`},
        ].map(({title,sub,fn,file})=>(
          <div key={file} style={{background:"rgba(255,255,255,.07)",borderRadius:10,padding:"12px",marginBottom:8}}>
            <div style={{fontSize:12,fontWeight:700,color:"#fff",marginBottom:2}}>{title}</div>
            <div style={{fontSize:9,color:"rgba(255,255,255,.4)",marginBottom:10}}>{sub}</div>
            <button onClick={fn} style={{width:"100%",padding:"10px",borderRadius:8,border:"none",background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,color:"#fff",fontWeight:800,fontSize:11,cursor:"pointer"}}>⬇ {file}</button>

  );

// ── DIENSTPLAN UPLOAD + AI ANALYSE ───────────────────────────────────────────
function DienstplanUploadView({ records, users }) {
  const [apiKey, setApiKey] = usePersist("teeamo_apikey", "");
  const [schedule, setSchedule, scheduleReady] = useFirebase("schedule", {});
  const [imgSrc, setImgSrc] = useState(null);
  const [analyzing, setAnalyzing] = useState(false);
  const [msg, setMsg] = useState(null);
  const [showKeyInput, setShowKeyInput] = useState(false);
  const fileRef = useRef(null);

  // plan.png도 Firebase Storage 대신 base64로 Firebase에 저장
  const [planImg, setPlanImg, planReady] = useFirebase("planImage", null);

  // 이미지 선택 → 분석
  async function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (!apiKey) { setShowKeyInput(true); return; }

    // HEIC/HEIF 체크
    if (file.type === "image/heic" || file.type === "image/heif" || file.name.toLowerCase().endsWith(".heic")) {
      setMsg({ type: "err", text: "❌ HEIC 형식은 지원되지 않아요. 사진 앱에서 JPEG로 변환 후 업로드해주세요." });
      return;
    }

    setAnalyzing(true);
    setMsg(null);

    // base64 변환
    const b64 = await new Promise(res => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(",")[1]);
      r.readAsDataURL(file);
    });
    const dataUrl = `data:${file.type};base64,${b64}`;
    setImgSrc(dataUrl);

    const empNames = users.filter(u => !MANAGERS.includes(u.key)).map(u => u.vorname).join(", ");

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-5",
          max_tokens: 4000,
          messages: [{
            role: "user",
            content: [
              { type: "image", source: { type: "base64", media_type: file.type, data: b64 } },
              { type: "text", text: `이 근무표에서 다음 직원들의 근무 일정을 추출해줘: ${empNames}

JSON만 응답. 다른 텍스트 없이:
{"이름":[{"d":"YYYY-MM-DD","f":"지점명","t":"시작-끝"}]}

규칙:
- 날짜는 ${new Date().getFullYear()}년 기준 YYYY-MM-DD
- 지점명: "Arkaden"=TEEAMO Arkaden, "Aegidiimarkt"=TEEAMO Aegidiimarkt, "TEEnJOY"=Teenjoy
- 시간없으면 t는 null
- 근무없는 직원은 빈배열[]` }
            ]
          }]
        })
      });

      if (!res.ok) throw new Error(`API ${res.status}`);
      const data = await res.json();
      const text = data.content.map(c => c.text || "").join("");
      const clean = text.replace(/```json|```/g, "").trim();
      let parsed;
      try {
        const raw = JSON.parse(clean);
        // 짧은 키(d/f/t) → 긴 키(date/filiale/time) 변환
        parsed = {};
        for (const [name, shifts] of Object.entries(raw)) {
          parsed[name] = (shifts || []).map(s => ({
            date: s.date || s.d,
            filiale: s.filiale || s.f,
            time: s.time || s.t || null,
          }));
        }
      } catch(pe) {
        console.error("Raw response:", text);
        throw new Error(`JSON-Fehler: Bitte erneut versuchen.`);
      }

      // Firebase에 저장 (schedule + planImage)
      setSchedule(parsed);
      // 이미지 base64를 Firebase에 저장 (5MB 이하면 OK)
      if (b64.length < 4000000) {
        setPlanImg(dataUrl);
      }
      setMsg({ type: "ok", text: `✅ 분석 완료! ${Object.keys(parsed).length}명의 일정을 추출했어요.` });
    } catch (err) {
      setMsg({ type: "err", text: `❌ 오류: ${err.message}` });
    }
    setAnalyzing(false);
  }

  const displayImg = imgSrc || planImg;

  return (
    <div style={{padding:"14px"}}>

      {/* API 키 입력 */}
      {showKeyInput && (
        <div style={{...S.card, marginBottom:12, border:`1.5px solid ${C.yellow}`}}>
          <div style={{fontSize:12,fontWeight:800,color:C.text,marginBottom:6}}>🔑 Anthropic API-Schlüssel</div>
          <input value={apiKey} onChange={e=>setApiKey(e.target.value)}
            placeholder="sk-ant-..."
            style={{...S.input, width:"100%", fontSize:11, marginBottom:8}}/>
          <button onClick={()=>setShowKeyInput(false)}
            style={{width:"100%",padding:"9px",borderRadius:9,border:"none",background:C.mint,color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}}>
            Speichern
          </button>
        </div>
      )}

      {/* 업로드 버튼 */}
      <div style={{...S.card, marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:800,color:C.text,marginBottom:4}}>📋 Dienstplan hochladen</div>
        <div style={{fontSize:10,color:C.muted,marginBottom:12}}>Bild hochladen → KI analysiert automatisch die Schichten</div>
        <input ref={fileRef} type="file" accept="image/jpeg,image/png,image/webp,image/gif" onChange={handleFile} style={{display:"none"}}/>
        <button onClick={()=>fileRef.current.click()} disabled={analyzing}
          style={{width:"100%",padding:"12px",borderRadius:11,border:`2px dashed ${C.mint}`,
            background:C.mintLight,color:C.mintDark,fontWeight:800,fontSize:13,cursor:"pointer",
            opacity:analyzing?0.6:1}}>
          {analyzing ? "⏳ KI analysiert…" : "📷 Bild auswählen & analysieren"}
        </button>
        {!apiKey&&(
          <button onClick={()=>setShowKeyInput(true)}
            style={{marginTop:8,width:"100%",padding:"7px",borderRadius:8,border:`1px solid ${C.border}`,background:"#fff",color:C.muted,fontSize:10,cursor:"pointer"}}>
            🔑 API-Schlüssel eingeben
          </button>
        )}
        {msg&&(
          <div style={{marginTop:10,padding:"9px 12px",borderRadius:9,
            background:msg.type==="ok"?C.mintLight:C.redLight,
            color:msg.type==="ok"?C.mintDark:C.red,fontSize:11,fontWeight:600}}>
            {msg.text}
          </div>
        )}
      </div>

      {/* 근무표 이미지 */}
      {displayImg && (
        <div style={{marginBottom:12}}>
          <img src={displayImg} alt="Dienstplan"
            style={{width:"100%",height:"auto",borderRadius:14,display:"block"}}/>
        </div>
      )}

      {/* 추출된 일정 */}
      {schedule && Object.keys(schedule).length > 0 && (
        <div>
          <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:9,textTransform:"uppercase",letterSpacing:".05em"}}>
            Extrahierte Schichten
          </div>
          {Object.entries(schedule).map(([name, shifts]) => {
            if (!Array.isArray(shifts) || shifts.length === 0) return null;
            return (
              <div key={name} style={{...S.card, marginBottom:10}}>
                <div style={{fontSize:13,fontWeight:800,color:C.text,marginBottom:8}}>{name}</div>
                {shifts.map((s, i) => {
                  const actualRec = records.find(r => r.user === name && r.date === s.date);
                  const status = !actualRec ? "ausstehend" : !actualRec.aus ? "aktiv" : "erledigt";
                  return (
                    <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",
                      padding:"8px 10px",borderRadius:9,marginBottom:5,
                      background:status==="erledigt"?C.mintLight:status==="aktiv"?"#FFF9E6":C.bg}}>
                      <div>
                        <div style={{fontSize:11,fontWeight:700,color:C.text}}>
                          {new Date(s.date).toLocaleDateString("de-DE",{weekday:"short",day:"numeric",month:"numeric"})}
                        </div>
                        <div style={{fontSize:10,color:C.muted}}>{s.filiale}{s.time?` · ${s.time}`:""}</div>
                      </div>
                      <span style={{fontSize:9,fontWeight:700,padding:"3px 8px",borderRadius:99,
                        color:status==="erledigt"?C.mintDark:status==="aktiv"?C.yellow:C.muted,
                        background:status==="erledigt"?C.mintLight:status==="aktiv"?C.yellowLight:C.border}}>
                        {status==="erledigt"?"✅ Gearbeitet":status==="aktiv"?"🟡 Aktiv":"⏳ Ausstehend"}
                      </span>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}
function ManagerView({records,antraege,setAntraege,onLogout,userKey,users,setUsers,csvCtx}){
  const [tab,setTab]=useState("uebersicht");
  const [detailKey,setDetailKey]=useState(null);
  const [deleteConfirm,setDeleteConfirm]=useState(null);
  const manager=users.find(u=>u.key===userKey);
  const offene=antraege.filter(a=>a.status==="offen"&&a.zustaendig===userKey);
  const empList=users.filter(u=>!MANAGERS.includes(u.key)).sort((a,b)=>a.vorname.localeCompare(b.vorname));
  const todayRecs=records.filter(r=>r.date===today());
  const approve=(id,ok)=>setAntraege(prev=>prev.map(a=>a.id===id?{...a,status:ok?"genehmigt":"abgelehnt"}:a));
  const getStatus=name=>{const r=todayRecs.find(x=>x.user===name);if(!r)return"Nicht erschienen";if(!r.aus)return"Aktiv";return"Feierabend";};
  const getBranch=name=>{const r=todayRecs.find(x=>x.user===name);return r?.filiale||null;};
  const sColor=s=>s==="Aktiv"?C.mintDark:s==="Feierabend"?C.muted:C.red;
  const sBg=s=>s==="Aktiv"?C.mintLight:s==="Feierabend"?"#F0F0F0":C.redLight;

  return(
    <div style={{background:C.bg,minHeight:"100vh",paddingBottom:80}}>
      <div style={S.hdr}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:11,opacity:.45,marginBottom:3,letterSpacing:".06em",textTransform:"uppercase"}}>teeamo · Manager</div>
            <div style={{fontSize:20,fontWeight:800}}>{manager?.vorname||"Manager"}</div>
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:7}}>
            <div style={{width:38,height:38,borderRadius:"50%",background:C.yellow,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,color:C.navy}}>{manager?.kuerzel||"M"}</div>
            <button onClick={onLogout} style={{fontSize:10,background:"rgba(255,255,255,.1)",border:"0.5px solid rgba(255,255,255,.2)",color:"rgba(255,255,255,.6)",borderRadius:7,padding:"3px 8px",cursor:"pointer"}}>Abmelden</button>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginTop:14}}>
          {[{l:"Aktiv",n:empList.filter(u=>getStatus(u.vorname)==="Aktiv").length,c:C.mint},
            {l:"Feierabend",n:empList.filter(u=>getStatus(u.vorname)==="Feierabend").length,c:"rgba(255,255,255,.4)"},
            {l:"Nicht da",n:empList.filter(u=>getStatus(u.vorname)==="Nicht erschienen").length,c:C.red}].map(({l,n,c})=>(
            <div key={l} style={{background:"rgba(255,255,255,.07)",borderRadius:11,padding:"9px 10px",textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:800,color:c}}>{n}</div>
              <div style={{fontSize:9,opacity:.45,marginTop:1}}>{l}</div>
            </div>
          ))}
        </div>
      </div>

      {tab==="uebersicht"&&!detailKey&&(
        <div style={{padding:"14px"}}>
          <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:9,textTransform:"uppercase",letterSpacing:".05em"}}>Heutige Mitarbeiterinnen</div>
          <div style={{display:"flex",flexDirection:"column",gap:9}}>
            {empList.map(emp=>{
              const st=getStatus(emp.vorname),br=getBranch(emp.vorname);
              return(
                <div key={emp.key} style={{...S.card,display:"flex",alignItems:"center",gap:11,padding:"12px 14px"}}>
                  <button onClick={()=>setDetailKey(emp.key)} style={{flex:1,border:"none",background:"none",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:11,padding:0}}>
                    <div style={{width:40,height:40,borderRadius:"50%",background:C.navy,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,color:"#fff",flexShrink:0}}>{emp.kuerzel}</div>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:7}}>
                        <span style={{fontSize:13,fontWeight:700,color:C.text}}>{emp.vorname}</span>
                        <span style={{fontSize:9,color:C.muted,background:C.border,padding:"2px 6px",borderRadius:99}}>{emp.role}</span>
                      </div>
                      <div style={{fontSize:10,color:C.muted,marginTop:2}}>{br?br+" · ":""}Heute</div>
                    </div>
                    <span style={{fontSize:9,fontWeight:700,padding:"3px 9px",borderRadius:99,color:sColor(st),background:sBg(st)}}>{st}</span>
                  </button>
                  <button onClick={()=>setDeleteConfirm(emp.key)} style={{flexShrink:0,width:30,height:30,borderRadius:8,border:`1px solid ${C.border}`,background:C.redLight,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",marginLeft:4}}>
                    <span style={{fontSize:13,color:C.red}}>🗑</span>
                  </button>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {tab==="uebersicht"&&detailKey&&(()=>{
        const emp=users.find(u=>u.key===detailKey);
        const empRecs=records.filter(r=>r.user===emp.vorname);
        const total=empRecs.filter(r=>r.aus).reduce((a,r)=>a+(stunden(r.ein,r.aus)||0),0);
        return(
          <div style={{padding:"14px"}}>
            <button onClick={()=>setDetailKey(null)} style={{background:"none",border:"none",cursor:"pointer",color:C.mintDark,fontSize:12,fontWeight:700,marginBottom:12}}>← Zurück</button>
            <div style={{...S.card,display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
              <div style={{width:48,height:48,borderRadius:"50%",background:C.navy,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:16,color:"#fff"}}>{emp.kuerzel}</div>
              <div>
                <div style={{fontSize:16,fontWeight:800,color:C.text}}>{emp.vorname}</div>
                <div style={{fontSize:11,color:C.muted}}>{emp.role}</div>
                <span style={{fontSize:9,fontWeight:700,padding:"3px 9px",borderRadius:99,marginTop:5,display:"inline-block",color:sColor(getStatus(emp.vorname)),background:sBg(getStatus(emp.vorname))}}>{getStatus(emp.vorname)}</span>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              {[{l:"Std. gesamt",v:total.toFixed(1)+"h"},{l:"Arbeitstage",v:empRecs.length+"d"}].map(({l,v})=>(
                <div key={l} style={S.card}>
                  <div style={{fontSize:10,color:C.muted,marginBottom:4}}>{l}</div>
                  <div style={{fontSize:20,fontWeight:800,color:C.mintDark}}>{v}</div>
                </div>
              ))}
            </div>
            <div style={{...S.card,padding:0,overflow:"hidden"}}>
              <div style={{padding:"11px 13px",borderBottom:`1px solid ${C.border}`,fontSize:11,fontWeight:700,color:C.text}}>Arbeitsnachweise</div>
              {empRecs.length===0?<div style={{padding:"12px",fontSize:11,color:C.muted}}>Keine Einträge.</div>:empRecs.map((r,i)=>(
                <div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 13px",borderBottom:i<empRecs.length-1?`1px solid ${C.border}`:"none"}}>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <div style={{width:30,height:30,borderRadius:7,background:r.aus?C.mintLight:C.yellowLight,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                      <span style={{fontSize:7,color:C.muted}}>{r.date.slice(5)}</span>
                      <span style={{fontSize:9,fontWeight:700,color:r.aus?C.mintDark:C.yellow}}>{r.filiale.slice(-1)}</span>
                    </div>
                    <div>
                      <div style={{fontSize:11,color:C.muted}}>{r.ein} → {r.aus||"läuft"}</div>
                      <div style={{fontSize:9,color:C.muted}}>{r.filiale}</div>
                    </div>
                  </div>
                  <span style={{fontSize:11,fontWeight:700,color:r.aus?C.text:C.yellow}}>{stdLabel(r.ein,r.aus)}</span>
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {tab==="dienstplan"&&(
        <DienstplanUploadView records={records} users={users}/>
      )}

      {tab==="antraege"&&(
        <div style={{padding:"14px"}}>
          {offene.length>0&&(
            <div style={{marginBottom:12}}>
              <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:9,textTransform:"uppercase",letterSpacing:".05em"}}>Offene Anträge ({offene.length})</div>
              {offene.map(a=>(
                <div key={a.id} style={{...S.card,marginBottom:9}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
                    <div>
                      <div style={{fontSize:12,fontWeight:700,color:C.text}}>{a.user}</div>
                      <div style={{fontSize:10,color:C.muted}}>{a.date} · {a.filiale} · {a.ein}–{a.aus}</div>
                    </div>
                    <span style={{fontSize:9,fontWeight:700,color:C.yellow,background:C.yellowLight,padding:"3px 7px",borderRadius:99}}>Offen</span>
                  </div>
                  <div style={{fontSize:11,color:C.text,background:C.bg,borderRadius:7,padding:"6px 9px",marginBottom:9}}>📌 „{a.grund}"</div>
                  <div style={{display:"flex",gap:7}}>
                    <button onClick={()=>approve(a.id,false)} style={{flex:1,padding:"9px",borderRadius:9,border:`1.5px solid ${C.red}`,background:C.redLight,color:C.red,fontWeight:700,fontSize:12,cursor:"pointer"}}>✕ Ablehnen</button>
                    <button onClick={()=>approve(a.id,true)} style={{flex:1,padding:"9px",borderRadius:9,border:"none",background:`linear-gradient(135deg,${C.mint},${C.mintDark})`,color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}}>✓ Genehmigen</button>
                  </div>
                </div>
              ))}
            </div>
          )}
          <div style={S.card}>
            <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:9,textTransform:"uppercase",letterSpacing:".05em"}}>Alle Anträge</div>
            {antraege.length===0?<div style={{fontSize:11,color:C.muted}}>Keine Anträge.</div>:antraege.map((a,i)=>(
              <div key={a.id} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",paddingBottom:i<antraege.length-1?9:0,marginBottom:i<antraege.length-1?9:0,borderBottom:i<antraege.length-1?`1px solid ${C.border}`:"none"}}>
                <div>
                  <div style={{fontSize:11,fontWeight:700,color:C.text}}>{a.user} · {a.date}</div>
                  <div style={{fontSize:10,color:C.muted}}>{a.filiale} · {a.ein}–{a.aus}</div>
                </div>
                <span style={S.pill(a.status)}>{a.status==="offen"?"Offen":a.status==="genehmigt"?"Genehmigt":"Abgelehnt"}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {tab==="statistik"&&<StatistikTab records={records} users={users}/>}

      <div style={S.nav}>
        {[{id:"uebersicht",icon:"👥",lbl:"Übersicht"},
          {id:"dienstplan",icon:"📋",lbl:"Dienstplan"},
          {id:"antraege",icon:"📥",lbl:`Anträge${offene.length>0?" ("+offene.length+")":""}`},
          {id:"statistik",icon:"📊",lbl:"Statistik"}].map(t=>(
          <button key={t.id} onClick={()=>{setTab(t.id);setDetailKey(null);}} style={{flex:1,border:"none",background:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"3px 0"}}>
            <span style={{fontSize:19}}>{t.icon}</span>
            <span style={{fontSize:9,fontWeight:600,color:tab===t.id?C.mintDark:C.muted}}>{t.lbl}</span>
            {tab===t.id&&<div style={{width:16,height:2,background:C.mint,borderRadius:99}}/>}
          </button>
        ))}
      </div>

      {deleteConfirm&&(()=>{
        const empToDel=users.find(u=>u.key===deleteConfirm);
        return(
          <div style={{position:"fixed",inset:0,background:"rgba(20,20,20,.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:"24px"}}>
            <div style={{background:C.card,borderRadius:18,padding:"24px 22px",width:"100%",maxWidth:340,boxShadow:"0 8px 32px rgba(0,0,0,.18)"}}>
              <div style={{width:48,height:48,borderRadius:"50%",background:C.redLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,margin:"0 auto 14px"}}>🗑</div>
              <div style={{fontSize:16,fontWeight:800,color:C.text,textAlign:"center",marginBottom:6}}>Konto löschen?</div>
              <div style={{fontSize:12,color:C.muted,textAlign:"center",marginBottom:20}}>
                Das Konto von <strong style={{color:C.text}}>{empToDel?.vorname}</strong> wird dauerhaft gelöscht. Diese Aktion kann nicht rückgängig gemacht werden.
              </div>
              <div style={{display:"flex",gap:9}}>
                <button onClick={()=>setDeleteConfirm(null)} style={{flex:1,padding:"12px",borderRadius:11,border:`1.5px solid ${C.border}`,background:C.card,color:C.muted,fontWeight:700,fontSize:13,cursor:"pointer"}}>Abbrechen</button>
                <button onClick={()=>{setUsers(prev=>prev.filter(u=>u.key!==deleteConfirm));setDeleteConfirm(null);setDetailKey(null);}}
                  style={{flex:1,padding:"12px",borderRadius:11,border:"none",background:`linear-gradient(135deg,${C.red},#A8432E)`,color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}}>Löschen</button>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState("login");
  const [userKey,setUserKey]=useState(null);
  // users/PIN은 로컬 유지 (보안)
  const [users, setUsers] = usePersist("teeamo_users", INIT_USERS);
  // records/antraege는 Firebase 실시간 동기화
  const [records,  setRecords,  recordsReady]  = useFirebase("records",  INIT_RECORDS);
  const [antraege, setAntraege, antraegeReady] = useFirebase("antraege", INIT_ANTRAEGE);
  // ✅ CSV: 앱 최상단 1회 fetch, 모든 화면에 공유
  const csvCtx = useDienstplanCSV();

  function handleLogin(key){
    const u=users.find(x=>x.key===key);
    const isAdmin=MANAGERS.includes(key)||(u&&u.isAdmin);
    setUserKey(key);setScreen(isAdmin?"manager":"mitarbeiter");
  }
  function handleLogout(){setUserKey(null);setScreen("login");}

  return(
    <div style={{maxWidth:500,margin:"0 auto",minHeight:"100vh",background:C.bg}}>
      {!recordsReady&&(
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",gap:14}}>
          <div style={{width:36,height:36,border:`3px solid ${C.mint}`,borderTop:"3px solid transparent",borderRadius:"50%",animation:"spin .8s linear infinite"}}/>
          <div style={{fontSize:13,color:C.muted,fontWeight:600}}>Verbindung zu Firebase…</div>
        </div>
      )}
      {recordsReady&&screen==="login"&&<LoginView onLogin={handleLogin} users={users} setUsers={setUsers} csvCtx={csvCtx}/>}
      {recordsReady&&screen==="mitarbeiter"&&<MitarbeiterView userKey={userKey} users={users} records={records} setRecords={setRecords} antraege={antraege} setAntraege={setAntraege} onLogout={handleLogout} csvCtx={csvCtx}/>}
      {recordsReady&&screen==="manager"&&<ManagerView records={records} antraege={antraege} setAntraege={setAntraege} onLogout={handleLogout} userKey={userKey} users={users} setUsers={setUsers} csvCtx={csvCtx}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
